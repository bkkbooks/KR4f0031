body:
  text: 陳檢討四六卷十翰林院檢討陳維嵩撰序閻牛叟貫花詞序原注牛叟向有悼亡之戚曽為賦兑閣遺徽詞十首今新納小姬同人贈句顔以貫花仍為製序昔言新婦宜配參軍見皇士序共説傾城足當名士見琴怨序梁詩紀劉長史有名士悅傾城詩同時多和之唐家白傳園留楊栁纎腰見琴怨序宋室坡公坐擁雲藍小袖侍兒小名録東坡侍妾曰朝雲字子霞姓王氏錢塘人又有榴花後朝雲死海外榴花獨存咸哀窈窕詩並縱清狂見浙西序雖老去而恆然在詩人為尤甚適遭渦河之逺使郵來淮上之新聞水經注渦河水東流經鳳陽與淮谷云有蛾眉歸于牛叟時則南朝親懿北府朋逰見尺牘序爭裁却扇之詞競製催粧之句通鑑中宗戲竇從一以老乳母王氏嫁之令從一誦却扇詩數首注唐人成昏之夕有催粧詩却扇詩文成綺密述才子之鍾情見海棠賦旨托新清敘狂奴之故態嚴光別傳于陵與侯司徒書曰君房足下懷仁輔義天下悅阿謏順旨腰領絶侯得書奏之帝笑曰此狂奴故態縱易言生稊未可深嘲易枯楊生稊况詩美天桃能無遙妬詩獨是七載恆鰥終年獨宿盆才罷鼓尚餘愀愴之思見井叔序簫已重吹忽作柔靡之想見藝圃序何來曼倩頻娶小妻見看奕賦豈有安仁頓忘大婦見渭仁序常情為之揣度俗士加以然疑不知思纒故劍所貴眀其本懷漢宣帝紀帝即位公卿議立皇后皆心擬霍將軍女上乃詔求微時故劒大臣知指白立許媫妤為皇后誼篤遺簮尤在全其初志韓詩外傳少原之野有婦人刈蓍薪而失簪哭甚哀孔子曰何悲也婦人曰非傷亡簮也吾所以悲者不忘故也並見丁香賦注若使一乖伉儷之歡長隔房幃之愛五帝編伏羲始制嫁娶以儷皮為禮注古者衣皮雙皮取伉儷之義左傳齊侯請繼室于晉叔向曰寡君未有伉儷君有辱命惠莫大焉則是斷謝公之絲竹觸景蒼涼見修禊序遺陶令之琴樽暮年蕭瑟晉陶潛傳清琴橫床濁酒半壺牙籖粉軸疇事校讐茗碗笛床誰為總管徒增逝者之悲轉掩前人之德何况含𢎞雅量昔已賡樛木于生前誰云婉孌深恩詩不願接桃根于歿後見琴怨序此泥雖粘絮原非太上之忘情參寥贈妓詩禪心已作粘泥絮不逐東風上下狂忘情見海棠賦而蚌必生珠堪作詞場之佳話也詳潘母啓斯語未終先生曰善貫花輯罷敢重祈元宴之篇見天章序兌閣吟餘莫厭發棠之請孟子蔣京少梧月詞序銅官﨑麗述異録漢時陽羡長袁玘常言死當為神一夕痛飲卒風雨失其柩夜荆山有數千人噉聲鄉人往視棺已成塜俗呼銅官山屬宜興按湖州武康縣蜀之卭州俱有銅官山長沙有銅官渚西安同官縣古曰銅官付辨于此將軍射虎之鄊晉書周處陽羡人不修細行父老曰南山虎橋下蛟并子為三害處遂入山射虎投水斬蛟乃造見二陸士龍勉以力學官中丞今宜興有周將軍廟玉女峥泓宜興志張公洞西南有玉女潭舊傳玉女修煉于此才子雕龍之藪見三芝序城邊水榭迹擅樊川杜牧之傳牧萬年人乃樊噲所封地昔稱樊川人因號牧為杜樊川嘗寓宜興荆溪上有水榭題句云他年雪中棹陽羡訪吾廬郭外釣臺名標任昉常州志任昉嘗為郡守宜興荆溪上有任公釣臺雖溝塍蕪沒難詢坡老之田東坡别傳公嘗買田陽羡欲于此間種橘搆一亭名曰楚頌後卒宜興傳有東坡書院而隴樹蒼茫尚志方回之墓一統志宋人賀鑄字方回墓在陽羡述異志南北時方回為人所劫欲其道回化身而去更以一丸泥封其户以方回印印之一城菱舫吹來水調歌頭樂苑水調歌始隋煬帝鑿汴河製此曲唐用其名外史檮杌王衍泛舟自製水調銀漢曲眀皇雜録祿山犯闕帝欲幸蜀時有進水調歌唱李嶠山川滿目淚沾衣是也十里茶山行去祝英臺近常州志善卷洞即祝英臺故宅南有祝臺其讀書處也詞譜詞有祝英臺近一調或無近字又名月底修簫譜鵝笙象板李長吉詩天君夫人踏雲語冷風颯颯吹鵝笙又王子吹笙鵝管長戶習倚聲見金天石序苔網花箋見尺牘序注家精協律見琅霞序居斯地也大有人焉僕也十年作賦愧遜陳琳見無忝序三徑論交欣逢蔣詡髙士傳漢蔣詡字元卿嘗于舍前竹下開三徑惟故人求仲羊仲從之逰哀帝時為兖州刺史後王莽居攝歸卧不出其人也九侯第宅招魂九矦淑女多迅衆些四姓衣冠見璿璣賦注家風通顯東京蕭育之家後漢書蕭育字次君為執金吾乃蕭望之之子也門第清華北魏崔悛之宅見少楹序夫其幼敏才情蚤耽經史行間芍藥見三芝序盈箱潘嶽之花見椘鴻序字裏葡萄見三芝序滿篋邱遲之錦江淹别傳淹罷政時泊禪靈寺渚夢張景陽謂曰前以匠錦相寄今可見還探懷𢾗尺與之此人大恚曰那得割絶都盡顧邱遲曰餘此以遺君王恭逸態濯楊栁于月中見得仲序謝朓清文爛芙蓉于日下詩話謝朓字玄暉文章清麗善草𨽻長五言鮑照曰謝五言詩如初日芙蓉自然可愛一作鮑照稱謝靈運詳後竹逸序文兼各體傅鶉觚博奧之宗見雪持序詩備諸家劉越石清剛之選見素伯序而乃名同小宋妙解音聲見寶汾序注系出竹山尤工樂府人物志蔣勝欲字竹山義興人有竹山詞于是溫家助教紅蠟填詞見樂府補序按溫飛卿仕終國子助教集中有詞云玉爐香紅蠟淚偏照畫堂秋思薛氏侍郎銀筝製曲五代十國詞薛昭藴仕至侍郎銀筝曲補注阿灰善怨不乏畫簾微雨之吟詞綜箋張曙小字阿灰侍郎禕子工于詞嘗作浣溪紗詞云黃昏微雨畫簾垂花蘂工愁相傳馬上鳴聲之作花蘂見良輔序詞譜花蘂夫人有採桑子半關云才離蜀道心將碎離恨綿綿春日如年馬上時時聞杜鵑櫻桃隔葉見海棠賦按唐人春日有櫻桃會時遇順郎唐詩絶劉禹錫有聽田順郎歌絶句簫鼓逢場還迎車子繁欽箋都尉薛訪車子年十四能歌囀引聲注車子御者洞仙傳車子候者扶風人為侍中一朝仙去漢武帝思之作車子候歌附注年年麗製涴北里之羅裙唐孫􅙺北里志平康里入北門諸妓所居夜夜香詞灑東鄰之粉壁見楚鴻序蓋摸魚戀蝶即是皇華赤雁之遺音教坊記唐眀皇製摸魚子調一名摸魚兒詞譜蝶戀花乃采梁簡文帝樂府翻階蛺蝶戀花情為名也皇華補注漢書孝武幸東海獲赤雁作朱雁之歌而六醜三臺依然白苧紅鹽之換調詞綜箋詞有六醜一調又今之啐酒三十拍曲名三臺按王建詩有宫中三臺江南三臺題漢樂府冇白苧歌元曲譜有烏角鹽紅鹽通考鹽者途引歌曲見子厚序審其格律直追屈宋風騷見楚鴻序注揆厥源流詎雜金元㸑舞輟耕録院本五花㸑㺯或曰宋徽宗見㸑人來朝衣裝鞋履巾裏傅粉墨舉動如此使優人效之以為戲諸雜院㸑如三跳澗㸑百果㸑百花㸑不一其名且也黃香純孝屢嵗從親孝子傳漢黃香年九嵗失母事父盡孝夏月扇枕席冬則以身溫被庾信多才頻年去國見滕王賦大江西上長空之樓櫓何多烏鵲南飛獨夜之關山不少見懸圃序琵琶亭下三更逢商婦之船見良輔序章貢門前千里斷降王之信吉安志府城東章貢二水相合流至萬安界凡十八灘降王見子厚序霜纒繡戟依稀陶侃之空營陶侃别傳侃為江夏太守加督護諸軍後以荆州刺史移鎮沔口卒于武昌樊口士民立廟府城北雨洗珠鈿倣佛灌嬰之賸瓦見滕王賦按南昌府灌嬰城古迹相傳兩後有拾珠鈿者遙攀九疊羡匡續之成仙見滕王賦極眺雙孤笑彭郎之未嫁九域志大小孤山俗誤為姑澎浪磯誤為彭郎云彭郎小姑壻也坡詩舟中賈客莫謾狂小姑前年嫁彭郎躊躇已甚懭恨何言見憺園賦無何而盆浦回帆仍過澧浦郡國志昔有人洗銅盆墮水見一龍負水而出因名湓浦在九江德化縣水經注澧水由慈利逹石門澧州潯陽捩拖復上衡陽九江志府城北有潯江衡州志衡陽縣屬郡郭銀瀧珠沫廣韻急流謂之瀧馬融賦瀑滈噴沫郭璞江賦揮㺯酒珠拊拂瀑沫庾元規開府之鄉見滕王賦白日青天甘興霸橫戈之地吳志甘寧字興霸巴西人奔吳謂權曰宜定荆襄漸規巴蜀遂西擊黃祖破斬之後攻曹操于烏林攻曹仁于南郡詳銀臺啓三國志甘寧隨魯肅鎮益都拒關羽曰羽聞吾咳唾不敢涉水檣飛湖口一片神鴉風上記甘寧戰死神鴉翼覆其尸有遺壘至今田家鎮上下三十里神鴉乞食集桅頂得則飛去杜詩迎棹舞神鴉席挂湘中數聲山鷓杜甫詩挂席拾海月鄭谷鷓鴣詩相呼相喚湘江曲楚天染黛只想成煙見井叔序巫嶺銜丹還思行雨見良輔序細腰宫內問羅綺以何年後漢馬賡疏諺曰楚王好細腰宫中多餓死嶽州志華容縣有細腰宫椘靈王貯美人于此墮淚碑前悵繁華之不見襄陽記祐嘗逰峴山襄陽人建碑立廟于峴首後祐卒嵗時祭祀望其碑者無不流涕因謂之墮淚碑黃蘆苦竹偏傷羈客之心碧杜紅蘭例入騷人之詠時則竹枝乍唱已付船娘樂録竹枝之音起于巴蜀唐人所作皆言蜀中風景後人因效其體于各地為之囉嗊才歌便填瑟部全唐詩話囉嗊曲作于唐妓劉采春一名望夫歌元稹贈劉詩更有惱人腸斷處選詞能唱望夫歌即此曲也囉嗊猶言未囉又金陵有囉嗊樓援毫以賦題名赤帝之宫夔州志先主卒永安宫故有先主廟按黃州府亦有永安城按漢為赤帝擁楫而吟托興黃陵之廟荆州志黃牛峽神嘗佐禹治水有功諸葛亮建黃陵廟于夷陵州長沙志劉漢表祀舜二妃建黃陵廟在湘陰縣北四十里况復飄飄短鋏再涉金臺見九日序落落單衫重窺石鼓書斷石鼓文諷周宣王畋獵之作周太史史籕書之事原宣王歧陽之獵有碣石籕篆其形似鼓初在陳倉野中鄭餘慶遷之鳳翔元移燕京今在國子監中野鷹臺逈恆邀朔客以呼盧劉表别傳表好鷹常登臺歌野鷹來曲宋王招魂成梟而牟呼五白兮貴耳集牟即盧也五白盧梟雉犢塞博齒也宋書劉毅于東府聚樗蒱毅次擲得雉大喜劉裕惡之因援五木既而四子俱墨其一子躍未定裕厲聲唱之即成盧北史慕容寶與韓黃李根等摴蒱誓願得三盧子是三擲盡盧袒跣大呌曰呼盧李翺五木經注雉為二梟為六盧為四按盧如今之博采有豬有豹墮馬粧妍見皇士序聊過燕姬而貰酒詳納姬序嗟乎霜零碣石見九日序樹何葉以非黃日匿漁陽曹植詩白日忽西匿順天志秦為上谷漁陽地晉唐曰范陽山無峰而不紫霓裳拍散見良輔序人間無擫笛之賔見楚鴻序穆護歌殘詞品樂府有穆護砂隋朝曲也與水調河傳同時皆隋開汴河時辭人所製勞歌也天上少吹笙之侣見滕王賦乃李謨江上尚剩遺宫見素伯序注而賀老筵前還留舊本見子厚序連昌宫詞賀老琵琶定場屋遂移商而刻羽約有千篇見天章序爰滴粉以搓酥釐為一卷見浙西詞序綿駒善唱要為自訴其生平孟子阿鵲成歌祗以代陳其辛苦見子厚序注如傳紫塞龍城繡李益之詞崔豹古今注秦築長城上色皆紫漢塞亦然或曰草生紫色龍城補注唐書李益長于詩每一篇成樂工爭求之至征人早行篇天下皆施之繪圖倘播紅樓鳳紙寫韓翃之句詩話韓翃字君平能詩善宫詞號大曆才子德宗召遷為駕部郎中知誥詔時有兩韓翃奉旨者請之帝寫其詩曰乃日暮漢宫傳獵燭青煙散入五侯家者因以君平應詔李義山詩收將鳳紙寫相思見尺牘序董舜民蒼梧詞序若使人間罷長恨之歌見琴怨序天上少銷魂之曲見少楹序井公多暇惟解投壺見琴怨序彭老無愁未嘗觀井詳徴萬栁啓則秦缶不彈燕歌遂歇秦缶見子厚序燕歌見九日序石何言于晉國見寶菴序鶴無語于堯年劉敬叔異苑晉太康二年冬大雪南州人見二白鶴于橋下曰今兹寒不減堯崩年遂飛去無如海水長乾蓬池易淺神仙傳王逺字方平漢桓帝時真人七夕與其妹麻姑降蔡京家姑云接待以來東海三為桑田今蓬萊水又淺矣方平亦曰聖人皆言海中行復揚塵也趙厠有不平之客吳關多可惜之人史記趙襄子滅智伯豫讓乃變姓名為刑人入宫塗厠欲刺襄子國䇿伍子胥槖載而出昭關夜行晝伏見茹惠序此則大夫思告其哀匹士願歌其事言之不足悲矣如何且夫鴆豈善于為媒見茹惠序魚寧可以作媵屈原九歌波滔滔兮來迎魚鄰鄰兮媵豫注媵送也子虛無是詎常真有其人子虛賦楚使子虛使于齊王敗罷子虛過詫烏有先生亡是公存焉李善注虛藉此三人為詞以風諌暮雨朝雲要亦絶無之事見良輔序然而宋玉以寄其形容相如以成其比興固知情難跖實事比鏤塵託讔謎以言愁見天篆序借謿詼以寫志詳觀槿序注凡兹抹月披風之作悉類詛神罵鬼之章下注逹者喻之空花釋典夢幻空花徒勞把捉愚夫求之楮葉見藝圃序今有豢龍華胄左傳晉蔡墨曰古者畜龍故國有豢龍氏有御龍氏董父擾畜龍帝舜賜姓曰董氏曰豢龍夏時劉纍學擾龍于豢龍氏以事孔甲賜姓曰御龍繡虎雄才見祖德賦名已動于春官身甫偕夫計吏見琅霞序而楚國亡猿淮南子楚王亡其猿而林木為之殘塞翁失馬見歸田序叩丹霄而無路攀紫闥以誰階泣不成聲檀弓逝將安適詩于是四海誰容詳翼王序三年不笑見淡菴序注而逰盩厔見子厚序聽雞渡函谷之關詳翼王序東返轘轅立馬望咸陽之坂輿志河南府有轘轅嶺設關于此國䇿塞轘轅緱氏之口咸陽見子厚序北風拉沓髙臺颯其無人傳毅舞賦拉沓鵠驚漢鼓吹曲拉沓髙飛慕安宿南內荒涼見樂府序夜烏咽而誰語見鴻客序此皆扶荔遺基長楊廢館黃圗元鼎六年破南越于上林苑中起扶荔宫以植所得竒草異木宫闕志漢本秦長楊舊宫修之以備行幸宫有垂楊因以名在盩厔地金戈夜響則群雄蹴踏之鄉鐵壘晨摩則悍帥奮揚之地漢髙皇大風置酒起舞悲來漢書髙帝既定天下還過沛宫置酒召故人父老子弟佐酒發沛中兒教之歌帝乃起舞慷慨傷懷歌曰大風起兮雪飛揚威加海內兮歸故鄉安得猛士兮守四方唐玄宗夜雨聞鈴沾襟淚下見子厚序既美人駿馬之安在見天章序亦故宫陳迹之極多于是萬感風生詳觀槿序千端蝟集見天章序蘸杯盤而狂噭墨欲成龍纂異記唐玄宗御案墨曰龍香劑一曰見墨上有小道士如蠅而行上叱之對曰凡世人有文其墨上皆有龍賔十二上神之乃以墨分賜掌文官濡頭髮以作書見子厚序字皆成蚪見淡園賦每于鐘鳴燈炧之餘恆作劍拔弩張之勢見藝圃序狂時漫寫定屬神來見藝圃序醒後詳觀不知誰作見子厚序注又或挂玉筵前見楚鴻序絶纓坐上史記滑稽傳淳于髠仰天大笑冠纓索絶一雙紅綬見雪持序見隔巷之新人見琴怨序半夜青衫遇下江之故伎見良輔序夢華小緑倣佛生前見樂府補序花月新聞依稀故事補注樂志春江花月夜玉樹後庭花并陳後主作隋紀煬帝咏春江花月夜亦復曲付何戡詩紀劉禹錫與歌妓何戡詩舊人惟有何戡在相與殷勤唱渭城調翻穆護見梧月序安公子間歌一曲小秦王髙唱三章隋紀大業末煬帝幸揚州樂人王令言以年老不去其子從焉其子在家彈琵琶令言警問此曲何名子曰內裡新翻曲子名安公子令言流涕曰爾不須扈從駕必不回子問其故令言曰此曲宫聲往而不返宫為君是以知之唐書葉志忠曰隋末時天下歌秦王破陳樂注兆太宗之興也唐樂府有小秦王題金柔玉軟青蛾間譜其聲情斗轉星橫白髮暗傳其點拍漢武外傳宫人名麗娟者年始二八玉膚柔軟吹氣如蘭漢樂府月沒參橫北斗闌干信陵君醇酒婦人而外他何知乎信陵君列傳秦數使反間偽賀公子得立為魏王未也魏王聞其毁使人代公子將公子乃謝病不朝飲醇酒多近婦女日夜為樂飲者四嵗竟病酒而卒盧思道白擲劇飲之風君其是矣補注北齊書盧思道字子行少不讀書嗜飲酒後力學齊天保中待詔文林館周武帝平齊授儀同三司隋時為散騎侍郎漢書引滿舉白注白酒觴也僕也老而失學雅好填詞壯不如人僅専顧曲見良輔序慨自鄒董既亡之後詳聖期序淚滿蟬鈿况復曹吳原注謂南耕天石久别以來心灰兔管見吾友之一編動鄙人之三歎啼成紺碧見琴怨序不讓江潭紅豆之思見素伯序泣化瓊瑰左傳初聲伯夢涉垣或與瓊瑰食之泣而為瓊瑰盈其懷何殊風雨蒼梧之恨見憺園賦永傳樂府長播詞林附注詛神罵鬼用韓昌黎送窮鬼文栁子厚罵三尸神文事觀槿堂詞集序將使三辰不黷見璿璣賦二氣無訛鳴條破塊不聞淳悶之年鹽鐵論董仲舒曰太平之世風不鳴條開甲散蒙而已雨不破塊潤葉津莖而已老子其政悶悶其民淳淳木穰金飢罕紀睢于之世史記貨殖傳計然曰嵗在金穰水毁木飢火旱六嵗穰六嵗旱十二嵗一大飢列子楊朱南之沛至梁而遇老子曰而睢睢而于于而誰與居蕢桴土鼓禮膢臘而詠豳詩漢書武帝令天下大酺五日臘五日注漢朝立秋出獵因祭宗廟曰貙膢又祠門戶曰臘膢臘皆獵取禽獸以祭之名折爼蒸殽俯聘而賡雅頌國語晉侯使隋會于周定王饗之殽蒸曰禘郊之事則有全蒸王公立飫則有房蒸親戚宴饗則有殽蒸注蒸升也全蒸全其牲體而升之也房大俎也房蒸半解其體升之房也殽蒸升體解節折之俎謂之折俎也俯聘載禮固已五常之性共澤和平班固白虎通五性者何仁義禮智信也按馬融有三綱五常之論寧惟四始之遺獨歸敦厚見天篆序即或越客關弓孟子塞翁失馬見歸園序釁僅比于蚍蜉忿祗緣夫睚眥説文蚍蜉大蟻韓愈詩蚍蜉撼大樹范雎傳一飯之德必償睚眥之怨必報非無染指之嫌未免掇灰之懼左傳楚人獻黿于鄭靈公公子宋與子家相見子公之食指動以示子家曰他日我如此必嘗異味及食大夫黿召子公而弗與也子公怒染指于鼎嘗之而出家語孔子厄陳蔡子貢犯圍而出得米一石飲之有埃墨墮甑中回取食之子貢曰仁人亷士窮改節乎孔子召回進飯吾將祭焉對曰有埃墜甑置之不潔棄之可惜回即食之不可祭也見歸田序注假以俟我言求蠲疾之虻詩言采其虻注貝母也主療欎結之疾逮其謂之姑酌忘憂之酒見智修序無如鬼既善謀見得仲序晉摯虞門銘祿無常家祿無定門人謀鬼謀道在則尊天而多醉見茹蕙序虞喜志傳秦穆公夢之帝所賜以金䇿祚世之業當時有謡曰天帝醉秦暴金誤隕石墜哀江南賦以鶉首而賜秦天何為而此醉石能言于晉國鶴解語夫堯年見舜民序蒼鵝出地見懸圃序剪鶉首而何堪見茹蕙序青犢彌天詳孟大母啓攀龍胡而莫逯見孝威序此則霧湧張超之市有識咸悲謝承後漢書張楷字公超性好道術能作五里霧學其術者填塞故云霧市並見憺園賦濤飛徐福之船含靈共憫見天章序春秋元命苞根生浮著含靈盛壯雖復弦髙賤賈微虎小臣左傳秦師及滑鄭商人弦髙將市于周遇之以乘韋先牛十二犒師且使遽告于鄭孟眀曰鄭有備矣不可冀也左傳吳伐魯次于泗上微虎欲宵攻王舍私屬徒七百人三踊于幕庭吳子聞之一夕三遷注微虎魯大夫三遷畏微虎也汪錡不過孱童漆室止于弱女左傳公為與其嬖童汪錡乘皆死皆殯孔子曰能執干戈以衛社稷可無殤也列女傳戰國時魯漆室女倚柱而嘯鄰婦曰欲嫁乎曰吾憂魯君老而太子少也亦或銜酸茹苦坐嘯行謡恨賦含酸茹歎銷落煙沈詩我歌且謡縱使石傾武擔見庭表序僅壘愁城庾信愁賦攻訐愁城終不破假令土捧黎陽見實菴序難填恨谷補注况復日下貂蟬天邊蘭錡見半繭賦地名祋祤見天章序邪連繡嶺之堤見子厚序縣是偃師直對金墉之樹河南志偃師縣即湯居西亳地陸機洛陽記金墉城在總章宫西北魏故宫人在其中徹侯外戚既平時爾汝之交漢書注凡賜爵關內侯者謂之徹侯以避諱為通侯相如巴蜀檄位為通侯列居東第史記有外戚世家傳禰衡傳衡與孔融作爾汝交魏書武帝謂孫皓曰聞南人好作爾汝歌能否皓曰昔與汝為鄰今與汝為臣上汝一杯酒令汝萬夀春長樂甘泉亦疇昔經過之地長樂見滕王賦漢宫闕疏甘泉林光宫秦二世造漢武以仙人好樓臺今甘泉宫作延夀館通天臺他若五陵大俠三輔諸豪見渭仁序東京趙李之家阮籍咏懷詩西逰咸陽中趙李相經過王維詩城中相識盡繁華日夜經過趙李家注趙飛燕李夫人並以善歌舞幸西漢金張之族見滕王賦南渠北澗盡丏澤于銀潢魏曹固表王孫公子疏派天潢注天河也若天河之分疏喻其尊也東壁西鄰競分光于碧落度人經注東方第一天有碧霞遍滿是名碧落此喻天家也槖筆鳴珂之地即是枌榆槖筆見玉巖序鳴珂見祖德賦漢書髙帝置枌榆社于新豐後同里之人皆謂枌榆炊金饌玉之賔見少楹序咸聮肺腑史記武安傳建元六年田蚡以肺腑為丞相天下士益附武安曰天下幸無事蚡得為肺腑既而哂南朝之江鮑抑將邁北地之溫邢見園次序而乃讖起狐祥見懸圃序妖徴蛾賊見素伯序尋三州之失守唐書太中二年吐蕃以秦原樂三州石門驛藏本峽制勝乾元後隴右劍南西山三州七關軍皆失之舊書地理志忠武軍管許陳蔡三州河陽軍管孟懷衛三州洊五帥之難歸見􅋯菴序田單闔族載鐵籠而宵奔見雪持序庾氷孑身橫荻船而潛渡晉書蘇峻之亂諸庾逃散氷時為吳郡一郡卒獨以小船載氷出錢塘口蘧蒢覆之時峻賞募覔氷甚急卒舍船市渚因飲酒醉還舞棹向船曰何處覔庾吳郡此中便是氷大惶怖然不敢動監司見船小裝狹謂卒狂醉不疑乃自送過浙江隂魏家得免悲歌慷慨之士感激何窮見九日序注烏頭馬角之言沉吟奚極燕丹傳燕太子丹質于秦欲歸秦王不聽謬言曰令烏頭白馬生角乃可丹仰天嘆息烏即頭白馬即生角秦王不得已乃遣之曹植精微論子丹曲質秦烏白馬角生且夫霍博陸既票騎之兄詳徐母序班定逺實蘭臺之弟後漢書班超字仲升為人慵書後投筆立功西域封定逺侯班固字孟堅九嵗能屬文顯宗時除為蘭臺令史乃上兩都賦一則兵欄武庫兵欄見素伯序武庫見懸圃序奠鰲足于人間見佳山序一則芝檢銀函作龍頭于天上春秋運斗樞黃龍五采負圖而出舜前白玉檢黃金繩芝為封泥并見佳山序宋書置龍頭閣學士兩環耀日雙劔凌雲見園次序而今則瞻望兄兮九原人去所思伯也八陳圗空見懸圃序江流不轉煙霾葛相之營劉禹錫嘉話録夔州西市俯臨江沙下有八陳圗聚石分布各髙丈餘峽水大時澒湧滉漾及水落萬物皆失故態亮小石之堆標聚行列依然如故杜詩江流石不轉日瘦無光天厭祈連之塜梁吳均詩隴西飛狐口白日盡無光前漢書霍去病至祈連山捕首虜甚多及薨武帝悼之發蜀國玄甲自長安至茂陵為大塜像祁連山師古曰祁連山即天山胸奴呼天為祁連十道志焉支祁連二山皆美草木胸奴失之歌曰失我焉支山令我婦女無顔色失我祁連山使我六畜不蕃息風車雲馬時聞褒鄂之弓刀傅玄吳楚歌雲為車兮風為馬玉在山兮蘭在野唐書太宗封假志玄為褒公尉遲敬德為鄂公杜甫題畫詩褒公鄂公毛髮動牧笛樵歌見井叔序注不見滕公之寢室見瑞木賦遂使舊時牙將半隨老嫗以吹箎牙將見皇士序王琛傳琛為泰州刺史討諸羌不下有婢朝雲善吹􅂒琛令假為貧嫗吹􅂒而泣諸羌聞之流涕曰何為棄墳井在山谷為寇遂來降秦民曰快馬健兒不如老嫗吹􅂒每令賢弟黃冠私雜羣傖而絮酒記野夫黃冠野服唐書李淳風父播棄官為道士自號黃冠徐稚傳人有死喪稚以絮漬酒暴乾褁炙雞至葬家于焉曰怨怨何如乎以此言悲悲可知矣家語孔子謂哀公曰君以此思哀哀可知矣于是歌則不能泣仍不可念欲著金陀之史見樂府補序姑俟諸地老而天荒見琴怨序無如填蘭畹之詞見桐初序猶藉以娛年而送日列子穆王駕八駿西觀日所入恨賦巡海有以送日爰乃借雷輥電砉之聲淮南子日行月動電奔雷駭考工望其轂欲其輥六書故輥轉之速也莊子養生生砉然響然奏刀騞然寫劔拔弩張之勢見藝圃序或跌宕于舞女雙鬟之隊揮毫而竹肉奮飛跌宕詳初眀序孟嘉傳桓溫問聽妓絲不如竹竹不如肉何為也嘉曰漸近使之然或憑弔夫將軍百戰之場入破而關河劈裂樂書眀皇樂章多以名曲如伊州甘州之類曲終繁聲為入破南唐李煜樂有念家山破蒲牢乍吼九邊之馬俱瘖蒲牟見璿璣賦注古賦振鬛一鳴萬馬凡瘖注瘖失聲也九邉志曰遼東曰薊鎮曰山西鎮曰大同曰宣府曰延綏曰榆林曰固原曰寧夏干鏌一揮萬將之頭畢白見懸圃序幽可匹夫莊騷進學解下逮莊騷太史所録細不遺夫蟲豸見園次序臧文仲書詞詰屈讔語居多見天篆序鍾儀父音莭蒼涼土風不少見無忝序觀其見事生風依聲橫筆鋪蛟螭于腕下見祖德賦鱗甲之而考工記其鱗之而注而語助又頰毛曰而落蝌蚪于行間見憺園賦風雷發作見懸圃序百靈穿鑿擬郜鼎而逾斑抱朴子黃帝生而能言役使百靈春秋桓公二年取郜大鼎于宋萬怪槎丫較商盤而更駁魯靈光殿賦枝牚槎丫而斜㯫旁人不識謂多郭公之缺文春秋郭公傳光儒以為郭亡郭公蓋闕文神瞽何知云是子雲之竒字見昭華序嗟乎秦時毛女見貞女序漢室銅仙見滕王賦聲作龍吟淚如鉛水馬融長笛賦近世雙笛從羌起羌人截竹未及已龍鳴水中不見已截竹吹之聲相似太白詩笛奏龍吟水李賀金銅人詩空將漢月出宫門憶君清淚如鉛水紅綃滿眼已憐殘帕之無多二儀實録禹會塗山之夕大風雷震有甲步卒千餘人其不被甲者紅綃帕抹其頭自此遂為軍容之服韓愈詩以錦纒服以紅帕首注非僅軍容也鈿笛三聲見椘鴻序竊喜舊人之尚在見舜民序注水天間話本義山别録義山為水天間話舊事先生每提燕築而來見智修序花月新聞見舜民序賤子亦挾吳簫而至見雪持序岑牟單絞禰衡傳曹操召衡為鼓吏衡著岑牟單絞之服注岑牟鼓角士之服絞蒼黃色僕尚能捉搦從公見椘鴻序腰鼓筝琶幸勿俳優畜我廣雅腰鼓者廣首纎腹兩頭擊之漢書東方朔枚臯好詼諧武帝以俳優畜之上林賦俳優侏儒韓文公答崔立之書禮部有以博學宏詞選者乃類于俳優者之詞徐竹逸蔭緑軒詞序竹逸徐先生犀角名家見三芝序駒王貴裔見憺園賦弱齡淹博能探岣嶁之碑輿地記禹碑在岣嶁峯又傳在衡山縣雲密峯宋定嘉中蜀士因樵人引至其所以紙踏其碑七十二字刻于夔門觀中後俱亡按岣嶁碑載古雜辭集綺嵗通華即辨琅琊之稻懶真子云李百藥父與友讀徐陵文有刈琅琊之稻之語嘆不得其事百藥進曰春秋鄅子藉稻杜預謂在琅琊客大驚徐孝穆文成百軸龍􅖯魚油竹林詩評徐陵之作如魚油龍􅖯列堞朋龍顔延之詩擅五言鏤金錯采宋書顔延之字延年與謝靈運齊名鮑昭曰謝五言如初日芙蓉公詩如鋪錦繡亦雕繪滿眼詩品湯惠休曰謝詩如芙蓉出水顔詩如錯彩鏤金少食貧而種學北郭騷譽滿人間晏子北郭騷不仕託以養母晏子分倉粟府金遣之騷辭金受粟壯委質以從王東方朔名髙殿上東方朔傳朔字曼倩平原人善詼諧滑稽待詔金馬門一官繫組則武侯流馬之鄉諸葛亮傳武侯伐魏屯岐山用木牛流馬以運糧草萬里牽絲見歸田序亦新息跕鳶之地馬援傳援謂官屬曰吾在浪泊西里間虜未滅時下潦上霧毒氣熏蒸仰視飛鳶跕跕墮水中後征五溪蠻夷因卒于軍封新息侯句町邪連白國五溪開莊蹻雄關填中志臨安府古句町國楚威王命莊蹻略定滇池會秦擊道絶因自王于此辰州志五溪謂雄溪樠溪西溪沅溪辰溪也皆蠻夷雜居牒榆旁綰牂牁九晱奉唐蒙一詔史記西南夷傳自滇以北卭都最大北至􅀈榆韋莊注在益州又史記牂牁江出畨禺城下地理志楚遣莊蹻伐夜郎至且蘭椓船于岸而步戰既滅夜郎以椓船處名牂牁注擊舟杙也今烏蒙府地一作貴陽唐書南詔蒙氏置通海郡分立六詔而南詔最強蠻花樹樹紅綿燒爨女之叉補注按閩嶺志南方多木棉可為布其花多紅色犵鳥村村鸚鵡勸𤏡僮之酒羅犵見商尹序𤏡僮見浙西序餘補注先生則叱馭開邊見商尹序褰裳聽事注程經洱海馳驅于冉駹卭筰之間一統志大理府之西有海名洱海長卿難蜀父老文朝冉從駹定筰存卭注服虔曰皆蜀郡西部應劭曰蜀郡岷江本冉駹也毛頓曰卭今為卭都縣筰今為定筰縣路出昆眀鞅掌于樓櫓戈船之下溪書西南夷越雋昆眀國有填池武帝欲伐之乃于長安縣西作昆眀池以習水戰西京雜記昆眀池中有戈船數百艘建戈矛其上按樓船亦戰艦其巨者也賨幪火毳賨幪詳謝吳啓後漢書外夷傳火毳注火浣布也都成月露之形見園次序渝舞狼歌華陽國志閬中有渝水賨民多居水左右初為漢前鋒鋭氣喜舞髙祖令樂人習之令所謂巴渝舞也漢樂志白狼王唐菆有歌三章曰歸德慕德懷德齊叶風雲之調見園次序固已碧雞主簿玩此清文列仙傳赤斧者巴戎人為碧雞主簿手掌有赤斧庾信啓碧雞主簿無由遂心白馬氐羌訝其麗製戰國西戎志有白馬氐氐羌氏竹王古廟見憺園賦繚牆砌夜月之吟補注西京賦繚垣綿聮花靣諸黎師古曰與時回紇以花門自號剺靣披其靣示誠悃也縑帕繡春燈之句補注然而一上點蒼頓深鄉思一統志點蒼山在永昌府屢聽杜宇見孝威序注并詳孟太母啓彌減宦情謝靈運詩序徐幹少無宦情有箕潁之心事故仕世多素辭晉書阮裕曰吾少無宦情小人有母難忘考叔之言左傳潁考叔為潁谷封人公賜之食食舍肉曰小人有母皆嘗小人之食矣未嘗君之羮請以遺之行路多岐偏下楊朱之泣列子楊子鄰人亡羊既盡率其黨復請楊子之竪追之問其故曰多歧路楊子曰大道以多岐亡羊學者以多方喪生淮南説林楊子見岐路而哭之為其可以南可以北墨子見綀絲而泣之為其可以黃可以黑誓拂衣而終老遂散髮以言旋楊惲報孫會宗書拂衣而喜琴操許由曰散髮優遊所以安已不懼也後漢書袁閎散髮絶世鍾會遺榮賦散髮抽簪永絶一邱于是宅枕銅宫潭臨玉女見梧月序陶淵眀之門外垂栁五株見海棠賦盧照鄰之階前病梨一樹盧照鄰傳盧得惡疾從孫思邈問養生之術因作病黎賦以自悲載文集後以不愈赴潁水死蘇軾詩區區賦病梨蓬蒿幾尺儼然三徑元卿見梧月序雜果千頭何異小園庾信見天章序隱夫答遝園有隙而皆紅相如上林賦隱夫莫棣答遝離支張楫注隱夫未詳答遝似李出蜀中平仲君遷鄰無扉而不緑左思吳都賦木則平仲君遷劉成注平仲之木實如白銀君遷之樹子如瓠形考平仲其木理平可為棊局故棊局曰枰君遷子如馬妳俗名牛妳是柿也今之造扇用此柿油先生既散誕琴書之側復優遊巖岫之旁客到開軒朋來刻燭見園次序花前挈榼半南山賣藥之翁樹下提壺多北海修琴之叟見半繭賦才開芍藥邀側帽以來觀見憺園賦甫釣鱒魴命解衣而對食莊子解衣磅礴雞豚芋栗極嵗時暇豫之歡國策優施曰我教君暇豫之事注暇間也豫樂也燈火桑􅏘盡里社團圞之樂若乃鄧尉梅花錢塘桂子輿志吳郡鄧尉山在玄墓之北俗名福克山梅甚盛杭州志錢塘在府城南有靈隱山八月十五夜嘗有月中桂子落白樂天天竺寺詩仙花桂子落紛紛三春日暖聽南國之鷓鴣八月秋晴看西山之麋鹿見園次序筆牀茶竈依山崦以為家𣑽磬漁筒眷煙波而結友浮家泛宅見季青序醒噩夢于滄浪周禮春官占夢有六夢二曰噩夢注不祥之夢可驚愕也醉月迷花敘前逰于杯酒莫不詞寫金荃詩話溫庭筠本名岐字飛卿為麗句官方山尉有握蘭金荃等集句同錦瑟見天篆序三千粉黛見銅雀賦掩周栁之香柔周美成見園次序栁永見金天石序張叔夏云美成詞渾厚和雅黃叔賜云耆師長于纎艷之詞時稱周栁丈八琵琶補注駕辛蘇之感激花間集宋辛棄疾字幼安有稼軒長短句十二卷蘇軾字子瞻有東坡居士詞二卷時號辛蘇詎若牛家給事見寶汾序行間描楊栁之花詞集牛嶠有詞云陌上鶯啼蝶舞栁花飛栁花飛願得即心憶家還早歸寧徒張氏郎中字裏寫鞦韆之影宋張先傳先字子野官至都官郎中詩格清麗尤長于樂府有隔墻送過鞦韆影雲破月來花弄影浮萍斷處見山影之句時號為張三影僕愧不才託君末契屐量花雨補注時陪鈴索之逰戎幕間話李德裕云翰林院有懸鈴以備中夜警急文嘗出入則引索以代傳呼韓渥詩坐久忽聞鈴索動玉堂西畔響丁東詩畫旗亭每預筝琶之宴見三芝序嗟乎西鄂文人從來失路見園次序餘姚書記大抵無家紹興志舜姚姓其後封此故縣名餘姚後漢酷吏傳蜀太守黃昌餘姚人妻遇賊被獲流入蜀為人妻其子犯事母詣昌自訟因問所由對曰妾夲餘姚州書佐黃昌妻也因相持泣還夫婦徐陵與楊愔書夫以清河公主之貴餘姚書佐之家莫限髙卑皆被驅略君也坐愁行嘯恆傷廉吏之難為史記滑稽傳楚相孫叔敖病且死居數年其子困窮負薪優孟見楚莊王因作歌有曰念為廉吏奉法守職竟死不敢為非廉吏安可為也王乃召孫叔敖子而封之寢邱僕兮望逺登髙嘗恨古人之不見見曜菴序張一軍于酒旗歌扇之上誰得臣狂左傳我張吾三軍而被吾甲兵元微之詩試問酒旗歌板地宋書文帝問顔延之諸子才能對曰峻得臣筆測得臣文奐得臣義曜得臣酒何尚之在側曰誰得卿狂曰其狂不可及問六代于殘陽暮靄之餘詎干卿事見實菴序聊題儷句用譜新聲見皇士序陳檢討四六卷十
