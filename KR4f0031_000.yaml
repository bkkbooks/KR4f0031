body:
  text: 陳檢討四六别集類六國朝提要臣等謹案陳檢討四六二十巻國朝陳維崧撰程師恭註國朝以四六名者初有維崧及吳綺次則章藻功思綺堂集亦頗見稱於世然綺才地稍弱於維崧藻功欲以新穎勝二家又遁為别調譬諸明代之詩維崧𨗳源於庾信氣脈雄厚如李夢陽之學杜綺追步於李商隱風格雅秀如何景明之近中唐藻功刻意雕鐫純為宋格則三袁鍾譚之流亞平心而論要當以維崧為冠徒以傳誦者太廣摹擬者太衆論者遂以膚廓為疑如明代之詬北地實則才力富健風骨渾成在諸家之中獨不失六朝四傑之舊格要不能以撏撦玉溪歸咎於三十六體也師恭此註成於康熙癸酉王士禎古夫于亭襍録曰昔人云一人知已可以不恨故友陽羡陳其年諸生時老於塲屋小試亦多不利已未博學鴻詞之舉以詩賦入翰林不數年病卒京師及歿而其鄉人蔣京少景祁刻其遺集無隻字遺失皖人程叔才師恭又註釋其四六文字以行於世此世人不能得之子孫者而一以桑梓後進一以平生未面之人而收拾䕶惜其文章如此云云其推奬師恭頗至然師恭所注往往失其本㫖如銅雀瓦賦彈棊愛子句自用曹丕巾角彈棊事而但引藝經注彈棊引陸機弔魏武帝文注愛子傅粉佳兒句自用曹植傅粉對邯鄲淳事而引魏志武帝欲以何晏為子及文帝疑晏傅粉事皆近是而非又如述祖徳賦況彼鯉庭句自用楊汝士桃李新隂在鯉庭事而但引論語伯魚事憺園賦雙丁詎擬句自用梁武帝賜到溉詩漢世重雙丁語而但引文士傳丁儀兄弟事皆知其一不知其二至於毛貞女墮樓詩序空空實下天之狀句自用李斯奏秦始皇鑿之空空如下天狀語而補註引劍俠傳妙手空空兒尤為乖謬如是之類不一而足且任淵史容注黄庭堅集於作詩本事及年月俱一一詳核故為善本師恭去維崧最近文中事實縁起可以考知如璿璣玉衡賦序之烏空楚幕鵑去巴江句因聖祖召試博學鴻詞在已未嵗正平定湖廣四川之後故維崧云云師恭不注其故則突入此語是何文義哉特以四六文非注難明而師恭捃摭故實尚有足資考證者故併存之以備㕘校焉乾隆四十六年七月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
