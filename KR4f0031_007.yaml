body:
  text: 陳檢討四六卷七翰林院檢討陳維嵩撰序鄧孝威詩集序臺君土室漢世目之逸民漢書臺佟字孝威鄴人隱於武安山鑿穴為居採藥自業州辟不就劉氏綵毫梁室官為庶子見三芝序遐稽曩史兩見孝威詎意同時又逢我友序閥閲則鄧仲華簪組之族門戶清通鄧禹傳禹字仲華年二十四封鄧侯後封高密侯子十三人後纍世貴寵為侯為公者三十一人將軍以下及州牧郡守九十八人其餘侍中等官不可勝數晉書吏部闕人帝問鍾會會曰王戎簡要裴楷清通譜邑里則吳夫差花月之都山川綺麗詳舜民序籍雖茂苑左思吳都賦佩長洲之茂苑庾信哀江南賦連茂苑於海陵桉虞世南詩高臺臨茂苑非指吳地亦通稱之産實吳陵見懸圃序諸侯傳寓公之名禮諸侯不臣寓公注猶寄公今人以寄居之官為寓公才子擅客兒之字見素伯序馬卿慕藺便號相如史記司馬相如蜀郡成都人也字長卿慕藺相如之為人更名相如傅奕懷賢爰更幼起補注爾其才情遒艷文藻英新釋寶志識徐陵於蚤歲呼以麒麟見憺園賦陸修靜知張融於綺年遺之鷺羽宋書宋武帝時張融字思光善草書玩涉百家道士陸修靜以白鷺羽扇遺之曰此異物當奉異人東京公子許以經過見天章序西鄂王孫嘉其延攬見園次序於是臨風授簡入夜揮毫見璿璣賦等白璧之一雙史記虞卿見趙王賜白璧一雙似朱霞之十丈詳掌亭誄鏗鏘金石能驚趙鞅之魂史記趙簡子病七日而寤曰我之帝所甚樂與百神遊於鈞天廣樂九奏萬舞徐陵與李那書鏗鏘並奏難驚趙鞅之魂煜爍煙雲可致賈妻之笑見淡菴序書之彤管詩縚以牙籖見三芝序僕也激賞高風徘徊麗緒陸平原之詩賦道路居多見尺牘序陸機傳成都王穎表機為平原內史松江志平原村二陸讀書處庾開府之生平亂離不少見滕王賦若夫魏主虛帳見銅雀賦韓王故臺詳翼王序注徐陵與李那書魏主虛帳韓王故臺自古文人皆為詞賦昆陽虎鬭之城涿鹿龍爭之地東觀漢紀光武狥昆陽遂殺王尋城中鼓譟而出莽兵大潰會大雷風屋瓦皆飛雨下如注􅓳川盛溢士卒溺死者萬數輿志昆陽屬河南開封府漢書光武謂寇恂賈復曰兩虎安得私鬬乎保定州志涿鹿山黃帝破蚩尤於此漢書文帝曰高袪數言趙將李齊戰於巨鹿注順德府地左傳龍鬪於時門之外洧淵𤣥覽賦鬪二虎於江干爭兩龍於修坂才人失職幼即辭家烈士依人長而去國見園次序三秋作客徒悲峽裏之黃牛水經注峽中有灘如人負刀牽牛名曰黃牛加江湍紆迥雖途經信宿猶見之行者為三峽注曰朝發黃牛暮宿黃牛三朝三暮黃牛如故五夜思鄉難忘關前之白雁夢溪筆談北方有白雁似雁而小色白深秋則來白雁至則霜降河北人謂之霜信輿志太原府有雁門關德安府有白雁關况復燕昭臺畔猶有遺官詳九日序嬴政山頭非無疑塜見滕王賦三輔故事始皇葬驪山起墳高五十丈下周三泉青桐緑竹盡諸王帶礪之鄉周本紀成王削桐葉為圭豫叔虞曰以唐封汝史記高祖封爵之誓曰使黃河如帶泰山如礪國以永寧玉雁金鳬亦列祖衣冠之地見半繭賦而乃墮名藩之愛子見滕王賦損長陵之一壞前漢書有盜高廟玉環者文帝欲族之張釋之曰假令愚民取長陵一壞土陛下何以加其法乎注高祖陵此也十七世之金甌見歸田序彼也千百王之玉體莫不竄之狐兔薦以荆榛詳井叔序潘嶽詩荆棘成榛見草中之馬耳能不悲號補注齊民要術黍苗生如馬耳則鏇鋤諺曰欲得穀馬耳鏇按山有名馬耳此非是攀天上之龍胡可無痛哭史記皇帝採首山銅鑄鼎於荆山下鼎既成龍垂胡髯下迎皇帝帝騎龍乃上去九域志皇帝騎龍上天小臣不得上乃悉攀龍髯而墮於是觸目蒼凉緣情悽厲或臨文而永慕乍搦管以微謠絶非愈懌之音惟以悲哀為主見素伯序縱使縣名聞喜豈便為歡平陽志聞喜縣舊名桐鄉即伊尹放太甲之地漢武帝過此聞破南粵因名聞喜即令草字忘憂焉能不嘆見看奕賦嗟乎蘭因芳殞膏以明煎漢書龔勝死有父老來弔曰熏以香自燒膏以明自銷遂趨而出不知其誰自古文人皆嬰兹患羈雌啁哳豈有意於謳吟瑞應圖雄曰鳯䳄曰凰羈鳯即羈雌也謝靈運詩羈雌戀舊侣李商隱詩羈雌長共故雄分楚詞鳴雞啁哳而悲鳴注奮翼呼鳴也怨鳥蕭騷聊自言其辛苦函史物性志怨鳥曰子規一名秭歸春分乃鳴夜啼達旦其吻有血漬草木不上啼苦則倒懸於樹自呼謝豹故名怨鳥零陵地曰周韓其音似不如歸去并詳孟太母啓屬以風高銅柱因使者以乘槎月冷珠江共客星而泛棹銅柱見商尹序成都志江中有光夜見人以為珠名曰珠江荆楚歲時記漢武令張騫使大夏尋河源乘槎經月至一處見城郭如州府室內有一女織又見一丈夫牽牛飲河騫問曰此何處可問嚴君平織女取榰機石與騫而還後至蜀君平曰某年某月客星犯牛女博物志舊說天河與海通居海渚者年年見八月有浮槎去來人有奇志立飛閣於槎上多齎糧乘槎而去十餘月至一處遙望宫中有織婦見一丈夫牽牛渚次飲之還問君平曰某日客星犯牽牛宿斗正此人到天河時也聽蠻方之秦吉食炎徼之檳榔格物總論秦吉了形似鸚鵡而色白心慧言巧人言無不通異物志檳榔樹無華而為實大如桃李過嶺一編乃孝威之近集也葉井叔悼亡詩序寒風寥泬宋玉九辨泬寥兮天高而氣清楊雄但解客嘲見佳山序晏歲崢嶸鮑照賦歲崢嶸而催暮孫楚新除婦服孫子荆除婦服詩時邁不停日月電流神爽登遐忽已一周王武子見之曰未知文生於情情生於文祥琴乍鼓見憺園賦暗驚四節之如馳見半繭賦莊缶載賡莊子至樂篇莊子妻死惠子弔子之莊子方箕踞鼓盆而歌謂惠曰人方偃然寢於巨室而我嗷嗷然隨而哭之自以為不通乎正命故止也潘嶽悼亡詩庶幾有時哀莊缶猶可擊師古曰缶盎也即今之盆倍覺寸心之若結詩方圓寬譬下注姑酌金罍詩正擬逍遙見海棠賦聊彈玉局見三芝序何意楚狂高士傳陸通字接輿即楚狂也却楚昭王聘變姓名入蜀隱峩嵋山中猥遺越調見無忝序春蠶死後重牽繚繞之絲蠟燭燒餘再灑潺湲之淚李商隱詩春蠶到死絲方盡蠟燭成灰淚始乾陸游詩蠟泪成推又一時屈原九歌橫流涕兮潺湲注流貌疇云痛定袛益悲來古諺痛定思痛王勃序興盡悲來蓋自俗異狉榛栁宗元封建論彼其初草木榛榛鹿豕狉狉人非太上見琴怨序空林有鳥尚傳並命之禽詳逸齊序絶壑多枝猶說同生之木見銅雀賦何况弱齡井臼洊歷流離蚤日虀鹽曽經迍賤韓愈送窮文太學四年朝虀暮鹽說文迍同屯黔婁之梱內荼苦居多高士傳周威王時齊隱士黔婁子守道不屈卒時覆以布被覆頭則足露覆足則頭露曽西曰斜其被則斂矣其妻曰斜而有餘不若正而不足冀缺之田間艱辛不免左傳初曰季使過冀見冀缺耨其妻饁之敬相待如賓而乃迢迢彩石見憺園賦青天無不恨之時寂寂瓊鈎枚乘月賦隱圓巖而似鈎李賀詩天上分金鏡人間卑玉鈎白月鮮長圓之夜楄柎何物左傳楄柎所以藉幹注棺中笭牀也空悲女手之卷然見憺園賦筐筥奚情猶記桑條之沃若詩緬虛無之遺挂愁倣佛於餘薰流嶽悼亡詩幃屏無髣佛翰墨有餘跡流芳未及歇遺挂猶在壁此則何須海上伯牙亦遂以移情說苑伯牙嘗學琴於成連先生三年不成成連云吾師方子春在東海中能移人情乃俱往留伯牙曰子居習之吾去將迎之刺船而去旬日不返伯牙延望無人但聞海水洶湧出林窅冥嘆曰先生移我情矣不待雍門孟嘗亦於焉承睫也桓談新論雍門周以琴見孟嘗君先曰臣竊悲千秋萬歲後墳墓生荆棘狐兔穴其中樵兒牧竪躑躅而歌其上孟嘗君承睫涕出淚下衣襟劉向說苑雍門子周引琴鼓之徐動宫徵微揮羽角孟嘗君雪涕䦨干曰令文立若破國亡邑之人也嗟乎樊湖烟水故國依然詳考功序少室雲山舊遊如昨見半繭賦望楚天之似黛轉憶膏鬟盻湘水以如羅還憐巾帶假非鰥侣誰知此曲之悲况屬恨人詎識有生之樂晉荀粲撫新編而惆悵惄矣傷神見渭仁序魏吳起聆是集以軒渠褎如充耳吳起傳起魏人仕魏後適楚殺妻求將薊子訓傳兒識父母軒渠笑悅注笑聲後漢方技傳軒渠笑自若詩集注耳聾人多笑附注漢史秀自縯死泣馮異寬譬之林玉巖詩集序若乃星入女牛疆開甌粵職方氏注閩為天文牛女分野漢書尉陀上書云蠻夷中西有西甌東有閩粵梅還作漈仙人種菜之園興化志莆田縣城西有梅花漈相傳雞峰人陳清牧牛於此有白衣老人叱之曰此仙人菜園也勿飲牛汚吾水鯑欲成山龍女升天之島一統志興化府鯑山在莆田大海中與琉璃國相望上有黑白石可為碁子有田可耕五代閩王時都巡簡林願第六女殁而為神賜號天妃廟記云生時預知休咎長能乘席渡海乘雲遊島衆呼為神母亦呼龍女雍熙四年升化按越絶書闔廬旦食䱉山乃吳地非是碧蒲滿縣洞壑崢泓紅荔垂街人文光麗則有門風簡劭才地瑰奇驍騰彩筆見看奕賦人居延夀村中莆田的爍丹輪見滕王賦家傍望壺樓畔閩志興化府治內有望壺樓韶齡釋褐宋朝㑹要興國二年始賜吕䝉正等釋褐後遂為例夙簉金閨見園次序綺歲登朝詳聖期序旋簪銀筆銀筆見園次序注簪筆見黃門序注蔚然名位洵稱九牧高甍莆田志林披子九人俱刺史號九牧林氏藉甚聲華詎數四門博士補注無何而星搖犀浦浪激蛟宫王審知既豕突於南荒五國故事僞閩王審知以唐末起兵為黃巢部伍巢敗乃領其衆入泉州復入福州子延翰襲位踰年而終次子延鈞僣竊僞號如故陳寶應復鯨呿於炎海梁書陳寶應據關中與錦異潛有異謀遂起兵反漢書王莽時北蕃冦邊募天下丁男名曰猪突狶勇又胸奴猖獗謂之豕突鴟張按鯨呿詳鄴園啓無諸城上萬帳蠻雲閩志漢初封無諸為閩越王因都閩地歐冶池邊一軍毒霧閩志昔歐冶子鑄劍之地至今有歐冶池在福州府治周數里每風雨大作烟波晦冥家分兩地信斷三年王仲宣之邑井一半凋殘庾子山之關河大都蕭瑟見滕王賦吟成莊舄愁斷鍾儀見無忝序姑染翰以告哀或援毫而寫恨既而降王就縛蜃市長消見半繭賦叛帥遭擒􅣜帆大去山海經海中有介魚眼在背上口在腹下牝負牡行狀如便靣俗呼􅣜帆文人返國重尋甘蔗之州福州府志府城西有甘蔗州才子還鄉再訪桄榔之樹漢書牂牁句町縣有桄榔木可以為麵百姓資之按桄榔閩中俱産而乃君謨舊宅一片斜陽宋史蔡襄字君謨文章精粹工小楷草書官至端明殿學士卒諡忠惠嘗知福州又知泉州有惠政閩人勒碑頌之漁仲空園無邊蔓草宋鄭樵傳樵字漁仲莆田人博學強記過目不忘紹興中召對授樞密院編修著書凡五十八部有通志略行世嘗居夾漈山人稱夾漈先生披葛謁九仙之廟斷鏃猶紅列仙傳向氏兄弟九人遊湖側丹成各乘赤鯉去莆田人為之立廟其湖名九里湖爾雅金箭羽謂之鏃唐吳融詩金鏃有苔人拾得攀蘿緣雙闕之峰沉戈半紫補注縱復相逢蛋户一問蚶田輟耕録廣東採珠之人懸絙于腰沉入海中得珠撼其絙舶上人潔出之多葬蛟龍腹者有司名曰烏蛋户異物志蚶之大者徑四寸肉味佳今浙東以近海田種之謂之蚶田又有蚶山而巷陌徒存山河頓異上幔亭而躑躅老籛難認曾𤣥武夷山古記秦始皇二年八月十五武夷君魏子騫會鄉人于幔亭作樂宴飲列仙傳籛鏗封于彭即彭祖古陸終氏第三子顓頊之𤣥孫也隱雲母山歷虞夏至商末夀已七百餘歲而不衰按籛之後去竹為錢撫榕䕃以躊躇阿囝空呼郎罷閩志榕枝著地即生根其䕃最廣栁詩榕葉滿庭鶯亂啼青箱雜記閩人呼子曰囝呼父曰郎罷顧况哀囝篇囝生閩中乃絶其陽為臧為獲金玉滿堂又有囝别郎罷詩以寓諷越禽向暖不知棲何樹之枝見無忝序注海燕歸巢未審上誰家之壘宋書文帝元嘉中魏人所過郡縣赤地無餘春燕歸來巢于林木劉禹錫詩舊時王謝堂前燕飛入尋常百姓家獨流連而自惜長顑頷以疇依見半繭賦假兹側理以眷宗邦見尺牘序藉彼隃糜而瞻故國漢官儀尚書郎作文書月賜隃糜墨一枚注隃糜漢地名屬鳯翔府一山一壑盡平生射獵之場晉書明帝問謝鯤以君方庾亮何如曰端委廟堂鯤不如亮一丘一壑自謂過之某水某丘咸羈貫遊從之地韓愈送揚少尹序楊侯之歸曰某水某丘吾童子時所釣遊也羈貫見雪持序吟謠不少篇籍遂多况復京華仕宦厥有羊何宋書謝靈運荀雍羊璿何長瑜四友共為山澤之遊東坡詩悲吟相對惟羊何臺閣翺翔頗多潘陸見園次序一門標令王家則渾濬聫鑣魏志王渾字𤣥冲濬字士治武帝使同領兵伐吳渾以功封大將軍録尚書事濬後加封鎮大將軍羣從風華阮氏亦籍咸並轡見祖德賦何常不吟盡林巒賞窮烟月疊縹囊於珊架縹囊見園次序珊架見天篆序縚翠帙以珠繩也乎劉向别録孫子書以殺青簡編以縹絲繩鮑照賦直如朱絲繩歐詩寫之朱絲繩且夫玉巖山者固閩疆之巨嶂而烏石之靈源也閩志烏石山有興化府産荔枝為莆中第一金膏玊乳瀑皆觸石以斜飛石屋珠扉樹盡摩空而怒拔洵塵寰之初地信欲界之仙都楞嚴經於大菩提善得通達覺通如來盡佛境界名歡喜地即初地也珠林欲界天有蕊珠宫十洲記滄浪海島中有石室九老仙都治處仙官數萬人爰將二酉之山勒作一家之集圖經穆天子藏異書于大酉山小酉山方輿記秦人隱學于小酉山石穴中藏書千卷梁湘東王賦訪酉陽之逸興孝經鈞命决盡二酉之祕奧按酉山在辰州府西北擕之嶺上赤烏回繞以羣來補注藏向船中錦鯉盤旋而不去見尺牘序黃編修庭表宫詞序武擔山下即是望妃之樓蜀記武都山精化為女子蜀王納為妃卒王遣武丁于武都山擔土為塜故名蜀王思妃作樓望之相傳有望妃樓祋祤城邊見天章序便是宜君之縣延安志宜君縣古宜州地有祋祤古蹟與西安相對祖中湔上灌壘居多補注梁元帝𤣥覽賦途經灌壘水分當利鄴下坊頭彰德府志戰國為魏秦為上黨邯鄲二郡漢曰魏都曹操封為鄴都通典衛州衛縣界謂之淇水口漢建安九年曹公于水口下大坊水以成堰人號為枋頭注今濬縣西南叢祠不少見憺園賦雲昏張掖沮渠䝉遜之都寰宇記漢月支國地武帝時置酒泉武威張掖三郡後魏曰西凉按張字漸滅掖河在陜西司行都司城西其山有石如張掖字後掖張字分明北凉載記沮渠䝉遜臨松盧水其先世漢時為胸奴左沮渠遂以官為氏䝉遜博羣史曉天文稱兵邉塞義熙八年僣位宋元嘉十年死子茂䖍為魏所擒草冷蘭州秃髮烏孤之地九邊志設蘭州衛于金城在其肅地秃髮見天章序羈臺突兀繡瓦猶存補注聖井踈蕪輿志邯鄲縣有聖井二月二日祀之遇旱祈禱輒驗又保定亦有聖井銀牀斯在見靈岩碑然而多成往蹟半屬前塵是皆然矣無容俟來者以申哀何代無之詎必向前賢而獻弔見滕王賦至夫千門萬戶見藝圃序專稱漢主離宫見滕王賦詳子厚序暮雨朝雲只曰荆王别館見良輔序胭脂縱麗無非北地之花見琴怨序孔雀雖妍不過南方之鳥見皇士序而乃濫相撏扯詳徵文啓恣用編排越艷為吳娥而製恨總涉虛無嬴姬假趙娣以言情羌無事實徒充漫録僅助叢談王孝逸啓談叢理窟容齊題跋後山陳無已著談叢高簡有力雖云作賦之才未見著書之益則有運逢典午見素伯序身本吳人官在黃初見銅雀賦生於漢季曾作彼都人士詩大有流傳親為勝國衣冠見滕王賦能無記憶加之珠囊紐散尚賸遺民玉璽函沉還餘故老見鴻客序蜀人楊得意夙直漢廷見得仲序醫者夏無且精知秦事史記荆軻以匕首逐秦王是時侍醫夏無且以所奉藥囊提荆軻秦王論功賜黃金二百鎰曰無且愛我西風江上有人善濕青衫見良輔序白樂天琵琶引江州司馬青衫濕南國花前此客解歌紅豆見素伯序舊時阿監暮年恰值湖湘昔日宫娥寒夜偏談天寶見良輔序閙蛾撲蝶輦下新聞玉燭寶典洛陽人家上元造火蛾兒食玉梁糕金門事節上元戲為撲燈蛾亦云閙蛾兒康伯可上元詞閙娥兒滿路成團打瑰簇著冠兒鬪轉開元遺事三月三日宫中諸妃悉撲蝶以為戲消九咬春官家瑣事陶宗儀輟耕録升平之日長安冬至後內家戚里競傳九九消寒圖又按燕京立春日宫中食生蘿蔔為咬春緑窗女史吳薛素素有花瑣事録何况東京坊陌未乏成書見素伯序注南部笙簫相沿故典見良輔序三聲玉樹見滕王賦偶譜自拼擋線篋之餘補注說文拼擋收拾也一作屏當詳逸齊序注一卷金縷半搜於狼籍牙郎之手侍兒小名録唐杜秋娘為李鉤妾有金縷詞歌曰勸君莫惜金縷衣爾雅翼狼貪聚物不整故稱狼籍釋文狼籍草而卧去則穢亂為狼籍也牙郎補注溝邊暗立詩話唐僖宗時學士于祐於御溝拾紅葉有詩云流水何太急深宫盡日間記來煙月千門見藝圃序牆外潛行偷得琵琶一段元微之連昌宫辭李摹擪笛傍宫牆偷得新翻數般曲天如有恨月豈常圓詩話李賀詩天若有情天亦老有屬對者曰月如無恨月常圓海若多愁石應蚤爛見琴怨序注拾遺記泰山爛石燒之有香烟薊子訓撫銅仙而歎息亶其然乎漢書建安中薊子訓在長安人見與一老翁摩挲銅人曰適見鑄此近百歲矣時號為薊先生魏東阿睹玊枕以悲哀良有以也魏記東阿王植初求甄逸女不遂廢寢與食黃初中入朝帝示植甄后玉鏤金帶枕植見之泣下時已為郭后讒死帝意亦尋悟仍以枕賚植植還洛水上作洛神賦猗歟江夏見琴怨序最擅才情孌彼宫詞尤推綺麗以我同官之雅矧爾齊年遂於校史之餘屬之撰序從來雅頌義仍取乎春秋自昔編摩事未妨於吟弄范蔚宗后妃傳竟綴此數章宋書范曄字蔚宗刪後漢書自為一家之作按書內有后妃傳班孟堅外戚傳成附兹一卷班固傳固字孟堅明帝時典校祕書纘成父彪所著西漢書中載外戚列傳以彼意匠清新陸機文意司契而為匠杜詩意匠慘淡經營中詞調雅暢屈原忠愛聊寄興於虙妃玉女之間楚詞天問羿射乎河伯而妻彼雒嬪注洛水神慮妃也逺遊騰告鸞鳥迎宓妃漢書音義宓羲氏女溺洛水為神甘泉賦王女無所眺其清矑兮宓妃曽不得施其蛾眉陶令清高姑記言夫翠簟鴛幬之事陶潛閒情賦序張衡作定情賦蔡雍作靜情賦始則蕩以思慮而終則歸聞止閒情賦願在管而為席兮安弱體於三秋悲文茵之我御兮方經年而見求豈比中唐王建競新聲於大歷年閒見良輔序大歷見園次序寧同花蘂夫人結妍唱於摩訶池上見良輔序方輿覽勝隋蜀王秀有池胡僧見之曰摩訶宫毗羅蓋梵呼摩訶為大宫毗盧為龍謂池廣大有龍後因為龍躍池嗟乎人孰無情古皆有此野狐落千春金碗齊化鴛鴦見琴怨序禽經雄鳴曰鴛䳄鳴曰鴦養雛于土窟破塜之聞能使狐衛其子魏志文帝問周宣曰吾夢殿屋內瓦墜地化為鴛鴦何也宣對曰後宫當有暴死者內人斜萬載羅裙都成蝴蝶揚州志宫人斜乃隋葬宫人之地一稱內人斜酉陽雜俎顧非熊少時嘗見鬱栖中壞緑裙蝠旋化為蝶冥通記木蠧生蟲羽化為蝶家子厚關中記遊詩序潼關一扇擎出蓮花西安志古桃林寨東漢名潼關後周更名潼谷關按潼谷三關大散仙人箭筈唐詩日射潼關六羽開西嶽記華山上有蓮花明星玉女三峯尤勝䋫道千盤矗成箭栝詳祭徐文林氏通典七盤十二䋫藍關之險路也咸陽原冷百王之賸壘連雲見天篆序輿志咸陽原漢長陵平陵在焉盩厔城空千古之殘碑蝕土輿志盩厔縣屬西安府漢扶風地廣州書跋唐都關中盩厔在畿內為望至重而尉大為要任選人方得補其取名水曲曰盩山曲曰厔星分井鬼陋吳越之輕華地踞雍凉笑燕齊之迂怪西安志秦曰關中唐曰關內禹貢雍州之域天文井鬼分野自周秦漢西魏後周隋唐俱都此史記孝武本傳海上燕齊怪迂之方士多相效更言神事矣千家板屋詩人多以擊缶相娛李斯諌逐客書夫擊甕扣缶彈箏搏髀而歌呼嗚嗚真秦之聲也一曲車轔詩俗盡以彈箏為業見上自戰國張儀而後競誇天府之雄史記張儀者魏人也仕于秦為相戰國䇿蘇秦說秦惠王曰此所謂天府天下之雄國也至嬴家成蟜而還都說關中之勝補注吳季札觀風而夏之審厥聲乎左傳吳季札來聘請觀于周樂為之歌秦曰此之謂夏聲夫能夏則大大之至也賈長沙弔古而過焉論其世耳賈誼傳誼為大中大夫後出為長沙王太傅嘗作過秦論然而地雖莽濶成敗偏多氣實高蒼興亡不少軹道乃降王之祖潘嶽西征賦健子嬰之果决敢討賊以紓禍勢土崩而莫振作降王于路左輿志軹道亭在雍州萬年縣去灞水百步秦王子嬰降處驪山為竊國之魁詳下漢英布傳布反薛公曰布以驪山之徒自致萬乘莊子竊鈎者誅竊國者侯唐書敬帝幸溫湯張權輿曰昔周幽王幸驪山為戎所殺始皇幸驪山而國亡𤣥宗營驪山而祿山叛先帝幸驪山而享年不長邯鄲南走既從來惻愴之鄉史記文帝行至灞陵是時慎夫人從上示之曰此走邯鄲道也張晏曰慎夫人邯鄲人地屬古趙都今廣平府灞滻東流亦自古嶔崎之地潘嶽西征賦南有𤣥灞素滻注二水在西安府城東嶔崎見渭仁序閒愁疊疊紛於太華之旒名山記太華山即西嶽太華神君之旒數多于十二歷劫綿綿見琴怨序多似櫟陽之韭西安志櫟陽城古蹟在臨潼縣漢高祖時名萬年城古諺櫟陽家家種韭注言其多也千年繡嶺墮弭遺鈿長安志臨潼縣驪山有繡嶺宫楊妃外傳兄銛錡國忠諸娣治錦繡琢金玉者千人帝每幸凊華宫五家隊合遺鈿墮舄琴瑟珠翠狼籍于道一派溫泉殘脂棄粉方輿覽勝秦始皇遇神女神女吐之發瘡始皇乃出溫泉吐之即愈漢武于驪山建溫泉宫阿房宫賦渭流漲膩棄脂粉也雨淋蜀道偏愁阿犖之來樂府雜録明皇自西蜀返樂人張野狐製雨霖鈴曲按安祿山番名阿犖山月照鎬池獨惜祖龍之去秦始皇紀秦使者從關東夜過華隂道有人持璧遮使者曰為吾遺鎬池君因謂曰今年祖龍死忽不見服䖍注鎬池水神秦水德王其君將亡故先告之蘇林注祖始也龍君象謂始皇也遂使長陵寶碗恆隨鸚鵡以宵啼補注按長陵見渭仁序注南史沈炯過通天表云甲帳朱簾一朝零落茂陵金碗遂出人間杜詩空餘金碗出無復繐帷輕夢弼注金碗即用王盆事非用盧家金碗也后山詩初聞橋山送弓劍寧知玉碗人閒見徒令小市金箱每共獾狐而晝舞西京雜記武帝崩遺詔以雜道書四十卷置棺中至延康二年河東功曹李及入上黨抱犢山採藥于岩室中得此書盛以金箱後題日月出武帝時河東太守張純上之宣帝愴然以書付茂陵安合如故南史江夏王鋒發桓溫女塜得金箱爾雅獾野豕又曰狼之牡者餘補注我之懷矣慎毋為汧渭之行人史記非子養馬汧渭之間孝王分土為附庸按汧水見黃門序渭水見懸圃序卿欲愁乎何事作邠岐之遊子輿志鳯翔府古邠岐地然而吾家南阮饒有才情世說阮咸與藉居道南諸阮居道北北阮冨南阮貧七夕日北阮曝衣錦綺熇目咸以竹杆挂犢鼻裩於庭曰未能免俗聊復爾耳昨歲西行偏多慷慨三輔則宫中行樂之窟羅綺衯裶見渭仁序二陵則霸朝酣鬪之場幡幢撞擊見天章序姚萇殿上一種斜陽後秦載記姚弋仲南安赤亭羌人也第五子名襄襄第二十四子名萇字景茂從符堅征伐後弒堅遂僣帝號襄之冦洛陽也夢萇服衮衣升御坐後僣位八年傳興興傳泓義熙十三年劉裕滅之赫連城前幾畨蔓草見天章序銅琵劈裂消磨異代之悲詳蓴菴序注按推手前曰琵引手却曰琶鐵撥沉雄淘洗前朝之恨見琅霞序唐書賀申善琵琶以石為槽以鵾雞筯作絃用鐡撥彈之字如柈大廣韻柈同盤按昔人作南史有稱其字如柈大者揮毫而漫興猶顚張旭傳旭善作書每大醉呼呌犴走乃下筆或以頭濡墨而書及醒自以為神因呼為顛按米顛詳紫來序注墨似鴉粗擲筆而老狂欲旋詩話唐盧同舉子名添丁其幼喜於塗抹詩書往往令黑同戲為詩曰忽來案上翻墨汁塗抹詩書似老鴉杜詩令我手腳輕欲旋注旋舞也嗟乎美人鐘鼓阿房則昔事都非史記始皇每破諸侯倣其宫室作之咸陽北坂上殿屋復道周閣相通所得美人鐘鼓以充入之三輔故事秦阿房宫在上林苑中東西三里南北五百步劔客弓刀嶢關則其人安在西安志藍田關秦名嶢關黃沙浩浩空圍漢主離宫見滕王賦李華弔戰場文浩浩乎平沙無垠王維詩漢主離宫接露臺碧海茫茫見琴怨序長挂秦時明月李白詩秦時明月漢時關是用倚䭾鞍而製恨雜記駱駝背上肉形如鞍故名䭾鞍和鈴柝以言哀詳葉母序隴禽解唱定翻成突厥之鹽見藝圃序物性志鸚鵡出隴西效人言能度曲頌經通考疏勒部東有一臺鹽昔昔鹽突厥鹽之類鹽者途歌引曲之類也夢溪筆談唐曲有突厥鹽阿鵲鹽施肩吾語云顛狂楚客歌成雪媚軟吳娘笑是鹽秦女如花詳貞女序須採入西京之記見良輔序胡二齊擬古樂府序文章政事人少兼科循吏儒林史無同傳裁花仙縣見楚鴻序非關筆底之花見園次序製錦名邦左傳子皮欲使尹何為邑子産曰子有美錦不使人學製焉大官大邑身之所庇而使學者製焉其為美錦不亦多乎詎繫懷中之錦詳梧月序蓋以手批粉墨既虞椽吏之紛煩腰綰銀黃復患簿書之稠叠漢書上以書敕責楊僕曰懷銀黃垂三組夸鄉里廣絶交論早綰銀黃夙昭民譽注印綬也諾若鳯尾寧容旁涉乎吟謠齊書蕭鋒方五歲高帝使學鳯尾諾一學即工帝大悅以玉麒麟賜之注自晉迄梁陳諸侯箋奏皆批曰諾而草書若鳯尾形綬吐桃花見半繭賦奚暇他營夫鉛槧見尺牘序由來不異自昔而然乃有起而為吏邑鮮遊民史記滑稽傳優孟歌曰起而為吏身貪鄙者餘財出以圖君檀弓案無留牘展也循良之宰綽乎慈惠之師而復原隰行春之暇不廢咿唔都亭聽訟之餘彌勤繕寫整齊嵬瑣倣佛華陽士女之編詳昭華序攟拾散亡依稀汝潁名賢之部補注史記荀卿韓非之徒捃托春秋之文釀陶作液䔩謝成葅抱朴子注天仙流霞酒名金漿玉液詩其䔩維何郭璞注䔩菜茹總名葅酢菜以米粒和醯漬菜也禮祭義水草之葅注與葅同彼坐兔園而挾冊自愧迂疏見懸圃序即飛鳬舄以出疆徒慚武健風俗通漢明帝時王喬以尚書出為葉令漢法畿內長吏節朔還朝喬每月朔來朝不見車騎帝令太史伺將至見其有雙鳬從南來舉網張之得二舄乃所賜尚書履也史記武健嚴酷豈若龔黃合轍前漢循吏傳龔遂字少卿為渤海太守黃霸字次公為潁川太守治為天下第一庾鮑齊驅見瀛臺序既擅文藻之翩翩復極風規之落落者乎且所云古樂府者别歌行趨艷之名岐晉魏齊梁之體古樂府有吳趨曲崔豹古今注吳人以歌其地也陸機吳趨行四座並清聽聽我歌吳趨樂府解題有艷歌行艷歌也宋南平王鑠擬古為三婦艷後多和之庾信哀江南賦吳歈越吟荆艷楚舞企喻讀曲是不同聲讀曲見鴻客序梁樂府企喻曲男兒欲作健結伴不須多注企喻本北曲其曲有四子夜歡聞羌無定製唐書樂志子夜歌者晉曲也晉有女子名子夜造此聲遇哀苦後人更為四時行樂之詞古今樂録吳聲十曲一曰子夜二曰上柱三曰鳯將雛四曰上聲五曰歡聞變七曰前溪八曰阿子九曰丁督護十曰團扇郎注一作王金珠所製梁樂府武帝歡聞歌云艷艷金樓女心如玉池蓮夫使聱牙拗顙調必妃狶下注襲謬沿訛字多帝虎見佳山序注則作文仲羊裘之讔語見天篆序聽者咍臺吳都賦東吳王孫辴然而咍注咍臺笑聲學莊姬龍尾之廋詞後注國語范文子曰有秦客廋詞于朝注匿詞也國䇿齊靖郭君將城薛客有能為廋詞者趨而進曰海大魚劉協曰布舉言大鳥齊客言海魚莊姬託龍尾臧文仲書羊裘皆讔也注隱通聞而嗢􅛐見尺牘序幡綽袛效顰之技樂府雜録開元中優人有黃幡綽張野狐諸人襄陽記劉季和謂我何如荀令君主簿張坦曰古有好婦人患而捧心嚬眉見者皆以為好其鄰醜婦法之見者皆走公便欲下官遁走耶郭郎為借靣之裝顔氏家訓或問俗名傀儡子為郭秃有實乎答曰風俗通云諸郭皆諱秃當是前世有姓郭郎病秃者滑稽調戲故後人為其象呼喚郭秃爾注郭秃曰郭郎即傀儡也唐詩鮑老當筵笑郭郎笑他舞袖大琅璫按借靣見園次序何如别裁僞體杜詩别裁僞體親風雅直舉天懷緯昔事以今情傳新聲於古意絶無依傍略少撫摹此高人老鐵於焉矜能事於元朝楊維禎傳禎字亷夫諸暨人任提舉元末携家華亭博學􅈺詞賦世稱鐵崖先生按胡瑞讀其南高峯詞云瑰崛長吉莫過又云金荃竹枝香奩唐人各擅而老鐵菴有四家好異者須從此過也而相國茶陵所以負大名於明代也長沙志茶陵州古漢縣以地居茶山之隂故名明紀李相國東陽字西涯諡文正公茶陵人有樂府行世藉甚吾賢陸賈傳賈遊公卿閒聲名藉甚不圖為樂掣丹鯨於碧海此是古人騎黃鶴於青天誰為作者杜詩未掣鯨魚碧海中黃鶴疑用崔皓題詩事附注古樂府有所思妃呼稀秋風颯颯晨風颸注妃呼方言狶走也附注晉閻纘傳昔楚國處女諫其王曰有龍無尾言年四十未有太子也毛貞女墮樓詩序毛會侯女許字方渭仁子奕昭蘇奕昭死貞女墮樓以殉遇救獲三辰霜塞爰徵不二之心三辰見璿璣賦列女傳東海孝婦以寃死六月飛霜淮南子鄒衍盡忠燕惠王信讒而繫之衍仰天而哭夏月為之降霜九曜煙霾方表靡他之節列女傳齊寡婦庶賤之女也無子不嫁事姑謙敬姑無男有女利母財令婦嫁夫婦不肯女殺母以誣婦婦寃結呌天天作雷電擊景公堂見聞後録西漢時東海孝婦夫死不嫁姑曰我老久纍汝壯自縊死姑女告婦婦竟死郡旱三年後太守祭其塜乃雨東漢時有姑以老夀終而夫女弟證婦鴆之其事同范曄後漢書未及何也海波􅐓洞淮南子未有天地鴻濛􅐓洞乃有寃禽見無忝序注雨雪漂搖詩翻生恨竹見憺園賦臣出身而事主委贄將誠左傳䇿名委贄二乃辟也女離家而適人摩笄見志禮女子十五而笄注許嫁乃笄也國䇿張儀謂燕王曰昔趙王以其姊為代王妻後請代王使厨人操銅斗殺之其娣聞之摩笄以自刺也故至今有摩笄之山紅顔赴義雄於一劔之師晉列女傳劉遐娶邵續女驍果有父風遐為石季倫所圍妻單將數騎拔出遐于萬人中縞袂趨風凛若萬夫之特張茂傳茂為吳郡守江充害之茂卒茂妻陸氏傾産率部曲為先登討充充敗為陸所殺詩百夫之特然或盈門以後展也于歸詩見廟而還全乎為婦禮婦人三月告廟上墳謂之成歸牛衣對泣己幾閲夫春秋見天章序鴻案相莊復洊更夫寒暑後漢梁鴻傳妻孟光為鴻具食不敢鴻前仰視舉案齊眉皇伯通異之曰彼傭能使其妻敬之如此非凡人也乃舍之於家甚者室中爛熳粗有諸雛子虛賦麗靡爛熳於前爾雅生噣雛注謂鳥子初生能自啄食總名曰雛也古樂府一母將九雛膝下團圞差多羣稚孝經親生之膝下以養父母晉左九嬪詩自我去膝下庾氏則苟娘在抱庾信傷心賦序一女成人外孫孩稚按苟娘一女詳篇後陶家則通子離懷見看奕賦陶靖節别傳淵明五子曰阿舒阿宣曰雍曰端曰通子畫睂窗裏身極分明見少楹序杜詩妾身未分明何以拜姑嫜織錦梭邊情歸繫屬見璿璣賦中人以上疇無硜爾之操論語賢智之流詎少皭然之志屈原傳皭然泥而不滓未有秦樓跨鳯見藝圃序即逢綿綴之辰詩憂心惙惙劉夢得代裴相表一朝被病遂至綿綴楚國委禽便遘彌留之會左傳鄭徐吾犯之妹美公孫楚聘之矣公孫黑又使強委禽焉左傳楚公子圍聘於鄭且娶於公孫段氏顧命病日臻既彌留困冉耕之瘵疾史記冉耕字伯牛癩卒珊枕空陳見皇士序患荀偃之疸疽左傳諸侯還自沂上荀偃疸疽生瘍於頭濟河及雍病自出玉叉虛挂見楚鴻序雙星尚格史記牽牛馬犧牲其北織女天女孫也周處風士記七夕祠牽牛織女此二星當會天漢中奕奕有白氣光曜五色人見之多所乞能無鞅掌之私詩百歲方賒終鮮綢繆之雅詩恆情不免孌彼何如而貞女則厠牏䙝器手也摩挲萬石君傳建為郎中令每謁親入子舍常私問侍者取親中裙厠牏身自浣滌不親知注中裙近身衣厠牏受糞器摩挲詳存菴序袒服中單躬焉挼撋漢書注內服為袒服古今注禮曰中單祭服其內明衣乃三代之襯衣也漢初改名汙衫六書故按按揉也阮孝緒字略煩撋猶挼挲不辭淟涊寧羞衛婦之三言張衡思𤣥賦澄淟涊而為清注淟涊垢濁也國䇿衛人迎新婦婦上車問驂馬誰馬也車至門教送母曰滅竈將失火入室見白曰徙之牖下此三言皆至言也而不免為笑者蚤晚之時失也備歷艱辛每為杞梁而一慟左傳文公艱難辛苦備嘗之矣琴操杞殖字梁戰死妻曰上無考中無夫下無子人之苦至矣乃求夫尸於城下抗聲大哭十日而城奔聞而嘆息見者咨嗟遂踐孤鸞俄成寡鵠琴歷蔡琰善琴為離鸞别鶴操陶詩上絃驚别鶴下絃離孤鸞列女傳魯陶嬰者陶明之女少寡養幼孤作黃鵠歌以明己之不更二庭也其略曰悲夫黃鵠之早寡兮七年不雙但使畢生髽髻亦足酬素志於賢雄左傳臧紇救鄫侵邾敗於狐駘國人逆喪者皆髽魯於是始髽注髽靡髮合結也遭喪者多不能備凶禮服髽而已檀弓魯人之髽而弔也自敗臺駘始也假令沒世蒿簪便足副所期於靈匹東觀漢紀梁統與杜林書曰君非隗囂不降志辱身至簪蒿席草不食其粟且夫飄飄乃奔月之人見琴怨序注空空實下天之狀後注璇臺千仭寧􅈺控鶴之方天台賦王喬控鶴以冲天事見滕王賦張僧鑒豫章記洪井有鸞岡洪崖乘鸞所憩處也西有鶴嶺王喬控鶴經過處綺閣千層詎曉驂鸞之術列仙傳梅福遇空同仙君授丹法乘青鸞飛升江淹别賦駕鶴上漢驂鸞騰天而乃奮身以擲自投玊女之扉靈光殿賦玉女窺忩而下視注刻玉女形於忩上也王裒詩陽忩臨玉女宋之問詩忩搖玉女扉瞑目而呼甘觸媧皇之石見憺園賦驚鴻大去翻同緣橦之嬉教坊記舞者樂之容或象驚鴻或如燕飛西京賦都廬尋橦注體輕善緣橦人於長木上自以手緣繩而度也鄴中記額上緣橦左回右轉墮馬長辭見皇士序幾類鞦韆之戲見憺園賦悲踰裂脰酷擬屠腸史記燕入齊王蠋自奮絶脰死注頸也公羊傳絶其脰注項也史記聶政刺殺韓相因破靣抉眼自屠出腸而死列女傳至正十五年有周人婦毛氏為賊所執罵賊不屈賦遂刳其腸而去此則宋王臺畔略可儷其堅貞見銅雀賦古詩紀戰國時韓憑為宋康王舍人妻何氏美王欲之築青陵臺何氏見烏鵲歌以見志遂自縊死董相車邊適足形其芳潔列女傳安定皇甫規妻者不知何氏女也善屬文時為規答書記及規卒董卓強聘之立罵卓遂死車下後人圖畫號曰禮宗斯時也筋骸瘲瘛絶意偷生說文小兒瘲瘛病也口鼻喎唆無心乞活說文喎唆小兒相應聲何意趙宫白璧偏經睨柱以還全藺相如傳相如奉璧至秦視秦無意償城持其璧睨柱欲以擊柱秦王恐其破璧乃辭謝固請相如使從者於經道亡去歸璧於趙奚圖秦國連環縱值揮椎而不碎國䇿秦昭王遺齊君王后玉連環曰齊多智而解此環衆羣臣不知解君王后引錐椎破之謝秦曰謹以解矣天哀志氣遂逢續命之膠人護孤芳蚤給返魂之藥見琴怨序翩其尚在宛爾猶存於是刻彼苕華鐫之琬琰竹書紀年桀伐岷山得二女曰琬曰琰刻其名于苕華之玉苕曰琬華曰琰托言黃帝二女曰琬曰琰刻於彤管飾以金玉詢貞姬之邑里居鄰浙水曹娥范曄列女傳孝女曹娥者會稽上虞人也父旴為巫祝溺死不得尸娥年十四乃沿江哭不絶聲旬有七日遂投江而死問淑媛之門楣人是華池毛女列仙傳毛女字玉姜秦亡入深山餌松柏遍體生緑毛能飛舉華隂山中獵人往往見之自言始皇宫人而不老附注庾信集謝趙王啓云某息荀娘注按本傳信子名立荀娘疑即立小字荀一作苟附注劍仙傳有空空兒能飛身千里斬人陳檢討四六卷七
