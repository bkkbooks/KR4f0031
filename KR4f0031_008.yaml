body:
  text: 陳檢討四六巻八翰林院檢討陳維崧撰序魏禹平詩序滿城栁色笛聲已入陽闗地輿廣記陽闗在沙州夀昌縣西六里王之渙詩羌笛何須怨楊栁春風不度玉門闗二月花朝天氣漸逢寒食見澹園序註荆楚嵗時記過冬至一百五日即有疾風甚雨謂之寒食屬文通之賦别見無沗序令敬禮以定文見懸圃序且盡餘杯為談往事竊述二家之舊徳聊充四座之新聞見二齊序註昔在前朝正丁末季奄人竊柄普天馳節甫之門後漢書靈帝繼立曹節王甫軰以卑品賤人摇弄國柄元子委裘薄海拜聖嬈之座漢安帝記帝封乳君王聖為野王君漢靈帝記時乳母趙嬈䜛諛驕溢時則余祖少保公諤諤東朝國䇿趙良曰千人之諾諾不如一士之諤諤新序周舎對趙簡子曰願為諤諤之臣君家忠節公稜稜左掖蕪城賦稜稜霜氣左掖見黄門序膺滂何罪同飛告宻之章後漢書李膺與范滂齊名後宦者坐膺以黨錮免官范滂亦以鈎黨繫獄唐書太后垂拱二年自徐敬業之反疑天下多圗已乃命鑄銅為匭置之朝堂受天下宻奏盛開告宻之門詳賀周序註喬固奚辜俱置同文之獄漢書李固扵順帝朝為㤗山太守杜喬為八使之一按察兖州奏固政為苐一後帝奔竇憲梁冀誣固與妖賊通收固下獄死宋書紹聖四年章淳蔡卞用事治同文舘獄将悉誅元祐舊臣碧血長埋扵牢戸左傳魯哀三年周人殺萇𢎞註𢎞資中人周大夫萇叔晉趙鞅讓周以𢎞為討也荘子𢎞死扵蜀藏其血三年化為碧周書深刻其姓名補註不其然乎彼一時也既而下宫難息孤出袴中史記趙世家屠岸賈與諸将攻趙氏扵下宫殺趙朔滅其族朔妻成公娣有遺腹走公宫匿生武賈索之夫人置兒絝中祝曰趙宗滅乎若號即不滅若若無聲及索兒竟無聲北海寃消人還璧裏見祖徳賦則有余父贈檢討公風度鴻騫見商尹序君叔庶常公儀觀鵠舉詳儲太翁唘江深故國相逢石子岡頭吴志孫峻殺諸葛恪投于石子岡先是童謡云諸葛恪何弱弱蘆葦单衣篾鈎絡扵何相求成子閣註成子閣反語石子岡也花落空宫並坐瓦宫閣下金陵志梁昇元閣改名瓦棺寺西晋時地産青蓮二朶掘之得瓦棺内見一老僧花従舌底出詢及父老曰昔有僧誦法華經卒塟此地而乃社猶竄鼠城尚憑狐説苑管仲對桓公曰夫社束木而塗之䑕因往托焉薰之則恐燒其木灌之則恐敗其塗國冇社䑕人主左右是也沈約恩倖傳城狐不灌社䑕不薫謂得所憑依也華林半部多是佃夫之伎人見尺牘序及鴻客序建業三更齊唱總持之艷曲見鴻客序江總傳總字總持為浮艷之曲日與後主逰宴後庭共陳暄等十餘人謂之狎客扵是筵畔徴歌風前命酒張髯奮擲盖寛饒醒後原狂漢書盖寛饒字次公魏人擢司𨽻校尉弹劾不避權貴嘗過手恩侯許伯曰無多酌我我乃酒狂丞相魏侯笑曰次公醒而狂何必酒也㦸手轟豗韓愈詩衆樂驚轟豗禰正平怒而工罵見雪持序宵人籍籍漢江都易王傳國中日語籍籍指為鈎黨之子孫見上註異類紛紛奉以東林之衣鉢髙僧傳沙門慧永居西林與慧逺同門逰好遂邀止刺史桓伊以學徒日衆更為逺建東林寺後結白蓮社扵此明史顧憲成字叔持無錫人學者稱涇陽先生領銓事以忤執政削籍歸里修東林書院與弟允成髙憲公等講學其中東林之名遂滿天下語錄五祖𢎞忍以法寳及所傳袈裟付六祖盧恵能謂傳衣鉢唐書和凝懽登第在十三名及知貢舉以范質為十三人後俱登相位人謂之傳衣鉢僕猶憶此君豈忘諸無何而鵑啼西雒昔夢宵迷見􅋯菴序鵝出東周舊家晨散見懸圃序空留先澤鄙人則逺遜孔璋見無忝序綽有門風賢従則羣推交讓蜀都賦交譲所植註兩樹相對一樹枮則一樹生枝名出岷山在安都縣今禹平従兄家交譲取此都縁世講欣聨袁灌之交見半繭賦頗怪時流謬作曹劉之目杜詩目短曹劉墻朱註子建公幹也問燕吴之異路偶出處之分途然而故人知我寧来割席之言漢書管寧與華歆同席讀書有乗軒冤過門者寧讀如故歆廢書出看寧割席分坐曰子非吾友也賤子懐人長記班荆之日漢書主邑請召賔邑自稱賤子左傳楚伍舉與聲子相善舉奔晉聲子将如晉遇之扵鄭郊班荆相與食而言復故是則魏里之與荆溪交非一日嘉興志嘉善縣有魏里荆溪見天篆序而寒門之與貴族誼並千秋乃者吾賢猶為傑出詞塲獨霸跌宕扵練裙紈扇之塲練裙詳紫来序紈扇見海棠賦文陣稱雄激昂扵鐵撥銀筝之隊鐡撥見子厚序銀筝見滕王賦従来才子必生孝笋之鄉見􅋯菴序自古文人半産忠泉之里見歸田序僕非阿好謝砌原開樹樹之花見祖徳賦註世所同知王門定韞家家之玉詳益都跋僕也久従吴㑹披異采之繽紛近在幽燕捧名篇之絡繹張衡南都賦絡繹繽紛詎意灞橋草碧遽理歸装詳萬栁啟何圗韋曲花紅難牽别袂詳紫来序杜詩韋曲花無賴遂題數語爰集百端見滕王賦君其姑去送子在綠波南浦之前江淹别賦春草碧色春水綠波送君南浦傷如之何僕亦遄歸俟我扵黄葉西風之後宫紫𤣥先生春雨草堂詩序盖聞嚴霜霣葉寄跡何由春秋霣霜不殺草説文與隕同滄海横流處身無所世説王孝孫早嵗䘮妻有子貧無居宅惟畜露車共宿車上嘗嘆曰滄海横流䖏不安也志士抱覉孤之戚貞臣興轉徙之嗟然而荘名白石猶有故侯補註家近藍田非無舊将見滕王賦卯金劒去張華傳晉武庫火剱穿棟去李賀詩漢劍當飛去詳下張平子以此歸田見三芝序典午星移見素伯序王逸少扵焉誓墓見黄門序競説愚公之谷説苑齊桓公獵逐鹿入山谷中見父老問此何谷曰昔有翁畜牸牛子大賣之置駒少年曰牛不生馬遂持去人以為愚因名愚公谷相傳䖏士之廬見海棠賦註僕以客逰時焉浪跡偶過海陵之郭地理志揚州府領三州七縣皆漢海陵地今南通州曰海陵獲登春雨之堂其堂也歴落嵯峨嶒泓蕭瑟接天睥睨依稀潘岳之面城釋名城上垣謂之睥睨一云女墻潘岳閒居賦退而閒居扵洛之涘陪京泝伊面郊後市庾信小園賦潘岳面城撲地閭閻彷彿晏嬰之近市鮑昭蕪城賦㕓閈撲地歌吹拂天字林閭里門也閻里中門也左傳景公欲更晏子之宅辭曰小人近市朝夕得其所欲敢煩里旅蘭橑夹峙望若鴛鴦見滕王賦屈原九歌桂楝兮蘭橑複道中迴形如螮蝀阿房宫賦複道行空不霽何虹文廊棊布綺舘星羅見璿璣賦珠簾共鶴露齊垂繡帳與雁風同捲風土記白鶴性警至八月露降至草木上滴滴有聲則髙鳴相警移徙宿䖏慮有變害也摭言秋風為送雁風况復闗通南海雲水一區地號西湖烟波萬頃鵁鶄鳬鵠見瀛臺序真同鏡裏之装見憺園賦蒲稗菰蒋不異空中之市見半繭賦王司州流連印渚欣賞絶多見憺園賦謝太傅嘯傲剡溪襟情不少謝安傳安常住臨安山中遊賞必以妓女従紹興志東山在上虞縣西南謝安隠此携妓以逰按剡溪在嵊縣皆屬紹興爰乃被以紫莖繚之紅藥楚詞秋蘭兮青青綠葉兮紫莖謝𤣥暉詩紅藥當階翻王家仲寳府種芙蓉蕭子顯齊書王僕射名儉字仲寳瑯琊人每自比李膺嘗以庾景行為長史蕭沔與儉書曰盛府元􅒼實難其選庾景行泛綠水依芙蓉何其麗也時以儉府為蓮花池韓偓詩蓮花幕下風流客陸君慧曉門栽楊栁南史慧曉與張融並宅其間有池池上有二株楊栁何㸃嘆曰此池便是醴泉此木便是交譲並見鴻客序文禽翔扵綠水翠羽拂扵朱軒固已石留貞女之形寰宇記貞女石在敘州府宜賔舊小州岸昔有貞婦夫没無子事姑甚謹身没所居室有一大石湧出人號貞婦石並見海棠賦寧徒果得隠夫之號見海棠賦時則風吹鍜竈人是嵇康見半繭賦月冷匡牀主稱向栩漢獨行傳向栩字子興向子平之後桓靈時少為書生性卓詭不倫恒讀老子嘗扵竈北坐板牀上如是積久板乃有膝踝足指之䖏不好語言而喜長嘯披鹿裘而泮渙載鶴氅以婆娑晉隱逸傳瞿硎先生者太和末嘗居宣城郡界文脊山山有瞿硎因以為名大司馬桓温往造之見先生披鹿裘坐扵石室神無忤色晉書王恭嘗披鶴氅涉雪而行孟昶見而嘆曰真神仙中人手中麈尾見鷹垂序皆過江支許之談髙逸沙門傳支道林與許椽共談支通一義四坐莫不厭心許送一難衆人莫不抃舞案上牛腰李詩書秃千兔筆詩載兩牛腰潘邠老詩詩束牛腰藏書稿註束書具形如牛腰也悉入洛機雲之作見祖徳賦隱嚢紗帽宛矣流風隱嚢見尺牘序北史秦王歸彦平北齊齊制惟天子紗㡌臣下戎㡌特賜歸彦紗㡌屐齒巾箱翩其姿致屐齒見憺園賦巾箱見尺牘序若夫故都玉樹感不忘心舊事金盤悲難去口見滕王賦聴闗河之篳篥既足嬰情見天章序見鄉國之旌旗奚堪拭涕見素伯序心如饑雀堕此空倉蘇伯王妻盤中詩空倉鵲常苦饑吏人婦㑹夫稀骨似飛龍落来藥店見皇士序三年石闕豈無懊惱之歌宋凊商曲古辭将懊惱石闕晝夜題碑淚常不燥宋樂府讀曲歌三更書石闕憶子夜啼碑並見海棠賦及天篆序五夜弹棋大似不平之局見三芝序時則憑檻悲歌登樓慷慨王敦閣内惟多缺盡之壺王敦傳敦字處仲每酒後輒咏魏武老驥伏櫪四語以如意擊唾壺壺口盡缺陶侃齋頭祗有運来之甓陶侃傳士行嘗為廣州刺史在州無事輒朝運甕扵齋外暮運扵齋内人問其故答曰吾方致力中原過爾優逸恐不堪事故自勞耳扵是東都好事南國名流見憺園賦並贈詩章咸投巻牘宋風謝雪宋風見琅霞序沈約宋書謝恵連十嵗能屬文為雪賦以髙厲見竒龍虎跳扵行間見祖徳賦何粉荀香何粉見銅雀賦典略荀彧字文若劉季和嘗言荀令君之衣皆香每至人家坐處嘗三日香珠玉生扵字裏見素伯序珍踰趙璧見歸田賦光嫓隋珠見鷹垂序崧樗櫟庸材樗見半繭賦註櫟詳逸齋序註菰蘆下士當年龍廏差有姓名唐書天駟監御左右分二廏一曰祥鳳二曰鳳苑其後禁中又増飛龍廏唐學士例借飛龍廏馬李詩朝天數換飛龍馬舊日射棚頗多儔侣詳儲太翁唘訪羅含之宅幸覯斯堂晉書羅含字君章莱陽人為尚書郎致仕所居南恩有羅琴山以含常携琴扵此故名羅含傳含辭桓温别駕立茅作舍以居布衣蔬食銜山簡之杯乃為兹序襄陽記晉山簡字季倫鎮襄陽每逰習郁池輒醉人歌曰人公何所詣往詣髙陽池日暮倒載歸酩酊無所之杜詩愛酒晉山簡所喜虬鸞在後悉髙山流水之音見園次序深慚糠秕當前見黄門序對白雪陽阿之曲見天章序言歸二酉見王巖序兼慰雙丁見憺園賦附注漢書斬白蛇劍七綵珠九華玉為飾五色琉璃為匣陳集生影樹樓詩序梁谿陳生常州志無錫梁谿源出慧山梁時重濬故名幼遇艱難生遭孤露成童失怙詩已罷蓼莪見憺園賦覊貫思親見雪持賦便悲風木見憺園賦邴根矩傷心之語酸感㫄人漢邴原傳原字根矩少孤數歲時過書舍而泣師問曰童子何泣也原曰凡得學者有親也一則願其不孤二則羨其得學中心感傷故泣耳中山王聞樂之時哀纒行路漢書武帝懲吴楚七國之變欲削弱宗室時中山靖王勝来朝天子作樂置酒勝聞樂而泣問其故以所聞對有曰臣心結日久每聞幻渺之聲不知泣涕之横集也况復門單户冷外鮮期功祚落宗衰内無萼附装蘆作絮依稀閔子之愁孝子傳閔子性孝後母衣損蘆花衣已二子絮父知欲去妻損曰母在一子寒母去三子單母感悟遂成慈母刻木為人彷彿丁蘭之恨漢書丁蘭㓜䘮母刻木像事之若生鄰人張叔醉詈木像蘭歸見母像若不懌妻告以故蘭奮擊張叔吏至捕蘭木像垂泪郡嘉其孝感神明奏之詔圗其形出有燃萁之歎入逢櫟釡之傷魏志曹植善屬文帝素忌其才欲害之令作詩限七步成植應聲曰煑豆燃豆萁豆在釡中泣本是同根生相煎何太急史記楚元王世家髙祖㣲時嘗與賔客過巨嫂食嫂厭叔與客来佯為羮盡櫟釡賔客以故去已而視釡中尚有羮繇此怨嫂後封其子為羮頡侯註櫟歴也以杓歴釡有聲詐為無羮也羮頡山名借以鄙之按漢書一作邱嫂一作轑釡悽惻何窮纒綿曷已然而陳情令伯尚有白頭晉書李宻字令伯父早亡母更適人鞠扵祖母劉氏武帝徴為太子洗馬詔書屢下宻上陳情表帝聴其終養賃廡梁鴻猶無青案髙士傳鴻依臯伯通居廡下為人賃舂張衡詩美人遺我青玉案舉案見貞女序扵是湛情作述肆志纂捜文通好學漂麥寧妨翁子讀書負薪不輟見懸圃序大有蘭臺之聚見憺菴序絶多梓澤之逰見半繭賦時則銅樓清夜厠跡應徐見滕王賦註金市熙春見滕王賦方驅潘夏晉書潘安仁夏侯湛同行時人謂之連璧櫻桃初熟騰詩句之清新荳䓻方垂訝才思之驚寤見海棠賦用鳩一集不亞千篇僕愧不文無能為力以余一日之長謬邀九品之評詳夀季序嗟乎同是孔璋之後裔豈乏家風見無忝序矧稱正則之門徒寧無流𣲖離騷經名余曰正則兮字余曰靈鈞註屈原名正則謂平正可法則也莫以覊孤而廢著勿因隟弱以摧毫管子上聾則下瘖上惽則隟不計須知詞賦自有知音若説風騷原多定價殷芸吮墨遘貧賤以奚嗟梁書列傳殷芸字灌蔬陳郡長平人愽洽羣書幼而廬江何憲見之深相嘆賞後為昭眀太子侍讀陸厥懐鉛沮䜛疑而何恤陸厥見滕王賦懐鉛見尺牘序註羊叔子不如銅雀伎雖有是言世説王子敬語王孝伯曰羊叔子自復佳耳然亦何與人事故不如銅雀臺上伎劉註謂羊公德自佳不如妓可娱人此正墮淚之言小家女嫁得汝南王詎無其日見琴怨序梁元帝採蓮歌碧玉小家女来嫁汝南王庾信詩定知劉碧玉偷嫁汝南王老余江總朂爾侯芭姚思亷陳書江總七嵗而孤及長篤學有詞采仕梁陳隋時年七十六嘗自敘其畧時人謂之實録漢侯芭傳芭少肆力扵學壮逰四方師揚雄授以太𤣥法言悉得其㫖九日黒窑厰登髙詩序若夫赤車聘士京都開碣石之宫史記騶子之燕昭王擁篲先驅築碣石宫親往師之黄屋招賢輦轂闢翹材之舘漢書項羽圍漢滎陽紀信誑楚乗王車盖黄屋以故王得遁註黄繒盖褁也西京雜記公孫𢎞為相分三舘欽賢舘以待大賢翹材舘以待大材接士舘以待國士髙冠長劍結靷而至者三千廣厦細旃抵掌而談者十九昭王臺畔夙稱買駿之鄉燕世家昭王欲招賢郭隗曰昔有求千里馬者馬已死五百金買其骨不期年千里之馬至者三王欲招賢請従隗始王乃築臺置金以師之元禮門前新有登龍之客李膺傳膺字元禮潁川人以聲名自髙士有被其容接者名為登龍門云時則太史趙鐵源先生天水名家營邱望姓見歸田序註金閨掞藻見園次序玉尺量才唐書趙光逢以文行知時人謂之玉界尺西園既文舉開樽孔融傳融字文舉後為北海相嘗曰座上客常滿樽中酒不空吾無憂矣東郭復當時置驛見憺園賦則有敦牂紀嵗金虎司晨天皇紀十二支中午為敦牂黄庭要㫖兌之氣金之精其色白其象如懸磬其神如白虎商飈激扵蕭林灝景凝其素節渾河一色順天志府西南盧溝河本桑乾河也俗又呼渾河雲中之雙闕常紅見商尹序落葉三闗保定志雄縣瓦橋闗乃三闗之一塞上之千峰忽紫霜曦縞晝耀橘柚之金穰南都賦穰橙鄧橘古詩經霜柑橘綴金丸月魄澄宵綴茱茰之綵纈續齊諧記汝南桓景随費長房逰學長房謂曰汝家有災厄令家人作絳囊盛茱茰繋臂登髙山飲菊花酒可免斯時也稷下逰譚之士弭節髙秋史記齊宣王喜文學逰説之士不治而議是以稷下學士復盛且數千百人註齊有稷門城門也談説之士期㑹城門下新序齊稷下先生喜議政事正義曰魯連子云齊辨士田巴服徂邱議稷下離騷吾今羲和弭節兮梁園詞賦之賓見璿璣賦彯纓上國廣絶交論彯組雲臺者摩肩文選彯纓天閣文成騷辨莫平楚客之心見楚鴻序景直蓴鱸易入吴人之夢晉書張季鷹仕齊王冏為東曹知亂将作見秋風起思吴中蓴莱羮鱸魚膾歎曰人生貴適志耳遂命駕歸非無魯酒寧使銷愁見素伯序不有燕歌何能遣興見渭仁序及智修序韓文燕趙多慷慨悲歌之士先生乃練兹時日載䔩蘭肴召我賔朋為斟桂醑離騷茍余情其信姱以練要兮註練擇也漢樂府古辭有題云練時日邉讓章華臺賦蘭肴山聳椒酒淵流屈原九歌蕙肴蒸兮蘭藉奠桂酒兮椒漿然而九衢車馬誰為泛菊之名區天問靡䓑九衢山海經有四衢五衢西京雜記九日飲菊酒令人長夀三市塵囂不稱題糕之韻事周禮大市日昃而市朝市朝時而市夕市夕時而市洛陽記晉都洛有三市一在城西南一在城東一在城南見滕王賦註邵氏聞見錄劉夢得作九日詩欲用糕字以五經中無此字輒不復為朱子京九日食糕有詩云劉郎不敢題糕字空負詩家一世豪匪尋僻地曷暢雅逰扵是長楊直去竟得空羣詳舜民序下杜斜臨還逢古樹補註水雲曠淼樹颯颯以吟風沙嶼清蒼葦蕭蕭而捲雪爰乃幽人藉卉見鴻客序註上客攀條詳萬栁啟註乍敷袵以論心或憑欄而送目離騷跪敷袵以陳辭沈約謝靈運傳論敷袵論心商𣙜前藻漢書周亞夫趨出上以目送之嵇康詩目送歸鴻江總詩去雲目徒送人逢髙㑹㡬忘異地之闗河見鴻客序註天放新晴不送滿城之風雨潛確類書謝無逸以書問潘大臨近作詩否答曰昨日清卧聞攪林風雨聲遂起題壁曰滿城風雨近重陽忽催租人至敗意止此一句奉寄飛觥闘斚賢主既􅓉然而成吟拂素題箋嘉賔亦斐然而嗣咏詩分各體人限二章嗟乎桓南郡賦詩横槊參佐風流晉書桓温九日逰龍山􅒼屬畢集九域志太平治當塗有龍山横槊見鷹垂序劉彭城戲馬髙臺賔徒慷慨南齊書劉裕為宋公時在彭城九日出逰項羽戲馬臺至今相承為故事扵今不再自古空傳黄花插髩徒添落帽之狂杜牧詩菊花須插滿頭歸晉書孟嘉為桓温參軍九日従逰龍山風吹落帽嘉不之覺温謂賔客勿言令座中孫盛作文嘲嘉嘉請紙作答了不容思白雁横空見孝威序祗切悲秋之感見海棠賦年年漉酒惟存陶令之巾沈約宋書陶潛在家取頭上葛巾漉酒漉畢還著值隣家招飲酒有滓即脱衣漉之嵗嵗尋花慣作駱丞之序駱賔王集有九日冒雨尋菊序僕也恭聆逸响知紀勝之重逢遥隔名筵悵従逰之有待為平原而買繡千秋公子之絲李賀浩歌買絲繡作平原名有酒惟澆趙州士過燕市以登髙見篇上一巻大夫之賦見天篆序萬栁堂修禊倡和詩序盖聞嵗紀上除嵗時記三月節巳日為上巳月建辰則巳為除日以除不祥也魏以後但用三月三日不復用巳矣上巳一日上除一日元巳詩詠秉蘭扵洧涘鄭風春惟元巳史標躤栁扵華林魏志魏眀帝建芳林園以避少帝諱後改曰華林按宋武帝齊眀帝及周眀帝皆褉飲扵此屬河南府又按梁簡文所逰華林園在鍾山側見琅霞序庾信集三月三日華林射馬賦有云落花與芝盖同飛楊栁共春旗一色按躤栁踐栁營以逰也都下盛洛濵之戱千里安期見楚鴻序山陰流曲水之觴興公逸少晉書王羲之字逸少作蘭亭臨河敘有云㑹扵山隂之蘭亭修褉事也扵時流觴曲水列坐其次又列序時人右将軍孫丞等二十六人賦詩扵左謝勝十五人不能詩罰酒各三斗按孫丞名綽字興公有蘭亭後序顔特進騁華文扵劉宋花在毫端宋略文帝元嘉十一年三月丙申褉飲扵樂逰苑顔延之應詔讌曲水作詩八章俱四言甚工按延之卒贈特進諡曰憲王寧朔騰玉藻扵蕭齊春生楮裏齊書武帝永眀九年三月三日幸芳林園褉飲朝臣勅王融作序文藻富麗王融傳融字元長僧逹之孫也仕齊為寧朔将軍三月三日水靣麗人杜詩三月三日天氣新長安水邊多麗人一咏一觴林邊名士見上蘭亭序此地有崇山峻嶺茂林修竹一觴一咏亦足以暢敘幽情亦云在昔以迄扵今則有韋曲名荘詳紫来序平泉别業見藝圃序黄扉上相見佳山序欣逢戒浴之辰嵗紀記上巳日修褉戒浴以除不祥綠野元公見楚鴻序喜届祈蠶之序成都記三月三日逺迎祈蠶扵龍橋命曰蠶市鶯遷郛外髙閣仍開見佳山序蝶舞花間小車逺到見憺園賦裙屐簇謝庭之子弟見祖徳賦輜軿溢馬帳之生徒漢書桓帝時馬融字季長著述甚富坐髙堂施綘帳前授生徒後列女樂盧綰鄭𤣥其徒也輜軿詳合肥書時則上陽宫外積靄初晴洛陽記上陽宫在東都苑内李郢詩上陽深鎖寂寥春宣曲觀前逰氛乍斂華陽國志上林苑中有臨髙凌雲宣曲廣武閬風萬世修齡總章聴治凡九觀皆髙六七十丈按上林賦西馳宣曲張搰註宣曲宫名在昆明池西天装卵色見憺園賦皴成雙闕之紅見商尹序岫抹雲藍滴作萬家之翠語林夏日山藍欲滴綿羽既蹁躚乎綺陌新荑亦溶漾夫銅溝見澹菴序註鞭絲帽影争窺白傅之池臺洛陽名園記白樂天居東都履道坊治園池亭榭與元㣲之劉禹錫韋楚老等往来唱和自著有池上篇松韻泉鳴競和東山之絲竹晉書謝安舊隱㑹稽東山後扵金陵築山擬之營洽樓舘松竹甚盛好音樂朞䘮不廢絲竹蘭肴載䔩桂醸新篘見九日序我師爰呼四座而言見二齋序註此樂實駕千春而上生民之始厥有豪雄自我而前非無賢逹間復流連節物撫弄景光然而星移物換竊或因身世以停歌樂往哀来究且睠闗河而罷酒縦或放懐清曠陶情詎遂以忘情寄意洸洋齊物亦何能遺物曷若鄭子産之池内長有生魚周茂叔之堦前雅多青草宋書周敦頥字茂叔别號濓溪先生吟風弄月意味洒然牕前草不除去言與自家意思一般流行坎止悟大造之無心易今是昨非笑前賢之多事歸去来辭覺今是而昨非詩成七律人各二章庶㡬南樓清興老子何减扵諸君見歸田序依稀東魯髙風狂士偕逰乎童冠云爾論語閨秀商嗣音詩序従来福命大抵相妨自昔身名何嘗俱泰晉書石崇曰士當身名俱泰何至處甕牖哉有我友之髙才際興朝之盛典嚴終接軌揮毫扵鳷鵲觀前漢書嚴助為中大夫與朱買臣並在左右終童見黄門序漢書註鳷鵲觀在雲陽甘泉宫枚馬聮鑣授簡扵鳳凰闕下枚馬見璿璣賦謝靈運集詩序楚襄王時則有宋玉唐景梁孝王時則有鄒枚嚴馬鳳闕見商尹序辭章温麗九重亦悉其名西京雜記枚臯捷疾長卿淹遲長卿首尾温麗枚臯時有累句故知疾行無善跡矣九重見璿璣賦體致雕華見楚鴻序兩省盡傳其賦兩省見黄門賦註㑹遭逢之未偶遽行李之将歸左傳行李之往来杜預註李或言理或言李皆謂行使也西風落葉别子三秋北渚㣲波見藝圃序送君千里爰扵酒半自説生平並倚風前為言郷里乃知髙柔室内正有賢妻孫統為髙柔集序柔字世逺樂安人婚泰山胡母氏女年二十既有倍年之覺而姿色清恵近是上流婦人柔愛玩賢妻有終焉之志何克取為冠軍叅軍僶勉應命不能相舎相贈詩書清婉辛切按隋髙柔字文恵乃為刺姦刺史者荀粲房中非無令婦見渭仁序示我玉臺之咏徐陵玉臺新咏序撰録艷歌凡為十巻玩其錦瑟之章見天篆序盖嗣音商夫人者即君之徳配而前太傅商公之季女也爾其族望通華門楣清綺扶風宅第恵班則才擅大家見歸田序金卯家庭令嫻則名髙三妹世説劉孝綽三妹嫁瑯琊王叔英吴郡張嵊東海徐悱並有文才徐妻尤為清拔孝綽傳曰悱妻字􅈺所謂劉三娘者也悱卒妻為祭文辭甚悽愴冬缸夜煗詳茹蕙序援彩筆以吟椒見瑞木賦春陌晨鮮展蠻箋而咏絮蠻箋見三芝序詠絮見琴怨序固勝洛陽道上只解採桑梁武帝歌河中之水向津流洛陽之女名莫愁十三能織錦十四採桑南陌頭非徒蜀郡壚頭惟能賣酒見看奕賦洎乎降阼以暨同牢郊特牲舅姑降自西階婦降自阼階授之室也昏義共牢而食註牢俎也張子髙畫眉之暇即事觀書見少楹序楊子幼鼓瑟之餘便思染翰見看奕賦加以娣原道韞標名徳扵區中見瑟怨序女是左芬扇風華扵膝下外戚傳左貴嬪名芬雍之子思之妹善綴文晉武帝聞而納之姿陋無寵以才徳見禮每有方物異寳必詔為賦頌以是屢獲恩賜焉一門才媛商雲衣獨矜秀善之稱兩姓賢甥祁湘君蚤得清新之譽啇嗣音名景徐乃冢宰季女適己未㣲聘徐咸清號仲山先生生女昭華商雲衣名彩冢宰孫女祁湘君名徳茝父大中丞諱彪佳諡忠愍母商氏冢宰長女堦前鄭婢並習風詩世説鄭𤣥家奴婢皆讀書嘗使一婢不稱㫖将撻之方自陳説𤣥怒使人曳著泥中須臾復有一婢来問曰胡為乎泥中答曰薄言往愬逢彼之怒座上濟尼尤長辭令世説謝遏絶重其姊張𤣥常稱其妹有濟尼者並逰二家人問其優劣答曰王夫人神情散朗故有林下風氣頋家婦清心玉映自是閨房之秀註王乃謝姊頋乃張妹也篇章間作燃脂而玳瑁千函倡和時聞拂素而琉璃萬軸傅粉熏香之暇字字庾徐玉釵羅袖之中人人江鮑見園次序况復翟泉鵝出闗河之愀愴何多陳寳雞鳴身世之感傷不少見得仲序夜月歸寧則太傅之池臺安在秋風憶舊則尚書之棨㦸都非棨㦸見看奕賦涉緑野之空園見楚鴻序入烏衣之短巷見少楹序殘山賸水頓成今曩之規伯姊諸姑畧説興亡之事借斑管以描愁見園次序註托銀筝而訴恨見滕王賦此則韓娥蕩魄聲因激楚而彌工列子秦清曰昔韓娥東之齊匱糧過壅門鬻歌假食既去餘音繞梁三日左右以其人弗去過逆旅逆旅人辱之娥因曼聲哀哭一里老幼悲愁垂涕三日不食列女傳無鹽女諌齊王曰聴激楚之遺風按激楚流風二舞曲名衛女消魂詩以悲哀而入妙也琴苑要録思歸引者衛女之所作也衛侯有女邵王聞其賢聘之未至而王薨太子欲留之女不聴拘扵深宫援琴歌曲縊而死因語故人君真竒福假令淇泉無巧笑之人詩魯國有宿瘤之女見憺園賦按宿瘤齊女孝標膴仕偏逢轗􅀈之妻劉孝標自序峻字孝標天監中詔掌石渠閣以病乞隱金華山余嘗自比馮敬通敬通有忌妻至扵身操井臼余有悍室亦令家道轗軻馮衍封侯長守噭咷之婦馮敬通集敬通有一婢妻任酷妬之撃婢無所不至乃棄遣之因與婦弟任武逹書曰吾數竒命薄端相遭逢按衍封曲陽侯沈約詩為君含噭咷中懐已盡人世奚堪此則對風月以増欷抑且遘綺羅而成痗即使室非交謫家有同心然或妾住河南君官淄右江淹别賦君居淄右妾家河陽盛年紅粉響砧杵扵天邊見滕王賦杜牧詩佳人力杵秋風外異國青衫聴琵琶扵亭下見良輔序及庭表序悲哉南國之佳人逖矣東方之夫婿曹植詩南國有佳人華容若桃李韋荘詩南國佳人號莫愁樂府陌上桑東方千餘騎夫婿居上頭年年計吏頻緘徐淑之書漢詩紀秦嘉字士㑹渭城人為郡上計椽有贈婦徐淑書及詩傳世嵗嵗香閨長寄竇滔之字見璿璣賦難同弄玉雙吹鳳竹以成仙見藝圃序翻羡王章共卧牛衣而灑泣見天章序在彼何辜在君何幸行矣長征何必預人家國世説桓公欲遷都孫綽上表諌桓令人致意曰君何不尋遂初賦而彊知人家國事歸與此日猶能樂爾妻孥詩種玉實英雄兒女之鄉見滕王賦耶溪尤粉黛烟霞之窟見智修序左攜嬌女詳茹蕙序姑消憤懣扵詩歌禮志懣氣盈説文懣悶也煩也江淹詩投袂既憤懣右擁孺人且澣牢愁扵文史禮大夫妻曰孺人恨賦左對孺人顧弄稚士子雲傳雄扵屈原痛惜一下至懐沙一巻反其詞曰畔牢愁逺峰眉際見皇士序註何須看馬上之西山順天志西山為京師八景之一每大雪初霽積素凝華閬苑人間集仙錄王母居崑邱之國閬風之苑非飈輪不可到述異錄閬苑在大海中神仙所居底事戀雲中之北闕見商尹序還鄉甚樂去國何傷君曰有諸斯言良是藉卿弁語縦倚馬以奚辭晉書桓宣武北征㑹須露布文喚袁宏倚馬前令作俄得七紙殊可觀貽我細君遂揚鞭而竟去東方朔傳漢武帝扵社日賜従官肉大官未至朔割肉以歸帝令目責朔再拜曰受賜不待詔何無禮也拔劍自割何壮也割之不多何亷也歸遺細君又何仁也古詩揚鞭看花去徐昭華詩集序山隂閨秀集昭華字伊璧贈三嫂詩云粧樓春色曉捲幔緑楊間又贈雲衣詩羨汝雙蛾似初月不須留待畫眉人又為雲衣作催粧詩序中因及之瀨中夫子偕逰細栁之營吴越春秋子胥過溧陽瀨水之上註即今溧水漢宫闕疏細栁倉有栁市詳萬栁啟毛頴先生並轡長楸之舘毛潁傳秦蒙恬南伐楚次中山圍毛氏之族㧞其毛載頴而歸曹植名都篇走馬長楸間復齋漫錄古人種楸扵道故舘曰長楸銅溝清泚見銅雀賦嘯咏方遒綺陌輕隂談諧甫暢相與數朋逰扵故國抑且論人物扵當年顧謂毛君卿家扵越詳鄴園啟學楊雄之竒字定有侯芭見集生序按漢書劉棻従楊雄學竒字傳正則之離騷寧無唐勒正則見集生序唐勒見天篆序君笑而言居吾語汝頻年濩落廣雅布濩流散也比嵗幽憂見海棠賦人屑瑟而在蘆吴越春秋伍員奔吴有漁父欲渡因歌曰日月昭昭乎寝已馳與子期乎蘆之漪既渡漁父為持麥飯飼之因歌曰蘆中人蘆中人豈非窮士乎壇蕭條而無杏見天篆序籃輿寂寞半諱言陶令之門生陶潛傳王𢎞欲識淵明嘗往廬山𢎞令淵眀友龎通之齎酒具扵半道栗里要之淵眀有脚疾使一門生二兒􅓅籃輿既至欣然便共飲酌俄頃𢎞至亦無忤色絳帳飄零疇自引馬融之弟子見修禊序爰有一人猗與獨立詎圗徐淑見閨秀序知有毛公詳篇下隔紗屏而請受經文濡綵筆而願為都講見得仲序擬之賢媛不愧竇妻鮑妹之間竇妻見璿璣賦詩品齊鮑昭字令暉嘗答孝武云臣妹才自亞扵左芬臣才不及太冲耳其在詞流何慚宋豓班香之輩見瀛臺序余也側聆髙論竊慕驚才神惝怳以靡寧心狐疑而未果見瑞木賦倘其善謔詩姑好大言見天章序如謂非誣求觀麗製若乃椒花新句見瑞木賦探自枕中漢書淮南王有枕中鴻寳苑秘書言神仙使鬼巫為金之術香茗清文出之袖裡後註散葡萄之帙約有千篇見三芝序解玳瑁之装都為一巻見天篆序扵是㣲吟永晝宻詠逾時晨爐燼麝渾忘綺旭之将斜李義山詩融麝暖金釭纂要日初出曰旭日宵箭沉虬見瀛臺序頓覺素靈之欲上見良輔序註藉之索粲何煩再投玉女之驍見半繭賦及琴怨序西京雜記投壺言驍如博之拏梟扵鳬中為驍傑也按雉歌有驍壺隋煬帝所造以投壺躍矢為驍與梟通假以蠲愁詎須更射大夫之雉見澹菴序解頤不少前漢書匡衡字䅅圭深經術諺曰無説詩匡鼎来匡説詩解人頤撫掌偏多詳樂府序時則僕也玩荳蔲牕前之集諸什咸工見海棠賦覧茱萸帳底之篇古詩尤妙梁簡文燭賦茱萸幔裏鋪錦筵張正見豓歌並捲茱萸帳争移翡翠牀劉瑶詩吴刀剪破機頭錦茱萸花墜相思枕盖自殷淳作集徧輯裙笄宋書殷景仁弟淳編婦人集三十巻仕在秘書閣撰四部書目凡四十巻常璩成編間傳閨闥晉書常璩敘蜀事撰華陽國志十二巻漢書義十卷有華陽士女戴媯荘姜而後世擅風詩見滕王賦諸姑伯娣之儔詩代沿製作循環纎手豈盡習夫琵琶掩抑丹脣寧第耽夫笙管珊瑚架北見天篆序曽繙五色之花箋見尺牘序翡翠牕前見滕王賦競織千行之錦字見璿璣賦莫不文縹黄絹曲譜烏絲楊修傳修為曹操主簿従操至江南讀曹娥碑昔有八字曰黄絹幼婦外孫虀臼修曰黄絹絲色絶字幼婦少女妙字外孫女之子好字虀臼受辛辭字乃是絶妙好辭也國史補宋亳間有紙織成界道名烏絲欄麗情集霍小玉出烏絲欄素段李生援筆成章倣陳后不平之句見海棠賦玉臺新咏集寵聞長樂陳后知而不平破粉成痕見良輔序傚班姬善恨之詞見海棠賦結眉表色見良輔序然或新粧甫竟粗曉之無元稹白氏序居易生七月姆展書指之無二字示之百試不差唐文學傳樂天云僕生七月乳母抱弄扵書屏下有指之無二字者口未能言心黙識之巧笑餘閒略諧競病見尺牘序答曹洪之箋唘未免倩人陳琳為曹洪與魏文書云欲令陳琳作報琳頃多事不能得為又云怪乃輕其家邱謂為倩人魏文集曰上平㝎漢中族父都䕶還書扵余觀其辭如陳琳所敘為也魏志曹植曰言出為論下筆成章頋當面試奈何倩人嫁韓偓之香奩将無贋作夢溪茟談和魯公凝有籝金集又有香奩艷詞後貴恐䙝乃嫁其名為韓偓世傳韓偓香奩集乃凝所為也韓非子齊伐魯索饞鼎魯以其贋往註一作雁非真也歌喉乍囀便號綿駒孟子舞袖纔迴遽誇飛燕漢書趙后以體輕故名飛燕為掌上舞如流風迴雪體不勝風製七寳避風臺紅初暈頬得豓雪以逾融補註翠欲成螺南部烟花錄煬帝宫女降仙争畫長娥司宫日給螺子黛五升號娥子緑又號蛾緑螺擬春山而無别見皇士序註正須㸃綴還藉逰揚庾信賦終朝㸃綴分夜吟呻史記季布傳曹邱生揖季布曰僕逰揚足下之名扵天下頋不重耶亦有夙敏才情素耽文史嬴舘吹簫之暇即弄新聲見藝圃序楊家挟瑟之餘偏摹舊曲見看奕賦然而祗工近體但辨唐音託興則贈别懐人而外曽未經心擬古則龍標供奉而還都無渉筆唐書王昌齡字龍標有詩名應草澤遺逸詔按昌齡曾左遷龍標尉李白傳𤣥宗見白扵金鑾殿有詔供奉翰林不知前者乃有隂鏗見園次序詩評隂鏗之作體用兼優猥類時賢妄嗤庾信見滕王賦仲卿孔雀従未入其籓籬見素伯序都尉鴛鴦何自窺其堂奥見無忝序絮因風而正弱花裛露以偏慵緣斯兩者之談暨彼諸家之失此則綺嵗揮毫詳聖期序非闗姆教内則姆教婉娩聴従註姆女師也婦人五十無子出不復嫁以婦道教人者髫齡握槧見尺牘序綽有門風小鬟桂子揄薄袂以求題麗情集浣紗桂子皆霍小玉侍兒之名短幅桃花障輕綃而乞試桃花紙見璿璣賦母原道韞發函而私訝其情見琴怨序父則徐陵伸紙而彌嗟其妙見憺園賦固已才髙撃鉢見三芝序何難譽起連城魏文帝與鍾會書不損連城之價又送玉玦書價越萬金貴重連城註秦欲以十五城易趙玉和氏璧故號連城况復别裁律絶極擅清新上溯齊梁尤多風骨綠楊幔捲魂消贈嫂之篇新月蛾長色豓催粧之句見上坐久則梅開鬢上眠遲而衣寄邉頭演繁露宋武帝女夀陽公主人日卧含章殿簷下梅花飄着額上成五出之花因橅倣之以為粧様按含章起名後漢古樂府有寄邊衣曲張藉詩織素縫衣獨苦辛逺因回使問征人索来畫燭體學丁娘綠窗女史梁丁六娘有十索詩従郎索花燭従郎索衣帶之句其二也倚罷朱欄情同劉媛見閨秀序温邢掩嫮見園次序定空北部之胭脂見琴怨序鮑謝慚工古今詩評為詩欲詞格清美當如鮑昭謝靈運直壓南朝之金粉見楚鴻序吴都士女従前枉説綺羅越國山川自此不生花草傳向粧梳記内共許無雙下註選歸才調集中還推第一書目蜀人韋縠著有才調集選僕也天涯薄宦惜潘鬢之徒凋故國難歸悵江花之早謝見園次序酒無玉藥世説白子髙好仙術嘗為美酒以藥雜之遇四仙人云子有仙藥扵是子髙服之随仙人飛去聊憑􅊮管以消愁詩花少青棠謾托緗籢而釋忿嵇康論合懽蠲忿註欲蠲人之忿則贈以青棠合歡也通雅籨即奩也願為逸少長學書扵茂漪書断衛夫人名茂漪廷尉展之弟汝南太守李矩之妻王逸少之師善鍾法能正書入妙能品法帖衛夫人書云衛有弟子王逸少甚好學衛真書咄咄逼人詎意毛萇反授經扵伏氏漢列傳毛萇趙人河間獻王博士精詩學稱毛詩通考毛詩始扵毛公言大毛公萇也别有小毛公漢書文帝求専治尚書者伏勝老不能行使晁錯往受之勝復口呐令幼女傳言教錯今文尚書是也羨誠有是妬亦宜然爰綴俚言用題新咏問其桑梓詩千春西子之鄉見園次序詢彼絲羅古樂府與君為婚姻兔絲附女蘿四傑駱丞之壻見祖徳賦註按賔王為義烏丞今昭華壻乃諸暨駱生加采故云附注鮑照妹字君徽作香茗賦附注遼后有粧梳記茹蕙集序吾宗無垢者曹則大家見歸田序左為嬌女左思嬌女詩略曰吾家有嬌女皎皎頗白晢小字為織素口齒自清歴描鸞刺鳳空北部之胭脂繡虎雕蟲壓南朝之粉黛見琴怨序十三織素宛爾無雙見閨秀序註二八稱詩居然第一二八見滕王序馺婆館内見銅雀寧誇巧笑之名道政坊前不尚新粧之號補註若夫品第清華門風綺麗紅牙作筆則劉氏之三娘見閨秀序白玉為堂乃盧家之少婦古樂府相逢行黄金為君門白玉為君堂堂上置樽酒作使邯郸娼李商隱詩又入盧家妬玉堂沈佺期詩盧家少婦欎金堂詳納姬序註霍驃騎卯金鉅族詳徐母序張尚書典午名流晉張華傳詔曰張尚書闗内侯與前太尉陶侃功在王室典午見素伯序天邉列宅處處銅街見滕王賦春日乗駒人人玉埓見銅雀賦註屈大夫之騷賦常説姊嬃見雪持序衛荘姜之比興時稱戴媯見滕王賦扵是弱即知書生而習禮東鄰美女見楚鴻序争傳咏絮之篇見琴怨序西邸佳人詳夀徐序競倣簮花之格書断衛夫人従姊名恒袁昂評其書法如挿花美女琉璃硯匣見園次序註既繡閣之庾徐見園次序玳瑁筆牀見天篆序樹萱錄南朝呼筆管為牀又以四管為一牀亦香閨之潘陸見園次序加以性情道素靡事鉛華見楚鴻序註曹植洛神賦鉛華勿御儀度幽貞壹遵禮法青牛帳捲見尺牘序絶無累徳之篇見少楹序朱鳥牕開見天篆序時録縁情之作見少楹序當春而感楊栁之綿入秋而怨芙蓉之粉杜詩生憎栁絮白如綿雜錄紙有栁綿紙又養紙以芙蓉粉惜其色也冬缸靉靆映雪彌勤夏簟氤氲嚢螢不輟江淹别賦夏簟清兮畫不暮冬缸凝兮夜何長江總詩向崖雲靉靆晉書孫康好學家貧無油扵冬月嘗映雪讀書性清介後官至御史大夫囊螢見憺園賦凡彼燃脂如是而已其他弄墨略無聞焉見得仲序然而命實不猶人兮鮮淑詩蘼蕪道左愧手爪之難如見無忝序磐石塘前補註識錢刀之可用西京雜記卓文君白頭吟有曰男兒重意氣何用錢刀為青年織錦悲竇氏之機殘見璿璣賦𤣥夜熏香悵秦嘉之鏡逺見尺牘序鑿鄰火以腸迴攬嫁衣而淚落國策甘茂去秦且之齊出闗過蘇子曰夫江上之䖏女冇家貧而無燭者䖏女相與語欲去之家貧無燭者将去矣謂䖏女曰妾以無燭之故嘗先掃室布席何愛餘眀之照四壁者䖏女以為然留之秦滔玉貧女詩毎恨年年壓金線為他人作嫁衣裳則又衛洗馬所以言愁見滕王賦江醴陵扵焉賦恨者矣見尺牘序嗟乎羲和沉湎剪鶉首以何辭書惟時羲和顛覆厥徳沉亂扵酒張衡西京賦昔者天帝悦秦穆公而覲之饗以鈞天廣樂帝有醉焉乃錫用此土而剪諸鶉首註自井至栁鶉首之次秦之分也剪盡也盡取鶉首之分為秦境也按南方朱鳥七宿曰鶉首鶉火鶉尾玉女飄颻懐鴆媒而終老玉女見天篆序離騷吾令鴆為媒兮鴆告余以不好註鴆毒鳥也離家公子命已儷夫纎腰詳夀閻序失路才人恨終齊扵齲齒後漢書梁冀妻孫夀能作齲齒笑註若齒痛不忻忻也説文曰齒蠧也古人之怨千年地下之愁萬里見琴怨序沉之碧海纍纍鮫妾之珠述異記南海有鮫人水居如魚不廢緝織眼能泣珠吴都賦泉室潛織而巻綃淵客慷慨而泣珠鐫以青天歴歴媧皇之石見憺園序陳檢討四六巻八
