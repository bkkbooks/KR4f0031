body:
  text: 陳檢討四六巻三翰林院檢討陳維崧撰序瀛臺賜宴詩序粤以嵗次重光支逢作鄂三皇紀十干内辛為重光十二支内酉為作噩皇帝方居清暑之崇臺御招凉之邃舘用頒大酺式讌羣工漢紀文帝賜酺五日註大酺大飲酒也後唐宋皆因之若夫路入東華橋通西苑沙偏泥泥詩零露泥泥秋未露以何晞詩湛湛露斯匪陽不晞樹只騷騷夜不風而自響張衡思𤣥賦寒風凄其永至兮拂雲岫之騷騷庾信小園賦風騷騷而樹急霏微殘月銀弓猶掛於高城錯落踈星珠斗尚斜於逺岫見璿璣賦坐平沙之似毯肅俟傳呼藉嫩卉以如羅遥凴宣喚少焉赤烏毬躍見璿璣賦魚鑰争鳴芝田錄門鑰必以魚者取其目不暝用以守夜之義鑰管鍵也丹鳯書啣春秋元命苞火離為鳯皇啣書遊文王之都故武王受鳯書之紀龍樓蚤闢見膝王賦雞人喔喔飛繡鞚以遄催周禮雞人夜呼旦以嘂百官註能歌雞鳴之人也劉禹錫詩城中晨雞喔喔鳴虎賁駪駪翼珠珂而並入周官虎賁氏掌領虎士八百人軍旅㑹同君宿于外則守王閑詩駪駪征夫爾雅珂餙馬具梁簡文行馬詩晨風白金絡桃花紫玊珂紅門􅌄窱見憺園賦水靣已維青雀之艭見膝王賦紫掖逶遲宫闕志天有紫微人主象之曰紫宫紫禁紫闥紫掖殿曰紫宸京都之衢曰紫陌逶遲載詩栁絲先隠黄龍之舳見膝王賦俄傳汎艇盡許登舟斯時也太液波紅一奩靺鞨宫闕志太液池在建章宫北唐寳記靺鞨國産紅寳石大如巨栗中國因名靺鞨上林烟碧滿㡧玻璃衡宏漢舊儀上林苑離宫七十所容千乘萬騎名果樹二千餘種按始皇建在渭南苑内漢因其名黄山谷詩畫出西樓一㡧秋註猶一幅也黄頭擁畫楫以平摇摭言舟師名黄頭郎以土勝水故名史記鄧通以擢舩為黄頭郎長鬛撥蘭橈而競發左傳吴伐楚戰于長㟁楚師繼之敗吴獲其乘舟餘皇吴使長鬛者三人潛伏舟側曰我呼餘皇則對師夜從之取餘皇以歸楚詞桂棹兮蘭枻庾信詩蘭橈避狄洲千衫艾葉見憺園賦映水蓼以彌鮮萬綬桃花見半繭賦雜風荷而倍嫮鵁鶄唼呷四圍皆王母靈禽相如上林賦交精旋目註鵁鶄睛交而孕説文唼呷聲也海錄碎事軒渠國多九色鳥亦名錦鳯其色青多紅少謂之綉鸞常從弱水西來或云西王母之禽也漢武故事七月七日忽有青鳥飛集殿前東方朔曰王母欲來有頃王母至青衣相随乃先二鳥也竹栢微茫一片悉嫦娥寳樹詳徐母序中流遥矚青為好畤之田秦紀始皇東遊祀八神于太山梁父以天好隂雨祠之謂之好畤註畤封土而祀也秦四畤漢五畤極浦凝眸見膝王賦黄是昭陽之瓦詳皇士序誰知帝室皇居之畔别自成村孔融表帝室皇居必畜非常之寳未審南唐北宋之間疇工此畫三唐紀前唐自髙祖厯二十主二百九十年後唐自莊宗厯四主三十九年南唐烈祖都金陵傳璟煜共三十八年宋紀北宋自太祖至欽宗一百五十年南宋自髙宗至帝昺一百五十二年按南唐北宋多名畫行到瓊樓玊宇天上晴多王子年拾遺記翟天師乾祐嘗于江岸玩月俄見月規半天瓊樓玊宇爛然數息移時不復見矣除將鳯䑵龍艑世間秋少隋志煬帝遣陸士澄徃江南採木造龍舟鳯䑵等數萬艘爰乃停彩笮弭牙檣漢鼓吹曲桂樹為君船青絲為君笮釋名引舟者曰笮梁黄淡思歌象牙作帆檣註帆檣柱也陟坡陀沿峭蒨博雅陀陂廣袤貌廣韻陀不平貌峭蒨見膝王賦註屢遵輦路距帳殿以非遥㡬折繚垣隔幔城而不逺沈約詩帳殿臨春御石林燕語宋殿廬幕行時撤而載之帳殿幔城皆行幕也山呼以拜魚貫而前漢紀武帝登嵩髙山御史屬車在旁吏卒咸聞呼萬嵗者三註後世稱山呼本此易貫魚以宫人寵時則曈曨綺旭赭袍随繡繖交輝廣韻織絲綾為盖曰繖金志國王繖或紅或黄赩赫彤霞御榻屹花磚相向唐書學士入直視花磚日影忽覩紛綸之狀陳於殿廡之間夫其叠繪成峰吹紈散霧千端霜雪割完碧海之綃述異記南海有鮫人水居如魚不廢機織織輕綃于泉室出以賣之為服入水不濡北窗瑣言唐張建為幽州司馬徃渤海遇水神遺之鮫綃乃自賫以進眀宗于溽暑時如對霜雪百篚雲霞販盡平陵之彩見膝王賦庾信謝賚絲布啟平陵夜月驚聞擣衣郡國志梁州女郎山張魯女浣衣于石上女便懷孕生二龍及女死將殯柩車忽騰此山遂𦵏焉其水旁浣衣石猶在後平陵城有女郎山祠按扶風及濟南郡厯城縣山西汶水縣江南溧陽縣俱稱平陵鶴頭綾織自尚衣局内庾肩吾謝武陵王賚白綺綾啟圖雲緝鶴鄴市稀逢謝惠連詩客從逺方來遺我鶴文綾晉盧志傳帝賜志鶴綾袍一領輟耕錄尚衣局乃尚方所用也毬路錦齊東野語紹興御府書畫有毬路錦䄂錦玊軸漂從裂帛湖旁補註雙心檀暈三殿齎來五福鈿窠九重飛下三殿九重見璿璣賦􅌑瓏單複擬綺毳以逾温周禮毳毛畫虎雖毛註獸毛褥細者綷䌨縱横見半繭賦笑豐貂之未暖雖使量來玊尺莫罄恩長晉書荀朂暗解律吕因正雅樂阮咸心謂不調朂忌之後有耕者得周時玊尺荀以校已所制樂制皆短一黍于是服阮神識並詳九日序縱令負用銅仙難勝貺重見滕王賦註何期晝永月墮懷中詎信秋初春還袖底擎來水涘鴛鴦解妬以増啼古詩文綵雙鴛鴦裁為合歡被捧向林臯孔雀生慚而輟舞齊書文惠太子織孔雀毛為裘又鎮州貢孔雀羅無何而雁翅筵排補註魚鱗幄比九歌魚鱗屋兮龍堂沙眀水浄飄颺張紕幕三千天􅒯堤平重叠列華䄄十二紅蘭壓架恰照文廊别賦見紅蘭之受露李義山詩玊砌銜紅蘭紫蕚成叢偏摇黼帳銀罍告濯翠釡云調杜詩紫駝之峯出翠釡然而羊臑雉醢未便稱珍說文肘下曰臑肉醬無骨曰醢鴨粣雞纎何由示美説文粣糝也即今橵子九歌濡雞醬醢宋玊招魂露雞臛􅏲即或弋來紫鵠落雋永於雲端獵得黄麞致羶薌於海外爾雅麞麋屬亦謂黄羊周禮註羶羊脂薌牛脂謂以脂膏煎和也羮湘錦帶餅裏紅綾杜詩滑憶雕胡飯香聞錦帶羮註荆湖有錦帶花紅白如錦苗嫩脆詩于以湘之註烹也唐紀帝幸南内興慶池方食餅餤時進士在曲江有聞喜宴命御厨各賜一枚以紅綾束之徐演詩莫欺老缺殘牙齒曽吃紅綾餅饀來牢丸既弱似飛綿薄夜亦柔如積素束晳餅賦可以通冬達夏四時咸宜者其惟牢丸乎爾乃弱如春綿白若秋練氣勃欝以揚布香飛散而逺遍段成式食品有籠上牢丸湯中牢丸子瞻誤為牢九荀氏列饌傳春祠用饅頭夏祠以薄夜代之註餅屬也抑猶未足以誇禁臠之腴而奪侯鯖之麗也晉史初元帝公私交窘得㹠以為美項上一臠尤佳輙以薦帝呼為禁臠西京雜記王氏五侯不相能賔客不得來徃婁䕶傳食五侯問盡得其歡心競致竒膳護合以為鯖字林鯖雜肴也煎和五味之名繄爾臣僚夙厭江河之味惟兹卿尹半居魚稻之鄉倘遂庖虚魴鯉曷用為歡若其俎乏鱨鯋安能取飫獻師芳餌乍垂綸於百子池頭周禮獻人春獻王鮪隂符芳餌之下必有懸魚三輔黄圖漢上林有池十五所武帝于七月七日臨百子池作于闐樂饔宰雕盤旋斫鱠於九成宫外唐書上賜學士食曰蓬池鱠山谷書跋元章為余斫霜鱠宫闕䟽隋楊素作仁壽宫後以犯隋文帝諱改九成宫唐太宗後修以避暑假之雷雨銀鬐䬃爽以能飛劑以鹽梅錦鬛軒騰而欲動李詩雙鰓呀呷鬐鬛張撥剌銀盤欲飛去於是頻頒瑶斚滿瀝金觥百壺急送風前之喝盞參差杜詩百壺那送酒如泉陶成九曰宴享衆樂皆作謂之喝盞元制有喝盞之儀三雅横飛樹底之行杯絡繹東觀漢紀今日嵗首請雅壽註雅酒閜也曺丕典論劉表子弟制酒器三雅大者伯雅次中雅次季雅酒痕縹碧都粘學士之袍曺植賦蒼梧縹清註綠酒也劉楨賦凴彤玊之几酌縹碧之樽隋書王績待詔日給酒一斗號斗酒學士釀色鵞黄杜詩鵞兒黄似酒齊上叅軍之袂補註按桓温有主簿善别酒佳者青州從事惡者為平原督郵附註漏沉虬箭張衡刻漏制以玉虬吐漏水浮箭為刻説文似龍而有角曰虬尋日影之將斜風捲鵷班詳銀臺啟倐珮聲之蚤散重申天語倍荷皇慈堯階抃舞氷藕堆空文囿趨蹌碧蓮委地盈襟菱芡横抛興慶之緋珠宫闕志開元二年以宅為興慶宫中有興慶池一握葡桃亂灑平陽之銀豆平陽見滕王賦䭾裝寳馬共鴛綺以繽紛見夲篇上攜出銅龍見滕王賦龍樓亦名銅龍張晏註門樓上有銅龍也滿鳯城為歡笑事原秦穆公女吹簫鳯降其城因號丹鳯城其後言京都之城曰鳯城九衢迎問何來方朔之桃萬户傳觀不數河陽之菓臣綴微班猥叨異數才慚鮑俊菖蒲𢋫燕鎬之詩文遜班香芍藥奏横汾之曲呉園次林蕙堂全集序山名唐貢峰接道場常州志唐貢山在宜興湖州志道場山南唐有高僧寓此水號洮湖波通上若呉興志長蕩湖一名洮湖宜興記上若村下若村俱出美酒呉雲入越家家以茶笋為生魯柝聞邾處處繞烟波成市惟彼常湖兩郡夙稱唇齒之邦曽聞召杜名賢出作呉興之守循良傳召信臣字翁卿為南陽太守愛民如子號曰召父杜詩字公君亦為南陽太守時語曰前有召父後有杜母輿志湖州府三國時呉曰呉興隋唐曰湖州其人也畫省望郎漢官儀尚書省中以胡粉塗壁畫七賢烈士曰畫省曰粉署李義山代鄭謝表極望郎于南省東坡詩東川得望郎金閨貴客江淹别賦金閨之諸彦註金閨金馬門也東方朔曰公孫𢎞等待詔金馬門鵲爐螭舫推詩酒之總持舞扇歌裙擅湖山之宗主時則秦川公子争願依劉後漢書王粲山陽高平人曽祖龔祖父暢皆漢三公獻帝西遷粲徙長安蔡邕見而竒之曰此王公孫也後避亂往依劉表荆州謝靈運王􅀢詩序家本秦川貴公子孫遭亂流寓自傷情多闗中志自函谷至隴㡳相去千里曰闗中亦曰秦川西鄂文人咸思御李輿志江夏鄂縣乃東鄂范曄後漢書張衡字平子南陽南西鄂人也少善屬文駱丞過張平子墓詩西鄂該通理陽擅徳音註南陽府有西鄂城漢李膺傳膺性簡亢惟以荀淑為師荀爽嘗謁膺因為其御既還喜曰今日得御李君矣白蘋洲上兼明書蘋為大萍其花正白色湖州圖經霅溪東南有白蘋洲人謂為不滑之蓴栁惲詩汀洲採白蘋日落江南春依稀通徳門髙見祖徳賦碧浪湖頭湖州城南彷彿華隂上市見憺園賦銅蠡夜滴徐陵玉臺新咏序銅蠡晝静漢書張衡漏水水制以銅為器實以清水各開孔以玉虬吐漏入兩壺右為夜漏左為晝漏尚簇麟衫見憺園賦鐵鳯晨開薛綜西京賦註圓兩闕上作鐵鳯令張翼舉頭敷尾陸倕石闕銘序銅爵鐵鳯之工便翻鶴盖見祖徳賦三眀七穆槖鏤管以俱來漢書張安世持槖筆事孝武數十年稱忠謹中興書諸葛恢字道眀避難過江與潁川道眀闓陳留蔡道眀謨號中興三眀時人歌曰中興三眀各有名蔡餘氏儒雅荀葛清鄭七穆世次鄭穆公十三子靈襄嗣位十一子為大夫後餘七子各自為氏罕氏駟氏賦國氏良氏㳺氏豊氏印氏號七穆鏤管見璿璣兩到雙丁捧敦槃而狎至宋書到彦之長子元慶益州刺史次子仲慶從事中郎其曽孫洽與兄溉以文學知名武帝曰諸到可謂才子時以方二陸又從弟沆名亦著云雙丁見憺園賦梁元帝贈到溉洽詩魏世重兩丁晉朝稱二陸何如今兩到復似凌寒竹周禮玊府職若合諸侯則供珠盤玊敦註槃以盛牛耳敦以盛血獨有鄙人况居旁邑調絃待奏情含流水之中吕氏春秋楚人伯牙善鼔琴鍾子期聴之意在髙山曰巍巍乎若泰山志在流水曰蕩蕩乎若流水子期死伯牙擗琴絶絃不復鼓以世無知音也滅刺難全客在亂山之外禰衡傳衡氣尚剛傲矯時慢物建安初遊許下隂懷一刺既而無所適至于刺字漫滅惟衆客實嗤其拙乃先生正賞其愚既而陶潛解組仍住潯陽見祖徳賦詳儲太翁啟梅福抽簪偶來吴市髙隠傳梅福字子真為南昌尉數上書言事及王莽顓政福一朝棄妻子去人傳以為仙其後人有見福于㑹稽者變姓名為吴市門卒云乃於失職之辰宋玉九辨坎廩兮貧士失職而志不平猥有下交之雅殷勤訪戴流連杵臼之間晉書王羲之子徽之字子猷居山隂夜雪初霽忽憶戴逵在剡溪便乘小舟至門而返後漢書公沙穆遊太學無資糧乃變服客傭為吴祐賃舂祐與語大驚遂定交于杵臼之間慷慨推袁跋扈風雲之氣晉袁宏傳宏字彦伯桓宣武命作北征賦既成咸嗟嘆之時王珣在坐云恨少一句得冩字足韻宏即攬筆益云感不絶于予心泝流風而獨冩公謂王曰當今不得不以此事推袁跋扈見憺園賦時則鄙人國䇿五羖大夫荆之鄙人也方嬰痼疾詳銀臺啟屬江花之就落見看奕賦按江淹夢過郭璞曰吾筆在卿處多年可見還江還之後詩無美句時入謂之才盡甫遘鍾期見本篇當潘髩之將凋方逢鮑叔潘岳秋興賦班鬢髟以承弁兮髪素颯以垂領列子管仲曰生我者父母知我者鮑子嗟乎文舉何人詳九日序及潘母啟子卿足下見尺牘序干戈載道偏乘單舸以遄來閥閲交衢獨造寒門而徑去君非有為僕豈無心自此遊從彌淹嵗月東吳麋鹿美人綺羅之塲國䇿子胥諫吴王曰臣恐姑蘇不久為麋鹿所遊南國鷓鴣覇主繁華之窟李白越中懷古越王勾踐破吴歸義士還家盡錦衣宫女如花滿春殿只今惟有鷓鴣飛異物志鷓鴣懷南不思北徂故鄭谷詩云坐中亦有江南客莫向春風唱鷓鴣註詞有鷓鴣天禽經子規啼必北向鷓鴣飛必南翔以及寒梅縞夜瘦菊叢秋蔵鈎賭酒之塲刻燭分題之㑹辛氏三秦紀昭帝母鈎弋夫人手拳而有國色武帝寵之世人蔵鈎法始此藝經蔵鈎即今蔵􅍐摭言張祐幕中賭酒南史江拱蕭文琰丘令楷以文並稱竟陵王夜集賦詩約四韻刻燭一寸并詳三芝序觴餘舞蔗見半繭賦紅燭熏天杜審言詩殿前燈燭上薫天奕罷横刀赭羅䬃地補註西都賦紅羅䬃纚綺組繽紛先生莫不踔踸此間陸機文賦故踔踸于短韻註聲散貌又行貌賤子亦復激昂其末賤子詳禹平序激昂詳天章序註一日者水國斜陽坐客半更衣而起詳藝圃序髙臺古樹羣公皆載酒而從君顧挽余吾其語汝昔者結繩而降代有篇章五帝編伏羲氏造書契代結繩雨粟以還人多譔述淮南子蒼頡書而天雨粟鬼夜哭自俗學之師心致前型之偭矩離騷固時俗之工巧兮偭規矩而改錯註偭背也原其流失厥有二端紇庫干運筆成錐北史紇狄干北齊人為太宰不知書署名為于字逆上畫之時人謂之穿錐斛律金署多類屋北齊書斛律金字阿六敦朔州敕勒部人善騎射官汾州刺史又斛律敦不識字苦其難署改名金從便昜猶以為難神武指屋角令識之陸渭南詩屋角明金字溪流作縠文宿儒老子髙譚内則歸蔵補註末學小生初識孝經論語隋書蔡王智積有五男止教讀論語孝經恐諸子有才能以致禍也上車不落便尊唐宋而薄周秦體中何如輙譽開元而卑大厯南史宋時用人乖實有謡云上車不落為著作體中何如作秘書唐紀𤣥宗開元二十九年代宗大厯十四年詩品開元為盛唐大厯為中唐大厯十才子盧綸錢起韓翃吉中孚苗發崔峒耿湋偕夏侯審李端司空曙是則胸無故實笥鮮縹緗隋書經籍志秘書監荀朂曰魏鄭黙中經更著新薄盛以縹嚢書用緗素文選序文人才子名溢縹嚢飛文染翰卷盈緗怢註縹青白色緗淺黄色以縹為嚢以緗為帙裸民誚霧縠為太華矉女憎西施之巧笑子虚賦雜纎羅垂霧縠師古曰言其輕靡如霧也莊子天運爲西施病心而矉其里里之醜人亦捧心而矉其里里之富人堅閉不出貧人挈妻而去之吴越春秋越王得山中女子鬻薪浣紗為世絶色姓施名夷光居苧羅山若耶溪之西故曰西子註溪旁有東施家西施家此其為弊一也或則僅解蟲鐫雕蟲見璿璣賦韓詩爾雅註蟲魚差工獺祭談苑李商隠為文多檢閲書冊左右鱗次號獺祭魚悔讀南華之卷不精爾雅之篇唐書令狐綯嘗以舊事訪温庭筠答曰事出南華經非僻書也願相公爕理之暇時一覧古綯怒奏庭筠有才無行筠有詩曰因知此恨人多積悔讀南華第二篇註莊子號南華真人二篇齊物論也按温又有孤負南華第二篇之句世説蔡謨渡江見彭蜞似蟹烹之既食吐下方知非蟹後謝仁祖曰卿讀爾雅不熟倣蘭成碑版之作祇堪借靣弔䘮庾信本傳信小字蘭成所著多碑銘文魏紀人問禰正平荀令君趙盪冦足盖當世乎禰曰文若可借靣弔䘮稚長可監厨請客意以荀但有貌趙徤啖肉也註趙為盪冦將軍傚醴陵離别之言僅可送人作郡醴陵見有奕賦離别詳無沗序渚宫故事晉羅友家貧乞禄桓温許而不用同府人有得郡者温為坐序别友亦被命至尤遲温問之答曰臣出門于中路見鬼揶揄云我只見汝送人上郡何不見人送汝上郡友始怖終慚因遲至温笑其滑稽以為襄陽太守不知六詩三筆每每以古鬱稱竒六詩詳天篆序梁書元帝為湘東王嘗記錄筆有三品忠孝全者用金管書之徳行純粹者用銀管書之文章贍麗者用班竹管書之四庫五車徃徃以沉雄入妙唐書𤣥宗書分四部甲乙丙丁為次四庫其本有副有正荘子天下篇惠施多方其書五車徒組紃笙簧之是侈詳素伯序將風雲月露其奚為隋書李諤上書曰魏之二祖忽人君之大道好雕蟲之小技連篇累牘不出月露之形積案盈箱盡是風雲之狀是則刻雲端之木雁未必能飛詳藝圃序琢箭上之金徒何曽解舞見璿璣賦成都粉水弱錦濯而寧鮮華陽國志巴郡江西縣有清水穴巴人以此水為粉皜曜鮮芳蜀志濯錦江以水濯錦倍艷按鄖陽房縣亦有粉水源出房山曰房陵粉水蕭何夫人于此漬粉河北花箋鈍筆描而失麗見尺牘序益成撏撦詳徴文啟劣得揣摩國䇿蘇秦簡鍊以為揣摩此其為弊二也以此二弊足暨諸家今吾詎有是乎惟子知其免矣且夫韓起雙環俱蟠龍雀左傳韓宣子有玊環其一在鄭商宣子謂子産曰起請夫環註同工共璞自共為雙也北史赫連勃勃造有龍雀大環干將兩劍並截蛟犀張華傳華見豊城有紫氣因補雷煥為豊城令煥掘獄基得石函有寳劍一題曰龍泉一題曰太阿送一與張華華曰此干將也莫邪可復至否漢王褒頌巧冶鑄干將之樸水斷蛟龍陸剸犀象胡非子負長劍赴榛薄析兕豹赴深淵斷蛟龍粤沿古以迄今羌無竒而不耦是故珊瑚筆格互説庾徐詳天篆序按錢思公有珊瑚筆格鑣北史文苑傳序徐陵庾信分路揚翡翠書牀交推温李玊臺新咏序琉璃硯匣終日随身翡翠筆牀無時離手唐詩話温庭筠工為辭章與李商隠齊名世號温李晉家潘陸梁氏隂何鍾嶸詩品陸文如海潘藻如江謂陸機潘岳也隂鏗字子堅善五言詩為梁湘東法曹叅軍何遜字仲言為梁揚州法曹水部員外即與隂鏗俱以能詩名世號隂何杜詩試學隂何苦用心南朝則江鮑齊名杜詩流傳江鮑體謂江淹鮑照也北府亦温邢競爽北齊書温子昇邢邵與魏收稱北朝三才競爽詳掌亭誄歌樓麗句元白同聲唐新書元稹詩與白居易名相埒天下傳諷號元和體徃徃播樂府酒舍香詞周秦繼響詞集周邦彦字美成其詞撫冩物態曲盡其妙有清真集二卷後集一巻秦少遊高郵人豪俊慷慨溢于文辭按周必大字子充亦著樂府詩昔人所載何代無賢當斯世而有吾兩人也寧集成而無子一言乎僕愧其情懼違所請屢趣未應既負諾以逾年擬作難工復含毫而彌日屬當諷諭之再三爰誌揄揚之萬一兩都賦序雍容揄揚為魏公蔵拙數行敢云金玊之投世説魏收録其文集遺徐陵令傳江左徐悉沉于江云吾為魏公蔵拙惟惠子知余異日亦望瓊瑶之報莊子秋水篇惠子曰子非魚安知魚之樂莊子曰子非我安知我不知魚之樂既已知吾知之而問我我知之濠上也曺植與楊修書其言之不慙恃惠子之知我詩報之以瓊瑶陸懸圃文集序將使江蕭染翰見園次序註弁龍門紀事之文史記序司馬遷太史談之子生于龍門故稱龍門之史潘左操觚潘左見滕王賦文賦操觚染翰註觚木之方者古人用以書猶今之簡序鹿洞談經之作輿志白鹿洞在五老峯下唐李勃與兄涉隠此洞中嘗養一白鹿故名宋朱晦菴講學于此則筵前授簡見璿璣賦請以屬之他人座上揮毫願以俟夫君子何則燕函越鏄逓有耑家北轍南轅要難並詣見尺牘序一踈一宻既意隔而靡宣或質或文復情暌而罕儷然而諸家立説趣夲同歸百氏修辭理惟一致倘毫枯而腕劣則散行徒增闒茸之譏苟骨騰而肉飛則麗體詎乏驚竒之譽補註原非涇渭潘岳西征賦北有清渭濁涇西京賦帶以洪河清渭之川史記涇水一石其泥數斗註涇濁渭清也俱在長安北詎類元黄易先生姓陸氏名廷掄字懸圃楊之興化人也淮海逸民天山遯客書淮海惟揚州易天下有山遯周燮之結廬岡畔髫鬌知亷汝南先賢傳後漢周燮汝南人始在髫鬌知亷譲陳蕃薦其學行深純以羔幣聘之不赴有先人草廬結于岡畔下有陂田嘗奮力以自給非身所耕種不食内則子三月擇日剪髪為鬌註髻也男角女覊王丹之載酒田間鄉閭致敬後漢書王丹于哀平時仕州郡後隠居王莽連徴不起每嵗農時嘗載酒殽詣田間以勞勤者而勵其惰者尤躭墳籍詳天篆序註雅嗜綈緗見園次序高文通庭中雒誦雖漂麥以奚傷漢書髙鳯字文通少躭學家以農為業妻嘗之田曝麥于庭令鳯䕶雞時天暴雨鳯持竿誦經麥為潦水所漂妻還怪問鳯乃省雒誦詳三芝序註朱翁子道上謳吟縱負薪而自若朱買臣傳買臣字翁子家貧賣薪自給行歌誦書束晳讀書賦買臣行吟而負薪愽聞强記禮説經傳嶽嶽之名見祖徳賦起例發凡杜預左傳序經之條貫必出于傳傳之義例總歸于凡其發凡以立例皆經國之常制譚史得觥觥之號見祖徳賦然而夙嬰板蕩蚤㑹仳離詩炎精乍燼普天興銅馬之妖漢書漢以火徳旺杜甫太廟賦赤精衰歇後漢書銅馬賊亂關西光武帝討平之存心錄紹興年成都郫縣出銅馬髙三尺中宵風雨忽聞嘶聲附註姬籙將遷詳素伯序註出地兆蒼鵝之釁五行志晉永嘉中洛陽步廣里地䧟有蒼白二色鵝出蒼者飛去白者不能飛陳留董養嘆曰步廣周之翟泉㑹盟地今二鵝蒼者胡象白者國家象也後劉曜石勒相繼為亂先生則土室繩牀詳孝威序何知蛇鬬左傳初内蛇與外蛇鬭于鄭南門中内蛇死六年而鄭厲公入楮冠葛屨不驗狐祥家語原憲楮冠藜杖而應門詩葛屨五兩吕氏春秋禹年三十而未娶行塗山有白狐九尾造禹塗山人歌曰綏綏白狐九尾龎龎成子家室乃都攸昌遂娶之山海經圖九尾狐讃曰青丘竒獸九尾之狐有道翔見出則衘書作瑞周文以標靈符摧其芒角甘埋照以終年天官占太白白帝之子徑一百里角徭則兵起史記註角芒角也顔延之詩沈醉似埋照注照光也息彼機橦擬達生而用老荘子天地篇漢隂丈人曰有機械者必有機事有機事者必有機心六書故直為橦衡為杠詳貞女序荘子有達生篇既而興朝當璧誼辟承乾左傅埋璧于庭使五人入拜平王弱抱而入再拜皆壓紐六千來伯越之人八百有歸周之國國語越王中分其師以為左右軍以其私卒君子六千人為中軍越世家勾踐發習流二千教士四萬人君子六千人諸御千人伐吴周書不期而㑹孟津者八百國而君也敢離隠豹竊比伏鸞劉向列女傳陶答子治陶三年家富三倍其妻泣曰妾間南山有𤣥豹隠霧雨七日不下食欲以澤其衣毛至于犬豕不擇食故肥而見取今能無禍乎世說世目鄧士載為伏鸞陸士龍為隠鵠賈誼賦鸞鳯伏竄兮䲭鴞翺翔江流涪萬杜詩衆江㑹涪萬註涪萬峽中二郡名涪江在梓州錦固屢濯而逾鮮見園次序火熸崑岡玉以遭焚而倍潔書火炎崑岡玉石俱焚不改衡茅之業依然山澤之遊於是縱横六藝樂踰南靣之榮世說李謐字永和棄産營書每嘆曰丈夫擁書萬巻何假南靣百城貫串諸家氣厯萬夫而上六韜太公曰屈一人之下伸萬人之上兎園半册篆竹素以蟫紅劉岳傳馮道入朝任贊劉岳在後道數反顧贊問道顧何為岳曰遺下兎園册耳按漢書孝王卒其兎園置官籍租税供祀其簿籍皆俚語故田夫牧子所誦曰兎園冊譏詞也此借用風俗通劉向為成帝校書皆先書竹改易刋定可繕冩者以上素張景陽詩游思竹素園廣雅蟫一名蚋俗呼蠧魚馬磨三間翳蓬蒿而蠆紫蜀志許靖少與從弟邵俱知名而情不恊邵與郡功曹排擯靖不得齒序以馬磨自給書㫁索靖草書絶代名銀鈎蠆尾左太冲作賦筆札堆籓圂之間見憺園賦張壯武屬文史籍載車箱之内晋書張華字茂先愽物洽聞書三十乘位司空封壯武郡公郝隆書在腹經曬後以偏多晋書郝隆字仕治七夕日人皆曬衣物隆卧庭中人問之曰曬吾腹中書耳楊子經成瓿縱覆焉而不盡楊雄傳雄著太𤣥劉歆曰恐後人用覆醬瓿也芸籖壓架詳三芝序及澹菴序知為曺氏之倉拾遺記曺曽于光武時從歐陽歙受尚書積石為倉以蔵書號曺氏書倉玊軸連雲詳三芝序識是杜家之庫晋杜預傳預字元愷多聞愽學朝野號曰杜武庫言無所不有也爾其枯杉怪石貌以醜而能竒瘦竹蒼藤埶以危而得秀么絃急拍峽中無不呌之猿通俗文不長曰么又小也陸機文賦猶絃么而徽急故雖和而不悲晋樂府巴東三峽巫峽長猿鳴悲夜鳴三聲淚沾衣裳落木荒江樹上有長飛之鵲魏武短歌行月眀星稀鳥鵲南飛繞樹三匝無枝可棲兩山束處不忘拏攫之心見憺園賦獨澗停時尚作潺湲之想屈原九歌觀流水兮潺湲鷹雖就鏇以思飛北史符秦權翼曰譬如縧鷹聞風飇起常有凌霄之志杜甫題畵鷹詩條鏇光堪摘註鏇圖轆轤也虎至攀牢而必怒補註郭翁伯形容眇小居然閭里之雄史記漢郭解字翁伯為人短小精悍始以遊俠睚眦殺人後折節改行救人之命不矜其功嵇叔夜狀貌傀俄信是仙靈之器晋稽康傳康丰姿俊逸醒若孤松獨立醉若玊山將頺導氣養性著養生篇更有粘天盪日洋洋辨道之篇裂石崩沙杰杰哀時之論補註發皇萬態補註風雷踸踔於行間書法要録謝靈運書猶飛湍激矢電流雷震踸踔見園次序籠罩千秋衮鉞砰􅗟于字裏糓梁傳序一字之褒榮于華衮之贈一字之貶嚴于斧鉞之誅相如上林賦砰磅􅗟礚註石聲龍馬抉三才之奥緑水浮來見璿璣賦龜蛇蟠八陣之圖丹弧射下詳觀槿序諸葛亮傳亮推演兵法作八陣圖天地風雲飛龍翔鳯虎翼蛇蟠也庾信賀婁慈碑兵書七巻河水浮來戰法三篇天弧射下手柔弓燥詳藝圃序據鞍為勑勒之歌詩紀北齊無名氏作勅勒歌有曰勅勒川隂山下天似穹廬盖四野樂府廣題北齊神武攻周王璧恚憤疾發引諸貴使斛律金唱勅勒註其歌本鮮卑語易為齊言一作無名氏腦滿腸肥斫陣作普梨之曲北史斛律光曰瑯琊年少腸肥腦滿山谷書䟦米元章書如快劍斫陣樂苑西畨之樂名普黎普一音玻黎一云璃北魏時横吹又曰雍離幟張垓下楚漢之卒皆驚漢紀韓信出竒兵馳入趙璧皆拔趙旗立漢赤幟趙軍驚亂遁走史記項王軍壁垓下漢軍圍之數重夜間漢軍四面皆楚歌項王乃大驚劍出室中晉鄭之頭畢白越絶書楚王令風胡子之吴見越歐冶子吴干將使二人為鐵劍名泰阿晉鄭求之興師圍楚王于是引泰阿之劍登城而麾之三軍破敗士卒迷惑流血千里江水揚折晉鄭之頭畢白洵哉墨海之洪濤展矣文峯之鉅嶽矣文房四譜黄帝得玉一紐治為墨海其上篆文曰帝鴻氏之硯後漢李尤墨硯銘書契既造墨硯乃陳文峯補註慨斯世之髙文有寧都之魏叔原註魏禧字氷叔江西寧都人偎因品隲之次沿及鄙人獨於駢偶之家謬推蕪製君也書滛見憺園賦亦為痂嗜南史劉邕愛食瘡痂以為味似鰒魚昔者吴陵握手楊州志泰州漢海陵唐吴陵殊感豫州知我之言補註兹焉燕市郵書頻叨敬禮定文之託曹植與楊修書昔丁敬禮嘗作小文使僕潤餙之敬禮謂僕曰後世誰相知定吾文者耶成言已久食之慮涉於肥離騷初既與余成言兮左傳哀公晏于五梧孟武伯為祝惡僕人郭重之貌曰何肥也公曰是食言多矣能無肥乎註借此以激三桓之食言也宿諾難逋頭也懼來其責張敏集敏友秦子羽雖有姊夫之尊少而狎焉有温顒荀寓張華劉許鄒湛鄭詡繼踵登朝而此賢身處陋巷為之慨然又怪諸賢違王貢彈冠之義故因秦生容貌之盛為頭責子羽之文以戲之并以嘲六子焉其畧曰吾托子為頭萬有餘日矣禮與其有諾責也寧有已怨因其諈諉爾雅郭註以言相屬曰諈諉用以揄揚見園次賦敢曰韓非之附老子傳還私幸其同南史王儉與王敬則同拜三公徐孝嗣嘲之曰今日可謂連璧儉曰不意老子遂與韓非同傳按史記老莊申韓同列傳故儉以老子自喻亦云江神之見秦王貌則自嫌其寢云爾神異録秦皇於海中作石橋乃敬通于海神求與相見神曰我形醜約莫圖我形始皇乃從石橋入三十里與神相見按寢醜也方素伯集序一作北粤自結繩而降漸啟文眀書契以還代傳謨誥見園次序孤桐浮磬律既審於后䕫禹貢嶧陽孤桐泗濵浮磬虞書䕫命汝典樂聲依永律和聲黄竹白雲韻復釐於穆滿穆天子傳天子遊黄臺之丘獵平澤北風雨雪有凍人天子作黄竹詩三章以哀之又天子觴西王母於瑶池之上西王母為白雲謡曰白雲在天山際自出卯金當璧並熾才華金樓子孔子夢豊沛市有赤飇起呼顔回子夏徃觀之見赤蛇化為黄金上有文曰卯金刀後髙祖起豊沛云當璧見懸圃序典午膺圖彌躭風藻蜀志譙周常書板示文王曰典午忽兮典午者謂司馬也註讔語也張衡東京賦膺籙受圖大同天監益去兩京之遺梁書武帝改元大同十一年齊書和帝寶融改天監元年元和景龍猶仍六季之習唐紀中宗改元景龍四年憲宗改元元和十五年凡兹鉛槧見尺牘序悉稔吟謡不預斯流何名才子譬之枇杷盧橘無非上苑所充相如上林賦于是乎盧橘夏熟又枇杷橪柿唐子西山園記枇杷盧橘一也霧縠氷紈皆是後宫所御范曄宦者傳論氷紈霧縠之積盈牣珍蔵漢書齊地織作氷紈註紈細宻如堅氷也霧縠見園次序髙陽殿内補註小侯之玳瑁千重詳琅霞序金谷園中都尉之珊瑚十丈見憺園賦作昭眀之學士尚有高齋梁書蕭統字徳施小字維摩武帝太子也註文選三十巻又註陶詩開麟趾殿招集四方文士時劉孝綽與陳郡殷芸吴郡陸倕瑯琊王筠彭城劉洽等號髙齋學士起樂賢堂統年三十一卒謚昭眀髙齋見尺牘序按揚州及襄陽俱有文選樓入記室之詩評已多上品梁書鍾嶸作詩品分上中下位終諸王記室唐書中和中李途為東州掌記采摭故事為偶儷之句分四百門名記室新書附註東南孔雀句裏皆金樂府古辭孔雀東南飛五里一徘徊序云漢末建安中廬江小吏焦仲卿妻劉氏為仲卿母所遣乃自誓不嫁投水而死仲卿亦自縊時人傷之作仲卿妻詩按此其首二句也西北浮雲行間盡玊魏文帝雜詩西此有浮雲亭亭如車盖惜哉時不遇適與飄風㑹文苑梁簡文帝答新渝侯和詩書云風雲吐于行間珠玉生于字裏皖桐方素伯者金龜壓紐代有要人金稽録晉孔愉字敬康見入籠龜買而放之中流龜左顧數四及愉封侯鑄金印龜左顧者三印工以告愉悟而佩之壓紐見懸圃序註漢書黄金印龜紐文曰章一云漢二千石以上銀印龜紐文曰章二千石以下銅印龜紐文曰印黄雀投環世留隂徳續齋諧記漢𢎞農楊寳性慈愛九嵗至華隂山見一雀為䲭鶚所摶墜地螻蟻攅之寳懷歸置巾笥中餌以黄花百餘日雀愈朝去暮來忽一夕變為黄衣童子以白玊環四枚與寳曰令君子孫潔白位登三公當如此環後寳生震震生秉秉生賜賜生彪四世三公云陸士衡之祖父累躋台司陸遜傳吴主權拜遜偏將軍以功封華亭侯又拜輔國大將軍後假黄鉞為大都督後拜相次子抗襲封抗六子一子士衡名機世說盧志于衆坐問士衡陸遜陸抗是君何物答曰如卿于盧毓盧珽因謂弟士龍曰我祖父名播海内寜有不知鬼子敢爾劉孝綽之髙曽夙登鼎鉉梁書劉孝綽字孝綽彭城人本名冉仕梁祖勔宋司空忠昭公父繪齊從事中郎并詳三芝序易鼎黄耳玊鉉若乃少即清通幼而岐㠜詩徐孝穆綺才第一睛訝其青陳書徐陵字孝穆少即工文辭又于釋經多所精解目有青睛時人以為聰惠之相也王威眀妙譽無雙胞傳其紫南齊書王敬則母為女巫生敬則而胞衣紫色謂人曰此兒有鼓角相按王規字威眀誤用童年揖客解對楊梅郭子曰楊彪子修字徳祖九嵗時孔君平詣父父不在乃呼修出設果有楊梅孔戯曰此實君家果答曰未聞孔雀是夫子家禽按孔君平一作文舉暇日揮毫能題芍藥王筠傳筠字元禮年十六為芍藥賦甚美命不由人生逢多難詩楊家徳祖詳上篇庾氏子山見滕王賦一則丁炎祚之將傾謂徳祖一則值蕭家之既殄謂子山關東蛾賊白馬如風後漢書黄巾賊亦名蛾賊註音同蟻喻賊衆也河北鵶兒青袍似草唐書黄巢䧟京師陳敬瑄遣黄頭軍部將李鋋鞏成以兵萬五千數敗巢賊號蜀兵為鴉兒每戰輙戒曰毋與鴉兒鬪五代史李克用將兵河北賊惮之曰鴉軍至矣註軍皆黑衣也庾信賦青袍如草白馬如練並詳鴻客序辰傾岳圮宋微子有麥秀之歌庾信哀江南賦山岳崩頺史記箕子朝周過故殷墟作麥秀之詩以歌之其畧曰麥秀漸漸禾黍油油尚書大傳云微子所作國破家亡周大夫有黍離之嘆詩集序周既東遷大夫行役過故宗廟宫室盡為禾黍而作是詩時則尊府君宻之先生義激兵欄忠騰甲庫項羽本紀註索隠曰按天子門有兵欄曰司馬門也考工記犀甲七屬合甲五屬註甲庫所蔵也庾信吳明徹銘更入兵欄還輸甲庫攀車痛哭誼切王琨南齊列傳王琨于宋永初中武帝以其娶桓修女除郎中駙馬都尉歴仕進光禄大夫元徽中宋主下詔遜位于齊琨攀車慟哭百官雨泣後禇淵奉璽勸進撫狄沾襟情均索靖西京賦列坐金狄註金人也亦稱銅狄晋書索靖字幼安惠帝賜爵關内侯洛陽將亂靖指宫門銅駝而嘆並見半繭賦無何晉宗馬渡不用王導之言晋書元帝與宗室五人渡江惟帝得尊位初童謡云五馬浮渡江一馬化為龍王導傳導渡江見周顗諸人流涕因變色曰當共戮力王室克復神州張南軒曰元帝無慷慨謀國之誠言不能北伐也齊埭鷄鳴惟任褚淵之輩齊史武帝數幸瑯琊城當蚤發至湖埭鷄鳴因號鷄鳴埭註與􅀈同南齊書褚淵字彦回仕宋受眀帝顧託及廢蒼梧王淵曰非蕭公無以了此後求為齊官齊高帝曰吾有愧文叔知公為朱祐久矣先生既間關宵遁素北亦襁褓南奔淮南子成王幼在襁褓之中博物志襁褓縷為之約小兒于背上韋昭漢書註褓若今時小兒腹衣亡命蠻邦史記張耳嘗亡命遊外黄註命名也避讐嶺表班固通幽賦管彎弧欲避讐註管子射桓公中鈎猿啼灕水夜夜廻膓猿啼見懸圃序並詳無沗序灕水詳李母啟史遷報任安書膓一日而九廻雁阻衡陽朝朝掩涕衡州志府城南有回雁峯雁至衡陽則不過遇春而回或曰峯勢如雁之回故名離騷攬蕙以掩涕兮别賦廵層楹而空掩註掩涕也何遜詩掩涕閉金屏魏安釐之母弟質邯鄲而不歸史記魏公子無忌魏昭王少子公而魏安釐王異母弟也魏王怒子盗兵符矯殺晉鄙公子亦自知也使將将其軍歸魏而公子與客留趙庾肩吾之愛子望江東而難返庾信傳信父肩吾新野人隠居天台信後入仕北朝雖位望通顯嘗有鄉關之思乃作哀江南賦有云少微真士天台逸民並見滕王賦地名海角人是客兒晋書謝靈運小字客兒時則素北雖質亞生知而年猶未學任彦昇竟陵王行状道亞生知迨乎王琳失路事去南梁王琳傳琳字子珩事梁有忠義之節及敗為陳軍所執吴眀徹欲全之而其下將領多琳故吏眀徹忌之故及于難梁書琳求援于齊請納永嘉王莊以主梁祀抱忠于垂没鄧艾縋兵運移西蜀魏志景元中大舉兵伐蜀艾督軍自隂平道以氊自裹將士攀木沿崖魚貫而進遂平蜀廬江何𦙍遂返鄉園何𦙍傳𦙍字子季廬江潜人好學師事沛國劉瓛梁武帝時與兄何求何㸃皆隠遁世稱何氏三髙為通隠吴興沈烱言旋京國見滕王賦年當毁齒雅肴饌乎百家鄭元周禮註齓毁齒也時甫勝衣已笙簧乎六籍晋書賈午年十二短小未勝衣庾信賦纔能勝衣甫就小學抱朴子五典為琴筝百家為笙簧齊諧諾臯之志無不流連荘子逍遥逰篇齊諧者誌恠者也唐書段成式字柯古乃段文昌子著書名酉陽雜俎中有諾臯記上下二巻註諾臯太隂之名馬蹄秋水之篇咸歸披覽荘子馬蹄秋水二篇名珠生合浦便多結緑之名漢書孟嘗字伯周順帝時為合浦太守郡出珠寳前守貪穢珠漸徙交阯界嘗革前弊去珠復還國䇿范子獻書秦王曰宋有結緑梁有懸黎劍出豐城還擅干將之號見園次序張正見冠世才情五言尤善陳書張正見字見頥梁簡文帝在東宫正見年十二獻頌簡文深賛之厯仕梁陳有集十四巻行世其五言詩尤善左太冲軼羣筆札三賦猶工見憺園賦按三賦謂蜀都吴都魏都何殊翡翠之牀見園次序不異硨磲之椀廣雅硨磲石次王也梁簡文集車渠屢酌鸚鵡驟傾按魏文帝及王粲皆有車渠椀賦然而情深君父齋種白楊齊書蕭思話子惠開除少府意甚不得寺内所住齋前種白楊曰人生不得行胸懷雖壽百嵗猶為夭也又詳逸齋序身厯興衰曲多紅豆詩話王維有詞云紅豆生南國春來發㡬枝李龜年于湘中筵上歌之蕭大圜書牘頗聞辛惋居多見尺牘序劉越石詩章惟以悲凉為主詩品劉琨既體良才又罹厄運故善叙䘮亂多感恨之辭稽康琴賦序賦其聲音惟以悲哀為主庾信哀江南賦不無危苦之詞惟以悲哀為主况復紐散珠囊歌殘玉樹見滕王賦徐陵既老誰説華宗陳書徐陵自仕陳後文檄軍書及禪授詔䇿皆陵所製終陳之世七十七李廣不封疇憐故將李廣傳廣之先李信秦時為將廣世以能射知名文帝曰惜廣不逢時當髙帝時取萬户侯何難哉後以數竒卒未封侯十齡公子賣袖裏之眀珠補註七世王孫露腰間之寳玦杜甫哀王孫詩腰下寳玦青珊瑚可憐王孫泣路隅註𤣥宗夜半出延秋門諸王嗣在外者皆不及從按髙祖至𤣥宗之嗣約七世云借來秘本悉皆市上之書王充傳充家貧常于洛陽市閲所賣書一見能誦鑿得微光不過鄰家之火西京雜記匡衡好學貧無燭鄰家有燭而不逮乃穿壁引其光以書映光而讀於是反袂以歌臨文而嘆公羊麟者仁獸也孔子曰孰為來哉反袂拭靣涕沾袍曰吾道窮矣陳思王之上表臣獨何人魏志曺植抱利器而無所施上䟽求自試其自試表有云臣獨何人以堪長久陶泉眀之自祭將為異物陶靖節傳淵明卒于宋文帝元嘉四年壽六十三先自為文以祭賈誼鵩鳥賦化為異物兮又何足患吴歌魯酒詎足忘憂荘子胠箧篇魯酒薄而邯鄲圍淮南子魯趙獻酒于楚王主酒吏求酒于趙趙不與吏怒乃以趙厚酒易魯薄酒奏之楚遂圍邯鄲庾信哀江南賦楚歌非取樂之方魯酒非忘憂之用漢艷楚騷差堪破涕下註僕與諸方交惟兩世誦謝家之妙製尤喜阿連詳無沗序逢何氏之佳兒絶憐第五見祖徳賦晋書山濤父為濤娶韓氏人謂之曰佳兒佳婦用為兹序聊申膠漆之歡後漢書雷義字仲公與陳重為友鄉里語曰膠漆雖謂堅不如雷與陳畧寄斯懷豈待鱗鴻之請見尺牘序附注漢艷如樂府三婦艷䓁題三芝集序廣陵吴園次先生天上謫仙東方朔傳西王母謂朔昔為太乙仙宫令擅用雷電遂謫人間李白傳白至長安賀知章見其文章嘆曰子謫仙人也人間傲吏郭景純詩漆園有傲吏一麾出守為風月之主人顔延年五君咏其一咏阮咸云屢薦不入朝一麾乃出守唐書白居易以左拾遺貶江州司馬曰今得青山緑水中為風月主人幸甚獨徃名髙作煙霞之總管補註聴屧於滄浪亭北賃廡於臨頓橋西吳郡志吴王作舘娃宫建廊虚其下令西施步屧繞之則有聲後名響屧廊又吴縣城南有滄浪亭賃廡詳集生序按城東有臨頓橋又有臯橋因臯伯通名之衡門則羅雀雙扉見看奕賦都無雜客見憺園賦珊管則雕龍百幅史記鄒爽傳齊人頌曰談天衍雕龍奭劉向别録鄒衍談天若雕鏤龍文故曰雕龍梁書劉勰字彦和撰文心雕龍五十篇悉付佳郎見素伯序於是家擅鳯毛人誇犀角宋史謝超宗嘗作殷淑儀誄宋武傳帝嗟賞曰超宗殊有鳯毛王邵别導子邵字敬倫風姿似桓温望之曰大奴固自有鳯毛大奴邵也管子子産日角晏嬰月角尾生犀角栁下惠史魚反角鄭語史伯言幽王惡犀角豐盈李固傳鼎角匿犀劉氏則孝綽孝儀之外益以孝威孝綽見滕王賦梁書與五弟孝儀六弟孝威俱著名王門則僧䖍僧辨之餘加之僧孺南史齊王僧䖍曇首之子瑯琊臨沂人梁王僧辨神念之子太原祁人梁王僧孺魏王肅八世孫東海郯人非一族亦非一時不宜如此借用人珍五竇較燕山已獲其三俗艷雙丁笑鄴下尚輸其一見憺園賦允矣徳門之盛事洵哉藝苑之美談爾其黛管霏花彩毫爛錦夙鐘慧業生天原與貝葉為縁南史孟顗事佛為謝靈運所輕曰得道須慧業丈人生天當在靈運前成佛在靈運後顗恨之酉陽雜俎貝多葉出摩伽陁國長六七尺冬不凋梵語貝多波力又漢言西域冩經用此産兆竒徴墮地皆以芝蘭作字左傳鄭文公妾燕姞夢天賜與已蘭既而文公見之與之蘭而御之辭曰妾不才幸而有子將不信敢徴蘭乎公曰諾生穆公名之曰蘭當年崔珏名是鴛鴦詩話唐崔珏賦鴛鴦詩甚佳時人謂之崔鴛鴦此日魏收體髙蝴蝶北齊書魏收字伯起恃才使氣人號為驚蛺蝶楊愔思出其短徃復數畨收忽大唱曰楊遵彦理窟已倒愔從容曰我綽有餘暇山立不動若遇當塗恐翩翩遂逝註當塗者魏翩翩者蛺蝶也固以青牛帳裏見尺牘序聨篇芍藥之花見素伯序按芍藥一作錦名按傅毅妻有芍藥曰曄曄芍藥植此庭前寧徒朱鳥窗前詳天篆序滿篋葡萄之樹西京雜記霍光妻遺淳于衍葡萄錦二十四疋鄴中記錦有葡萄文桃核文工巧百數不可盡名鮑昭詩九華葡萄之錦衾沈約詩領上葡萄繡腰中合歡綺玉臺新咏序清文滿箧非惟芍藥之花新製聨篇寧止葡萄之樹若乃囊訴錢空牀嗟金盡杜詩囊空恐羞澁留得一錢看李詩牀頭黄金盡張平子歸田以後范曄後漢書和順二帝之時内豎専恣張衡不得志因作歸田賦以鳴意陶淵眀解組而來見祖徳賦償井公之愽進負滿十千穆天子傳天子與井公愽三日而决漢書宣帝微時與陳遵父遂慱奕後即位遂至太原太守帝賜璽書曰尊官美禄可以償愽進矣註進與債同貸營室之聘錢逋逾百萬下註天文志營室主宫室又曰東璧星入室有詬租之吏當軒聞戞釡之聲李賀詩户乏詬租吏戞釡詳集生序時則閒坐鯉庭論語狂呼驥子見祖徳賦紙還對劈攜兒登避債之臺通志周報王雖居天子之位為諸侯所侵多負債于人乃上臺逃避周人名避債臺韻可分􅍐掉臂入忘憂之舘見海棠賦千杯競勸扶一老之頺唐魏畧李豊字安國時人目夏侯太初如眀月入懷李頺唐如玊山之將奔梁地驅樂歌青青黄黄雀石頺唐百韻争飛沸兩親之譁笑行間織錦見璿璣賦大有萊衣見憺園賦懷裏探珠無非陸橘見憺園賦更或鶯廹人啼花催酒熟一帆乍返三徑繞晴詳梧月序杜門却軌漢書隠居杜門却軌註杜門不出却掃車軌没其迹不見人也跌宕於婦人愛子之間詳初眀序席地幕天徜徉於麗日和風之候劉伶酒徳頌幕天席地縱意所如蔵鈎甫罷見園次序爇紅蠟以攤書度曲將終倚緑篝而𨽻事廣雅篝薫籠也抽五花之寳簟詳少楹序長幼争梨見看奕賦製十錦之蠻箋寰宇記蜀中浣花溪有百花潭大歴中范寧鎮蜀其夫人任氏本浣花溪人後薛濤家其旁以潭水造紙為十色箋談苑韓浦韓洎能文洎嘗輕浦文如草舍予文乃造五鳯樓手浦寄詩云十様鸞牋出益州寄來新自浣溪頭老兄得此全無用助爾添修五鳯楼一作蠻牋弟兄奪棗見看奕賦老子顧之而極樂若翁見此以逾歡又若總角迎賔詩勝衣接客見素北序東都有道雲霞意氣之交詳雪持序註南國人倫玊帛衣裳之㑹左傳子貢曰盟所以周信也玊帛以奉之春秋傳齊桓衣裳之㑹九兵車之㑹三逢孟嘉於末座晋孟嘉傳嘉字萬年少知名太尉庾亮領江州辟為從事亮嘗大㑹客豫章太守褚裒問嘉安在亮曰在座卿但自覔裒目屬嘉曰此君小異亮由是益重嘉識楊修於蚤年見素伯序莫不珠玊為心見素伯序按王阮曰聴王景畧談咳唾皆珠璣蛟螭在手見璿璣賦玊簫始奏李詩鳯女吹玊簫詳藝圃序已繡完機女之房補註銅鉢方賡便畵滿旗亭之壁梁書齊學士刻燭為詩四韻則刻一寸蕭文琰曰無難乃與丘令楷䓁共擊銅鉢響未絶而詩已成并見園次序風俗通漢眀帝東廵泰山到榮陽有烏飛鳴乘輿上虎賁中郎將王吉射中之命作詞吉應聲曰烏烏啞啞引弓射洞左腋陛下壽萬年臣為二千石帝賜錢三百萬令旗亭皆畵為烏西京賦旗亭五重註市樓也詩話唐王昌齡髙適王之渙于旗亭酒舍聴妓歌其詩每一章各于旗亭壁上畵之香詞麗製約近千篇玊軸牙籖都為一集玉臺新咏序麗以金箱裝之寳軸韓詩鄴侯家多書架挿三萬軸一一懸牙籖新若手未觸命小胥而繕冩見懸圃序註杜詩抄書聴小胥託副墨以流傳荘子大宗師聞諸副墨之子副墨聞之雒誦註書之副墨也嗟乎我辰安在詩笑口難開詳掌亭誄杜牧詩塵世難逢開口笑生世不諧詳壽閻序憂心曷極詩棋上有不平之局彈棋見銅雀賦古今詩話彈棋譜乃唐人所作其局髙二尺中心髙如覆盆其顛為小壺四角微起李商隠詩莫近彈棋局中心最不平又云玉作彈棋局中心亦不平酒邉多懊惱之歌見海棠賦寄語尊公何勞永歎弄紅珠於掌上舍斯無取樂之方列仙傳許遜字敬之母夢金鳯啣珠墮掌而生晉初為旌陽令後仙去宋封真君江淹傷愛子賦痛掌珠之愛子杜詩掌中探見一珠新西京賦取樂今日曹植聞雞篇衆賔進樂方玩翠羽於堂前即此是消愁之物宋玉賦眉如翠羽白闕賦翠羽常低附注道書牽牛取天帝二萬錢偹禮久不還被驅在营室天文志天錢星十二形如圓錢陳檢討四六巻三
