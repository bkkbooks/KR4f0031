body:
  text: 陳檢討四六巻十三翰林院檢討陳維崧撰序夀閻再彭先生六十一序雕蟲末技壯夫之所羞稱見璿璣賦刻鵠㣲長髙人之所不録馬援誡兄子書刻鵠不成猶類鶩而崧猥以一室居貧十年少賤豪門戩榖輒憑翰墨而兕觥詩貴客添籌聊飾文辭爲羔雁老子滄海變桑田吾以一籌記之今籌滿屋矣世説陳實子紀諶並著名世號三君每宰府辟召同時羔雁成羣丞椽交至當世榮之紫絲步障半綴蕪篇晉書王愷作紫絲步障四十里石崇作錦步障五十里敵之青瑣華軒恒懸鄙作見憺園賦然而意所不期情難自展平流祝嘏專尚鋪張薄俗祈年惟工頌禱語夫世德人人皆七葉雙貂見半繭賦述彼家風户户悉一門千石見歸田賦樓臺起處無非阿閣之三休尚書中候黄帝軒轅時鳯皇巢于阿閣賈子翟王使使者之楚楚王欲誇之饗客章臺三休乃止于上史記由余本晉人相西戎戎使聘秦穆公示以宫室引之三休之臺甲第成時多是長廊之中宿相如上林賦步櫩周流長途中宿註步櫩步廊也長途樓閣間陞道中宿乃至其上也金虀玉鱠薦自蓬池世説南人魚鱠以細縷金橙拌之號爲金虀玉鱠隋煬帝所謂南方佳味也唐書學士初賜食悉曰蓬池鱠冰兔霜蟾來從桂殿庾信詩天香下桂殿青琴擅舞矜十五之纎腰相如上林賦青琴宓妃之徒絶殊離俗伏儼注青琴古神女也陸雲詩雅步擢纎腰絳樹能彈訝一雙之纎手魏文帝與繁欽書今之善舞者莫妙于絳樹清歌莫激于宋臘徐陵詩絳樹新聲最可憐曽無故實但涉形容况復齒近期頥禮百年曰期頥雅多猜忌年踰不惑論語便學拘牽或當搦管以成文每慮轉喉而觸諱中山聞樂之對奚可施之歌舞之筵見集生序次公仰屋之談何堪妄預賓徒之末漢書平恩侯許伯入第蓋寛饒仰屋視而嘆曰富貴無常忽則易人如此傳舎所閱多矣乃有生申吉日詩翻爲騎省之悼亡見渭仁序揆覽靈辰離騷皇覽揆余初度兮猥作子山之思舊見􅋯菴序顧鄙人而授簡見璿璣賦命下走以摛詞史記太史公牛馬走蕭望之傳下走將歸延陵之臯阮籍奏記辟書始下下走爲首西京賦走雖不敏註如言僕也是則欽承曠達雖𣺌慮以奚辭陸機文賦𣺌衆慮而爲言便縱清狂見浙西序遂放言而不顧者矣淮安閻再彭先生者吾友百詩徴士之府君也譜其州里則地入并汾見雪持序詢厥門楣則望齊狐趙左傳晉公子重耳之從者狐偃趙衰顛頡魏武子司空季子註五人賢而有功者椒偏善衍詩著籍關東喬亦能遷詩徙居淮右家近劉安城下代有神仙漢書淮南王安煉丹丹成九日上昇餘藥在鼎庭中雞犬䑛之皆得飛昇宅連韓信橋頭人多節概淮安志城西韓信橋即信爲少年跨下所辱處先生則幼嗜縹緗見園次序長躭鉛槧見尺牘序侯子瑜居貧篤學暮即㸐柴謝承後漢書侯瑾字子瑜傭作爲資暮㸐柴讀書獨處一室如對嚴賓作矯世論以譏切當世西河人敬其才不敢名之稱爲侯君髙文通處困攻文晝而漂麥見懸圃序子雲之頗精筆札極似相如甘泉賦成帝時有薦雄文似相如者上方郊祀甘泉泰畦汾隂后土以求繼嗣召雄待詔承明之庭君山之最富典墳何知猗頓見少楹序加以室有同心人能偕隱章臺走馬之暇張敞則閒事畫眉三輔故事張敞罷朝㑹走馬章臺街其地在長安舊城内庾信謝馬啟張敞畫眉之暇直走章臺並見少楹序南山種荳之餘楊惲則還聽鼓瑟見看奕賦蓋先生德配實惟丁太孺人云孺人以濟陽人地競羨簮纓濟南志濟陽縣周邿國名敬禮門風兼長文藻見憺園賦周南穠矣傳懿範于珩璜韓姞爛其播徽音于筐筥詩委禽以後見貞女序交推桓氏之少君列女傳漢鮑宣妻桓少君始歸嫁貲甚厚宣不悅少君乃悉歸侍御服飾更著短衣與宣共挽鹿車歸鄉里拜公姑畢提甕出汲修行婦道弋雁而還詩人說梁家之德曜詳劉太母序若夫眉既能齊見貞女序齒尤相若弧懸尚左剛聞蓂莢之纔週帨設從西復在茱萸之上浣禮男子生懸桑弧蓬矢六以射天地四方又男子生設弧于門左女子設帨于門右蓂莢見璿璣賦按茱萸上浣九月初旬也廷幃洗斚龎公則每展一年高隠傳龎德公襄陽人操冰鑑居峴山南後與妻偕隱鹿門採藥不出子姓承筐鮑母亦時逢九月詳葉母序曾寒暑之幾何乃家門之非昔盧家之金椀猶在人間見琴怨序嬴女之瓊蕭竟歸天上見藝圃序先生則齒届六旬孺人已殁將三載斯時也庭萱不再籬菊猶存甫逢絳縣之期正躋丹丘之祝左傳晉絳縣人年長矣曰臣生之歲正月甲子朔四百有四十五甲子矣師曠曰七十三年矣註每一甲子該六十日楚詞仍羽人于丹丘兮註丹丘晝夜長明之處海上神仙也嗣君曰今無可待願大人姑謀一日之歡先生曰事以如生詎阿奴竟忘疇昔之事世説周顗周嵩並列貴位嘗冬至置酒其母舉觴賜三子曰伯仁志大而才小名重而識闇非自全之道嵩性抗直亦不容于世唯阿奴當在阿母目下耳註阿奴嵩弟謨小字也必也重循往例還待來年疇能贈我須爲破末季之拘攣潘岳西征賦陋吾人之拘攣假以貽余母或蹈時流之剽襲庶其並提存沒不令閫德之終湮極序生平竊兾老懷之暫慰乎於是祥琴乍鼔見憺園賦引滿何傷抱朴子于公引滿一石而斷獄益明漢書引滿舉白談笑大􅛐莊缶纔歌見井叔序舉桮亦得此所以數髙門之上客舊有三千詳劉太母序問居士之頭銜新標六一也歐陽修傳修終老潁之西湖自號六一居士謂集古一千巻藏書一萬巻琴一張碁一局酒一壺鶴一隻斯一事也有諸美焉慨自庶姬驕蠱匹婦愚䝉名不絓於儒林見憺菴序性寧諳夫古籍以致馮敬通之僮奴頭無釵澤鄭康成之婢獲人在泥中見閨秀序甚而慣訴殺牛世説隋時牛𢎞性寛裕弟弼嘗酗酒射殺𢎞駕車牛𢎞還宅妻迎謂曰叔射殺牛𢎞聞之曰作脯坐定其妻又言叔射殺牛是大異事𢎞言已知惟忻射雉見澹菴序莫習蘋蘩之節誰修翟茀之儀詩此則雖享同牢見閨秀序而曠如秦越韓文如秦人視越人之肥瘠漠焉不加喜戚于其心縱居一室而渺若山河世説王濬沖經黄公酒罏曰自嵇阮既亡以來今日視此雖近邈若山河何由戀德人已去而腸迴見素伯序孰令懷賢跡雖遥而腹痛詳篇末易林痛徹心腹今覽所天之顧慕見瑞木序益知淑儷之幽貞敬頌孺人斯美一也且夫新婦有言士兼百行世説許允婦乃阮衛尉女德如之妹也竒醜初適許許因謂曰婦有四德卿有其幾婦曰新婦所乏惟容耳士有百行以德爲首君好色不好德何也允遂敬之古人所朂人重五倫若使谷風召怨詩室家抱王郎天壤之悲世説謝道韞既往王氏大薄凝之還謂太傅曰一門叔父則有阿大中郎羣從兄弟則有封胡遏末不意天壤之中乃有王郎按凝之羲之子也皦日渝盟詩妻孥興生世不諧之恨應邵漢官儀周澤爲太常恒齋其妻怜其老疲病問之澤大怒以爲干齋諺曰居世不諧爲太常妻一歲三百六十日三百五十九日齋一日不齋醉如泥既作事復低迷倘非守正宋𢎞何以結信於君漢書宋𢎞威容羣臣莫及明帝姑湖陽公主新寡欲妻𢎞難斥言帝令公主坐屛後從容謂𢎞曰富易妻人情乎𢎞曰臣聞貧賤之交不可忘糟糠之妻不下堂顧謂主曰事不諧矣若令虧恩呉起必至見疑於友見井叔序今也遺簮不棄足徴至性之純故劒偏求用驗天親之篤見牛叟序即小可以知大觀往可以察來敬頌先生斯美二也更有難焉凡爲子者堦前萊彩見憺園賦惟傾延夀之觴漢郊祀志文帝時越人新垣平使人獻玉杯刻曰人主延夀園内潘輿見憺園賦徒藉長生之枕神仙傳泰山父對漢武帝曰有道士教臣作神枕枕三十二竅其二十四竅應二十四氣其八竅應八風臣行之轉少生齒庾信長孫夫人銘無延夀之杯缺長生之枕斟酈縣菊泉之水自許承歡見琴怨序采葛洪丹井之砂相矜愛日列仙傳晉葛洪字稚川句容人著書號抱朴子性好仙術以勾漏多丹砂乃求爲勾漏令註勾漏山在容州普寧縣古交趾地岩穴多勾曲穿漏故名禮孝子愛日未有善體親心曲全髙尚嘗聞古語延年則惟畏貴人見歸田序以况前賢曾晢則還生孝子孟子共傳我友真得卿狂見竹逸序敬頌嗣君斯美三也於是侈陳三善賤子既操觚揚觶而前操觚見懸圃序檀弓杜蕢揚觶競祝千春衆賓爰拾級厯階而上記拾級聚足連步以上左傳夾谷之㑹孔子厯階而升惜哉廡下已無昔年舉案之人見貞女序幸矣樽中尚存昨日登髙之酒見九日序附注魏武祭喬大尉文殂逝後不以斗酒隻雞相酧沃腹痛勿怪此平時嘻笑之言也夀徐徤菴先生序節踰亞歲日居駿狼之山宋書冬至受厲國稱賀其儀亞于歲朝故云亞歲淮南子日冬至駿狼之山夏至牛首之山註駿狼南極山牛首北極山律轉初陽星紀牽牛之次史記冬至一隂下藏一陽上舒天文志日月五星冬至起牽牛五紋弱線晷逢南至以加長一寸飛灰候迫東皇而蚤暖荆楚嵗時記晉魏宫中以紅線量日景冬至後日影添長一線厯律誌冬至則葭管累黍一寸貯灰于緹室陽氣至則灰飛杜詩刺繡五紋添弱線吹葭六管動飛灰東皇見澹菴序則有西豪貴胄南路華卿後漢書荀氏舊里名西豪潁隂合康以髙陽氏有才子八人荀氏亦八子改其里爲髙陽氏古諺南路徐北路于大夫當服政之年禮五十曰艾服官政君子正懸弧之日見夀閻序時則彯袿飛組之輩騶騎雍容見九日序懷文抱質之夫儀容爾雅曹植與吳質書偉長懷文抱質恬淡寡慾攝衣上座非無北海之窮交見九日序及觀槿序揚觶升階見夀閻序大有東都之右姓見天章序莫不鋪張官閥揚厲髙門敷華振藻爭誇言論之魁雄散彩摇珠備極文章之光麗千篇噴涌沫欲成河詳田太翁啟百軸喧闐門還類市漢書哀帝問鄭崇卿門何以如市對曰臣門如市臣心如水僕也列于蒸房折俎之旁見觀槿序效夫鞠􅛏帣韝之事見璿璣賦顧諸君善禱檀弓競誇有脊而有倫詩詎賤子不文未克以南而以雅詩今夫人呼麟種𣲖出駒王見憺園賦科名烜赫弟兄依日月之光史記蕭何依日月之末光族姓通明少長挾風雲之氣見園次序一門獨貴五世其昌見祖德賦要爲六合所習聞吕氏春秋神通乎六合髙誘註四方上下爲六合亦屬八紘所共見見璿璣賦寧須辭費盛稱海若之汪洋莊子秋水篇秋水時至百川灌河于是河伯欣然自喜以天下之美爲盡在已行至北海望洋向若而嘆註若海神名曷用文繁深贊崧髙之峻極詩狀雲霞之色縱繢畫以靡工見尺牘序學鐘鼓之音即噌吰而未省見佳山序用有一言請陳四座憶賤子楮冠彈鋏之秋楮冠見懸圃序彈鋏見楚鴻序適先生苴杖倚廬之歲禮爲父苴杖竹也爲母削杖桐也又親喪居于倚廬註倚牆爲之無楣柱也斯時也臯魚奉諱泣不成聲見憺園賦和嶠居憂毁將滅性晉書和嶠居父喪以禮法自持量米而食劉毅對武帝曰嶠雖寢苫食粥乃生孝耳若王戎不拘禮制而容貌毁悴所謂死孝禮毁不滅性不以死傷生也尋而九重賜賵春秋天王使宰咺來歸仲子之賵註知生則賻知死則賵輿馬曰賵貨財曰賻來天上之哀榮論語俄焉七日歌虞盡人間之怛愴見瑞木賦亦可稍酬湩乳之恩聊慰焄蒿之慕説文湩乃乳汁也徐氏説引漢匈奴傳不如重酪之美亦作湩祭義焄蒿悽愴此百物之精也乃猶心摧窆石力瘁菆宫周禮及窆執斧以涖匠師説文窆葬下棺也檀弓天子之殯菆塗註用木叢棺四面塗按菆通叢量踰僕射竟辭桮杓之霑世説周伯仁大飲酒嘗經三日不醒時人謂之三日僕射陳喧與兄子秀書昔周伯仁渡江惟三日醒吾不以爲少鄭康成一日三百盃吾不以爲多北史齊髙祖欲用李元忠爲僕射其子請節飲文忠言我作僕射不勝飲酒樂齋學太常長斷房幃之入見夀閻序以致三荆田氏樛成連理之枝見憺園賦遂令大被姜肱漢姜肱傳肱同二弟仲海季江俱以孝聞兄弟同被而臥及各娶妻兄弟相戀不入房室繅自同功之繭見雪持序檀欒孝笋見􅋯菴序觱沸忠泉見歸田序厯指内行之修足驗天休之集且夫叢殘古本匪同毳罽之華斷爛長箋詎比象犀之貴何來釋褐見玉巖序復事編摩豈有彈冠見黄門序仍需呫嗶禮况又東朝僚屬秩未清通見孝威序西邸班資理宜貴倨隋三禮圗長安街西五十四坊多王公貴人之第齊書竟陵王子良開西邸延才俊自永明末士人盛爲文章談議者皆奏于西邸温子昇不過馬坊之賤客本篇後注段干木居然駔儈之細流漢郭泰傳段干木晉國之大駔註牙儈狡捷者曰駔欲藉子將月旦邈若雲霄漢書許邵字子將汝南人覈論鄉黨人物每月輒更品題故有月旦評初邵㧞樊子昭于市肆出虞承賢于客舎召李叔才于無聞擢郭子瑜于小吏聞者莫不飭行司空楊彪辟舉方正不就倘求文舉揄揚詳毛太母啟曠猶秦越見夀閻序掃門莫恤史記魏勃欲見齊相曹參貧無以通乃常早起掃齊相舎人門舎人怪而問之曰願見相君無因故爲子掃于是舎人引見參以爲舎人懷刺徒羞見園次序而先生則縑帙連雲見懸圃序牙籖曜日見三芝序劉孫秋南陽博士雅志通經漢書劉珍字孫秋南陽人永初中詔較定東觀五經諸子傳記百家藝術及作建武以來名臣傳後遷郎中黄文疆江夏儒宗勤思積學見琴怨序年經月緯沉湎在虫魚細碎之中見園次序輯栁編蒲整齊於亥豕淆訛之日楚國先賢傳孫敬在太學編栁簡以寫經辰夜誦習漢書路温舒少貧牧羊澤中截蒲爲牒編用寫書亥豕見佳山序文鋒隳突颯若升峻阪以截熊罷廣韻隳與毁同凡卒相見曰突又觸也筆陣轟豗見禹平序霍如泅絶澗而殱蛟鱷列子習于水而勇于泅何論杜癖詎數劉淫見憺園賦乃若掘門寒畯寵以聲華戰國策蘇秦特窮巷掘門桑户棬樞之士耳委巷經師丐之譚論孔叢子子思謂宋大夫樂翔曰昔魯委巷亦有似君之言者劉峻絶交論丐其餘論班荆贈紵班荆見禹平序贈紵見憺園賦鹿車駢問字之人風俗通俗説鹿車窄小裁容鹿問字見昭華序倒庋傾箱世説郗夫人謂二弟曰王家見二謝傾筐倒庋汝軰則不然馬帳溢横經之客見修禊序銅溝清泚見滕王賦衎我嘉賓詩黛館扶疎補註綏余良士書鄭莊置驛見憺圉賦遊龍而駟鐡爭馳袁宏漢記建初二年馬太后詔曰前過躍龍門上見外家車如流水馬如遊龍詩駟鐡孔阜齡石飛牋流水則百函並發晉書夏王勃勃據咸陽劉裕以朱齡石代鎮長安齡石才資敏給常日發八十函甚而言信於心屨及室皇之外左傳宋殺楚臣申舟楚子聞之投袂而起屨及于窒皇劒及于寢門之外車及于蒲胥之市遂圍宋杜註窒皇寢門屨及言其速也義形於色交深杵臼之間見園次序吹箎客到肯緣急難以爲嫌見雪持序織屩人來遑假有無而自解髙士傳唐朱挑椎成都人夏則裸形冬則樹皮自覆每織芒屩置路旁見者皆言朱處士屩也易米置其地朱至夕取之終不見人其嗜書也如彼其得士也又如此固宜其風規朗暢氣凌袁灌之浮沉義烈區明目短原嘗之輕俠也見半繭賦抑聞借臆攄情則啼笑猶虞其或假代人頌德則情文終見其多虛何似脫驂越石直陳晏子之深情史記越石父賢在縲紲中晏子解左驂贖之載歸弗謝曰吾聞君子詘于不知已而信于知已者知已而無禮固不如在縲紲之中晏子于是延入爲上客寜如賃廡梁鴻自寫伯通之厚誼見集生序僕兮凡鳥見􅋯菴序走也窮魚走也見夀閻序窮魚見天章序夙無結納之資素乏風颷之望黥奴詘辱人皆姗以爲愚酉陽雜爼晉法奴子亡者以墨涅其面曰黥漢貨殖傳桀黠奴人之所患路鬼揶揄世競嗤之曰鈍見園次序雀來楊館謬托雕梁見素伯序燕赴張巢叨依廣厦詳銀臺啟是即升天入地奚能殫厥形容繪影鏤空不足窮其纎悉也遂逢大衍之辰爰效華封之祝易大衍之數五十堯紀帝觀于華華封人曰嘻請祝聖人使聖人富夀多男子丹丘不逺見夀閻序獻斯言請居乘韋之先見觀槿序碧海非遥見琴怨序舉是觴願祝岡陵之始詩夀季太翁八十序維揚上郡延令名區揚州志泰州即吳陵一曰延陵又曰延令扶風則鐡市三條雒陽則銅街七里庾信齊王憲碑文鐡市銅街風飛塵起並見憺園賦及滕王賦星躔鶉火代産文人詳鄴園啟兆叶鳯繇世鍾右族見祖德賦巷逢驄馬皆知鮑宣之家列異傳鮑宣生子永永子昱三世皆爲司𨽻而乘一驄馬京師歌曰鮑氏驄三人司𨽻再入公馬雖瘦行步工户有佩刀盡識王祥之宅晉王祥傳祥字休徴初吕䖍有佩刀工相之以爲必登三公可服此刀䖍謂祥曰苟非其人刀或爲害卿有公輔之量故以相與因翁季老先生瑞應乾符班固東都賦聖皇握乾符祥徴坤軸見天篆序望齊孟叔著季氏之勲勞左傳成季之將生也卜曰男也間于兩社爲公室輔按季友與孟叔俱桓公後故稱三桓名髙僑肸推行父之正直漢紀孔明見殷禮嘆曰今之僑肸也按子産名僑叔向名肸左傳晉人執季文子范文子曰季孫行父于魯相二君矣妾不衣帛馬不食粟可不謂忠乎乃赦季孫關西則四世公卿寔由太尉見憺園賦及素伯序瑯琊則六朝閥閱咸藉始興王氏譜望出太原王子晉之後出瑯琊齊田和之後晉書王導輔相元明成三世咸康初進位太傅封始興云爰是起家乃先作宰循良孔奮界是姑臧惠愛王尊地名安定循良傳孔奮字君魚爲姑臧宰姑臧稱富邑居縣者不盈數月輒至豐積奮居職四年清苦自若有訊之者答曰身處脂膏不能自潤凉州志姑臧漢縣漢武威郡隋凉州漢書王尊舉從事上書擢安定守戒屬吏貪墨威震郡中班彪北征賦指安定以爲期輿志安定郡武帝置在涇渭之間今平凉府尋洊剔夫中臺通典唐龍朔二年改尚書省爲中臺官制考尚書爲中臺御史爲憲臺謁者爲外臺用專膺夫吏部毛玠當塗名士乃稱是科魏志毛玠封丘人字孝先爲吏部無敢華衣美食者魏武嘆曰孤之法不如毛尚書蜀志譙周問杜瓊曰昔周徴君羣以爲當塗髙者魏也瓊曰魏闕名也當塗言髙聖人取類言爾並見三芝序註山濤典午清流始充其選晉山濤傳巨源器量不羣武帝朝爲吏部尚書甄别人物時稱山公啟事典午見素伯序先生九品有章六曹無玷魏志陳羣爲尚書置九品官人之法漢書成帝置尚書四人分四曹有常侍曹二千石曹民曹客曹官制世祖分二千石曹爲二曹又分客曹爲南主客曹北主客曹凡六曹貂蟬映日見半繭賦惟掄東觀之英後漢書張衡爲侍中上疏請得專事東觀收撿遺文畢力補綴註東觀藏書之所棨㦸生風見閨秀序詎較西園之市見尺牘序繼值興朝之改玉蚤欽哲士之挂冠國語先儒有言曰改玉改行註玉所以節行步也漢書逄萌見王莽謀簒且殺子王守曰三綱絶矣解冠挂東都城門遂浮海南史陶𢎞景掛冠神武門上表辭禄陋漢季以聲名交扇既爲黨論所莫加嗤晉末以門第相髙復爲時賢所不忌瞻烏握粟詩已覘達者之先幾鑿坏闔門見天章序註聊誌髙人之蚤見然而天祐善人世推隂德陸家之子弟仕北尤多見祖德賦庾氏之功名辭南益顯見滕王賦兩馮並起已聞繼踵爲官漢諺馮奉世之子名立徙西河上郡與兄野王相代爲太守民歌之曰大馮君小馮君兄弟繼踵相因循聰明賢智惠吏民二杜齊名寧第夾河作郡見祖德賦時則給諫冠月先生就傅知名見楚鴻序註有文在手左傳成季之生有文在其手曰友遂以命之服官稱職義形於言循循三事之中書諤諤百僚之上見禹平序當堦屈軼在聖主卒白其忠見瑞木賦繞砌芝蘭至慈父益稱其孝見祖德賦侍御滄葦先生蚤升華秩厯簉崇階府裏烏啼驗班資之蚤貴見祖德賦殿前鵠舉訝才望之尤竒詳儲太翁啟惟躭典籍豸冠亦暇即囊螢輿服志廌冠即惠文冠漢法冠也獬廌一角獸觸不直者故名今御史服之按其制以纚爲展筩其紗文輕細如蟬翼故曰惠文惠者蟪也囊螢見憺園賦酷嗜圖書蘭臺亦坐而漂麥見懸圃序惟性淡於簮纓時適賜其休沐見雪持序蓋勤於王事帝極憐仲孺有兄見歸田序而志在承歡朝特予太公以子况穆王八駿悉是家駒穆天子傳八駿之乘右服驊騮而左緑耳右驂赤驥而左白義次車之乘右服渠黄而左踰輪右驂盜驪而左山子拾遺記穆王八龍之駿一名絶地二翻羽三奔宵四超景五踰輝六超光七騰霧八挾翼正義魯仲連年十二號千里駒魏志曹休十歲太祖曰吾家千里駒晉書符朗爲堅從兄子爽晤堅嘗曰吾家千里駒也北齊書元文遥閱何遜集一覽便誦時年十餘叔暉業曰吾家千里駒宋書權邦彦少時永叔竒之曰真名家駒孔氏四科無非國寳後漢書鄭𤣥曰仲尼之門考以四科回賜之徒不稱官閥國語秦使使者往觀楚寳器子西曰國之寳器在賢臣杜詩塞上得國寳銅盤晝食則屋列東西見祖德賦金沓宵燃則巷分南北補註雕龍蠟鳯髫齔皆對食之兒雕龍見三芝序蠟鳯見雪持序髫齔見賀徐序犀靸珠鞭少長盡朝天之客濯龍門畔見夀徐序註此爲道政之坊見茹惠序鬬鴨欄邊見澹園賦即是浣衣之里宋書江湛爲吏部尚書無兼衣嘗爲上所召遇浣衣稱疾經日衣成然後起又復王氏則金貂盈座見半繭賦卑者位過郎官楊家則棣蕚同居魏志楊遁之家男女百口緦服同㸑庭無間言幼者年踰七十謝東山之女詠絮無雙見琴怨序王武子之甥過江第一見滕王序及季青序註馬援之誡兄子夙有門風馬援傳援兄子嚴敦并喜譏議援在交趾還書誡之王况之事世叔備遵家教庾信豳國公墓誌王况之事世叔情深愛敬姻連戚里步陸孤輦下名姬婚締强宗紇豆陵天邊貴姓庾子山集周譙國公夫人步陸孤氏本姓陸吳郡人周趙國公夫人紇豆陵氏本姓竇扶風平陵人至於一聲捉搦見楚鴻序全部朝那輿志安定都冇朝那縣陜西凉州第一城曰朝那按凉州曲一名朝那班彪北征賦弔尉邛于朝那鸞吟鳯舞見琴怨序皆羊侃之侍兒南齊書羊侃性喜音律有彈箏人陸太喜着鹿角爪長七寸儛人張淨琬腰圍一尺六寸時人謂能爲掌中舞又有孫荆玉能反腰帖地衘席上玉簮云鵲顧猿迴鵲顧補註猿迴見孟母序悉李波之小妹北魏書廣平人李波宗族强盛殘掠不已當時百姓爲之語云李波小妹字雍容褰裙逐馬如巻篷左射右射必疊雙婦女尚如此男子安可逢刺史李安世設方畧誘波等殺之柝鈴周匝複道多迷詳葉母序箏板參差曲聲無誤見良輔序亦有負城作宅導水爲園栝栢千章芙蕖百畆重岡壘嶂袤延酸棗之臺邃壑幽蹊下矗棠梨之館見翼王序蓋已隱夫冬綠見海棠賦豈徒平仲春紅見竹逸序於是候近青陽節逢𤣥陸見澹菴序桃結三千之實詳徐母序酒傾八百之觴見玉巖序註乃有四姓金張見滕王賦三江潘陸見園次序天上驂鸞之軰人間控鶴之羣見貞女序以及突廊曲厦舎旁撲棗之鄰杜詩堂前撲棗任西鄰錦韀雕軒車下翳桑之客左傳宣子田于首山舎于翳桑見靈輒餓食之楊子雲口多謇吃但解著書見天章序管公明膽未堅剛先求酒食見藝圃序無不鞠􅛏㦸門見璿璣賦承筐綺席詩彷彿咽三危之露依稀開四照之花吕氏春秋水之美者有三危之露王巾頭陀寺碑四照之花萬里庾信啟花開四照惟見其榮并見璿璣賦註僕也何人幸逢斯㑹渡江而謁卓茂已識盛朝褒德之侯循良傳卓茂以儒術遷宻令教化大行光武即位詔拜太傅封褒德侯擁篲而拜伏生更俟他日傳經之歲史記鄒子如燕昭王擁篲先驅伏生見昭華序崑山盛逸齋六十夀序蓋聞白蓮碧薤三千鴻朗之函補註絳闕瓊霄八百應真之位列仙傳天台司馬子㣲身居赤城名在絳闕文選應真飛錫以躡虚按八百應真乃羅漢也夜摩天上下註小紅開稱意之花見琴怨序修羅宫中法苑珠林兠率天雨摩尼珠修羅天雨兵杖重碧醖延齡之酒見夀閻序杜康酒論重醖重醴由來才子籍總屬於青城成都灌縣記岷山連亘千里青城山爲第一峰道書第五洞天乃神仙都㑹之府庾信詩綺門臨青城自古髙人年盡班於絳縣見夀閻序豈獨范家一老夙號長生下註寧徒謝氏諸郎蚤呼益夀世説謝混字叔源小字益夀亦稱望蔡美風貎時宋武帝稱混與謝晦爲兩玉人玉峯盛逸齋先生者吾友中書君珍示先生之介弟也左傳楚伯州犁上其手曰夫子爲王子圍寡君之貴介弟也響答壎箎詩枝駢蕚跗見丁香賦雙丁兩到名髙四姓之中七穆三明學在一門之内見園次序荆山剖玉見楚鴻序價並連城見昭華序合浦生珠光俱不夜見素伯序瓊瑶映日寧誇宣子之環龍雀凌雲詎數茂先之劒見園次序無何而中書君簉羽中朝蜚聲天室岑之敬雅工詞筆藉甚南陽陳書列傳岑之敬字思禮南陽人五歲讀孝經毎楚香獨坐親戚嘆異之十六擢髙第爲夀光學士轉南臺侍御史征南府諮議叅軍顔之推博極文書翩然北闕顔氏家訓序顔協乃顔子三十四世孫子之推字子分博學才辨嘗待詔文林館齊亡入周爲御史上士開皇中召爲文學有文集家訓傳世爰乃讀士衡之製作爭問士龍見祖德賦傳孝穆之科名羣思孝克孝穆見滕王賦南史徐孝克陵弟也并詳韓倬啟然而楩柟杞梓雖才地之皆同見滕王賦橘柚樝梨實遭逢之各異莊子人間世匠石之齊至于曲轅見櫟社樹曰是散木也是不才之木也後櫟社見夢曰若將比予文木耶即楂梨橘柚果蓏之屬熟則剥故不終天年蓋先生幼擅清嬴長多疢疾沉酣鉛槧見尺牘序朱君固不愧五經張璠漢記朱穆字公叔暉之孫五歲好學明五經南史朱异字彦和遍治五經憔悴豨苓李子則偏嘗百藥進學解猶醫師以昌陽引年欲進其豨苓也唐書李百藥字重規幼多疾祖母以百藥名之後年八十五攬隱侯之腰帶息意紛華梁書沈約志望台司武帝終不用與徐勉書陳情曰病已數旬革帶常移孔引手握臂率計月小半分欲謝事求歸老之秩循騎省之顛毛何心仕進見園次序柯亭有笛見天篆序敢邀子野之知伏滔長笛賦叙桓子野有故長笛傳之耆老云蔡邕所製也按桓伊字夏叔小字子野人稱桓野王㸑下餘琴難入中郎之聽見佳山序滕曇恭之惟敦行誼抗跡顔曾孝子傳滕曇恭五歲知孝母楊氏患熟思𤓰非其時曇恭厯訪不得衘悲且行遇一僧問其故曰我有一𤓰相遺持歸奉母舉室驚異梁天監初表異之時號滕曾子杜京産之不樂時榮希踪臺尚漢書杜京産不樂仕進隱㑹稽日門山建武中徴之不出曰莊生持釣豈爲白璧所回齊袁彖贈廋易詩白日清明青雲遼亮昔同巢許今覩臺尚註臺孝威尚子平也尚一作向優焉游焉如是而已若乃纒綿至性庭集慈烏見澹園賦惻愴人倫園生孝笋見􅋯菴序番番黄髮書頻繙内則之篇禮濟濟青袍羣奉少儀之訓禮讀君陳之章友於兄弟書誦周南之什宜爾子孫詩萬石君之門風刋爲庭誥見歸田序陳太丘之家法肅若朝儀見憺園賦雖以伯子爲難兄見施公誄猶仗次公爲家督越世家陶朱公長男曰家有長子曰家督至其澤必旁流慈能逮下善人在難皆言緩急堪資窮子知歸不以有無爲解劉寛雅量何妨侍女之汚衣漢書劉寛字文饒嘉平中拜太尉當朝㑹夫人欲試寛令恚使侍婢捧肉羮汚其朝衣寛神色不異乃徐言曰羮爛汝手乎其性度如此杜老髙情一任鄰家之撲棗見夀季序傾身障簏嗤祖約之何愚晉書祖約正料財物忽客至摒擋不盡餘兩小簏著背後傾身障之握算持籌哂王戎之已陋世説司徒王戎字濬沖區宅僮牧膏田水碓之屬洛下無比契䟽鞅掌每與夫人燭下散籌算計因已寄錦情於霞外大可暢笑咏於風前於是棐几長廊油忩砥室六帖王右軍嘗請一門生家見棐几滑淨因書之招魂砥室翠翹註以石爲内臥之室平而滑也藥欄曲折見憺園賦半齋何妥之楊南史何妥字栖鳯少機警住白楊巷蕭賚亦有雋才住青楊巷語曰白楊何妥青楊蕭賚苔坂鬖髿見瑞木序滿徑陶潛之菊陶潛歸去來辭三徑就荒松菊猶存棕鞵桐帽摩挲於露濃烟淡之秋茗椀爐熏掩映於山曉水明之候室内都無長物見祖德賦門前寧有雜賓見憺園賦先生則抱膝㣲吟詳劉太母序註搘頥獨笑莊子漁父篇漁父左手據膝右手支頥鵝兒榨綠見瀛臺序閒庭㵼下若之醅見園次序魚子番紅長日搨太清之帖後漢蔡倫傳和帝時倫造敝布魚網以爲紙咸稱蔡侯紙事原宻香樹紙文如魚子水潰之不潰爛又魚箋以粉粒染之名魚子紅宋紀大觀年中徽宗以淳化帖考選數帖重刻于太清樓下漏痕釵脚書斷或問郭丘曹筆法懷素以古釵脚對顔魯公曰何如屋漏痕缺齾行間見樂府序鹿脯羊裙盤拏腕下顔魯公鹿脯帖病妻服藥思鹿脯羊裙見紫來序况復性愛丹青尤精皴染深黄淺絳掩北宋之專家暈墨烘檀盡南唐之能事見瀛臺序雲偏滃几揮毫而螺髻爭呈蝶欲窺人擲筆而粉鬚猶濕解衣盤礡依稀弦外之琴莊子田子方篇宋元君將畫圖有一史後至解衣盤礡君曰是真畫者也陶潛傳淵明蓄素琴一張絃徽不具曰但識琴中趣何勞弦上聲蘸髮淋漓彷彿詩中之畫唐志張旭濡髪草書稱善語林蘇軾云摩詰詩中有畫畫中有詩凡諸妙詣種自淨因攬厥多能工由禪喜見納姬序蓋先生自玉弩斜芒之後乆持鹿女之經天官書有四星有弧兵弩象也李白大獵賦碎琅弧攫玉弩鹿經菩薩爲鹿其毛九種色角如白雪珠林上古有二金仙修道東西巖其間母鹿生鹿女形極美金仙養之後佛母生于鹿女因名鹿苑乃佛成道初轉法輪處也亦珠囊匿曜而來見鴻客序便禮龍華之懴珠林龍華三㑹以花衘龍口中作㑹以懴悔也翟泉鵝出見懸圃序蚤悟空花見舜民序洛下鵑啼見􅋯菴序長皈正果珠林學道皈正東楊枝作供詎談鍾岏之䱉北史佛圖澄天竺人石勒聞其名召試其術澄取鉢盛水須㬰鉢中生青蓮花勒愛子暴病死澄取楊枝水洒而咒之復蘓南史何𦙍侈于味後稍欲去其甚者猶食白魚䱉脯糖蟹以為非見生物疑食蛆蠣使門人議之學生鍾岏曰䱉之就脯驟于屈伸蟹之將糖躁擾彌甚至于車螯蚶蚶蠣宜長充庖厨竟陵王子良見岏議大怒後周顒與𦙍書勸令食萊遂絶血味菰米爲餐莫剪庾郎之韭雜記菰之有米者曰雕杜詩香舂菰米飯蕭子顯齊書庾杲之清素自業食惟有韭附郭林宗見友至冒雨剪韭漉囊淨饌瓶中惟薝葡之花戒經佛作食取水以絹或布幔江漉水作食方淨佛經譬如入薝葡林中惟齅薝葡不聞餘香本草經薝葡即梔子花禪板潮音枝上只迦陵之鳥叢林記禪院開靜止靜一板至三板名曰鉗錘觀音經梵音海潮音勝彼世間音彌陀經迦陵頻伽共命之鳥二鳥同身二首出流雅音念佛法僧此又緇白所以心傾人天爲之眉舞者也時則風標日上第五還齊驃騎之名見祖徳賦棲託彌佳安道常言家弟之樂世説戴安道既厲操東山而其兄欲建式遏之功謝太傅曰卿兄弟志業何其太殊戴曰下官不堪其憂家弟不改其樂荀家㑹食少長皆龍荀淑傳淑字季和補朗陵侯相子八人儉鯤靖燾汪爽肅敷號八龍陳實詣其家淑使叔慈應門慈明行酒餘六龍俱下食薛氏行觴兄弟俱鳯唐史薛収字伯褒與弟元敬從兄徳音齊名世稱三鳯兒扶藤杖悉屬班香宋艶之才見瀛臺序孫舁藍輿都爲竹馬羊車之秀陶潛傳每游時弟子與子舁以藍輿杜氏幽求子年五嵗有鳩車之樂七嵗有竹馬之樂羊車見雪持序清門盛事仁里休徴慶花甲之初週驗椿齡之伊始雜記六十曰花甲莊子逍遥遊上古有大椿者以八千嵗爲春八千嵗爲秋僕與玉臣舊連蘭契雲璈隊裡謬充蓬島之賔西王母傳王母與金闕聖君乗八景輿同詣清虛上宫是時三元夫人馮雙禮彈雲璈而答歌蓬島詳徐母序晝錦堂中兾獻麥丘之祝宋韓琦傳琦有晝錦堂歐陽爲記蔡㐮書名麥丘下註屬有華軒之授簡悉慿綺席以抽毫殽烝折爼敢辭乘韋之先見觀槿序庭實加籩願附煇庖之末左傳楚子入享于鄭庭實旅百加籩豆六品註庭實庭中所陳國語定王饗晉隨㑹曰體解節折而共飲食之于是有折爼加豆註既食後所加之豆其實芹葅莵醢之屬祭統煇炮翟閽吏之賤者也附注酉陽雜爼三十三天内有夜摩天崔鴻蜀錄范長生青城山處士成主李雄欲迎以爲君長生不可乃自立爲成都王拜長生丞相尊曰范賢韓詩外傳晏子景公遊于麥丘其封人年八十五公曰夀哉子其祝我陳檢討四六巻十三
