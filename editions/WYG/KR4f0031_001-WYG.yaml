body:
  text: 陳檢討四六巻一翰林院檢討陳維崧撰賦璿璣玉衡賦并序皇上御厯之十有八年闓澤覃敷湛恩江濊相如傳昆蟲闓澤註史記作凱澤與愷通長卿難蜀父老文湛恩汪濊剛柔克協配兩大之無私記孔子謂子夏曰天無私覆地無私載健順攸宜卜萬年之有祜詩瑤樞夜朗榮光上燭夫紫微步天歌北極五星在紫微宫中其第五星為天樞又北斗七星近紫微垣外其第一星為天樞第七星為搖光一作瑤光淮南子紫微宫者太乙之居也張衡靈憲紫微垣一十五星在北斗之北一曰大帝之座天子之常居也五帝紀黄帝時榮光幕河尚書中候帝堯即位榮光出河珠斗宵澄瑞氣遙連夫黃道天文志珠斗北斗也庾信宗廟歌文昌氣似珠黄道詳篇下迢迢閶闔共戴堯天離騷倚閶闔而望予註天門也張衡西京賦表嶤關於閶闔堯紀其仁如天肅肅勾陳俱環禹甸漢書音義勾陳紫微宫外營星也宫衞之象亦如之占以明則吉詩惟禹甸之洵所謂樞機在手衡量在心者矣天文志北斗七政之樞機書同律度量衡况夫御宿芒高帝車色正天官星占北斗為帝車運於中央後漢輿服志聖人視斗魁方杓曲以攜龍角為帝車桞子厚集序如繁星麗天而芒寒色正朱鳬絶徼咸歸覆幬之中詳尺牘序金馬遐陬仍𨽻版圖之内演繁露蜀二山東碧雞西金馬漢武使王褒祠二神於其地按輿志𨽻雲南烏空楚幕已知妖眚之俱消左傳楚子元伐鄭諸侯救鄭楚師夜遁鄭人将奔桐丘諜告曰楚幕有烏乃止鵑去巴江詳􅋯菴序及孟太母啓共稔祲氛之不作周禮註祲氛謂隂陽之氣相侵乃妖氣也功符易簡徳嫓高深易凡兹撫世以誠民悉本敬天而答昊備搜紀牒厯有規模作訛成易載於古帝之篇書流火授衣誌自豳風之什詩太初洛下甫創員儀益都耆舊傳漢初承秦以十月為嵗首武帝七年改太初元年始復用夏正巴郡洛下閎等制渾天儀按閎字長明渾儀一曰員儀作太初厯順帝張衡旋新渾象後漢書順帝時張衡字平子取顓頊渾儀更新之鑄渾天儀總序星經謂之靈憲筭周髀即盖天之説既虞勾股之難精術家傳宣夜之書益患參稽之多謬維兩説之無徴祇渾天之足據晉書古之談天者三家一曰周髀即盖天也一曰宣夜一曰渾天蔡邕言宣夜無師法周髀多所違惟渾天為善今候臺銅儀即其法也周髀音義有勾股方圓圖註算法有九其九曰勾股璣衡之設夐乎尚哉尚書註以璿餙機所以象天體之轉運橫設玉管所以窺機猶今之渾天儀也臣才非夢鳥生同捫籥之愚六帖晉羅含夢呑五色鳥文益進志林生而瞽者不知日或告之曰日之光如燭他日捫籥以為日也技止雕蟲坐遜挈壺之智揚雄傳揚子曰少而好賦雕蟲篆刻壯夫不為也周禮挈壺氏下士六人鄭元註挈壺水以為漏也左傳人有言曰雖有挈缾之智守不假器禮也註謂不假人以器也矧授簡之自天謝惠連雪賦序梁孝王授簡於司馬大夫曰為寡人賦之益措躬之無地桃霏紅紙親從三殿以頒來桓元偽事録詔命平准作青赤縹緑桃花紙使極精李義山詩浣花牋紙桃花色南郡新書麟徳殿其殿三面名三殿或以蓬萊拾翠紫微為三殿桞染青鏤遙向九重而捧至白怗紀少瑜夢陸倕以一束青鏤管授之文益進屈原天問圜則九重又天之門兮九重註天子制因之九陽數之極也丹墀賜坐細草成茵漢官儀尚書省以丹朱漆地曰丹墀赤墀傅毅舞賦陳茵席而設坐兮謝萬春遊賦草靡靡以成茵銀管分題詳園次序註宫花似幄陸機詩密葉成翠幄期門四姓森森鸊鵜之刀漢書武帝與北門良家子期諸殿門故有期門之號小學紺珠金日磾張安世衛青霍去病乃前漢外戚四巨姓後漢明帝紀四姓小子侯註尚書以上為甲姓九卿方伯為乙姓散騎常侍為丙姓吏部正員郎為丁姓并詳琅霞序又按呉中四姓詳尺牘序内族四姓詳皇士序張正見詩金門四姓聚古詩扈蹕劒瑩鷿鵜刀杜詩銛鋒瑩鷿鵜註鷿鵜膏可瑩刀也扈蹕千官縵縵鳯皇之綬上林賦註從上曰扈周禮凡邦之事蹕註蹕止行人也漢武内傳有鳯文琳華綬既尚方之給札復光禄以傳餐司馬相如傳相如為天子游獵賦奏之許令尚書給筆札漢紀武帝置光禄勲詎意微才躬逢盛事揮毫月地難形月館之清虛杜詩詩成珠玉在揮毫開元遺事羅公逺秋夜侍主家翫月取杖向空中擲之化為橋請帝同登遂至大城闕榜曰廣寒清虚之府乃月宫也詳良輔序掞藻天邊莫悉天垣之瑋麗左思蜀都賦摛藻掞天庭班固答賔戲摛藻如春華天垣見上按天文志上垣太微中垣紫微下垣天市較虞喜安天之論多愧前賢晉書虞喜字仲寧餘姚人專心經傳兼覽䜟緯晉太寧永和間屢徴不起乃著安天論以難渾盖倣陸倕刻漏之銘殊慚曩烈劉璠梁典陸倕字佐公天監中為太子中舎人詔為刻漏銘冠絶當世續漢書孔壺為漏浮箭為刻下漏數刻以考中星昏明星焉其辭曰時惟季春律中姑洗月令季春之月律中姑洗天子方建翠葆於蘭宫肅霓旌於蕙版上林賦建翠鳯之旗註以翠羽為旗上葆也楚詞彷徨乎蘭宫上林賦拖蜺旌靡雲旗蕙版補註命羲和以司晨令保章而戒旦堯典乃命羲和廣雅日御曰羲和堯於是立羲和之官周禮保章氏掌五紀之變陳琳武軍賦啟明戒旦瑤枝抽蓂莢之莖離騷折瓊枝而繼佩帝王世紀堯時有瑞草夾階而生毎月朔日生一莢朢後日落一莢玉漏滴蓮花之箭雜記宫中玉壺為漏刻漏皆雕蓮花其上故更籌皆稱蓮漏按逺公弟子惠逺以廬山不知漏器乃取銅葉製漏器狀如蓮花亦稱蓮漏金徒則翼衛以逶迤銅史則驂鑾而漫衍張衡刻漏制盖上鑄金銅仙人居壺左為胥徒居壺右皆以左手抱箭右手指刻陸倕銘銅史司刻金徒抱箭既乃出日華之邃殿昇測景之崇臺漢宫闕疏日華為東門杜詩我在日華東測景詳篇下顧見渾儀陳於阼階爰儐宫僚駿奔走召鄒陽延枚叟謝惠連雪賦召鄒陽延枚叟註齊人鄒陽從梁孝王逰枚乗仕吴諌吴王不納去之梁尊為上客謝賦盖假主客以為詞也臨軒而命之曰漢書天子自臨軒楹此即璿璣玉衡有虞氏之所以齊七政也書爾諸臣其賦之余一人將前席以聴焉漢書文帝召見賈生前席以聴小臣固陋不揣懵昧漢書餙固陋之衷謝荘月賦昧道懵學鞠􅎽螭坳摛詞以對史記淳于髠曰親有嚴客帣韝鞠􅎽奉觴上壽註帣收衣褏也韝臂捍也鞠􅎽小跪也㑹典唐左右二史分立殿下直第二螭首和墨濡筆至螭首坳處號螭坳夫何般總總以轇轕兮賈誼賦般紛紛其離此郵兮註般久也九歌紛總總兮九州揚雄甘泉賦齊總總以樽樽其相轇轕兮莊子轇轇轕轕註交加也道則或赤而或黄也詳下鴻琳琳焉羃䍥兮枚乗七發濤始起也鴻琳琳焉註渥貌唐豆盧田詩羃䍥野烟起環則或單而或雙也書集傳儀有三重外六合儀平置黒單環側立黒雙環内三辰儀側立黒雙環其赤道為赤單環黄道為黄單環為白單環以承其交最内有四遊儀亦為黑雙環日月既出没於躔度兮數則或弱而或强也天文志日同天運毎日不及一度月不及三十度竒故行度有强弱四遊或包絡以三辰兮儀則或隂而或陽也見上書集傳日月星辰於是可考曰三辰儀東西南北無不周徧曰四遊儀爾其剖異貝於鮫宫兮採奇姿於大秦春秋運斗樞瑤光得江吐大貝木華海賦鮫人之室註鮫人水底居出則賣珠魏畧大秦國出明珠辛延年詩耳後大秦珠弋明月於泉客兮輸夜光於海民南海志海中有明月珠李斯上秦王書垂明月之珠劉欣交州記鮫海人一名泉客西京賦流懸黎之夜光南都賦隋珠夜光按鄒陽稱夜光之璧劉琨稱夜光之珠乃珠玉通稱也聚之則璘斒而璀璨兮散之則的爍而晶瑩漙溥若新荷之擎曉露兮纍纍若清歌之動微塵樂記纍纍如貫珠劉向别録漢興善雅歌者魯人虞公發聲清亮拂動梁塵爰徴巧厯莊子巧厯不能得而况其凡乎綴為斯器上應五行旁羅四氣貫天經於圓軸書集傳天經之環南北二極皆圓軸虚中而内向以聨黃赤之交見上界天脊與地平以釐子午之次書集傳黑雙環背刻去極度數以中分天脊直跨地平使其半入地下而結於其子午以為天經飛輪下墊詳下扶鰲極以常安列子渤海有五山岱輿員嶠方壺瀛洲蓬萊隨波上下帝命禺强使巨鰲十五舉首戴之詳佳山序激水生風像蟻盤之不滯書集傳為白單環使不傾墊下設機輪以水激之使日夜隨天東西運轉以象天行雜記蔡邕云天左旋日月右轉如蟻行磨上磨左旋蟻却右也爾乃絪絪緼緼經縷縱橫南北有秩東西有程赫乎若魮房琲甲飾緌纓也山海經魮魚房生珠玊呉都賦珠琲闌于廣雅緌纓冠繫也磊落﨑崟詳子厚序崢嶸窈冥郭璞方言註崢嶸髙峻也高唐賦窐寥窈冥窞者成窊凸者成陵塊乎若畦分罣布限觚稜也班固西都賦上觚稜而棲金爵註物有亷角者曰觚稜縟堆綺岫繡疊丹厓灼同霜旭駮若晴霞袤延織女橫帶瓠𤓰説文東西曰廣南北曰袤一云東西曰徑輪南北曰廣袤元命苞織女星主𤓰又瓠𤓰星名攝提置閏爾雅太嵗在寅曰攝提格孔文祥曰太嵗正月出寅方攝列宿以為嵗月之首起於孟陬厯書太初厯推上元甲寅攝提格之嵗日月如合璧五星如連珠置閏之法積分起於上元娵訾驗差爾雅娵訾之口營室東壁也亦星次名厯書嵗差驗於日躔孟春日在營室日月㑹於娵訾之次而斗柄指寅可驗嵗差註舉嵗首娵訾以概其餘也烜乎若金塘玊沼茁鮮葩也張華新荷詩照灼此金塘藻曜君玉池説文葩華也况復用若轉圜形如欹案漢書從諫若轉圜魏志曹操作欹案卧視書雖刓方以為圓亦居卑而測逺陳於廷陛之側可以手摘星辰楊億傳億生數嵗吟曰危樓高百尺手可摘星辰列於彛鼎之旁足以仰捫霄漢上林賦仰攀橑而捫天然而蒼蒼太始茫茫兩儀理窮象罔事涉熹微莊子天地篇黃帝逰赤水之北遺其元珠索之不得乃使象㒺象㒺得之歸去來詞恨晨光之熹微往來贏縮或一行守敬之所不能算唐書開元中僧一行精諸厯元宗令造新厯元史郭守敬授時厯取二至逺近日晷酌其中而用之晦明弦望或霍融姚信之所不能知司馬彪續漢書太史令霍融上言刻漏或時差至二刻不如夏厯宻也厯志姚信昕天論言冬至極低夏至極起縱靡愆夫圭撮猶懼失乎毫釐周禮土方氏掌土圭之法以致日景漢書推厯生律者不失圭撮應劭註十黍為圭四圭為撮易緯差若毫釐翳璿璣之既設藉玊衡以窺之見上維彼玊兮氷雪之精維彼衡兮準量之平質本無瑕形則同於簫筒律厯志玊衡以玊為管亦曰衡簫風俗通舜作簫其形參差象鳯翼十管長三尺黃帝使伶倫制十二筩為律本美何妨橢價倍重於璜珩廣韻器狹而長者曰橢東坡詩璧美何妨橢毛詩傳珩璜琚瑀玊屬衡貫璣中聴低昂於南北軸居環内驗朒朓於虧盈書集傳環之内又為小窽以受玊衡要中之小軸使衡既得隨環東西運轉又可隨處南北低昂説文朔而月見東方曰朒晦而月見西方曰朓謝莊月賦朒朓警闕朏魄示冲有玊於斯睨而視之星財玊䋲帀布天則翠幕低垂張衡西京賦覩瑤光與玉䋲註玉衡北兩星為玊䋲一作即玉衡夜深則低摭言上下四方為六幕胡宿詩六幕天空萬里心直視則珠顆斑斕綴銅丸之厯厯遙挹則銀河清淺㸃檀靨之離離古詩河漢清且淺酉陽雜俎婦人粧如月形名黃星靨玊臺新詠飾面停粧更㸃星七曜分行錯雜散枰間之子天文志五星金木水火土及日月為七曜禮經㑹元星羅碁布五星聚井零星嵌軫畔之徽漢高帝紀元年冬十月五星聚東井琴譜金徽玊軫羅以為胸昌谷嚢中之句李賀詩二十八宿羅心胷賀字長吉一稱昌谷毎得佳句以錦囊盛之織之成樣若蘭錦上之詩臧榮緒晉書竇滔扶風人妻蘇氏名蕙字若蘭滔為苻堅時刺史徙流沙蕙織錦為迴文詩八百餘字寄滔名曰璇璣圗我皇於是法古制律天時恢八紘奠四維淮南子九州之外有八夤八夤之外有八紘八紘之外有八極按東西南北為天之四維翔渇烏於畫棟踆玉於文㮰淮南子日中有踆烏註三足烏也袖中記李蘭刻漏法用銅為渴烏狀如鈎曲以引器中水於銀龍口中吐入漏器五經通義月中有玉兎蟾蜍西京賦鏤檻文㮰浮動如毬璐戺頳曜靈之景宣夜學云天無質日月衆星浮生虚空之中西京賦金戺玊階廣雅戺砌也屈原天問曜靈安藏皇甫謐長厯日者衆陽之宗故日以晝明曰曜靈輕圓比彈瓊忩橫若木之枝王蕃渾天説天體狀如鳥卵天包地外猶殻之褁黄周圍如彈丸其形渾渾也京房書天如彈丸月似鏡體離騷折若木以拂日兮淮南子若木末有十日其華四照山海經灰野之山有樹名若木生崑崙附西極其花光下照地糺卿雲兮賡復旦逰化日兮洽重熙尚書大傳舜時卿雲見百工和歌舜歌曰卿雲爛兮糺縵縵兮日月光華旦復旦兮註即慶雲史記天官書卿者佳氣也潛夫論化國之日舒以長東都賦重熙而累洽置之靈臺與大貝球刀而並重藏之宗廟共赤文緑字而俱垂尚書中候堯時有龍馬啣甲赤文緑色有帝王興亡之數淮南子洛出丹書河出緑圖註赤文成字故曰丹書蘭采朱文故曰緑圖猗歟休哉其綿億萬年之景運而鞏八百載之丕基也哉湛露濃兮朱顔酡詩湛湛露斯楚辭美人既醉朱顔酡縆瑤瑟兮彈雲和屈原九歌縆瑟兮交鼔周禮雲和空桑龍門之琴瑟鄭元註三地名曲終拜手為璿璣玉衡之歌歌曰聿鑒世徳命維新兮我皇合撰備髙深兮不貴異物逺技淫兮書渾儀肇始寧自今兮上天垂象聖則欽兮易赫赫圓穹髙難諶兮詩鯨鐘龍簴敝則瘖兮東都賦發鯨魚鏗華鐘註東海有獸名蒲牢素畏鯨鯨擊之輒大鳴凡鐘欲令聲大作蒲牢於上撞之者為鯨魚詩集註簴植木以懸鐘磬者倉公傳註瘖失聲也夏鼎商杅邈難尋兮左傳昔夏之方有徳也鑄鼎象物博古圖杅浴器即湯盤之類維形與器不可以久任兮辟王事天單厥心兮詩詎藉冬官周禮飾璆琳兮禹貢球琳琅玕註球美玉璆即球重文也小臣矢音獻司箴兮滕王閣賦自昔沁水餘公主之園後漢書沁水公主漢光武女也後竇憲恃女弟為皇后以賤直奪公主之園清漳有王孫之第地志漳水一名清漳一名濁漳孔安國註漳水入河河濁漳清故名清漳水經註魏武引漳流逕銅雀臺按漢有清漳王清河王藍田稱廢將之家史記李廣屏居藍田山中射獵嘗夜從一騎出從人田間飲還至亭霸陵尉醉呵止廣廣騎曰故將軍尉曰今將軍尚不得夜行何故也宿廣亭下青門實故侯之地漢書卲平廣陵人故秦東陵侯漢時種𤓰長安東門𤓰成五色世謂青門𤓰乂謂東陵𤓰家居小巷人傳丞相之賔漢書樓䕶家長安中丞相王商為大司馬時欲候䕶主簿諫將軍至尊不宜入閭巷不聴遂往至䕶家家狹小官屬立車下田近南山客言太后之弟田蚡傳蚡景帝王皇后同母弟也孝景朝蚡日貴盛及武帝時因蚡為太后弟位丞相治宅甲諸第田園極膏腴或北接銅街或南通金市洛陽記銅駝街在洛陽城東關漢置銅駝二於宫之南街四㑹道頭兩銅駝東西夾路相對諺語金馬門外拜羣賢銅駝陌頭集少年言人物之盛也又洛陽舊有三市金市羊市馬市詳九日序列子齊有欲金者至鬻金所攫金而去吏捕之對曰取金之時不見人徒見金附註况夫長樂貴𦙍東阿幼王宫闕疏漢高建長樂宫漢官儀帝母居長樂宫魏志黄初三年立曹植為鄄城王太和三年徙封東阿六年封陳王苑齊博望系自平陽西京雜記戾太子既冠就宫武帝為立博望苑使通賔客史記外戚傳景帝王太后長女號平陽公主衛子夫出平陽侯邑為平陽主謳者武帝悦子夫生三女一男出龍樓而婉娩開朱邸以徜徉漢成帝紀帝為太子時元帝嘗急召之出龍樓門不敢絶馳道西至直城門得絶乃度上遲之問其故以狀對上大悦乃令太子得絶馳道史記諸侯朝天子于天子之所立宅舎曰邸漢書諸侯王朱户故曰朱邸謝元暉詩黃旗映朱邸梁孝則廣通賔客蕭繹則雅善文章漢書梁孝王文帝子也賔客有鄒枚之屬見璿璣賦梁書湘東王繹武帝第七子也善文章武陵王謂僚佐曰七官文士淮南則山名桂樹楚國則臺號高唐漢書淮南王安與八公共登山攀桂而賦或稱大山小山如詩大雅小雅因以大小山自號招隠士賦曰桂樹叢生兮山之幽自序云小山之所作也宋玊高唐賦昔者楚襄王與宋玊逰雲夢之臺高唐之觀註雲夢中高唐之臺也頃之則秦宫草緑魏殿煙黃雖有子晉吹笙之館陳思挾瑟之場列仙傳王子喬名逈周靈王太子晉也好吹笙作鳯鳴遊伊雒道士浮丘公接以上嵩山後仙去七月七日乗白鶴於緱嶺雲中謝時人數日方去上黃侯之離臺别囿補註梁書上黃侯𤣥始興王憺之子初封安陸侯美才仗氣官晉陵太守特被簡文友愛西都賦離宫别館三十六所註離别非一所也竟陵王之玊柱金觴詳祖徳賦齊書竟陵王蕭子良字雲英武帝第二子也袁叔正情賦陳玉柱之鳴筝韋誕詩㫖酒盈金觴江淹别賦掩金觴而誰御横玉柱而霑軾亦復銷沈歇絶彷彿徬徨笙歌散兮風月盡亭榭虚兮羅綺傷沈初明之才情上通天而下泣漢書武帝作通天臺以求神仙去地百餘丈望雲氣悉在其下南史梁沈烱呉興人約之子字初明仕梁值侯景亂妻子皆景害後魏尅荆州被擄授儀同以母在東求歸嘗獨行經通天臺上表於漢武陳已思鄉之意詳子厚序陸士衡之意氣弔銅雀而霑裳陸機弔魏武文登爵臺而羣悲貯美目其何望覽遺籍以慷慨獻兹文而悽傷詳銅雀賦是知世何人之不促人何世之能長徒賦哀於景福祗寄慨於靈光而已矣典畧魏明帝将東廵恐夏熱故許昌作殿名曰景福既成何晏賦之文選註靈光殿在曲阜縣魯共王所建及漢中微宫殿皆毁而靈光巋然獨存後漢王延夀字文考作靈光賦原夫滕王閣者輿志滕王閣乃唐高宗子元嬰封滕王時所建在南昌府章江門地接衡廬王勃賦註謂衡山匡廬天分呉楚漢灌嬰洗馬之城晉殷羨投書之渚南昌府志漢灌嬰討定南方築城于此至今有嬰之洗馬池晉書殷羨字洪喬拜豫章守縉紳多屬羨致書者行次石頭渡皆沉水中曰沉者沉浮者浮我不作致書郵後遂號投書渚南昌乃三江之咽喉洪都亦五湖之門户王勃滕王閣序南昌故邵洪都新府又襟三江而帶五湖名藩既竹木為園圖經梁孝王有脩竹園愛子復芙蓉為府詳紫元序左傳趙括為愛子徐劉應教依稀江上之簾櫳魏志孔融文舉陳琳徳璋王粲仲宣徐幹偉長阮瑀元瑜應瑒徳璉劉楨公幹稱建安七子按諸王命曰應教潘左陪軒隱約樓頭之簫皷梁鍾嶸詩品晉太康中三張二陸兩潘一左勃爾復興通論洛陽才子潘左為先覺陪軒補註然而千年觀閣百代江山戴媯大去􅤂子無還毛詩註莊姜無子以陳女戴媯之子完為已子完即位州吁弑之故戴媯大歸于陳左傳宋公用􅤂子于次睢之社以屬東呉哀美人兮淚盡怨公子兮衣單少司命篇望美人兮未來山鬼篇怨公子兮悵忘歸沈約詩秋至客衣單祖登仕詩誰念客衣單念繁華兮何極悲花月兮難言沿夫明季之将衰也飛燕長安李花河北漢五行志成帝時童謠曰燕燕尾涏涏張公子時相見木門倉琅根燕飛來啄皇孫皇孫死燕啄矢註帝後與富平侯張放出遊過河陽主見舞者趙飛燕而幸之遂為后卒賊害諸王子迷樓記隋煬帝将再幸江都有迷樓宫人抗聲夜歌云河南楊桞謝河北李花榮楊花飛去落何處李花結子自然成帝召宫女問女自為之耶曰道塗見兒都唱此歌帝黙然曰天啟之也江陵之文武道消洛下之衣冠運息蕭梁記蕭詧助魏襲江陵梁主繹繹見西魏兵入焚圖書十四萬巻以寳劒擊柱折之歎曰文武之道今夜盡矣晉書永嘉時海内大亂獨江東差安洛下士民多南渡江郎士元詩避地衣冠盡向南千重白馬之軍萬騎黑山之賊英雄記公孫瓉毎聞邊警輒厲色作氣常乗白馬又選數十白馬為騎射之士號曰白馬義從魏志袁紹遣顔良攻劉延於白馬又詳鴻客序魏志張燕常山人慓悍捷速軍中號為飛燕自黄巾始亂燕賊河北衆至百萬號曰黑山徐陵為貞陽矦書黑山白馬之卒倚弓於鸚鵡窓前繫馬於鳯凰樓側江夏志鸚鵡洲即禰衡賦鸚鵡地後黄祖殺衡於洲上因名焉武昌志城北有鳯凰山岑參詩路指鳯凰山外雲衣沾鸚鵡洲邊雨按庾信哀江南賦倚弓玉女忩扉繫馬鳯凰樓柱此似泛用空餘玊樹之悲猶見金人之泣陳書後主諱叔寳採新詩尤艷麗者為曲詞有玉樹後庭花臨春樂等大㫖皆美張貴妃孔貴嬪之容色其畧曰璧月夜夜滿瓊樹朝朝新潘岳關中記秦為銅人十二董卓壞以為錢餘二枚魏明帝遷詣洛陽到霸城重不可致今在覇城大道南述異志魏明帝詔宫官牽車西取漢孝武捧露盤仙人欲置前殿宫官既折盤臨行淚下李賀集有金銅仙人辭漢歌繄結綺與臨春奚兹閣之如昔杜氏通典陳後主建臨春結綺望仙三閣自居臨春張麓華居結綺龔孔二妃居望仙無何而皇清永奠玉燭初調爾雅四時和謂之玉燭郭璞註道光照也吳眀徹則投身周境庾子山則辭跡梁朝陳書呉明徹字通昭陳高祖深奇其才居將帥之任初有軍功天嘉九年與北周戰吕梁敗績明徹窮蹙乃就執梁書庾信字子山以梁人入仕西魏為開府因仕於周集中多入魏周之作韓擒虎折衝軍壘温子昇出入宫僚隋書韓擒虎容顔魁岸文帝時拜廬州總管以輕騎五百直取金陵陳平進位至上柱國魏收魏書温子昇字鵬舉晉大将軍嶠之後北魏熙平中補御史時年二十二臺中文筆皆子昇為之後莊帝更加信任焉斥堠少烽煙之警士女多清晏之謠左傳納斥堠廣雅邊方備警作土臺臺上作桔橰頭上有夔岺以新草置其中有㓂即燃火舉之曰烽火多積薪㓂至則燔又望其煙曰燧晝則燔燧夜則舉烽拾遺記河清海晏至聖之君以為瑞妙選重臣用綏江服庾征西以重望特鎮武昌庾亮傳亮字元規為征西將軍領江州軍平蘇峻之亂鎮武昌童謠曰庾公上武昌翩翩如飛鳥郄太傅以名賢坐備姑孰郄鑒傳鑒字道徽與王𨗳卞壼等受遺詔輔少主咸和初祖約蘇峻反進鑒都督揚州八邵軍事討平之年七十一薨贈太傅輿志太平府禹貢揚州之域劉宋曰姑孰領軍則秩擬儀同假節則位崇左僕官儀周制太師太傅太保為三公秦則有太尉司徒司空及漢安帝以車騎将軍鄧隲為開府儀同三司謂别開一府得比三公唐皇用開府為散階令有拜三公真秩者反以開府儀同三司為階通考晉制都督諸軍為上監将軍次之督諸軍為下使持節為上持節次之假節為下使持節得殺二千石以下持節殺無官位人若軍士得與使持節同假節得殺犯軍令者杜氏通典僕射秦官漢因之成帝建始元年初置尚書五人以一人為僕射主封門掌授廩假錢榖後獻帝以執金吾榮邵為左僕射衞臻為右僕射通考後漢二僕射左居上右居下盖我蔡公實以御史大夫出領豫章為一時名節度使焉時則四境無虞一軍多暇陶侃之姿制慷慨羊祜之標期儒雅晉書陶侃字士行以平蘇峻亂拜大将軍初梅陶嘗謂人曰陶公機神明鑒似魏武忠順勤勞似孔明陸抗諸人不能及也羊祜傳祜字叔子博學能屬文身長七尺三寸美鬚眉善談論溯疇曩而神傷顧景物而心寫詩撫靈構於前人嗣神功於來者眷斯閣以裵􅏆獨蘊情而瀟灑爰乃召般輸徴楩枏淮南子魯般古之巧人註公輸班也魯哀時人呉都賦楩枏豫章註四者皆大木不煩将作之匠寧費水衡之錢人官考将作監掌土木工匠總左校右校中校甄官等署官如少府周禮水衡之官鄭元註川流水也衡平其大小也庾信華林賦水衡之錢山積應劭曰水衡與少府皆天子私藏結驚鸞之窈窕窮舞鳯之㛹娟靈光殿賦璇室㛹娟以窈窕儼雕甍之宛爾恍繡闥之依然伊左縈而右拂羌前紆而後旋爰乃朱樓綿亘綺疏葱蒨馮衍顯志賦伏朱樓而四望天台賦烱晃於綺疏李尤東觀銘房闥内布綺䟽外陳註綺疏忩也古詩交疏結綺忩左思詩峭蒨青葱間註鮮明貌曲房窅䆗高臺婉轉集韻窅䆗同窈窱深逺也靈光賦蟠螭宛轉而承楣玉臺新詠序椒房婉轉鑿桂榭之玲瓏撰華簷之繾綣天台賦朱闕玲瓏于林間繾綣載詩勢未整而欲斜狀將翔而又變丹青圖畫有若神仙飾之翠羽錯以金鈿潘妃傳帝為潘貴妃起殿忩間畫神仙形皆以金玊翡翠飾之呉都賦圖以雲氣畫以仙靈漢書昭陽舍往往明珠翠羽飾之景福殿賦明珠翠羽往往而在爾雅翠鷸也鴛鴦起於梁上玫瑰生於棟間漢宫闕名長安有鴛鴦殿韻集玫瑰火齊珠也又石之美者子虚賦其石則赤玉玫瑰斜通闤闠遙接平原張衡西京賦通闤帶闠説文曰市外門也王粲登樓賦平原逺而極目兮俗類數錢之市地疑種玊之田顧野王艷歌行南市數錢歸庾信謝趙王啟遂令新市數錢忽疑販綵寰宇記漢陽羊雍伯遇人以石子遺之云種此生美玉後雍伯求徐氏女徐曰須白璧一雙可許聘雍于田中得白璧五雙遂聘之其地在順天府玉田縣按撫州亦有玉田稱蕭子雲種玉處田竇之居縹緲金張之宅蟬聨班固贊竇嬰田蚡皆以外戚重按竇嬰乃孝文皇后從父子田蚡見本篇上金日磾張湯傳贊功名之後惟有金氏張氏乃外戚之尤盛者左思咏史詩金張藉舊業並詳歸田序則見夫紅粧美女青驄少年商民輻輳錢貝喧闐魏都賦内則街衢輻輳吚吚畫角之聲江城夜市厯厯紗窻之下秋水晴川一騎琵琶彈來檻外詳海棠賦萬家燈火照去欄前於是合府參佐之徒蟬翼翩翻丹輪的爍輕俊則庾氏肩吾雕華則劉家孝綽庾肩吾傳肩吾字慎之八嵗能賦詩梁書劉孝綽小字阿士舅王融稱為神童且曰天下文章無我當歸阿士飛羽觴而凌亂逸詩羽觴隨波註周公城洛邑因流水泛酒輕如鳥羽之飛又爵形有頸尾羽翼眄長空而橫薄陪公讌於中天極勝遊於高閣維玊管與金蕭遂臨風而競作則有澄波噴欱洪濤𣺌茫東都賦欱野噴山西京賦欱灃吐鎬註猶吹吸也江名彭蠡湖曰鄱陽輿志彭蠡一名滙澤即今南康府宫亭湖鄱陽在豫章縣今饒州有鄱水一云彭蠡即鄱陽賈客黃龍之舳估師朱雀之航穆天子傳乗鳥舟龍舟浮于大沼註以龍鳥為形也隋志煬帝遣陸士澄造朱鳥白虎元武飛羽青鳬樓船蕩子以明珠作檝倡家以白玊為檣古樂府昔為倡家女今為蕩子婦補註西風起兮鳬鴈飛煙波冷兮菱芡長垂畫簾於江上擊大皷於中塘又若南浦層巒西山崇嶺載王勃滕王閣詩香爐幽邃以逶迤石鏡礧砢而􅈚涬輿志香爐峰在南昌之東上有許旌陽石鏡山其形如鏡在武寧縣逶迤載詩上林賦玉水磊砢帝京譜天地初起溟涬鴻濛司馬彪曰溟涬元氣也洪崖􅀈蔽夫金梯匡廬隠現夫丹井寰宇記南昌西有洪崖石壁峭絶激湍如雷三皇時洪厓先生得道於此故名子虛賦岑崟參差日月蔽虧費昶詩朝踰金梯上鳯樓南康府志周時匡裕兄弟三人結廬山中仙去因名其山為匡廬上有金井玉淵乃道書第八洞天朝暉無自匿之鮮元夜有長舒之景猿言巖畔之寒狖訝山間之冷屈原九章乃猿狖之所居庾信小園賦龜言此地之寒鶴訝今年之雪華榱與碧嶂俱懸綺户與翠微相映爰乃四開朱牖盡啟羅幬玉顔既醉銀箏未收古詩十五學彈箏銀甲未曽卸通典秦䝉恬始作箏荆川稗編箏本頌琴後世名曰箏幕府筵終臨高臺而懷古東觀漢紀衛青征北蕃帝拜大將軍於幕中因號幕府元戎晝静列巨艦而悲秋元戎載詩思夫帝子旌旂兮風流相賞王勃詩閣中帝子今何在註滕王嬰也江山文藻兮賔朋俯仰金棗長埋兮銀蠶猶朗葛洪抱朴子呉景時戍将於廣陵發一大塜似公主之冡棺中人両耳及鼻孔皆有黄金如棗許大括地志晉永嘉末有人發齊桓塜者得金蠶數十簿南史南齊人發桓温女塚有金蠶銀繭等物又宋王元謨從弟象守下邳發一塚有金蠶銅人百數棺中女子卧而言我東海王家女尋復死庾信蘭氏墓銘金棗長含銀蠶永送朱門寂寞兮緑池惆悵晉麴逰歌南開朱門北望青樓曹植詩朱華冒緑池宋玉九辨惆悵兮而私自憐惟物華之如故兮悼斯人之一往悲舞館與歌樓兮但長天之明爽思夫閻公棨㦸兮都督簮纓王勃序都督閻公之雅望棨㦸遙臨子安詞賦兮文章縱横將軍愛士兮年少能文藝林勝事兮末座知名王勃傳勃字子安六嵗善文辭高宗以作鬪雞檄怒斥之勃往省父於交趾至南昌九月九日都督閻伯嶼大㑹客於滕王閣勃少年厠坐末閻出紙筆令客作序莫敢當者勃受不辭閻遣吏伺其文至落霞二句乃歎曰天才也彼星移而物換兮見水緑而山青王勃詩物換星移㡬度秋悵賢王之臺榭兮想詞客之生平於斯時也悲不自勝泣將何及後漢書陸續悲泣不自勝詩何嗟及矣庾信哀江南賦燕歌逺别悲不自勝楚老相逢泣将何及王長史之登山悵眺極多王氏譜廞字伯輿亦稱長史嘗登茅山大慟哭曰琅琊王伯輿終當為情死衛叔寶之渡江蒼茫交集衛玠别傳叔寶仕晉為太子洗馬初欲渡江語云見此茫茫不覺百端交集未免有情誰能遣此矧復羇人顦顇塞客參差何年泣别幾度相思攀桃李兮三千里詳尺牘序贈蘼蕪兮十二時楚詞秋蘭兮蘼蕪廣志蘼蕪香草魏武以藏衣中樂畧隋煬帝幸江都創十二時等曲目斷擣衣之信古樂府有擣衣篇古詩閨中有一婦擣衣寄逺人魂消織錦之詞見璿璣賦玉臺新咏序憶南陽之擣衣笑扶風之織錦又或王粲從軍徐陵負羽魏志建安二十年公西征張魯侍中王粲作從軍詩以美其事梁書徐陵字孝穆仕梁為散騎常侍及侯景宼梁後仕陳卒漢紀羽檄徵天下兵江淹别賦邊郡未和負羽從軍官道致饑東門出祖詩注祖而舍軷飲酒于側曰餞重始于道路也漢疏廣傳廣字仲翁以年老辭位公卿設供張祖道都門外按黄帝子名祖不才而好遊死于道故今出行者祭郊次而後行曰祖參軍之供帳傾城西京賦門衞供帳官以物辨都䕶之刀環極浦刀環詳無忝序註九歌惟極浦兮寤懐别蛾眉兮在二八望龍額兮在三五補註鮑照詩蛾眉蔽珠櫳玉鉤隔瑣窻三五二八時千里與君同謝靈運怨曉月賦昨三五兮既滿今二八兮將缺并詳銅雀賦更或妾家燕趙君住河汾古詩燕趙多佳人河汾詳天章序君憐紅粉妾念羅裙製艷曲兮未敢忘懐異香兮不忍薰抱衾裯兮獨宿詩兾砧杵兮相聞郭璞曰砧擣帛之質謝靈運擣衣詩欄高砧響發楹長杵聲哀正復登高望逺覩物懷人倚危樓而躑躅臨複閣而逡巡公乃凭檻而歌振衣而顧王粲七釋振衣乎高嶽對景兮移情俯今兮弔古授簡鄒枚見璿璣賦使為之賦賦曰飛觀鬰嵯峨平臺捫蔦蘿罘罳還却月屈戍正橫波師古曰罘罳連闕曲閣也博雅曰屏也鮑照呉歌夏口樊城岸曹公却月城又曰曹公却月觀荆州記沔口北有却月城梁元帝元覽賦望却月而成眉註半月也梁簡文詩織成屏風金屈戍輟耕録人家窻户設鉸具或鐵或銅名曰環紐即古金鋪北方謂之屈戍傅毅舞賦目流涕而橫波金尊應對酒玊貌恰當歌魏武短歌行對酒當歌王樞詩玉貌映朝霞絶殊三閣外秋雨剪輕羅補註又曰千秋聞此閣形勢據名邦檻下芙蕖並樓頭蛺蝶雙王侯不可見花月為誰長朱闌七十二面面映空江僕本恨人遭逢苦辛詳海棠賦潘岳騎省之年尚餘一嵗晉潘岳秋興賦序余年三十有二始見二毛以太尉椽兼虎賁中郎將寓直散騎之省陸厥凋零之日已過三齡南齊書陸厥字韓卿工詩精聲韻因父閑被誅感慟而卒年二十八云未躬逢夫讌㑹徒馳想夫風雲王門養炬抽筆於茂宏之座謝家覧舉揮毫於安石之庭宋書沈約嘗曰王有養炬謝有覽舉按王泰字仲通事梁武刻燭賦詩名與王筠並重養為泰小字炬筠小字也謝覽與弟舉齊名江淹一見欽挹曰所謂馭二龍於長途也又按王導字茂宏養炬其四世孫謝奕弟安字安石覽舉其族姪云原註茂宏安石謂五叔祖實菴太史也遂乃終起而為之亂曰滕王閣兮江之汜作巨鎮兮奠方軌邦之人兮康且喜風俗醇兮政事美公之徳兮在南紀詩滔滔江漢南國之紀長無極兮永終祀銅雀瓦賦魏帳未懸詳本篇下鄴臺初築鄴中記銅雀臺在彰徳府臨漳縣魏操所築上有樓鑄大銅雀高一丈五尺置之樓巔複道袤延見璿璣賦綺窻交屬見滕王賦雕甍繡棟矗十里之粧樓金埒銅溝響六宫之脂盝晉書王濟常尚武帝女山公主性豪侈編錢為馬埒時謂之金溝註埒短垣也説文榼匣小者為盝庭棲比翼之禽户種相思之木爾雅南方有比翼鳥不比不飛名曰鶼鶼搜神記宋大夫韓馮娶妻而美康王奪之馮自殺妻遂自投臺下而死王使里人埋之與夫塜相望也宿昔有文梓木生二塜之端旬日而大合抱又有鴛鴦棲樹上交頸悲鳴宋人哀之遂號其木曰相思樹一作梓木根交于下枝連于上云呉都賦楠榴之木相思之樹并詳庭表序註馺娑前殿遜彼清隂班固西都賦經駘盪而出馺娑註漢武建章宫二殿名栢梁舊寢嗤其局䠞漢書武帝柏梁臺以香柏為之詔羣臣賦七言者賜上座無何而墓田𣺌𣺌風雨離離魏畧太祖臨終遺令施繐帳于臺上命婕妤妓人歌吹帳中月朝十五望吾西陵墓田按西陵操所塟處陸機弔魏帝賦悵繐帳之冥漠怨西陵之茫茫泣三千之粉黛楚詞粉白黛緑施芳澤些漢紀成帝時諸王侈靡有至粉黛三千者長恨歌後宫佳麗三千人傷二八之蛾眉招䰟二八侍宿射逓代些張正詩二八秦樓婦江總詩三五二八佳年少神女賦眉聨娟以蛾揚兮釋名蛾蠶蛾也其眉細而長雖有彈棊愛子傅粉佳兒藝經彈棊對局二人黑白棊各八枚下呼上擊之始自魏宫内妝奩戲也陸機弔魏武文序魏武將没時持姬女而指季豹示四子曰以累汝傷哉曩以天下自任今以愛子託人魏志何晏長於宫省又尚公主粉白不去手初晏七嵗眀慧若神魏武竒愛之因晏在宫内欲以為子何晏傳晏字平叔美姿容文帝疑其傅粉夏月賜熱湯餅拭汗而色愈鮮後曹爽反為司馬宣王斬於東市分香妙伎賣履妖姬魏畧太祖顧命曰餘香可分與諸夫人諸舍中無所為作履組賣也與夫楊林之羅襪西陵之玉肌曹植洛神賦容與乎楊林又云淩波微步羅襪生塵註植思甄后作感甄賦後明帝改為洛神賦楊林地名淩波而襪生塵言神人異也説文襪足衣也西陵見本篇上無不煙消灰滅矢激星移摭言水激則悍矢激則逺唐太宗詩激箭流星逺何暇問黃初之軼事銅雀之荒基也哉魏畧文帝丕黃初七年春草黃復緑漳流去不還只有千年遺瓦在曾向高臺覆玊顔晉書鄴都銅雀臺皆鴛鴦瓦述祖德賦并序為安邱張杞園作也杞園高曽以來代有盛徳維崧乃為斯賦賦曰牟山巃嵸濰水汪洋青州府志安邱縣名古渠邱地漢安邱隋牟山有濰水在安邱之界韓信與龍且夾濰水之陣即此上林賦嵸嶐崔巍廣韻汪洋水盛貌華子魚擲金之所趙邠卿賣餅之鄉漢書華歆字子魚高唐人管寧字幼安朱虚人與邴原號為三龍歆與寧鋤菜見金寧揮金不顧歆捉而擲之按安邱古蹟有棄銀坡後漢書趙岐字邠卿為京兆郡曹時中常侍唐衡兄玹為都尉岐與從兄襲數貶議之後玹為京兆尹盡殺趙家屬岐逃難江淮間匿名賣餅北海市中買三十賣亦三十時孫嵩察岐非常人曰我北海孫賔碩因藏岐複壁中數年作戹屯歌三十三章諸唐後滅岐因赦乃免則有天上張星人間公子天文志張星乃二十八宿之一徐陵詩張星舊在天河上從來張姓本連天杜詩天上張公子宫中漢客星舊家漂母祠旁夙住淮王城裏史記韓信釣於城下有漂母見信饑飯信淮安志漂母祠在山陽淮安乃漢淮南王劉安故址也常負笈於中原遂卜居於仁里漢書蘇章負笈追師千里不違楚詞註屈原卜居問所以居身之道也中原詳渭仁序龜因食墨以相攸洛誥我乃卜澗水東瀍水西惟洛食註史先定墨而灼龜之兆正食其墨也詩為韓姞相攸鶯為遷喬而戾止詩時則灣名涼水莊號高柯小沛則田廬不别新豐則巷陌無訛漢書沛國故秦泗水郡高帝改沛郡輿志徐州沛縣漢稱小沛漢書高祖因太皇思故豐里乃建城於關中而徙豐人實之曰新豐凡街衢棟宇一如豐里舊制雖雞犬各識其家陸氏之弟兄宅惟列屋世説補蔡司徒在洛見陸機兄弟住參佐廨三間瓦屋士龍住東頭士衡住西頭杜家之少長郡夾長河漢書杜周列三公両子夾河為郡守椒聊衍以愈碩瓜瓞綿而更多詩葢淮南張氏之在安邱者遼乎𦕈乎代不知其幾何也恒逖覽夫八垓説文八垓即八極地也國語王者舉九垓之田更流觀乎千䙫疇藝菽以得麻疇種松而遇枳補註列子呉楚之國有大木名櫾齊國稱之渡淮而北化為枳焉六帖晏子對楚王曰橘生江北為枳水土異也蓽門生執㦸之郎蓽門詳賀徐序執㦸詳嵗寒序㦸户有負薪之子㦸户詳看奕賦史記叔敖之子負薪詳竹逸序廷堅之祀忽諸若敖之鬼餒矣左傳臧文仲臯聞六與蓼滅曰皋陶庭堅不祀忽諸杜註六與蓼皆陶後林註庭堅皋陶字左傳楚司馬子良生子越椒子文曰是必殺之是子也熊虎之狀而豺狼之聲子良不可子文泣曰若敖之鬼不其餒而杜註而助語言必餒雖天道之循環實人謀之臧否維福善與禍滛盖監觀之甚咫術寧尚假於筳蓴理更何煩夫卜筮離騷經索瓊茅以筳蓴兮命靈氛為余占之註楚人名結草折竹卜曰筳篿書謀及卜筮閲數葉而武安勢隆隆其将起且夫梗枏欲直故屈其枝見滕王賦鵰鶚將翔暫愚其色高唐賦鵰鶚鷹鷂将飛揚伏竄呉越春秋扶同曰鷙鳥搏必卑飛戢翼老其拔地之材補註厚厥培風之翼莊子逍遥遊風之積也不厚則其負大翼也無力而後乃今培風以武安之窮經暨東津之種徳徒誇翰墨之勲未食詩書之力固履運之將亨抑遭逢之尚塞惟嗇夫之終畆書賴髦士之蒸蒸詩彼前賢之演祚需式穀之繩繩詩命以基而始固福以斂而逾增書基命定命又斂時五福驗高門而若劵規近事以彌徵粲粲文林煌煌寰海藝苑君宗詩君之宗之人倫模楷漢書天下模楷李元禮檢身則跬步矜莊御物則丰稜耿介恂恂執玊之容抑抑循牆之戒禮祭義孝子如執玊如奉盈鼎銘循墻而走亦莫余敢侮爾乃禮遵内則卦揲中孚禮内則篇名易中孚卦名笑史巫之紛若秉忠信以威如易用史巫紛若吉又厥孚交如威如吉少艾誰歡韞櫝保千金之璧論語機祥不惑揮鋤唾徑寸之珠詳鷹垂序原註霖海公嘗有還妾之事又公平生不信禍福嘗因卜宅夢一老嫗告曰庇公宇下久幸勿遷我當有以相報及起土見蛇蜿蜒以千百計公曰是疇昔之入夢者乎雖明月之珠我何愛焉卒移之野外捐長物於生前人安忍負詳憺園賦返遺貲於殁後信不能渝原註公晩年以槖中千金裝付一族長者曰吾兒幼待成立還之不則若自取之耳後諸孤長長者卒不忍負還金此公細行之昭昭而大端之皦皦者乎於是天牖其衷左傳夢呈其貌五福齊臻千祥並告庭來賈氏之彪三輔决録漢賈彪字偉節兄弟三人有高名彪最優時人語曰賈氏三虎偉節最怒室有桓家之豹桓沖子嗣小字豹奴蛇蟠笥上知為將貴之徵後漢許曼傳馮緄為議郎發綬笥有兩赤蛇分南北走許曼占之曰君當為邊將以東為名後如之庾信為賀婁慈碑蛇盤綬笥梁樂府緑蛇銜赤珠蛟吐懐中識是能文之兆董仲舒别傳仲舒少治春秋嘗夢蛟龍入懐為漢醇儒詎期千載而還復得三張之號晉書張載字孟陽與弟協景陽弟元季陽俱嫺詞賦時號三張伯兮嶽嶽季也觥觥嶽嶽詳黃門序註郭憲傳人語曰關東觥觥郭子橫註剛直貌暨夫仲子實號三張時則族望淹華門墻清峻長兄既繡虎羅胷曹植别傳子建七步成章世目為繡虎季弟復高蟬陪鬢詳半繭賦及銀臺啓客到集賢之里鶴盖成圍唐書裴度字中立聞喜人封晉國公請罷後治第東都集賢里作别墅劉孝標論雞人始唱鶴盖成隂人過通徳之坊犢車作陣鄭元傳鄭康成高宻人杜門修業孔融深敬之告高密縣為元特立一鄉為鄭公鄉曰通徳門晉書武帝賜汝南王彦皂盖犢車烏啼府畔遙知御史之家漢書朱博為御史中丞府中柏樹烏集其上朝去暮來因號烏臺柏臺鷁畫船頭羣問孝亷之信晉張協七命乗鷁船兮為水嬉註畫鷁於舟首壓水神也晉書張慿字長宗少舉孝亷負其才氣詣劉尹真長同舉者笑之劉竟留宿至曉慿還船劉遣人覔張孝亷船同侣惋愕劉即薦為太常博士揮毫空齊魯之場持斧下江淮之郡漢暴勝之傳勝之為直指使者衣繡衣持斧逐捕盗賊威振州郡繄次公之積學屬時譽之推賢才邁班揚之上沈約宋書傳論王褒劉向揚班之徒註揚雄班固也身居季孟之間論語第五則何慙驃騎盈川則詎愧盧前世説晉何充為驃騎將軍弟準字幼則充勸令仕準曰第五之名何減驃騎兄弟中準居第五故云後充居宰輔準散帶衡門而已楊烱傳唐武后時烱為盈川令與王勃盧照隣駱賔王號四傑烱曰吾愧在盧前恥居王後射策而名喧日下詳琅霞序談經而聲溢天邊况彼鯉庭論語仍生驥子北齊書裴景鸞有逸才河東呼為驥子梁文帝書價疋龍媒聲齊驥子杜詩驥子好男兒註次子宗武也階既名蘭園還字杞謝元傳謝安問諸子姪子弟亦何預人事而欲其佳元曰譬如芝蘭玉樹欲其生於階庭耳杞園本篇園名髫齡讀諸父之書壯嵗撰一家之史思親則獨行深醇述祖則高文清綺夫乃愴孝亷之早圽悲大阮之先零史記白起贊以致圽身註圽終也晉書阮籍字嗣宗為大阮姪咸字仲容為小阮僅馳情於想像終結念於平生園中之橘刺藤梢遊踪儼在詳看奕賦楮上之龍跳虎卧手澤如生書品王右軍書如龍跳天門虎卧鳯閣禮父没而不能讀父之書手澤存焉耳抱蔓摘瓜腸斷道旁之􅀈唐書李泌因肅宗殺建寧王倓乃諷諌謂天后有四子長曰宏天后酖殺之立次子賢賢内懼乃作黃臺𤓰詞曰種瓜黃臺下瓜熟子離離一摘使瓜好再摘使𤓰稀三摘猶自可摘絶抱蔓歸廣雅瓜子謂之􅀈求魚縁木人傳樹下之􅃵孟子原註孝亷公瓜蓏將熟必先奉母嘗行圃中見遺蓏在地愀然曰誰先吾毋食乎遂抱蔓歸又一日獲嘉魚將薦几筵庖人不知悞以入饌公覆􅃵瘞之種樹其上土人至今名為魚樹焉若夫逺汎淮揚長驅恒代企季父之勲名訪清白之梗概清白詳歸田序東京賦其梗概有如此註粗言也殘旂凍皷天雄之涕淚恒新大名志漢曰魏郡唐曰天雄宋曰大名一作廣平府地古戍空營魏愽之謳歌斯在唐末藩鎮紀田承嗣安史之將既降以為魏博五州都防禦使二年詔以魏博為天雄𣙜醝而績奏熬波轉餉而功成賦海相逢南國之舊人盡説西臺之遺愛左傳子産卒仲尼出涕曰古之遺愛也官制御史為西臺後魏書中書省為西臺既而還轅稷下青州志臨淄縣有稷下古蹟詳九日序返轡渠丘見本篇上愾明經之耆徳溯厥考之貽謀嵇中散琴絃餘音未杳晉書嵇康嘗遊洛西暮宿華陽亭引琴而彈有客取嵇琴彈廣陵散以授嵇誓不傳人後康臨刑索琴向日影彈之曰廣陵散於今絶矣徐景山酒器殘瀝仍留魏志徐邈字景山魏國初時科禁酒而邈私飲沉醉問以事邈曰中聖人齊書竟陵王蕭子良遺何㸃以徐景山酒鎗註酒器也一作遺以嵇叔夜酒盃徐景山酒鐺滑稽列傳淳于髠曰侍酒於前時賜餘瀝四壁奇香尚繪宣和之博古宋書元祐中吳大臨裒三十六家所藏三代秦漢尊彛鼎敦之屬繪之於幅為考古圖凡十巻黃伯思又撰博古圖書十一巻政和八年又修宣和博古圖按徽宗宣和七年萬竿風竹猶傳墨𣲖於湖州文同傳同字與可善墨竹嘗知湖州世稱文湖州宣和畫譜湖難墨竹圖乃黃居寀字伯鸞所藏圖繪寳鑑吳王錢鏐善墨竹郭崇韜伐蜀得李夫人亦能墨竹一聞松雪之名情深桮棬禮但見葡萄之樹淚滴松楸原註明經公生時有葡萄之兆故字漢萄晩又號松雪老人仲長統昌言古之塟者松栢梧桐以識其坟能不景前徽之未沬而悟來軫之方遒也哉睠此庭柯臨風歎嗟三辰急景三辰見璿璣賦杜詩不辭辛苦行迫此短景急四節流波陶彭澤之田園荒蕪已甚陶潛傳潛為彭澤令八十餘日即解印綬賦歸去來辭有曰歸去來兮田園將蕪胡不歸庾子山之家世惆悵如何庾信哀江南賦有曰信年始二毛即逢䘮亂又曰我之掌庚承周以世功而為族經邦佐漢用論道而當官惆悵見滕王賦懼前修之莫紹苦去日之孔多魏武短歌行譬如朝露去日苦多然而于氏門邊詳憺園賦千尋喬木王充論衡覩喬木知舊都欒公社上百尺藤蘿漢書文帝時欒布為燕相至將軍以功封俞矦燕齊之間皆為立社號欒公社定知平子之遺代皆擊轂平子詳園次序註戰國策蘇秦説齊王曰臨淄之塗車轂擊人肩摩預决伯松之後人盡鳴珂漢書張竦字伯松與陳遵同傳按唐相張嘉貞弟嘉祐每朝軒葢騶從盈閭巷時號所居坊曰鳴珂里家和在隂之鶴塾留時術之蛾易鳴鶴在隂其子和之禮蛾子時術之染翰方終已為鳯繇作賦染翰詳懸圃序左傳初㦤氏卜妻敬仲其妻占之曰吉是謂鳯凰于飛和鳴鏘鏘五世其昌並於正卿註繇卜兆辭濡毫有待爰因鵲起興歌莊子鵲上高城之危而巢於高榆之巔城壞巢折凌風而起故君子之居世得時則蟻行失時則鵲起歌曰安邱之山鬱然蒼兮安邱之水浩無方兮見本篇上疇為寓公詳孝威序臨淮張兮山高水深並無疆兮宜爾子孫永悦康兮瑞木賦瑞木賦者陽羡宜興志古陽羡地陳維崧之所作也壬寅夏四月之吉少司農周櫟園先生塟其太翁如山先生太母朱太夫人於鍾山北鎻石之陽輀車既駕虞歌將闋説文輀車䘮車也禮贈而祝宿虞塟日虞註贈以幣送死者於壙迎精而反謂虞也左傳吳與齊戰齊人公孫夏命其徒歌虞殯註示必死也司農痛音容之杳邈睠廧翣以躊躇檀弓周人牆置翣説文廧槨衣也翣棺羽飾也形如扇悽戀徘徊撫視備至見太夫人匶底異紋鬱起作奇石狀其上卉木蓊翳樛枝縈拂嘉條攅布觀者萬人咸稱靈瑞維崧乃殫思勘慮撰為斯賦以俟採風者録焉其辭曰胙汝南之華胄兮詳憺園賦叶歸昌之姬恵詩厯日月而颺聲兮代羽儀於王國易其羽可用為儀吉懿鴻鈞之斡運兮允無頗其埏埴老子埏埴以為器當其無有器之用初綿瓞於大梁兮既仁里於南服繄哲考之誕降兮緬純淑之嘉則纗余芳之葐蒀兮竦余身以正直張衡思元賦纗幽蘭之秋華註纗者繫囊之䋲也江淹愛逺山賦丹秀葐蒀書一曰正直玉姬撰吉而釐降兮書義疏釐降治裝下嫁也詠蘋蘩之孔嘉詩館朝築夫穠李兮頌夕獻夫椒華春秋築王姬之館於外詩何彼穠矣華如桃李晉書劉臻妻陳氏元日獻椒花頌曰美哉靈葩爰采爰獻聖容映之永夀千萬攬百禮其靡愆兮詩以洽百禮紛總總其珩牙雜録佩有二璜作牙形於其中以前衝之使關而相擊有穿孔罥繫處奉盤匜而克相兮國語越行成於吳曰奉盤匜以隨諸御流徽音於笄珈詩維坤儀之温粹兮爰降康之實多皇覧錫厥祚𦙍兮芬肹蠁於幽遐離騷皇覽揆余於初度兮註皇考也覽覩也揆度也詩永錫祚𦙍師古録肹蠁言聲繁㑹如蟲飛肹然響赴也相如上林賦肹布寫於幽遐孕星精而踐夢兮風俗通東方朔太白星精唐李白傳白之生夢長庚星入懐因以命名摭若木以委佗見璿璣賦爾君子之端慤兮獨懐仁而抱義餐翰墨以為糧兮紉夜珠以為佩既袒免以擗踊兮且汍瀾以愴神檀弓袒免哭踊註袒免去冠而加免也檀弓辟踊哀之至也註撫心為辟跳躍為踊陸機弔魏武文涕垂睫而汍瀾息夫躬絶命辭涕泣流兮雚瀾望鎖石之高岡兮見本篇上蔚乎百年之佳城博物志漢滕公夏侯嬰死公卿送塟之東都門外馬不行踣地悲鳴得石槨有銘曰佳城鬱鬰三千年見白日吁嗟滕公居此室乃塟斯地謂之馬塚背攝山而袤延兮欱淮水以崢泓金陵志攝山在府東北産攝生草上有千佛嶺棲霞寺淮水在上元縣東南王𨗳使郭璞筮之曰淮水絶王氏滅即此袤延見璿璣賦墨人既協之以吉兮見祖徳賦䈶氏復告之貞孝經卜其宅兆而安厝之䈶古筮字廞厥車於山兮虞歌鏘其悽鳴見本篇上馬遲回而不前兮見篇上註旐差池而顧慕晉謝莊宣貴妃誄望樂池而顧慕褮衣颺而復停兮説文褮衣鬼衣也清酤設而未御倚墓門而悚惕兮臨竁穴以沉思詩墓門有梅周禮卜塟兆甫竁亦如之註穿壙曰竁撫録錯而抽裂兮六書故以剛鉄交錯為深理磨厲金石者也淚覆面而沾頥羌蛇行而䑕泣兮流觀乎廧翣之周坻蘇秦傳蛇行蒲伏詩䑕思泣血廧翣見篇上周坻四旁上下也􅀈折髂而不任趾兮揚子解嘲折脅拉髂註髂腰骨也跽深墨焉其睨之孟子呼天只而無聲兮詩母也天只旋至於母氏之元堂􅀈奇理之鑱削兮惝恍乎竹石之縱橫其為狀也谸谸芊芊非雲非煙説文山谷谸谸青也潘岳籍田賦碧草肅其芊芊註盛也史記天官書若煙非煙若雲非雲郁郁紛紛蕭索輪困是謂卿雲褰縐戍削屈橈璘斒子虚賦襞績褰縐紛紛裶裶又揚拖戍削註戍鮮也削刻除貌言其美也史記註橈屈曲之意説文璘玉文斒色雜也難得而殫稱焉鴻淋淋兮詳見璿璣賦詭汨汨兮枚乘七發聊兮慓兮混汨汨兮字林汨汨亂也没也或曰遙閜珂乎若深崖幽􅊤霜㕡雷剝上林賦抗衡閜砢註閜與砢同相扶貌龍質而虎章棧齴乎若枯椶病栝張衡西京賦棧齴巉險註高峻貌枯椶詳藝圃序書杶榦栝栢抗峯冠日欲偃而難僵溶兮沇兮夏雲䙰褷翍雲錦而下張相如上林賦沇溶滛鬻註沇水行貌溶水盛貌王維詩人立何䙰褷註衣帶交結貌又韓愈詩視物隔䙰褷註目昏貌楊雄甘泉賦翍桂椒而鬱移楊註翍張羽貌又與披通古詩天孫織就雲錦裳葳兮蕤兮九苞勃窣䌨繡臆而高翔孫氏瑞應圖葳蕤瑞草又盛貌陸機文賦紛葳蕤以馺遝論語摘衰聖鳯有六象九苞相如子虚賦媻跚勃窣上乎金隄説文勃窣從穴中卒出也山海經丹穴之山有鳥五色而文曰鳯綷䌨詳半繭賦爾其擢纎柯以㛹娟兮雪賦初㛹娟於廊廡聳秀條之鬖髿六書故鬖髿垂散貌則孝子之白華也詩爾其潄緑葉之澹淡兮楊素花於陂陁詳瀛臺序則詩人之蓼莪也詩爾其挺虬龍之異姿兮詳瀛臺序學松栢之遺直禮如松柏之有心也則忠臣之屈軼也通鑑黃帝時有草生於庭佞人入則指之曰屈軼吾聞庻人之純孝兮澤林茂而浮珍舒怪草秀於階闥兮瀵㵫出其神魚孝經援神契天子孝天龍負圖地龜出書庶人孝澤林茂浮珍舒怪草秀水出神魚列子禹治水迷而失塗謬之一國濱北海之北不知距齊州㡬千萬里其國有水湧出名曰神瀵臭過蘭椒爾雅瀵㵫水紋動貌白帖王延後母勑延求魚延叩頭於水而哭有一魚躍長五尺又姜詩母好江水詩至孝舍旁湧泉如江水并雙鯉同出以供母膳又聞先民之列傳兮躬負土而為塋屹岧嶤之五尺兮松竹蓊焉而自生孝子傳宗承父資䘮承負土為塋一夕而成後墳土自高五尺松竹自生又漢武時張融字思先後漢方儲方聖明晉許孜字李義親没皆負土成墳未若兹之顯瑞兮心猶豫而狐疑離騷心猶豫而狐疑兮欲自適而不可爾雅猶如鹿善登木常居山中忽聞有聲則恐人害之每預上樹久久無度復下須臾又上故不决者稱猶焉一曰隴西俗謂犬子隨人行毎預前待人不得又來迎候故言猶豫述征記北風勁河氷始合要須狐行云此物善聴聴氷下水無聲然後過河師古曰狐性多疑毎渡氷河且行且聴故言疑者稱狐疑言握粟而出卜兮召太人其占之占曰天錫公純嘏苾苾芬芬是剝是饗神保其將俾爾熾而昌又曰母氏之徳維其階矣詩庶草蕃蕪答嘉祉矣書和氣致祥靡所違矣韓文和氣致祥子孫篤之是以有慶矣詩亂曰非惟篤之又汜布濩之相如封禪頌非惟雨之又潤澤之非惟徧之又汜布濩之爾雅汜岐流􅂧還本水也一家之吉兆在萬方帝開左个月令天子居青陽左个矞矞皇皇爰立作相書之紀之綱詩山出器車藪遊鳯凰禮運山出器車河出馬圖鳯凰麒麟皆在郊陬註器車若銀甕丹甑奇木效順朱莖呈房蔡邕傳邕母卒廬於墓側木海生連理白帖孝童周智䘮父廬於墓有紫芝之祥山經赤芝一名丹芝黃芝一名金芝白芝一名玉芝黒芝一名元芝紫芝一名木芝天台賦五芝含秀而晨敷漢武紀甘泉宫内金芝九莖連葉元封中芝生房作芝房歌百靈調和四民悦康輔佐緝熈比隆陶唐陳檢討四六巻一
