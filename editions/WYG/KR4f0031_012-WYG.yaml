body:
  text: 陳檢討四六巻十二翰林院檢討陳維崧撰序賀周棣園先生南還廣陵序蓋聞庶女撫膺赤帝見飛霜之異見貞女序賤臣隕涕白虹來貫日之竒列女傳荆軻發後燕太子自相氣見白虹貫日不徹曰吾事不成矣國策唐雎曰聶政之刺韓傀也白虹貫日理無𣺌而不通物無㣲而不格文賦理無㣲而不綸矧夫名應球璜位班嶽凟爾雅東嶽泰山南嶽霍山西嶽華山北嶽恒山中嶽嵩山江河淮濟爲四瀆按霍山一作衡山記五嶽視三公四瀆視諸侯而乃拾灰惑志於尼父見觀槿序掇蜂悼心於伯竒見歸田序忠泉遘湧溢之悲見歸田序孝笋罹折摧之懼見臞菴序此則玊馬似殷仁而出地瑞應圗玉馬者王者清明尊賢則至補註金縢因姬旦以籲天者矣書櫟園周先生者德挺黄中性鄰殆庶易袁司徒之家世名重兩京楊太尉之丰裁望隆三事見紫來序加以石奮家風史傳醇謹見歸田序于公門户人頌平反漢書于公治獄多所平反不平者平之誤之者反之言獄平也並見憺園賦蚤膺華秩軍中呼公瑾爲郎見鴻客序夙懋隂功邑内以賈彪爲父見歸田序自栽花而植栢預簉崇班栽花見楚鴻序植栢見祖德賦由馴雉以乘驄洊登華省後漢書魯恭爲中牟令河南尹使椽往㢘之恭隨行阡陌有雉止其傍傍有兒童椽曰何不捕之兒言雉將雛椽曰螟不犯境化及鳥獸童子有仁心此三異也續漢書桓典字公雅爲侍御史執政無所迴避常乘驄馬京都畏之語曰行行且止避驄馬御史屬興朝之當璧正江左之粗安謂廣陵者北控淮徐衢連闤闠見滕王賦南通吳㑹户溢笙竽左思詩南隣擊鐘磬非里吹笙竽顧自劉濞披猖之後盡苦灰釘史記吳王濞者髙帝兄劉仲之子也髙帝立爲吳王景帝時與七國反初起兵廣陵西涉淮因并楚兵陳霸先本紀九錫文云妖酋震懾遽請灰釘註闔棺所須也魏畧王凌隂謀廢立事覺凌知罪重試索灰釘抑本髙駢狂惑之餘俱嬰糜爛唐僖宗紀髙駢爲浙西鎮海軍節度使乾符六年破黄巢兵中和二年騈上表不遜遂絶貢獻都將畢士鐸討執殺之俗變魚鹽之舊市無紈袴之家不藉撫綏奚由安戢先生始以兵使者至則投匭不聞探丸罕警唐書武后垂拱二年置匭四枚以銅鑄四面各依方色東曰延恩南曰招諫西曰伸寃北曰通𤣥并見禹平序漢書尹賞字子心守長安令長安無頼少年殺吏探丸得赤丸者斫武吏黑丸者斫文吏得赤白者主治喪尹賞收捕得數百人納虎穴中茱萸灣上時裝陶侃之船揚州志茱萸灣一名灣口今名灣頭城之東北晉書宣武伐蜀裝船悉以作釘通鑑蘇峻之亂温嶠軍食盡侃分米餉之陳敏遣陳恢寇武昌侃禦之以運船戰并見歸田序庾信哀江南賦陶侃空裝米船楊栁堤邊還揮顧榮之扇隋紀煬帝詔民間植栁一株賞一縑江都有楊栁堤晉書顧榮字彦先元帝時廣陵陳敏反假榮丹陽内史榮以白羽扇揮之其軍自潰因號麾羽渡楊修詩羽扇一揮風偃草策勲名藉顧丹陽三年保障十邑謳歌國語趙簡子使尹鐸爲晉陽曰繭絲乎保障乎簡子曰保障哉兼之大德曰生至仁不殺保全世族不隳郤克之宗春秋晉殺其大夫郤錡郤犨郤至左傳胥童夷羊五帥甲八百攻三郤氏長魚矯以戈殺之皆尸諸朝注郤錡乃郤克子郤缺孫郤缺即冀缺缺之父冀苪嘗欲殺文公文公不以罪其子以缺爲卿復與之冀後至厲公以外嬖誅三郤擁䕶善人獲免欒鍼之族春秋襄公二十三年晉人殺欒盈左傳晉士鞅曰武子之德在人猶周人之思召公焉欒壓死盈之善未能及人註武子欒書壓之父也盈壓之子也欒氏至盈而亡左傳鄢陵之戰郤毅御公欒鍼爲右註鍼乃書之子并詳翼王序環來黄雀識爲衘恩見素伯序珠出丹蛇知因報德見鷹垂序固已闗名䢴水居然朱邑之桐鄉揚州志䢴溝在廣陵城下吳王夫差鑿漢書朱邑字仲卿舒人少爲桐鄉嗇夫㢘介遷北海太守以治行第一拜大司農山號蜀岡宛爾羊侯之峴首矣揚州志蜀岡在府城西相傳地脈通蜀故名峴首見梧月序無何移節八閩分符百粤見考功序連天瘴癘直暗銅標見商尹序極地戈鋋方言吳越間謂戈爲鋋偏侵石鼓補註犀船不返猶推徐福爲仙見天章序兕甲無憑尚說田横有島左傳牛則有皮犀兕尚多註犀兕之皮皆可爲甲孫卿子楚以犀兕爲甲堅如金石田横傳横爲故齊王榮弟漢髙帝立横與其徒五百餘人入居海島中先生則灑涕而談登陴而誓左傳子太叔授兵登陴温太真臨流釃酒袛傳慷慨居多晉書王敦薦嶠丹陽餞别嶠起行酒至錢鳯前佯醉曰錢鳯何人温太真行酒而敢不飲後鳯襲都下嶠督兵夾水戰破之傅修期馳檄飛書惟以悲哀爲主魏志傅永字修期有氣幹仕魏兩月間獻捷者再帝嘆曰上馬能擊賊下馬作露布惟有傳修期耳終焉賊退屹爾城完天子乃嘉厥元功膚斯重寄賜之蟬翼掌此烏臺爰乃賈生痛哭願繫尉陀賈誼疏序臣竊惟事勢可爲痛哭者一漢書尉陀姓趙真定人秦時爲龍川令依南海任囂囂死後僣號文帝遣陸賈賜陀復南粤王遂稱臣賈誼策行臣之計必係單于之頸而制其命徐樂直言只憂閩越史記孝武元光中趙人徐樂齊人嚴安俱上書言世務各一事詳翼王序蓋始焉以梁代之忠臣蚤虞侯景見琅霞序終焉以晉朝之烈士見忌王彌晉書自惠懷之亂中原雲擾王伯根王彌以逆臣爲寇盜漢劉聰遷懷帝王彌引兵㑹之雖深當宁之思已觸要人之怒然而囚服還閩猶能殺賊赭衣出獄尚請嬰城左傳取我衣冠而赭之註赭衣囚服也國䇿黄歇說秦昭王曰嬰城而魏氏服矣註縈也藍田箭盡徒奮手以射人見得仲序李陵傳陵自請曰願得自當一隊到蘭千山南陵未至鞮汗山一日五十萬矢皆盡遂降按田疑作山河橋路窮趣免胄而却敵晉書陸機爲長沙王又敗于河橋庾信連珠詞李都尉之風霜上蘭山而箭盡陸平原之意氣登河橋而路窮唐紀髙宗時突厥寇幷州薛仁貴擊之突厥曰聞仁貴流象州死矣何以紿我仁貴免胄示之敵下馬列拜稍引去代宗時回紇吐畨合兵圍涇陽郭子儀免胄釋甲而進使人傳呼曰令公來回紇大驚諸酋長皆下馬羅拜吐畨遂遁此則射烏樓上最可驚魂福州城南螺女江邊堪爲動魄者也輿志螺女江在福州府城西北奈何忠豈勝讒功難止謗師師有位誰憐趙蓋之寃漢書趙廣漢蓋寛饒皆不得其死穆穆羣公孰訟甘陳之枉漢書元帝時西城副校尉陳湯與都䕶甘延夀矯制發兵襲擊匈奴郅支單于於康居斬之石顯匡衡謂其矯制劉向因上疏論二人功帝尋下詔封延夀義成侯賜陳湯爵關内侯既間關而對簿見鴻客府復匍匐以就臺詩斯時也三千下客盡願相從七十老翁爭思自剄下注舉幡太學通鑑鮑宣下廷尉王咸舉幡太學下曰欲救鮑司𨽻者㑹此甘栲掠以如飴負鑕門徒棄妻拏而不恤俄焉覆盆漸白司馬遷傳戴盆何以望天李詩願借羲皇景甘心照覆盆見晛終消詩當南箕織罪之時狂沙蔽野詩哆兮侈兮成是南箕及北寺論功之日澍雨彌空北寺見黄門序漢安紀永初三年三月旱至五月和熹鄧太后幸洛陽省寃未還宫澍雨大降唐書顔真卿決獄而雨號御史雨路人猶以為寃天子遂為之動金雞初唱竟出王尊晉天文志肆赦必立雞竿漢王尊傳尊為京兆尹被張忠誣害免官湖三老公乗興上書訟寃復以尊為徐州刺史丹鼎將成益思李牧李牧傳牧趙人爲趙將守雁門封武安君漢書馮唐嘗對文帝及㢘頗李牧帝拊髀思之攀龍髯而莫逮見孝威序憐馬角以初生見觀槿序先生遇赦實順治十八年正月初七日也涼秋八月南下廣陵於是郊迎郭伋皆爲騎馬之兒循良傳郭伋字細侯建武中除潁川太守伋前在幷州素結恩德後行部到西河兒童數百騎竹馬迎拜道次人識叔敖知是斬蛇之客孫叔敖傳叔敖兒時于夢澤見兩頭蛇歸泣白其母曰吾聞見此者死母曰蛇今安在曰恐後人見殺而埋之矣母曰吾聞有隂德者必有陽報復爲楚莊王相竹西士女競獻壺漿輿志揚州有竹西境杜牧詩誰知竹西路歌吹是揚州官閣賓朋咸摛詞賦杜詩官閣疎梅動詩興還如何遜在揚州某以不才適逢斯㑹昔年優渥曾陪明月之樓見歸田序註今日衰遲已作秋風之扇見海棠賦當先生䝉謗之日正賤子履險之辰王成漸老愧賣卜以何能後漢李固傳固下獄門人王成得固子燮乘江東下變姓名爲酒家傭而成賣卜于市各爲異人隂相往來積十餘年梁冀既誅燮乃還鄉里并詳俊三誄甯武終愚恨槖饘之無力緑池不逺望王儉以知歸絳帳非遙念馬融而思報聊鳴欣慶并序私恩南耕席上送潘蓴菴入都序月届仲春時維下浣桃將作綬草漸成茵㑹霽景之方妍適故人之欲别萋萋綿羽送花縣以長征宛宛新荑竚梅廬而小集飛文散藻客盡江蕭搖筆摛華人皆庾鮑吹簫撥阮填紅杏之新詞射覆藏鈎騁碧雞之雄辨觥船絡繹曉露纔晞燭樹駢羅參旗乍散燭樹詳祭梁文甘泉賦駢羅列布鱗以雜沓兮景福殿賦參旗九旒周禮熊旗六斿八象伐詩傳參伐也然伐一星以旗象參曰參旗史天官書參爲白虎其西有勾曲九星一曰天旗正義參旗九星在參西天旗也華堂投轄見得仲序尚淋漓按拍而歌上客更衣見藝圃序已慷慨登車而去僕也河上枯魚枝頭窮鳥莊子外物篇莊周謂鮒魚曰我且激西江之水而迎子可乎鮒魚曰吾得升斗之水然活耳君乃此言不如早索我于枯魚之肆漢樂府古辭枯魚過河泣何時悔復及魏氏春秋劉政投邴原日窮鳥入懷後漢文苑傳趙壹恃才倨傲不爲鄉里所容作窮鳥賦以自遣有曰文籍徒滿腹不如一囊錢無緣奮袂言隨祖逖之鞭晉書劉琨聞祖逖被用勝敵與親故書曰吾枕戈待旦常恐祖生先我着鞭有意揮毫聊代繞朝之策見考功序嗟乎人非麋鹿志在麒麟楚詞死日將至兮與麋鹿同坑孔叢子子髙遊趙趙客有鄒文李節爲友及别文節流涕交頥子高惟握手而已分袂就路其徒問之子高曰人生有四方志豈鹿豕哉而常羣聚乎漢書宣帝圗畫功臣十一人于麒麟閣首慱陸侯霍氏終蘇武云按漢武以獲白麟故作麒麟閣事尚可爲君猶未老泰階已正見雪持序即才人杖策之秋後漢書鄧禹杖策追光武于鄴註杖持也策馬箠也皇路將平乃志士立名之日行矣良朋勉㫋上國金臺在望見九日序知斯行定得風雲易玊佩可要曹植洛神賦解玉佩以要之只此去難忘花月見舜民序不辭蛙黽楚詞蛙黽遊乎華池註聲衆也又齊魯間謂蛙曰蟈黽耿黽魏都賦勾吳與鼃黽同穴用告驪駒見考功序送汪存菴廣文出都序宫開碣石正才人委贄之秋見九日序閣敞平津尤志士乘時之日見佳山序飯牛牧豕爭思奮跡於風雲吕氏春秋甯戚家貧無資爲人挽車至齊國于車下飯牛扣牛角而歌桓公聞而異之因授以政公孫𢎞傳𢎞家貧牧豕海上年四十餘乃學春秋雜說武帝舉賢良對策第一附鳯攀龍咸願策名於日月揚子法言攀龍鱗附鳯翼漢書耿純曰士大夫固望攀龍附鳯以成其志耳策名見貞女序於是銅街珂里之胄盡簉雲衢銅街見滕王賦珂里見祖德賦繩樞甕牖之賓半登天府莊子原憲桑以爲樞而甕牖二室秦紀陳涉甕牖繩樞之子鴻都鶴蓋無非爲子求官後漢書靈帝光和元年置鴻都門學註鴻都漢門名鶴蓋見祖德賦漢明帝紀館陶公主爲子求郎帝曰郎官上應列宿栁市花宮栁市詳萬栁啟花宫詳靈岩碑大抵送人作郡見園次序綠蛇蟠肘見祖德賦上焉既符竹之縱横詳孟太母啟銀艾垂腰其次亦騶徒之絡繹漢書張奂字然明嘗曰吾前後仕進十腰銀艾並見憺園賦騶徒見天章序魯靈賦縱横絡繹光延宅畔爵弁薰天見雪持序道政坊邊丹緌溢地見茹惠序於斯時也乃有人焉一官落落求爲噲伍以何從漢書韓信居常鞅鞅羞與絳灌等列過樊將軍門出嘆曰生乃噲伍十載棲棲欲在王前而不得國策齊宣王見顔斶曰斶前斶亦曰王前宣王不悅斶對曰夫斶前爲慕勢王前爲趨士使斶慕勢不如使王趨士陳編斷簡仍淹伏勝之一經見昭華序慱帶裒衣空負鄭䖍之三絕唐書列傳鄭䖍字弱齊善書畫嘗自寫其詩幷畫以獻𤣥宗大署其尾曰鄭䖍三絶叢殘緺綬未階半刺之榮褚先生滑稽傳東郭先生佩青緺説文綬紫青色曰緺晉庾亮集别駕舊與刺史别乘同流宣王化于萬里者其任居刺史之半安可任非其人憔悴青衫只壓百僚之底書百僚師師堆盤苜蓿唐書薛令之于開元初爲東宫侍講題詩于壁曰朝旭上團團照見先生盤盤中何所有苜蓿長闌干後掛冠歸隠挿架縹緗見尺牘序在旁人或訕其迂即自顧猶嫌其泠然而性拙干時韻難適俗壯而筮仕見賀徐序註終不離乎膠庠少豈如人見鞠存啟註雅習聞夫俎豆畧比抱關之禄自溷師儒還同執籥之夫相安冗散詩疇縻好爵姑策勲於翰墨之塲詎鄙卑官聊肄業於辭章之圃此羣公出餞共摛祖道之章見滕王賦而賤子臨岐爲製贈行之序也僕語未闌君行毋遽憶訂尹班之契見尺牘序頗聨袁灌之交見半繭賦綠忩紅燭值肥腸滿腦之秋見懸圃序白酒黄雞當鬚奮髯張之候先生既㧞斾以摩旌賤子亦脫冠而免胄左傳㧞斾投衡又許伯曰吾聞致師者御靡旌摩壘而還又郤至見楚子必下免胄而趨風擲杯而起誰云曲逆之長貧魏志左慈字元放廬江人書操欲殺之爲設酒云逺别願分杯飲㧞簮一畫杯即中分擲杯化爲雙燕草碣詩擲下離觴指亂山陳平傳平少家貧無與婚者有富人張負謂子仲曰豈有羙如陳平而長貧者乎遂以孫女嫁之後官至丞相封曲逆侯蹋臂而遨自信買臣之必貴飛燕外傳趙后所通宫奴燕赤鳯連臂蹋地歌赤鳯來曲漢宫故事十月五日上靈女廟連臂踏歌梁書胡后思楊華使宫人連臂踏足歌之輿志鍾陵西山遊者至中秋多召名姝握臂踏歌買臣傳買臣家貧賣薪妻求去買臣曰我五十當富貴今已四十九矣後爲㑹稽太守由今溯昔曾幾何時談天客去憮鄒衍以悲來史記鄒衍迂大而宏辨故齊人頌曰談天衍並見三芝序繁露書成睠江都而涕下漢書董仲舒對天人三策帝以爲江都相作春秋繁露十七卷行于世公孫𢎞嫉之册府元龜仲舒說春秋文舉王杯繁露清明竹林之屬山丘華屋里巷宵迷曹子建箜篌引生存華屋處零落歸山丘鬻畚吹簫朋遊星散鬻畚見無忝序吹簫見雪持序何期萬事之都非竊幸兩人之斯在蜀鵑再到百年悵惘以安歸詳孟太母啟遼鶴仍還四顧寂寥而誰與續搜神記遼東城門有華表柱忽有一鶴飛集言曰有鳥有鳥丁令威去家千載今來歸城郭如故人民非何不學仙塜纍纍陸平原之意氣見孝威序及賀周序向子期之平生見得仲序能無惻愴窮塵見琴怨序摩抄昔夢也乎韓愈石鼓歌誰復着手更摩抄山谷書跋余一夜摩抄囊腹時則班馬齊鳴左傳晉邢伯曰有班馬之聲齊師其遁註班别也夜遁馬不相見故作離聲華軒徐動論心闕下兾他日以能來揮手風前囑故人其姑去唐詩揮手自兹去蕭蕭班馬鳴毛大可新納姬人序曾聞初日只出東南古樂府有日出東南隅行亦曰日出行又說髙樓惟居西北古詩西北有髙樓上與浮雲齊是以中山少女能移趙主之心國策司馬喜見趙王曰臣未嘗見人如中山隂姬者也其眉目准額權衡犀角偃月乃帝王之后也趙王意移大悅曰吾願請之燕市美人堪佐慶卿之酒國策太子丹尊荆軻爲上卿太子日造門下供太牢具異物間進車騎姜女恣荆軻所欲以順適其意涿州志燕丹與樊將軍飲于華陽臺出美人佐酒過邯鄲之里乃有鳴箏詳合肥書經淇水之濱纔逢巧笑詩詎須荆國始留神女之峯㐮陽耆舊傳赤帝之女名瑶姬未筓而亡𦵏巫山之陽巫山有十二碧峯曰神女峯見良輔序何必炎荒方誌綠珠之井嶺表錄異綠珠井在廣西白州雙角山下昔梁氏之女有容色石季倫以真珠三斛買之飲此水者誕女多美麗然而燕瘦環肥要緣風土燕瘦見昭華序小名錄楊貴妃小字玉環唐小説飛燕瘦玉環肥越禽代馬互有便安見無忝序悲哉北地之髙寒邈矣中原之蒼莽見渭仜序人雖善睞秋非水以何波女縱工顰春無岫而奚黛曲眉纎靨相逢識是吳娥楚詞大招曲眉規只後漢志元嘉中京都婦女作愁眉細而曲折偉幹豐頥不問知爲燕産畧如翁伯史標短悍之稱見懸圃序粗比薛公人奉魁然之號史記孟嘗過趙皆笑曰始以薛公爲魁然也今視之乃𣺌小丈夫耳每覩賈妃之黑輒思衛女之頎晉史世祖欲爲太子娶衛玊女賈克妻郭槐賂楊后左右納其女武帝曰衛氏種賢而多子美而長白賈氏種妬而少子醜而短黑后固以爲請從之詩碩人其頎加之俗慣呰窳性多忼急漢書食貨志民呰窳媮生而亡積聚尾箕分野天文志冀北分尾箕之宿婦人皆果敢相髙燕趙雄風女子亦悲歌成習見九日序不諳操作闔門惟飲噉爲工説文噉啖噍也與嘆同寧解柔嘉㦸手以勃谿是尚莊子室無空虚則婦姑勃谿填書甫判潛積猜嫌謬篆纔將妄思厓異宋王愔文志篆書百體有繆篆鳯篆填書魚書之類梁庾肩吾書品論填飄板上繆起印中餘補註於今爲烈自昔而然乃有一人洵焉獨立張姓則天邊譜牒見祖徳賦未是小家見集生序吳地則江表門楣原非傖楚見天章序註按吳人罵楚人曰傖乆隨賓雁偶寄籍於燕山月令鴻雁來賓差類傾葵長近光於日下見賀徐序疎籬織處青門種樹之翁詳徤松記纎籠攜來縞袂賣花之嫗過見因果經瞿夷持花七莖善慧追呼就買此女答言當送内宫欲以上佛大藏一覽賣花女者今耶輸是姬則生而明綺幼即輕華鳴蟬薄鬢見琅霞序齡宛宛以初笄見貞女序墮馬斜鬟見皇士序歲盈盈而待字古詩盈盈樓上女崔顥少婦詩十五嫁王昌盈盈入畫堂易十年乃字陌頭脫帽競看羅敷古今註羅敷者邯鄲秦氏女也嫁千乘王仁仁爲趙王家令羅敷採桑陌上趙王見而悅之欲奪焉羅敷作陌上桑之歌以自明有曰行者見羅敷下擔捋髭鬚少年見羅敷脫帽着悄頭國内求婚咸貪隂麗東觀漢紀上㣲時過新野聞后美心悅之後至長安嘆曰娶妻當得隂麗華遂納后于苑不意老狂獲逢窈窕詩楊還生柹易縱調笑以奚妨眉若療饑南部烟花錄隋煬帝每視絳仙謂諸内侍曰古人云秀色可餐絳仙可以療饑矣一作降陸機樂府詩鮮膚一何潤秀色若可餐即蕭條而亦可且夫梯榮慕利人本同情附熱增炎物之恒態倘使豢窮猩豹六韜殷君必將熊蹯豹胎七發山梁之餐豢豹之胎被極羅紈南金北毳既充牣於箱奩沈約恩倖傳論南金北毳來悉方艚註毳􅏈貂之屬魏都賦琛幣充牣燠館涼軒見澹園賦復衺延乎衢術衺延見璿璣賦則子南之在鄭國人目爲夫左傳鄭徐吾犯之妹美子晳飾服入布幣而出子南戎服入左右射超乘而出女自房觀之曰子晳信美矣抑子南夫也適子南氏城北之有徐公衆矜其美見􅋯菴序以觀我友展也不然原思筮仕仍然環堵之家莊子原憲居魯環堵之室茨以生草季路居官不離緼袍之色論語我躬不閱詩縱捧檄以何歡詳潘母啟來日大難樂府古辭來日大難口燥唇乾樂府解題來日大難即古善哉行亦曰日苦短曹植擬之詞有曰日苦短樂有餘較處囊而倍困詳毛太母啟此即燕齊智士悉效斧柯晉楚謀臣盡輸籌畫樓緩播遊談於後蒯通掉口辨於前國策樓緩事趙王與虞卿論秦事高誘曰緩魏相也過秦論樓緩之徒通其意蒯通傳通爲楚漢時說士有權變武信君嘗用其策降燕趙三十餘城韓信用其計遂定齊地自序其說號曰雋永未足勸其登車反以資其却幣况乎桓家郡主性極矜嚴王子年拾遺記桓温平蜀以李勢女爲妾妻南郡主悍妬與數十婢㧞白刃襲之吳國夫人理多貴倨漢紀昭烈妻孫夫人每出入心未嘗不凛凛王茂𢎞將膺九錫時多悠繆之譚妬記王導曹夫人性甚忌王公乃宻營别館置衆妾一旦夫人于臺中望見命車駕自出尋討王公亦飛轡出門乃捉麈尾以柄助御者驅牛得先至他日蔡司徒聞而笑之曰朝廷欲加公九錫有短轅犢車長柄麈尾王公大愧劉孝標永憾三同屬有紛紜之論劉孝標自序余比馮敬通有同之者三異之者三其三曰敬通有忌妻余有悍室此三同也並見閨秀序倘陽臺之别娶定怨連波大周帝製竇滔有寵姬趙陽臺蘇氏加捶辱滔深以爲憾蘇氏時年二十一及滔鎮襄陽不與偕行乃攜陽臺之任絶蘇氏音問蘇氏悔恨自傷因織錦爲回文詩寄襄陽滔覽之迎歸漢南朕因述若蘭之多才復美連波之悔過遂製此文如犬子之他圖應悲卓氏史記司馬相如少時好讀書學擊故其親名曰犬子卓氏見海棠賦註或致責言之西至左傳晉獻公筮嫁伯姬于秦遇歸妺之暌史蘇占之曰不吉其繇曰西隣責言不可償也或傳輕舸之南浮凡兹風鶴之來正在求凰之日晉紀符堅兵敗見八公山草木聞風聲鶴唳皆以爲晉兵漢書卓文君新寡相如以琴心挑之有曰鳯兮鳯兮歸故鄉遨遊四海求其凰而乃情堅一諾面許三生楚諺得黄金百斤不如得季布一諾續酉陽雜爼僧圗澤與李源善約遊峨眉舟次南浦見婦人澤曰此婦孕三年遲吾爲子今已見難逃以一笑爲信後十三年天竺寺當相見及暮澤亡而婦産往顧果一笑後如期往天竺井畔牧童歌有曰三生石上舊精魂後不知所之傳燈錄一省郎遊華寺夢至碧巖下一老僧前烟縷極㣲僧云此是檀越結願香烟存而檀越已三生矣註自𤣥宗至憲皇時爲官三生今省郎也絶無猶豫之心蚤斷狐疑之志見瑞木賦固已識髙絡秀詳毛太母啟俠甚女嫈者矣刺客傳聶政爲嚴仲子報仇刺殺韓相俠累遂以死韓取聶政屍暴于市購問莫知誰子政姊嫈曰是枳深井里所謂聶政者也妾奈何畏沒身之誅終滅賢弟之名卒於邑悲哀而死政之旁於是雜㺯簡編閒親文史畫眉樓畔見少楹序即是書林傳粉房中見銅雀賦便成家塾學新聲於絃上詢難字於枕間硬黄紙滑竊書夫子之衘書訣硬黄紙唐人以黄栢染之取其辟蠧其質如漿光澤瑩滑秘閣所藏二王書皆唐人臨倣紙皆硬黄蘇軾詩硬黄小字臨黄庭縹碧釵輕戯作門生之贄李啇隠詩釵茸翡翠輕正恐香山蠻栁恧此清新見琴怨序還應司馬清娛慚斯獧巧下註僕於阮婦之新婚詳夀閻序曾學劉楨之平視見良輔序屏前乍見遽訝天人國語越王背屏而立夫人向屏墉城仙録杜蘭香天姿竒偉真天人也燭下潛窺已驚絶世見琴怨序註比值同官之被酒屢爲愛妾以徴名諈諉彌殷見懸圃序遷延未許以姬夙悟浄因新躭禪喜淨名經清淨之因歸清淨之果起世經無色天並以禪悅法喜爲食註此土兼用禪悅爲食法喜充滿遂旁稽夫梵夾爰肇錫以曼殊藥師經曼殊室利法王子今日畫廊鸚䳇已學呼小玉之名唐蔣防霍小玉傳大厯中隴西李益稱十郎年二十以進士擢第鮑十一娘具語曰故霍王小女字小玊有絶色可見之引入庭間有四櫻桃樹西北懸一鸚鵡籠見生入來鳥語曰李生來宋紀郭小玉乃葛沙門之妻古詩頻呼小玉原無事只要檀郎認得聲他時繡褓於菟還再贈阿侯之號左傳鬬伯比滛于䢵子之女生子文焉䢵夫人使棄諸夢中虎乳之楚人謂乳榖謂虎於菟故命之曰鬬榖於菟梁武河中歌十五嫁作盧家婦十六生兒似阿侯并見閨秀序龍輔女紅餘志語曰欲知莫愁美但看阿侯容附注羣玉堂帖趙清娛見神于褚遂良自稱司馬遷侍姬褚作墓銘顧亓山印譜序蓋聞六書初啟始變蟲魚古三墳伏羲命臣飛龍氏造六書曰象形指事㑹意諧聲假借轉註八法相生未離蝌蚪崔瑗授鍾繇永字八法歌側蹲鴟而墜石勒緩縱以藏機弩彎環而勢曲趯峻快以如錐策依稀而似勒掠彷彿以宜肥啄騰峻而速進磔憶昔以遲移註㸃爲側横爲勒竪爲弩挑爲擢左上爲策左下爲掠右上爲喙右下爲磔乃蔡邕所書也蝌蚪見憺園賦史游急就實開篆籕之金科漢書註史游于元帝時爲黄門令凡書三十二章以教童䝉急就者謂字之難知者緩急可就而求焉書斷蒼頡古文之祖吕氏春秋蒼頡造大篆非也周太史籕始剏大篆李斯繼作小篆八分書秦羽人上谷王次仲所作也章草史游所作飛白蔡邕所作行書漢劉德昇作草書漢張伯英作也文姬别傳臣父邕言割李斯小篆去二分取八分爲八分書許慎說文爰定册書之玉尺許慎傳慎字重叔博學經籍時人語曰五經無雙許叔重又作說文解字十四篇漢獻帝時舉孝㢘莫不音由轉注見上體係凡將下註載在蜼彛爾雅蜼印鼻長尾廣川書跋考古圖曰蜼彛二首及身有斑文似虎而岐尾如蜼勒之寏豆下註此則岐陽獵碣見梧月序岣嶁殘碑見竹逸序藏之汲冡之中見尺牘序註秘在羽陵之内見無忝序於今爲烈自古而然若夫韭花薤葉用識姓名韭花見琴怨序王愔文字志例薤書者小篆體也或云出扶風曹喜蕭子良以爲仙人商務光所作螭紐龍文尤尊符璽蔡邕獨斷璽以玉螭虎紐古者尊卑共之冠軍驃騎史著明稱史記宋義爲卿子冠軍張晏註上將故言冠軍若霍去病功冠三軍因封爲冠軍侯漢書霍去病壯爲嫖姚校尉後加驃騎大將軍買得醜奴詳合肥書家鐫私印印譜在公者爲官印志姓字者爲私印既以珍同荆璧見楚鴻序非徒玩比隋珠見鷹垂序上自李斯見上下沿吾衍元吾衍傳衍字子行仁和人操行髙㓗隱居教授精于篆體陸龜䝉小名一録説廓載陸龜䝉小名録一册代有雕鏤趙明誠金石一書見實菴序人誇楷𨽻長箋俱在古法攸存然而秦碑漢篆恒殉荒陵玉血銅斑半歸寳庫婆娑蒼綠僅留黑闥之名捫摸丹青難辨紅陽之姓等玉帳以飄零以上補註共金盤而嗚咽見滕王賦龍章盡蝕虎氣終埋初學記書法有龍虎書龍爪書麒麟書梁康元威論書書有龍虎篆鳯魚篆雲篆蟲篆悼古學之失傳慨斯文之日謬吾友顧君夙工斯體筆將飛而欲落秋蜹盤釵字欲整而猶斜彩鸞舞鏡書斷唐太宗謂逸少書烟霏霧結狀若斷而復連鳯翥龍翔勢如斜而反直按書法有古釵脚范秦鸞鳥詩序昔罽賓王結置峻卯之山獲一鸞三年不鳴其夫人曰聞鳥見其類而後鳴何不懸鏡相映也王從之鸞觀形悲鳴哀響中宵一奮而絶㸃畫作鍾繇之𨽻愛此空蒼鍾繇傳繇乃皓之曾孫字元常封武亭侯與胡昭並師劉德升書世傳胡肥鍾瘦嘗曰用筆者天也流美者地也波當作啄磔均韋誕之書訝其遒勁喙磔見上註齊王僧䖍錄韋誕字仲將京兆人張芝弟子善楷書漢魏宫館寳器皆誕手寫魏明帝起凌雲臺先釘牓而未題以籠乘誕轆轤引之使就牓書甚危懼誡子絶楷法嗚乎亥豕相承見佳山序墨猪共誚書斷王逸少云字多肉少骨謂墨猪苟成絶藝定足空羣填之翡翠長爲鳯閣之竒觀補註染以臙脂永誌虎頭之傑作晉書顧愷之字長康義熈初爲散騎常侍世傳有三絶才絶藝絶癡絶嘗爲虎頭將軍人號顧虎頭附注漢藝文志小學十家司馬相如作凡將一篇通雅古器祖癸豆姬寏母並皆以銅爲之漫錄有人掘古塜得蒼玉上有黑闥二字疑爲劉黑闥殉物陳檢討四六巻十二
