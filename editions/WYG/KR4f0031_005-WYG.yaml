body:
  text: 陳檢討四六巻五翰林院檢討陳維崧撰序佳山堂詩集序命鳸分官以後肇始篇章左傳昭子問曰少皥氏鳥名官何故也郯子曰五鳩鳩民者也五雉為五工正九鳸為九農正斷鰲立極而還權輿述作列子女媧氏斷鰲足以立四極高誘註犬廢傾以鰲足拄之權輿見天篆序姚庭吁咈半臯䕫渾噩之音書姬代升歌多旦奭舂容之製詩義疏文王分岐周故邑為旦奭采邑武王遷鎬克商乃采文王時民俗之詩得之國中雜以南國者為周南其專得之南國者為召南學記善待問者如撞鐘待其舂容然後盡其聲韓詩舂容乎大篇揲蓍繫象理本元公易緝雅稱詩義縁上相漢書陸賈謂陳平曰足下位為上相莫不仰規天漢俯察華蟲詩維天有漢書山龍華蟲舒慘恊乎隂陽劉孝標論陽舒隂慘生民大情清濁調乎律吕樂記註黄鐘太簇姑洗㽔賔夷則無射為六律大吕夾鐘仲吕林鐘南吕應鐘為六吕十二律聲分清濁麟麟炳炳楊雄羙新論炳炳麟麟註與燐同矞矞皇皇見瑞木賦文字之興由來尚矣且夫言以旌心文原載道韓文文者所以載道也若使情弗篤乎君王志不存乎民物色工朱紫徒成藻繢之容韻合宫商未便克諧之奏書八音克諧縱復愽綜正變雜撰髙深審音者例之自檜無譏左傳季札觀樂自檜以下無譏焉觀禮者歎為既灌而徃論語盖自昔興文要於養氣韓愈答李翊書古之立言者不可以不養也氣盛則言之短長與聲之髙下皆宜從來立徳方許著書左傳穆叔曰豹間之太上有立徳其次有立功其次有立言辭須能達此言鬯自宣尼思貴無邪其説原於魯頌必膏深而光沃斯理沛而詞昌答李翊書根之茂者其實遂膏之沃者其光華徃説雖多斯言不易我夫子益都相國馮公詳益都䟦光嶽分靈穆眀一徳書穆穆在上眀明在下樞機宻勿龍馬佐其苞符論語䜟仲尼曰吾聞堯舜遊首山觀河渚有五老一老曰河圖將來告帝期一老曰河圖将來告帝謀一老曰河圖將來告帝書一老曰河圖將來告帝圖一老曰河圖将来告帝符龍銜玉苞金泥玉檢封盛書五老飛為流星入昴參贊經綸日月資其糺縵見璿璣賦孕灝愽兩間之氣有而不尸滙汪洋百谷之墟積而彌讓亳都負爼躬調五味之鹽梅埤史湯思賢夢有人負鼎抗俎曰鼎為和味俎者割截天下豈有人焉為吾宰者乎書用汝作鹽梅元子徂東手補千章之衮繡詩我徂東山我觀之子衮衣繡裳番番格人之貌書番番黄髪又格人元龜泱泱大國之風左傳季札觀樂為之歌齊曰泱泱乎大風也哉於是暉映三才發皇萬有龍文扛鼎噌吰鞺􅝅之聲韓愈詩龍文百斛鼎筆力可獨扛石鐘山記有􅑆坎鏜􅝅之聲與向之噌吰者相應鴻筆摩空見天章序註拏攫連蜷之狀拏攫見憺園賦屈原九歌靈連蜷兮既留註長曲貌周情孔思杼軸吟謡唐李漢韓文序日光玉潔周情孔思我先陸機文賦雖杼軸於予懷怵他人之夏鼎商盤見璿璣賦雕鑱籕篆詳亓山序卿雲之麗碧落巻舒本出無心卿雲見璿璣賦碧落詳觀槿序大海之生紫瀾浩蕩仍歸何有唐詩大海廻風生紫瀾若乃九霄退食詩三殿書思見璿璣賦蒿目時艱荘子駢拇篇今世之仁人蒿目而憂世之患註蒿目半閉其目坐生憂愁䀌懷國是補註歎宻雲之不雨易望切虹霓孟子愾洚水之懷山憂深昏墊書碧雞乍梗見璿璣賦嗟戍卒之仳離詩金馬旋開見璿璣賦感征夫之况瘁詩年年下瀬樓船則楊僕遲歸漢書南越吕嘉為亂命楊僕為樓船將軍戈船下瀬出零陵徃平之嵗嵗横江澤國則盧循尚在晉書盧循娶孫恩妹恩亡餘衆推循為主元興二年劉裕討循至晉安循窘急泛海到畨禺冦廣州以致星飛紫孛屢聞宵旰之朝春秋傳星孛入北斗邪氣所生也漢書宵衣旰食甚而地坼黄輿詳琴怨序偏警殷憂之聖晉劉琨傳或殷憂以啟聖眀戀殷魏闕思謝政以奚從荘子譲玉篇公子牟謂瞻子曰身在江海之上心居魏闕之下念結蒼生欲引年而未可謝安傳士大夫相謂安石不出將如蒼生何詩以引以翼謂予不信爰作歌以告哀詩問我何求用賦詩而見志書詩言志左傳鄭伯享趙孟於垂隴子展伯有子西子産子太叔二子石從趙孟曰請皆賦以卒君貺武亦以觀七子之志藎臣納牖詩王之藎臣註忠愛盡無已也易納約自牖語必纒綿元老匡時言皆忠愛絶少憑虛之論西京賦憑虚公子原非謾興之言然而秋盈緑野見楚鴻序戴埴䑕璞裴度於唐文宗時留守東都治綠野堂雖野服蕭散尚保釐留臺非閑居事也時致門生春到黄扉漢百官制丞相聴事之閣俱用黄扉故稱黄閣其制天子以丹丞相以黄恒招屬吏或飛觴而命酒每授簡以摛文見璿璣賦偏師一奮砰􅗟喧八月之濤見懸圃序枚乘七發將以八月之望觀濤於廣陵之曲江險韻重拈撇捩激萬鈞之弩洞簫賦聨綿漂撇韓愈送窮文捩手翻羮王右軍書衛夫人筆陣圖鍾繇每作一戈如百鈞之弩發書法要錄李斯小篆如千鈞强弩萬石洪鍾行間光怪盤硬筆以横飛杜詩書貴瘦硬方通神楮上騰掀蘸渇毫而突起說文滔蘸濕貌補註客嘲賔戲亦莊亦諧白帖子雲之解客嘲孟堅之答賔戲見尺牘序西竺南華半仙半佛後漢書眀帝遣使求書天竺按其國在西故名西竺一稱乾竺南華見園次序此則語多寄託仍為有謂而然義屬興觀詎是無因而作陶融元氣終難越其範圍籠盖羣倫鮮能窺其涯涘也崧以菲材獲承隆盻道傍苦李世說王戎七嵗與諸兒遊睹道邉李樹有子折枝諸兒競取之惟戎不動人問之答曰樹在道邉而多子必苦李也取之信然過䝉匠石之知見半繭賦㸑下焦桐搜神記吴人有燒桐以㸑者蔡邕開其爆聲曰此良桐也斷以為琴其尾焦因名焦尾謬荷鍾期之聴見園次序雕慚宰子論語鑄愧顔回法言或曰人可鑄與曰孔子鑄顔回矣註學猶鑄也猥於鑽仰之餘得與校讐之役律厯志廣延召問未能讐也註讐對也於是剖厥紛繁釐其前後同西園之子弟見尺牘序商訂魯魚抱朴子文字之譌以魯為魚以帝為虎偕東閣之生徒整齊亥豕漢書公孫𢎞為相封平津侯開東閣營客館以招天下士家語子夏見讀史志者曰晉師伐秦三豕渡河子夏曰非也已亥也問之魯史果然懸之通國見黄門賦副在名山史記蔵之名山傳之其人極知卑不頌尊愚難知聖敢矜莛叩思擬議夫淵深遑恣管窺冀稱揚夫髙厚東方朔答客難以管窺天以蠡測海以莛撞鐘豈能通其條貫考其文理發其聲音哉祇以一堂請益數載從遊敢略綴夫俚言敬敷陳乎末簡竊比卜商握管弁毛詩之首家語卜子夏有詩序粗同安國濡毫序書傳之前云爾漢書孔安國治尚書定為五十八篇作序於前為武帝愽士方渭仁都門懷古詩序若夫五陵南去地入中原西都賦南望杜覇北望五陵註漢髙帝長陵惠帝安陵景帝陽陵武帝茂陵昭帝平陵為五陵庾信賦五陵豪選註士人多宅於此晉書祖逖曰不淸中原而復濟有如大江三輔西來西安志秦曰關中漢武帝立京兆左馮翊右扶風為三輔河衝北戒見天章序軍都蒼莾金遼則處處斜陽漢書盧植隱於上谷今昌平州軍都即其隠處荘子適蒼莽者三飱而反註一望之地也輿記古幽薊之地即遼金元舊都也碣石沉雄燕趙則年年蔓草禹貢夾右碣石入於河安國註海畔山也在北平即驪縣城西南西京賦揚洪濤於碣石一城木葉霜未染以先紅萬里邉牆月既沉而愈白井上之燈忽紫蒯徹難逢補註列傳蒯通本名徹涿陽人以武帝諱史易為通善口辨詳納姬序按順天志徹墓門每見夜有紫燈即方公題詩之一市中之筑空豪慶卿安在刺客傳荆軻者徙于衛衛人謂之慶卿而之燕燕人謂之荆卿髙漸離擊筑荆軻和而歌於市中旁若無人者於是金笳夜噭和以曼聲齊髙帝塞客吟金笳夜厲羽轊晨征鐵騎晨嘶雜之長嘯漢書註鐵馬介馬也杜詩鐵馬汗常趨晉書孫登字公和隠蘇門阮籍與商仙術登不應長嘯而起至半嶺聞聲如鸞鳳揮毫颯㳫張衡羽獵賦輕車颯㳫李詩颯㳫如流星山廻故國之篇詳初眀序潑墨淋漓畵記王宰善潑墨酒酣先以墨潑絹随其形為山水不見墨汙之跡火入荒陵之句劉禹鍚懐古詩風吹落葉填宫井火入荒陵化寳衣三輔故事始皇𦵏驪山後牧羊兒亡羊羊入藏中覓羊燔其郭人則嶔􅏟而厯落世說周伯仁道桓茂倫嶔􅏟厯落可笑人俗原慷慨以悲歌見素伯序金飇蕭屑偏帶商聲說文飇扶摇風也秦缶髙凉最含西氣詳子厚序曹植詩秦筝發西氣嗟乎上客端憂正奉倩傷神之後謝荘月賦陳王初䘮應劉端憂多暇世說荀粲字奉倩彧第六子妻曺氏有艶色妻病熱奉倩出中庭取冷還以身熨之妻亡人弔不哭而神傷尋亦卒故人工病亦安仁悼婦之餘風俗通慎終悼亡潘岳悼亡詩之子歸窮泉重壌永幽隔古今大矣何須代徃昔以興悲賢達紛如奚事向關河而寄慨君如不樂請髙吟蟋蟀之章詩僕倘能狂願緩進鸕鷀之杓謝氏詩源金母召羣仙宴於赤水坐有碧玊鸚鵡杯白玊鸕鷀杓杯乾則杓自把欲飲則杯自舉李詩鸕鷀杓鸚鵡杯百年三萬六千日一日湏傾三百杯汪季青詩稿序波喧江浙緑遶千家山界常湖青連兩縣則有藍溪仙客舊籍桐川福寧州志大姥山下有藍溪每八月中漢水作藍染帛最佳俗傳大姥染衣水又按金華府有藍溪縣嚴州志桐川即桐江在桐廬縣源出天目黄海文豪新家顧渚九域志新安黄山有雲如海稱黄海一稱雲海湖州志顧渚在長興縣旁有二山相對號眀月峽昔夫差顧其渚可都故名其地産茶尤躭詩賦雅事交遊以余近百里之間為我命三秋之駕褰裳譙國見天篆序只訪嵇康虞預晋書嵇叔夜先本上虞人姓奚以避怨徙譙郡家于銍邑之嵇山因命氏焉擔簦陳留惟尋阮瑀見尺牘序史記虞卿躡蹻擔簦註簦禦雨具阮瑀傳瑀陳留人通典陳留嬀州之地今河南府然而雲時出岫鳥善離巢年年馮煖嘗聞彈鋏依人見楚鴻序嵗嵗鄒陽不免曵裾作客鄒陽傳景帝時陽仕吴以文辨著名吴王隂有邪謀上書諌曰蛟龍驤首則霧雨咸集今臣餙固陋之心何王之門不可長曵裾乎成都肆上未見嚴遵漢嚴遵傳遵字君平卜筮於成都市日得百錢足以自養則閉肆下簾而讀老子洛陽城中絶無蘓季蘓秦傳季子為從約長曰使我有洛陽負郭田二頃豈能佩六國相印乎率爾題門以去見􅋯菴序􅓉然擁檝而還即訪戴事見園次序猶復眷佇為勞纒綿莫解瑶緘鄭重憑紅鯉以浮來錦字分眀倩緑鱗而送至見尺牘序齊紈作叠披襟而謖謖多風見海棠賦秦鏡初圓開篋而團團似月詳無沗序西京雜記始皇有方鏡可照人心膽杜審言咏月詩好與鏡俱團一摇綵扇便使身輕江淹集有扇上綵畵賦毎鑑華銅頓憎形穢漢辛延年詩貽我青銅鏡陸機與弟書仁壽殿前有大方銅鏡暗着庭中向之便寫人形晉衛玠别傳玠舅王武子見甥玠嘆曰珠玊在側覺我形穢倐初心之莫遂見黄門序溝水東西西京雜記文君白頭吟有曰今日斗酒㑹眀旦溝水頭躞蹀御溝上溝水東西流俄舊雨之長垂少陵集卧病長安旅次多雨尋常車馬之客舊雨來今雨不來浮雲南北詳納姬序空縻好爵易文園則引疾偏多漢書相如事孝景為武騎常侍後武帝拜為孝文園令有肺疾免居茂陵詳智修序徒㸃華班騎省則間居不少見滕王賦潘岳賦序於是覽止足之分庶浮雲之志乃作閒居賦以歌事遂情焉忽接中山之信獲披瓦上之編按節狂歌臨風卒讀夫其才調彌遒襟情更暢劉孝威林檎之啟字字英竒梁劉孝威集謝賚林檎書有曰生於玊井之側出自金膏之地上靈所貴下士希逢張子布柟榴之章言言綺宻吳志張昭字子布張紘字子綱俱為孫權叅謀紘嘗作柟榴枕􅑝陳琳在河北持示人曰此吾鄉張子綱所作又與紘書曰足下與子布在所謂小巫見大巫神氣盡矣按子布誤用五色膠東之紙錄此清文見尺牘序千畨巴蜀之箋書其麗句見三芝序資暇録元和初薛濤尚松花箋而好製小詩一作薛陶晉簡文帝録謹奉紅箋二千畨播之輦下足當騷雅之稱弆以帳中不沗風流之目弆蔵見尺牘序註帳中見黄門序僕也一官落拓楊雄客嘲曰何為官之拓落也恨與年増三載覊棲才因興減藻思消歇既輸君十倍之才蜀漢書先主以後事屬亮曰君才十倍曹丕宦况聊蕭甘讓爾五湖之長晉書桓温子𤣥補義興守嘆曰父為九州伯子為五湖長棄官歸國乃猶膏唇拭舌序王裴輞水之思宦者傳吕强疏云羣邪項領膏唇拭舌唐列傳王維别墅在輞川常與裴廸游後與裴書曰多思曩昔攜手賦詩步仄徑臨清流也䑛墨含毫弁皮陸松陵之集荘子宋元君盡圖衆史䑛筆和墨按含毫詳藝圃序唐書皮日休與陸龜䝉羅隐吳融為益友相唱和陸著有松陵集十巻多恐青猿獻誚將毋白鶴騰譏孔稚圭北山移文南嶽獻嘲非隴騰笑列壑爭譏攢峰竦誚君縱忘言僕猶知愧或者久要有在請待來年昔夢難忘遥申一語竟獲右軍誓墓見黄門序平子歸田見三芝序紅簾白舫徃來苕霅之間高士傳張志和號烟波釣徒顔真卿為刺史欲舘之謝曰願浮家汎宅徃來苕霅之間耳按苕溪霅溪屬湖州酒幔茶檣韓非子宋人沽酒懸幟甚髙即酒旗也茶檣即陸龜䝉事見􅋯菴序滅没鳬鷖之隊與君唱和定自成聲檀弓子之琴和之而和彈之而成聲借我流連差堪作達世說阮咸子渾韻度似父亦欲作達謂余不信姑留息壤之盟國䇿秦武王與甘茂盟於息壌攻宜陽五月不能㧞也樗里疾公孫衍爭之王王将召甘荗而去之對曰息壌在彼於我何求敢訂莵裘之約左傳魯隠公謂羽父曰使營莵裘吾將老馬杜註莵裘魯邑不居魯朝别營外邑藝圃詩序原註藝圃者姜如農先生仲子學在所居也其先為文文肅公清瑶嶼又先為袁憲副某堂最為吴中勝處學在讀書其中旁列古彛鼎及茶鐺酒董諸小物一日吾友吴園次過其齋頭頃刻為賦詩四十首學在梓而傳之并屬余為序云盖聞夏鐫九鼎原非旦夕所成見天篆序漢起千門初豈咄嗟能辦漢郊祀志漢武作建章宫千門萬戸蜂釀花而作蜜定費經營狐集腋以成裘恒資襞績張璠易註序宻蜂以兼采為味任彦昇薦士表非取製于一狐諒求味于兼采狐腋見歸田序襞績見瑞木賦註宋人之鏤楮葉請以三年列子宋人有為其君以玉為楮葉者三年而成亂之楮葉中不可别也遂以巧食宋國列子聞之曰使天地生物三年而成一葉物之有葉者寡矣魯客之造木鳶期之數載淮南子魯般為木鳶而飛列子墨翟之飛鳶自謂能之極也韓子墨子為木鳶飛一曰而敗曰吾不如為車輗者巧也用咫尺之木不費一朝之事而引三十石之任今我為鳶三年成飛一日而敗惠子聞之曰墨子大巧巧為輗拙為鳶借非蛟蜃奚緣嘘俄頃之樓見半繭賦除是仙靈或解熟逡廵之酒列仙傳韓湘子解造逡廵酒三都待鍊藁乍削以還焚見素伯序兩賦當研毫縱含而每腐范曄後漢書張衡擬班固兩都作二京賦十年乃成劉勰神思賦相如含筆而腐毫何來巧製敏屬神輸乃有華文贍同夙搆范雲傳雲為文每下筆立就人謂為宿搆爐熏未息千章盈芍藥之花鉢響還留百軸溢葡萄之樹見三芝序在作者尚矜其極筆至旁觀益侈為美譚公羊傳魯人至今以為美譚麗矣名篇猗歟盛事時則迢迢金谷見半繭賦直控雞陂吳志齊門外吴王畜雞城後名雞陂隠隠銅街見滕王賦袤通鶴市見半繭賦零朱賸粉是前代之空園卧碣殘碑得昔賢之故第袁太尉池亭閫若喬木斯存文潞公閥閱巋然平泉尚在俱見上原註按袁太尉詳紫來序宋史文彦􅀶字寛夫出將入相五十餘年以太師致仕封潞國公九十三年卒史記眀其等曰閥積日曰閲註門左為閥右為閲取此賈氏談錄贊皇公平泉莊周廻十里堂榭百餘有自記按李栖筠封贊皇男子吉甫贊皇侯孫徳裕贊皇公朱門换主空餘故老之流傳青瑣騎箕彌切佳即之顧慕荘子大宗師傅説相武丁乘東維騎箕尾而比于列星顧慕見瑞木賦舊説萊陽仲子幼便能文爭誇天水次公賢而好客見上原註仲子即學在其先萊陽人姜屬天水郡則有􅀞省望即見園次序雄州名守偶作墻東之客後漢書北海王君公遭新莽亂儈牛自隠時人語曰避世墻東王君公潛為垞北之遊見看奕賦攀條藉卉嘉賔因適志以忘歸散帙攤書賢主遂濡毫而請賦斯時也紅鵝舘裏宿雨催晴碧鴨闌邉嫩凉滌暑見憺園賦水眀天淡既駊騀以宜人楊雄甘泉賦崇丘陵之駊騀簟滑甌香復蕭疎而稱意爰披雪璽用染霜鋒世說羲之書蘭亭記用􅁞繭紙鼠鬚筆按蠶繭紙似繭而澤沉思而風雨忽來狂呌而蛟螭㳫舞五言十二半微雲踈雨之吟孟浩然集序浩然間適秘省秋月新霽諸英華賦詩浩然句曰㣲雲淡河漢疎雨滴梧桐舉坐歎其清絶咸閣筆七律八章多劍拔弩張之態袁昻古今書評韋誕書如龍威虎振劍拔弩張盖其感慨在心故爾宫商應手問庾子山之第宅能不興哀見天章序杜詩庾信羅含俱有宅過稽叔夜之園林可無流涕見得仲序註千尋玳瑁一架珊瑚見天篆序織成寳罽偏熏芸葉之香詳澹菴序古詩芸葉香薰走蠧魚叠得花牋更養成都之粉見園次序飛揚跋扈東魏書髙懽曰侯景常有飛揚跋扈之志杜詩飛楊跋扈為誰雄筆不能休詳少楹序註􅉐挫激昂頓挫詳南耕序激昂見園次序文無加㸃詳少楹序註曺子桓城南㑹獵正獸肥草淺之時魏志文帝諱丕字子桓典論文帝自敘曰余少好弓馬建安十年濊貊貢良弓燕代獻馬時嵗之暮春和風扇物弓燥手柔草淺獸肥與族兄子丹獵于鄴西管公眀席上清談是耳熱酒闌之後管輅傳輅年十五從其父之瑯琊太守單子春聞輅名請見㑹客百餘人皆才辨之士管曰輅年少膽未堅請先飲三升清酒然後可談魏文帝與吳質書酒酣耳熱仰而賦詩無何而日隠西嵫星翻北渚淮南子日入崦嵫註其山在西亦名西嵫地理志秦州有崦嵫山稱西崦屈原九歌夕弭節兮北渚小胥腕脱見三芝序及天篆序屢促更衣史記灌夫傳坐乃起更衣外戚世家武帝起更衣衛子夫侍尚衣軒中顔註凡久坐者皆起更衣以寒煖或變也上客神來王勃採蓮賦上客喧兮樂未己王僧孺詩上客强盤桓摭言文有三來一曰神來堅祈刻燭見園次序於是盡敞席珍儒行儒有席上之珍以待聘縱陳櫝韞論語恢竒俶詭如觀伯翳之經荘子天下篇其辭雖參差而俶詭可觀路史劉秀表校山海經云夏禹治水伯益與伯翳主驅禽獸是則益翳為二人非伯翳之即益也按山海經即伯翳經炫燿焜煌疑入波斯之市隋書煬帝遣李昱通波斯尋貢方物按西方波斯國多寳乃大月氐之别種爰有蔡邕籕篆曺覇丹青蔡邕傳邕為中郎將工八分書上表求正定六經文字靈帝許之並見憺園賦唐書𤣥宗時曺覇善畵杜甫有曺將軍畵馬圖引及丹青引銅肌蛀緑獰如西極之辟邪廣雅蛀食木蟲古噐評漢辟邪燼此薫爐也通體為辟邪形拆其半為盖其形小可置懷䄂按辟邪獸名漢以金石為其形以鎮宫門褚載馮小憐有手爐曰辟邪足爐曰鳬藻五色綠唐肅宗賜李輔國玉辟邪髙一尺五寸玊暈皴紅艷若南荒之鸚鵡物性志鸚鵡丹喙緑毛翠衿又其毛或蒼緑或紫喙曲如鶚而目深行則以喙啄地而足後随之效人言攜來笻杖蜀志笻竹髙節磥砢可為杖漢張騫使大夏見蜀中卭竹杖問之曰從身毒國數千里得竹無淚以恒斑見憺園賦結就焦團椶未癭而先紫草木志椶木為飲器曰椶瓢一曰癭瓢又草舍曰團焦俗作團瓢庾信枯樹賦戴癭銜瘤南方草本状五嶺楓木嵗久則生瘤癭六宫脂盝見銅雀賦隠隠啼粧詳皇士序註江總賦啼粧梁冀婦七尺唾壺茫茫寃氣西京雜記廣州王發魏襄王塜得玉唾壺一枚拾遺記魏文及帝納薛靈芸芸别父母升車時以玉唾壺承淚即紅色至京師壺中淚凝如血焦氏易林寃煩屈詰潘岳寡婦賦愁煩寃其誰告兮寧苐漆園小吏牀頭之蝴蝶仍來史記莊子者䝉人嘗為漆園吏荘子齊物篇昔莊周夢為蝴蝶栩栩然蝴蝶也非徒管氏夫人硯裏之鴛鴦不去補註趙孟頫傳子昻夫人管氏亦工丹青凡諸長物見祖徳賦悉付短歌憑老興以淋漓横秃衿而跳盪漢書曺操忌孔融令人枉奏云秃巾微行唐突宫掖李賀詩秃衿小䄂調鸚鵡左傳楚師輕跳易震盪也噌吰鞺􅝅見佳山序渇𦍑酒食之聲晉書羌人姚馥嗜酒渇于酒呼為渇羗獧鋭嫖姚猛士斫營之狀說文獧疾跳也史記註嫖姚校尉乃勁疾貌國䇿猛士如雨斫營見懸圃序憑欄以眺乍蟾魄之東昇擲筆而狂驟蟲吟之西起㑹且歸矣詩行當俟後之人于胥樂兮詩詩亦如前之數僕也匿影殘冬吳質與魏太子牋曜靈匿景棲踪他縣一緘索序難尋避債之臺見三芝序五夜成篇詳顧哀辭聊附折梅之驛荆州記陸凱自江東遣使詣長安寄梅花一枝與范蔚宗并詩云折梅逢驛使寄與隴頭人學齊呫嗶劉向説苑已載越使諸發執一枝梅遺梁王梁王之臣曰烏有一枝梅乃遺列國之君則折梅不始陸凱也攬蚤謝之江花徒憎余拙見園次序䕃同行之潘果彌覺卿妍語林潘安仁至美每行老嫗以果擲之滿車張孟陽至醜毎行小兒以瓦石投之按世説以左太冲絶醜效岳遨遊羣嫗亂唾之深愧續貂奚堪引鳯晉書趙王倫僣位諸黨皆登卿相至厮役亦加爵位每朝㑹貂蟬盈坐時人諺曰貂不足狗尾續列仙傳周蕭史善吹簫秦穆公以女弄玉妻之俱于樓中吹簫作鳯鳴鳯皇東止其屋秦穆為作鳯臺後二人共乘鳯而去一作弄玊乘鳯蕭史乘龍共飛昇云琴怨詩序若乃香薫江夏黄郎雅號多才漢黄香傳香字文强愽通經典夏能文章京師號曰天下無雙江黄童粉琢清河陸女尤工巧笑補註按陸雲字士龍為吴王郎中令出宰浚儀嘗為清河王長史人多以陸清河稱之有贈婦詩乃為顧彦光作非陸女也妾家射瀆淮安志射陽湖即漢廣陵王射陂後名射瀆相隣漂母祠邉見祖徳賦郎住吴陵見懸圃賦不逺玊人橋下杜牧之詩二十四橋眀月夜玊人何處教吹簫一自參媒氐妁逺移稱意之花語林牛郎織女以參商為媒亢氐為妁宜其終嵗各天也本草夜合一名稱意花遂令鳯舞鸞歌競唱定情之曲山海經軒轅之丘鳯鳥自歌鸞鳥自舞張衡定情歌我既媚君姿君亦悦我顔按繁欽俱有定情詩迎來桃葉空北部之臙脂金陵志王獻之字子敬有愛妾名桃葉其妹名桃根子敬嘗臨渡歌以送之因名桃葉渡古今註紂以紅藍花汁凝作臙脂以燕國所生故名燕脂塗之作桃花粧徐陵玉臺新咏序南都石黛最發雙蛾北地燕脂偏開兩臉按臉一作靨嫁得文鴦李賀詩尋常輕宋玉今日嫁文鴦詳吴太母序按晉書段匹磾弟亦名文鴦破石勒于文石津者非是壓南朝之金粉見楚鴻序奚勞隔巷更看新人隋陳子良詩有七夕看新婦隔巷停車題詎必提筐還逢故婦列女傳魯秋胡子納妻五日而去宦于陳五年乃歸見路旁有美婦人方提筐採桑謂之曰吾有金願與夫人婦曰採桑力作紡績不願人之金也後還家呼婦知即向採桑者婦曰慕色棄金而忘母妾不忍見乃投河而死固已極綺羅之盛事寧徒艷花月之新聞見滕王賦註然而菱鑑難圓飛燕外傳飛燕加大號媫妤奏賀三十六物有七尺菱花鏡一奩白帖魏武帝有菱花鏡李巨仁鏡詩無波菱自動不夜月恒眀桂輪昜仄詳良輔序註樓中嬴女只想吹簫見藝圃序殿上羿妻偏思竊藥張衡靈憲羿請不死之藥于西王母羿妻嫦娥竊以奔月是為蟾蜍袁郊詩嫦娥竊藥出人閒蔵奸在蟾宫不放還后羿遍尋無覔處誰知天上亦容花何年而不落鳥何事而恒啼駱丞蕩子賦花有情而獨笑鳥無事而恒啼甚至南陽菊水不見延齡風土記南陽酈縣北水旁悉芳菊水極甘香飲者多壽西域名香焉能續命内傳西海聚窟洲有樹似楓柏形采根入釡中水煑汁如漆則香成博物志漢武時西域月氐國進香三枚值長安疫西使請燒一枚疫死未三日者薫之皆活述異記洲有返魂樹伐其根翦取汁令可丸名驚精香又名震靈丸或名返生香又名卻死香尸在地開香即活并詳劉太母序蟲有可憐之號梁樂府古企喻歌其四云男兒可憐蟲出門懷死憂一作苻融詩草無獨活之名見丁香賦以致黄泉白月佳人留鍥臂之盟左傳莊公見孟任從之割臂盟公生子般焉史記吴起鍥臂而盟碧海青天方士乏返魂之術十洲記扶桑東有碧海漢書外戚傳李夫人蚤卒帝思念不已方士齊人少翁言能致其魂廼夜張燈燭令帝居惟悵遥望見好女如李夫人之貌唾殷紺袂趙后外傳飛燕與其妹合徳共坐誤唾其袖合徳曰姊唾染衣紺碧正似石上花令尚方為之未必能如此乃號石華廣袖猶期鼓瑟於他生詩泪滴鮫盤博物志鮫人從水出曽寄寓人家積日賣綃臨去從主人索器泣而出珠滿盤以謝主人還訂畵眉於再世詳少楹序天乎已酷人也奚辜傷如之何吁其甚矣時則窗下簸錢時聞剰響詳劉太母序鏡中縆額恍見殘痕補註按吴宫有獺髄補痕又唐韋固妻刺痕以翠掩之生憎翠竹難掃愁蛾粧樓記梁冀婦改鴛翠眉為愁眉按翠竹乃畵眉之筆一稱掃眉不分緋桃偏描笑靨曹植洛神賦靨輔承權註靨笑靨權頰也長恨歌桃花如靣栁如眉李義山詩露桃塗頰依苔井緑珠一去彌増衛尉之悲石崇傳崇字季倫仕晉為衛尉嘗聘梁氏女緑珠甚美孫秀索之不與乃譛崇于趙王倫收崇時緑珠墜樓而死碧玊無歸長抱汝南之恨樂府詩集情人碧玉歌乃宋汝南王作也有曰碧玉小家女又曰碧玉破𤓰時樂苑碧玉汝南王妾名寵愛之甚所以歌之况秋風夜雨之經心更斷墨零紈之觸眼韭花一寸依稀幄裏之香何遜為衡山侯與婦書雖悵前微笑涉想猶存而幄裏餘香從風且歇栁絮數行散漫奩間之粉世說謝安嘗冬日内集男女列次俄而雪下安曰雪紛紛何所似兄子眀曰撒鹽空中差可擬兄女道韞曰未若栁絮因風起此則達人齊物荘子有齊物篇太上忘情見海棠賦魯酒可以合歡見素伯序靈犀於焉蠲忿唐同昌公主傳公主帶蠲忿犀如意玉其犀圓如彈丸入土不朽爛帶之令人蠲忿終無以弭彼幽憂見海棠賦療其疾疢者矣嗟乎井公縱愽夲無行樂之方見三芝序玉女投壺孰是為歡之具神異經東王公與玉女投壺梟而脱誤不接者天為之笑開口流光今電是也茫茫蒼昊索笑何年見天章序浩浩黄輿埋愁無地易坤為大輿魏仲長統述志詩百慮何為至要在我寄愁天上埋憂地下按綂宇公理凍合銀河將天上之消魂更甚白帖天河謂之銀漢亦曰銀河曰絳河買來金盌彼夜臺之含怨何多孔氏志怪漢盧充家西有崔少府女一墓女亡有金盌著棺後充至野狐落與之幽婚女贈金盌一枚充徃市賣之崔女娣認其為墓中物陸機挽歌送子長夜臺盖自天荒地老而來暨夫厯刼窮塵以後古樂府詞地老天荒海枯石爛永刼同心信誓旦旦李賀詩天荒地老無人識廣異記儒謂之世道謂之塵釋謂之刼法華經如人以力磨三千大士復盡末為塵一塵為刼此諸微塵數其刼復過是蕪城賦委骨窮塵後漢書眀帝鑿昆眀池㡳得異灰西域竺法蘭至問之蘭曰世界終盡刼火洞燒此刼燒之餘灰也傾城傾國代有其人漢書李延年歌曰北方有佳人絶世而獨立一顧傾人城再顧傾人國為恨為悲古多斯事僕也生亦情長老而才盡見園次序註酒䦨燭跋偶披傷逝之吟禮燭不見跋潘岳哀永逝文有云逝日長兮生平淺憂患衆兮歡樂尠月落河斜閒展悼亡之作見渭仁序屬掇蕪詞用弁綺語白楊齋畔見素伯序並詳逸齋序千秋長恨之歌長慶集白樂天長恨歌有曰天長地久有時盡此恨綿綿無盡期序云盖述太真馬嵬之變及仙去為玉妃事也黄葉村中三尺小蠻之墓白樂天詩櫻桃樊素口楊栁小蠻腰註樂天二妓小蠻善舞樊素善歌龔琅霞湘笙閣詩集序原夫斷錦梭龍見半繭賦曺松贈方干詩先生織字得龍梭驚心奚極哀絃柱雁事原琴筝有雁柱張子野咏筝雁柱十三絃王珪宫詞寶柱一行秋雁横蕩魄何言文人生戎馬之中詞客遘亂離之㑹靈和前殿小侯射楊栁之旗齊書武帝植栁靈和殿前枝條柔若絲縷後漢書永平中為外戚樊氏隂氏郭氏馬氏諸子弟立學號曰四姓小學以非列侯故曰小侯射楊詳商尹序及修褉序華林後園詳修褉序公主試桃花之馬洛中紀異大宛進汗血馬有丁香叱撥桃花叱撥過雀臺而獻弔亦有名流見滕王賦入馬邑而生悲非無上將朔方記秦人築城數崩忽有馬旋走其地因依以築城立就故名馬邑屬大同府漢書漢使馬邑人賣馬以誘單于漢伏兵三十餘萬將軍衛青出上谷擊之按馬邑多名將風月供其悵望江山助其悲懷余友琅霞龔子四姓良家見上註五陵妙族見渭仁序徐陵玉臺序五陵豪族四姓良家朱門鬭鴨識桓氏之家郎見憺園賦世說桓南郡小時與諸從兄養鵝共鬬南郡以鵝不如為忿乃夜徃諸兄弟鵝欄間悉殺之至曉車騎曰當是南郡戲耳按𤣥稱南郡冲稱車騎鬬鴨疑誤金市乗羊訝衛家之年少金市見滕王賦乗羊見雪持序弱齡十五愛此吹笙南史謝孺子景仁之孫恂之子特善音律與王車騎張宴桐臺孺子吹笙自起舞嘆曰真使人飄飄有伊洛間意註子晉吹笙嘗遊伊洛上客三千見藝圃序驚其抽簟見三芝序並詳少楹序家近長干之縣夙解看花左思吳都賦長干延屬註建業南五里有山岡江東謂岡為干其間平地吏民雜居東長干中有大長干小長干大長干在越城東小長干在越城西地有長短故名晉樂府長干巷巷長干人居蘭陵之街偏能賣酒李詩蘭陵美酒鬱金香常州志城北有蘭陵城古蹟方輿覽勝山東嶧縣稱東蘭陵江南武進為南蘭陵按山東唐沂州承縣亦稱蘭陵無何葛榮入北東魏紀葛榮賊率元洪業之衆魏孝昌二年殺洪業稱天子國號齊改元廣安爾朱榮擒斬之塵暗三臺見尺牘序侯景投南烽馳十郡蕭梁紀東魏叛將侯景以河南十三州内附武帝納之後景反以勁兵犯關續漢書大將軍該五部部有校尉一人部下有曲曲有軍候一人晉書得劉𢎞一紙書賢於十部從事齊亡之日誰知袁粲之子孫袁粲傳粲字景倩仕宋出鎮石頭城蕭道成遣戴僧静等攻之子最以身衛父粲語最曰我不失為忠臣汝不失為孝子俱死齊書沈約撰宋書疑立袁粲傳齊主曰粲自是宋室忠臣吴没之年尚有陸機之兄弟晉陸機傳機年二十而吴滅太康末與弟雲同入洛晉書符堅曰晉代平吴利在二陸謂以得二陸為賢也雕弧乍熄遂射䇿於春官通典漢制射䇿對䇿兩科射䇿者謂為問難疑義有欲射者随其所得而釋之蕭望之對以射策甲科為郎是也對䇿者顯問以政事經義令各之董仲舒公孫𢎞皆以是進唐詩開元中官校士以郎官權輕遂改用禮部侍郎曰春羗笛未終詳觀槿序註便計偕於易水漢武紀帝徵吏民有眀當世之務習先王之術者縣次續食令與計偕師古曰計者上計簿也令所徴之人與上計者俱來而縣次給之食桂氏通典漢制嵗盡遣上計椽吏各一人條上郡内衆事謂之計偕簿馬援辭隴香犢如龍後漢紀隗囂居隴右遺馬援東方奉書入見光武註光武都洛在天水之東香犢見祖徳賦如龍詳壽徐序註庾信入關見滕王賦油車似霧詳鷹垂序貂蟬盈座見半繭賦盡北魏之儀同見滕王賦北魏紀後周伊婁穆字奴千周文曰奴千面作儀同見我矣即拜儀同簫歌當筵遇西宫之恊律漢外戚傅孝武李夫人兄延年善歌舞帝愛之以為恊律都尉衣薫胡粉見楚鴻序還迎塞上之姬鈿藴宫香或贈幽州之客廣雅鈿金華也用翡翠丹粉為之梁樂府有幽州馬客吟歌固已譽馳滕趙名重幽并况復性愛琵琶尤工絃索宫詞夜半月髙絃索鳴紫檀作撥句句離鴻譚賓錄開元中有中官使蜀回得琵琶以獻其槽以邏桫檀為之王建詩黄金捍撥紫檀槽王子年記師涓當衛靈時造四時之聲離鴻去雁蘋生三曲乃歌春也潘岳笙賦嚶嚶關關若離鴻之鳴子也金粟為牀聲聲别鶴元瑯環記郭瞹宴客有婢鏡兒善彈筝李端即席賦曰彈筝金粟牀崔豹古今註商陵牧子娶妻五年無子父母欲為改娶妻中夜悲嘯牧子感之作别鶴操並詳潘母啟雞鳴埭上見素伯序人傳子野之歌晉書桓伊字叔夏小字野王或稱子野每聞清歌輙唤奈何并詳掌亭誄庾家墓邉伎識王郎之曲世說王曇善歌謝公欲聞之而王名家少年無由得聞後公出東府山上作妓樂遇曇出庾家墓竹中作一曲於時秋月王因舉頭看北林月卒曲而去諸妓白謝公曰此乃王郎歌也才情第一風調無雙嗟乎碧草粘天見懸圃序盡是思鄉之客黄塵匝地江淹恨賦黄塵匝地歌吹四起誰非去國之人袁大捨之粧臺風飄蟬鬢陳書陳後主以宫人有文學者袁大捨等為女學士後主每引遊宴狎客共賦新詩中華古今註魏文帝宫人莫瓊樹始製為蟬鬢望之飄緲如蟬翼然馮小憐之畵閣月照燕釵北齊書馮淑妃名小憐齊後主大穆后從婢也穆后愛衰以五月五日進之號曰續命後主立為左皇后周師取平陽為周武帝所獲以賜代王達達甚嬖之燕釵詳皇士序賦號蕪城文選宋鮑眀逺作蕪城賦註即古䢴溝城吴王濞故城也今揚州地文成枯樹見天篆序欣逢才子快覩名篇自愧陳人荘子人而無人道是謂之陳人難忘新曲當年宋玉應有雄風宋玉風賦清清泠泠愈病析酲發眀耳目寧體便人此所謂大王之雄風也此日王筠空吟雌霓云爾南史沈約作郊居賦王筠讀至雌霓連蜷作入聲約笑曰僕恐人讀霓作平聲楚詞註遇雌霓讀入聲遇雲霓則讀平聲蔡邕月令章句隂陽交接之氣雄曰虹雌曰霓董少楹詩集序嵯峨金竈見得仲序人間無煉骨之方神仙傳仙家有太隂鍊形之法能令日中無影晉書永嘉中潘茂名入山逢道士曰子頂骨貫於生門命輪齊於日月若修煉可輕舉授以服食之法仙去曹唐詩惟有人間煉骨人嗚咽銀筝天上有銷魂之曲詳良輔序註南都石黛恒畵愁蛾通俗文染青石謂之㸃黛始興縣志廣東始興縣溪中出石墨婦人取以畵眉名畵眉石釋名漢眀帝宫人拂青黛蛾眉黛代也滅去眉毛以畵代其處也愁蛾見琴怨序北里臙脂見琴怨序彌承泫臉杜甫八哀詩每食臉必泫註淚目下頰上也張衡處機宻而不樂張平子四愁詩序張衡不樂相乆處機宻永嘉中出為河間劉楨限掖垣以長愁劉公幹贈徐幹詩誰謂相去逺隔此西掖垣拘限清切禁中情無由宣地老天荒見琴怨序猿猜鶴怨李義山詩猿啼鶴怨終年事北山移文蕙帳空兮夜鶴怨於是華堂失火燕雀俱焚國䇿初秦伐趙魏人皆以為便孔斌曰不然先人有言燕雀處堂棟宇將焚不知禍之將及已也今子不悟趙破而患將及已可以人而同於燕雀乎滄海無波蛟龍立盡槃操乾澤而漁蛟龍不遊梁世之金樓半燼陳家之玊樹何歸見滕王賦註故國王孫淚灑腰間之玦見素伯序辭鄉公主心傷屏上之詩詩紀後周宇文氏女嫁為突厥沙鉢畧妻初名大千金公主隋滅周沙鉢畧歸隋賜姓楊氏改封義公主後平陳以陳叔寳屏風賜主主自傷宗祀絶滅因書屏風為詩略曰惟有眀君曲偏傷逺嫁情建業風流一朝零落詳楚鴻序註江陵文武千載凄凉見滕王賦八王既自賊於中西晉紀惠帝時八王並興自相魚肉謂汝南王亮趙王倫成都王頴長沙王又河間王顒東海王越楚王瑋齊王冏也五帥復不歸於外見􅋯菴序嵇康被議撫愛子以托人詳下晉書嵇紹字延祖十嵗而孤李商隐詩嵇氏幼男猶可憫范曄臨刑顧名倡而隕泣宋書范蔚宗臨刑妓妾來别蔚宗悲涕甥謝綜曰舅殊不同夏侯色先是曄在獄有詩曰庻同夏侯色故云食子都無下意傷哉蕭賁之談梁書蕭賁竟陵王子良之孫值侯景破臺城湘東王繹淹留不進時賁為記室叅軍以繹不蚤下心非之嘗與繹雙陸食子未下賁因諷曰殿下都無下意繹深銜之下官不解著書達矣上黄之誥補註梁書始興王憺子名曄初封安陸侯繼封上黄侯言多激揚美才仗氣簡文帝為友愛見滕王賦時則城名白紵獨數董公松江志城南地生野苧環立如城因名白苧城系本烏衣尤推徳仲丹陽記烏衣之起吴時烏衣營處所也金陵志烏衣巷在秦淮南王導謝安居此其子弟皆稱烏衣郎故名申包胥倚墻七日見得仲序毛修之亡命三年李延夀南史毛修之字敬文仕桓𤣥為屯騎校尉誘桓令入蜀宋武帝以其與斬𤣥之謀頻加榮爵後為安西司馬見俘于魏值朱修之問南國事悲甚按亡命見素伯序蚤嵗聲華便如潘陸壯齡遭際略數庾徐見園次序令子少楹居然俊物宋書褚淵嘗謂任昉曰家有令子晉書温嶠聞桓温啼曰真英物也美北朝之甲第父是崔㥄北齊書㥄父休魏七兵尚書贈僕射㥄仕魏一門婚嫁皆衣冠之羙婁太后為博陵王納㥄妺為妃敕中使曰好作法用勿使崔家笑人㥄嘗人日侍魏帝宴㥄子瞻亦近御座人咸曰今日之讌併為崔瞻父子問南國之門風兒稱孫䇿漢紀孫堅生四男䇿權翊匡䇿字伯符年十餘已交結知名及堅死䇿年十七乃渡江居江都有復讐之志并詳鴻客序楊梅作對傳是童年見素伯序鸚鵡成篇由於半刻禰衡鸚鵡賦序時黄祖太子射賔客大㑹有獻鸚鵡者舉酒於衡令賦之衡因為賦筆不停綴文不加㸃銅盤㑹食詳鷹垂序炊金饌玉之家庾信大袷賦齋宫饌玉鬱斚浮金按駱賔王謂盛饌為炊金饌玉丸髻行歌換羽移商之伎廣雅丸髻童年之餙國䇿客有歌於郢者引商刻羽雜以流徴巷頭梔子皆是同心見海棠賦園内蘐花無非蠲忿見看奕賦石尉之珊瑚碎後衆譽豪奢見憺園賦王郎之團扇擎來人憐放誕王珉事詳鷹垂序世記王儉使賔客類事多者賞之何憲為勝賞以五花簟白團扇王摛至操筆立成文詞華美乃命抽憲簟掣取扇登車而去畵眉京兆比此非竒漢書張敞字子髙宣帝時職京兆尹為婦畵眉帝知問之敞曰閨房之内有過於此者使酒將軍擬斯應遜史記灌将軍傳灌夫剛直使酒不好面諛武安侯田蚡召長史劾灌夫罵坐不敬按史稱季布亦使酒難近云尤工文筆酷擅才情東海三何時有縁情之作南史何恭軍與族弟水部散騎俱擅文名時人語曰東海三何子朗最多叅軍曰故當推遜註三何思澄遜與子朗也緣情詳澹菴序西宫二應不無累徳之言見滕王賦鄴中詩集應㻛汝潁之士流離世故頗有飄以薄之嘆楚國先賢傳應璩作百一詩譏切時事皆怪愕為應焚棄之玉臺新咏序時有縁誄情之作非無累徳之詞按累一作體格輕華情文悱惻頭陀寺裏爭看才子之碑姓氏英賢錄齊時王巾字簡栖為頭陀寺碑文詞巧麗為世所重并詳靈巖碑景福殿前競寫名流之賦見滕王賦雲霞十丈如遊樊重之門金粉千重似入王根之宅見半繭賦僕夲恨人生丁亂世覩夷光之貌憎類無鹽見園次序列女傳鍾離春者齊無鹽邑之女也其醜無雙年三十衒嫁不售説齊宣王以四殆因拜為正后晉書周顗少有重名庾亮曰諸君咸以君方樂廣顗曰何乃刻畵無鹽唐突西施讀君山之書歡踰猗􅉐東觀記桓譚字君山孝成帝以其多蔵書待詔門下時人語曰玩楊子雲之篇樂於居千乘之官挾桓君山之書富於積猗頓之財孔叢子猗頓魯之窮士閒朱公富徃而問術公告曰子欲速富當蓄五牸乃適河東大畜牛羊於猗氏之南滋息以興故曰猗頓班固貨殖傳猗頓用盬鹽起舊有清河之癖甘作狂夫見琴怨序并詳顧哀辭新為記室之評慚非傑作見素伯序不辭𤣥晏見天章序願附青箱南史王淮之字元魯自曽祖彪之四世御史中丞練悉朝儀諳江左舊事并愽學所聞者緘之青箱附注山濤與嵇康友善康臨刑謂子紹曰巨源在汝不孤矣周鷹垂詩集序燕筑為傭流悲曷極見看奕賦吴簫作乞屑涕何從見雪持序姬人當大去之時春秋公子正不歸之日詳皇士序屈原九歌怨公子兮悵忘歸望將軍之樹風月俱哀後漢書馮異字公孫為人謙退從光武狥河北拜偏將軍時諸將論功異獨坐大樹下軍中號大樹將軍杜詩更識將軍樹悲風日暮多嚮帝女之桑關河交愴廣異記南方赤帝女學道得仙居桑上銜桑作巢或化白鵲赤帝悲慟女昇天去山海經宣山有桑名曰帝女之桑郭璞贊爰有洪桑生濵淪潭厥圍五丈枝相交叅園客是采帝女所蠺將花比面但掩啼痕似鳥能歌誰開笑靨見琴怨序則有家居小市夙稱丞相之賔見滕王賦飲若漏巵舊是諸王之友鹽鐵論川源不能實漏巵不熊滿陳思王與吳質書食若填巨壑飲若貫漏巵其樂固難量北齊才調獨類崔㥄見尺牘序及少楹序東晉門風共推王述晉書述字懷祖性沉静人謂之癡王導以門第辟之為中兵屬既見無他言惟問江東米價述張目不答導曰王椽不癡人何言癡也便令擲地聲已應夫銅丸中興書孫綽字興公作天台賦示范榮期期曰卿試擲地當作金石聲假使凌雲譽更騰乎文陛詳實菴序固已房中侍婢難辭團扇之投古今樂錄王珉投白團扇與嫂婢謝芳姿有愛嫂撻婢王止之芳姿素善歌嫂令歌一曲當赦之應聲歌曰團扇復團扇持許自遮面顦顇無復理羞與郎相見肆上遊童輙擬眀珠之贈補註而乃世丁不偶數值多竒痛徹青衣蒼茫北路史記李廣傳以為李廣數竒毋令當單于寃深白帢䟦䟤東藩晉書魏造白帢横縫其前曰顔後去其縫名曰無顔帢無顔者愧詞也懷愍不支天下愧焉類書䟤跋蹴也又蹻健貌古詩快馬須健兒䟤跋紅塵下此則輟曲奚疑彼亦摧絃不顧琴苑要錄秦時有倡屠門髙見秦奢淫宫女幼妙寵麗援琴而歌曲未及終琴折柱摧絃音不鳴舍琴而更援他琴以續之乃若汝南望族偏擅才情江左名流只鍾羅綺六齡應客已蚤辨夫楊梅見素伯序七嵗為兒遂預知夫苦李見佳山序䦨邉鬭鴨原冠諸童見憺園賦字裏雕龍還兼衆體見三芝房對於殿上言叔父之非癡晉王湛傳湛有隠徳人皆以為癡兄子濟輕之嘗詣湛談易入微晉武帝後問濟曰卿家癡叔死未對曰臣叔殊不癡索使座中覺此客之小異見三芝序交成鄠杜張衡西都賦鄠杜濵其足註扶風有鄠縣杜陵縣半是金張見滕王賦文出齊梁無非江鮑見園次序况復青春公子白麈王孫王維詩狂夫富貴在青春六書故麈似鹿而大尾可拂塵陸佃曰夫羣鹿從麈視麈尾所揮而集事物窮源老子以麈尾談𤣥總角入關詩綵舞仙郎之省見憺園賦勝衣適洛見素伯序橘懷公主之園見憺園賦四姓知名詳皇士序及鴻客序上銀街而走馬詳壽閻序六朝遭亂過綺陌以吹笙見琅霞序好學楊愔居列銅盤之食北史楊愔字遵彦六嵗受史書十一嵗受詩易季父曜為獨葺一室命處其中以銅盤具盛饌而飯焉小年衛玠出乘油碧之車見雪持序按油碧車乃油其車惟也有客能文何人不羡珊瑚作架詩比徐陵見天篆序鸚鵡成杯序來庾信見渭仁序註嶺表錄異鸚鵡螺旋尖處屈而朱如鸚鵡嘴故名其殻裝為杯竒而可玩庾信謝滕王啟琉璃汎酒鸚鵡承杯箜篌製引家傳曺植之詞崔豹古今註子髙晨起刺船見一狂夫墜河而死其妻作公無渡河之曲子髙還以語其妻麗玉妻乃寫其聲曰箜篌引曹植箜篌引置酒高殿上親友從我遊中厨辧豐膳烹羊宰肥牛芍藥名篇户説王筠之作見素伯序莫不玩同趙璧詳歸田序握類隋珠搜神記隋侯行見大蛇傷救而活之其後蛇銜珠以報盈徑寸可以燭堂世稱隋珠姹女數錢只給碑文之價漢書五行志桓帝初京師為城上烏童謡有曰河間姹女工􅁆錢以錢為室金為堂杜詩故人南郡去去索作碑錢卓家賣酒欲消才子之愁見看奕賦白玉當窗黄金押角詳天石序訝冬缸之不煖憐夏簟之非寒見茹蕙序絶似五車見園次序差如七略見尺牘序於是路出青溪詳皇士序註金陵志青溪發源鍾山南朝鼎族多鱗次於此人慚𤣥晏見天章序懷人悵望孫周横槊之鄉宋書桓榮祖曰曺操父子上馬横槊下馬談咏按孫權周瑜借用弔古流連張孔梳頭之閣見滕王賦註盻臺中之衰栁消盡黄鵝荆公栁詩弄日鵝黄裊裊垂彈軫上之枯桐飛歸白鶴韓子師曠鼓琴一奏之有𤣥鶴二自南方來集古樂府有飛來雙白鶴篇列仙傳蕭史善吹簫能致白鶴陳檢討四六卷五
