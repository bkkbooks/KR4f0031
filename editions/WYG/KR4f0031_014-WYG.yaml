body:
  text: 陳檢討四六巻十四翰林院檢討陳維崧撰序贈閻梓勤二十初度序劉伶臺闊時岀酒雄淮安志劉伶臺在山陽縣東北七里其南有杜康橋韓信城孤代生劍俠輿志韓王莊在淮陰縣東北韓信實生於此後名淮安為韓信城漢淮南著書之地賔客魁豪淮南王傳劉安博雅好古著鴻烈二十篇號淮南子並見滕王賦枚少孺作賦之鄉才華斐亹漢書枚臯字少孺淮陰人好詼諧善賦頌又極敏捷則有并汾右姓狐趙名宗見壽閻序少蜚雛鳳之聲見半繭賦長被伏鸞之目見懸圃序人傳衞玠何減佳人見雪持序羣説黄香無慚才子見琴怨序一堂彪固擅門地于髫年見庭表序兩世談遷邁家風于綺嵗見懸圃序爾其骨性清剛襟期朗暢絢斕文章之圃赭若雲霞琮琤翰墨之場颯如風雨臨文陷陣目攝魋肩突鬢之夫史記蔡澤魋顔蹙額掣筆摩霄氣吞摘句雕章之客書亡三篋補自胸中見天篆序賦駕兩京成于座上見天篆序注况復分其餘技足了十人梁書栁惲材藝兼美帝謂周檢曰栁惲可謂具美分其材足了十人量厥長才寧無一石晉書謝靈運言天下文章只一石曹子建獨得八斗蘸筆作擘窠之字虎跳龍拏見楚鴻序調鉛繪没骨之圖鶯歌蝶舞圖畫見聞誌李端愿有圖畫芍藥五本云是公主房中物或云太宗賜文和其畫皆無筆墨惟用五采布成旁題云黄居宷等定徐崇嗣畫没骨圖以其無筆墨骨氣而名之但取濃麗生態畫苑徐熈之子效黄筌畫謂没骨圖髹几則雕鑱金石油窻而箋釋蟲魚史記貨殖傳木器髹者千枚師古注㯃㯃物謂之髹蟲魚見園次序牆邊擫笛何妨脱畧之名見庭表序樹下摇琴大得清狂之譽見浙西序謿詼敖弄半由漫興以淋漓感激轟豗聊見餘波之綺麗較童烏之夙惠此更堪多揚雄傳雄子烏稱神童九嵗而夭子雲嘗曰吾家童烏九嵗預吾𤣥文倘犬子以同時君應不讓見納姬序觥觥吾友嶽嶽而翁見祖德賦猥於京國朋遊偶説家門子姓熟知婚媾易并悉干支見瀛臺序懸弧值陶令春遊之日小字斜川懸弧見壽間序陶潛遊斜川序辛丑正月五日天氣澄和風物閒美與二三鄰曲同遊斜川坦腹則南容兄子為妻坦腹見桐初序南容載論語婦家大阮見祖德賦言之笑噱聽者顛狂詎期羣紀之交見楚鴻序更屬潘揚之戚見尺牘序爰申讕語見樂府補序用展私親我所聞于古人敬以陳之執事士先器識誠哉長者之言人薄輕華允矣先民之論唐紀聞喜憲公裴行儉曰士之致逺者當先器識而後文藝王楊蘆駱雖有文華而浮躁淺露豈享爵祿之器耶輪囷山木經百折而壽始千年鄒陽上梁王書蟠禾根柢輪囷離詭澎湃江濤過雙崖而勢恒一束上林賦洶涌澎湃相期大雅置身千古而前所貴英賢折節萬夫之後并仗左汾為傳右晉脊鴒努力詩會看接翅于雲霄棣萼交柯詩佇見聨鑣于殿閣寄聲吾子勉旃來日之居諸詩試問君家住者何人之里巷原註梓勤居淮之竹巷狀元里徐母顧太夫人六十壽序蓋聞桃開千嵗知為王母之花漢武故事王母出桃七枚以五與帝自啖其二帝留核以種母曰此桃三千年一實非下土所植也桂實三秋識是姮娥之樹集仙錄月中有丹桂羅隱詩定知丹桂近姮娥風名少女魏志管輅過清河倪太守時大旱輅言樹上已有少女微風其雨至矣註東南風也㢲為少女居東南故名星號夫人下註瑶扉璇嶺宜春建延壽之宫上林賦下棠黎息宜春郭璞註宜春苑名在渭南杜縣東漢宫闕疏長安有宜春宫延壽宫丹竈瓊田不夜築長生之館寰宇記古有日夜出于東萊故萊子立城以不夜為名長安志天寶六載立殿曰長生以備齋祀女几山上鸞鳴天姥之鄉九域志河南府福冐縣本宜陽縣有女几山曰蘭香神女上升遺几于此太真外傳𤣥宗登三鄉嶧望女几山作霓裳曲詩紀太白夢遊天台有天姥吟珠母洋中輿志合浦東南巨海中出大蚌剖而得珠曰珠母海龍出鮑姑之井補注然而青天易老見實菴序碧海多濤見琴怨序夸娥猶助以移山列子太形王屋二山方千里高萬仞愚公年且九十面山而居懲山北之塞出入之迂也將移之帝感其誠命夸娥氏二子負山一厝朔東一厝雍南自此冀南漢陰無隴斷焉註太形即太行媧帝難辭夫煉石見憺園賦河頭娶婦逋十萬之緍錢華頂投壺負一雙之博箭見三芝序須知天上還遜人間彼夫九州富貴之家奚翅三島神仙之窟郊祀志蓬萊方丈瀛洲三神山在渤海中則有四姓貴遊見璿璣賦五陵甲族見渭仁序户班魯衞姻締譚邢詩葭莩盡棨㦸之宗漢中山靖王對羣臣非有葭莩之親注葭蘆也莩白色皮至薄言無薄親也棨㦸見看奕賦華跗悉貂蟬之彦見半繭賦箕疇五福書華祝三多見壽徐序而或者人發其祥天靳其寵東方曼倩之婦未見成仙見閨秀序注南宫敬叔之妻不聞多福論語霍驃騎齊名博陸稽家乗者祗稱異母之兒漢書霍去病封冠軍侯加驃騎大將軍異母弟光字子孟封博陸侯班定逺接踵蘭臺見觀槿序修漢書者猶賴大家之女見歸田序至若蘇誇軾轍宋美郊祁宋書蘇軾字子瞻弟轍字子由蜀人宋郊改名庠字公序雍邱人稱大宋弟祁字子京稱小宋祁臚傳第一以弟不可先兄命庠第一兄弟翰林此皆雙萼交輝未必三柯競爽燕山五竇詎曾並擢巍科見憺園賦洛下三張寧説咸登上第見祖德賦設云有是定疑史冊之多夸藉曰其然翻笑文人之善謔何圖今日身親見之如我徐世母顧太夫人者太夫人德懋珩璜職優組紃禮女子治織絍組紃幽蘭紉佩㓜已奉為女師見三芝序香茗裁篇長不煩夫姆教見昭華序爰以鹿邑之名閨見半繭賦歸我駒王之貴胄見憺園賦恪遵内則洲既咏夫睢鳩克相外庭弋又加於鳬雁詩有無黽勉詩鴻妻宛宛以如賔鴻妻見貞女序如賔見井叔序㫖畜辛勤詩陶母殷殷而召客列女傳陶侃孤貧范逵嘗過侃倉卒無以待賔母湛氏乃截髮為二髲易酒殽又撤柱為薪剉薦給其馬逵曰非此母不生此兒遂以德門之瑞蔚為盛世之榮剪虬龍之片甲徑欲成雲分鸑鷟之一毛便思映日周語鸑鷟鳴于岐山注鸑鷟鳳屬三株玉樹盡拂青霄唐書王福畤三子勔劇勃皆著才名杜易簡稱王氏三株樹滿穴丹雛齊騫碧漢見祖德賦注彤墀䇿對羣推杏苑之無雙唐紀進士及第宴會于杏園紫禁臚傳共羨瓊花之有二嵗時記進士杏園初宴謂之探花宴令少俊二人為探花使覓園中名花若他人先得名花則探花使被罰龍樓接武見滕王賦不異趨庭論語鳳沼羣棲見考功序有如家塾禮矧乃乗龍快壻復首攀南國之花楚國先賢傳黄憲為司徒與李元禮俱娶太尉桓焉女時人謂桓叔元兩女俱乗龍謂壻如龍也後魏志郭瑀有女謂劉昞曰吾欲覓快壻昞曰延明即其人也遂妻之至於繡虎諸孫見祖德賦又人擅西園之賦見尺牘序太夫人受斯茀祿釐爾罄宜詩和風襲襲翼此軨軒旭日曨曨耀其褕翟周禮内司服褘衣褕狄注褘與翬同狄與翟同皆雉色三禮圖褕衣揄翟刻青翟形采畫雉綴于衣是也謝道韞解圍逾妙郄夫人神明不衰列女傳謝道韞王凝之妻謝奕女也獻之與客談論辭理將屈道韞遣婢曰欲為小郎解圍施青步帳自蔽車前議客不能屈世説王尚書惠詣王右軍郄夫人問眼耳未覺惡不夫人時年九十答曰髪白齒落屬乎形骸至于眼耳關于神明那可便與人隔褒綸稠疊踰於架上之書榮誥駢闐積若床頭之笏唐書崔儼為諫議大夫羣從數十人每嵗時家宴以一榻置笏猶重李穆傳穆拜太師贊拜不名一門執象笏百人而乃安不忘勤貴而彌儉春飇婉娩愛提陌上之筐詩女執懿筐秋景澄鮮貪響林間之杵徐陵碑文春鸝始囀必具籠筐秋蟀載吟競鳴機杼兼之惠必逮人禮恒自下愔愔澣濯詩聿修女士之儀抑抑笄珈詩用著閭門之範撲杜陵之棗旁許隣家翳趙國之桑時無餓者見壽季序律應熈春時逢介壽六宫喧笑九天爭侈為美談百禮紛綸千載猶欣其盛事脂田粉碓詳顧哀辭賜出椒房漢宫儀皇后稱椒房以其實蔓延以椒塗壁亦取温煖庭實嘏辭庭實見逸齋序家語祝嘏莫敢易其常法充於柘館漢班婕妤賦痛陽祿于柘館兮玉臺新咏序柘館隂岑紇豆陵京都貴女見壽季序饋來芍醬千瓶史記醯醬千瓿比千乗之家枚乗七發芍藥之醬相如子虚賦芍藥之和具而後御之侯莫陳輦轂名姬捧到鶴綾萬匹庾信集有周大將軍隴東郡公侯莫陳君夫人竇氏墓誌銘鶴綾見瀛臺序長欄短巷繁燎熏天北壁南榮華鐘殷地時則曉澗呈青春巖獻黛枝頭綿羽見澹菴序飛來戴勝之禽月令季春之月戴勝降于桑注織絍之鳥砌畔新荑見修褉序長就忘憂之草見看奕賦蘇臺百尺無非織女之臺呉志呉王破越越進西施呉王乃築姑蘇臺高三百丈晉宫闕名鄴有織室臺崑玉千岡見懸圃序半是安妃之玉見天篆序崧以不才歡承斯會島間石燕迎淑氣以爭飛顧凱之啟䝉記零陵郡有石燕得風雨則飛如真燕㸑下焦桐遘賞音而欲奏見佳山序今日三明七穆見園次序須知稱觥洗斚而來詩詰朝十叟八公列仙錄邛人家有橘園橘盡收歛有大橘如三斗盎巴人剖之每橘有二叟鬚眉蟠然肌體紅明皆相對象戲談笑自若又有諸叟曰橘中之樂不減商山又一叟于袖中出一草根以水噀之化為龍四叟乗之而去幽怪錄載橘中只八叟神仙傳八公詣淮南王安門閽人難之八公曰王薄吾老今則少矣皆變為童子門吏驚報八童復化為老人授王丹經與王白日升天行見控鶴驂鸞而至見貞女序附注三夫人星在紫微天皇大帝旁葉母李太夫人六十壽序葢聞玉衡散彩天邊競説李星春秋運斗樞玉衡星散為桃李鳬舄昇仙世上偏誇葉縣見二齋序西河女子名已注於銀臺杜陽雜編滄洲去中國數萬里所居或金闕銀臺玉樓紫閣庾信步陸孤氏銘豈直西河女子獨見銀臺東海婦人先逢金闕南嶽夫人位自班乎絳闕陶𢎞景真靈圖南嶽魏夫人西嶽將夫人集仙録魏夫人晉司徒魏舒之女名華存嫁劉幼彦生二子性好道有真人授以太上寳等書位為紫虚元君南嶽夫人升天而去絳闕見逸齋序蘐庭日麗見憺園賦時開長樂之花見澹菴序柘館風輕見徐母序每種恒春之樹見天章序何必廖家井上始獲尋砂抱朴子臨沅有廖氏家世多壽疑其井水殊赤試掘井得丹砂數十斛詎須酈縣泉邊纔能采菊見琴怨序同邑葉母李太夫人者都憲晴原公之孫而編修集虚公之女也蛇蟠笥裏代䜟貴遊見祖德賦鳳吐懐中世徴才子漢紀揚雄著太𤣥作甘泉賦既成夢口中吐白鳳千枝繡㦸見看奕賦文通武達之門宋史檀珪求祿書曰僕一門雖謝文通乃忝武達而令子姪飢死二等金釭學士尚書之第何宴景福殿賦落帶金釭此為二等漢書昭陽舎其璧帶往往為黄金釭函藍田璧並見看奕賦夫人甫離毁齒蚤譽徽柔乍即勝衣旋稱淑慎毁齒勝衣見素伯序書徽柔懿恭詩淑慎爾止名齊鍾郝鏘雅韻於珩璜賢媛傳王渾妻鍾氏乃鍾琰之女太傳繇之孫女也王湛少無婚自求郝普女郝門孤陋而女有淑德後鍾郝為娣姒雅相親重鍾不以貴陵郝郝不以賤下鍾東海家内則郝夫人之法京陵家内範鍾夫人之禮晉書渾初襲父爵京陵侯王汝南娶郝氏生東海族壓譚邢扇芳芬於筐筥詩乃以隴西之淑女嬪彼南陽之象賢時則奉常香城公九列升華見賀徐序奕奕韋平之望見智修序國學崙生君六經論秀翩翩應阮之儔見滕王賦注夫人爰自齊牢洎乎降阼見閨秀序太常齋日潔爾庶羞見壽閻序夫子貧時遺其雜佩詩雜佩以贈之苕苕中外欲爭奉為禮宗見貞女序注濟濟姬姜但願師其閫範詩兹者時逢設帨見壽閻序禮屬加籩見逸齋序星連􅄔女之津漢書越地􅄔女之分野呉都賦􅄔女寄其曜海湧麻姑之宅見舜民序幸通門能知大概為壽母畧綴俚詞鋪揚疇昔資皇娥拊瑟之懽見雪持序詮次艱難博天姥投壺之笑見琴怨序今夫穠矣王姬多陳譜牒爛其韓姞每託篇章詩而或者運涉優游時非窞坎劉綱伉儷僅容盡室求仙列仙傳劉綱居四明山及為上虞令慕漢葉令王喬乃受道于白君飄然逺舉女仙錄樊夫人劉綱妻也鬚翠如雲肌潔如雪同仙去伉儷見牛叟序鮑靚夫妻祗許闔門學道漢書鮑靚為南海太守嘗遇陰長生授秘訣一日行部入海遇風飢甚取白石煑食之後以女妻葛洪吹簫棲上見藝圃序竹無涙以奚斑見憺園賦擊缶田間見看奕賦注鵑未啼而曷紫見天章序假使不遭板蕩將忠臣無建節之年古詩疾風知勁草版蕩識忠臣譬諸勿遇憂危雖孝子鮮揚名之日而夫人則結褵未久詩親結其褵遽罹烽煙合卺無何禮昏義合巹而酳注以瓠分為兩瓢謂之巹壻與婦各執一片以為酳倐經兵燹蒼鵝兆釁見懸圃序偏增蕩析之悲書青犢呈妖見觀槿序彌切仳離之嘆詩免田單之老弱實藉沈幾見雪持序全智果之宗支允需明哲下注茹茶不少集蓼何多詩然而以此言悲猶云未酷慨自斄亭之下王忳傳忳為郿令至斄亭夜聞女子稱寃曰妾夫為涪令此亭長殺妾家十餘口埋樓下忳問亭長姓名曰即今門下游激也明旦詣問具服同謀者並伏辜瓊樹恒埋詳俊三誄眢井之旁左傳楚子伐蕭還無社對申叔展曰目于眢井而拯之註欲其視無水廢井而拯已金刀屢折詳俊三誄王長史僅登強仕已嬰玉碎於前晉書王濛字仲祖亦稱長史病篤寢臥燈下恃麈尾視之嘆曰如此人曾不得四十濛别傳濛永和初卒年三十九世稱王濛温潤恬和謝尚清高令達羊南城才過立年復蹈蘭摧於後詳合肥啟庾信為齊王碑王武子以上將開國未滿立年玉碎蘭摧見翼王序葢崙生君一中副車史記張良擊秦皇誤中副車屢迷岐路見竹逸序乍沈酣而齊物見琴怨序終顑頷以傷生見半繭賦夫人則髽以當門見貞女序孱焉持户詳劉太母序注劑量旱澇躬收安邑之租詳萬栁啟注嗇縮錢刀先辦耏門之税左傳宋公以門賞耏班使食其征謂之耏門注耏班善御公以關門之征税賞之故即以班之姓名其門入室則柝鈴周匝疑過石慶之閭唐制禁署嚴密内夫人宣事亦先引鈴西京賦列卒周匝石奮傳奮次子慶元鼎中拜相子孫至二千石者十三人朱子小學取石慶家法為明倫善行居家而婢獲精勤咸守王褒之約古今文集王褒字于淵以事至煎上寡婦楊惠舍有一奴名便了子淵買之乃作僮約按僮約即券文也載文集懐清築罷曩時之閥閲依然史記巴寡婦清得丹穴擅利用財自衞人不敢犯始皇以為貞婦而客之為築女懐清臺石窌封來舊日之門楣宛若左傳齊侯自徐關入辟女子女子曰君免乎曰免矣鋭司徒免乎曰免矣曰苟君與吾父免矣可若何乃奔既而問辟司徒之妻也齊侯以為有禮與之石窌僉云有禮衆曰惟賢然或伯鸞内助第勸賃舂見集生序濬沖夫人徒工􅈫碓見逸齋序才優封殖惟爭齊妾之桑左傳晉重耳及齊將行謀于桑下蠶妾在其上姜氏殺之注齊姜氏育蠶之妾術擅贏餘但問西家之棗見看奕賦雖復豐荒鮮匱從容井臼之間見井叔序俯仰兼資黽勉有無之際詩足稱中智之才未預上流之目夫人則器局恢𢎞機神練達處世值亨屯之會易知廢知興漢書秦末天下起兵陳嬰之母謂嬰曰卒富貴不詳不如以兵屬人項籍取王陵母置軍中漢使至陵母曰願告吾子善事漢王母以妾故持二心遂伏劒死王命論嬰母知廢陵母知興置身在剥復之交易不奢不儉固類負羈之婦聲徹諸侯左傳晉公子重耳之及于難也及曹僖負羈之妻曰吾觀晉公子之從者皆足以相國若以相夫子必反其國反其國必得志于諸侯還同冀缺之妻名聞列國見井叔序若乃引經傳義里中倚若長城割宅分田門内尊為家督見逸齋序袒分左右持平總賴夫片言前漢書太尉周勃入北軍門令曰為吕氏者右袒為劉氏者左袒軍中皆左袒屋列東西見祖德賦斷决悉歸其一諾見納姬序能持大體不詢臧谷之亡羊莊子駢􅀈篇臧與穀二人相與牧羊而俱亡其羊問臧奚事則挾亡筴讀書問榖奚事則博簺以遊二人者事業不同其于羊均也景薄時榮遑計塞翁之失馬見歸田序一門羣從官方悉禀夫阮姑見壽閻序阿大中郎見壽閻序注家訓俱由於丘嫂史記高祖與客至丘嫂輟釡註丘空也兄亡獨有嫂也又大嫂稱也見集生序以至嵇康阮籍舉邀品藻於山妻世説山濤與嵇阮契若金蘭他日二人來山妻韓氏勸公止宿具酒食夜穿墉視之公入妻謂曰君才致不如正當以識度相友耳公曰伊輩亦常以我度為勝因而荀粲范汪咸俟重輕於劉母晉列女傳劉真長小時諸人比之袁羊母有識鑒謂之曰此非汝比勿受之又有方之范汪者劉復喜母又不聽後真長年德轉升論者比之荀粲料其才識縱鬚眉遜為不如測彼神明尤巾幗傳為僅事加以夙嗜丹鉛見尺牘序尤躭丘索見天篆序書籖翡翠翫銀鴨之宵移李賀詩深幃金鴨泠商隱詩睡鴨香罏換夕薫硯匣琉璃聽銅蠡之晝滴見園次序成都粉紙見園次序雙丸荳蔲之香見海棠賦河北花箋見尺牘序百軸葡萄之錦見三芝序共羨茂漪書格見昭華序蚤擅簮花見茹蕙序相誇道韞詩名偏饒詠絮見琴怨序然而每至臨文閒多削藁續斑昭之别史無心留以示人見歸田序斆令􅈺之雜文何意出而問世見閨秀序恒􅅓閨閣價懸吕覽之書見楚鴻序不艷釵笄名挂蕭樓之選見素伯序流傅奚益顧未亡何以文為杜預左傳註婦人既寡自稱未亡人讐勘寧疲庶兒輩知吾意耳爰乃德容彌晬遐福逾遒會逢周甲之辰適遘敦牂之嵗見九日序賈家彪怒見祖德序揄晝錦以帣鞲晝錦見逸齋序帣鞲見璿璣賦王氏龍超晉書王導拜司空桓廷尉作兩髻葛裾䇿杖路邊窺之曰人言阿龍超阿龍故自超戲斑衣而鞠斑衣見憺園賦鞠􅎽見璿璣賦魚軒阮氏佳兒逺過於許竒左傳歸夫人魚軒杜注夫人車以魚皮為飾魏志許允子二人竒字子太猛字子豹許允為晉景王所誅景王遣鍾會視其子若才流及父當收允婦阮氏謂子曰汝等雖佳才具不多率胸懐與語不須極哀兒從之卒免翟茀大家哲嗣更賢於曹榖列女傳曹大家子榖為陳留長大家隨至官作東征賦羲牀對設見雪持賦半鸞坡鶴禁之詞臣見澹菴序温鏡雙懸温嶠别傳嶠姑有女屬嶠覓婿答曰佳婿難得如嶠者何如因下玉鏡臺一枚聘之世説劉聰為玉鏡臺温嶠為劉越石長史北征得之以聘姑女多鳯窟龍洲之上客詳銀臺啟年均絳縣地盡丹丘見壽閻序矧此華筵偏當淑候千春行樂八公跨紫府之鸞八公見徐母序紫府見丁香賦跨鸞見貞女序七日為人百福錫紅旛之燕東方朔占書七日為人八日為穀嵗時記立春日剪綵為燕戴之帖宜春字于門並見澹菴序夫人則迴環往劫見琴怨序繡佛青鴦見半繭賦感慨前塵見琴怨序飯僧白雀珠林梁皇齋僧白雀寺中從此雍州無量之寺定現雙花白帖梁劉孝儀作雍州金象寺無量壽佛像碑文有銘曰葉産梵童花開釋子玉蓮交映銀河逓起虚空藏經寶手菩薩手中出無量花香瓔珞嗣令石頭彌勒之碑還來四鶴類涵梁劉勰剡縣石城寺彌勒石像碑銘有曰梵王四鶴徘徊而不去帝釋千馬躑躅而忘歸僕也昔與崙生情深謝范見雪持序今偕庭玉友在紀羣見楚鴻序居叨孟母之鄰門接延鄉之里列女傳孟母舎近墓孟子少好遊為暮間之事孟母曰此非所以居吾子也乃去舎市旁其嬉遊乃賈人衒賣之事乂曰此非所以居吾子也復徙舎學宫之旁其嬉遊乃設俎豆揖讓進退遂居之陳留風俗傳高祖與項氏戰厄于延鄉有翟母者免其難故以延鄉為封丘縣以封翟母遂含毫而製序爰灑墨而摛詞昔日士行宅畔曽分剉薦之餐見徐母序他時公瑾堂前長效承筐之祝見良輔序呉志周瑜與孫䇿同年友善瑜推道南大宅舎䇿升堂拜母有無通共詩承筐是將附注國䇿智果知智伯之將亡乃别族于太史為輔氏壽劉太母韓恭人九十序葢聞鳳凰六管聲必應夫雌雄黄帝紀帝使伶倫采嶰谷之竹吹之為黄鍾之音于是制十二管以聽鳯凰之鳴其雄鳴為六律雌鳴為六吕謂之律本抱朴子軒轅聽鳯凰而調律注軒轅黄帝諱龍雀雙環形定鐫夫子母見園次序丹青所載齊姜與戴媯同編見滕王賦典册所書季􅇗與孟嬴並錄見翼王序至若賜來黄玉識是仙姬見天篆序望去赤城見尺牘序知為天姥見徐母序洗頭盆上三峯記華山雲臺上有石臼可容水數斛明瑩如玉中有碧水未嘗増減俗呼為玉女洗頭盆却寒之帳千重補注搗藥臼旁辟惡之香四兩傳𤣥擬天問月中何有白兔搗藥秦嘉與婦書今奉麝香一觔可辟惡氣十洲記武帝幸安定西胡月支國王遣使獻香四兩大如雀卵黒于桑椹香氣聞數百里死者在地未三月者皆活庾信鴛鴦賦辟惡生香寄韓夀皇娥汎瑟見雪持序春風響穆滿之謡見素伯序玉女投壺夜月起井公之粲見琴怨序緋羅天上首册真妃下注白玉堂前見茹蓮序尤尊壽母詩則有西王少女身居昴畢之間列仙傳太真夫人王母小女也諱婉羅字勃遂又南極王夫人王母第四女名林字容真又紫微夫人名青娥字愈音王母第二十女雲林右英夫人名媚蘭字申林王母第十二女誠齋雜記有書生遇神女胡僧指之曰此西王母第三女玉巵娘也天文志昴日度畢月度二十八宿之二南嶽夫人見葉母序位列恒華之右詳銀臺啟如吾劉太母韓恭人者恭人海陵上族見紫𤣥序江表名家水汲鮑姑之井世享大年見徐母序杏栽董奉之林人多陰德晉董奉傳奉字君異居廬山有道術為人治病不取錢病重而愈者令栽杏五株輕者一株數年杏成林幼即敦詩長而習禮洛神賦嗟佳人之信修羌習禮而明詩詢余伯姊詩共遵陌上之桑見閨秀序問我諸姑詩自織盤中之素見閨秀序窻名朱鳥見三芝序祗議脯漿禮帳號青牛見尺牘序恒勤組紃見顧母序加以蘭英姓氏藉甚行間詩品韓蘭英綺密甚有名篇又善談笑齊武帝謂韓媛云使生于上葉則玉階之賦紈素之辭不足多也香茗才情見昭華序翩然林下見閨秀序掃眉才子粧臺記漢武帝令宫人掃八字眉杜牧詩掃眉才子于今少管領春風總不如續成班固之書見歸田序不櫛書生南郡新書關逢之娣好博經典逢曰吾家有一女進士惟恨不櫛耳載入殷淳之集見昭華序無何人頌春椒見瑞木賦時當穠李詩遥遥華胄見得仲序妙揀高門奕奕韓侯詩親求快壻見徐母序韓康弱女才雅稱夫描鸞劉向佳兒人無慚於奠雁昏義婿執雁入揖讓升堂再拜奠雁翳誰比玉禮君子比德于玉實係卯金見素伯序是時忠孕先生弱冠鋤經頻年種學不矜細咳私肴核乎藝林頗好大言見天章序獨畋漁夫文圃見黄門序張安世則博窮七篋見天篆序朱齡石則才湧百函見夀徐序然而長貧高鳳非無憔悴之言見懸圃序少賤王章見天章序大有幽憂之疾見海棠賦易衣而出居賴賢妻儒行易衣而出并日而食篤行傳李􅂶兄弟六人易衣而出椎髻而前出成徤婦范曄後漢書孟氏始以裝飾入門七日而鴻不答妻曰以觀夫子之志耳乃更為椎髻著布衣操作而前鴻大喜曰此真梁鴻妻也字之曰德曜名孟光古樂府徤婦持門户猶勝一丈夫寒機軋軋古詩札札弄機抒相聞袁相之園補注鄰火熒熒共鑿匡衡之壁見素伯序先生既身綰銀黄見二齋序恭人亦躬膺翟茀詩尋階藩轄洊歴參知高車駟馬人誇蜀郡之夫相如别傳成都有昇仙橋相如將東行題柱曰不乗駟馬車不復過此橋後奉使至蜀太守以下郊迎縣令負弩矢先驅象笏金蟬象笏見徐母序金蟬見紫來序帝念鮑宣之婦見壽閻序往昔有言婦隨夫貴人情不免氣以居移曠觀夫東京紆紫之倫逖稽夫西洛拖珠之客晨轅萬騎胥盡室以南征暮幰千車悉舉宗而北指騶軒挈婦第舎相望魚服隨夫輪蹄不斷恭人獨以家有舅姑鄰無彊近李密陳情表無朞功彊近之親一官就道輙辭夫子以家居數載闔門恒相高堂而里食巵􅓢觹䚢内則敦牟巵􅓢非餕不敢用婦事舅姑左佩刀礪小觹手自屏當見庭表序緘管枲麻内則婦右佩箴管又執麻枲親為操作見上注况復庭有廉泉南史范栢年初見宋明帝因言及廣州有貪泉帝問卿州有此否對曰臣梁州惟有文川武鄉廉泉讓水又問卿宅何處曰臣所居在廉讓之間帝善之授梁州刺史方輿勝覽宋元嘉時報恩寺中一夕霹靂湧地為泉時歸功太守名曰廉泉堦生慈竹見􅋯菴序一門以内每聞自教其兒世説謝公夫人教兒問太𫝊那得初不見君教兒答曰我常自教兒三尺之童未嘗笑見其齒又復下陳能􅂶晏子有二女願得入身于下陳注猶後列也李斯書飾後宫􅂶下陳小星善逮詩家人歸妹易色以次而能升樛木葛覃恩雖微而必及洎乎地隕珠囊見鴻客序天傾金鏡春秋孔錄法有人卯金刀握金鏡雒書秦失金鏡魚日入珠鄭元注金鏡喻道明也參知則忠以騎箕見藝圃序恭人則貞能矢日詩有如皎日生而不愧何殊荀息之君臣公羊傳獻公謂荀息曰士何如則可謂不食其言矣曰使死者反生生者不愧乎其言則可謂不食其言矣隠矣焉文大類介推之母子左傳晉侯賞從亡者介子推不言祿祿亦弗及子推曰身將隠焉用文之母曰能如是乎與女偕隠晉侯求之不獲以綿上為之田時則令子孝亷愚公先生者王家誓墓永日思親見黄門序袁氏鑿坏彌年將母漢書袁閎字夏甫居父賀喪至孝後桓帝以安車徴之及朋黨事作閎乃築土室潛身十八年旦暮向母禮拜范滂美之曰隠不違親貞不絶俗可謂至賢矣吟成梁父漢丞相雅好栽桑秦紀始皇封泰山禪梁父注梁父泰山下小山琴操曾子耕泰山之下天雨雪凍旬日不得歸思其父母作梁父歌諸葛本傳亮臥南陽躬耕隴畝抱膝好為梁父吟見歸田序栽桑見看奕賦家本潯陽晉徴君差堪挿柳見海棠賦恭人復念累葉簮纓傳家墳索見天篆序雖機雲兄弟何必同行見祖德賦然王謝子孫無妨一出爰乃和熊教子詳潘母啟絶髢留賔見徐母序閉門而躬受生徒畫荻而日傳章句北史符堅幸太學博士盧壺曰周官禮注未有其師太常韋逞母宋氏世傳父躬業自非此母無可授傳于是就其家立講堂置生徒百三十人隔絳紗帳受業號宣文君列女傳歐陽修四嵗而孤母鄭氏守節教育之家貧以荻畫地學書於是僧彌為弟繼薦賢書見皇士序太傅諸兒羣稱國器見滕王賦附隋末高孝基見房𤣥齡曰當為國器鳴鐘而食詳合肥書階前之玉樹駢枝見祖德賦結駟以遊市上則璧人並轡見雪持序凡諸子姓矯若龍駒維彼曾𤣥劣猶虎豹下注今嵗孟冬之月正恭人大耋之辰郄夫人行年九十神明不衰見徐母序齊田文有客三千衣冠畢會史記田文相齊招致賢士食客嘗數千人橘中十叟見徐母序並擊雲璈見逸齋序竹裏雙妃齊翻寶瑟見憺園賦離騷逺遊使湘靈鼓瑟兮令海若舞麻姑獻壽詳韓倬啟採來新息之珠輿志交趾出明珠按馬援討交趾封新息侯載薏苡歸譖者以為明珠即此地月姊稱觴見憺園賦織就扶風之錦見璿璣賦唱天上無愁之曲嬃女意錢北齊書後主好自彈琵琶自為無愁之曲民間謂之無愁天子嬃女見雪持序資暇錄錢戲有每以四文為一列者即史傳所云意錢俗謂之攤錢張仲素詩席上意錢來賦人間行樂之篇羿妻蹴鞠漢楊惲詩人生行樂耳須富貴何時羿妻見琴怨序鹽鐵論蹋鞠以革為圓囊實以毛髮蹴蹋為戲劉向别錄寒食蹋鞠黄帝所造夫人城上夜已三更晉史朱序鎮襄陽符堅攻之序母韓氏見城西北角當先壊領百餘婢并女丁斜築城二十餘丈賊攻西北角果潰衆守新城號為夫人城按漢匈奴傳至范夫人城非此城少女風前人將百嵗見徐母序則有刈瑯琊之稻見竹逸序酒釀玻璃唐樂史有玻璃七寶杯西凉葡萄酒餐度索之桃筵張玳瑁十洲記東海度索山大桃樹盤屈三千里劉揁𤓰賦薫玳瑁之筵爰抽毫而作賦再拜母以登堂見葉母序附注貴妃外傳妃坐便殿有青鸞銜書皆綠字丹文言太真係緋羅天上侍女齊書王僧䖍誡子云王家門中優者鸞鳳劣猶虎豹陳檢討四六巻十四
