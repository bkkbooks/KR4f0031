body:
  text: 陳檢討四六巻二十翰林院檢討陳維崧撰祭文跋祭王敬哉先生文地折幽燕峰頺恒霍見賀周序珠斗芒寒見璿璣賦蒼穹氣薄咸陽之樹西靡皇覽冡墓記東平王冡在東平傳言王思歸京師其冡上松栢皆西靡劉峻答劉詔書東平之樹望咸陽而西靡箕尾之星夜落見藝圃序百身莫贖悼神理之芒然萬䙫難追歎儀型之閴若臨朝罷講九重重以咨嗟設位盈衢百辟聞而震愕葢賢良道喪固率土之所同悲而師弟情深尤微忱之所獨覺聲因激楚而不成管以哀傷而難握緬太夫子之遭逢歴古今而烜爍恩榮則位極人臣名位則朝尊舊學一門宗伯先後登八座之榮兩世巍階父子享同朝之樂入直則秩宗司馬共聽待漏之鐘宋紀元和初置待漏院王禹偁作記問寢而亞相仙郎金華子御史大夫謂之亞相仙郎見存菴序註羣獻引年之爵見佳山序箕裘則笏以盈牀見徐母序壎篪則花皆並萼詩此雖備福命之崇隆猶未殫史書之揚㩁乃其學術醇深文辭卓犖汪汪千頃之波漢書郭林宗曰黄叔度汪汪若千頃波澄之不清淆之不濁矯矯半天之鶴見掌亭誄論事而頡頏韓歐宋紀韓琦歐陽修皆名臣晰理而折衷濂洛見施公誄詩歌則陶情寫臆歎三唐兩宋之非工見瀛臺序纂錄則摘奥搜竒哂夾漈貴與之未博夾漈見玉巖序宋書文學别傳馬端臨字貴與宋亡隱居教授鄉里著有大學集傳多識錄文獻通考等書綜衆説之異同準百家之詳略寅清議禮書定郊壇袷褅之焜煌翰苑陳書兼雅頌典謨之渾噩見佳山序載於金匱之編見憺園賦註副在石渠之閣詳同年文固猶未足罄其心傳抑豈遽以窮其教鐸葢躬行心得之際既言有物而行有恒至家庭屋漏之間尤仰不愧而俯不怍冲襟而霽月光風粹質則金精玉璞宋書黄庭堅云周茂叔人品甚高胸次灑落如霽月光風晉書山濤為吏部王戎目之為璞玉渾金人但知其寶莫能名其器雖履功名之盛貴以彌温即當耆耋之齡老而逾恪愧賤子之菲葑詩荷名賢之繩削代侍韋平之函丈久藉熏陶見智修序附窺洙泗之宫牆深䝉袚濯見施公誄廿年之口澤猶新禮母没而杯棬不能飲焉口澤之氣存焉耳兩世之師門如昨數疇昔之遊從景高山之岝㟧呉都賦石林之岝㟧按支道林所居山名岝㟧保傅而能全韋布之交久要而不負平居之諾挂徐君墓劍見實菴序曾還大阮之金大阮見祖德賦報劉峻遺書記返潮州之槖補註不忘良友之成言足慰故人之密託此皆親炙於覩記之頃竊嘆為至性之肫肫抑即徧觀於載籍之林亦鮮此高風之嶽嶽見祖德賦惟仁者壽自應優游不死之庭得聖之和奚須别訪長生之藥方共祝夫岡陵詩遽上征於寥廓鵬鳥賦寥廓忽荒何梁木之傾摧見毛太母啟詎昊天之渺邈霜凄凄而入幃霧靄靄而襲幙鵑啼而雪縞千峰􅆐嘯而風悲萬壑彼人之哭公者為師臣帝佐而悲纒而我之哭公者因世道人心而嘆作有蔬載搴有酤載酌聊一痛以陳辭冀神靈之來格公祭同年陳子遜文嗚呼痛哉伯牙逝而賞音亡見園次序惠施去而微言絶淮南子惠施死而莊寢説言世莫可為語也惟友道之在人實五倫之㞐一故大易繫斷金之辭風人賡伐木之什存既喻馥郁於椒蘭見掌亭誄殁復况纒綿於膠漆見素伯序左桃羊角交情倍切於死生關中流寓志羊角哀與左伯桃聞楚王賢往歸之道經郃陽遇雪度不能俱生乃并衣與角哀伯桃入樹死角哀至楚為上大夫王備卿禮𦵏伯桃角哀自殺以徇蘇武李陵友誼更深於離别庾信趙國公序蘇武李陵生于離别之世然覩陳根而輟哭見映碧序猶獲引達人齊物之談見琴怨序遘宿草而彌悲見映碧啟註尚得援太上忘情之説見海棠賦未有遊好方新歡娯永畢甫給相如之札見瀛臺序便丁賦鵩之辰賈誼傳誼在長沙三年有鵩飛入誼舎自恐壽不得長故為賦以自廣纔彈貢禹之冠見黄門序即會泣麟之日見素伯序是則罄安仁之誄筆晉潘岳傳安仁辭藻絶麗尤善為哀誄之文何能敘此酸辛殫庾信之銘言見園次序未足形兹悽惻者矣慨資格之困人緬賢豪而同嘆鸞何事而受笯屈原懐沙賦鳯凰受笯雞雉翔舞桐何為而遭爨見佳山序問天無買賦之金見天篆序註閲世少翹才之館見九日序鬼憎赴洛之陸機見祖德賦及紫𤣥序白帖二陸入洛三張減價客笑離家之王粲見滕王賦楚詞去鄉離家兮來逺客庾信哀江南賦逢赴洛之機雲見離家之王粲惟我皇之盛德邁漢武與周宣既崇儒而重道聿籲俊以招賢頓八絃而羅屈宋馬融廣成頌然後舉天網頓八紘曹植與楊修書顧八紘以掩之崔實本論舉彌天之網羅海内之雄屈宋見楚鴻序設四科以召淵騫論語翡翠簾垂殿上寫沈香之句李白傳天寶中白供奉翰林禁中初種木芍藥移值興慶池東沈香亭會花開命白立進清平調三章白承詔有云沈香亭北倚闌干琉璃匣啟見園次序註宫人分織錦之箋見紫來序縹緲龍樓詞賦則午門御覽焜煌鳳燭姓名則乙夜親填時則紫禁啼鶯紅牆語燕草纈青袍見半繭賦桞飄金線見萬栁啟雲移雉尾崔豹古今註殷高宗以雉雊之徴服章多用翟故有雉尾扇杜詩雲移雉尾開宫扇詩成而兩省傳觀見黄門序註按漢丞相與御史大夫稱兩府日映螭頭見璿璣賦賦就而九重稱善千百國實異響以畢臻五十人乃同時而召見爰修天禄之書復拜大官之膳繄陳君之卓犖冣要眇以宜修屈原九歌美要眇兮宜修註好貌綺嵗騰蛟於甬上騰蛟見祖德賦甬上見鄴園啟弱齡繡虎於明州見祖德賦寧波府志唐曰明州船是孝廉見祖德賦才調則爭誇彩筆見看奕賦縣成仙令見二齋序勤勞則具在黄流詩慶瑶瑛之既採慚瓦礫之俱收吾儕何幸獲偕君子並轡銅街聨鑣金市見滕王賦正擬花磚見呉太母啟同繙芸史見澹菴序何連茹之彚征易遽一枝之先萎依稀昔夕彷彿同車火城正盛詳祭梁田文銀箭還賒見璿璣賦星輝輝而半吐河耿耿以將斜曉風吹夫南内見鴻客序殘月曖夫東華前輩戲語西湖風月不如東華軟紅香土註東華百官出入之門趨朝待漏下直還家音徽未沫笑語猶譁人今往矣非耶是耶見皇士序嗟乎蝶化䝉莊見藝圃序鵑迷蜀棧見孟太母啟皓月難圓彩霞終散三千里呉關越岫驛路偏長十二日金馬石渠流光甚短金馬見園次序三輔故事石渠閣藏秘書漢宣帝令諸儒講五經劉更生亦校書于此兩都賦序内設金馬石渠之署槐宫之蟻陣空酣唐書淳于棼宅南有古槐常醉臥其下夢入大槐安國尚公主守南柯及覺乃蟻穴按蟻陣見天章序淮南子魯陽公與韓酣戰椒殿之鶴書恨晩椒殿見徐母序北山移文鶴書赴隴蕭子良古今篆𨽻書鶴頭書與偃波書俱詔版所用在漢謂之尺一彷彿鵠頭故有其稱我聞天上亦有嬋娟見琴怨序離騷女嬃之嬋娟兮葛洪貴客見壽閻序許邁仙班列仙傳晉許邁字叔𤣥時鮑靚隱迹邁往候探其至要辟榖服氣先娶呉郡孫宏女為妻後為書謝遣之入蓋竹山為地仙莫倚蛾眉輕為語言離騷衆女嫉余之蛾眉兮須馴龍性見尤母誄善與周旋保令名於璚笈見呉太母啟享遐祉於珠田見尤母誄祗我同人哀悰難剖園内之茱萸徧挿已少斯人王維詩遥知兄弟登高處遍挿茱萸少一人堦前之芍藥徒翻長思我友見紫𤣥序謝元暉直中書省詩紅藥當階翻返雙流而合葬未審何年庾信步陸孤銘雙流返葬按水經註成都縣有二江雙流蜀都賦帶二江之雙流此借用緣一慟以脱驂定知誰某檀弓孔子之衛遇舊館人之喪哭之哀使子貢脱驂而賻之冀蹔駐夫靈旂見掌亭誄庶來歆夫絮酒見觀槿序祭仲衡先生文丙申春暮余客西興輿志西陵渡在蕭山錢鏐忌陵字易名西興翁訪吾翁扁舟是乗畫溪櫓摇銅峰屐登湖州志長興縣有罨畫溪古木夾岸可十里許武康縣有銅官山呉王濞採銅于此唐名武康山二老風流觚飛爵騰杜甫寄贊上人詩與子成二老來往亦風流儀禮騰觚於賔註凡觴一升曰爵三升曰觚傳毅舞賦騰觚爵之斟酌兮曹植詩騰觚飛爵闌干吾翁見背是年夏月孤子流離狂奔呉越遇翁武丘别翁倉猝漬血交頥含哀刺骨嗟嗟余弟十四稱孤作贅睢陽歸德府志漢曰睢陽單衣路隅上鮮郄公疇憐淳于揚雄蜀都賦若其漁弋郤公之徒左思蜀都賦王孫之屬郤公之倫註豪俠也史記滑稽傳淳于髠者齊之贅壻也滑稽多辨卵翼惟公左傳楚子西曰勝如卵余翼而長之註子木之子名勝立其户樞自古而然俗疵文雅或與翁言彼陳生者癡王伯輿見滕王賦世説王長史曰人言會稽王癡真癡狂桓子野見掌亭誄慎勿與通暱生者寡弟歸告兄嫉彼啁啾兄笑而言彼其何尤翁定知人人言勿憂所恨於中關河阻修余到中原實維己酉滎澤波飛成臯雪阻見醴泉頌一綂志戰國成臯古邑名本東虢國地又名虎牢漢成臯縣屬河南郡今開封汜水縣有成臯阪古蹟吕氏曰滎陽成臯自春秋來為天下重地遂踦翁閭與翁握手跌宕詞場見初明序激揚文藪漢谷永疏贊命之臣靡不激揚宋中四月名花盛開大者如柈見子厚序霞蒸絳堆翁曰觀乎幸子能來繞燧人陵經閼伯臺輿志燧人氏陵在歸德府左傳昔高辛氏有二子伯曰閼伯季曰實沈不相能也帝遷閼伯于商丘主辰故辰為商星歸德志城西南有閼伯墓廟傍有臺老輩誰與徐公健在原註謂恭在躡電追風君家叔岱吹竹彈絲呼盧博簺昌黎文代張籍書云未必不如聽吹竹彈絲敲金戛石也呼盧見梧月序博簺見葉母序註食酒衫汚抝花帽戴古樂府抝折楊柳枝輟耕錄南方或謂折花曰抝花元微之詩今朝誰是抝花人聨旬浹夕喧豗譟呼余戲謂翁人言有諸狂耶癡耶夫我何居翁曰非癡狂應不誣余舞蔗竿見半繭賦脱身而跳翁果知余仰天大笑史記滑稽傳淳于髠見齊王仰天大笑冠纓索絶桂醑重斟見九日序梨園再召唐紀𤣥宗選弟子三百人按曲于驪山繡嶺下謂之梨園子弟花竹幽軒箏琶絶調余倚酒悲告翁倦遊擬欲從翁卜其菟裘見季青序翁顧徐公叔岱是謀茂陵小婦為余訪求見海棠賦註嗟嗟聚散何常之有欲别翁歸悲難出口餞我城東為余折柳見􅋯菴序顧語陳生定能來否余揖翁言翁乎莫愁人愛賢豪鷹貪臂鞲漢紀桓虞謂趙勒曰良吏如良鷹下鞲即中鮑昭詩昔如鞲上鷹註鞲臂衣也白日在天酸風射眸李賀詩東關酸風射眸子余所遲來罰余酒籌泗水如油淮帆若箭慎子沙下龍門流駛竹箭駟馬追之不及别翁半載夢中常見昨者南徐浪花雪濺睢州使君輿志睢州屬歸德府召余文讌酒中語我翁竟仙遊余驟而疑詎有此不嗣後弟書來自商丘見上發函伸紙涕泗横流翁之盛德淵騫曾史見施公誄翁之精明博聞強記禮天祐善人豈宜有是反覆徬徨終無信理所可差慰家有璆琅書鳯毛犀角見三芝序巨闕干將越絶書歐冶子五劍曰純鈎湛盧豪曹魚腸巨闕按干將見園次序司成棨㦸令子文章翁無憾矣乗雲帝鄉堯紀華封人曰去而上仙乗彼白雲至于帝鄉我所聞翁殁之前夜飲類公榮晉書劉公榮飲酒雜穢非類或譏之答曰勝公榮者不可不與飲不如公榮者又不可不與飲是公榮輩者又不可不與飲故終日共飲而醉聲如興霸見梧月序歌板未收金缸猶㵼揮手人間奄然而化蟻觀八極莊子田子方篇揮斥八極并見璿璣賦註驂鸞太清見貞女序太真科三清之間各有正位聖登玉清真登上清仙登太清翁齊物化我憶交情高山不作流水無聲嗚呼已矣盡此生平祭同學董文友文於戲我友去年今夜櫟園司農酌余館舎秋霖㶁㶁見萬柳啟街鼓礌琅左思呉都賦菈擸雷琅韓愈詩乾坤擺雷琅子已在焉傫然以尫史記趙武靈王廢太子章羣臣見故太子傫然也廣陵宗生新安汪子與我與君四人而已君時憊甚公羊傳楚子反謂宋華元曰甚矣憊覓几而慿食一溢米酒不半升見謝呉啟余心怦焉宋玉九辨心怦怦兮諒直口與心計念欲沮君俾無入試君悲久􅀈誓奮文場余言中茹囁嚅自傷盤谷序口將言而囁嚅戰罷而歸江颿若箭見仲衡序東舫西船曠焉不面凉秋報罷匿影蓬根見得仲序日薄虞淵見呉太母啟向秀思舊賦于時日薄虞淵寒氷凄然子訃在門嗚呼天耶痛纒心髓重趼狂奔國䇿公輸般為楚設機械攻宋墨子百舎重繭往見般以却之淮南子申包胥累繭重胝至秦庭哭君百里鳴呼我友交君廿年詞場跳盪見藝圃序文讌流連得草而呼聞音而喜莊子夫逃虚空者聞人足音跫然而喜生我者親相知惟子子之文學蛟龍蜼螭周禮九章虎蜼為首註似獮猴而大黄色螭見璿璣賦劌怵胃腸桓譚新論揚雄作甘泉賦始成夢腸出收而内之明日遂卒金樓子揚雄作賦有夢腸之談曹植為文有反胃之論潛確類書王仁裕刻腸為文放為瑋詞抉電鞭霆山移壑飛岣嶁岐陽鐫之剔之岣嶁見竹逸序岐陽見梧月序子之績學博聞強誦纎窮蜹翼細穿針孔夾漈後先貴與伯仲見敬哉文射覆發矇應弦而中漢東方朔傳上嘗使諸家射覆置守宫盂下射之註于覆器之下置諸物令暗射之按方朔與郭舎人射覆知蟁楚檮杌楚庭有神白猿射莫能中養由基射之未發猿擁柱而號既發應弦而下子之行誼忠信楷模砥行潔身皭然不汚見貞女序鼓鞴元氣補註笙簧典謨見素伯序英英哲人煌煌大儒其或少時婞直自遂離騷鯀婞直以亡身兮意所齟齬九辨圓鑿而方枘兮知其齟齬而難入唾猶泥滓見掌亭誄壯而折節刮磨淬礪人或不知畏其鋒鋭君少為文詭麗萬方中年聞道筆陣堂堂孫武子無擊堂堂之陣刋落鉛華見茹蕙序一歸老蒼而彼小儒沸猶蜩螗詩如蜩如螗如沸如羮疇昔之言記其八九君曾語我人生何有誰為後死託之不朽誰知君碣遽落吾手杜詩不意青草湖扁舟落吾手一語更悲曾顧余云昔賢名集迪功舎人徐昌榖集序昌榖明神宗時人負才善屬文不得志位甚卑僅為迪功郎因名其詩為迪功集行于世最可懼者百年奄忽見王母詞呼之茂才見雪持序以當官閥見壽季序註何知今日果䜟斯言方干羅隱萬古同寃唐書方干字雄飛桐廬人羅隱字昭諫錢塘人貌俱寢陋工于詩不第光化中韋莊奏才人不遇者如李賀陸龜䝉羅隱羅鄴方干賈島温庭筠劉德仁十餘人請追賜及第以慰地下一作宰臣張文蔚所請而我識君飄飄雲氣見浙西詞序百軸龍文扛之入地見佳山序燈䦨淚盡濺雨驚沙百靈惶惑萬感槎枒見觀槿序空庭無人明河欲斜我之哭君醒耶夢耶倘余未死息壤在彼見季青序傳君遺文誨君幼子苟或不然臣力竭矣柱絶絃摧見鷹垂序報君僅此公祭梁老師母呉夫人文嗚呼哀哉竹殞湘江見憺園賦蓮凋華井見鞠存啟簫愴嬴樓見藝圃序笙悽緱嶺見滕王賦麝粉千堆見紫來序兔華萬頃見謝柯啟天上春沈人間夜冷維予夫子名在旂常見鄴園啟家傳鴻案見貞女序國賁龍章同牢尹姞佐饋姬姜詩絃調燥濕琯叶陰陽萬樹梅開六街燈罷我儕小子羣遊輦下並屬提攜俱䝉奬借問字花朝見昭華序執經雪夜紀善錄游定夫楊子立初見伊川伊川瞑目而二子侍立既覺顧謂曰爾輩尚在此乎今既晩且休矣乃出門門外雪深三尺彩毫掞賦見看奕賦錦瑟填詞見天篆序公與生徒朝斯夕斯值公屢日端居不怡微聞德曜見劉太母序沈疴中之我黨私憂時還竊擬天相夫人勿藥定喜易何圖惡耗見尤母誄遽入於耳未遇金膏見鞠存啟難逢石髓見半繭賦夫人閥閲見皇士序實冠三河一門畫㦸見閨秀序七葉瑶珂見祖德賦及半繭賦眉分恒嶽眉分見閨秀序恒嶽見銀臺啟錦濯滹沱錦濯見園次序滹沱見田太翁啟香奩咏絮見琴怨序綺嵗牽蘿見昭華序鳴雁相呼詩彩鸞旋嫁見憺園賦註歸我尚書茜袍珠帕見憺園賦四姓門楣見璿璣賦二姚姻婭左傳伍員曰昔少康逃奔有虞妻之以二姚杜註姚虞姓虞君妻以二女也離騷留有虞之二姚法酒杯傾宫香扇惹尚書昔載暫臥棠村潭園雨歇蕉屋烟渾看花北郭命酒西園見尺牘序夫人克相嬿婉琴尊詩海國珠洋見徐母序渦漩雪吼爾雅渦辨回川註旋流也劉禹錫詩八月濤聲吼地來巻起沙堆似雪堆爰敕尚書樓船疾走手豢蛟龍見舜民序口銜星斗後漢書劉陶訟朱穆寃曰中官手握王爵口銜天憲夫人在家摒擋箕帚摒擋見庭表序箕帚見王母銘桄榔葉黒茘子枝鮮見玉巖序鐃歌返斾見鄴園啟花鳥歸船亞相還朝見敬哉文夫人從焉象服翟衣詩犀翹爵鈿滿院銅琶見蓴菴序註一簾樺燭國史補宋朝京師每正旦曉漏以前宫相使執金盤皆以樺燭百具照之號火城註以樺木皮巻之為燭或褁松脂下直餘閒闔門休沐見雪持序粉黦鸕鷀補註硯斑鸜鵒歐陽修研譜端谿子石以注水不耗為佳有鴝鵒眼為貴俗以子石為紫石竹脆絲清茗香釀熟桓妻偕老見壽閻序鮑女雙仙見葉母序花名並蒂見憺園賦鶴必千年見良輔序何期玉臼便上瑶天列仙傳裴航過藍橋渇老嫗令雲英以漿水飲之航得玉杵臼與嫗後遂娶雲英鸞難膠續見顧哀辭禽經鸞血作膠可以續弓弩琴之弦桂以香煎莊子人間世楚狂接輿曰山木自冦也膏火自煎也桂可食故伐之漆可用故割之嗚呼夫人蘭摧玉毁見翼王序嘆昔文人亦多如是延壽靈光賦成蚤世見滕王賦豪氣三千弱齡廿四名閨韶齒雖與同殤然而遭遇獨擅幃房夫人八座見韓倬啟命婦頭行見李母啟榮封一品綵舞諸郎見憺園賦長信宫中見憺菴序日華門左宫闕志日華門在左掖杜詩我住日華東面藥口脂官儀臘月宣賜口脂面藥所以盛之者翠管銀罌杜詩口脂面藥隨恩澤釵梁翠朶賜出彤樓捧歸青鎖見憺園賦似此殊恩仙遊亦可况徴蘭夢見三芝序蚤茁苗哥原註梁蒼巖先生夢人貽宋繡松下茁五苗是嵗生第五郎因名苗哥犀錢繡褓坡公集有賀人生子詞云犀錢玉果利市平分霑四座蠟鳳銀鵝蠟鳳見雪持序王建詩金鳳銀鵝各一叢芳華不沫金石誰磨名分月姊位列星娥見憺園賦所未忘悲師門誼在坤範空存母儀不再蕙幄消紅見少楹序註松門掩黛敬芼芳蓀爾雅芼搴也郭璞曰拔取萊也楚詞蓀橈兮蘭旌上林賦葴橙若蓀註蓀香草也公陳哀誄祭徐母顧太夫人文嗚乎哀哉天姥峰傾見徐母壽序皇媧石徙見憺園賦少女風微見徐母壽序夫人城圮見劉太母序鵑有血而都紅見孝威序竹無班而不紫見憺園賦春凋翠水之桃下註夜落丹丘之李真人王褒内傳五雲丹山上有𤣥雲李食之得仙盆翻玉女見劉太母序千尋之箭筈何存華山記箭筈峰上有穴纔見天攀緣自穴中而上井竭鮑姑見徐母序百丈之轆轤長已見靈岩碑註名義考轆轤井上圓轉木收綆者李涉詩深院梧桐夾金井上有轆轤青絲索五嶽則羣真失位見銀臺啟馳吊夸娥見徐母壽序三湘之衆水驚流見看奕賦騰悲嬃姊見雪持序於是荀龍摽躃薛鳯摧傷見逸齋序詩寤躃有摽淚浮碧落見觀槿序紀聞談唐陽冰見有碑篆十餘字愛其中碧落二字謂之碧落碑哭撼瑶閶見靈巖碑白馬溢延秋之里魏都賦西闢延秋東啟長春註俱端門外素車填通德之坊見祖德賦日邊則翟茀魚軒見葉母序髽而致祭見貞女序天上則朱牆碧翣見瑞木賦賻以行喪見壽徐序七日歌虞見瑞木賦文士鏗鏘之製千秋誄德玉臺新咏序非無誄徳之詞元公焜燿之章然而頌美終賒揚徽易賸賦嬴芊者見翼王序僅許其門第之華誇尹姞者詩祇數其遭逢之盛雖復穹碑槩日高蟠贔屭之文見萬栁啟註左思呉都賦巨靈贔屭註大龜蟕蠵之屬好負重今石碑龜趺象其形縱令健筆凌雲杜詩健筆凌鸚鵡凌雲見浙西詞序麗燦蛟龍之詠難形寸草之心莫罄慈萱之行見憺園賦惟太母之令善在代匱而彌彰見潘母啟伊蚤齡之處約覘裕後之方將若乃時甫遭屯家方多難鳳既摧頺雛猶爛熳嵗無春而匪秋時有宵而曷旦鬼謀孟母之鄰見葉母序人笑梁家之案見貞女序時則授經膝下課史牀前何妨雌伏不受䕫憐世説後漢趙温字子柔為京兆郡丞嘆曰丈夫當雄飛安能雌伏遂棄官去莊子秋水篇䕫憐蚿蚿憐蛇蛇憐風風憐日目憐心山海經䕫無角一足而行蚿百足蟲註以一足憐百足也豈有神方隨羿妃而入月見琴怨序非無微志效漆室以憂天漆室見觀槿序列子杞國有人憂天地崩墜者因往曉之曰天積氣耳柰何憂崩墜乎是以金方處礦杜詩金璞無留礦珠已潛淵莊子天地篇藏金于山藏珠于淵荻既書殘見劉太母序化作行行玉樹見祖德賦註薦經剉盡見徐母序變成院院金蓮唐紀令狐綯字子直呉興刺史白敏中薦之綯承㫖夜對禁中上命以金蓮炬送歸累官同平章訝天心之竟爾稔人事之宜然抑太母之艱貞在履亨而不忒緬盛德之持盈詎殊榮之偶獲至乃錢皆萬選唐書張鷟字文成號青錢萬選以文章瑞朝廷為學士萼必連枝見憺園賦陋競爽之郊祁參三駕兩哂齊馳之軾轍蓮耦為竒見徐母序再續元燈掇名省之巍科羣推快偦見徐母序三喧臚唱奪曲江之上第定屬佳兒唐書貞元中羅玠及第開宴曲江池後遂為故事相如賦臨曲江之隑洲註在杜陵西漢武帝造斯時也看銅街之對舞宫袍即達者將母色喜見繡陌之交縈綵仗縱高人未免情移而太夫人則談笑無驚神明自若熏成蓮座皈晩唄以生香見靈岩碑織得花機逐春梭而不落庾信謝賚白羅啟鳯不去而恒飛花雖寒而不落貴能思儉䱹雖㫖而常封見李母序安不忘勞綿自温而每却南北史朱百年貧傷母逝後甘飢寒嘗就宿友人覆以綿康醒曰綿定竒温卒却之一座盡貞觀將相屏間識彼豪英唐書列女傳王珪微時母盧氏嘗云子必貴但未見汝與遊者珪一日引房𤣥齡杜如晦過之母曰汝貴無疑半堂皆濂洛生徒見施公誄帳後資其酬酢見劉太母序勿以吾為致念見潘母啟房杜何人唐房杜相謨房梁公𤣥齡字喬臨淄人杜蔡公如晦字克明杜陵人後俱為相誰言善不可為富歐宜學唐名臣紀有富弼歐陽修是則白麟遜瑞見醴泉頌赤雁非禎見梧月序既嘉祥之洊集將純嘏其駢臻何圖日在禺中淮南子日臻于衡陽是謂禺中對于昆吾是謂正中遽返瑶池之駕見孟太母啟陽生嶰谷律歴志黄帝使伶倫取竹于嶰谷遄為元圃之征見任邱啟閭里鮮舂人之相見憺園賦街衢多夜哭之聲禮嗟乎禮備榮哀論語名標圖畫見王母辭知神理之彌新世説戴公見林法師墓曰德音未逺而拱木已積冀神理綿綿不與氣運俱盡耳寧有生之怛化見施公誄然而某等纒悲奚極雀未酬恩見素伯序蛇難報德見鷹垂序洛陽金盡蘇秦傳黄金百鎰盡恒分壽母之釵鐺見徐母序范叔袍寒見代友啟屢費太君之刀尺張衡賦秉刀持尺郭泰機詩衣工秉刀尺感實切於生平遇難忘夫疇昔今年春少桑枯滿路之花商書太戊時五日而祥桑枯死昨嵗寒多雪縞千山之色藉椒醑之清芬見九日序佇靈旗於彷彿見掌亭誄附注西王母傳王母所居左帶瑶池右環翠水益都馮相國壽詩跋粤以徒維敦牂之嵗天皇紀天皇氏制十干十二支之名十干内已名屠維十二支内午為敦牂此疑誤月在元枵左傳梓慎曰宋鄭其飢乎嵗在星紀而淫于𤣥枵註𤣥枵在虚危之次潘岳西征賦嵗次𤣥枵註壬子也日纒北陸見澹菴序益都馮夫子青州志益都縣漢武封淄川王子胡為益都侯故名以三台之上佐見賀徐序躋七􅐆之遐齡時則縹纓飛組之士羣集國門見九日序懐蛟夢鳥之賔咸依闕下懐蛟見祖德賦夢鳥見璿璣賦莫不藉鉛槧以攄忱見尺牘序託箋繒而寫志霞蒸綺爛筆欲摩天見天章序註玉戛金舂聲俱擲地見鷹垂序其門下士陳玉璂彚而獻之弆以一函見尺牘序註區為四頁作者凡若干人計詩凡若干首縚並朱繩見玉巖序裝俱玉軸見三芝序琉璃滿篋見園次序還熏荳蔲之香見海棠賦菡蓞盈箱仍襲葡萄之錦見三芝序傳之輦下播在藝林亦曰盛哉猗歟偉矣在昔槐㕔重相夢溪筆談學士院第三㕔閤子當前有一巨槐素號槐㕔舊傳居此間多至入相鶴禁元僚見澹菴序西京則爵埒蕭曹見壽徐序註北宋則名齊韓富韓富三相謨韓忠獻公琦字稚圭相州人富文忠公弼字彦國河南人慶歴中軍中稱韓范治平中相業稱韓富云當其齒届期頥年踰艾耋禮兩宫祝哽禮賜几杖以入朝卓茂傳光武詔以茂為太傅賜几杖車馬後漢書包咸字子良光武時入授太子論語每進見錫以几杖按李充字太遜延平中徴為博士後年八十以為國三老賜以几杖五等稱觥班臣鄰而陪位周禮清文燦爛樂奏三終麗製鏗鏘音調六佾樂記九如頌嘏詩無非殿上之金張見滕王賦五福陳疇書大抵天家之岐薛唐紀睿宗景龍三年岐王隆範為左衛率羽林大將軍薛王隆業為右衛率薛逢詩雲外笙歌岐薛醉至於援据喜祥鋪張官閥見壽季序註彭籛斟雉未必皆真天問彭鏗斟雉帝何享壽命永多夫何長註彭祖好和滋味進雉羮于帝帝饗之而錫以壽考至八百嵗玉女投驍何常盡實見昭華序頌揚典故不過六朝綺麗之詞役使虚無要皆五利浮夸之術漢武紀欒大言仙人可致拜五利將軍尚公主登西洛王侯之第便言碧柰成林見彭大翁啟過東都將相之家遂説青毛降節見任邱啟差無事蹟略助談諧雖昔説之所曾聞亦達士之所不尚今我公之初度也芝蘭異氣盡欲揚芬笙磬殊音咸思發響三明七穆既歌風緝雅而來見園次序一介單門亦躡屩擔簦而至見季壽序甚者齊秦烈士汾晉畸人夙標耿介不隨魏勃為掃門見壽徐序素秉幽貞并乏襧衡之滅刺見園次序亦復踴躍歸仁激昻慕義欣逢降嶽詩操敝帚而思前見園次序幸值懸弧見壽閻序踵高甍而恐後見玉巖序孤竹二君亦頌大年於釣渭見孟太母序商芝四叟見映碧啟還歌眉壽於封留漢紀高祖欲易太子張良請四皓以為客按良封留侯溯龍編鳥篆而後龍編見半繭賦鳥篆見銀臺啟固曠百世以難儔暨崦嵫濛汜之鄉天問出于暘谷次于䝉汜淮南子日入崦嵫經細柳入虞泉之汜曙于䝉谷之浦垂景在樹端謂之桑榆亦渺八紘而僅見見璿璣賦若乃時有指歸文多倫脊詩堦前獻賦感萬間庇士之殷懐杜詩安得廣厦千萬間大庇天下寒士俱懽顔筵上歌詩述三握求賢之至意史記周公世家周公戒伯禽曰我一沐三握髮一飯三吐哺起以待士挽其在位願黄扉紫禁以長歡見佳山序請必無歸縱碧水丹山而奚慕見銀臺啟賡颺莫罄更及於丈人屋上之烏六韜武王登夏臺以臨殷民周公旦曰愛其人及屋上烏憎其人憎其儲胥愛戴何窮兼詠夫劉尹當年之樹見健松記不學青牛關上謹侈諛詞見天篆序非如朱鳥牕前徒誇摭説見三芝序崧以菲才獲承盛事鐘鳴谷應見詩選啟知感召所從來草偃風行論語識吟謡之有自恭題數語敢為衆作之前驅敬附一言用託羣公之末簡然而遊晝錦之堂見逸齋序琳瑯觸目九歌璆鏘嗚兮琳瑯世説有人詣王太尉遇安豐大將軍丞相在座往别屋見季􅉙平子還語人曰今日之行觸目皆見琳瑯珠玉赴耆英之社見映碧啟巻軸連雲見懸圃序長箋短幅收之此帙而還贏妙染高文概以斯編而未備人思借錄如披河間之碑晉書張衡為河間相四年卒崔瑗為作碑文按張衡相河間有前後碑庾信馬射賦階無玉璧既異河間之碑客盡傳觀似玩秦庭之璧見貞女序儻緘篋底蠧魚食此而長生雜錄璧魚入經函中食神仙字則身有五色人吞之可致神仙設在船中蛟龍守之而不去見玉巖序跋余淡心所藏詩巻此端毅公乙巳長安所贈廣霞先生詩册也公也百僚模楷見祖德賦四海君宗詩猥於烏帽之儔補註彌結青松之契見賀徐序縱天長海濶而魚訊恒通見尺牘序值肉奮絲飛見觀槿序而鸞吟間作見琴怨序文無加㸃筆不能休見少楹序註每當三爵之油油禮便覺萬言之纚纚見黄門序發狂言而驚座見樂府序陳遵傳時列侯有與遵同姓字者每至門座中震動號曰陳驚座書㫁陳遵每一書一座皆驚杜牧詩忽發狂言驚四座盡訝神來見藝圃序押硬句以盤空見佳山序何愁腕脱見藝圃序此則當時驛裏見憺園賦未獲擬其彫華文舉筵前見九日序無以方斯敏妙者也僕在京華亦霑歡讌西堂剪燭温州府志府内有西堂即謝靈運思詩夢弟惠連得池塘生春草之句處宋玉九辨蟋蟀鳴此西堂頗多知已之言見尺牘序北渚揚舲北渚見藝圃序揚舲見半繭賦大有消魂之賦見無沗序情深積刼感歴窮塵見琴怨序曾昔夢之幾何竟哲人之不作流連烟月惻愴關河何意先生視余斯巻嗟乎賈逵碑上字字生金王隱晉書永嘉初陳國項縣賈逵石碑之中生金人鑿取賣賣已復生此江東之瑞按輿志繁昌縣授石碑亦生金表送上庾信集中篇篇是玉補註敬告典籖幸加藏弆見尺牘序勿使蛛縈蠧蝕負荆軻一片之心見智修序李賀咏劍詩直是荆軻一片心就令紙敝墨渝見樂府補序存鮑叔千秋之誼見園次序陳檢討四六巻二十
