body:
  text: 陳檢討四六卷十九翰林院檢討陳維嵩撰誄哀辭楊俊三誄玉樹徂春金刀掩夜晉書庾亮卒何充嘆曰埋玉樹于土中使人情何能己巳南史王規字威明尚書騫之子幼稱孝童年十二通五經為昭明太子所禮亡後簡文與湘東王繹書曰威明實陵人也一爾過隙永歸長夜金刀掩鋩長淮絶涸淑問猶宣惠心永謝嗚乎哀哉君才調英竒篇章卓絶言泉流吻思風扇臆見靈巖碑剖玄晰奧纎若蟬翼鋪文雕采縟以龍梭見半繭賦南朝人士眷爾清新東第衣冠嗟其綿麗加以德性幽婉標舉簡令神鋒內斂道器外張雋不纍理淡不却物故能靜表溫純動形潤栗弱年繡虎雅擅綺才見祖德賦髫齡蠟鳳頓饒妍慮見雪持序雄辨驚其父客見素伯序注高名厠於時賢譽重南金價侔東箭晉書薛兼入洛張華見而竒之曰此南金也虞翻以所注易示孔融融曰乃知東南之美者非獨竹箭也晉書贊顧衆虞潭並起兵討峻贊曰顧實南金虞惟東箭洎乎運丁百六世遭陽九王湜大乙肘後備檢凡四百五十六年而一陽九二百八十八年而一百六陽九竒數也乃陽數之窮百六偶數地乃陰數之窮皆所為厄會也漢書音義元之中有九厄陽厄五陰厄四陽為旱陰為水運初入元百六嵗有陽厄故曰百六之會漢食貨志易無妄曰一元之中四千六百乙十七嵗各以數至陽厄故云百六按四千五百嵗為一元吳都賦世濟陽九魏都賦運距陽九令府君維斗先生忠搆身危義積家禍石城哀卞石城見皇士序哀卞詳掌亭注白下悲袁金陵志府西北有白下城古迹唐立縣于此以白石壘之故名悲袁見琅霞序君時竄迹倉皇遘會孤露見集生序程嬰轉徙私匿其兒見潘母啓李燮飢寒但依其姊漢書李固下獄死有子名燮燮姊文姬謀預匿之告父門生王成曰李氏存滅其在君矣並見賀周序吳門乞食見雪持序合浦賣珠見素伯序晨繁絃以引悽昏促管以會泣令伯陳情之作極此纒綿見集生序右軍誓墓之文彌為悲惋見黃門序無何軍書少弭戎馬暫寧親串稍通音問間嗣會丹輪于城郭時有唱酬見田太翁啓修輕苔於几闥不無贈答見尺牘序注時則金聲逾振玉色罕渝朱齡石百函并發見壽徐序劉穆之五官互用宋書劉穆之內總朝政外供軍旅目覽詞訟手答箋書耳行聽受口并應酬悉皆贍舉巧心所濬酌而不竭頭陀寺碑遙源濬波酌而不竭惠匠所琢剔而益麗樵蘇不爨終焉而已見潘母啓將謂務疏道親任彥升薦士表室邇人曠物疏道親身阻意泰見閨秀序保幽貞於物表棲軒冕於塵區永為藜藿之夫見索餅啓甘作丘園之秀見彭太翁啓而人惡其潔天墜其芳猥以虎豹之姿竟際龍蛇之嵗見翼王序情深撤瑟慟擬登牀禮士無故不撤琴瑟世説顧彥先喪家人常以琴置靈牀上張季鷹往哭之不勝其慟遂徑上牀鼓琴作數曲竟因又大慟晉書王子猷子敬俱病篤而子敬先亡子猷不哭知子敬素好琴便徑入坐靈牀上取子敬琴彈弦既不調擲地云人琴俱亡因慟絶良久春秋二十有三襧衡臨殁之年尚虛其一見雪持序終軍奄逝之紀祗過其三見黃門序夫人乃松陵吳兹受先生淑女而吾友𢎞人聞夏漢槎賢妹也劉氏祭夫手調薑橘見閨秀序劉氏祭夫徐敬業文敢遵先好手調薑橘素俎空乾奠觴徒溢徐姬答外情綢鏡叉見丁香賦及尺牘序嗚乎哀哉爰為誄曰兩儀肇始皇降分區乾坤盤礴氣數昭蘇靈鍾牛斗天文志斗牛禹貢揚州之域寶産勾吳吳志勾吳太伯始所居地頑艷靡均清濁鮮符猗歟是人洵邦之彥詩秀外惠中盤谷序秀外而惠中曰溫曰善學圃增泓文峰日倩見懸圃序宅心簡棲措躬澄練既稱第一亦曰無雙藻嫓陸海麗甚潘江見園次序文明映物經緯華邦清瑟聿拊洪鐘既樅命之不猶國家多難袁有愍孫顧惟元歎宋書袁粲太尉淑兄子也父濯早卒祖母哀其幼孤名之曰愍孫嘗慕荀奉倩改名為粲字景倩吳志顧雍字元嘆從蔡雍學琴蔡異之曰以吾名與卿顧遂名雍為人寡言領尚書令封侯而家人不知孫權嘗曰顧侯在坐令人不樂申志悲涼遣言哀斷徐陵與李那書發言哀斷雜作豫厠見舜民序浮沈嵇鍛見半繭賦術衰齒盛道蹇業隆雕鎪羣象染綴化工明詩習禮誦雅歌風魏雀辭金見銅雀賦漢盤泣銅見滕王賦豈其王頍補注不如沈徑晉書將軍沈徑以父充死于逆亂志欲立功雪恥后陳祐以燕兵逼洛陽糧絶無援度不能守乃以五百人付徑守之徑喜曰吾志欲致命今得之矣洛陽陷徑被執神氣自若奈何伊人不永其命大火流暉詩玉衡移柄天文志玉衡斗柄星名巷軫絶絃見園次序注衢凝分鏡見翼王序南皮曩侣魏志吳質南皮人魏文帝築燕友臺欵質後遺書曰南皮之遊不可忘也梁武帝詩總轡遊南皮沈約詩論采南皮之高韻按河間府有南皮縣北府名流見尺牘序今悲雨散昔溯風流揚雄美新霧集雨散鸚鵡賦何今日以雨散王粲詩風流雲散一别如雨九京可作萬䙫難求國語趙文子與叔向遊于九京曰死者如可作也吾誰與歸注九京晉墓地一作九原青松郭外見祖德賦紅粉樓頭見尺牘序宣城文學施公誄惟康熙十有八年春王正月四日文學砥園施公卒於宣城里第春秋七十有八嗚乎哀哉大道淪胥微言放失十室之邑衆喙爭鳴莊子秋水篇無所開吾喙一閧之中百家競作法言一閧之市必立之平韓文諸子百家俗儒奉夸毗為指歸詩曲士緣辭章為傳會轉相剽竊祗益波靡推厥所由本之先撥詩其要教不基之門內則葛藟之誼靡敦學不本之躬行乃鳲鳩之仁未渥也詩施公生經文煨燼之餘當人心陷溺之日而能汜濩醇風見瑞木賦彌縫絶業左傳彌縫其缺相如難蜀父老繼周氏之絶業襮之以藝彪之以文揚子君子言則成文動則成德以其弸中而彪外也張華詩體之以質彪之以文韓文道弸于中而襮之以藝源始門閭達於鄉孰慥慥乎抑亦光輝篤實之君子矣天不憗遺左傳孔丘卒公誄之曰旻天不弔不憗遺一老注憗且也哲人其逝見毛太母啓時則公之猶子愚山先生受官輦下僦舍都亭悵噩夢之宵徴見竹逸序痛訃音之旦至遂搏膺而相告用抆血以為言九章孤子吟而抆淚恨賦抆血相視蓋分雖叔父而誼篤所生服止期年而情隆自出馬伏波之誡兄子造就居多見壽季序第五倫之鞠弟姪恩勤不少通鑑或問第五倫有私乎曰兄子病一夜十起而安寢子有病雖不省視通夕不寐謂無私乎聆愚山先生所敘述則公之崖略可知矣嵩也景至德之難名緬遺徽之未沫揄揚莫罄敢搖筆而成郭泰之碑詳掌亭序洄溯靡從爰綴文而製展禽之諡見合肥書列女傳柳下惠死其妻誄之略曰夫子之不伐兮夫子之不竭兮夫子之諡宜為惠兮門人從之以為誄誄曰厥初生民萬彚藝藝權輿遂古見天篆序天問遂古之初誰傳道之注遂往也原始皇墳剛柔攸判仁羿爰分見天篆序孔學惟􅔶軻乃闢荀史記世家孔子適周問禮于老子揚雄法言古者楊墨塞路孟子辭而闢之廓如也韓文孟子醇乎醇者也荀與楊大醇而小疵嬴燔典籍見樂府補序羣言抵牾漢工箋疏宋精訓詁異𣲖同臻殊塗畢赴宰我堪雕顔回可鑄見佳山序猗歟濂洛發源泗洙宋紀周茂叔程灝時稱濓洛記曾子謂子夏曰吾與汝事夫子于洙泗之間道求實踐爻繫中孚易而彼末流相沿詭趨旴江龍溪淪玄襲虛理學録旴江羅汝芳號近溪又王畿師事王陽明有龍溪集皆主良知之學薪盡思傳文衰欲起莊子養生主指窮于為薪火傳也不知其盡也注薪有盡而所傳之火不盡韓文公廟碑文起八代之衰姑山峨峨句溪瀰瀰補注疇紹前賢曰中名子主敬存誠致知窮理二子競爽詳掌亭誄注述明砥園棠華並鞾箎唱交宣詩思探象罔見璿璣賦悟絶言詮家惟曾史莊子駢拇篇雖通如曾史非吾所謂臧也注謂曾子史魚人企淵騫論語嗚乎述明不幸蚤世僝彼藐孤見翼王序疇依疇字疇為含哺見徴萬栁啓實維叔氏茹我以荼詩沐兒以淚遺雛漸長奮翮天衢為國名臣為時大儒臯比泰岱宋書張載嘗坐虎皮講易從遊甚衆朱熹贊曰勇徹臯比一變至道注即虎皮也觀察鄱湖觀察見李母啓鄱陽見滕王賦服官講學與古為徒公喜而言是兒可教石奮家規延之庭誥見歸田序詩詠素絲爾惟則效詩姪官於外公偃林泉敬宗睦族立孰置田欒公建社見祖德賦原氏名阡漢書原陟自以先人墳墓儉約非孝也乃大治冡舍初武帝時京兆曹氏葬茂陵民謂其道為京兆阡陟慕之乃買地開道立署曰南陵阡人不肯從祗謂之原氏阡朝曦夕魄幌雨籬煙趙禮推肥薛包讓産漢書趙禮值凶嵗為餓賊所得兄孝聞之即詣賊曰禮瘦不如孝肥賊驚並放還顯宗聞其行拜諫議大夫薛包傳包字孟嘗後母憎包逐出包悲啼感親因還之及諸弟求析産包悉取朽敗者後弟産盡包復與之建武中徴拜侍中每逢家諱恆虔祀典肴核維藇豆邊有踐詩老則兒啼髙士傳老萊子七十著斑衣取水上堂跌仆臥地為小兒啼以悅母祭焉必泣見少楹序鄰有死喪賻之禭之見壽徐序注族多寠乏衣之食之有窮者鰥若敖餒而見祖德賦丐錢營婚資其帨褵劉君伯陽公之老友敗屋陳編苔纒蝸繡殁于公殯袝之塋右三尺殘碑大鐫誰某敦仁處義履信懷貞遇人急難赴義如爭其或負公􅀈篋攘籝莊子􅀈篋篇將為􅀈篋探囊發匱之盜而為守備注􅀈開也探手取之也搖首置之流觀太清詳仲衡文敬亭翠抹琴溪雪濺宣城郡圖經敬亭山宣城縣北十里輿志涇縣溪側有石臺相傳琴高控鯉上升處卯嵗輕帆與公一見漉酒邀賔剪燈張宴語必纒綿詩皆雅健謂公淳朴定享期頥見壽閻序何圖奄謝遽至于斯公之猶子適宦京師去官度尚恨不同時補注後漢書度尚字博平為上虞長後為荆州刺史平長沙賊封侯按度尚為八厨之一暏墅棋收見半繭賦竹林觴罷見􅋯菴序歎鳳嗟麟拾遺記孔子相魯有神鳳遊集至哀公之末不復來翔子曰鳯鳥不至可謂悲矣嗟麟見素伯序傾河坼華世説顧長康哭桓宣武聲如震雷破山泪如傾河注海我觀今古總悠悠者衆庶馮生庸愚怛化莊子大宗師子來有病喘喘然將死其妻子環而泣之子犂往問之曰叱避無怛化注怛驚也謂無以哭泣驚將化之人而我識公學定神全列子醉者之墜于車也其神全也彭殤一致生死齊觀莊子南郭子綦曰莫壽于殤子而彭祖為天中明祠內蕉碧楓丹見鞠存啓繼志纘緒復稱二難漢書陳元方子長文與季方子孝先爭論父功德于太丘太丘曰元方難其兄季方難其弟我獨銜悲百身難贖詩國鮮典型邦無耆宿顔愴淵明潘哀汧督何法盛晉中興書顔延之為始安郡道經尋陽常飲淵明自晨達昏及淵明卒延之為誄極其思致臧榮緒晉書馬敦為汧督立功孤城為州司所枉死于囹圄潘嶽誄之敬撰蕪辭冀揚芳躅嘉定侯掌亭先生誄某年某月某日嘉定掌亭侯先生卒嗚乎哀哉慨自陳寶雞鳴翟泉鵝出見天篆序君子則將成猿鶴見銀臺啓賢人則遂值龍蛇見翼王序練川百里地志練川屬嘉定昔人稱練川楮陸之平既三户以無成見尺牘序上谷一門見翼王序旋五宗之同盡漢書徐自為曰古有三族而王溫舒罪至同時而五族乎陳琳檄所愛光五宗所惡滅三族注宗亦族也褒融并日見松陵序舉畢命於灰釘見賀周序盱眕同時並捐生於斧鑕晉成帝紀卞壼督軍討蘇峻苦戰而死二子眕盱隨之亦赴敵死其母撫尸而哭曰父為忠臣子為孝子夫何恨乎國䇿樂毅報燕王書曰恐抵斧鑕之罪雖吕錡射月事原無補於存亡左傳晉楚遇于鄢陵晉吕錡夢射月中之退入于泥占之曰姬姓日也異姓月也必楚王也射而中之退入于泥亦必死矣而夸父移山誼則總關於家國見徐母序亦曰瘁哉於乎悕矣先生則佹也猶存慬而獲免晉家趙武幾同置袴之危見禹平序楚國伍胥頻蹈覆漿之難吳越春秋伍員渡江漁父為持麥飯鮑魚羮盎漿餉之子胥誡曰掩子之盎漿勿令其露漁父諾胥行數步漁者自沈于江並見昭華序亡命則秦關趙厠之內蹤迹偏多亡命見素伯序秦關見翼王序趙厠見舜民序謀身則販脂織薄之餘生涯絶少販脂見合肥書史記周勃以織薄為生注薄簾也南宋書沈麟士居貧織簾號織簾先生説文木曰林草曰薄將軍臺上序舊事以悲來薊州志將軍臺管四十關塞國士橋邊逢故人而泣下國䇿趙襄子將出豫讓伏所過橋下襄子面數之豫讓曰智伯國士遇臣臣故國士報之輿志豫讓橋在平陽府門前客到盡傳元節之難歸見翼王序注海上人來或曰邠卿之尚在見祖德賦靡能有定亦又何言既而雨不終朝語林驟雨不終朝雪還見晛值新朝之當璧每示含宏遇聖主之乘乾慣存寬厚名除北寺終全李杜之家門見禹平序運啓南朝見楚鴻序免錮袁劉之子弟魏志袁紹愛少子尚後談熙尚三子舉兵相攻而亡劉表愛少子琮後長子琦與琮舉兵遂傾覆弱齡去國壯嵗還鄉荒蕪緑野之莊見楚鴻序憔悴黃冠之約見觀槿序乃以藐爾之王頍見俊三誄竟作裒然之周黨見映碧啓燕仍巢於梁上見玉巖序三月樓臺見天篆序注鶴乍返於人間千年城郭見存菴序時則赤縣升平古今通論崑崙東南方五千里謂之神州赤縣黃圖豐暇見萬栁啓庶邦卿士非無三明七穆之儔見園次序列國知交屬有贈䇿班荆之事贈䇿見考功序班荆見禹平序西園則徐劉應阮見滕王賦南國則顧陸朱張見尺牘序蒞冠裳之會子産有辭左傳鄭子産壞晉館垣叔向曰子産有辭諸侯賴之尋玉帛之盟荀罃是主左傳知武子謂獻子曰非禮何以主盟姑盟而退注知武子即荀罃一稱知罃舟船成市車騎如流見壽徐序注先生則夙號耆英見映碧序羣推祭酒見儲太翁啓文章華貴激昻四座之間見禹平序冠劍雍容籠蓋萬夫之上見懸圃序騁其逸氣譜私史於金陀見樂序補序奮厥雄詞薈高文於玉册聲齊琬琰見尺牘序言郁椒蘭孫卿子好我芬椒蘭漢五刑志鄰國望我芬若椒蘭劉峻絶交論言鬱郁于蘭茝然而酒不忘憂見智修序花難蠲忿見看奕賦漸離擊築初非行樂之資見智修序子野彈箏詎是為歡之用晉書王國寶搆謝太傅于孝武太傅患之一日帝召桓子野桓請以箏歌便歌曹子建怨詩曰為君既不易為臣良獨難忠信事不顯乃有見疑患聲節慷慨太傅泣下捋其鬚曰使君於此處不凡帝有慙色按子野名伊念纍世原子孝臣忠之裔自有生平况此身自家亡國破而還何心人世彼交稱袁灌不過志士之無聊見半繭賦即兒命融修或在才人而有託禰衡别傳衡與孔融楊修善常曰大兒孔文舉小兒楊德祖餘子碌碌莫足數高臺曲沼半屬前塵見雪持序醇酒婦人無非末路見舜民序誠恐海不能乾石偏易爛見庭表序誰云善謔陵跖無開口之期莊子盜跖篇孔子説跖跖怒曰人生上壽百嵗中壽八十下壽六十除病瘐死喪憂患其中開口而笑者一月之間不過四五日而已何可無年籛叟乏繫腰之術見萬栁啓於是羽服朝元瑶篸禮醮王子年拾遺記周昭王晝而假寐夢白雲中一人衣服皆羽毛王求上仙之術因名羽人老子內傳受元君神圖寶章變化之方及還丹伏火水永液金之術雍録天寶七載玄元皇帝見于朝元閣瑶篸見滕王賦花深春晚叩碧磬以琅琅月悄秋清吹紫簫而寂寂瑶姬圃內見徐母序惟栽益壽之花本草甘菊一名益壽花見翼王序注玉女窗間見貞女序祗種掃塵之竹見合肥書謂此間之甚樂晉書帝問後主曰頗思蜀否曰此間樂不思蜀也嗟來日其大難見納姬序何圖金竈難成見得仲序玉棺蚤下風俗通王喬令葉縣天下一玉棺于廳事前喬曰天帝召吾沐浴寢其中蓋便自覆之宿葬城東土自城墳八公一去倚桂畔以倣徨見滕王賦十叟不來望橘中而惆悵見徐母序樵人看博見看奕賦驚舟壑以潛移莊子大宗師夫藏舟于壑藏山于澤謂之固矣然而夜半有力者負之而走昧者不知也仙子逢棊訝鴻泥之歘滅東坡詩人生到處知何事應似飛鴻踏雪泥遂使青松鬱鬱長遮樗里之墳史記樗里子傳樗里子名疾秦惠王之弟也時號智囊將卒葬于渭南章臺之東曰後百嵗當有天子之宫夾我墓漢興長樂宫在其東未央宫在其西武庫正在其北白日悠悠不照滕公之室見瑞木賦怨何如乎悲可知矣每覽寰區私相歎詫極文人之九命慨遺恨以三端亦有寢類田蚡小踰臧紇史記武安傳武安侯田蚡貌寢生貴甚以孝景皇后之弟為相左傳臧紇救鄫侵邾敗于狐駘國人誦之曰朱儒朱儒使我敗于邾杜注臧紇短小故曰朱儒形容闒冗哀駘寧足喻其竒莊子德充符篇哀駘它衛人貌惡魯哀公召而觀之果以惡駭天下欲授以國政孔子曰是必才全而德不形者也狀貌􅂒􅂒見索餅啓江神或自嫌其陋見懸圃序君則姿神瓌麗儀態嵬峩長身玉立灼如天半之朱霞徑翮凌秋矯若雲中之白鵠世説劉訏與從兄歊各覆高操族祖孝標曰訏超超越俗如天半朱霞歊矯矯出塵如雲中白鶴魏書公孫度目邴原為雲中白鶴非燕雀之網所能羅也彼兮何幸偏工不死之方此也何寃未識長生之訣斯其未喻一也又有學昧蹲鴟顔氏學訓蜀都賦注蹲鴟為芋江南有一權貴誤以為羊字人饋羊肉答書云饋蹲鴟青棠集張九齡送芋與蕭炅書稱蹲鴟炅不學答曰損惠芋拜嘉惟蹲鴟未至耳按芋頭類鴟鳥之居蹲坐也居也故貨殖傳名之人􅏺疥駱補注王家敬則但曉拍張南史王敬則臨淮射陽人好刀劍元徽初歸誠高帝侍宴華林使各效伎敬則脫朝服奮臂拍張曰臣以拍張得三公不可忘拍張高貴鄉公不知反語補注魏志高貴鄉公諱髦文帝孫初封郯縣高貴鄉公羣臣迎之即帝位後攻司馬昭賈充令成濟弒之賈充與朝士宴庾純曰高貴鄉公何在充慚怒此皆高軒繡戟高軒見合肥書繡戟見閨秀序秀齒龎眉漢書顔駟龎眉皓齒君則對成孔雀幼已霸於詞場見素伯序賦就柟榴壯益雄其筆陳見季青序三長互擅通鑑劉知幾曰史才須有三長才學識也直登班范之堂見庭表序五采相宣書竟奪庾徐之壘見園次序而乃王濛不祿見葉母序謝朏無年梁史謝朏字敬沖謝莊子幼聰慧十嵗能屬文初與何點受徵不至後朏一旦詣闕梁武帝以為司徒朏素憚煩不省職事早卒何來天上頻葬神仙見上注豈料冡中只埋賢達見俊三誄斯其未喻二也抑有惑焉尤其甚者清河獄吏乃聞安世之於湯史記酷吏傳張湯磔鼠文如老獄吏後為長安吏稍遷大中大夫後三長史陷之湯曰湯無尺寸功起刀筆吏陛下幸致為三公無以塞責遂自殺漢書湯子安世字孺少以父任為郎見園次序江表叛宗詎意沈充之有徑見俊三誄大抵狂騃之胄廣雅童昏曰胄間出佳兒見素伯序私疑回遹之家詩每邀庸福古諺庸庸多厚福君則三世清忠一門義烈闔戶受屠腸之酷見貞女序瓜蔓期功見潘母啓舉宗罹破卵之傷株連細弱並見潘母啓魏氏舂秋孔融見收二子方八嵗九嵗奕棋端坐不起左右曰而父見執二子曰安有巢覆而卵不破者哉遂俱見殺乃復鬼不憐才天寧悔禍左傳鄭莊公曰天其以禮悔禍于許風吹琪樹山海經崑崙之墟北有珠樹及玉樹琪樹琅玕樹不留若木之一枝見璿璣賦火烈崑岡書詎賸荆山之片玉見楚鴻序斯其未喻三也嗟乎向子期之鄰家笛聲斯在向秀思舊賦序余少與稽康吕安居止其後各以事見法經山陽舊廬于時鄰人有吹笛者發聲寥亮追思曩昔感音而嘆故作賦云稽叔夜之栁下煆迹猶存見半繭賦千春毅魄長依杜氏階前屈原九歌魂魄毅兮為鬼雄左傳晉獲杜回秦之力人也初魏武子妾無子武子疾謂顆曰必嫁之疾甚曰必以為殉及卒顆嫁之曰疾甚則亂吾從其治也及輔氏之役顆見老人結草以亢杜回杜回躓而顛故獲之夜夢老人曰爾用先人之治命余是以報三尺桓碑見醴泉頌永勒羅池廟後見鞠存啓爰為斯誄以告哀詞詞曰余方羈貫見雪持序文籍是搜或示一編詞條最遒作者誰歟疁城六侯見翼王序英裁綺合壯采葩流見天篆序余本清狂幼而逋峭腦滿腸肥見懸圃序翩然城鷂手把是編獨身而跳扣角狂謳見存菴序擊壺大呌見紫玄序日中則昃書月滿而虧禮惜彼文中蘭凋蕙萎見翼王序黃巾載亂見健松記青蓋旋飛吳志孫皓使尚廣筮并天下曰吉丙子嵗青蓋入洛陽及亡嵗實在丙子靈旗幾道白骨同歸楚詞靈旗兮電騖甘泉賦樹靈旗世説潘嶽金谷園詩有云白首同所歸後孫秀既恨崇不與緑珠又憾嶽不遇之以禮收崇同日收嶽乃成其讖煢煢智含又弱一箇左傳齊公孫竈卒晏子曰子旗不免殆哉二惠競爽猶可又弱一箇焉薑其危哉注二惠子尾子雅也子雅即公孫竈生子子旗秬園掌亭相逢飯顆李詩飯顆山頭逢杜甫並泣牛衣見天章序雙悲馬磨見懸圃序琴已罷彈見俊三誄篪還寡和詩掌亭才健颯若犀蛟與余握手壬癸之交僧廬酒舫月墅煙郊風荷百頃露竹千梢我讀我書葑溪之涘吳志蘇州十三門葑門其一也溪有葑溪同舍三人維侯與計計子其龍視人若蟻所不如吾唾猶泥滓李陵與蘇武書言為瑕穢動增泥滓説文滓澱也謿詼坌涌孔融薦禰衡表溢氣坌涌口語瀾翻見楚鴻序而君屹若更復凝然朗如列屋世説朗朗在白屋間嶷如斷山當時介我狂狷之間鄧尉山頭見靈巖碑白公堤上輿志白樂天築堤于虎邱山下後名白公堤蘋葉初齊招魂菉蘋齊葉兮白芷生寒苕華大放詩君㺯輕舠時搖細浪畫縠半奩緑蓑一桁晚而聞道老筆紛披絳園作賦石鼎聨詩白帖佛寺為紺園昌黎詩有石鼎聨詩題昌黎序衡山道士軒轅彌明自衡山來指爐中石鼎謂侯喜曰子能賦此乎文鐫碑版句勒盤􅓢風雷凌厲鱗爪之而見觀槿序所極難忘小人失母馬鬛雖封見孟太母啓雞碑曷有見無忝序君惠大文畀之不朽已矣何言悲哉竟負自君殁後萍梗飛翻一悲甫草再慟秬園追維疇曩流想生存雨零宿草雪擁陳根見映碧啓君之哲嗣家駒國寶見壽季序祖德是遵先疇是保葺君年譜編君文稿命余排次屬余搜討余才已盡君誼難酬空銘郭泰徒誄黔婁續漢書郭泰卒蔡雍為作碑曰吾為人作銘未嘗不有慙容惟有道碑頌無愧耳列女儔魯黔婁死曾子曰先生之死何以為諡其妻曰以康為諡曾子曰先生何樂于此而諡為康乎其妻曰先生不戚戚于貧賤不欣欣于富貴其諡為康不亦宜乎並見井叔序山陽舊雨見篇上河渚前遊昔陪歡宴今斷風流嗚乎哀哉尤母曹孺人誄維康熙十有七年九月十九日尤母曹孺人卒於家春秋五十有八此吾友悔菴先生之淑儷而孝廉珍文學瑞之賢母也孝廉邸中聞訃既素鞞星奔麻衣遄返悔菴方金門待詔玉几求賢築館都亭授餐閣下屢申請急之祈未驗還鄉之夢援琴以哭見俊三誄悽踰巴峽之猿見懸圃序鼓缶而吟見井叔序愁甚衡陽之雁見素伯序時則燕齊魁壘之士彯華組者三千見九日序鄒魯文學之賔捧珠盤者十九見園次序聆斯哀曲咸致神傷况我良朋尤為心痗詩昔者三年未返還吟零雨之篇六日不詹尚謡采緑之什詩樓前送客界粉成痕陌上懷人結眉表色見良輔序何况瓊田大去十洲記祖洲有不死草生于瓊田張正見雪詩雲夢起瓊田碧海無歸見琴怨序廖家眢井見葉母序想竊藥以何年見琴怨序酈縣寒泉見琴怨序擬煎香而無術見劉太母序暫遊京雒便為鶴返之期見蓴菴序小别鄉園遽應牛眠之讖見孟太母啓良云已甚亦又何言此則染湘江之竹未能踰此酸辛見憺園賦彈蜀國之絃不足宣其悱惻者矣左思蜀都賦巴姬彈絃注成都雪氏善琢琴故曰蜀琴古樂府題有蜀國絃歌夫蕙叢早殞元微之所以悲來元微之墓志銘序公前夫人京兆韋氏無祿詳下注遺挂猶存潘安仁于焉泣下見井叔序此皆伉儷之恆情見牛叟序何况裙笄之令範可無揚扢用表幽貞嗟乎金閶城下遙連齊女之門吳志金閶亭在閶門外梁鴻墓所齊門者吳聘齊女女思齊而病乃起望齊門令女遊其上闔閭城一名閶門見靈巖碑石鏡山邊即是武擔之路見實菴序誄桓釐之行曾傳沛國諸生稱陶母之賢競説長沙人士見李母啓爰為斯製以志豫哀其辭曰余與悔菴門夾葑溪見掌亭誄花紅戶向栁緑簷齊俱邀戲馬見九日序並載聽鸝見憺園賦橋分鷁誤見祖德賦巷肖鶯迷時過君家約為文社雪霽窗融風狂燭灺倦或呼觴豪偏索炙隔帷食器每鏘中夜乃知吾友室有鴻妻見貞女序寧憂釡鑠見集生序詎誚粳肥漢書或問陳平何食而肥其嫂疾平曰食粳核爾貰來村釀乞得鄰醯拔叉詎惜銼薦誰疲見徐母序紞紞鼓聲漏踰三下君為余言婦真健者見劉太母序敏既踰班見歸田序慧偏鑠謝見琴怨序手擷蘋蘩詩躬親桑柘見潘母啓施襟結帨見韓倬啓習禮敦詩見劉太母啓猗與季女孌彼諸姬柔嘉維則淑慎其儀聲高璜瑀譽溢盤􅓢愈色婉容承顔堂上婦職攸勤女紅無曠鞠􅛏而前見璿璣賦鳴環以相見韓倬啓私朂青雲揚子解嘲當塗者升青雲頻褰絳帳見修褉序君言未竟余喜而呼何期淑女儷我鴻儒問訊他人斯寧有諸人言不爽君語非誣吳質長愁見淡菴序襧衡善罵見雪持序我友高才文場雄霸猿臂難封見素伯序及孟太母啓蛾眉不嫁見鴻客序及茹蕙序注樂府捉搦歌老女不嫁只生日對酒歡呶詩載號載呶注歡聲臨風悲吒晚紆尺組人喜君嗔噲寧堪伍見存菴序龍實難馴顔延年五君咏其咏稽康曰鸞翮有時鍛龍性誰能馴孺人笑歡一語聊陳不聞毛義捧檄娛親見潘母啓君顧孺人欣然道左月照城樓天低箭垜唐六典兵部試用一曰箭長垜天寶元年改長垜限以十箭白草煎霜紅旗掣火為窮塞主亦無不可補注北平數載見孟太母啓綦縞言歡詩其或尼君鐫其一官孺人含笑家本吳關非無樵笠亦有漁竿椎髻歸田見劉太母序耘瓜斸笋梅福雙仙見園次序龎公偕隱見壽閻序酒賣相如琴彈楊惲見看奕賦絃索宫詞見琅霞序琵琶院本輟耕録唐有傳竒宋有戲曲唱諢詞説金有院本雜劇院本一曰副末古謂之蒼鶻鶻能擊禽鳥君舞斑衣見憺園賦孺人六珈詩君悲窆繂見彭太翁啓亦絰而麻助君沐槨見憺園賦注從君挽車見壽閻序江通孝鯉見瑞木賦樹止慈鴉見憺園賦先是贈公為君析宅舍後一區水雲俱白詎用高甍底須列戟見閨秀序俾請于翁于斯偃息君聞是語起舞而旋能如是乎與汝偕焉見潘母啓編籬竹次抱甕花間層廊映水小艇尋煙往復循環盈虛依倚于門不大古無斯理見憺園賦未在其身必於其子果以卯秋佳兒鵲起見祖德賦非惟鵲起亦有鴻騫見商尹序拔茅連茹易爰應今年羣公薦士天子徴賢翹才千百見九日序君實褎然前漢書武帝賢良詔曰今子大夫褎然為舉首朕甚嘉之注盛服貌竹徑松門臨行搔首將我重來能無恙否孺人欵語分張詎久白月明明為君治酒西風葉落忽滿長安何來惡耗竟墮君前發函凄哽伸紙汍瀾見祖德賦身留北闕淚寄南天來嵗新春凌雲賦噪見實菴序洊受重封仍膺疊誥而我所悲禮宗是悼見葉母序杳杳黃壚見壽閻序注飛飛丹旐附注元微之本事詩紀妻韋氏字蕙叢韋逝為離思詩悼之王母張孺人哀辭孺人姓張氏家世由大同徙長安遂為長安人余友給事中王黃湄先生繼室也扶風城下夙傳織錦之鄉見璿璣賦京兆街中本是畫眉之里見少楹序父興官都司陰符半帙國䇿蘇秦得太公陰符之書玉帳傳來見鄴園啓遁甲一函見徴刻文啓霜弧射下見懸圃序因君城守粵西柳州故孺人從焉天吳紫鳳見謝園次啓山海經朝陽之谷神為天吳是為水伯蹁躚於明鏡湖邊栁州玳轂鈿車捉搦在羅池廟後列仙傳仙女杜蘭香詣張碩玳轂鈿車青牛飲食服玩皆備捉搦見楚鴻序羅池見鞠存啓鬱林紺石見葉母序注慣染修蛾見少楹序象郡黃柑恆熏纎手見李母啓既而盡室西旋途經鄢郢左傳注鄢郢楚地扁舟南下路次沱潛禹貢沱潛既道注二水江漢别流之在梁州者與荆州不同按此乃指荆州之水時則給事君居官安陸出宰江陵輿志安陸州古竟陵地明世廟時升為承天府所領潛江縣即漢江陵地宋曰潛江按荆州府唐曰江陵今所領縣首曰江陵又德安府有縣曰安陸曾逢别鶴之辰見琅霞序續有委禽之事見貞女序盈門嘉耦逮泮華年詩若乃天上張星見祖德賦應甘泉之圖畫漢武外傳李夫人少而早卒上思念不已圖畫其形于甘泉宫漢書金日磾母教誨兩子甚有法度病死詔圖畫于甘泉宫樓頭嬴女見藝圃序親灞岸之蠶桑見潘母啓仰事則堊廬髽髻毁以居喪見貞女序周禮注大喪疏賤者居堊室與倚廬相對俯育而靧雪丸熊勤能鞠子説文靧沫灑面也丸熊見潘母啓鳲鳩廣惠樛木流慈詩洵稱巨閥之禮宗見貞女序僉謂高門之令婦不幸蕣華蚤謝詩蟾彩難圓見鞠存啓瑶姬鮮益壽之方見納姬序玉女乏長生之術見天篆序遂使波衝東渭見懸圃序長流嗚咽之聲見實菴序月挂西秦永罷團圞之夢見子厚序銜酸曷極流歎何窮見觀槿序給事中倣徨故劒惻愴亡簮見貫花序人誇彩筆見看奕賦彌工傷逝之篇見琴怨序官是黃門官制漢明帝始置小黃門後以諫職名之慣作悼亡之賦見渭仁序緣余同病吳越春秋楚白喜奔吳子胥曰吾之怨與喜同子不聞河上歌乎同病相憐同憂相救屬以序哀僕也曾經此恨甫當除服之時見井叔序何以為情况屆營齋之日見壽閻序香餘幄裏倍知奉倩之愁見渭仁序粉賸奩間偏悉子荆之痛見井叔序吟纒楚些宋玉招魂響託秦箏見子厚序詎曰臨風以慟祗關長史多愁見滕王賦亦云載筆而書莫罄桓釐至行云爾見李母序辭曰鄙人逋峭見掌亭誄瑟居鮮歡見楚鴻序惟偕給事馥郁椒蘭見掌亭誄激昻藝圃上林賦遊于六藝之圃泛濫文瀾見佳山序笙必交吹琴無隻彈勝業坊前補注樂遊原左西京雜記漢宣帝樂遊廟一名樂遊苑亦名樂遊原其地最高四望寬敞李詞樂遊原上清秋節注西安府南每值春來穠花勝火雨裛千枝晴開萬朵紫菂璘斒瓊葩璀瑳隨君花下以敖以嬉君獨攀條悄焉不怡為言亡婦雅好惟斯靚服凝粧擷而玩之房闥繽紛簾櫳䓤倩見滕王賦及其亡也百花枯遍君語未終淚承於面時一稚子循於衣畔蘭芽玉茁見毛太母啓氷膚雪肌莊子藐姑射之山有神人焉凝肌若氷雪綽約若處子君言亡者僅育此兒徒存末婢晉中興書末婢謝琰小字琰字瑗度安少子開率有大度尚留衮師見看奕賦如何奄忽能不漣洏李陵詩仰視浮雲馳奄忽互相踰易泣血漣洳王粲詩中心孔悼涕淚漣洏宛宛恭人愔愔令德巾簟飄揚音容髣佛潘嶽悼亡詩長簟竟空牀又髣佛覩爾容屢易周星禮星回于天頻更朏魄見璿璣賦腹痛之悲見壽閻序宛同新沒四載中間嗟余越鄉每摛蕪製為人悼亡虞歌竟篋見瑞木賦挽唱聨箱漢書田橫死門下作歌詞有曰薤露何易晞干寶搜神記挽歌者喪家之樂執紼者相和之聲也續酉陽雜俎據左傳齊公孫夏歌虞殯則挽歌非始于田橫也間一臨文心疑不祥詎意斯悲我躬洊及猶有餘波見贈閻序助君霑臆杜詩人生有情淚霑臆隴水蒼茫見實菴序秦山突兀見歸田序勒此哀辭視兹鑱刻顧夫人哀辭維康熙某年某月某日合肥龔夫人顧氏卒於京邸嗚呼哀哉夫人城圯天地為之無光見劉太母序少女風悲星宿於焉失色見徐母序七襄機斷見代友序五嶽圖懸見銀臺啓家纒寶婺見葉母序荀奉倩所以神傷見渭仁序念軫瑶妃王武子因而泣下見井叔序晉孫楚傳孫楚悼亡王武子賢之凄然增伉儷之重某舊簉登龍見九日序新聞别鶴見琅霞序素縑一匹非稱誦德之賔繐帳三重見銅雀賦或有步虛之佩古樂府有步虛詞吳競樂府解步虛道家所唱備言縹渺輕舉之美異苑魏陳思王遊山忽聞空中有誦經聲清逺遒亮解音者則而寫之作步虛聲乃為辭曰哀伊人之信淑盡時命之不猶詩恆茀衣之奄逝左傳葬敬嬴用葛茀注引柩繩也又作婦人車旁蔽塵者駕玉軸以周流朝晞髮於層城夕捐玦於中洲層城見孟太母啓少司命篇晞汝髮兮陽之阿又夕晞余身乎九陽離騷朝發軔于蒼梧兮夕余至乎縣圃九歌捐余玦兮江中發浩唱兮揚笙竽吳都賦琴築并奏笙竽俱唱練時日兮眷靈修見九日序離騷夫惟靈修之故也注靈神也修逺也喻君也若乃幼習椒蘭見祖德賦長親桑柘見潘母啓三條望族見憺園賦家居鐵鳳街前見園次序四姓良家見璿璣賦名著濯龍門下見壽徐序注既守禮以稱詩亦歌風而肄雅孫莘之子裙飄琥珀之盂左氏之兒纓拂珊瑚之架補注至若性多幽靜質本柔嘉草稱蠲忿見看奕賦玉號辟邪見藝圃序四德秉姬薑之教三從推尹姞之家家語婦有四德德容言功婦有三從在家從父出嫁從夫夫死從子也尹姞載詩恆銘秋菊見鞠存啓鮮玩春花鏘璜琚而應節詩掞藻繢以披華見璿璣賦宛彼諸姑以及伯姊詩爭傳道韞之芬芳見琴怨序競愛蘭英之清綺見劉太母啓訝織錦之既工羡揮毫之絶美見璿璣賦賦成香茗見昭華序聲傳長樂之宫見滕王賦漢武故事建章長樂皆輦道相屬懸楝飛閣不由徑路畫出天仙見潘母啓玉臺新咏序寵聞長樂畫出天仙潘妃傳帝為潘貴妃起殿窗間畫神仙形名滿扶風之士見渭仁序爰有東都才子見天章序西邸名卿見壽徐序三春逮吉百兩初迎詩斯時也彈琴司馬己非憮悴之年見納姬序贈婦士龍即是風雲之日文選陸雲為顧彥先贈婦詩有曰悠悠君行邁煢煢妾獨止注乃代婦答誤為贈婦陸子春之姿制人士無雙見韓倬啓王右丞之詩歌門風第一補注於是高柔愛婦見閨秀序王渾賢妻見葉母序注並駐馺娑之側見銅雀賦同居鄠杜之西見鷹垂序月騰窗而皎皎草映砌以萋萋紅綬多情見雪持序銜來夜合本草夜合草一名合歡一名合昏並見琴怨序金丸有意彈去羈雌西京雜記韓嫣以金為彈丸一日失數十每出兒童隨之長安語曰苦飢寒逐彈丸羈雌見孝威序張敞退朝之餘黛眉親畫見少楹序潘嶽入直之暇纎手同攜見滕王賦况復地望高華班資赫奕袁司徒東朝世德見紫來序領袖人倫孫盛晉陽秋裴秀有風標十餘嵗時人語曰後進領袖有裴秀晉魏舒傳舒字陽元為鍾育長史後拜司徒有威望時曰魏舒堂堂人之領袖張尚書西雒名流交通賔客見茹蕙序實內助以相成乃相夫之必力招賢館內勞五夜之機絲漢儀中黃門持五夜顔氏家訓或問一夜五更何訓答曰漢魏以來謂甲乙丙丁戊又謂五更機絲見劉太母序食客堂前散兩宫之脂澤列子膚色脂澤晉書安帝九年左丞相張項監議琅琊及湖熟界有皇后脂澤田四十頃參詳以借貧人女中班固修十卷之漢書見歸田序閨裏馮歡免萬家之薛責見茹蕙序爰乃副珈婉娩詩褕翟輝煌見徐母序銅蠡咽而未歇見園次序銀箭耿而猶長見丁香賦晝掩金屏聽王裴之咨議見季青序夜㸐絳蠟跋潘陸之文章見園次序誦威儀于柏府見祖德賦流姓氏于椒房見徐母序至或鮑宣言事偶觸龍鱗見黃門序竇武上章暫辭鳳闕俊漢書竇武字遊平扶風人也李膺杜密坐黨事武上疏諫出之後謀誅中官曹節等矯詔殺之按武女為皇后又或唐蒙奉使遂到牂牁見竹逸序馬卿馳驛遙投巴僰見劉王孫啓間斗帳之香寒釋名小帳曰斗形如覆斗并見天石序注蕭子範落花詩飛來入斗帳亦蕙罏之熏歇思雙笑而已遐含獨悲而難泄生平離别如此而已其他形影靡不同焉洵玉臺之可紀見閨秀序而錦瑟之堪傳見天篆序奈何璇閣摧紅瓊閨悴緑戟門麗日才彈獬豸之冠見壽季序瑶席凝塵遽罷鳯凰之曲見納姬序日漫漫而多愁風蕭蕭而猶哭痛翡翠之千箱怨胭脂之十斛嗟乎夫人夫子方榮藁砧初貴見皇士序珠袍冠長信之班珠袍見銀臺啓長信見淡菴序鈿車驟武安之樂鈿車見王母辭武安見歸田序榮陽郡主擅南國之風華補注尉遲夫人推北朝之聲勢庾信集周儀同松滋公夫人尉遲氏墓志銘云夫人洛陽人父太師柱國公金碗印其餘芳見琴怨序鈿盒鐫其私誓太真外傳貴妃沒後道士楊通幽以術引上皇至玉妃太真院玉妃取金叉鈿盒拆其半授方士方士復請當時一事不聞于他人者驗于太上皇玉妃曰昔天寶十載秋牽牛織女相見之夕密相誓心願世世為夫婦此獨君王知之耳嗟乎夫人諸姨窈窕羣從神仙族連灞滻見子厚序宅列藍田見田太翁啓小弟盤桃花之馬長兄飾栁葉之韉見琅霞序極繁華於斯世宜安享於百年胡為乎壁存遺挂見井叔序琴留斷絃初學記漢武命趙后彈琴絃忽斷后悲曰凶兆也帝以外國所進鸞血膠續之終日彈不斷后竟以太子幼賜死後漢書蔡雍女年六嵗雍夜彈琴絃絶琰曰一絃斷也雍以為偶中後故折一絃琰曰第四絃斷也悵金蠶之永錮傷璧月之難全見滕王賦注魂斷悼亡之作見渭仁序音凄永逝之篇見琴怨序聽回風之繞壑流悲曲以結泉嗟乎泉途已宫鏡臺長隔見葉母序注紺唾黦而猶華見琴怨序玉魚涼而終熱西京雜記大明宫宣政殿初就每夜見數騎遊往高宗敇巫祝劉明奴問其由鬼云我楚王戊太子死葬于此因詔改葬鬼曰我死時天子斂我玉魚一雙今勿奪也及發掘玉魚宛然貴妃外傳妃患肺熱含玉魚以活肺凄涼思子之臺漢紀武帝憐太子無辜作思子宫為歸來望思之臺寂寞望夫之石見海棠賦黃腸給大內之錢後漢梁商傳賜黃腸玉匣注黃腸槨名以柏木黃心為槨也彤管紀昭陽之筆爾雅癸曰昭陽哀哉溘浮雲而上征離騷溘埃風余上征注溘猶奄也馭瀣氣以扶輪屈原逺遊食六氣而飲沆瀣兮張衡思玄賦餐沆瀣以為糧注六氣中冬則飲沆瀣北方夜半氣也扶輪見得仲序叩帝閽而陳詞楚詞吾令帝閽開關兮甘泉賦選巫咸兮呌帝閽并見銀臺序兾昭質之獲申離騷惟昭質其猶未虧驂宓妃於天衢見庭表序偕洛靈於雲津見銅雀賦注襲充堂之葐蒀見瑞木賦羌日暮而愁人倚玉女之窗扉見貞女序盻金母之霓旌見彭太翁啓眷層思以顧慕見瑞木賦聊述哀於斯文陳檢討四六卷十九
