body:
  text: 陳檢討四六卷十六翰林院檢討陳維嵩撰啓徵吳太母六袠詩文啓秋生閬苑見閨秀序方編勝國之春秋月冷瀛洲唐紀太宗選房杜等二十八人為學士時謂之登瀛洲正輯前朝之紀載撫昔賢之往蹟光景恆新眷獨行之留芳音徽未沫下稽家乘上覽史宬說文宬屋所容受也忠貞殉節半由閫德之同心貞婦貽謀定衍箕疇於奕世書仙雛接翅知為西母之禽桂子駢枝識是嫦娥之樹見瀛臺序於今為烈自古而然吳母徐太夫人者前壬戌進士福建巡撫諤齊公之冡婦而前癸未庶吉士介子先生之淑配也孺人浙水名門語溪望族嘉興志崇德縣有語溪一名語兒涇又名禦兒按崇德以避年號今易石門縣家多鳳子寧誇薛氏河東見逸齊序派出駒王見憺園賦盡說徐公城北見􅋯菴序里名崇讓牙幢繡㦸之家按李義山有崇讓宅詩詳孟太母啓牙幢見皇士序繡㦸見看奕賦坊號光延見雪持序粉碓銅溝之宅見銅雀賦而乃嬿婉明經柔嘉習禮詩髫齡賦菊見鞠存啓羣已奉為女宗列女傳宋鮑仕衛三年而娶外妻其妻不妬養姑愈敬宋公表其閭曰女宗早嵗銘椒見瑞木賦本無關乎姆教見昭華序爰夫待字見納姬序以暨初笄見貞女序風詩詠之子於歸易彖演家人之吉一燈佐讀用成夫子之名百兩宜家善得尊嫜之志抑有感焉所尤難者雖溷裙笄之列思在古人縱居紈綺之儔身通大義弔屈原于楚澤便知嬃女之賢見雪持序懷聶政於韓郊即慕姊嫈之行見納姬序曾聞書冊娥乃移山見徐母序詎學尋恆婺偏恤緯見歸田序固已㢲為少女氣感風雲見徐母序城是夫人情關家國者矣見劉太母序愧明季之不綱漢靈帝紀鴻圖不綱西園成市致鴻都之失守見存菴序文鴦匹騎雲繞成都見琴怨序按魏志文欽子鴦嘗乘匹騎陷陳衝􅊳驍勇絶倫青犢千羣飇馳京室詳孟太母序時則庶常公甫簉皇途初登仕版鴻騫乍遘見禹平序豨突何堪見玉巖序凄涼馬角見觀槿序誓排閶闔以呼天見雪持序縹眇龍髯見孝威序矢墜虞淵而捧日淮南子日薄於虞泉是謂黃昏魏書崔昱少時夢上泰山兩手捧日狄仁傑贊取日虞淵洗光咸池魏徵傳徴少時夢捧日﨑嶇東下瑣尾南還詩尋一旅之終摧左傳有衆一旅况孤城之嗣沒五溪路阻見竹逸序標銅柱以何時見商尹序八陳圖空見懸圃序返錦城而奚日成都記孟後主于城都城上種芙蓉如錦因名錦宫城一云錦宫願為袁粲見琅霞序竊附臧洪臧洪傳洪字子源守東郡為袁紹所執不屈殺之張超嘗曰子源天下義士洪嘗復陳琳手書其略有曰足下徼利于境外臧洪投命于君親憤飛疏勒之泉見歸田序怨塞黎陽之土見實菴序雞陂夜夜見藝圃序翻為化鶴之鄉見存菴序螢苑年年後補注竟作啼鵑之路見孝威序注愴何如乎悲可知也斯時也撫軍方解組巖疆孺人適從親官舫船過荔浦平樂府志荔浦在修仁縣忽傳庾信之難歸見素伯序幡出榕城見銀臺序或報王琳之不返見素伯序封霽雲之斷指聊代刀環唐書張巡守睢陽尹子竒圍之巡令南霽雲犯圍而出乞師于賀蘭進明見其無出兵意因囓落一指以示進明曰霽雲既不能達主將之意請留一指以示信歸報座中皆為泣下慰徐淑以遺言勉支井臼見閨秀序孺人則靡笄一慟城欲全頽見貞女序截髮長號列女傳犍為相登妻名度嫁登一年而寡守令吳原欲妻之度引刀截髮乃止石思立化見海棠賦銀瀧雪浪冀追伍員之忠魂見銀臺啓碧澥黃泉希蹈曹娥之孝蹟見貞女序誓為鮫妾訴薄命以啼珠見茹蕙序擬作寃禽畢微軀于填海見無忝序寧煩再計亦又何求既而舅姑正色付以諸郎童稚牽裾憐其尚小遂躊躇而飲血終慷慨以旌心見佳山序是則杞梁有婦未能踰此哀離見貞女序湛母無夫不足方斯悱惻者矣晉陽秋日陶侃之父丹娶新淦湛氏女生侃丹早逝若乃鄉關傾覆廬舍漂搖盼堂前之舊燕去向誰家見玉巖序問膝下之新雛歸于何黨見貞女序僕慚李善後漢書李善本李元蒼頭元家俱疫死惟孤兒續始生數旬而資財千萬諸奴欲謀殺續分其財善潛負續逃亡及長為理舊業光武聞其行詔拜善及續並為太子舍人友乏王成見賀周序并無潼乳之資見壽徐序絶少餦餭之計詳索餅啓秋蘆詎絮見集生序疇衣任昉之兒梁書任昉素清貧卒後其子西華冬日著葛帔練裙劉孝標乃著廣絶交論譏其舊交春笋非糧續晉安帝紀豫州刺史司馬尚之為桓𤣥將馮該所攻倉儲稍竭是時蘆笋時也尚之指笋曰且噉此足解三日將士離心遂敗庾信為慕容寧碑春笋非糧難飼叔敖之子見竹逸序而孺人則殫厥恩勤俾其成立機邊織作春無嵗以非秋帳底咿唔晝無時而非夜以至最憐庭竹只欲成斑見憺園賦不忿園葵居然似錦陸遊詩錦子葵花買上原孫鸞罷舞永無臨鏡之期見亓山序崔皓詩鸞鏡埋塵罷曉粧荀鴨空溫長斷薰香之日見天石序皈心乾竺見佳山序託命金仙詳靈岩碑可不謂書之青史泣甚羊碑見梧月序彈入氷絃見海棠賦悽踰帝瑟者乎王子年拾遺記黃帝使素女鼓庖犧氏之瑟鼓五十絃滿座悲不能已後破為二十五絃注素女方術之女補史記神農作五絃之瑟按五絃十五絃小瑟也二十五絃中瑟也五十絃大瑟也蓋孺人之稱未亡人也見葉母序才二十六嵗其撫藐諸孤也見翼王序歷三十七年母以兼師怙而加恃詩此雙駒汗血補注天馬歌霑赤汗兮沫流赭所以並起于南天而一樹瓊枝見璿璣賦尤見先栽夫北闕也某等與青壇兄秋風雁塔見銀臺序或附齊年夜月龍池或稱同館內翰林志院內有龍池藝閣紬書之暇見淡菴序獲聆賢母之芳風花磚珥筆之餘略悉高門之盛事唐李程傳程字表臣北㕔前階有花磚道冬中以日影及八磚為入直之候程性懶日過八磚乃至號八磚學士兹當臘月小春適遘華筵六袠桃開蓬島星妃設帨之辰見壽閻序菊滿金屏月姊稱觴之候見憺園賦人間節孝行看表雙闕以烏頭補注天上褒嘉佇見降九重之紫綍禮伏冀彩毫才子見看奕賦惠以瓊瑶肜管文人詩編之珠貝見璿璣賦庶使赤城霞起見尺牘序長開四照之花見壽閻序將令絳縣春生見壽閻序永秀萬年之草徵孟太母王太夫人六十壽言啓蓋聞蓮開華井見鞠存啓峰頭留玉女之盆見劉太母序桃熟層城澥畔築瑶姬之館桃熟見徐母序淮南子崑崙山有層城九重瑶姬玉女居之西池王母見素伯序注穆天子傳王使造父為御西巡狩見王母于瑶池十洲記崑崙山有瑶池閬苑并見彭太翁啓注胸懸五嶽之圖見銀臺啓南極夫人見葉母序名冠十洲之籍見銀臺啓歷數興王之日必資褒鄂之勳見觀槿序恆開積慶之家易定藉叉笄之助醴泉萬斛滙自璿源白虎通醴泉者美泉壯如醴文苑英華鄭璘諸王詩云璇源分正𣲖玉葉衍靈根美玉千重生由瓊圃於今為烈自古而然兹啓孟太夫人者三韓孟聿修之祖母而川陜總督忠毅公之淑配也巍峩甲第系本烏衣見少楹序清綺門楣支分紫塞見海棠賦昔者齊姜宋子家號上流詩顧婦潘姨人稱右族顧婦見閨秀序潘姨補注烏石蘭樂陵著姓庾信集有周冠軍公夫人烏石蘭氏墓志銘步陸孤吳地名閨見壽季序俱不足以儷此風華均其焜耀者矣太夫人之歸我忠毅公也年甫十四蓋奉我太宗皇帝之諭㫖云乍委文禽見貞女序宫中助聘才鳴彩雁詩雍雍鳴雁天上催糚見牛叟序時則忠毅公二我秋官副兹都統亳都將建未離負鼎之年見佳山序姬籙方興猶在釣璜之日尚書大傳太公釣磻溪得玉璜于魚腹中刻曰姬受命吕佐之報在齊太夫人則黽勉庭除綢繆牖户江頭鴨緑輿志鴨緑江在東方朝鮮國西北唐太宗征高麗耀兵于此便為濯錦之川見園次序峪口鴉青見天章序即是採桑之陌見閨秀序聿襄駿業克纘鴻名洎乎真人當璧聖主膺圗豐沛羣豪蕭相國功名第一見歸田序南陽諸將鄧仲華謀略無雙鄧禹傳禹杖䇿追光武于鄴由是為帝任使屬九域之初平尚庶頑之未靖斯時也峩峩雪棧逺道三千皇輿考巴西棧道千里通于蜀漢並詳下杳杳金城提封百二韓子雖有金城湯池非粟不可鹽鐵論秦地金城于里漢高帝紀田肯賀上曰秦形勢之國也帶河阻山懸隔千里持㦸百萬秦得百二焉蘇林注秦地險固二萬人足當諸侯百萬也漢刑法志提封萬井注舉其封內之總數也葭萌關內史記貨殖傳秦破趙諸遷虜處葭萌括地志葭萌關馬謖守此杜鵑之剩壘何多蜀志昔有姓杜名宇王蜀號曰望帝宇死化為子規鳥蜀人聞子規鳴曰是我望帝也許慎說文望帝淫其相妻慙亡去為子巂鳥蜀人聞之皆起華陽國志魚鳬王後有王曰杜宇稱帝教民務農更名蒲卑會有水災其相開明决玉壘山以除水患遂禪位隱西山時適二月子鵑鳥鳴故蜀人悲焉巴亦化其俗而力農農時先祀杜主麥積山邊鞏昌志秦州積麥山狀如麥積稱秦地林泉之冠陳寶之遺倉不少見天篆序公孫述正憑陵于劒閣路梗褒斜後漢書公孫述字子陽扶風人也王莽時為導江卒正更始立述恃其地險衆附遂自立為帝蜀都賦公孫躍馬而稱帝劒閣見無忝序史記天水隴西棧道千里無所不通惟褒斜綰轂其口西京賦右界褒斜隴首之險注南口曰褒北口曰斜姚弋仲猶崛強于秦州烽迷汧渭弋仲見子厚序注秦州見實菴序注汧渭見子厚序漢書伍被曰倔強江淮間公于順治初年膺川陜總督之命爰乃慷慨陳師糾桓鞠旅詩西平回紇見雪持序煙消徐福之船見觀槿序東鏟姜瓖補注霧散張超之市見觀槿序他若銅頸鐵額之輩見商尹序疇能兔脫于林間孫子兵始如處女後如脫兔以及赤眉青犢之倫大半魚遊于釜底光武紀鄧禹進說于帝曰今山東未安赤眉青犢之屬動以萬數注賊號後漢書張嬰詣張綱降曰某等若魚遊釜中凡忠毅公廓清耆定之功皆太夫人左右劻勷之力屢援枹鼓見鄴園啓以𨽻戎旃罕御貂襜而親韎韐詩溉來黛碗只用傳餐卸得紅褠廣雅江南人士以巾褠為交際盛服惟思立幟見懸圃序城上起夫人之號見劉太母序軍中得娘子之稱唐紀平陽公主嫁柴紹引兵七萬與秦王定京師號娘子軍既而忠毅公勩以忘身忠偏致命旗摧麾下星殞營門晉陽秋有星赤而芒角自東北西南流于諸葛營中俄而亮卒夫人則明駝千里蹀躞還鄉雜記明駝千里腳謂駝臥屈足而腹不著地為漏明者最能逺行也宋樂府躞蹀青驪馬寡鵠一軍見貞女序間關赴闕維時世祖章皇帝嘉其盡瘁軫此成勞給內帑以營喪命太常而製諡恩隆存沒天低驃騎之塋見觀槿序注詔寫丹青日照凌煙之畫唐紀太宗貞觀十七年圖贊功臣于凌烟閣太夫人愀愴家難悚惶朝命由郊勞訖于錫襚周禮秋官小行人及郊勞視館將幣為承而擯之左傳卿出郊勞公羊喪事衣被曰襚慟必城頽見貞女序自卒奠以至歌虞見瑞木賦髽而路祭見貞女序通都歎息咸推秉禮之女宗見吳母啓闔境觀覘羣羡知書之姆教見昭華序榮哀交盡律度靡愆至于瞻戀鄉關徘徊丘壠盧龍極望長懷梧檟之悲永平志盧龍縣古肥子國在冀州東北秦為遼西右北平二郡地魏曰盧龍左傳伍子胥曰樹吾墓檟遼鶴重歸見存菴序永結松楸之慕見祖德賦苔纒馬鬛檀弓孔子之喪子夏曰昔夫子言曰吾見封之若堂者矣見若防者矣見若覆夏屋者矣見若斧者矣從若斧者焉馬鬛封之謂也注馬鬃鬛之上其肉薄封形似之儉而易就願留灑掃之人見歸田序雨裂牛眠冀斷樵蘇之客晉書陶侃將葬親家中忽失牛遇一老父謂曰前岡見一牛眠山塢中其地若葬位極人臣矣言訖不見侃尋牛得之因葬其處國䇿昔者秦攻齊令有敢去柳下季壟五十步而樵採者死不赦幸邀俞㫖獲遂私情則又誠格尊親感孚穹壤者矣况復儉以持家恩能逮下公父文伯之母克懋坤儀國語公父文伯退朝朝其母注文伯魯大夫公父穆伯之子母敬姜也南宫敬叔之妻式彰閫範見徐母序人傳孝友何殊石奮之庭見歸田序祚卜享嘉詎遜于公之戶見憺園賦固已宅呼崇讓宣室志崇讓里在東洛西溪叢語洛陽崇讓坊有河陽節度使王茂元宅非徒里字集賢見祖德賦于是一門少長綬吐文蛇見祖德賦七葉箕裘七葉見半繭賦箕裘載禮印蟠銅虎典彚漢文帝初頒銅虎符于刺史又為竹使符隋造玉麟符以代銅虎符又唐為銅魚符玉河夾宅見祖德賦翩翩顧陸之家見尺牘序畫㦸盈衢見閨秀序奕奕崔盧之裔見楚鴻序伯子領諸侯之貴坐擁朱幡漢書詔令二千石長史車朱兩轓畫輪續漢志二千石皆皂蓋朱幡仲君居御史之尊臺連烏府見祖德賦猗歟季子藉甚幼公金貂蘭錡已膺二品之崇班見半繭賦帶礪山河永保萬年之世爵見孝威序可不謂胄踰薛鳳族邁荀龍者乎見逸齊序而太夫人猶以撥亂固思奮武守成尤尚揆文書時賡清晏詎矜馬槊之勳資世際雍熙莫倚弓刀之門胄種雖猿臂漢書李廣猿臂善射注猿通臂輕捷善緣能于空中輪轉敢薄雕蟲見璿璣賦家本龍驤班固史述贊雲起龍驤化為侯王晉羊祜傳吳童謡云阿童復阿童銜刀遊江東不畏岸上虎但畏水中龍祜知王濬字阿童因表龍驤將軍按符堅姚萇亦加此宜耽繡虎見祖德賦遂以三遷之母誡用成一代之詞宗見葉母序此我聿修所以䇿雋春闈名登甲榜文孫令子武達文通見葉母序洵哉盛世之禎符抑亦興朝之瑞應兹以嘉平之月見憺園序注茅盈內傳始皇三十一年聞巴謡歌因改臘曰嘉平適逢揆覽之辰見壽閻序錦筵獻斚酒泛珊瑚綺軸徴詩書標翡翠願編珠貝見璿璣賦祝貺瓊琚詩喜見金堂列女集仙録王母居金堂之苑并見鷹垂序注盈階開四照之花見壽季序欣逢璚笈真妃繞砌擁萬層之璧徵松陵潘母六十壽言啓垂虹渺渺碧鱸紅樹之莊笠澤茫茫茶竈筆牀之所見􅋯菴序吳江志松陵江即古笠澤江也自太湖分𣲖由縣東門外垂虹橋北合龎山湖轉入長洲界由來此地多産畸人今日潘君偏耽肥遁易意者三高祠畔人稱隱士之鄉齊東野語吳江三高祠鴟夷子皮張季鷹陸魯望有以蠡為吳仇不當祀詩云可笑吳癡忘越憾却誇范蠡作三高不知十字碑前母為讓王之𦙍江陰志季札墓在江陰申浦孔子題其碑曰嗚呼有吳延陵季子之墓實本慈親之教用成我友之賢木傳貞女之名果得隱夫之號見海棠賦如潘母吳夫人者尤足志焉夫人棨㦸高門見閨秀序簪纓上族敘其姻婭既椒衍人間詩譜厥高曾亦履聞天上班固漢書鄭崇字子游擢尚書僕射每見上曳革履上曰我識鄭尚書履聲夫人幼即端莊生而淑慎菊花製頌見鞠存啓晨風遵栁絮之庭見琴怨序蘭葉成銘補注夜雨直條桑之館漢書孝文皇后為太后幸蠶館率皇后及列侯夫人桑于郊外唐書高宗時里有桑條韋樂之歌後韋后祀蠶則奏之若乃性解仁親書工內則禮笙吹華黍孝娥題黃絹之碑見昭華序經授宣文伯姊設絳紗之帳見劉太母序固已德容婉嫕宋玉神女賦性淡清靜其愔嫕兮注婉嬺柔順貌獨擅女宗見吳太母啓圖象溫恭洛神賦骨像應圖注應圖畫也庾信步陸孤氏銘應圖令淑又趙國公夫人銘云夫人有象應圖并詳顧哀辭無煩姆誡見昭華序且也奉異本之萱枝情逾自出撫旁根之荆樹恩甚同生見憺園賦此又挽近所難能恆流為莫逮者矣逮歸我某公先生鹿車對挽見壽閻序注鴻案相莊見貞女序恤其絡緯見歸田序焦勞洮櫛之餘禮問彼有無黽勉醪鹽之側詩斯時也遺雛弱息漢書吕公重高祖狀貌曰臣有弱息願奉箕帚注與賤息舒祺同息乃少之通稱也懼傷夫子之心斷縷零緘厥有前人之緒而夫人乍詠齊牢見貞女序遽為代匱左傳凡百君子莫不代匱注匱乏之時須人承代賣來寶鏡甫牽嬌女之烏羊隱逸傳王敬𢎞以女適孔淳之之子以烏羊繫所乘車轅提壺為禮至則盡歡析罷珠鈿旋奠佳兒之錦雁見貞女序注及劉太母序經營婚嫁以畢晨昏屏當資裝見劉太母序何分寒暑無何而一痛離鸞見貞女序長甘蓐蟻見映碧啓入室抱磨笄之恨見貞女序倚廬銜截髢之悲見吳太母序次耕則年始六齡幼子則生為遺腹夫人憤願損生忠能託命存一線于未亡之手見葉母序閫內程嬰趙世家趙氏孤兒已脫程嬰杵臼謀取他人嬰兒負之諸將殺杵臼與孤兒皆喜然趙氏真孤乃反在程嬰卒與俱匿山中哺藐諸以待盡之年女中荀息見劉大母序和熊午夜無忘爾父之辛勤列女傳唐栁仲郢母韓氏公綽妻也嘗粉苦參黃連熊膽和為丸諸子夜學含之以資勤苦後牛僧孺謂仲逞有父風銼薦中閨仰賴羣公之訓迪見徐母序誠堪返日淮南子魯陽公楚將也與韓遘戰酣日暮援戈而揮之日為返三舍九域志汝州魯陽關即揮戈返日處志可回天見銀臺啓孱然膝下之孤蔚爾區中之秀臣力於兹竭矣所天不既慰乎抑在鄙人猶餘深感今夫牛衣老婦見天章序艷心西舍之貂蟬見半繭賦馬磨窮婺見懸圃序動色東鄰之翟茀詩斷機佐讀期邀稽古之榮列女傳孟子既學而歸孟母方績問所學自若也孟母以刀斷其織曰子之廢學若吾斷斯織也孟子因勤學不息畫地傳書冀食干時之報見劉太母序捧毛生之檄便詡文人漢史毛義廬江人家貧以孝稱張奉往候之府檄適擢為安陽令義捧檄而喜奉心薄之後親沒屢辟不起奉嘆曰賢者固不可測絶溫嶠之裾還誇學者晉書溫嶠欲詣建康母止之絶裾而行此即堂前漂麥見懸圃序閣上燃藜見映碧啓墨穿作穴五代史桑維翰嘗鑄鐵硯示人曰硯穿則改業惟工溫飽之圖宋王曾傳曾曰平生之志不在溫飽書積成倉見懸圃序僅想風雲之會易古今一致愚智同揆在末俗而皆然詎達人其遂免夫人則絶意時名忘情好爵教兒學易止占箕子之爻易課子攻書不習揚雄之論李充論揚雄論秦劇稱新之美上封事露才以耽寵溺情以懷祿素餐所刺何以加焉但使粗知成敗雖蓬葆以如飴說文草叢生曰葆假令略識興亡縱飢寒其靡悔身將隱矣願成綿上之操見劉太母序勿以母為益勵黨人之節漢書范滂詣獄母曰汝與李杜齊名吾復何恨高人數等自古為難然或者徒甘淡泊止厭紛華將采菽以終年詩願辟纑而用老孟子正復蕭條一室未足深竒隱約三時奚容過羡無如時值驚飇運逢駭弩楚國有亡猿之事見舜民序崑岡當失火之年見懸圃序回思謗書之獄初興維時賢門之禍最烈褒方在難株恐連融漢書孔褒與張儉有舊匿儉事泄褒弟融曰舍藏者融也褒曰彼來求我非弟之過母曰家事任長妾當其辜一門爭死株連後補注儀既遭誣瓜將蔓廙見憺園賦儀廙初勸魏武立植後文帝誅儀廙并其男口明史文皇赤景清族籍其鄉轉相扳染謂之瓜蔓抄羣兒第解琢釘之戲盡室彌深纍卵之憂世說孔融被收時融兒大者九嵗小者八嵗二兒故琢釘戲徐進見融曰大人豈見覆巢之下復有完卵乎並詳掌亭誄說苑晉靈公造九層臺荀息諫曰纍十二棊子加九卵其上靈公曰危哉夫人則厝火不驚漢賈誼疏抱火厝之積薪之下餘波何懼見鄴園啓原鴒急難詩肯因弟瘦為辭詳施公誄幕燕漂搖見看奕賦寧以李僵為恨漢樂府雞鳴題桃生露井上李樹生桃旁蟲來齧桃根李樹代桃僵卒之臨危鎮定免小弱于糜爛之餘遇變安貞全家室于流離之頃震雷虩虩易未見焚身左傳象有齒以焚其身洚水湯湯書何常滅頂易深沈之略即偉人猶歎勿如變化之才雖俠士奚能逺過凡諸卓犖筆不勝書兹逢周甲之辰適在履端之候見銀臺序叉飛戴勝見徐母序競投玉女之壼見琴怨序屏轉倉庚詩有鳴倉庚注即黃鸝爭煉媧皇之石見憺園賦其在夫人桃李不言復何心於往事史記李廣贊諺曰桃李不言下自成蹊至于次耕樵蘇不爨詎有望于諸賢韓信傳李左車曰樵蘇後爨師不宿飽文選應璩書云幸有袁生時步玉趾樵蘇不爨清淡而已然我同人可無高作拜四海濳夫于堂下王符傳符著潜夫論以譏世不羡鳴珂戛玉之交見祖德賦擅千秋絶唱於行間如聞控鶴驂鸞之曲見貞女序徵沈韓倬太史母周太孺人八十詩啓蓋聞南嶽夫人見葉母序玉軸履登真之籍西池王母見孟太母啓瓊扉敞介壽之觴玫瑰之砧杵千尋星應字女詳祭梁文按女星為二十八宿之一翡翠之窗􅎉十扇月許稱妃補注歷志日君月妃是知鶴來緱氏已占瑞叶仙靈見滕王賦况夫龍出渥窪復見祥開風雨漢書武帝元鼎四年天馬生渥窪水中輿志渥窪在陜西沙州即漢肅州地杜詩驄馬行時俗造次那得致雲霧晦冥方降精注天馬龍種龍于渥窪中風雨大作與馬合方降精也紅藥秀萬年枝上紅藥見紫𤣥序景福殿賦綴以萬年注晉武帝華林園中有萬年樹二十四株江左謂之冬青樹丹鉛餘録草木疏云檍木取檍萬之義改名萬年樹非冬青也青鸞歌九子鈴中青鸞見銀臺啓注禽經注天下安寧則鸞見其音如鈴周之法車綴以大鈴如鸞聲也西京雜記昭陽殿設九金龍皆銜九子金鈴五色流蘇帶每風日照曜一殿鈴鑷之聲驚動左右潘妃傳帝為潘貴妃起三殿有玉九子鈴皆取以施殿飾乃莊嚴寺中者孺人系本盤龍南史周盤龍北蘭陵人以軍功封晉安侯門施行馬周禮掌舍設梐枑再重注梐枑者乃互其木遮闌其門謂行馬漢官儀光祿勳特施行馬人臣用行馬始此魏志楊彪拜光祿大夫令門施行馬置吏以優崇之施襟結帨榖梁傳女嫁諸母施鞶紳皇甫謐女怨詩婚禮既定婚禮臨成施襟結帨三命丁寧幼工秋菊之銘見鞠存啓說禮敦詩見劉太母序左傳說禮樂而敦詩書長善春椒之頌見瑞木賦乃以汝南之閨秀歸我吳興之大賢時則笏翁先生七葉高蟬時時臨鬢見祖德賦三宫吟鷺日日陪軒見銀臺啓畫省宿青綾之被名動公卿漢官儀八座受成事决于郎下筆為䇿其入直臺廨官供縑白綾被或青錦緤為之鳳城鳴白玉之珂風生殿陛見瀛臺序洊膺駕部預典兵機唐書天寶中置職方駕部庫部夏卿五屬中臺有妙選之稱周禮夏官司馬中臺見壽季序首曹七兵郎吏服當官之望官制考魏始置五兵尚書謂中兵外兵騎兵别兵都兵晉太康中以中兵外兵分為左右置七兵尚書孺人則翟茀以偕詩佩環而相列女傳后妃進退必鳴玉偑環崔皓詩鳴環佩玉生光輝機絲軋軋洵哉女德幽貞裙布垂垂見劉太母序允矣婦功儉恪既著相夫之烈還聞鬻子之勤三遷母訓見葉母序兒是麟膠十洲記鳳麟洲以鳳鳴麟角作膠名續絃膠漢書武帝時西海以鸞血作膠獻帝帝射弦斷膠續之終不斷八詠門風南史沈約集有東陽八詠輿志婺州有八詠樓在州南人呼犀角見三芝序庭花四照見壽季序羣高四傑之名見祖德賦注人玉雙清共羡雙珠之號三輔决録後漢韋康字元將弟誕字仲將俱有時名孔融與其父端書曰不意雙珠近出老蚌晉書孟昶字彥達與弟顗並美風姿人謂雙珠晉書韋孝寬與獨孤信號連璧陸凱傳凱子道暉與弟恭之稱雙璧又見集生序注於是西京太學盡重劉陶東漢爭臣傳劉陶潁川人濟北貞王勃之後也桓帝時以太學生屢上疏直言後拜諫大夫竟死職漢紀帝徴朱穆詣廷尉劉陶等數千人上書訟穆寃帝乃赦之東觀名賢見壽季序交推郭泰郭泰傳泰字林宗博學善談論李膺曰吾見人多矣未有如林宗者也魏照字德公幼時事泰曰經師易得人師難遭更羡次公之蚤貴尤驚子幼之先鳴官簾夜月明蟾映金匱之書見憺園賦御苑秋風快馬扈玉河之獵順天志玉河自玉泉山流入大內堂前設帳夫人猶身自教兒見劉太母序閣下傳餐太史每歸而遺母南史徐孝克性至孝後為國子祭酒每侍宴取珍果納紳帶中以遺母宣帝嗟嘆良久敕自後孝克前饌並遣將還以遺其母又若倉通驍騎祖孫更先後同曹杜氏通典漢有騎衛將軍謂之雜號武帝以李廣為之永平年詔云左右驍騎宜通文武文官則用腹心武官則用功臣然船是孝廉見祖德賦兄弟復聨翩競爽詳掌亭誄注謝益壽風前玉樹見壽季序繡韀趨風集韻韀與􅀈帴通用杜詩雪沒錦韀鞍陸子春車上璧人漢書陸閎字子春為潁川守姿容如玉喜著越布單衣光武見之嘆曰南方固多佳人錦綳羅拜說文束兒襁褓曰綳或作䙀孺人則含飴以弄見儲太翁啓繞膝而嬉見看奕賦郗夫人年踰耆艾神明不衰見徐母序宣文君坐有生徒講論自若見劉太母序顧一門之遏末遍為摩娑見皇士序列四世之曾𤣥都能省記酡顔舞鶴已同天上之皇娥見雪持序白髮和熊見潘母啓還作人間之家督見逸齊序兹以仲冬榮登八袠起居八座綵箋賦劈詞頭遊戲千春寶柱箏彈曲尾補注杜詩起居八座太夫人於焉張融宅後見紫𤣥序注鐵市銅街之路見壽季序李膺門外見九日序朱輪丹轂之賔見田太翁啓莫不户奏笙竽人持牛酒西河女子見葉母序供來九節菖蒲神仙傳漢武上嵩見仙人曰吾九疑人也聞中嶽有石上菖蒲一寸九節食之可長生故來采之忽不見帝曰此必中嶽之神以喻朕耳古逸詩石上生菖蒲一寸八九節仙人勸我餐令我好顔色東海婦人雲笈七籖仙人鍊食雲母東海女子賣鹽遂求䝉山隱居並見葉母序注進以三山芝草見天篆序某等潘楊密戚見尺牘序孔李通門見鞠存序蓋既為陶侃之賔見徐母序宜進拜周瑜之母見葉母序更望譜以聲詩鐫之琬琰見尺牘序則筵開天姥見徐母序庶能博笑以投壺見琴怨序酒泛麻姑神仙傳王逺字方平嘗過吳門蔡經家遣使與妹麻姑相聞俄頃即至坐定各進行厨皆金盤玉杯香氣達户外劈麟脯而行酒用效為歡於織錦見璿璣賦賡兹高詠留作美談徵李母董太宜人六十壽言啓蓋聞勾漏丹砂井志延齡之號見壽閻序南陽紫菊泉留益壽之名見琴怨序恆春樹下見天章序皇娥惟拊瑟為歡見雪持序長樂花前見淡菴序玉女以投壺而笑見琴怨序赤芝三秀見天篆序人間高天姥之峰見徐母序黃玉九華雲裡祕安妃之籙見天篆序正屆氷桃之宴見田太翁啓注况逢彩線之辰見壽徐序珂里昌期見祖德賦㦸門盛事見看奕賦兹啓李母董太宜人者觀察某先生之淑配而太史紫瀾先生之壽母也畫雉名閨周禮皇后六服注翟雉名畫雉於衣以為祭服庾信竇氏銘衣留畫雉珥貂上姓見半繭賦龍能就豢見舜民序夙呼將相之門史記孟嘗君曰文聞將門必有將相門必有相杏欲成林競目神靈之後見劉太母序宜人幼即端莊長而淑慎縱處綺紈之胄靡愆蘭􅉅之儀禮婦人或賜之蘭􅉅賜受獻諸舅姑雅聞髫鬌之年見懸圃序便協珩璜之節見徐母序人推鍾郝見葉母序族擅談邢詩洎乎降阼更成林下之風爰暨齊牢見閨秀序彌起房中之譽漢書唐山夫人製房中曲韋昭注唐山姓也夫人漢高帝姬困學記聞典平調清調瑟調皆周房中之遺音時則先生海岱俊民青齊才子根盤月窟獨標仙李之門見映碧序名列天衢屢宰潘花之縣見楚鴻序旋由茂宰洊簉虞衡杜詩茂宰得材新周禮山虞林衡澤虞川衡虞衡作山澤之材明紀置虞衡司復自臺郎見園次序出膺觀察官制考漢刺史唐十道觀察諸使宋轉運諸使之職後名按察故城則地連瀛海見任丘啓樗杜之畝必千鍾見鷹垂序漢書武帝使吾丘壽王除宜春諸地為苑以便微行東方朔謂酆鎬樗杜畝價一金不可為苑者三豐邑則界錯彭城芒碭之雲皆五色徐州志豐邑之名始於秦搜神記籛鏗封於彭曰彭城春秋楚圍宋彭城注古大彭氏國漢曰徐州漢紀高祖微時隱芒碭山嘗有五色雲吕后與人求嘗得之注山在徐州咸因循卓樹厥官方俱以清廉承夫宸眷尋冬官之夕拜俄水部之晨遷周禮冬官考功記唐官儀制工部尚書所屬四部一曰工部二曰屯田三曰盧部四曰水部一官秉憲臺霜飛桂象之區通典御史為風霜之任故曰霜臺九域志桂林象郡古百粵地𨽻廣西按秦桂林郡即今桂林府秦象郡今廉州府地萬里宣猷卿月照湘灕之岸書卿士為月栁開記桂林全州分水嶺下二水分南北而離北為湘水南為灕水稱二江凡我先生馳驅鞅掌之勳詩皆太宜人左右劻勷之助輶軒北上則服翟茀以俱來詩畫舫南浮亦著縞衣而偕下詩翠翹金雀敢言命婦之榮招魂砥室翠翹注翠鷸鳥翹羽也炙轂子高髻多鳳髻上有珠翠翹後漢輿服志皇后簮上為鳳雀命婦載周禮載石封䱹交勵藎臣之志後漢書陸績字公紀為鬱林太守後罷去過洞庭湖舟輕載黃石壓之謂之廉石唐書張祐知南海但載羅浮石歸陶侃别傳侃少時作魚梁吏嘗以䱹餉母母封䱹責以書曰汝以官物見餉非惟不益反增吾憂也一作孟宗為雷池監事一作孟仁事藎臣載詩揚其懿媺洵堪君號義成列女傳漢崔篆母師氏通經學百家之言王莽寵以殊禮賜號義成夫人溯厥芳華寧祗户封石窖見葉母序加以地是女牀盈柯皆鳳山海經女牀之山有鳥其狀如翟而五彩文名曰鸞郭璞贊曰鸞翔女牀門同合浦見素伯序拊掌成珠見三芝序龍文蹀躞龍文見紫來序蹀躞見孟大母啓人言桓馬之工見賀周序按桓典乘驄鮑宣馬工乃二事此借用馬工見壽季序犀角璘𥚹見三芝序兒識賈彪之怒見祖德賦長邑令先生望崇仙令績已著夫飛鳬見二齊序次太史紫蘭先生文擅省元才更誇夫繡虎見祖德賦蛟生字裡見祖德賦燃藜在白玉之堂見映碧序鳳吐篇中見季母序授簡直黃金之殿見璿璣賦矧幼君之鵠峙見儲太翁序更季子以鴻騫見禹平序鸞翔鵲顧見壽季序一門皆倚馬之才見閨秀序雁塔螭坳雁塔見銀臺啓螭坳見璿璣賦五夜食和熊之報見潘母啓其婦職也如此其母儀也又如此兹當花甲之籌添見壽閻序恰遘黃鍾之律轉樂書注黃鍾十一月律也黃中和之色鍾動也陽氣動於黃泉而能動養萬物華筵祝嘏見徐母序筆花隨蓂葉以俱敷見璿璣賦緹室書祥萱草並葭灰而共暖見壽徐序凡我金閨見園次序盡懷彤管詩平日覽北堂往訓見淡園賦注輒咨嗟滂母之賢漢書黨錮獄起滂詣縣獄母曰汝與李杜齊名死亦何恨居恆諷東觀遺書見壽季序每太息萊妻之行劉向列女傳楚老萊子耕於䝉山之陽楚王至其門老萊方織畚王曰願先生臨之萊將應之王去萊妻戴畚挾薪而歸問其故妻曰妾聞可授以官爵者可隨以鈇鉞老萊子遂隨其妻至江南而隱何圖斯世有此徽柔詎可吾賢不為揚扢頌桓釐之閫德寧徒沛國諸生見壽閻序奉陶母為女宗遑後長沙人士陶侃傳母湛氏為陶丹妾生侃拜太尉封長沙郡公侃鎮武昌時賔佐燕集必有飲限曰約時多酒失慈親見約故不敢踰并見徐母序女宗見吳太母啓伏望廣輯瓊瑶詩速編珠貝見璿璣賦庶幾忩窺朱鳥見天篆序摛文俱五嶽之圖見銀臺啓輪馭斑龍漢武內傳七月七日二更後西王母至或駕龍虎或乘麟鶴王母乘紫雲之輦駕七色斑麟捧斚悉十洲之客見銀臺啓徵毛太母黃太孺人八十壽言啓漢殿傳經萇乃箋詩之客見昭華序趙家養士遂為脫頴之賔平原君傳秦攻趙邯鄲趙使平原君求救於楚君約其門下食客與俱毛遂自薦君曰賢士譬之錐處囊中其末立見今先生處勝門下三年勝未有所聞也遂曰臣乃今日請處囊中耳若蚤處囊中乃脫頴而出非特末見而已流連碣石之宫論心雪後邂逅黃金之館握手花前見九日序言偶及夫家門用獲詳其鄉國自言壯嵗疇希薦禰之榮孔融薦禰衡疏有曰𢎞羊潛計安世默識史魚勵節任座抗行以衡準之誠不足怪鷙鳥纍百不如一鶚祗說衰宗莫罄報劉之志見集生序粗陳梗槩略敘生平乃知遂安毛母黃太孺人者遂安詳健松記實某先生之生母而友人允大之大母也孺人族著燕都望齊江夏見琴怨序敦詩習禮見劉太母序幼誇季女之風詩有齊季女賦菊銘椒左芬菊花頌有云英英麗質秉氣靈和春茂翠葉秋耀金華銘椒見瑞木賦長擅大家之譽見歸田序弱齡就傅便號禮宗見貞女序注綺嵗于歸即稱家督見逸齊序蘋蘩不匱擬尹姞以無慚詩榛栗相將禮女贄不過榛栗脯棗左傳榛栗棗修以告䖍也較郝鍾而何讓見葉母序書􅈺內則禮實閫裡之黃香見琴怨序福衍箕疇書本仙家之毛女見貞女序然而竹痕善暈不逢涕淚以奚斑見憺園賦劍氣嘗橫匪遇沈埋而曷紫見園次序忠臣許國恆遭盤錯以彌伸漢虞詡傳鄧隲惡詡出為朝歌長時朝歌多盜故舊皆弔之詡曰不遇盤根錯節何以别利器健婦持家見劉太母序每遘漂搖而益厲詩但使雍容井臼未足徵其慷慨之竒徒令黽勉虀鹽猶難顯厥艱貞之烈也見井叔序孺人命實不猶家偏多難詩蓋司馬騎箕之嵗見藝圃序即石麟墮地之年見憺園賦絰以免身禮髽而就蓐髽髻見貞女序就蓐見映碧啓茁蘭芽於身後昌黎馬君志馬燧幼子娟好靜秀瑶環瑜珥蘭茁其芽弱息疇憐見潘母啓萎梁木於生平檀弓夫子病子貢請見夫子方負手曳杖逍遙於門歌曰泰山其頽乎梁木其壞乎哲人其委乎藐孤奚托見翼王序况復運有平陂見楚鴻序時更凉燠撫門前之棨㦸見看奕賦燕去誰家見玉巖序檢篋裏之貂蟬見半繭賦鶴歸何處見存菴序梁朝才雋將為衣葛之人見吳太母啓楚國公卿竟有負薪之子見竹逸序凡兹大厦之傾危見鄴園啓總驗未亡之節操見葉母序偉兹巾幗荷此門楣錦因受濯而逾鮮見園次序玉以遭焚而倍潔見懸圃序春風夜月開殘貞女之花見海棠賦碧海青天填盡帝娥之石見無忝序鼓絃聲之嘹嚦一曲將雛古樂府有鳳將雛雉將雛曲玩藥影之葳𬎼見瑞木賦半欄獨活見丁香賦燈下則紅顔暗老紅淚全枯膝前則黃口將乾黃泉可見家語孔子見羅雀所得皆黃口小雀因問之對曰大雀善驚小雀易得耳左傳不及黃泉無相見也庶其成立畢我劬勞詩詎期噩夢之未終見竹逸序更遇驚飈之不定見潘母啓子還生子更加失母之憐悲以增悲轉觸所天之痛舒祺哀此兒尚小見鞠存啓范丐實童子何知左傳晉楚遇於鄢陵范丐趨進曰晉楚惟天所授何患焉文子執戈逐之曰國之存亡天也童子何知焉乃猶輾轉含飴見儲太翁啓咿唔課讀和熊食蓼用成博士之名和熊見潘母啓食蓼載詩截髲封䱹勿墮尚書之業截髲見徐母序封䱹見李母序以至割郈成之宅出自叉笄見半繭賦築巴婦之臺成於織絍見葉母序情通任恤歌壽母者千家誼篤恩勤鞠遺雛者兩世此誠彤管所難名抑亦青閨之僅見矣比者浪湧三江潮飛兩浙見樂府序笳吹郭外驚蟻陳之縱橫見天章序燧暗山中見滕王賦駭狐鳴之搶攘見天章序惟兹蕞爾左傳注蕞爾國藐小如蕞也亦致焚如易火延趙禮之家箭入薛包之室詳施公誄杜詩箭入昭陽殿笳吹細柳營而能鎮以安閒處夫義命臨危不擾頗多達者之言遇變能全蚤著哲人之見歷稽前媛逖覽曩編雖饁耕隴畔賢哉冀缺之妻見井叔序設饌堂前藉甚伯仁之母世說周浚為安東將軍行獵值暴雨過李氏李有女名絡秀作數十人飲食事事精辦不聞有人聲密覘之狀貌非常浚因求娶父兄不許絡秀曰門户殄瘁何惜一女父兄從之遂生伯仁兄弟浚語伯仁等曰我所以屈節汝家者門户計耳伯仁由此與李氏世為姻婭烏能嫓此芳華均其憔悴者乎僕也夙附通門見鞠存啓注新承把袂見曜菴序躋堂介壽知八袠之旋登上國掄英况羣賢之畢集五十載菤葹之草心緣屢摘而多傷南越志寧鄉縣草多菤葹拔心不死一稱宿莽離騷夕攬中洲之宿莽郭璞贊卷施之革拔心不死屈平嘉之諷詠以此李詩卷施心獨苦拙却死還生三千年松柏之枝節以後凋而益茂語佇希編貝見璿璣賦莫辜良友之心伏冀搖珠見壽徐序遍拜仁人之賜陳檢討四六卷十六
