body:
  text: 陳檢討四六卷十五翰林院檢討陳維嵩撰啓徵浙江總督李鄴園先生詩啓蓋聞鯨波起陸倍資作又之臣左傳古者明王伐不敬取其鯨鯢而封之以為大戮崔豹古今注鯨魚大者長千里杜詩溟漲鯨波動鶉火焚輪彌仗廓清之佐左傳晉史趙曰陳顓頊之族也嵗在鶉火是以卒滅注鶉火南方柳星午位夸父逐鄧林之杖列子夸父逐日而死棄其杖尸膏肉所浸生鄧林並見天篆序忠可回天詳銀臺啓二師飛疏勒之泉誠能動地見歸田序從來陰雨盡藎臣拮據之秋詩在昔雲雷正誼士經綸之會易太常論定鐫以鐘鏞君牙紀于太常注太常王之旌旗也有功者書焉後漢書崔駰傳達旨詞曰乃將鏤元圭册顯功銘昆吾之冶勒景襄之鐘幕府功成見滕王賦宣之鐃吹漢樂府曲有短簫鐃歌凡軍中所吹謂之鐃歌鼓吹鄴園李老先生名叶瑤樞見璿璣賦光分絳斗𣲖從函谷見天篆序注韜鈐工玉帳之書抱朴子兵在太乙玉帳之中不可攻也注將星所坐前一位謂玉帳唐藝文志李靖有玉帳經一卷其法出于黃帝遁甲郡入平原人物稟金精之氣李白傳賀知章見白蜀道難詩曰公豈天上星精耶注白稟長庚金精而生䇿名上第釋褐華年見玉巖序甫由李郡之司詳映碧啓便簉望郎之署見園次序風飄繡豸見祖德賦蒞此臺端見賀徐序霜冷啼烏陟於卿二見祖德賦粵以班僚之貴膺夫簡畀之崇遂𨽻雄藩爰申新命勳階屢擢服官騰俊烈之聲揚歷頻經率屬擅清剛之譽然而弓開似月必逢貫蝨以稱竒列子紀昌學射于飛衛曰視小如大視微如著而後可告昌以氂懸虱于牖南面而望之旬日之間浸大也三年之後如車輪焉貫虱之心而懸不絶劍淬成花恆為剸犀而耀彩見園次序假若歷陽未叛末由彰陶侃之忠晉書蘇峻歷陽內史成帝咸和二年舉兵入朝陷京師陶侃溫嶠合兵追斬之如其并土無危奚自表劉琨之節見歸田序按劉琨為幽并冀三州都督藥以獨搖而倍苦見丁香賦路因九折而偏難見半繭賦及商尹序注乃者八州作督之年竟遭三孽方苞之事詩羣陰肆狡謬效連雞左傳申公謂莒子曰狡焉思啓封疆國䇿秦惠王曰諸侯不可一猶連雞之不能止于棲諸鎮潛謀妄營犄角見翼王序王審知鴟張于海國變起須臾見王巖序陳𢎞進豕􅊳於蠻天釁生呼吸補注波將漸及左傳蔓恐難圖左傳祭仲曰母使滋蔓蔓難圖也遍南戒以倉皇見天章序屬西鄰以臲卼見納姬序注斯時也七閩關隘首説仙霞衢州志仙霞關為入閩之界宋史浩帥閩過仙霞嶺以石甃路凡三百六十級在衢州江山縣全浙門庭惟憑太末衢州志春秋為越西鄙姑蔑地秦曰太末唐曰衢州桓桓䇿府率虎旅以嬰城書尚桓桓如虎如貔嬰城見賀周序仡仡元臣奉蠟丸而建節麈史軍中密疏以蠟丸封之扼諸境上躬在行間﨑嶇陷陳高搴姑蔑之旗見上注慷慨鼓儳硬挽錢塘之弩左傳宋公楚人戰于泓子魚曰聲盛致志鼓儳可也唐書錢鏐封吳越王嘗築捍海塘適江濤怒嚙鏐命強弩數百射之濤為斂却固已六千君子見懸圃序共明填海之本懷見無忝序百二山河詳孟太母啓咸喻補天之壯志矣見憺園賦顧猶人各有心時方多難飈當起處間生鳴鏑之心漢書冒頓乃作為鳴鏑習勒騎射左思詩邊城苦鳴鏑注嚆矢也草欲枯時競作彎弧之狀見素伯序注瀫水桐溪之界衢州志龍遊縣唐縠州地有瀔水嚴州志桐廬縣有桐君山下瞰桐溪有異人來采藥問其姓指桐以示因名青犢彌山詳孟太母啓甬東於越之區左傳越滅吳使吳王居甬東寧波府志越曰甬東有甬江樓紹興志禹會諸侯計功于此曰會稽少康封少子無餘于會稽因名於越蒼鵝蔽日見懸圃序公乃宵攜别隊鋭頭突鬢之夫史記武安君小頭而鋭􅊳鬢見前序間挈輕軍扛鼎翹關之輩漢書項羽力能扛鼎列子孔子徑能招國門之關而不肯以力聞注招與翹同吳都賦翹關扛鼎爬斯癬疥烹宋萬於軍中鮮卑著邊陲之患手足之疥搔左傳宋萬弒閔公奔陳宋人請南宫萬于陳醢之潰厥癰疽縳陳豨于帳後史記陳豨傳陳豨宛朐人也高祖封為列侯後豨反十二年冬樊噲軍卒追斬豨于靈丘倐王師之直下俄宗子之遄征浙土全收閩疆再造七年擐甲力竭於飛箋草檄之中左傳文公躬擐甲胄五夜援枹恩深於伐畔侮亡之外左傳右援抱而鼓林注枹鼓槌也書取亂侮亡遂使無諸城上見玉巖序依然荔子之紅詳鞠存啓注頓令仙鯉洲邊見玉巖序不改檳榔之緑見孝威序蓋力支大厦總天家之籌畫居多而手障狂瀾實閫外之勤勞最著也漢書大厦將傾非一木所能支進學解障百川而東之回狂瀾于既倒馮唐傳王者遣將曰閫以外將軍制之所愧吳人原非越鳥見無忝序公也門高元禮尚阻登龍見九日序僕兮員綴微班猶慳執雉曲禮凡贄大夫雁士雉注取雉性耿介也而乃濡毫頌德將母越境之嫌國語臧文仲曰外臣之言不越境注言臣不外交也削柿鳴情語林宋任末年十四便勤學編莒為廬削荆為筆一作柿詎免隔垣之誚見少楹序不知方事之殷左傳楚子使工尹襄曰方事之殷也注殷盛也有鄰將􅊤孟子向也三江浪湧見樂府序疑漂壽夢之墟左傳吳子夀夢名乘五嶺烽橫幾達專諸之巷廣州記大庾始安臨賀桂陽揭陽為五嶺史記刺客傳專諸者吳堂邑人也吳公子光具酒請王僚使專諸置匕首魚炙之腹中因刺僚吳志闔閭城內有專諸巷公如暇豫疇免阽危迢迢厚德高于回雁之峯見素伯序烈烈豐功訖彼無龍之國補注凡兹覆載並囿生成何况牛女同星見玉巖序魯邾接柝見尺牘序夙有輔車之勢見園次序原非牛馬之風左傳齊伐楚楚子使與師言曰君處北海寡人處南海惟是風馬牛不相及也則今日興言偉伐豈徒為鄰室之歌呼眷念成勞本不僅越人之肥瘠見壽閻序賡謡詎僭揚扢非誣猥逢降嶽之辰先效躋堂之祝詩伏冀鴻都學士見存菴序虎觀詞宗詳合肥書注分題翡翠之箋見智修序爭捧珊瑚之筆見天篆序庶幾人同召穆詩四詩賡分陜之勳四詩見天篆序分陜見佳山序注還期文駕昌黎百尺勒平淮之頌唐憲宗紀李訴夜襲蔡州擒吳元濟裴度入蔡州淮西平昌黎平淮西碑羣臣請紀聖功被之金石皇帝以命臣愈臣愈再拜稽首而獻文徴大銀臺柯素培先生六十夀言啓蓋聞絳闕岧嶤鳥篆著桂陽之籍銀膏滴瀝鴦漿㪺菊井之齡唐説紫鴦漿可延壽十洲賦裏浮瑞氣於東瀛五嶽圖中燭榮光於南戒梁書宗炳字少文妙琴書工圖畫逺公結白蓮社炳其一也以疾還江陵乃作諸名山圖于室曰惟當臥遊耳五嶽見賀周序南戒見天章序彭籛嵗月見玉巖序傅説星辰見藝圃序惟箕子之疇多書故于公之門大見憺園賦恭惟素翁柯老先生武水名家魏塘右族百年喬木代擢珠柯見祖德賦五色甘瓜世綿丹瓞見滕王閣賦高蟬臨鬢見祖德賦從來雙戟之門見看奕賦吟鷺陪軒鹵簿令白鷺鸞旗等車並駕四馬白虎通諸侯路車大夫軒車士飾車庾信吳明徹銘高蟬臨鬢吟鷺陪軒按鷺車御史所乘自昔三槐之里宋史王佑字景叔手植三槐于庭曰吾子孫必有為三公者尊公楚蘅太老先生羽簉鵷班唐書上官儀曰御史供奉墀下接武龍夔簉羽鵷鷺豈判佐比耶蔡衡曰凡象鳳者有五多赤色者鳯多青色者鸞多黃色者鵷多紫色者鷟多白色者鵲名標雁塔西域記晉有比丘見雙雁飛忽一雁沒下自隕乃瘞雁建塔古今詩話韋肇及第偶于慈恩寺雁塔題名後成故事自唐神龍來同年中推善書者紀之他時有將相則朱書之雙龍闕下人來杏苑以看花見徐母序九鯉河邊見玉巖序官是榕城之司李見映碧啓釋之治獄共號祥刑漢書張釋之字繼南文帝時拜廷尉時人語曰張釋之為廷尉天下無寃民永叔掄文交推得士宋書歐陽修字永叔觀子也為學士知貢舉崇雅黜浮緣兹隱德遂兆緑蛇蟠笥之徵見祖德賦惟厥高閎爰呈彩燕投懷之瑞明皇實録張説母夢玉燕自東來投入懷中因而有孕生説後為相先生夙譽鳳毛長誇犀角見三芝序神姿軒異同趙昶之在衆中下注進止雍間類裴休之來座上唐書裴休醖藉進止雍間宣宗嘗曰休真儒者孟公則長踰八尺顧盼非常見得仲序子山則腰帶十圍儀觀甚偉令狐德芬撰庾信傳子山身長八尺腰帶十圍容止頽然有過人者晉書庾子嵩不滿七尺腰帶十圍爾其韋平世胄接踵巍科見智修序崔蔡鴻篇騰聲上國見紫來序青袍釋褐見玉巖序蚤製錦夫棗陽製錦見二齋序襄陽志棗陽縣漢蔡陽隋棗陽銀艾牽絲銀艾見存菴序牽絲見歸田序便飛鳬於花縣飛鳬見二齋序花縣見楚鴻序斯時也慨三尺之無人正四郊之多事襄陽堤上猶事提戈鄖口江頭還聞傳箭襄陽志周為榖鄧地春秋屬楚古迹有大堤城即郡城也鄖陽志古縻國地春秋屬楚為錫穴隋曰鄖鄉將軍下瀨黃龍青雀之船見滕王賦君子習流見懸圃序繡鎧珠袍之隊吳都賦珠服玉饌先生則􅊩此凋殘會斯旁午劉晏云邀請旁午注縱橫割牲也捷録使者旁午注交錯也青芻匝地遙連陶侃之洲詳李母序紅粟如山高並甘寧之壘賈捐之對粟紅腐而不可食吳都賦䚕海陵之倉則紅粟流衍吳志甘寧為孫權將步則陳車騎水則連輕舟以百餘兵禦曹兵四十萬並見梧月序民無怨讟左傳民不罷勞君無怨讟一作黷卒鮮譁呼書張遼臨於赤壁如行袵席之間見賀徐序武昌志嘉魚縣即周瑜破曹操處蘇軾誤為黃州周禮袵席牀第王濬下於巴邱不改樵蘇之業晉紀王濬為巴郡太守遷益州刺史出巴東作大筏又作火炬于是戰艦無所礙徑造建康吳主皓詣降輿志漢巴邱今嶽州府左傳請無禁樵採者以誘之庾信哀江南賦張遼臨于赤壁王濬下于巴邱常聞元結詩紀舂陵唐書元結字次山為道州刺史因安史之亂為民免徭役常作舂陵行其序約云道州不勝賦稅承諸使徵求符牒吾將守官靜以安人待罪而已襄陽志棗陽縣有舂陵城漢元帝時望氣者曰鬱鬱蔥蔥及光武即位改曰章陵又見羊公碑留峴首見梧月序時則經略洪公奬此殊猷緘蠟丸而上表見鄴園啓以暨一時督撫旌其偉績裂雁帛而陳箋漢書蘇武久留胸奴常惠教漢使謂單于曰天子射上林中得雁足而繫帛書武等在某澤中單于驚謝歸武疊承三命之褒揚易屢被九重之賞歎帶垂赤荔見寶汾序風翻子産之衣見憺園賦綬綻紅桃見半繭賦日麗晏嬰之宅見憺園賦特拜黃門之職洊升青瑣之班詳下揚歷諸垣翺翔兩省見黃門序注爾乃沈沈左掖白簡增寒見黃門序及賀徐序諤諤夕郎丹心不涅衛宏漢儀給事中黃門侍郎令日暮入對向青瑣門拜名曰夕郎伏蒲仗下見黃門序恆牽已起之裾魏志文帝欲徙冀州十萬户辛毗諫帝不答而起毗隨引其裾補牘懷中每斷將馳之靷後漢書光武自將征隗囂光祿勳郭憲諫曰東方初定車駕未可逺征乃當車拔佩刀以斷車靷帝不從後河東兵叛帝曰吾悔不用郭子橫之言加以器宇端凝風裁峻整修篁獨挺只欲彈蕉梁沈約修竹彈甘蕉文長兼淇園貞幹臣修竹稽首臣聞芟荑藴崇農夫之善法無使滋蔓翦惡之良圖竊蘇臺前甘蕉一叢本無芬馥之香柯條之任溫樹忘言見良輔序惟圖傾藿曹植表葵藿之傾葉太陽雖不回光然向之者誠也夕陽亭下殊多解綬之人見商尹序宣政樓前不少免冠之輩見黃門序注况復蒿目時艱見佳山序惕懷民瘼詩比有松陵之客為言笠澤之間詳潘母啓屬因水潦之頻仍以致田廬之蕩析書伍胥潮至一軍悉化為沙蟲王充論衡伍胥臨水為濤錢塘志于胥死浮于江中因流揚波或見乘白馬素車在潮頭因為立廟每嵗仲秋既望潮水極大杭人以旗鼓迓之㺯潮之戲始此然或有沈溺者穆天子傳穆王南征一軍皆化君子為猿為鶴小人為蟲為沙文種濤來三版將生夫蛙黽文種傳種字子禽勾踐平吳乃賜種劍遂自殺水經注文種沒後錢塘于八月望見有銀濤白馬依期往來通鑑智伯圍晉陽而灌之城不沒者三版沈竈産蛙民無叛意先生則疾呼閶闔慷慨陳情曲繪閭閻淋漓入告宋書鄭俠字介夫監東京西上門繪流民圖上之神宗越三日大雨誠能格主遂蠲一嵗之租力可回天獲請萬人之命唐書張元素諫太宗修洛陽宫魏徴曰張公論事有回天之力夫其一節足槩千端此真全中牟之雉未能儷此生成除雲夢之蛇不克方兹恩澤也見賀周序逮積勳資纍遷卿寺日親紫闥見瀛臺序佇踐黃扉見佳山序而乃志切瞻雲見考功序情深愛日見壽閻序時則先生太母俞太淑人已將八帙矣於是斑衣奉母見淡園賦晝錦娛親見逸齋序冬缸夏簟聊申烏鳥之私見梧月序及考功序碧水丹山敢託煙霞之痼梁書江淹為建安令嘗言碧水丹山生平酷好何嫌僻逺唐書田遊巖隱箕山高宗幸嵩山親至其門遊巖野服出拜帝曰先生此佳否對曰臣所謂泉石膏肓煙霞痼疾者靈萱半畝藝在堂前見憺園賦孝笋千竿森於砌下見􅋯菴序翼版輿而登降依子舍以邅回見憺園賦揚舲雪後瑁湖之萬頃堆銀松江志瑁湖為三湖之一著屐花前甫里之千枝綴玉甫里見􅋯菴序驥兒繞膝見祖德賦鴻案齊眉見貞女序趨庭是鳳竟踰薛氏之三會食皆龍不羡荀家之八見逸齋序人間盛事天上昌期乃者節屆青陽見壽季序筵開絳縣見壽閻序屬新嵗履端之候左傳先王之正時也履端于始舉正于中歸餘于終為先生周甲之辰見逸齋序在銀臺公入侍魚軒官制唐立銀臺司即今通政司也魚軒見葉母序敬謝引年之斚詩在內翰孝廉君輩出扶鳩杖見映碧序願持介壽之觴詩某等幸列通門詳鞠存啓欣叨猶子記曰兄弟之子猶子也蓋引而進之千春蘭譜聿藉鳴鐘饌玉之文見少楹序十賚芝函高士傳陶𢎞景作雲林十賚賚其子弟式逢駕鶴驂鸞之會見貞女序伏惟蚤惠瓊瑶更望廣徵珠玉椒觴湛碧飛來縹碧之箋崔實四民月令椒為玉衡之精服之令人却老正月朔列先祖前子姓各上椒柏酒于家長碧箋見璿璣賦注火樹舒紅唱去小紅之曲蘇味道詩火樹銀花合小紅薑夔詞小紅低唱我吹簫附注唐書趙昶字大東宛丘人神姿軒朗而內沈厚兄犨子翊一家三節度儲太翁九十徵詩啓陽羡儲孔恢先生常州志宜興古迹有陽羡城秦曰陽羡門第高華家聲通顯庭施棨戟見閨秀序埒河北之崔盧見楚鴻序座滿貂蟬見半繭賦駕江東之顧陸見尺牘序甲第則彯纓戛轂見九日序清門望重夫衣冠人文則削素含毫見藝圃序及鄴園啓才子名標於翰墨先生幼則岐嶷長而豪俊雍容鶴蓋見祖德賦不矜紈綺之風見玉巖序淹雅雞林白居易别傳居易詩人爭傳之雞林賈人取售異國率篇易一金按雞林海外國名大得風雲之氣蓋萬石諸郎俱擅無雙之譽見歸田序而燕山五桂見憺園賦此為第一之枝晉書郤詵曰臣對䇿為天下第一猶桂林一枝崑山片玉維時參藩公既藉甚朝班先生復翩然藝苑韋家有子羣識玄成漢書韋賢封侯其子玄成字少翁讓弟嗣父爵衆高其節帝因召為郎論五經于石渠閣父子俱以明經拜相封侯諺云遺子黃金滿籝不如教子一經謂玄成也劉氏諸賢尤推孝綽梁書劉孝綽族中七十人皆能文孝綽名最重並見三芝序於是映雪傳經見茹蕙序歌風見志見佳山序志亡書之三篋見天篆序搜逸史于百家西園結客見尺牘序屏間泛鸚鵡之杯見鷹垂序東觀論文見壽季序席上賦柟榴之枕見季青序時論則諸生祭酒事原周封兄弟同姓成王時彤伯為祭酒秦漢因之鄉評則大雅扶輪見得仲序漢景十三王傳夫惟大雅卓爾不羣加以井里升平家門豐豫吳季札延州貴胄雅號知音見初明序周公瑾江表英姿偏能顧曲見良輔序時則羊侃侍兒錦靴蹈地見壽季序李波小妹薄鬢彎弓見壽季序舞回風之十部漢書武帝宫人名麗娟者身輕弱不欲衣纓拂恐體䀶也于生芝殿唱回風之曲庭樹為之翻落并見昭華序歌落月以雙鬟補注柝鈴周匝見葉母序千條之紅燭薰天見園次序箏笛參差百丈之碧綾委地見雪持序蓋雄心欲耗聊慷慨乎絲奮肉飛見觀槿序而壯志難灰或􅀈唶乎酒闌燈灺見雪持序無何而世歷滄桑見舜民序人堅松菊舞衫歌扇惝恍前生酒陳文觴闌珊昔夢先生則篝燈課子含飴弄孫後漢紀馬太后曰吾但當含飴弄孫里名通德盡知此日之徵君見祖德賦江近潯陽共識彼中之高士見園次序高士傳周續之入廬山事釋慧逺彭城劉遺民遁迹匡山與淵明為潯陽三隱道風彌邵至德可師後漢書鍾皓以篤行齊名荀淑李膺常嘆曰荀君清識難尚鍾君至德可師爰乃文孫書長能廣期軾轍連鑣郊祁並轡見徐母序張華兩劍同日干霄韓起雙環一朝辭櫝見園次序聲傾都會人倫俱奉為美談名動公卿戚里尤矜為盛事諸孫鵠峙處姊尚未適人羣幼鸞停此客得無小異韓愈撰馬燧志見王于北平猶高山深林龍虎變化退見少傅翠竹碧梧鸞停鵠峙按馬燧贈北平郡王少傅王之子處姊見雪持序此客見三芝序先生則年踰耄耋聽視不衰齒近期頥神明自若見徐母序矍鑠晴原尚臨風而却杖摩娑畫閣或負旭以鈔書秋雨赴雞豚之社五兩衝泥詩葛屨五兩春燈占角抵之棚千觴醉月樂府雜録角抵之戲六國時所造李斯傳作觳抵張騫傳作角氐兩兩相當角力相觸并詳田太翁啓注庾肩吾詩角抵良家兒李白序飛羽觴而醉月姬人入道半已黃絁詩紀有送宫人入道題説文絁粗緒也鄰叟談禪都成白首洵號世間之人瑞直稱地上之行仙今兹上浣之辰見壽閻序正啓九旬之宴守淇澳武公之戒敬慎威儀詩授濟南伏勝之經表章經籍見昭華序汾陽公一門顯秩唐書郭子儀華州人為天下兵馬副元帥克復兩京封汾陽郡王八子七壻俱顯官褒德侯九帙崇班見壽季序值此光榮可無揚扢當世名賢同時先達賜之華衮見懸圃序錫以瓊瑶詩或孝養賦白華之頌見瑞木賦或遊仙賡紺雪之詞詳任丘啓庶幾橘中八叟見徐母序並下始青之軿度人經昔于始青天中碧落空歌芝田四皓見映碧序齊鼓小紅之曲見銀臺啓徵田太翁八帙壽言啓河盤九曲出碣石而彌雄河圖河水九曲長者入于渤海碣石見渭仁序玉耀連城見昭華序孕藍田而更貴漢地里志藍田縣本秦孝公置山出美玉三秦記玉之美者曰球其次曰藍西京賦爰有藍田珍玉吳志諸葛恪少有名孫權見其父瑾曰藍田生玉真不虛也晉書謝𢎞微子名莊七嵗時宋公異之曰藍田生玉豈虛也哉人言松柏不産培塿左傳鄭子太叔曰培塿無松柏共説山川能生雲雨禮天降時雨山川出雲從來食福必歸積德之家大抵成仙原屬修身之士華辰祝嘏見徐母序羣公既薦幣以承筐詩晝錦張筵見逸齋序賤子且歷階而揚觶見壽閻序不辭固陋用效賡揚兹啓某翁田太老先生者系自西河郡分京兆詳下門風瓌麗漢宫題柱之聲華三輔決録田鳳字季宗為尚書郎容儀端正每奏事靈帝目送之因題柱曰堂堂乎張京兆田郎才地通明稷下懸河之苗裔見九日序七略齊田駢好談論齊人語曰天口駢世説孫興公謂郭子玄吐章陳文如懸河㵼水勝衣對客見素伯序器自别於常兒毁齒知名見素伯序門詎書夫凡鳥見􅋯菴序桑梓寄彌牟國內詩維桑與梓登州志三面距海春秋牟子國枌榆逼離石城邊枌榆見觀槿序按山西永寧州亦稱離石城晉卿六族此鮮其儔史記晉六卿趙襄范宣智襄韓簡荀文魏襄齊國諸田君真其後見賀徐序然而雛方在鷇詎使摩霄國語里革諌宣公曰鳥翼鷇卵注生哺曰鷇莊子聖人鶉居而鷇食桐甫稱孫空思向日白居易詩梧桐老去長孫枝詩梧桐生矣于彼朝陽子推狷介并無綿上原田見劉太母序郭泰孤貧徒墊雨中巾角郭泰别傳林宗丰儀秀偉嘗遇雨巾一角墊時爭效之故折巾一角其見慕如此漂搖邦國蕭瑟鄉關睘睘六尺之童落落四方之志於是長懷樂毅只欲投燕樂毅列傳樂毅仕燕下齊七十餘城後昭王死惠王立遂以騎劫代毅畏誅乃降趙後惠王因騎劫敗悔失毅毅報書往來復通燕燕趙二國以為客卿不效賁皇惟知奔晉左傳楚若敖之亂伯賁之子賁皇奔晉晉人與之苗以為謀主十四齡髫年羈貫見雪持序扉屨疇資左傳鄭申侯見齊侯曰若出于陳鄭之間共其資糧扉屨其可也百千年古道迢遙壺餐莫給左傳晉侯問原守于寺人勃鞮對曰昔趙衰以壺飱從徑餒而弗食故使處原望滹沱而莫止瞻督亢以如歸漢書光武至滹沱河王霸曰氷堅可渡注其地屬保定河間之界督亢見考功序擇地在三輔五陵之內見渭仁序土厚泉甘卜居近千門萬户之旁見藝圃序物華天寶載王勃賦人如端木時來曹魯之間智擬居陶頗用計然之䇿史記貨殖列傳子貢既學于仲尼退而仕于衛鬻財于曹魯之間又范蠡既雪會稽之恥乃喟然嘆曰計然之䇿七越用其五而得意既已施之國吾欲用之家乃乘扁舟于江湖之陶為朱公陶天下之中貨物所交易也按計然勾踐臣著有計然子三年成聚褎然通德之門五世其昌煥若集賢之里見祖德賦爰乃文以情生禮緣義起北堂饋食潔洗腆以娛親書東道班荆見禹平序結珩璜而贈友一門輯睦椸無常主之衣見賀徐序三黨雍和巷有同功之火晏子三黨待以舉火者千人同功補注井飛孝鯉恆依萱草之闈簷噪慈烏不去荆花之館見瑞木及憺園賦以暨寬能逮下王褒之僮約寧苛見葉母序和以與人楊子之客嘲無怒見佳山序奚煩馮暖代為市義於薛中國䇿馮暖謂孟嘗君曰今君有區區之薛臣竊矯君命以責賜諸民因燒其券乃臣所以為君市義也不類趙宣徒願沾恩於桑下見壽季序此又冽冽氿泉既注兹而挹彼濃濃桃李詩復自葉以流根者矣文選張士然表曰臣聞春雨潤木自葉流根鴟鶚恤功愛子及室如斯之類懿不勝書遂來韓起之雙環呈於膝下聿覩張華之兩劒騰在雲邊見園次序此荆巖太史才雄虎觀見鄴園啓爭誇宋豔以班香見瀛臺序而某年翁賦重鴻都見鄴園啓羣美庾清而鮑俊也見瀛臺序兹惟夏季齒屆八旬論甲子於桂陽瞪乎後矣見銀臺啓按桂陽張碩即遇神女杜蘭香者遇老人於絳縣公然過之見壽閻序所望其譜妍詞均搖綵筆遐不謂矣朱輪丹轂之賔漢書劉向諫外家封事曰王氏乘朱輪華轂者二十三人解嘲客欲朱丹吾轂何以觴之緑醥黃封之酒緑醥見瀛臺序東坡詩上尊白酒瀉黃封按玉笙於指下六月生涼燒絳爉於盤間三更若晝丁年玉樹跽斟延壽之杯見壽閻序􅕀字銅仙左傳晉史趙曰􅕀有二首六身下二如身林注古􅕀字二畫在上三人在下故以二為首以六為身下􅕀字上二畫豎置身旁始身當為字蓋二首為二萬六身為六千六百六十日喻絳縣老人七十三也劉禹錫詩午橋良吏散􅕀字老人迎笑聽長生之曲見徐母序則魚龍曼衍繅來雪藕之絲漢書武帝作魚龍角抵曼衍之戲師古曰曼衍獸名為舍利之獸先戲于庭極畢乃激水化成比目魚跳躍潄水作霧障日化成黃龍即西京賦云海鱗變而成龍也李義山詩不須看盡魚龍戲終遣君王怒偃師拾遺記周穆王集方士春霄宫與王母玉帳高會進萬嵗氷桃千年碧藕鸞鶴繽紛濾就碧蓮之粉終南山記山有旱藕餌之延年名碧蓮類葛粉伏祈惠我曷任跂余詩為溧陽彭太翁太母七十雙壽徴詩啓吳雲入越見園次序國山綿亘於平陵吳志吳主皓時山頂有大石自立皓封為南嶽因名國山在宜興溧陽縣志古稱平陵縣有平陵城古迹魯柝聞邾見尺牘序瀨水瀠洄於陽羡瀨水見昭華序陽羡見儲太翁啓焙茶客去稔知彼地之高閎斸笋人來詳述此中之巨閥則有門呼萬石見歸田序人號五經見逸齋序蛇能蟠綬偏呈集慶之符見祖德賦雀擬銜環洊食發祥之報見素伯序如我某翁彭太老先生者星分井絡晉左思蜀都賦岷山之精上為井絡注岷山為東井星絡之維李商隱詩井絡天彭一掌中系出商賢見玉巖序修兮俊烈夙標獨行之名漢書彭修字子陽年十五時父為盜所劫修拔刀向盜曰父辱子死盜驚曰童子義士遂遁去嘗作吳令從太守討賊賊請降曰自為彭君非為太守也宣也淹長蚤擅通經之目漢書彭宣師事張禹受易禹薦宣明經博古有威重可任政事除右扶風拜司空王莽專政見險而止門風烜赫繡戟連雲家學淵源彩毫滴露曾祖南陽公升華紫闕罔希簪組之榮父雅存公䇿俊青袍甘蹈丘園之秀陸機連珠詞丘園之秀因時則揚數傳積德詎願人知屢世行仁祇承家訓先生姿稟通明才鋒瑰異髫年製錦名更噪於楊梅見素伯序壯嵗摛文價倍高於鸚鵡見少楹及商尹序况復政施門內書爻繫家人易庭羅讓木見禹平序紛敷而下茁忠葵見賀徐序井溢廉泉見劉太母序觱沸而旁飛孝鯉見瑞木賦陸智初幼多至性橘常墮於懷中見憺園賦按陸績字公紀懷橘遺母智初乃陸續字誤用吳隱之毁不勝喪鶴為鳴於庭下見憺園賦生事則羶薌䐹腒婉以承歡羶薌見瀛臺序䐹腒見賀徐序廬居則窆繂練祥貧能中禮喪記以兹篤厚足覘鳯卜之昌見祖德賦緣彼恩勤定兆駟門之大見憺園賦而乃天躓其才物屯其遇九鏖文戰通典赴貢試院謂鏖戰棘闈集韻鏖戰器兩中副車見葉母序朝朝爨下燒殘蔡氏之桐見佳山序嵗嵗堂前漂去高家之麥見懸圃序奏凌雲而莫惜見實菴序撫流水以疇憐見園次序是則楊朱失路達人亦以此興懷見竹逸序李廣難封行路亦於焉致嘆見素伯序繼而令嗣蒃洲先生掞藻金閨見園次序蜚英玉局翰林志史館為玉局次公早貴見歸田序伯兄復望重飛鳬見二齋序仲孺先鳴見歸田序季弟又才高繡虎見祖德賦一門鵲起見祖德賦三雅鴻騫見商尹序華貂插鬢見半繭賦雲霄則姑付諸郎皎兔懸空風月則長歸老子見歸田序人情不逺亦己稍酬翰墨之勳時論相同謂宜早受絲綸之錫先生則興來撫掌見樂府補序終愛聞絃見桐初序醉後搔頭易林左手搔頭難忘見獵見桐初序廉頗矍鑠猶存車中擊刺之形史記頗出奔魏趙王復思之使人視頗頗見使者一飯斗米肉十斤披甲上馬以示可用並見看奕賦馬援飛揚尚為鞍上拍張之狀漢列傳馬文淵年八十餘聞武陵五溪蠻反自請行據鞍顧盼以示可用帝笑曰矍鑠哉是翁也拍張詳掌亭誄陶謙素性只樂幡旗補注劉峻本懷惟耽書卷見憺園賦耆齒七十皇路三千猥以來春始賔太學桃堪染綬見半繭賦肯令豎子成名國䇿龎涓曰遂成豎子之名晉書阮籍嘗登廣武觀楚漢戰處曰時無英雄遂使豎子成名耳柳用裁衣見寶汾序不礙老夫作達見季青序固已朱顔緑髮無須鴻烈之仙方見贈閻序及徐母序碧奈黃精無假喬松之祕訣矣拾遺記崑崙山有奈冬生子碧色九華真妃詩仰掇碧奈花抱朴子黃精一名兔絲一名救窮一名垂珠神仙傳尹軌字公度常服黃精花聖主得賢臣頌何必詬噓呼吸如喬松眇然絶俗離世哉王子喬見滕王賦列仙傳赤松子者神農時雨師也服水玉以教神農仙術神異傳黃初平改字為赤松子加以性尚蕭疏不為崖異胸惟坦率詎設畦町莊子人間世蘧伯玉謂顔闔曰彼且為無町畦亦與之為無町畦彼且為無崖亦與之為無崖注無畔岸無涯際也長日赴雞豚之會桐帽棕鞋晴天赴櫻笋之筵酒旗戲鼓傾蓋而何分少長三命逾恭家語孔子之郯遭程子于道傾蓋而語終日甚相善焉左傳孟僖子曰孔丘聖人之後也昔正考父佐戴武宣三命兹益恭銜杯而莫問春秋千觴必醉見儲太翁啓婆娑里閈都忘兒是貴人見歸田序注跌宕琴尊見初明序其羡翁真健者見無忝序此又葆其純一知上士之天已全莊子其天全也享此期頥見壽閻序驗仁者之徵必壽也論語德配吳太夫人鴻案相莊見貞女序鹿車對挽見壽閻序盤􅓢事舅見瑞木賦允宜夫子之家雜佩留賔詩聿起佳兒之譽羣稱閫範交頌禮宗見葉母序際此華辰張兹綺宴遞進千齡之祝同開七帙之觴河將駕鵲見憺園賦乃金妃設帨之期神異録木公為東王公金母為西王母男子行道名𨽻木公女子行道名𨽻金母神仙傳西華至妙之氣化生金母集仙録王母者龜山金母也居崑丘非飈輪不可到設帨見壽閻序嶺正舒梅詩注嶺上十月有梅是綘縣懸弧之旦見壽閻序德門盛事嘉耦齊年左傳晉師服曰嘉耦曰妃不揣秕粳見黃門序敢先乘韋見觀槿序伏願廣賡雅唱遍惠鴻文葡萄百軸見三芝序篇篇飛杜曲之花見禹平序及紫來序翡翠千箱見智修序字字織扶風之錦見璿璣賦則繽紛麗句遙從青鳥以俱來見瀛臺賦注縹眇靈璈見逸齋序逺逐彩鸞而並至矣見貞女序任丘龎先生七十徵詩文啓瀛海名區鄭州沃壤河間志漢曰渤海曰河間隋唐曰瀛州宋曰瀛海所屬有任丘縣乃高陽氏顓頊地漢任丘宋鄭州按漢中郎將任丘繕城遂以其名名城一帆鴨緑遙接蠡吾詞譜有鴨頭緑題李詩遙觀漢水鴨頭緑保定志蠡縣漢曰蠡吾十里鵝黃見鷹垂序斜籠趙北任邱志地西北有趙北口疏汀曲沼霏霏菱芡之鄉雨艇煙檣歷歷魚蝦之市天連輦下野因蒼莽而彌雄見渭仁序水似吳中境以崢泓而倍敞生斯地也大有人焉安敦以吉殊多鳩杖之賔見映碧序美秀而文左傳子太叔美秀而文尤數鹿門之胄見壽閻序維我某翁龎老先生北路高閎西豪望姓見壽徐序貂蟬溢巷見半繭賦珠屢濬於璇源詳孟太母啓棨戟臨軒見看奕賦玉每生於崑嶺書先生幼篤天倫長敦獨行分田授宅為兄則忍處於肥詳施公誄讓棗推梨食果則願分其小文士傳孔融年四嵗與諸兄食梨輒引小者人問其故答曰小兒當取小者加以居常不競衆推涉世之含𢎞性本靡爭咸服秉心之平恕偶談一二足槩生平當塞翁失馬之年見歸田序有楚國亡猿之事見舜民序波將洊及見鄴園啓株乃相連詳潘母啓在上官原無投杼之嫌國䇿甘茂對秦王曰昔曾子處費有與曾子同名族者而殺人人告參之母曰參殺人母不信告之者三母投杼而起言讒者之甚也乃旁人盡抱拾灰之懼見觀槿序而先生坦然義命委以虛舟莊子山水篇方舟而濟于河有虛船來觸舟雖有惼心之人不怒率爾襟情期之飄瓦莊子復讐者不折鏌干雖有忮心者不怨飄瓦注飄瓦無情也將豫無怒詎鳴趙一之寃漢紀趙一恃才倨傲後屢抵罪幾至死賴友人救得免一乃作疾邪賦謂我何求寧訟冶長之枉論語斯之雅量夫豈恆情足知五世之其昌見祖德賦蚤信此門之必大見憺園賦至若鮮芳饋母陸橘懷深羶毳承親江魚手進見瑞木賦千蟠孝笋緣簷溜以偏生見􅋯菴序百匝慈烏繞庭柯而不去見憺園賦以兹貽厥致彼刑于詩邊孺人孝先貴裔漢書邉韶字孝先才思敏捷嘗自言腹便便五經笥居然冀缺之妻見井叔序王孺人子晉華宗見滕王賦展也梁鴻之婦見貞女序一門友愛桁無不易之衣見賀徐序三族雍諧室有同功之火見田太翁啓居王彥方邑屋即細人亦畏其名漢王烈傳烈少師陳實以孝義稱鄉里有盜牛者主得之盜請罪曰形戮是甘勿使王彥方知之聞韓康伯風流縱女子亦知其號見無忝序况復夙耽墳史見天篆序雅愛縹緗見懸圃序保兩世之藝編屈惟嗜芰國語屈到嗜芰召其宗老而屬之曰祭我以芰注蓤也守百年之螙簡董不窺園見憺園賦歸亡書於兵燹之後趙璧終完見貞女序贖遺經於闤闠之家秦關竟出書真足寶彌旌貫日之誠見賀周序硯可成田詩話唐人以硯為良田舌耕而筆耒坡詩我生無田食破硯遂獲凌雲之報見實菴序以故一枝擢秀見儲太翁啓先標上苑之名而三樹駢柯俱擅連城之譽也見昭華序兹當降嶽之期正值生申之候詩昔君家三世之高曾為近代兩間之人瑞或則年逾八帙或則齒過百齡朱霞紺雪味若恆饈穆天子傳穆王集方士春霄宫王母進嵰山紅雪漢武外傳王母七月七日以絳雪三黃諸丹授帝列仙傳薛昭遇仙女得絳雪丹開元中內人趙雲容問申元之乞延生藥得絳雪丹一粒後果再生按仙家上藥有玄霜絳雪閬圃瓊樓閬圃見閨秀序瓊樓見瀛臺序視為珂里見祖德賦宜先生之不煩金竈已知益壽之方無假銀房蚤悟延年之訣也見得仲序伏冀鴻都上客惠以華繒見存菴序鶴市名流貽之麗句見半繭賦則玉虛名館便為元圃之臺集仙録仙人居玉虛之館又周穆王升崑崙于元圃閬苑會西王母金字題門即降青毛之節矣漢武外傳王母降帝宫乘紫雲輦從官執綵旄之節以玉盤乘桃一顆其色青徵淮安張鞠存先生雙壽詩文啓蓋聞真府傳觴金液瓊膏之酌武帝外傳王母七月七日有九丹金液紫虹華英太清紅雪之漿授帝老氏聖記吳猛純孝後登廬山見數人與猛語服玉膏終日按道人亦以咽嗽津為瓊膏弇山紀石穆天子傳天子驅馬升于弇山乃紀丌迹于弇山之石而樹之槐眉曰西王母之山注弇兹山所入也白雲黃竹之謡見素伯序瑶池舒七葉之祥補注花開四照見壽季序銀漢炳雙星之瑞見貞女序景麗重輪拾遺記昔人皇蛇身九首肇自開闢于時日月重輪山明海靜崔豹古今注明帝時為太子樂府詞曰日重光月重輪星重輝海重潤鸞吟法曲唐禮樂志初隋有法曲其聲清新而近雅元宗酷愛之鏗鏘頌禱之音禮鶴纈宫袍杜牧之詩花塢團宫纈注纈文繒也照耀縑緗之色見懸圃序咸資雅詠用佐華筵千春揚昭代之禎符奕世紀德門之盛事淮山張老先生繡戟高甍繡戟見看奕賦高甍見玉巖序銅街貴宅見滕王賦姓聨翼軫瑶天著籍之宗見祖德賦號擅金張青史書名之族見滕王賦蓮開華井夙稱關隴名家華山記山頂有池池中生千葉蓮因名華山韓愈詩太華峯頭玉井蓮花開十丈藕如船桂滿淮堧見滕王賦史記注堧同壖謂緣河邉地僑寓煙霞福地僑寓見初明序寰宇記洞天福地皆名山之稱舉宗饌玉見少楹序筐贏彩鳦之徵吕氏春秋有娀氏有二姪女為九成之臺飲食以鼓帝命燕往視之二女覆以玉筐發而視之燕遺卵而北飛女吞之生契毛詩注天降玄鳥乃􅜈也西京雜記竇太后在家有白燕銜石墮后績筐中后剖視之有文曰母天地遂合之不開後為皇后名曰天璽盡室鳴珂笥溢緑蛇之兆見祖德賦逮容部公讋蠻邦而定國本事關宗祏之間史記索隱高容為商家禮樂之官後以禮署稱容部左傳鄭原繁曰桓公命我先人典司宗祏注宗廟中藏主石室曰祏洎户曹公却蟻賊而斥貂璫蟻賊見素伯序儀制貂璫侍中之師并見半繭賦烈載旗常之上見鄴園啓生還接武真成揚震之孫漢靈帝紀揚震曾孫竒為侍中帝問曰朕何如桓帝對曰陛下之于桓帝亦猶虞舜比德唐堯帝不悅曰卿強項真揚震子孫死後必復致大烏矣沒亦留芳並祀欒公之社見祖德賦豬肥鵠瘦見亓山序家家摩虀臼之碑見昭華序荔碧蕉丹户户賽羅池之廟韓愈羅池廟碑羅池廟者故刺史栁侯廟也作迎享送神詩遺栁民俾歌以祀焉其辭曰荔子丹兮蕉黃雜肴蔬兮進侯堂先生幼即岐嶷詩長而清綺揮毫蚤嵗既髫鬌以知名見懸圃序釋褐中朝見玉巖序遂馳驅而筮仕見智修序時則督漕之蜍光夜蝕史記天官書日月薄蝕韋昭注氣往迫之為薄虧毁為蝕李白詩蟾蜍薄太清蝕此瑶臺月并見琴怨序以致楚州之鴟喙宵張見玉巖序注羣姦擇肉捷録擇人而食細民生萇楚之悲詩大猾磨牙李白詩磨牙吮血殺人如麻瘠土抱黍離之痛詩先生則敷宣利弊片言爰以回天見銀臺啓捍衛鄉關羣小因而見晛詩九重動色萬姓更生是則甫纓簮組旋為桑梓以分憂乍離衡茅便為枌榆而請命矣見觀槿序尋由畫省見懸圃序洊簉清通復自薇階見黃門序陟升華要校士則搜竒剔異既楩楠柟杞之兼收見滕王賦居官則緝雅歌風亦顧陸潘楊之咸集見尺牘序人傳毛玠此是望郎羣羡山濤斯真吏部見壽季序若乃鄉邦以內人倫既奉為楷模見祖德賦梱閾之中天性尤徵其篤摯閔豫同氣體鳲鳩專一之仁敬厥所生𢎞葛藟本根之誼詩以至請蠲議賑則里閭共藉其干棷見歸田序及夫濟乏扶災則黨族交資為管庫禮趙文子舉晉國管庫之士人沐張長公之德施不少見憺園賦抑緣閻太君之內助居多蓋銘椒賦菊固伯輿棨戟之門銘椒見瑞木賦晉書武帝左貴嬪作菊花賦滕王閣序都督閻公之雅望棨戟遙臨注閻嶼字伯輿為洪州都督而習禮通詩亦立本丹青之裔唐書太宗命閻立本圖畫十八學士像立本素工畫薑恪以戰功俱為相人曰左相宣威沙漠右相馳譽丹青華齡降阼見閨秀序徽柔不讓夫禮宗見葉母序吉日齊牢見閨秀序靜好無煩於姆教見昭華序當夫子食貧之嵗詩牛衣無憔悴之容見天章序暨大夫服政之年見壽徐序象服表河山之色詩如山如河慈能逮下待澤者期功強近之親見劉太母序惠以宜家頌義者籥翟輝庖之輩見逸齋序噓其善氣衍作吉祥種厥仁心蒸為戩榖詩羮鳬臛雁見瀛臺序堂前羅三代之賔蠟鳯騎羊見雪持序門內備五宗之慶詳掌亭誄緑鞲繡褓跳擲屏幃東方朔傳緑幘傳韝蔡雍獨斷董偃青緑幘繡褓見納姬序犀角龍媒犀角見三芝序龍媒見賀徐序嬉遊奧泄頷之而己莫分羣從之名郭子儀傳子儀八子七壻孫數十人問安時不能盡辨但點頷示之而巳壽九十餘終小者誰何不辨諸郎之貌見上其立德也如此其食福也又如彼屬在今春倐逢盛事聖主闢翹材之館熙朝開博學之科枚臯枚乘漢枚乘傳乘字叔景帝詔其孽子賦平樂館文受詔輒成其揮毫於鳷鵲樓頭見閨季序崔瑗崔駰同獻賦於鴛鴦殿下崔駰傳駰字亭伯著詩賦銘頌婚禮酒警合二十篇與班固齊名子瑗字子玉能世父業舉茂才崔湜詩草緑鴛鴦殿笑語歷雲霄而上父子俱榮賡歌在殿陛之間君臣交泰而先生則謂舒祺年小幸充珥筆之臣戰國䇿趙左師觸讋見太后曰老臣賤息舒祺最少願得補黑衣之缺以衛王宫漢制御史珥筆以紀過注執也陸機詩珥筆華軒燭武精銷應作歸田之叟左傳鄭使燭之武見秦君辭曰臣之壯也猶不如人今老矣無能為也已國䇿田光語太子丹曰太子聞光壯盛之時不知吾精已銷亡矣歸田見三芝序一出一處洵哉顯晦之攸宜為箕為裘禮展也後先之濟美更以來年欣聞雙壽太君則六旬設帨庚申度值其初先生則九月懸弧甲子方踰其二見壽閻序班衣粲錦見憺園賦遙飛千里之觴仙醴流霞詳謝吳啓許碏醉歌滔滔王母九霞觴合祝萬年之嘏見徐母序某等與毅文兄分擬荀陳見壽季序注情叨孔李孔融傳融十嵗隨父到洛時李膺有盛名詣門者皆俊才清望及中表親戚乃通文舉至門自謂與李為戚閽者通入坐膺問曰高明祖父與僕有舊恩乎對曰先君仲尼與君先人伯陽同道而相師友則融與君纍世通家膺及賔客莫不異之丹崖春霽宜陳朱萼之篇疑朱鷺篇緑野秋開見楚鴻序應賦白華之句見瑞木賦喜霄虹之並跨筆繡江毫見看奕賦欣海鶴之雙飛詩話東坡生日李委作鶴南飛曲以獻文舒羅鳥見璿璣賦佇聆雅唱敢告名賢謹啓陳檢討四六卷十五
