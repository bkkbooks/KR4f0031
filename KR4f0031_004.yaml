body:
  text: 陳檢討四六卷四翰林院檢討陳維嵩撰序續􅋯菴集序震澤湖邉舊饒陂澤垂虹亭畔尤足林塘吳郡志府城西南即震澤又曰太湖曰具區周三萬六千頃垂虹亭在吳江東門外筆牀茶竈陸天隨泛宅之鄉唐書陸龜蒙字魯望寓居松江甫里每升舟賫束書茶竈筆牀釣具自號江湖散人天隨子甫里先生以髙士召不至雨箬煙簔范少伯浮家之地范蠡傳蠡字少伯三户人滅吳之後辭勾踐曰君行令臣行意乃泛輕舟以遊於五湖按張志和浮家泛宅詳季青序爰有髙人於焉小築聨就吟詩之社宛爾漫郎元次山傳結字次山居樊山自稱曰酒徒曰漫叟亦曰漫郎行逢選佛之場居然乞士傳燈録丹霞天然禪師初習儒將應舉道遇一禪客問仁者何往曰選官去禪客曰何如選佛曰選佛當何往曰江西馬大師出世此選佛場也師乃往見馬祖善覺要覽方外乞士謂上於佛乞法益慧命下於施主乞食資益色身才踰王粲詎屑依人見園次序貧甚茅容偏能養母漢書茅容字季偉郭林宗宿其家且日容殺雞為饌泰意謂為已設既而供母自以草具與客共飯林宗賢之奉慈幃而出世見上注擇隙地以逃虛司空圖詩逃難人多分隙地逃虛詳同學文衡門蕭寂不打慈鴉杜詩簾戶每宜通乳燕兒童莫信打慈鴉修竹檀欒惟生孝笋孝子傳孟宗字公武江夏人性至孝母嗜筍冬時缺笋宗入林哀泣笋忽迸出枚乘兔園賦修竹擅欒夾池水注竹隂濃貌蓋嵩之今日所居即宋王君份􅋯菴故址也昔君以吳地華宋楚天清尹咏桃花流水之句解組遄歸李白詩桃花流水杳然去别有天地非人間卜浮天釣雪之區見季青序投簮終老南史陶𢎞景與從足弟書曰投簮高邁煙汀月嶼秀極人間竹屋花潭甲於天下於是雲山綿邈大可清談風日輕妍時逢勝友水眀樓榭每留鬪奕之賔栁暗簾櫳慣隱銜杯之客或揮毫而作賦長把袂以臨風此一時也何其樂乎既而鹿走吳中見園次序鵑啼洛下宋史卲雍字堯夫號安樂先生諡康節嘗與客步天津橋聞杜鵑聲愀然曰天下將治地氣自北而南將亂自南而北今南方地氣至矣禽鳥得氣之先故知之兩宫大去詳樂府序五帥無歸李陵答蘇武書五將失道陵獨遇戰民間池館凄同趙宋之江山園內琴尊寂若臨安之歌舞杭州志春秋屬吳越秦屬會稽陳曰錢唐唐曰餘杭宋南渡都此曰臨安詳樂府序凡此寒煙落照之縱橫非無繡戶綺窗之髣佛烏棲月下已換樓臺詳鴻客序燕到春餘半迷門巷詳玊巖序過客有看花之恨行人多折栁之悲詳萬栁啓然而昔夢猶存其人如在竹林已盡還傳阮籍之罏見半繭賦并詳雪持序香草無多尚説屈原之宅楚詞注春蘭秋蘭石蘭皆曰香草水經注荆州府歸州秭歸縣北有屈原宅宅東北六十里有女嬃廟搗衣石猶存杜詩何得山有屈原宅恨古人之不見知來者之為誰世説張思光居嘗歎曰不恨我不見古人所恨古人不見我陳子昻古詩前不見古人後不見來者念天地之悠悠獨愴然而涕下能無思舊之銘周庾信思舊銘序云梁故觀寧侯蕭永卒作此銘用當懷賢之作潘嶽懷舊賦序余十二而獲見於父友東武戴侯楊君始見知名今慨然懷舊而賦之僕與松之交非一日居雖異縣難忘者城北徐公國䇿城北徐公齊國之美麗者也鄒忌入朝見威王曰臣誠不如徐公美臣之妻私臣臣之妾畏臣臣之客欲有求於臣皆以為美於徐公由此觀之王之蔽甚矣生幸同名差别者小冠子夏釋常談漢書杜欽杜鄴俱有大名皆字子夏欽眇一目人呼盲子夏欽惡之乃自作一小冠戴之時遂呼為小冠子夏五湖在望碧鱸紅稻之莊百嵗非遙白酒黃雞之曲君如不達前歡已屬乎爽鳩左傳齊侯至自田晏子侍於遄臺曰古而無死其樂如何晏子曰昔爽鳩氏始居此地古者無死爽鳩氏之樂非君所願也僕尚能來異日寧虞其題鳯晉陽秋曰稽康與吕安善訪之值康他往康之兄名喜相延不入題門上作鳯字而去喜以為善康歸曰鳯字凡鳥也胡黃門其章先生葵錦堂集序古者青瑣尚格人之訓箕範哲謀青瑣見憺園賦范雲詩攝官青瑣闥商書格人元龜洪範眀作哲聰作謀黃扉𢎞國老之規臯謨溫塞黃扉詳佳山序左傳子為國老待之而行塞臯陶謨直而溫剛而納約自牖義本乾坤易辰告逺猶風傳比興詩誼關密勿旨必繫於君王古詩密勿從事不敢告勞慮切風愆言必歸於忠愛書惟兹三風十愆並揚華於紫極胥騰譽於黃中易君子黃中通理婁東胡其章先生姿制清剛風裁英整蚤年挾䇿名動公卿壯嵗彈冠任膺民社漢書王陽為益州刺史貢禹彈其冠待陽薦後果召為大夫溫侍讀淹長都雅物望所歸唐書溫大雅字彥𢎞為髙祖黃門侍郎五世孫溫造字簡輿姿表魁然性嗜詩書東都號處士烏公薦之為御史彈李祐祐曰吾雪夜擒吳元濟未嘗動心今膽落於溫御史矣薛司𨽻博洽􅈺華藝林所服漢書薛司𨽻宣字贛君郯人為郡所至有聲谷永薦其達於政事舉措時當經術文雅足以斷王國屬有眀之末葉乃思廟之當陽左傳寧武子曰賦湛露則天子當陽注匪陽不晞言露見日而乾猶諸侯稟天子命而行東朝之水火方平補注北寺之玄黃未息漢桓紀下李膺於黃門北寺獄注北寺獄屬黃門署中常張讓大有責言宦者列傳靈帝時張讓與趙忠曺節王甫等擅權序又與夏惲等十二人號十常侍責言詳納姬外戚何苗絶無成算後漢書何太后兄大將軍何進與何苗同議誅宦官張讓等袁紹等為畫䇿召四方兵向京城陳琳諫曰功必不成祇為亂階耳曺操笑曰一獄吏足矣何至紛紛召外兵乎况復三臺柱石悉夷甫之風流三臺見尺牘序陸凱傳宰人國家柱石不可不強晉書王衍字夷甫戎從弟也位居台司雅宗拱默以遺事為髙後桓溫入洛慨然曰遂使神州陸沉王夷甫諸人不得不任其責列鎮旌麾盡深源之方略晉書殷浩字深源時人擬之管葛庾翼勿之重也曰此輩宜束之髙閣俟天下太平然後徐擬其任耳南風不競左傳晉人聞有楚師師曠曰無害吾驟歌北風又歌南風南風不競多死聲楚必無功楚幕多烏見璿璣賦雪壓賀蘭傅介子之功名蕭瑟涇陽圖經賀蘭山在縣西朔州地山多白草遙望青白如駮北人呼駮馬為賀蘭鮮卑日多因山谷為族氏前漢書傅介子字武仲棄觚從軍昭帝使至大漠因使壯士刺殺樓蘭王更其國名鄯善還封義陽侯天低汧隴吕婆樓之才調縱橫三秦記汧水在扶風汧縣西隴西郡有隴山上有水四注下秦人西役升此山七日乃越莫不回首悲泣為隴頭水之歌西征賦邪界褒斜右濵汧隴秦紀秦立符堅尚書吕婆樓有才略凡事咨之後薦王猛於堅婆樓嘗曰僕刀環上人耳既海水之羣飛漢揚雄劇秦美新神歇靈繹海水羣飛二世而亡何其劇與注海水羣飛喻大亂也庾信詩成羣海水飛亦崑岡之失火見懸圃序時則先生晉秩中朝冠班左掖唐書含元殿後曰宣政宣政左右有中書省門下省如左右掖注諌垣在左名左掖潘安仁晉家騎省見滕王賦珥插華貂見半繭賦沈初眀梁殿侍中見滕王賦衣薰寶麝鄭谷詩風飄蘭麝暗和香按唐尚書郎及侍中御史奏事含雞舌香始於漢侍中刀存年耆口臭上給香含之後為制硜硜以對棣棣而談詩義疏棣棣間習貌於是署有梨花補注望觚稜而封駁夢溪筆談銀臺司兼門下封駁乃給事中之職唐書諫垣左右拾遺六人大事則廷論小者上封事又郭承嘏為給事中繼有封駁能盡其職觚稜見璿璣賦垣多薇樹對鹵簿以敷揚史天官書上垣太微十星中垣紫微十五星下垣天市二十二星唐書開元元年改中書省為紫微省省中植紫微取花久也漢志天子法從次第為鹵簿其器仗不一絶多沈約之彈文詎乏鮑宣之封事吳均春秋沈休文有奏彈王源文曰輒奉白簡班固漢書鮑宣字子都何武薦為諌大夫董賢貴幸宣數上書切諫森森白筆無不批根杜氏通典魏置御史八人當大會殿中御史簮白筆側陛而坐史記灌將軍傳魏其侯竇嬰失勢亦欲倚灌夫引繩批根赫赫青蒲因而折角漢史丹傳丹字君仲以父蔭為駙馬都尉侍中元帝寢疾欲易太子丹直入卧內伏青蒲上泣涕固諌太子得不易漢書朱雲字遊平與五鹿充宗論易辨折五鹿君諸儒語曰五鹿嶽嶽朱雲折其角洎乎離亂已賦遂初晉孫綽傳興公上表曰中宗飛龍實賴長江不然江東為豺狼之場矣因賦遂初陳止足之道沿及滄桑詳舜民序及壽閻序彌耽招隱見滕王賦王右軍晚年肥遁誓墓尤堅北堂書鈔晉王羲之為會稽內史稱疾去郡於父墓作自誓文曰止足之分定於今日若貪冒苟進是有無尊之心而不子也謝康樂嵗暮棲遲遊山甚劇沈約宋書謝康樂因父祖之資生業甚厚奴僕既衆門生數百鑿山浚河尋山陟嶺必造幽峻於是漁畋藝苑鼓吹詞壇唐書張鎬視經史猶漁獵晉書孫綽云三都兩京五經之鼓吹效終軍竒木之篇倣充國金城之奏漢書終軍字子雲年十八選慱士弟子世謂之終童武帝時有白麟竒木之瑞終童乃為文以對年二十而卒故曰終童趙充國傳充國字翁孫宣帝元康初羌人叛充國年七十餘馳至金城圖上方略屯田十二事羌破振旅而還莫不書成雜組司馬相如賦合纂組以成文宋詩紀王融有五雜組詩云五雜組慶雲發沈約諸人多和之經號歸藏通志神農本氣墳而作易曰歸藏其書漢魏不傳至宋元豐中始出乃張商英偽撰纚纚千言洋洋百卷然而庾開府之集五存五亡北周宇文逌序庾信有集十四卷百不一存又有三卷重遭軍火所著僅存十二卷開府見滕王賦注杜征西之碑一山一谷晉書征西將軍杜預好為後世名常言髙岸為谷深谷為陵刻石為二碑紀其勳績一沈萬山之下一立峴山之上曰焉知此後不為陵谷乎間多流軼或有遺亡今兹所存如斯而已嵩以春中獲遊珂里見祖德賦三吳草長訪張嵊之名園南史張嵊字四山吳郡人張稷子也有志操能清言好園林之樂為湘東王長史後為梁太守三吳見半繭賦二月花飛過王珣之别業晉書王珣字文琳小字法護一云阿苽一稱東亭乃王導之孫洽之長子吳志虎丘山晉司徒王珣及弟司空王珉之别墅猥荷先生命為兹序彥升撰王公之集珍為國華文選任昉撰王儉文憲公集序有云豈非希世之俊民瑚璉之宏器國語季文子曰吾聞以德榮為國華伯喈愛論衡之書私為帳祕蔡雍傳漢王充嘗著論衡八十五篇中土未有傳者蔡中郎至江東得之及還北諸公覺其談更逺撿求悵中果論衡一部深慚粳粃世説王文度范榮期俱為簡文所要王在范後王因謂曰簸之揚之粳粃在前范曰洮之汰之沙礫在後一作孫綽習鑿齒言何當瓊瑶詩宋楚鴻文集序五茸綺麗代産文人松江志五茸在華亭谷東吳主獵所九辨纒綿世生才子文賦誄纒綿而悽愴宋玉九辨序宋玉屈原弟子閔惜其師忠而放逐故作九辨以述其志客來南國相傳金粉之篇古今注紂燒鉛為粉名曰胡粉又名鉛粉蕭史鍊飛雪丹與弄玊塗之後因曰鉛華曰金粉今水銀膩粉是也居本東鄰大有玊叉之句宋玉登徒子賦序楚國之麗者莫若臣里臣里之美者莫若臣東家之子宋玉諷賦臣嘗出行僕飢馬疲值主人門開翁又到市獨有主人之女來勸臣食以翡翠之叉挂臣冠纓臣不忍仰視相如美人賦臣之東鄰有一女子玊叉挂臣冠羅袖􅰩臣衣何况肩吾父子遞擅雕華唐令狐德芬撰庾信本傳信父肩吾同信出入禁闥恩禮莫比既有盛才文並綺艷徐陵玉臺新咏序逸思雕華孝綽弟兄見三芝序俱稱麗則楊子雲曰詩人之賦麗以則論家風於河北此是崔盧詳皇士序小學紺珠後魏四姓崔盧鄭王唐四姓及七姓中俱有崔盧敘門第於江東斯真顧陸者哉見尺牘序我友楚鴻當年舞象內則十三學樂誦詩舞勺成童舞象學射御注十五舞象舞之樂葡萄滿篋見三芝賦譽便起夫通都芍藥盈箱見瀛臺序名蚤傳於綺嵗詳聖期序偏工綺密寧患才多晉書張華謂陸機曰人患才少而子更患其多妙解瀾翻惟愁紙盡固已安仁縣裏千枝皆桃李之花潘嶽傳嶽字安仁為河陽令時滿縣種桃李人云河陽一縣花衛尉園中七尺悉珊瑚之樹見憺園賦洎乎運值家屯時丁世梗紅顔公子彌深彈鋏之嗟國策馮歡一作暖見孟嘗君得置傳舍居有頃自彈其劍曰長鋏歸來兮綵筆文人祇切碎琴之感唐書陳子昂字伯玉初入京未遇有賣胡琴者子昂輦于緡市之衆驚問曰余善此樂眀日可集宣陽里衆如期飲畢笑曰子昂文百軸不為人知此樂賤工耳舉琴碎之名震京師劍以不平而慣繡竹因有恨而恆斑見憺園賦是則崔駰罕樂頗多憔悴之言後漢崔駰傳駰字亭伯時竇憲為車騎將軍擅權驕恣駰為主簿前後奏記指切長短憲不能容出駰為長岑長駰不得意未之官歸卒於家地理志樂浪郡有長岑縣馮衍鮮歡不乏愴愀之致見尺牘序西京賦慘則鮮於歡情區哀樂境異平陂易無平不陂覽吾友之生平增達人之嘆息僕與高門久叨密契記託紀羣之雅先賢行狀陳紀字元方實長子也生子羣字長文有英才交者甚衆實惟壬癸之交爰以薄遊言過上郡吳王射雉之苑詼笑彌旬吳志黃武初在長洲苑較獵唐孫逖詩吳王初鼎峙羽獵騁雄才陸魯望詩五茸春草雉媒嬌見篇上陸機唳鶴之城遊從浹月陸機傳成都王穎假機後將軍河北大都督為孟玖等所譛穎密使人收機機嘆曰華亭鶴唳可復聞乎遂遇害尊公愛客開緑野以盤旋唐書裴晉國公請罷政時具涼臺燠館號緑野堂與白居易劉禹錫等把酒著文賢從憐才飛錦箋而贈答見尺牘序楚鴻十嵗脫帽而為捉搦之歌舊唐書韓琬傳曰不務省事而務捉搦梁樂府捉搦歌四曲有云粟榖難舂付石臼又曰小時憐母大憐壻漢鷺七齡揮毫而作擘窠之字書斷擘窠古書法之巨者也李賀詩金窠篆字紅屈盤曽幾何時此歡不再王安期洛濵之戲大類前生虞預晉書王承字安期與諸名士共至洛水戲後王丞相輕蔡公曰我與安期千里共遊洛水邉何處聞有蔡充兒注丞相王導蔡公蔡謨也嵇叔夜竹林之遊直同昨日晉書阮籍與嵇康山濤向秀劉伶阮咸王戎為竹林之遊並詳雪持序花飛鈿笛已無擫笛之人潘妃傳帝豫潘貴妃以江左古玉律數枚悉裁以鈿笛按文選彈琴擫籥一作厭文子使倡吹等工厭竅草沒雕欄並少憑欄之客思君千里别子十年更披燕市之新編益觸吳天之昔夢既百端之交集見滕王賦且一語以相寬須知書成吕覽定懸市上之金吕不韋傳不韋使其客人人著所聞集論以為八覽六論十二紀號吕氏春秋布咸陽市門懸千金其上有能增損一字者豫千金誰云璞獻荆王韓非子卞和得璞王獻懷王王以為欺刖一足後平王立復獻之又以為欺刖一足平王死子立為荆王和抱其璞而哭涕盡續之以血王使工剖之得寶玉乃封和為陵陽侯辭不就長韞櫝中之玊論語儲雪持文集序僕與雪持儲子謝范素交宋史謝淡不營當世與范泰為雲霞之交潘楊密戚見尺牘序洛濵之戲君既獨步此間見楚鴻序竹林之遊僕亦雅預其末世説王濬沖經黃公酒罏曰吾與嵇叔夜阮嗣宗共飲此壚竹林之遊亦預其末也曰者春寒正沍微霰載零左傳申豐曰涸隂沍寒詩先集維霰共為曲室之談聊作西窗之話世説許詢嘗詣簡文爾時月朗風恬乃共作曲室中語李義山詩何當共翦西窗燭却詁巴山夜雨時用説生平以資諧謔語其枯菀殆有數端國語晉優施暇豫歌人皆集於菀已獨集於枯敘彼平陂見楚鴻序殊非一致始者君方羈貫榖梁傳羈貫成童不就師傳父之罪也僕甫勝衣見素伯序衛郎昔日潛遊樂氏之門庭見尺牘序逸少當年遍謁郤家之羣從詳桐初序注君則楊修食果之嵗見素伯序已舉茂才後漢書西漢以秀才取士因避光武諱改茂才黃琬對日之年便呼博士文學傳黃瓊孫名琬字子琰建和元年日食京師不見瓊為魏郡太守以狀聞太后問所食多少瓊未知所况琬年七嵗在旁曰何不言日食之餘如月之初瓊大驚即以其言應後徴拜少府歷仕封陽泉鄉侯光延大宅正蓄歌鐘唐崔令欽教坊記開元中東京右教坊在光宅坊左教坊在延政坊西京兩教坊俱在眀義坊左傳鄭人賂晉侯歌鐘二肆金谷園中方盈盛鬋見半繭賦屬有陽阿之妙伎能為上蔡之新聲見半繭賦紫簫紅笛譜出龜兹涼州記咸寧中盜發張駿塜得赤玉簫紫玉笛古詞紫簫聲斷倚樓人西域記龜兹國王與其臣庶知樂者於大小山間聽風聽水之聲均節成音後翻入中國如伊州涼州甘州曲皆龜兹境也連昌宫詞色色龜兹轟録續注録續畨樂之名緑酒紅燈舞成回紇樂苑隋回紇曲商曲調也有曰隂山瀚海使難通幽閨少婦罷裁縫碧綾夜委補注偏留休沐之賔漢書律令五日得一休沐注休息以洗沐也絳蠟晨燃不報當關之客嵇康書晝卧喜晚起當關呼之不置注漢有當關之職曉至呼門李商隱詩當關莫報侵晨客雕軒匝地綺榭參天君時出則乘羊入而蠟鳯衛玠傳玠風神秀爽總角乘羊車入市見者咸曰誰家璧人一作玉人晉書王𢎞與兄弟集會任子孫戲適僧達下地作虎子僧虔正坐采蠟燭珠為鳯凰𢎞嘆僧達爽俊然恐危吾家僧虔當以名義見美後如其言於胥樂也復何求哉既而地坼蒼鵝人驅銅馬見懸圃序猥以綺羅之日漢書班伯與王許子弟交在於綺襦紈褲之間及乎離亂之晨此則君之一變也於是鐵籠宗人雲昏晝伏史記田單者齊諸田疏屬也燕使樂毅破齊田單走安平令宗人盡斷其車軸末而傅鐵籠已而燕軍攻安平城壞齊人為燕所虜惟田單宗人以鐵籠故得脫乃東保即墨國䇿子胥夜行晝伏白衣公子箐密宵行杜詩內人紅袖泣王子白衣行注王子以避亂隱迹為白衣而行也修蛾曼睩憐綺袖之難歸宋玊招魂蛾眉曼睩注睩目盻也金鎖瓊鋪痛高臺之易主甘泉賦排玉户而揚金鋪兮注鋪宫門環也景福殿賦青鎖銀鋪桓談新論雍門周説孟嘗君曰高臺既已傾曲池又已平緑腰歌罷再聽何年琵琶録緑腰即録要樂工進曲録出要者以為名誤為緑腰又誤六么又貞元中有康崑崙者琵琶第一手新翻羽調緑腰時有女郎亦彈是曲撥聲如雷紅綬銜來相逢奚日述略記吐綬鳥其身如鸐五色出巴東天晴則吐綬長一尺須臾還吞之説文紅綬即朱紱維白居易詩鵑銜紅綬繞身飛李商隱詩願得化為紅綬帶許教雙鳯一時銜君則幽憂不一見海棠賦怊悵絶多高唐賦怊悵自失吹箎吳市佯狂見伍員之才國䇿子胥亡楚奔至吳乃被髮佯狂鼓腹吹箎乞食於吳市按箎一作簫撾鼓漁陽漫罵亦禰衡之氣漢禰衡傳衡字正平曺操召為鼓吏衡為漁陽撾蹀𨄌而進容態有異聲節悲壯云後漢書衡往見操坐大營門以杖箠地大罵後黃祖大會賔客衡言不遜熟視罵曰死公云等道祖恚遂令絞殺年二十四屬百六之將終詳俊三誄遂泰階之漸轉黃帝泰階六符經泰階者天地之三階也三階即三台也凡六星泰階平則隂陽和風雨時才離兕虎詩便作雕蟲見璿璣賦乍脫烏鳶羣修獻雉莊子人死在上為烏食在下為螻蟻食左傳魯穆子立所宿庚宗之婦人獻以雉曰余子長矣能奉雉而從我矣閉戶録五代時三人為朋築壇以丹雉白犬歃血而盟附吳越春秋越王將入吳越王夫人作烏鳶歌有曰仰飛鳥兮烏鳶四國續盤敦之事三吳有盟會之言詩正是四國盤敦見園次序三吳見半繭賦長襜短袂溢此門廬列駟華綏交於衢路此則君之又一變也無何而君之難弟詳施公誄長能廣期鍔淬芙蓉王褒頌干將之璞清水淬其鋒越砥斂其鍔越絶書歐冶子善作劍越王聘作五劍一曰純鈎薛燭曰光乎如芙蓉始生躍張華之兩劍見園次序價侔結緑見素伯序獻韓起之雙環見園次序儀廙亢丁見憺園賦機雲耀陸見祖德賦或銀螭壓紐壓紐見懸圃序注牢燕趙之名城荀子臯牢天下而制之注猶牢籠也或紫艾懸腰見憺園賦牧并汾之劇邑輿志太原府古并州地汾州詳天章序漢書張敞拜膠東相自謂治劇郡非賞罰無以勸懲油幢絶麗繡繖何都而處姊歎未室人老驥悲猶伏櫪世説馬融女名倫適汝南袁隗隗問之曰弟先兄舉世以為笑今處姊未適先行可乎答曰妾姊高行未獲良匹不似鄙薄苟然而已魏武詩老驥伏櫪志在千里烈士暮年壯心不已三旬滅竈五月披裘陶潛詩東方有一士被服常不完三旬九遇食十年著一冠莊子曽子在衛三日不舉火説苑子思居衛三旬九食吳越春秋延陵季子出遊於齊見道傍遺金有披裘採薪者季子呼之曰取彼金薪者曰吾當夏五月披裘而薪豈取金者哉長顑頷其何之見半繭賦行嚄唶而自悼史記信陵君曰晉鄙嚄唶宿將往恐不聽按嚄唶大呼也唶嘆聲古有咄唶歌此則君之又一變也嗟夫傅鶉觚之才調俯首何堪補注庾蘭成之詞賦傷心曷已庾信集著有傷心賦並見園次序負井公之博進壯不如人逋營室之䀻錢憂維用老見三芝序將欲排閶謁帝馭氣求仙相如大人賦排閶闔而入帝居長恨歌後序有仙能遊神馭氣出天界沒地府而皇娥無將子之娛嬃女有詈子之懼王子年拾遺記少昊母曰皇娥經窮桑滄茫之浦時有神童容貌絶俗稱為白帝之子即太白之精與皇娥宴戲而歌詩將子無怒離騷女嬃之嬋媛兮申申其詈豫注女嬃屈原姊也責其違衆見放也又楚謂姊為嬃是以録成湘帙見園次序盡孫卿臏後之書孫子傳孫臏與龎涓俱學兵法於鬼谷涓為魏將嫉臏之將以計斷其足太史公自敘孫子臏足而論兵法庋以綈函悉虞相愁時之作禮大夫七十而有庋閣注庋藏也西京賦木衣綈錦説文綈厚繒也國䇿虞卿少貧説趙孝成王為趙上卿故號虞卿著書八篇號虞氏春秋太史公曰卿非窮愁不能著書以自見爰以俟夫來者亦焉用此文為僕也自玩髙文已深愾慕心惟昔夢彌切倣徨乃於匠石之前見半繭賦不揣粳粃之導見黃門序譬之涓人奏曲拾遺記衛靈樂工涓人過濮水效為新聲晉平公悅之並詳琅霞序祇憐並鼓之簧詩紅女繅盆倍惜同功之繭云爾禮夫人繅三盆手補注吳天章蓮洋集序今使酒酣以往設為鄒陽宋玊之大言鄒陽見璿璣賦楚詞宋玉賦大言曰方地為輿圓天為蓋彎弓挂扶桑長劍倚天外金盡之時繆作徐福欒巴之漫語十洲記徐福徐市等言東海祖洲上有不死之草一株可活一人始皇乃發童男女各三百人率載樓船入海遂不返述異記欒巴字叔元漢桓帝時正旦大會羣臣賜酒巴含酒西噀有司劾巴不敬巴云成都有火患故噀酒救之數日成都果奏火災云有雨從東北來火息有酒氣遂已室有園㕓家餘井碓牛衣馬磨僅足相容食貨志董仲舒曰貧民常衣牛馬之衣蓋簔衣類也漢書王章字仲卿當貧病卧牛衣中泣與妻訣妻正言曰京師誰踰仲卿今不激昂反涕泣何也後貴顯妻曰君忘牛衣對泣時耶馬磨見懸圃序雁稅魚租粗能自給見半繭賦碧畦半畝便為庾信之園庾信小園賦余有數畝敝廬寂寞人外素壠一區即是潘尼之館晉潘尼傳尼字正叔嶽從子性靜退著安身論以眀所守其略曰寢蓬室隱陋巷環堵而居易衣而出苟存乎道非不安也又作東武館賦曰飛甘瓜於浚水撥素奈於清渠頳縈弱蔓花是恆春紺裊柔柯藥名半夏埤史燕昭王種長春樹葉如蓮花樹身似桂其花四時之象春生碧花春盡則落夏生紅花夏末則凋秋生白花秋殘則萎冬生紫花遇雪則謝物性志半夏根相重生上大下小皮黃肉白五月八月採繞徑植繁欽之蕙見尺牘序繁欽集欽有咏蕙詩託興於失時也隔籬栽馮衍之薑補注間居徐邈尚有酒鐺見祖德賦暇日隂鏗非無荈銚補注隂鏗見園次序茶經一曰茶二曰檟三曰蔎四曰茗五曰荈注荈茶晚出者管子一農之事必有一銚一耜則鑿壞而遁莊子顔却魯聘穴垣逃去楊雄解嘲或鑿壞以遁注壞墻垣也魏志管寧開山為廬鑿壞為室雖顑頷其何傷見半繭賦帶索而歌但寂寥其奚悔列子孔子遊太山見榮啓期鹿裘帶索鼓琴而歌韓詩外傳楚丘先生被簔帶索見孟嘗君而乃東都公子嵗嵗依人西鄂詞流年年失職俱見園次序東京賦注張衡東京謂洛陽與班固東都賦意同蜀都賦西蜀公子言於東吳王孫博物志王孫公子皆古人相推敬之詞果蓏螺蛤都無俯仰之資莊子果蓏有理注物之微者其類不雜也史記貨殖傳楚越之地果陏螺蛤不待賈而足廬舍陂池總乏棲遲之所詩寂寂梁家之竈世説梁鴻字伯鸞少孤嘗獨止不與人同食比舍先炊已呼伯鸞及熱釡炊伯鸞曰童子鴻不因人熱者也滅竈更燃之蕭蕭卓氏之壚見看奕賦擬獻賦而未能縱著書其何益井公善博索笑奚來見三芝序韓子能文送窮不去見看奕賦於是轉徙燕齊﨑嶇梁趙鬚如蝟磔只欲橫鞭世説劉尹道桓溫鬚如反蝟皮自是孫仲謀一流人注蝟攢毛外刺磔裂也橫鞭補注弩作鴟張偏思縛褲梁書曺景宗既貴謂所親曰我昔在鄉里騎快馬箭如餓鴟馳平澤中世説桓宣武與殷劉談不如甚喚取黃皮袴褶上馬舞矟數回意氣始雄所過碻磝古戍祋祤空壕輿志碻磝唐為山東濟州治所按兖州府有濟寧州寰宇記祋祤古縣名漢景帝置今西安延安府地赫連臺北盡從來蟻鬭之場夏載記赫連勃勃右賢王去卑之後劉曜之族也據朔方僭位二傳為魏所滅今寧夏地埤雅蟻善鬬鬬輒酣戰不解有行列隊伍秃髮城南半昔日狐鳴之地南涼載記秃髮烏孤河西鮮卑人也其先與後魏同出入世自塞北遷河西至烏狐盡有涼州之地史記叢祠中夜篝火孤鳴鵑花似血營前之篳篥何多容齋隨筆杜鵑花即今映山紅又名紅躑躅詳孝威序古詩血淚染成紅杜鵑唐書九部夷樂有漆觱篥胡部安國樂有雙觱篥斑竹如啼見憺園賦帳後之琵琶不少見海棠賦窮魚茹怨凍雀銜悲束晳擬客難辭有曰永戢琳琅之耀匿首窮魚之渚唐書昭宗日鄙語云紇干山頭凍殺雀何不飛去生處樂紫臺無暫返之賔見丁香賦白社有難歸之客逸士傳董威隱居洛陽白社以殘絮縷帛為衣號百結衣晉董京傳逍遙吟咏宿白社中后山詩白社雙林去髙軒二妙來然而才性英竒辭鋒卓犖楯邉磨墨見尺牘序彌工變徴之聲詳下驛裏題詩詳藝圃序大有陽春之調楚詞宋玊對楚王曰客有歌於郢者其為陽阿薤露國中屬而和者數百人其為陽春白雪和者不過數十人引商刻羽雜以流徴和者不過數人而已車前騶卒偕飲酒以何妨晉書謝超宗之子幾卿性通達好飲一日預遊晏不得醉而還因詣道邉酒壚停車褰幔與車前三騶對飲注騶卒以馬駕車之僕塞下荒傖共彈筝而亦可晉陽秋曰吳人謂中州人為傖陸機呼左思為傖父注賤稱也北齊書李元忠趙郡人拜南郡太守好酒無政績及莊帝幽崩元忠棄官潛圖義舉會齊神武東出元忠便露車載素筝濁酒以迎千篇揮纚同天馬之摩空補注李賀詩作賦聲摩空萬象淋漓類巴船之出峽唐書裴延裕文思敏捷號下水船揚雄謇吃雅擅攡經楊雄傳雄少好學口吃不能劇談以經莫大於易作太玄梁肅重膇尤精製賦補注左傳韓獻子曰郇瑕氏之地土薄水淺於是有沉溺重膇之疾注重膇下重也此蓮洋吳子名山記華嶽山下有蓮洋村相傳七發之篇枚乘傳乘善屬文嘗作七發進楚太子見之病即愈而笠澤陳生詳潘母序為作三都之序也左思傳思作三都賦成未重於世乃詢求皇甫謐謐為作序於是先相非二之者莫不讃述按謐字士安自號玄晏先生三都見素伯序嗟乎兩戒河山二陵風雨唐書僧一行以天下山河之象存乎兩戒北戒限狄南戒限蠻左傳蹇叔之子與師哭而送之曰晉人禦師必於殽殽有二陵焉其南陵夏后臯之墓也其北陵文王之所避風雨也上黨實九州之脊河中為四塞之雄潞安志戰國屬韓後屬趙秦為上黨地山川峻險居天下之脊當河朔之喉河中詳皇士序注鹽鐵論秦四塞以為固鴉兒峪口美人與駿馬安歸補注國䇿駿馬養外廄美人充下陳異同集酒徒鮑生以美人善四絃者與外弟韋生换駿馬名紫叱駁鸛雀樓前廢寢共荒陵奚在李益詩鸛雀樓西百尺牆汀州雲樹共茫茫夢溪筆談河中府鸛雀樓三層前瞻中條下瞰大河唐人咏詩甚多李益為最行山日紫憶百戰之旌旗太行山志山在平陽府安邑縣西北諸山皆其支脈左傳齊伐晉踰孟門登太行國䇿一軍臨太行則韓請效上黨之地髙誘注山在河內野王縣北汾水波紅想三秋之簫鼓見瀛臺序平陽志汾州太康縣汾水所出空尋斷碣祇剔殘碑所嘆吾賢復生斯地頗傳殿上競誇才子之名莫便山中願息髙人之駕董得仲集序聞之入郇君夫之厨者魚臘非珍唐書韋安石子陟字殷卿襲封郇國公厨中飲食甘美人多飽飫時人語曰人欲不飯筋骨舒夤緣須入郇公厨按漢郇恁字君夫誤用周禮臘人掌乾肉覩杜𢎞治之容者閭娵非美江右名士傳杜又字𢎞治王右軍見而嘆曰面如凝脂眼如點漆此神仙中人荀卿佹詩閭娵子奢莫之媒也韋昭國䇿注梁王魏翟之美女一作閭姝張帝子之樂而眩師罔敢逞其竒莊子北門成問於黃帝曰帝張咸池之樂於洞庭之野彈寡女之絲而曼延靡所矜其巧説林蠶最巧作繭遇物成形有寡女獨宿倚枕不寐私於壁孔中視鄰家蠶箔明日繭多類之雖眉目不甚悉而望去隱然如愁女蔡雍見而竒之市歸繅絲製琴絃彈之有憂愁哀慟聲問女琰琰曰此寡婦絲也聞者墮淚釋名婆娑舞態曼延舞綴也雲間董得仲者顧陸名家見尺牘序阮嵇逸侣見雪持序遙遙華胄史既名狐梁書何昌宇為吏部有姓閔者求官曰子騫後昌宇笑曰遙遙華胄太史令晉趙穿弒靈公董孤書趙盾弒其君孔子聞之曰董狐古之良史曄曄詞宗漢書華曄曄固靈根毛還稱鳯見三芝序生值太平之日地當吳會之衝勝友如雲清言何綺花飛南陌誰家宋玉之叉見楚鴻序鶯囀西城何處陳遵之轄漢書陳遵字孟公身長八尺哀帝末以功封奮威侯性好客每會飲取客轄投井中雖有急不得去於是體如楊栁目以佳人晉書王恭美姿容人目之曰濯濯如春月栁世説武帝植桞於靈和殿前曰楊栁風流可愛似張緒當年手執松枝推為都講陳書張譏字直言後主幸開善寺召侍臣坐松樹下敕譏竪議時索麈尾未至後主令譏執松枝曰可代麈尾棲雲寺記法師每啖論手執松枝以為談柄髙逸沙門傳支道林許椽諸人共在王簡文齋頭支為法師許為都講倡家寶瑟梁蕭子範詩斜筵照寶瑟時過皂莢之園見半繭賦戚里銀筝漢書萬石君徙其家長安戚里中與上有親戚者名曰戚里銀筝見滕王賦獨卧芙蓉之府詳紫玄序班騅小市容彼荒淫晉樂府曲陳孔驕媚白陸郎乘班騅注騅馬蒼黑雜色李賀詩陸郎去兮乘班注陸郎後主狎客楊惲報會宗書頓足起舞誠荒淫無度不知其不可也鸚鵡長廊恣其歡宴詳納姬序俄焉人哭秦庭鬼謀曺社左傳楚申包胥如秦乞師立依於庭牆而哭日夜不絶聲勺飲不入口七日秦師乃出左傳宋人圍曺初曺人或夢衆君子立於社宫而謀亡曺曺叔振鐸請待公強許之及強執政曺亡紀侯不復鄅子無歸春秋莊公四年紀侯大去其國左傳鄅人藉稻邾人襲鄅鄅子曰余無歸矣從帑於邾羌廓處以長愁見海棠賦荃間居兮不樂詳季青序離騷羌內恕已以量人兮荃不察余之忠情兮注羌楚人語詞荃香草以喻君也玊顔已變見銅雀賦何心華屋之遊見尺牘序金竈難傳息意神仙之術漢郊祀志李少君言上祠竈皆可致物丹砂可化為黃金黃金成以為飲食器益壽庾信詩何年金竈成徇煙霞而不返托泉石以終身蓋李都尉之途窮箭盡事業可知漢書李陵拜騎都尉將步騎五千殺胸奴數千人會有軍候管敢亡降胸奴言陵無後援矢且盡單于乃引兵進四面矢如雨下陵曰臣無面目報陛下矣乃降詳賀周序亦向子期之人去爐存生平已矣晉書嵇康被誅向秀經其山陽舊廬作思舊賦有曰棟宇存而勿毁兮形神逝其焉如既而劍合無期河清難俟晉書雷煥掘豐城獄中兩劍以一送張華華曰天生神物終當合耳及華被殺失劍所在煥卒子華佩劍經延平津忽自腰間躍出墮水但見二龍長數丈華嘆曰張公復合之語信不誣矣左傳鄭子駟曰周詩有之曰俟河之清人夀幾何仰嗟時命遂溷迹於秦關詳翼王序俯恤田園聊勉餐夫周粟史記伯夷叔齊恥食周粟劉越石化為繞指悲不自勝劉琨贈盧諶詩何意百鍊剛化為繞指柔興志平望湖掘得一劍屈之首尾相就識者曰繞指柔也曺子桓身作轉蓬曹子建詩轉蓬離本根飄飄隨長風子桓疑誤泣將何及詩爰乃燃脂暝寫雜擬百家魏志劉馥傳夜燃脂照城外樹提伽經庶人燃脂諸侯燃蜜天子燃漆弄墨晨書左思詩弱冠弄柔翰徐陵玉臺新咏序於是燃脂暝寫弄墨晨書廣搜七略見尺牘序薔薇承蓋仿佛萬年公主之詞補注周紀顯德五年昆眀國獻薔薇水灑衣至衣敝而香不減潘嶽哀永逝文雲霏霏兮承蓋晉書武帝女萬年公主薨詔左芬作誄詞桂樹扶輪依稀西鄂王孫之作孔叢子夫子謂晏子曰齊君失之已久子雖欲挾其輈而扶其輪良弗及也庾信趙國公集序大雅扶輪小山承蓋西鄂見園次序彚為别集藏彼名山屬於建業之城闉詳鴻客序獲誦膠東之著述漢書董仲舒為膠東相吟謡靡已披賞極多嗟乎俗忌孤芳世疵文雅經傳蒙吏庾子嵩譏為了不異人陽秋晉書庾敳字子嵩讀莊子開卷便放去曰了不異人賦錬左思陸士衡誚以此間傖父晉書陸士衡聞左思作三都賦與士衡書曰此間有一傖父欲作三都賦須其成以覆酒瓿耳及左賦出士衡嘆伏才髙司馬遇楊意以何年相如傳相如著子虛上林賦武帝讀之曰恨不得與此人同時哉時楊得意為狗監薦之得召見博甚子雲遘桓談而奚日漢書司空王邑聞雄死謂桓談曰雄書能傳後乎曰必傳顧君與談不及見耳凡人賤近而貴逺親見子雲祿位容貌不足動人若遭時遇主則必度越諸子矣行矣董君勉旃自愛不遇知音之輩且食蛤蜊梁書王融詣王僧佑因遇沈昭略未相識昭略顧盻謂主人曰是何年少融殊不平謂曰僕出於扶桑入於暘谷照耀天下誰云不知而卿此問昭略曰不知許事且食蛤蜊倘逢識曲之人定呼龍鳯三國史傳孔眀號伏龍龎統號鳯雛童謡云一龍並一鳯將相到蜀中陸雲傳閔鴻見雲而竒之曰若非龍駒當是鳯雛吳天篆賦稿序四始以降代嬗歌謡六義而還家沿雅頌詩義疏四始者風始關雎小雅始鹿鳴大雅始文王頌始清廟卜商詩序詩有六義一曰風二曰賦三曰比四曰興五曰雅六曰頌后夔堂下擅搏拊者三千書孔子壇前作縵絃者十九莊子孔子遊乎緇愇之林坐乎杏壇之上列國大夫灑灑登髙之作藝文志毛萇詩傳曰登髙能賦可以為大夫宗邦公子洋洋博物之稱左傳晉侯聞子産之言曰博物君子也楚疆善怨屈原則景差唐勒之師荆楚故事楚襄王與唐勒景差宋玉遊雲陽之臺王令各賦大言又賦小言唐勒景差未如宋玊於是賜玉以雲夢之田梁苑工文喬如亦枚乘鄒陽之亞北堂書鈔梁孝王嘗集賔客遊忘憂館使枚乘賦栁路喬如賦鶴公孫詭賦文鹿鄒陽賦酒公孫乘賦月羊勝賦屏風韓安國賦几不成鄒陽代韓罰酒餘俱賜絹各五匹莫不權輿比興詩不承權輿注始也造衡始權造車始輿祖禰風騷沈約楚詞評自漢至魏詞人才子原其飈流所始莫不同祖風騷班固以為古詩之流揚雄亦曰詩人之賦孟堅兩都賦序賦者古詩之流也漢書揚子雲嘗曰詩人之賦麗以則詞人之賦麗以淫不歌而頌曽聞玄晏之談皇甫謐三都賦序古人稱不歌而頌謂之賦體物為長略見士衡之論陸機文賦賦體物而瀏亮今夫茫茫大塊燥濕攸分陶潛自祭文茫茫大塊悠悠髙旻渺渺寰區羿仁爰别補注繩編檮杌難詳九域之神姦釋名九域九州也蓍揲歸藏莫晰八紘之情狀見璿璣賦禹州饒厲鼎不鑄而胡消左傳王孫滿曰昔夏之方有德也鑄鼎象物使民知神姦故民入川澤山林不逢不若晉渚多妖犀未燃而奚燭溫嶠傳嶠都督江州軍事過牛渚世傳多怪嶠燃犀照之竒形畢見桃姬狡麗誰能自盡其儀容見琴怨序玉女幽間猶冀代傳其響像漢武內傳帝間居承華殿忽見一女子著青衣美麗非常帝愕然女對曰我墉宫女王子登也王母七月七日當暫來言訖不見興酣采烈即京都亦聽其雕鑱文苑張衡研京以十載左思鍊都以一紀張衡見園次序左思見憺園賦骨俊才雄雖江海還歸其噴欱見滕王賦初咀華而繣態終離器而存神韓文含英咀華東觀餘論張長史旭書猶擊劍者交光飛刃歘忽若神而器不離身元始而來太元真一本際經無宗無上而獨能為萬物之始故名元始亶其然矣詩况復翟泉鵝出興替何多見懸圃序陳寶雞鳴盛衰迭見列異傳秦文公時陳倉人掘地得物如彘將獻之道逢二童子曰此名為􅀈􅀈亦曰二童子名陳寶得雄者王得雌者霸人遂棄􅀈而逐二童子俱化為雉飛去陳倉人以告文公大獵得其雌者化為石因置汧渭間立祠曰陳寶雄飛入南陽秦欲表其符名曰雉縣按􅀈一作媦三秦記秦武公都雍陳倉漢屬右扶風日輪恆昃嗤夸父以徒奔列子孔子東遊見兩兒論日逺近一日日出大如車蓋日中如盤盂此近者小而逺者大乎列子夸父逐日渴飲河渭不足北飲大澤未至道渴而死郭璞山海經注夸父神人言能反日景坤軸常搖笑共工之慣觸春秋括地象地下有八柱廣十萬里有三千六百軸互相牽制名山大川孔穴相通列子共工氏與顓頊爭為帝怒而觸不周之山折天柱絶地維媧簧乍弄已看渤澥之枯見憺園賦事原女媧始制笙簧渤澥見半繭賦海枯詳琴怨序堯鶴才飛詳舜民序又見咸陽之燼史記秦孝公作咸陽徙都之漢書項羽屠咸陽燒其宫室火三月不滅時則貞夫握瑾腹轉車輪屈原九章懷瑾握瑜兮窮不知所示漢樂府心思不能言腸中車輪轉梁黃淡思歌心中不能言腹作車輪旋韓詩别腸車輪轉誼士沐蘭口銜石闕屈原九歌浴蘭湯兮沐芳宋樂府讀曲歌奈何許石闕生中口銜碑不得語並詳紫玄序欲緘恨而不能縱含辭其未可洛神賦含辭未吐氣若幽蘭臧文仲書藏讔謎頗多抑鬱之思酉陽摉古文仲為魯使齊齊拘之文仲微使人遺魯公書而謬其辭曰斂小器投諸台食獵犬組羊裘琴之合甚思之臧我羊羊有母食我以同魚冠纓不足帶有餘公及大夫莫能知召其母對曰斂小器投諸台者言取郭外民納之城中也食獵犬組羊裘者言享戰士而繕甲兵也琴之合言思妻也羊有母告妻善養母也食我同魚是有木治繫於獄矣冠纓不足帶有餘頭亂不得梳飢不得食也郭舍人語集俳諧大有洸洋之志史記滑稽傳武帝時有所幸倡郭舍人者發言陳詞令人主和悅漢書郭舍人請東方朔隱語從來文士幾同女子之善懷詩自昔悲歌每類溺人之必笑左傳越圍吳趙襄子使陪臣楚隆至吳吳王與之一簞珠曰溺人必笑吾將有問也史黯何以得為君子注溺人不知所為而反笑王以自喻所問不急也晉史黯嘗謂吳當亡王感而問之吾鄉門望舊數州來春秋吳入州來姓氏譜州來吳姓近日文豪尤推天篆爾乃詞源綺五筆陳葩流杜詩詞源倒流三峽水筆陳獨掃千人軍書斷衛夫人筆陳圖如千里陳雲文賦藻思綺合晉書管公眀與單子春談文采葩流搜古本之九丘左傳楚靈王謂左史倚相能讀三墳五典八索九丘注三墳伏羲神農黃帝書五典少昊顓頊髙辛堯舜之書八卦之説為八索九州之志為九丘識亡書之三篋漢書張安世字子孺上幸河東嘗亡書三篋安世具書其事後購書相校一字無遺蕭思話流連翰墨世曰無雙宋書蕭思話孝懿皇后弟也年未知書以博誕遊遨為事後折節書史能𨽻書善音律髙祖以國器許之曺不興遊戲丹青人稱第一吳志孫權使曺不興畫素屏誤點墨因就成蠅狀權疑其真以手彈之嘗過青溪見赤龍飛水上寫獻孫皓至宋時亢旱得所畫龍置水上雨大作世稱絶藝更厭雕華尤耽玄簡宵參絳斗晨誦黃庭絳斗見璿璣賦黃庭經名九華爍煜餉黃玊於安妃補注列仙傳晉興寧三年六月夜九華安妃與紫薇王夫人降金壇楊羲家紫薇曰此上真元君金臺李夫人之少女也道成太上書署紫清上宫九華真妃賜姓安名鬱嬪字靈簫三秀猗儺饋赤芝於許斧離騷采三秀於山間注芝草一嵗三秀沈約詩眷言采三秀徘徊望九仙晉許穆傳穆為護君長史入華陽洞得道王母第二十女紫薇夫人常降教之後與穆書曰玉醴金漿交生神梨方丈火棗元光靈芝我當與山中許道士不與人間許長史按道士謂許穆之子名宸一作名翻小字玉斧為侍班仙官赤芝見瑞木賦注青牛關上時遇老聃關令傳周無極元年老子度函谷關關令尹喜先敕門吏曰若有老翁從東來乘青牛薄版車者勿聽度關其日果至關吏入白喜曰我見聖人矣即帶印綬出迎執弟子禮朱鳥窗前或逢方朔博物志王母降九華殿時東方朔竊從殿南廂朱鳥牖中窺母陶貞白隱居之暇間涉篇章高士傳陶𢎞景字道眀讀書萬卷得葛洪仙傳齊髙帝時上表辭祿隱句容勾曲山號華陽真逸年八十五嵗無病而逝諡貞白先生或傳其仙去郭𢎞農遊仙之餘偏精詞賦臧榮緒晉書郭璞字景純嘗作遊仙詩又嘗撰洞林新林卜韻爾雅注數千篇又注三蒼方言山海經楚詞詩賦數十萬言卒後贈𢎞農太守文同束晳學類仇香晉束晳傳晳字廣微太康中歷尚書郎後歸教授所著有五經通論發蒙記補亡詩文集數十篇又注仇覽一名香字季智延熹中為蒲亭長邑令王渙慕其賢以一月俸資之入太學郭泰與之同舍下牀拜曰君泰之師非泰之友也伯喈曠逸偶詠青衣漢書王允收雍馬日磾馳謂允曰伯喈曠世逸才多識漢事當續成後史為三代大典蔡雍青衣賦略曰宜作夫人為衆女師伊何爾命在此賤微後漢張超有誚青衣賦商隱瑰竒曽吟錦瑟詩話李商隱詩文瑰邁竒古世號為三十六體曽吟錦瑟詩有曰錦瑟無端五十絃於是借讀盈門求觀接踵人過市上競詢吕覽之篇見楚鴻序客到枕間便索王充之祕見黃門序鈔來小史祇言手腕之疲唐紀蘇頲為中書舍人元宗平內難書詔填委廷碩口所占授輕重無差吏白曰丐公徐之手脫腕矣録自毛公還笑中書之秃昌黎毛頴傳始皇嘗呼頴為中書君一旦見其髮秃上笑曰中書君老而秃不稱吾用今君不中書耶則有焦國王孫為謀剞劂廬州志巢縣有南譙城一作焦晉咸康中置郡於此按滁州東晉曰南譙北齊曰北譙甘泉賦般倕棄其剞劂兮應卲注剞曲刀劂曲鑿也傅毅琴賦施公輸之剞劂注斧斤也荆南好事代庀棗梨常州志周孝侯斬蛟處名荆溪荆南山在宜興荆溪之南故名好事見憺園賦入錢恐後如酬字數之縑詳智修序解槖爭先似醵博場之箭補注頓令汲郡又出新書見尺牘序若在蕭齋定登上選見素伯序洵可裝之玳瑁真堪架以珊瑚李義山謝河東公和詩啓思將玳瑁為逸少裝書願把珊瑚與徐陵架筆更有一言竊為三嘆昔者王褒論樂宫人遍誦吹簫漢書王褒字子淵蜀人也宣帝時以太子體不安詔褒娛侍太子疾平復乃歸太子嘉褒所為甘泉及洞簫頌令後宫皆誦讀之司馬言愁皇后下為取酒相如長門賦序武帝陳皇后得幸頗妬别在長門宫聞相如之為文奉黃金百斤為相如文君取酒因得解悲愁之詞後陳后復親幸吟成枯樹庾信既彯盩綬於關中朝野僉論信初至北方文士多輕之示以枯樹賦後無敢言者説文盩赤色彯綬詳九日序賦得玄猿徐幹亦珥豐貂於鄴下魏文帝典論幹之玄猿漏巵員扇橘賦張蔡不過也張正見詩豐貂入建章並緣麗製獲簉華班而我吳子盡室燃粳南史顧歡家貧無以受業鄉中有學舍於舍壁後倚壁聽無遺亡者夕則燃松節膏讀書或燃粳自照終朝曬麥見懸圃序薦揚無路盻楊意以何年貧賤堪傷俟桓談而奚日見得仲序此則榮枯莫必季主所以咨嗟史記日者傳司馬季主者楚人卜長安東市宋忠賈誼謁之季主曰卜者導惑教愚也愚惑之人豈能一言而知之哉後宋扺罪賈不食死此務華絶根者也顯晦難期唐舉於焉嘆息者也蔡澤傳澤干諸侯不遇而從唐舉相舉熟視而笑曰吾聞聖人不相殆先生乎注蓋戲之也倘千秋而逢濟北定閔勞薪世説晉武帝賜荀朂食朂曰此勞薪炊也帝密遣問果用故車腳按朂字公魯封濟北郡公如四海而有中郎須憐㸑竹文士傳中郎蔡雍經會稽柯亭見椽竹質可為笛斷為兩節吹之為黃鍾之音陳檢討四六卷四
