body:
  text: 陳檢討四六卷十七翰林院檢討陳維嵩撰啓徵萬柳堂詩文啓都城海岱門之東沙河門之內有地一區益都相國馮公顧而樂之節縮其祿米所入買以為園名曰萬柳園先是元亷公希憲有堂名萬柳距都門不三十里而近當時趙承㫖諸公奓作詩歌以詠之其遺址在今豐臺左右公慕廉孟子之為人又園中種柳不啻以萬計故仍以為名爾其迢迢紫陌見瀛臺序注袤矗厜㕒袤見璿璣賦上林賦崇山矗矗注聳上也說文厜㕒峰頂巉崖貌爾雅崒者厜㕒歷歷黃圖廣雅黃圖帝都也遙連崖隒張衡西京賦設切崖隒說文切通砌山形如甑曰隒物豐氣盛映龍樓鳳閣之光沙暖泥融分蓮勺杏園之勝扶輿蜿蜒直衛天垣韓文中州清淑之氣蜿蜒扶輿天垣見璿璣賦碩大蕃滋原稱陸海左傳隨季良曰奉牲以告謂其畜之碩大蕃滋也漢書東方朔曰漢興去三河之地止灞滻以西都涇渭之南謂天下陸海之地西都賦陸海藏珍注高平曰陸萬物出于海關中地高物産饒富是謂陸海百昌膴膴地則居日月之旁萬彚芃芃上乃有雲霞之氣乃復林壑澄鮮郊坰明瑟不離闤闠澤以秀而能臞雖處京華土以敦而彌壽風喧夕碓已無三市之笙簫煙靄晨鐘竟隔九衢之車馬見九日序紅牆三里大抵僧廬白板千家居然村舍川原寂歷頓成華子之岡西安志輞川白墅有華子岡王維有詩咏之溪澗崢泓不減袁家之渴方言楚越之間謂水之反流者為渴永州志袁家渴在零陵南柳記云渴中重洲小溪澄潭淺渚小山美石嘉木香草轇轕搖揚野芳襲襲境尚緬而先迎室翠陰陰路非賒而仍誤如尋栗里舍此安之輿志栗里在潯陽淵明所居處若訪桃源去人不逺陶潛桃花源記晉大元中武陵人捕魚沿溪行忽逢桃花夾岸遂異之行盡水源得一山有小口入豁然男女衣著悉如外人見漁人驚問設酒食自云先世避秦亂來此公乃體崇卑之撰易積德積刑家語子夏曰商聞山書曰山為積德川為積刑濬仁知之胸樂山樂水論語經綸泉石抽黃扉補衮之餘絲詩揮灑煙雲藉紫閣為霖之巨手書黃扉紫閣見佳山序若夫才窺鶴徑便得清蒼一渡虹梁遽然空濶見憺園賦紅藤百折虛堂遙峙於林端碧蘚千盤傑閣半浮於天際然而長堤既窈定須紺岫以縈回曲檻將斜轉賴清湍之潄激假使峰非峭蒨見瀛臺序奚以顯層樓復觀之竒如其水鮮淪漣何能覩月榭煙廊之致爰乃跖巨靈之掌只擬成河述征記華山與首陽本一山河水當此曲行昔河神巨靈手擘其上足蹈其下分為兩以通河流今指掌之形在華嶽上足跡在首陽山下西京賦巨靈贔屭高掌逺跖繫彭祖之腰惟圖觀井輿志徐州城北隅祖舊宅在焉有彭祖井陳靖常作觀井圖并敘觀井圖序彭祖觀井覆以車輪繫腰以繩恐墜井中注言其慎也黎陽有土見實菴序漫勞夸父以移山見徐母序燕市無臺見九日序終想女媧之煉石見憺園賦才聞覆簣論語須臾而赤壁騰空乍見濫觴俄頃而素波衝岸孫卿子子路盛服見孔子孔子曰江出岷山其始出源可以濫觴及其至江之津也不方舟不避風不可涉也今汝衣服既盛顔色充盈孰肯諫汝乎穿渠決溜翠競粘天架壑支峰蒼俱拔地簷前㶁㶁任呼白鷺之洲方言㶁㶁激水也輿志白鷺洲在金陵西南江中窗外森森直喚青猿之洞補注嵌之臺榭歷亂於丹崖絳嶺之中被以房櫳參差於雁子鳬雛之側何期輦下孕此仙都不信人間逢兹福地見玉巖序此固東漢王根之宅青瑣非華抑亦南陽樊重之家緑墀掩嫮者也見半繭賦然而客起而言人將有請昔者永嘉太傅墅曰東山見修禊序洛下相公園名獨樂溫公獨樂園自記略曰迂叟平日讀書志倦體疲則逍遙徜徉因命之曰獨樂未央宫外無非蕭相之田園漢紀高祖至長安蕭何建未央宫史記客說蕭相曰胡不多買田地賤貰貸以自汙晝錦堂邊不少魏公之邸第見逸齊序以及裴家緑野見楚鴻序李氏平泉見藝圃序紅薑紫芋預營歸老之圖魏都賦薑芋充茂張衡南都賦蘇蔱紫薑唐詩紫收岷嶺芋白酒黃雞蚤辦引年之計見佳山序要皆不逺枌榆見觀槿序未踰桑梓詩南翁北叟徜徉里社之間西陌東阡嘯咏鄉關之內公則故園北海舊業東齊且又屢申豫告之祈頻上乞身之表孟康曰前漢律吏二千石有豫告有賜告豫告者在官有功最法所當得也賜告者疾滿三月當免天子優賜其告使歸家治病後漢書三公年老以疾乞身而乃結廬越境築屋他鄉峰雖落雁安能挾以俱飛名山志太華山有落雁峰李白登此曰呼吸之間想通帝座石縱成羊未必鞭之便走見憺園賦所慮關梁迢遞難浮天畔之槎見孝威序還嗟樓閣虛無徒結海中之市見半繭賦情寧易喻理或難期莫窺君子之心未測通人之意不知公也捐一切而不居棄萬緣而何有翔於寥廓寧為燕雀之謀見少楹序視若塵埃不慕爽鳩之樂見臞菴序付託則園丁牧豎無非此地之主人總𬋩則山鳥溪花便是吾園之家督見逸齊序相逢野老竟許看花但值高人何妨載酒聊成故事敢云來者之無賢大似閒田竊恃故人之知我於是栽之櫸柳間以楓杉永豐闌角乞求踠地之長條見紫來序灞水橋南借得銷魂之弱縷西安府志漢時送行者多至霸橋折柳相贈鄭綮嘗曰詩思在霸橋風雪中驢背上或自亞夫營裏折取數枝見昭華序漢書周亞夫封條侯屯兵細柳慕幽咏柳詩千樹低垂太尉營或從子夏市中移來幾本漢書萬章字子夏長安熾甚街閭各有豪俠章在城西柳市號曰柳市萭子夏或憐擁腫見半繭賦幾同宣武之十圍世說桓溫嘗鎮金城植柳後北伐還見柳已十圍嘆曰樹猶如此人何以堪攀枝執條凄然流涕或愛蕭疏大類泉明之五樹見海棠賦或將眠而乍起三輔故事漢苑中有柳狀如人形號曰人柳一日三眠三起曾遮何妥齊頭見逸齊序或似笑以如顰劉協新論春葩含日似笑秋葉泫露如泣唐太宗柳詩半翠幾眉開夙植王恭閣後見得仲序莫不延緣坂隰䍡􅟞坡陀見丁香賦及瀛臺序倚曲水以輕狂竚回風而甸線宋雍詩坐對玉山難甸線鵝黃乍醉見鷹垂序已成二月之花蛾緑方闌見昭華序注便作三春之雪韓退之詩楊花揄莢無情思惟解漫天作雪飛時則濛濛欲下只糝絲韁漫漫欲飛偏縈繡騎遊童絡繹競投光孝之坊貴客連翩儼入康崇之巷補注固已都下共傳為勝蹟奚止羣公皆奉以美談然而揆厥由來推其所自僅侈遊觀之美詎是本懷惟矜眺覽之宜要非篤論彼金谷銅駝以後見半繭賦既高臺曲館之何存見雪持序即津陽沁水諸園廣川書跋元嘉二十五年改開陽門為津陽漢以洛陽宫為名而南朝效之沁水見滕王賦并細柳新蒲而不見杜詩江頭宫殿鎖千門細柳新蒲為誰緑鴛鴦濼冷滿湖飄墜粉之紅補注集韻濼陂澤山東名濼幽州名淀杜詩露冷蓮房墜粉紅螞蟻墳空補注獨夜咽殘花之紫見紫來序終成昔夢徒記前遊空存前代之亭臺未審何年之羅綺達人致嘆曠士增欷公則午橋莊裏洛陽名園記唐裴晉公致仕歸建午橋莊嘗種文杏百株名碎錦坊育嬰兼以放生奉誠園中長安志司馬兼侍中馬燧宅在安邑里資甲天下燧子暢亦善殖財貞元末神䇿中尉楊志廉諷使納田里遂獻舊第為奉誠園仁民因而愛物史譏染指何心鼎內之黿見觀槿序易象朵頥易詎忍籃中之蛤地理志廣陵龍江寺僧有夢數百人求濟者翌早見人擔螺蛤往市贖放於潭續酉陽隋帝嗜蛤忽有蛤肉自脫有光現一佛二菩薩像帝悔不食從此雀辭楊館定解懷恩見素伯序便令燕别張巢還思報德見銀臺啓至於生憑廩竹亦荷矜全見憺園賦源出空桑咸資顧復列子伊尹生於空桑吕氏春秋有侁氏采桑得嬰兒於空桑之中獻之其君曰其母伊水之上嘗夢神人告之曰臼出水而東走母明日視臼果出水乃走十里而故邑盡為水身因化為空桑故命之曰伊尹徐陵與楊愔書自非生憑廩竹源出空桑行路含情猶其相愍夙依蜾裸詩熙熙多含哺之民莊子馬蹄篇夫赫胥氏之時民含哺而熙鼓腹而遊小字於菟見納姬序粲粲有圜橋之彥後漢儒林傳序明帝初建三雍躬詣講學諸儒執經問難冠帶縉紳之士圜橋而觀聽者蓋億萬計此皆功德之難刋祗患揄揚之莫罄伏冀同人共賡雅唱或詩或賦千章謝朓之咏齊書謝朓字𤣥暉宋僕射景仁從孫一作謝朓為隋王功曹美文章清麗可愛李白傳白嘗登華嶽落雁峰曰恨不攜謝朓驚人句一問青天耳為序為銘滿架徐陵之筆見天篆序庶使楊林渡口見銅雀賦長謡君奭之甘棠詩將期柳宿星中天文志柳宿乃二十八宿之一共指公孫之大樹見鷹垂序請周翼微篆刻圖章啓月晴紫陌只照青衫秋老渾河見九日序漸添黃葉荆軻一去市中饒感慨之人見智修序樂毅無歸臺畔足飄搖之客見田太翁啓爰有汝南才子婁水名流摛文則翡翠盈箱見智修序織句則蒲桃竟幅見三芝序固已江東僑肸見壽季序推以君宗詩河北溫邢見園次序呼為祭酒見儲太翁啓爰觀石鼓見梧月序偶客金臺見九日序劉公幹之逸氣籍甚都中魏文帝與吳質書公幹有逸氣但未道耳謝靈運集詩序楨文最有氣所得頗經竒漢書陸賈游公卿名聲籍甚音義狼籍甚盛王輔嗣之清談斐然都下見賀徐序五侯接席都為樓護傳鯖見瀛臺序千里知名競以陳蕃下榻漢書陳蕃為豫章守罕所接見惟設一榻以待徐稚來則下之去則懸之郭林宗稱稚為南州高士昨與同人為言剩技周瑜顧曲之暇見良輔序間涉說文見亓山序伯仁飲酒之餘見壽徐序兼摹繆篆見納姬序爛銅破玉頻鐫蝌蚪之形見憺園賦漢印秦章屢畫蛟螭之狀見亓山序然此微長原無足述如斯小道亦又何之僕笑而言君何不達今夫華章麗句或偏知已之難逢巨製鴻裁恆慮賞音之莫遘若夫見蔡中郎之鳥篆則傳觀盡訝其精見憺園賦觀戴安道之雞碑則好事羣驚其竗見無忝序蓋形而下者易為知形而上者難為喻也然而聊為遊戲何妨暫揮郢客之斤見半繭賦姑與周旋何須不刻宋人之葉見藝圃序嗟乎絶技可傳多能有屬祗論一藝願諸君無失此人若問其他恐當世竟無其亞譬訪君平卜筮亟趁其百錢罷肆之前見季青序如求王宰丹青幸需之十日一山而後畫斷王宰家于西蜀能畫山水意出象外杜甫題王宰圖歌十日畫一水五日畫一石能事不受相促迫王宰始肻留真跡徵刻今文選今文鈔啓粵稽結繩邈矣代有篇章見園次序斷竹斐然人多述作古彈歌斷竹續竹飛土逐宍劉協云斷竹黃歌乃二言之始注黃帝歌也吳祐傳注古人寫書以竹簡其簡用火炙令汗出拭去易書復不蠧曰汗青洎於伏勝陳農之輩見映碧啓沿及王儉任昉諸人宋書王儉言論造次必依儒者自比謝安梁書任昉樂安人通經術號五經笥尤長載筆藝文之録價重連城見昭華序館庫之林名班七略見尺牘序然而間有亡書見天篆序悉多善本東都事略世之藏書以宋次道家為善本書皆校讐三五遍住春明坊晉昭陵時士大夫多僦書其側便于借觀書淫左癖見憺園賦好古者奚翅連珠見尺牘序宋豔班香見瀛臺序臨文者寧無編貝見璿璣賦逸詩缺史行是丈人漢史單于曰漢天子我丈人行汲冡秦碑禮先一飯汲冡見尺牘序秦碑見歸田序路史餘論禮食必祭祭先飯祭乎其始飯者也國語夫差求成於勾踐曰寡人禮先一飯矣注言已年稍長于越王覺差一飯之間此既無藉於表童我亦何煩夫鈔撮若乃勝衣所見見素伯序每遇上流總角之交詩恆逢才子左家籓溷見憺園賦借鉛槧為畋漁鉛槧見尺牘序畋漁見􅋯菴序王氏巾箱見尺牘序以文章作衣食斷自本朝而上溯乎就傳以還禮十年出就外傳曾通音譯名作居多珠林晉鳩摩羅什通辨夏言舊經多有乖謬乃考校三百餘卷皆其所音譯間奉鞭弭高文不少史記假令晏子而在雖為之執鞭所欣慕焉左傳左執鞭弭以與君周旋遂燃脂而瞑寫爰弄筆以晨書見得仲序不幸中更兵燹洊歷亂離帳中之祕見黃門序與銀雁以俱飛見半繭賦篋衍所藏見尺牘序共珠囊而不見見鴻客序他若庾開府生平所作五存五亡杜荆州疇昔之碑一山一谷見黃門序凡諸遁甲事原遁甲書王母授黃帝以及祕辛楊慎題辭漢雜事祕辛一卷載桓帝懿憲梁皇后被選及六禮册立事而吳姁入后燕處審視一段最為竒艷載津逮祕書老兵既裂以補袍唐本事詩開元中頒賜邊將纊衣製于宫人有兵士于短袍中得詩曰沙場征戍客寒苦若為眠戰袍經手作知落阿誰邊邊帥進之𤣥宗命示六宫有一宫人自言萬死帝憫之遂以嫁得詩者里媪亦藉之覆醬見懸圃序殘通惡棧爛然四部之珠英敗紙煙煤宛似五車之玉屑四部五車見園次序王安石詩人間榮願付苓通注苓豬矢通馬矢山谷書跋往時士大夫罕能道宣獻書札之美者今始于敗紙蛛絲煤尾之餘軸以象玉晉書胡母輔之字彥回吐佳言如鋸木屑霏霏不絶沈約序笑玉屑之諫集逢作賊視沈約而彌慚三圖典略魏收每陋邢邵文邵嘗云任昉文體本疏收非直摹擬亦大偷竊收聞之乃曰邵嘗于沈約集中作賊何意道我偷任語詩供撏扯較義山而逾酷古今詩話李義山西崑體後進效之多竊取詩句嘗內宴優人有為義山者衣服敗裂告人曰吾為諸館職撏扯至此聞者大噱能無歎息良用酸感是以遘彼雞林見儲太翁啓探其象罔見璿璣賦都為一集派以兩家斆秦漢六朝者入蕭家文選之中見素伯序倣韓柳歐蘇者歸茅氏文鈔之部按茅鹿門選八家文名文鈔庶幾兩美離騷兩美其必合兮要可單行補注所望高賢共成勝事至夫往昔篇章古今墳索見天篆序上者作聖世之笙簧見素伯序下者代閒居之博奕論語若有性喜刺譏語工怨悱宋玉既口多微辭見良輔序孫盛復直書時事者晉書孫盛字安國著晉陽秋世稱良史桓溫見其書枋頭敗衄之事怒謂盛子曰若此史行自是關君家門户諸子因號泣盛前盛不從諸子潛改之鄙人惟怯不登楊惲之歌見看奕賦君子溫柔母為趙一之賦見蓴菴序及任邱啓有一於此勿付典籖苟有他樂敢求記室書有一于此未或不亡左傳雖有他樂弗敢請也典籖記室見尺牘序徵刻吳園次宋元詩選啓何地無愁見翠怨序有天長醉見觀槿序英雄未老藉選句以移情見井叔序嵗月多閒仗鈔詩而送日見觀槿序維時祝融煽虐月令孟夏之月其神祝融鶉火揚輝見鄴園啓流金爍石如逢十日之年楚詞十日代出流金鑠石淮南子堯時十日並出焦禾稼殺草木堯乃使羿射之望雨瞻雲若在無龍之國見鄴園啓乃約論文之侣同過看奕之軒忽有微凉濯豫煩暑繅來氷繭爽氣襲於牀頭拾遺記東海員嶠山有氷蠶長七寸以霜雪覆之然後作繭取之織為文錦入水不濡投火不燎一作霜蠶啖罷哀梨好風生於帳裏世說秣陵有哀仲家梨甚美大如升入口消釋古詩好風從東來迫而視之是編斯在夫其語必生新篇皆矜雋龍編鳥篆龍編見半繭賦鳥篆見銀臺啓書得之壞冡之中見尺牘序禁臠侯鯖味或在庶饈之外見瀛臺序么絃急拍務尋歷代之遺聲見懸圃序迂叟漫郎詎録三唐之殘客司馬光傳光因論新法忤時居洛十五年自號迂叟漫郎見􅋯菴序梁書張纘為尚書僕射與何敬容居權貴賔客輻輳有詣纘者纘拒之曰我不能對敬容殘客三唐見瀛臺序問石家之厮養衣火浣者三千厮養見皇士序世說石崇厠常有十餘婢侍列麗服藻飾列子西戎獻周穆王火浣之布浣之必投于火皓然疑乎雪詢趙氏之璵璠酬名城以十五見歸田序洵他選所莫收亦諸賢所未逮者也然欲私之篋衍見尺牘序既恐令其破壁而飛水衡記張僧繇于金陵安樂寺畫兩龍不㸃睛每云㸃之即飛去人強㸃其一須叟雷電破壁一龍上天一龍不㸃者猶存念將懸以國門見楚鴻序又難使彼不脛而走列子連城之璧夜光之珠無翼而飛不脛而走人之為之也孔融云珠玉無脛而自至者人好之也不揣鄙人質之大雅但獲稍加嗇縮便成文苑之竒觀儻其廣致揄揚尤屬詩壇之嘉話始則計卷以徵資後乃償書而給直勿云刈桂炊珠君乃為此度越恆情之論國䇿蘇秦之楚三月乃得見王曰楚國食貴于玉薪貴于桂王曰聞命矣所賴鐘鳴谷應世自不乏流連古曲之人方朔傳漢武時未央宫殿前鐘自鳴方朔曰臣聞銅者山之子山者銅之母子母相感山有奔弛者故鐘先鳴後南郡太守果上言山奔魏書魏殿鐘自鳴茂先言此蜀郡銅山奔耳殷浩曰銅山西奔靈鐘東應謝柯翰周惠爐扇啓裁來皎月詠自班姬見海棠賦滃得香雲製緣丁緩西京雜記長安巧工丁緩作臥褥香爐為機環轉四周而罏體常平可置之褥被又作九層博山罏鏤以竒禽怪獸瘦骨截湘妃之竹見憺園賦蟬雀分行齊書何戢為吳興太守孝武賜蟬雀扇顧景秀所畫時美其巧絶一作齊高帝好畫扇何戢以顧所畫獻之同心煎荀令之香見紫𤣥序鷓鴣成片香譜擇香木之曲幹以刀斫成坎經年結斑㸃名鷓鴣斑睡茱萸之復帳見昭華序有鴨皆紅見葉母序舞翡翠之晴窗見韓倬啓無鸞非彩下注擎諸掌上藏並奩中然而九華乍御金獸先啼曹植九華扇賦形五離而九折蔑釐解而縷分注其製不圓不方其中結成文羅隱詩噴香瑞獸金三尺見上注四和才烘畫羅遙妬下注維四時之代謝故兩美之難兼並荷蘭閨之澤後漢皇后紀贊頒政蘭閨恨不同時俱邀柘館之榮見徐母序愁難相見今某雙承雅貺兩藉殊頒握彼兔華之下見璿璣賦驟識春遒擁於麝火之旁見黃門序旋知秋盡無冬無夏咸銘踰量之施倐燠倐寒彌切撫時之感附注劉禹錫團扇歌上有乘鸞女山居清要用梨棗核柏葉蔗查為末名四和香焚之代友謝送湖綿花褐選頴燈檠啓七襄駝褐桃花映水以爭鮮詩義疏織女星在漢旁自卯至酉當更七次曰七襄萬縷紅絲柳絮因風而乍起見琴怨序産於塞外叢編載㧘毲之名後漢西南夷傳能作青頓㧘毲注青頓今名絲頓㧘毲今紫毾也乃蠻夷毛罽叢編見紫來序浴自盆中見雪持序脞史記芮溫之號吕覽必已篇不食榖實不衣芮溫注芮絮也芮取細密溫燠義脞史見尺牘序至於日之夕矣詩在旁惟一二燭奴天寶遺事申王宫中以龍檀木刻成童子彩衣束帶每夜集列執畫燭謂之燭奴客則休乎莊子許由謂堯曰歸休乎君侍側只十雙毛頴見昭華序孫康則映階少雪見茹蕙序祗圖續命蚖膏淮南子萬畢術取蚖脂為燈置水中即見諸物江淹則入夢無花見園次序長冀乞靈鼠尾見疊韻序俱珍藝苑並豓書幃今某東海釣魚莊子任公為大鈎巨緇五十犗為餌蹲于會稽投竿東海期年得大魚臘之自浙河以東莫不饜若魚者詎有輕肥之望論語西華衣葛見吳太母啓敢興安襖之思詩兔毫秃盡班生投矣而未遑班超傳超傭書養母嘗投筆嘆曰大丈夫無他志略猶當效傅介子張騫立功異域安能久事筆研間乎鳳脛燒殘見雪持序山鬼吹之而亦得楚詞屈原九歌山鬼其一也有曰若有人兮山之阿被薜荔兮帶女蘿杜詩山鬼吹燈滅何來高誼逮及羈人緰㠿捧至豓欲凌霞說文緰資布之尤精者注㠿與資音義通紕絮貽來柔如疊雪詩素絲紕之鄭注織組也說文繅餘為絮杜詩香羅疊雪輕曳之沃若詩布何羡於賨人晉食貨志南蠻嵗令輸布一匹小口二丈謂之賨布晉中興書巴人謂賦為賨因名巴賨左思蜀都賦奮之則賨旅風俗通巴有賨人剽勇漢高取之定三秦繅處卷然紅定煩夫女手見憺園賦注及雪持序别有深情託於長物見憺園賦年年鑿壁見素伯序贈伊懸火之銅釭日日鈔書貽爾臨池之玳管管城子脫冠以至毛頴傳始皇封諸管城號管城子後拂拭之因免冠謝一架珊瑚見天篆序不夜侯秉燭而來兩行菡萏補注庾信對燭賦銅荷承淚蠟按荷即菡萏也從此蟹筐蠶績頓忘范叔之寒檀弓蠶則績而蟹有筐史記范睢入秦拜相須賈使秦睢敝衣微行見賈賈驚曰范叔一寒至此哉乃取一綈袍與之自兹鵝帖螢窗益進昌黎之學書斷王羲之為右將軍性愛鵝山陰道士好畜鵝羲為寫道德經籠鵝而歸相傳有鵝羣帖螢窗見憺園賦昌黎傳愈以正學自持學者仰之為泰山北斗銜恩莫罄鏤德何窮此啓謝友人賚石榴啓壓簷窋吒産自塗林補注陸機與弟書張騫使外國十八年得塗林即安石榴也隔膜胭脂呼為丹若李義山詩榴膜輕明榴子鮮酉陽雜俎石榴一名丹若一名金櫻張騫槎到見孝威序新移海外之枝元稹詩何年安石國萬里貢榴花迢遞河源道因依漢使槎李靖編成補注夙號天漿之汁酉陽雜俎石榴甜者謂之天漿既可施之作枕賦就張紘見季青序還堪染以為裙詩裁武后見海棠賦懸焉似瘤既標劉杙之名補注重一可論斤亦著離斯之國續酉陽雜俎大食勿離斯國石榴重五斤某愁同平子見少楹序渴類相如見智修序幸沾珍果之頒獲飽上林之味客來筵上纍纍不夜之珠張載石榴賦剖之則珠散含之則冰釋崔湜詩珠房折海榴藏向奩中歷歷記歌之豆見素伯序偏譏栗罅殼冗青毛欲鬭離支綃籠紅肉詎止伽藍作記白馬寺之甜實直牛洛陽伽藍記白馬之村出榴大如斗甜如蜜語曰白馬甜榴一實值牛須知伯起曾言安德妃之榴房多子見看奕賦飲君雅意貺我成言謝園次賚衣啓鴛鴦作匹見瀛臺序扶風織錦之家見璿璣賦蛺蝶為羅叢臺袨服之客杜詩花羅封蛺蝶藝文志趙武靈王建叢臺于邯鄲前漢書全趙之時武力勇士袨服叢臺之下一旦成市注盛服也今某裘類蘇秦服來久敝蘇秦傳黑貂之裘敝衣同到溉著處還穿梁書到溉性率儉不好聲色庭室單牀旁無姬侍冠履十年一易朝服或至穿補並見園次序猥以班荆見禹平序於焉贈縞見淡園賦仙園獨繭搗須新市清砧鄴館雙絲濯用成都粉水列子詹何楚人也以獨蠶絲為綸引盈車之魚列仙傳園客種五色香草有五色蛾上香草末生桑蠶有女與客俱蠶繭大如盆繅訖莫知所之上林賦曳獨繭之褕絏梁元帝駌鴦賦文生新市之機李義山詩地逈更清砧魏志舊綾機五十綜者五十躡六十綜者六十躡庾信謝賚絲布啓關尹津梁之織鄴地雙絲扶風彩文之機仙園獨繭粉水見園次序訝獸罏之不暖見謝柯啓憎鶴氅之猶寒見紫𤣥序遂使季路縕袍論語忽現藍花之色見琴怨序注將見原思露肘俄成綟葉之形家語原憲正冠則纓絶振衣則肘見納履則踵决莊子曾子捉襟而肘見納履而踵决杜詩衣䄂露兩肘說文綟帛戾草染色也姬人裂帛史記褒姒好聞裂繒聲左傳召使者裂裳帛而與之競詢何處紅蠶補注嬌女挽鬚見看奕賦預索此中紫鳳杜甫北征詩海圖折波濤舊繡移曲折天吳及紫鳳顛倒在短褐謝劉王孫示西洋諸器詩啓青宫愛子曾傳如意之銘補注神異經東明山有宫青石為牆門有銀榜以青石鏤題曰天地長男之宫注太子曰青宫震為長男東屬震故主宫于東曰東宫金陵志漢時秣陵有掘得銅匣者開之得白如意皆刻螭虎蠅蟬等形朱邸親王見滕王賦夙擅屏風之作禮記注天子負斧扆而立屏風扆遺象也三禮圖屏風之名出于漢漢書梁孝王賔客有羊勝賦屏風按梁簡文有謝賚屏風啓十層胡粉解染妍詞見楚鴻序百􅗡蠻箋工書艷曲蠻箋見三芝序東觀餘論小宋太一宫詩仙圖幾弔開自注以真誥一弔為一卷不知真誥所謂􅗡即卷字蓋從省文真誥音亦爾非弔字也錦褶與蟬鬟並亂說文衣褶不知注褶同褶蟬鬟見琅霞序金筒共麝月同飄金筒補注張正見詩裁金作小靨散麝起微黃酉陽雜俎近代妝尚靨如射月曰黃星靨靨鈿之名玉臺新咏序金星與婺女爭華麝月共嫦娥競爽某深愧陳琳見滕王賦注幸逢劉向見映碧啓注按劉向字更生以避諱改字子政齎來蝌蚪見憺園賦疑焚辟惡之香見劉太母序躍出娵隅世說郝隆為桓公南蠻參軍三月三日會作詩隆作云娵隅躍清池桓問之答曰蠻名魚為娵隅似被若亡之縠補注光同不夜體比宜春見徐母序假令司馬為郎還通卭僰見劉太母啓若使仲容追婢定是鮮卑世說阮仲容先幸姑家鮮卑婢及居母喪姑當逺移初云當留婢既發仲容借客驢著重服自追之纍騎而返曰人種不可失即遙集之母也謝吳伯成明府賚酒米并炭啓條風未播淮南子猶條風之時灑誰貽范叔之綈見代友啓珂雪將零補注只減梁鴻之竈見天章序畫從馬援豈足療飢馬援傳援說光武破隗囂于帝前聚米為山谷指畫形勢噀自欒巴何由取醉見天章序食惟一溢補注年年貸向監河莊子外物篇莊子家貧故往貸粟于監河侯量減三升見藝圃序注夜夜酤從蜀肆成都志山濤治郫邑時刳大竹酴醿釀釀作酒兼旬方開香聞百步蜀人傳之為郫筒酒杜詩酒憶郫筒不用沾乃者辱憐臣朔之飢東方朔傳朔對上曰侏儒長三尺餘俸一囊粟錢二百四十朔長五尺餘亦俸一囊粟錢二百四十侏儒飽欲死臣朔飢欲死猥念寬饒之醒見禹平序舂成精鑿與緑蟻以偕來張載酒賦縹蟻䓑布芬香酷列曹植七啓浮蟻鼎沸注杯面浮花也刈自琅琊見竹逸序並玉蛆而俱至李白傳太白好飲玉浮梁注即浮蛆酒脂也東坡詩桑落初嘗艷玉蛆除芒紅稻見􅋯菴序聚來作城郭之形見上壓榨金漿釀就得雲霞之氣抱朴子碩曼卿入山學仙自言仙人以流霞一杯與我輒不飢渴注天仙酒名况頒搗炭詳下用代燃薪貯之寶鴨見謝柯啓鳥無事於避風國語海鳥曰爰居止于魯東門之外展禽曰夫廣川之鳥獸恆知而避其災也是嵗也海多大風刻作紅獅語林晉羊琇字雅舒性豪侈洛下少林木琇乃搗小炭為屑以物和之作獸形溫酒昭明錦帶書溫獸炭而袪透心之冷鶴奚為而訝雪見滕王賦注及舜民序戲與李渭清索餅啓假家食品先譜牢丸荀氏饌經尤推薄夜見瀛臺序溲成䬯餥方言陳楚之間相謁而食謂之䬯餥爾雅餥食也說文餱也易汚靈寶之衣補注小名録桓𤣥字敬道生而有光照室少名靈寶蒸作餢􅫂齊民要術有餢􅫂篇云餢􅫂滑而美按餢􅫂起餅也發酵使麵輕高浮起炊之賈公彥以為起膠餅也慣賣安丘之市見祖德賦齊民要術競傳不托之名後魏書高陽太守賈思協撰齊民要術數卷五代史李茂真傳昭宗云朕與宫人一日食粥一日食不托注不托乃俗語即餅南楚新聞補注亦擅紅綾之號見瀛臺序在六季則呼之為䬳至兩州則名以為䭔南史郭平原感文帝帝崩日食麥䬳一枚又齊衡陽王鈞生母病不食五色䬳注六朝人呼餅為䬳李萼饞語詩拈䭔䑛指不知休注蜀人呼蒸餅為䭔詎須束晳才賦安乾見瀛臺序注寧假虞悰惟誇米粣南史虞悰作扁米粣注即今饊子僕託處掘門見壽徐序棲遲藿食家語孔子厄于陳蔡藜羮不糝韓子粗糲之飯藜藿之羮也家原吳地夙耽鮭菜之風遊到梁園偶習餦餭之味楚詞粔籹蜜餌有餦餭些注粔籹環餅也餦餭餳也以蘖熬米為之亦謂之飴此則其乾者也酒壚傝傉偕鈴卒以加餐說文傝傉下材不肖之人或作莫大羽冗古詩弩力加餐飯葱肆􅂒􅂒共騎奴而屬饜梁書吕僧珍兄子求官僧珍曰汝等當速歸葱肆世說羊祜有鶴善舞客試之􅂒不肻舞左傳屬饜而已自客都亭長懷宛雒見憺園賦人非雁鶩何求澤畔之糧國䇿燕太后曰賴先王雁鶩之餘食九辨鳬雁皆唼夫梁藻兮廣絶交論分雁鶩之稻糧行類侏儒并乏囊中之粟見謝吳啓猶憶前宵曾䝉設食膏環一捻玲瓏映字以俱明唐托言宣帝賜韋澳孫宏銀餅餤皆乳酪膏腴之所為清異録金陵士大夫鼎鐺有七妙餅可映字其一也粔籹千堆見上齊民要術膏環一名粔籹柔弱因風而欲起見瀛臺序遍驕座客還託家僮頗餘望蜀之思後漢書光武賜岑彭等書曰人苦不知足既得隴復望蜀注隗囂平復擊公孫述也仍作發棠之請孟子想何年歸去細說於荒橋野店之旁來日過從大嚼於淡月輕烟之候不煩髀臄詩以慁公為但有寬焦補注可遲賔至無嫌惡客縱懷矣而何妨漢書公孫𢎞曰寧逢惡賔莫逢故人懷餅見憺園賦倘屬戲言即畫之而亦可魏志盧育言名士如畫地作餅不可啖食陳檢討四六卷十七
