body:
  text: 陳檢討四六卷二翰林院檢討陳維嵩撰賦憺園賦東海先生西清學士相如上林賦象輿婉僤於西清張揖注西清堂中清净處也砥信懷貞處仁敦義里名通德之鄉見祖德賦居作華隂之市高士傳漢張楷字公超通嚴氏春秋古文尚書門徒常百人賔客車馬填街楷輒徙避隱宏農山學者從之所居成市後華隂山南遂有公超市傳家而望本駒王邁種而人呼麟子檀弓容居曰昔我先君駒王西討濟於河注容居徐國公族稱其先王也徐陵傳陵八嵗能文十三通老莊釋寶志摩其頂曰此天上石麒麟也書皋陶邁種德並跗則無林不桂五竇寧賖顔延年曲水詩序並柯共穗之瑞竇禹釣傳禹鈞仕周五子儀儼侃稱僖相繼登科時目為燕山五桂連枝則何樹非瓊雙丁詎擬晉中興徵祥記連理者仁木也或異枝還合或兩樹共合莊子南方積石千里名瓊枝高百二十仞文士傳丁儀字正禮魏武辟為椽弟廙字敬禮為黃門侍郎曹植有異才而儀廙為之羽翼有張氏之長公乃楊家之伯起史記張釋之傳云公有子張摯字長公東觀漢記楊寶子震字伯起明經博覽諸儒為之語曰關西夫子楊伯起官太尉子秉亦為太尉賜彪為司空爾乃直對銅街見滕王賦袤延繡陌見璿璣賦巷控三條衢交五劇班固西都賦披三條之廣路爾雅注一達曰道路二達曰歧旁三曰劇旁五曰康六曰莊七曰劇驂八達曰崇期九達曰逵中高定國之閭旁置當時之驛漢書于公郯人里門壞議共營之公為獄吏高大其閭門曰我治獄多隂德子孫必有興者至定國為丞相永為御史大夫封侯傳世云班固列傳鄭當時字莊以任俠自喜景帝朝為太子舍人常置驛馬四郊存問故人惟恐其不遍知後包董相之園前枕晏嬰之宅漢書董仲舒下帷三年不窺舍園後為江都相晏子春秋景公使更晏子之宅曰子之宅近市湫隘囂塵請更居爽塏辭曰臣之先居此宅焉臣不足以嗣之於臣侈矣於是入青瑣度緑墀西京賦青瑣丹墀庾信為長孫儉碑緑墀青瑣孟康曰以青畫户邊鏤中天子制也師古注以門刻連鎖文而青塗之可通用撼屈戍搖罘罳見滕王賦啓橫門之䆗窱遵修弄之逶迤西京賦望䆗窱以徑庭注深逺也靈光殿賊洞房䆗窱而幽邃說文弄巷也修弄猶永巷之類逶迤載詩巷緣折而多誤徑以遼而轉疲忽粉垣之娟然援幽荔以障之步履將窮漸近聽鸝之館晉書戴顒字仲若安道之次子每春日携雙相斗酒人問何之曰往聽黃鸝聲藥闌乍入已親鬪鴨之陂吳志建昌侯孫慮堂前作鬪鴨欄頗工巧按唐龜䝉亦有鬪鴨闌晉蔡洪鬪鴨賦振徑羽竦六翮抗嚴趾望雄敵忽雷起而電發赴洪波以奮激并詳琅霞序至則未暇數池臺之羃䍥也而先倣佛乎樹石之離奇樹則枯杉十畝老柏千章皮皴半裂腹豁全僵黃偏著雨丹只酣霜支離囷蠢跋扈昂藏莊子支離疏者頥隱于齊肩高于頂注形不全正也張衡南都賦芝房菌蠢生其隈注盤戾貌漢書注跋扈强梁貌李泌詩空作昻藏一丈夫蝌蚪縱橫半程邈李潮之𨽻吾衍曰上古無筆墨以竹挺㸃漆書竹上竹梗漆膩畫不能行故頭粗尾細象蝦蟆子形謂之蝌蚪書注蝌蚪蝦蟆子也書苑秦時𨽻人下邳程邈改篆為𨽻始皇見而重之草勢起於漢時解散𨽻法唐李潮善小篆師李斯嶧山碑見稱於時杜甫詩有李潮八分小篆歌蛟螭拏攫是竹王木客之裝九歌駕兩龍兮驂螭注如龍而黃無角西京賦熊虎升而拏攫桞完元詩林壬攫拏注摶持也後漢南蠻傳夜郎者初有女子浣於遁水有三節大竹流入足間剖竹視之得一男歸養之及長有才武自立為夜郎侯以竹為姓武帝賜以王印綬後遂殺之封其三子為侯死配食其父今夜郎縣有竹王三郎神是也華陽國志竹王祠今在施州歌羅寨西亦名夜郎侯祠吳越春秋勾踐令工伐木獻吳久不得歸工人作木客吟後名木客村又按鄱陽山中有木客秦時造阿房者食木實得不死瓊州志木客即山魈也有還山弄明月之詩皮日休詩行遇竹王因設奠居逢木客又遷家石則九㸃恆青名山志九華九峯匡廬九叠李賀詩遙望齊州九㸃烟一拳彌秀篁借啼斑玉由血繡博物志舜南巡不返葬於蒼梧之野堯二女蛾皇女英追之不及至洞之庭之山以淚揮竹竹盡斑妃死為湘水神山海經侖者山有水曰白䓘可以血玉注染玉有光蘚蝕紅羊苔纒碧獸述異記梓樹之精化為青羊五百年而為紅羊嬴政鞭餘媧皇煉就三齊略記始皇作石橋欲過海看日出處時有神人能驅石下海石去不速神輒鞭之皆流血至今悉赤陽城山石盡起立嶷嶷東傾狀如相隨行列子天亦物也物有不足故昔有女媧氏煉五色之石以補其缺怪同齊女之瘤醜類丈人之僂劉向列女傳齊宿瘤女東郭採桑齊閔王以其賢聘為妃項有大瘤故號宿瘤莊子達生篇仲尼適楚見痀僂者承蜩謂弟子曰用志不紛乃凝於神其痀僂丈人之謂乎注僂短醜貌叱來仙子堪為韻士之供神仙傳黃初平牧羊見道士因隨入金華山石室中兄初起屢求之始得晤問所牧羊何在初平曰在山東往視但見白石初平叱曰羊起石成羊數萬頭射自將軍可作高人之潄漢書李廣出獵見草中石以為虎射之沒鏃視之石也更射終不能入韓詩外傳載楚熊渠子事同晉書孫子荆謂王武子曰當枕流潄石王曰石非可潄流非可枕孫曰枕流欲洗其耳潄石欲礪其齒然而既饒老木須䕃澄潭不遇清流空堆錦石此司州印渚尤欣浩渺之觀王胡之别傳胡之字修齡為司州刺史至吳興印渚中嘆曰非惟使人情開滌亦覺日月清朗莊叟濠梁酷愛淪漣之色也莊子秋水篇莊子與惠子遊於濠梁之上爾則鏡行一奩縠紋半搦晉書王羲之言入山隂道如行鏡中李詩池開照膽鏡托言浪細如縠紋浪滑如酥波平類削茭礙槳而絲柔菱觸舷而蔓弱凌冬而荻緯蕭蕭涉夏而荷粧灼灼半篙卵色染四面之房櫳萬片魚鱗皴兩邊之樓閣張衡南都賦房櫳對擴古詩著雨新添半篙水陸游詩殘霞蹙水魚鱗浪薄日烘雲卵色天時則繚之綺舍嵌以精廬儒林傳精廬暫建環池以憩夾浦而居紺榭鏤楹視花光為疏密長欄復道依草態以縈紆既燠房之奧窔亦凉館之虛無名園記裴度午橋莊具凉臺燠館答賔戲守窔奧之熒燭注深逺貌雲淡而篁粉松脂盡粘帷幕月上而簾鈎窗網總落菰蒲而或者臨河脈脈一葦何從隔水盈盈終朝徒望古詩十九首盈盈一水間胍胍不得語詩一葦杭之跂豫望之爰童烏鵲之毛頓截虹霓之狀淮南子七夕烏鵲填河成橋以度織女托言七夕次日烏鵲頭毛有秃處周處風土記陽羡縣前有大橋其中髙起似虹形李詩乘橋蹻彩虹爾乃鴈齒齊排鼉梁載上白帖橋有雁齒竹書紀年周穆王伐楚至九江黿鼉為梁以度集仙録穆王駕黿鼉魚鱉為梁濟弱水而升崑崙㑹西王母鏡湖則卧以朱欄沙檻則委之緑浪修廊善皺千回機上之文見璿璣賦短彴恆斜四角盤中之樣廣志獨木之橋曰𣙜亦曰彴注今謂彴為略彴樂府解漢蘇伯玉妻盤中詩盤屈曲書之傅也休奕云山樹髙鳥鳴悲末云當從中央周四角是界破碧鷗之宅常隔東西𣲖開紅藕之村自成三兩更橋畔以婆娑詩值東風之駘宕莊子惠施之材駘蕩而不得謝元暉詩春物方駘蕩踠地而桞線千絲拂衣而楊花一桁海山記煬帝望江南有云線拂行人春晚後絮飛晴雪暖風時崔灝詩萬萬長條拂地垂川觀甫歇巖趣彌遒乃攀峭閣用眺層丘倐八窗之競闢已萬􅊤之爭流禮五户八窗清虛真人歌八窗無常朗世說顧愷之言㑹稽山川千巖競秀萬壑爭流春人遍野春山滿樓春荑被隴春羽盈疇冷節鞦韆戲鼓酒旗之㑹歲時記寒食謂冷烟節開元遺事宫中寒食立鞦韆為樂明皇呼為半仙戲高無際鞦韆賦序武帝後庭之戲本云千秋訛傳轉為秋千後人失其義又旁加革山谷詩未到清明先禁火還依桑下繫千秋叢祠賽社巫蕭蠻管之遊國策應侯謂昭王曰亦聞恆思有神叢與注恆思地名神叢神祠叢樹也梵語叢林譬如大樹叢叢禮雜記注鄭康成謂穀鬼神而祭祀州黨以禮屬民今賽社則其事爾茜袂成羣盡綿芊於嶺岫貨殖傳干畝巵茜比千乘之家注即今紅花可染絳楚詞望逺兮阡眠注一作阡綿與綿芊義同黛衫作隊頻掩映夫松楸能不結遙情之亹亹增逸興之悠悠也哉夫其座列古歡家慳長物王恭别傳王悅見恭六尺簟謂有餘求之恭即送之後悅見恭更無簟恭曰生平固無長物峻只書淫預惟左癖劉孝標傳峻博極羣書間人有異書必往借之人謂之書淫元晏春秋人號余為書淫晉書杜預字元凱嘗稱王濟有馬癖和嶠有錢癖武帝謂預曰卿有何癖對曰臣有左傳癖問樗蒲之幾齒略未經心葛洪傳稚川性寡欲無所愛玩不知棋局幾道樗蒲幾齒馬融樗蒲賦排五木散九齒精誠一呌十盧九雉晉書陶侃為荆州刺史取參佐蒱博之具投諸江曰樗蒱者牧豬奴戲耳按樗蒲亦作樗蒱詢奴價之若何曽誰關臆世說符朗初過江王咨議問以奴婢貴賊朗云謹厚有識中者乃至十萬無意為奴婢問者止數千耳按羲之第四子肅之為驃騎咨議晉書祖訥自炊養母王敦遺以兩婢辟為從事中郎戲曰奴價倍婢答曰百里奚何必輕於五羖皮耶絶無他嗜寧吹潘嶽之笙潘嶽傳安仁嘗作笙賦有曰各守一以司應統大魁而為笙并鮮閒情詎蠟阮孚之屐晉書阮孚性好屐或有詣者阮正自蠟屐因自嘆曰未知一生當著幾量屐錦贉則卷别朱黃潘嶽書史隋唐藏書皆金題錦贉注金題押頭也贉卷首帖綾銀匱則厨分甲乙司馬遷傳紬金匱石室之書甲乙詳下左太沖之藩溷置筆札以何疲晉書左思作三都賦搆思十稔門庭籓溷皆著紙筆每得一句即疏之王仲任之書籖粘户庭而奚擇漢王充傳充字仲任上虞人師事班彪好博覽而不守章句四部五部蘚駁苔斑臧榮緒晉書李充字宏度為著作郎分典籍為四部五經為甲部史記為乙部諸子為丙部詩賦為丁部五部未詳一瓻兩瓻蝸黃螙碧古諺借書一瓻還書一瓻注瓻酒器也誰羡王根之邸第翡翠千重漢書成帝微行過曲陽侯王根第見園中土山漸臺類白虎殿乃責問司𨽻校尉京兆尹知根驕奢僭上赤墀赤瑣顧阿縱不舉奏二人頓首省户下說文翡赤雀翠青雀寧誇石尉之園亭珊瑚七尺晉書石崇字季倫為尉與貴戚王愷奢侈相尚愷得珊瑚高二尺示崇崇以鐵如意碎之乃命取三四尺高者六七株以償之珊瑚詳映碧啓積書巖下津逮連翩水經注積書之石室有遺卷焉世士罕津逮者太學碑前肩摩絡繹後漢書熹平中蔡雍奏定六經自書册鐫碑立太學觀視摹寫者車乘絡繹一日千餘囊螢多借讀之人晉車𦙍傳𦙍字武子少篤學家貧不常得油夏月囊螢照書懷餅有就鈔之客却掃編起畯字德進宋城人治易聞龔深甫易解新出考城一士人家存之徒步獨攜餅數枚以行主人館之畯晝夜寫録飢啖所攜之餅敷日而畢道類太丘後漢書陳實字仲弓桓帝時為太邱長許子將到潁川不詣仲弓或問其故子將曰太丘道廣廣則難周人如元禮詳園次序及九日序户罕雜賔門盈好事南史謝譓不妄交接門無雜賔按譓祖莊父朏世族也緯略漢張竦以列矦居長安貧無賔客好事者從之論道楊雄家貧嗜酒好事者載酒饌從學李楷述身賦曰座有清談之客門多好事之車國僑季札彬彬縞紵之交左傳吳公子札聘於鄭見子産如舊相識與之縞帶子産獻紵衣焉任昉范雲梁書蕭衍沈約謝眺王融蕭深陸倕范雲任昉為西邸八友按范雲字彥龍為吏部尚書任昉字彥升為新安太守落落雲霞之氣詳雪持序注雍容宛雒之生徒錯遝汝南之車騎詳夀徐序漢志南陽郡宛縣故申伯國光武起于宛都于洛陽遂以宛為南都曰宛洛師古曰左傳云遂至于雒光武改雒為洛李詩遨遊盛宛雒汝寧府志秦屬潁川漢曰汝南麟衫艾綬顧盻非常焦贑易林二千石官白艾綬東觀記馮魴孫石襲母公主封獲嘉侯安帝賜以紫艾綬注以艾草染之櫑具急裝衣冠偉麗漢書雋不疑傳帶櫑具劒晉灼曰古長劒首以玉作轆轤形上刻木作山形如蓮花初生時按急裝戎服陸游詩我亦急服叨從戎風前繡幰獨孤側帽而來儀制令諸車一品青油纁通幰六品以下不得用幰後周書獨孤信美容儀封魏國公嘗因獵日暮馳馬入城帽微側人咸慕之遂為側帽花外朱輪丞相小車而至前漢書武帝命田千秋代劉屈氂為丞相至昭帝時年老詔其得乘小車入宫因號曰車丞相至夫煙澄昃景霜耀新曦乍援棣蕚詩或合荆枝續齊諧記漢田真同弟慶廣三人分財堂前有紫荆一樹共議破之為三未幾枯死真嘆曰木本同株因分析而摧悴况兄弟乎相感復合荆亦旋茂憩怡顔之子舍詳貞女序注經伏臘之家祠楊惲報孫㑹宗書歲時伏臘厯忌釋六月有伏日者何也四時代謝皆以相生至立秋以金代火金畏火故至庚日必伏風俗通夏曰嘉平殷曰清祀周曰大蠟漢改為臘猶獵也獵禽以祭先祖也秦孝公始置伏祠始皇改臘曰嘉平情懭悢其不聊心踟蹰而自思宋玉九辨愴恍懭悢兮注悲也禮記三年問蹢躅焉踟蹰焉繄昔經營匪求厥寧園因母搆憺以安名慶芳萱之韶麗欣寸草之敷榮詩焉得萱草言樹之背注背北堂也母治北堂故曰萱堂孟郊逰子吟慈母手中線遊子身上衣臨行密密縫意恐遲遲歸難將寸草心報得三春暉奉板輿而登降戲萊彩以將迎潘嶽閒居賦太夫人乃御板輿升輕軒列士傳老萊子考養二親行年七十作嬰兒戲著五色斑爛之衣舞于庭歲月幾何馳光逝波星姬蝕昴月姊沈河拾遺記帝昊母星娥處于璇宫帝王世紀禹母有莘氏修已見流星貫昴感孕生禹趙紀白起為秦伐趙破長平軍遣衛先生說昭王益兵糧應矦阻之其精誠達天太白為之蝕昴春秋感精符人主父天母地兄日姊月李商隱詩月姊曽聞下彩蟾纒悲曷極茹痛何多最怯鵑啼似應皋魚之泣韓詩外傳孔子聞皋魚哭聲甚悲問其故曰樹欲靜而風不寧子欲養而親不逮往而不可返者年也逝而不可追者親也立哭而死于是孔子門人歸養其親者一十三人尤憎鶯哢宜賡原壤之歌檀弓原壤母死夫子助之沐槨壤登木歌曰貍首之斑然執女手之卷然遂使舂相無聞祥琴輟御曲禮鄰有喪舂不相注相者舂人歌以助舂也檀弓子母喪既祥五日彈琴而不成聲注朞年為小祥再期為大祥喪服四制祥之日鼓素琴告民有終也橘垂園內永無陸績之歡陸績傳陸績六歲謁袁術登筵懷橘三枚以遺母術大奇之莪在蒿中彌厪王裒之慕孝子傳王儀為司馬晉文帝以直言斬之子裒字偉元少有志操扁父死于非命廬于墓側讀詩至哀哀父母生我劬勞每三復流涕門人並廢蓼莪之篇按顧歡亦廢蓼莪怪春花之萬朵何事殷紅訝秋月之一規居然縞素梁簡文帝詩青山銜月規注日月圓曰規國䇿唐睢曰天下縞素九章因縞素而哭之池邊躍鯉貽向誰人孝子傳王祥後母冬月思食魚祥乃卧于堅氷之上氷澌忽有鯉躍出祥取之林際放麑歸於何處韓詩外傳孟孫獵得麑使秦西巴持歸以烹麑母隨而號西巴弗忍放之孟孫怒逐西巴踰年召傅其子曰子不忍麑子其忍余子乎朝朝毁瘠蒼烏翔以還來禮居喪之禮毁瘠不形北齊書蕭放字希夷居喪廬前有慈烏各集一樹為巢每午前馴庭飲啄午後不下樹舒翼悲鳴全似哀泣夜夜攀號白鶴馴而不去晉書吳隱之執喪過禮家貧無人助喪每至哭卧時常有雙鶴鳴呌陶侃傳侃居母憂嘗有二客來弔不哭而退化為雙白鶴半繭園賦并序繭園者崑山葉水部白泉先生别墅也水部公沒後園析而為三仲子九來於其所授之半葺而新之名半繭園維嵩暇日偕二三賔侶遊焉遂援筆而為之賦賦曰將欲包沁水以為園控終南而建第見膝王賦規天上之鼉梁見憺園賦倣人間之鶴市吳越春秋闔閭葬女令鶴舞於市萬人傳觀謂之鶴市輿志古蹟在閶門外王根則青瑣千門見憺園賦樊重則雕櫳百里後漢書樊重所居廬舍皆有重堂高閣陂渠灌注子宏乃光武舅封夀庚侯庾信小園賦連闥洞房南陽樊重之第赤墀青瑣西漢王根之宅嗤梓澤之非華陋蘭亭之未麗石崇傳金谷别墅在河陽一名梓澤輿志紹興蘭渚上有蘭亭乃右軍修禊處然而逖覽龍編見璿璣賦注遐稽蝣晷毛詩注蜉蝣朝生暮死不能久存臺邊之金爵能飛幽明録鄴城鳯陽門五層安金鳯凰二頭于其上一頭飛入漳河清浪見在水底一頭至今猶存街上之銅駝善徒見滕王賦洛陽記晉索靖有先識嘗指宫門銅駝嘆曰㑹見爾在荆棘中未幾果有劉石之亂徐陵與楊愔書銅駝之街于我長閉青天厯厯虛無兔窟之毫見璿璣賦長楊賦西壓日域東震月窟碧澥茫茫倣佛蜃樓之氣漢天文志海旁蜃氣成樓臺廣壄氣成宫闕何如巢父巢中得偃息之鄉逸士傳堯時巢父年老以樹為巢寢其上時人號曰巢父豈若壺公壺內有棲遲之地後漢方術傳費長房見市中老翁賣藥懸一壺於肆及市罷輒跳入壺中長房後隨翁俱入壺惟見玉堂嚴麗㫖酒草殽盈衍其中共飲畢而出則有文莊後裔崑岑大儒原注葉盛崑山人官至吏部侍郎諡文莊受㕓鹿邑呼名鳯雛吳志崑山一名鹿城按歸德府有鹿邑縣非是王劭别傳劭清貴簡素桓溫稱為鳯雛或稱鳯毛詳得仲序注門來好事見憺園賦家多賜書漢書班彪幼與從兄嗣伯共遊太學家有賜書好古之士自逺方至貂蟬七葉蘭錡三吳漢官儀制侍中冠武辨大冠亦曰惠文冠加金璫附蟬為文貂尾為飾故謂之金貂侍中插左常侍插右注金取堅剛蟬取居高飲潔貂取內徑外溫王筠與諸兒書史稱崔氏應氏有文才然不過兩三世耳非有七葉之中名位相繼如吾門者也左思詩七葉珥漢貂張衡西京賦武庫禁兵設在蘭錡注蘭同欄古通用受兵曰蘭受甲曰錡寰宇記夫差都姑蘇吳王漢都廣陵孫權都建業為三吳一以吳都吳興丹陽為三吳遂乃性癖蕭棲人耽高蹈築室城隈結廬溪隩境以窄而彌幽地當偏而益妙阮籍則居鄰酒壚稽康則室餘鍛竈王隱晉書阮公鄰婦有美色當壚沽酒阮醉便眠婦側夫始疑之伺察終無他意嵇康傳康性好鍛嘗夏月鍛大柳下鍾㑹造之康鍛如故不交一言牖不飾以何松梲非雕而奚藻才充魚鴨之租僅足鶴猿之料羃䍥青袍之草粗可承裀古詩青袍似春草長條隨風舒杜詩汀草亂青袍萋迷紅綬之桃差能妨帽漢官儀綬羽青地桃花縹長丈八尺庾信小園賦簷直倚而妨帽森梢馺娑崢泓坦迤一瓢日月十笏山河逸士傳許由隱箕山以手捧水飲之人遺一瓢得以操飲高僧傳唐顯慶中王元䇿使西域至毗耶離城有維摩居士石室以手極縱橫量之得十笏故云方丈參差澗岫繚繞巖阿䝉茸芳援斑駁晴莎當其運風斤於匠石宛若抽妙緒於媌娥莊子郢人堊其鼻端若蠅翼使匠石斫之匠石運斤成風堊盡而鼻不傷郢人立不失容宋范泰鸞鳥詩序昔鍾子破琴于伯牙匠石韜斤於郢人列子處子媌娥靡曼者魯般則鎖其鳯鑷見滕王賦郢人乃經彼龍梭郢人見上陶侃别傳侃家貧少漁雷澤網得織梭歸掛壁間頃化龍去乍紛糅而綺密漸襞績而星羅襞績見瑞木賦注星羅見璿璣賦注名曰繭園於焉嘯歌詩夫其蘭坡鬱律蘅皋汜濩洛神賦稅駕乎蘅皋汜濩見瑞木賦涉彴尋蹊見憺園賦臨崎選路渦濺沫以騰珠瀑懸崖而振素積百頃之澄潭得千章之老樹杜詩百頃風潭上千章夏木清驚湍則燠館凝霜激瀨則晴簷拂雨洞開北牖直面層岡巘將頽而未落磴欲仄以還翔盤拗則三危鳥道擁腫則九折羊腸庾信枯樹賦拳曲擁腫盤拗反覆輿志陜西汝州三危山即竄三苗地李詩西瞻太白有鳥道莊子惠子曰吾有大樹人謂之樗擁腫而不中繩墨九折坂詳商尹序魏武苦寒行羊腸坂詰屈車輪為之摧易林羊腸九榮隋紀崔賾字祖濬煬帝問何處有羊腸坂曰按漢書在上黨壺關縣帝曰非是又曰按皇甫士安地書在太原北九十里帝曰此是注趙險塞名栝柏則䕫呿魅睒甘泉賦捎䕫魖而抶獝狂孟原曰木石之怪曰䕫如龍有角人面三皇紀卧則呿呿注息聲也左傳注魅怪物蕪城賦木魅山鬼庾信枯樹賦木魅賜睒文選注睒眩惑貌松杉則兕踣熊僵稗雅熊好舉木引氣爾雅注羆憨多力能拔樹木詩匪兕匪虎翩其反而耀石華於粉壁日之夕矣渲嵐彩於閒房爾乃繚曲徑以西遵徼周檐而右轉浮黛榭於緑波嵌青墻於鐵蘚篁遮皂莢之橋花隱葡萄之館朝補之詩皂莢村南三里許韓翃詩細馬初過皂角橋晉宫闕名鄴有鳴鵠園葡萄園崔灝詩早來棠梨宫中燕初至葡萄館裡花頺陽睨交網以澄鮮楚詞日杳杳而西頺又網户朱綴刻方連些注網戶綺文鏤也朏魄映綺疏而蹇産朏魄見璿璣賦綺疏見滕王賦屈原九章思蹇産而不釋張協詩連岡巖以蹇産注産與嵼同皆曲促貌更若橫石梁而左渡躋復道之崇臺赤欄平而礙柳金梯滑以扶梅攀條而千枝近手摘蕊而萬朵承叉翩更涉夫殊庭投霽日於林坰攬稻畦之一碧挹麥隴之遙青魏文帝登城賦嘉麥被隴樵琮琤而出谷漁欸乃以揚舲孟郊詩隔林寒琮琤注聲也桞宗元詩欸乃一聲山水緑注搖櫓聲也涉江篇乘舲船余上沅兮梁時王籍詩揚舲橫大江詢林端之白象青鴦誰朝壞剎酉陽雜俎乾陀國有繫白象樹花葉如棗按佛臺有白象大藏經須彌山下有青駕伽藍王安石詩青駌幾世開蘭若釋名莊嚴差别名之為剎西域以柱表剎示所居處也問原上之金鳬銀鴈疇氏荒陵皇覽冢墓記始皇葬驪山以水銀為大海金銀為鳬雁人漁膏為燭度久不滅墳高五十餘丈周回五里餘後項籍燒其宫觀關東賊發之固已嘆浮生之一致能無慨大塊之殊形莊子夫大塊載我以形勞我以生日麗烟和風光淡沱東鄰秀鬋東鄰詳楚鴻序宋玉招魂盛鬋不同制南國濃蛾神女賦眉連娟以蛾揚兮釋名蛾蠶蛾也其眉細而長新粧下蔡巧笑陽阿宋玉登徒子賦臣東家之子嫣然一笑惑陽城迷下蔡王逸注楚二邑名淮南子足蹀陽阿之舞邊讓傳妙舞麗于陽阿注古名俳人如初日思比流波神女賦耀乎如白日初出照屋梁莊子因以為流波亦復出瓊鋪而掩冉詳雪持序入金谷以猗儺鬢臨風而緑偃衫映水而紅拖乍匿叢而展謔或藉卉以聽歌詳鴻客序注更有顑顄末賔羈孤猥士離騷長顑顄其何傷注飢貌穀梁傳猥苦百姓注凡稱猥卑詞也十年之書劍未成史記項羽本紀學書不成去學劍一夕之悲歌忽起名久列夫瑤籖遇難逢夫石髓三元品戒經景林真人勤感纍世念真期靈皇著名玊札列仙傳周義入䝉山遇羡門子曰子名在丹臺玉室何憂不仙仙經神山五百嵗一開其中石髓出得而服之夀與天相畢神仙傳王烈入太行山忽見山破石裂青泥流出如髓烈取食如飴餘半遺嵇康皆凝為石烈嘆曰叔夜志趣非常而輒不遇命也聊行國以相羊暫窺園而徙倚詩聊以行國離騷聊須臾以相羊注猶徜徉也窺園見憺園賦楚詞從徙倚而遙思加以華隂道士少室名僧列仙傳修羊者魏人也華隂山下石室中有龍石臥其上取黃精食之後去不知所之江淹别賦華隂上士服食還山名山記中嶽嵩山東曰太室西曰少室有少林寺在少室之北麓即達磨面壁九年處僧惠可侍側曽雪深至腰仙客則修琴三市異人則賣藥諸陵琴書琴高以琴養性初學于羅浮山後遊四海徐陵天台法師碑仙客彈琴因不移於俄頃三市詳九日序韓康傳康霸陵人家世著姓賣藥長安詳無忝序趙代之鳴箏屣屣幽并之挾彈呼鷹漢雋不疑傳暴勝之屣屣起迎說文屣舞屣也曹植詩借問誰家子幽并遊俠兒豪家借歌舞之場紅么一曲詳雪持序上日炫綺羅之㑹緑醑三升詳藝圃序注莫不緌袿綷䌨轊轂縱橫漢官儀冠纓曰緌上服曰絓潘嶽籍田賦綃紈綷䌨注衣聲方言車轊齊謂之􅀈六書故輪中空處有轂空其中軸所貫也慕原嘗之意氣過秦論齊有孟嘗趙有平原西都賦節慕原嘗託袁灌以生平補注於是俯清川眺碧嶂蔌蘭肴酙桂釀詳九日序百驕激蓮子之壺西京雜記武帝時郭舍人善投壺以竹矢不用棘古之投壺取中而不求還故實小豆惡矢躍而出也郭舍人則激矢令還一矢百餘反語之為驕顔氏家訓投壺之禮今惟欲其驕益善乃有倚竿帶劍狼頭豹尾龍首之名其尤妙者有蓮花驕按驕一作驍一作嬌駱賔王詩漏緩金徒箭嬌繁玉女壺獨鹿舞蔗竿之杖晉樂志拂舞歌詩其三曰獨漉篇有曰獨漉獨漉氷深泥濁注疑是風刺之詞漉一作鹿一作祿曹丕典論余嘗與奮威將軍鄧展等共飲宿余與論劍良久時酒酣耳熱方食竿蔗便以為杖下殿數交三中展臂左右大笑短蕭則燭下凄清長笛則闌邊寥亮古樂府有短簫鐃歌古歌辭長笛續短笛忽若木之將淪見璿璣賦已素娥之欲上詳良輔序注喟粉練之斜縈攬沈思於夜情撫長宵之煙月追曩日之軒楹墅尚未乞於羊曇宅猶未割夫郈成晉羊曇别傳曇以謝安之甥少為安所重苻堅次淝水時安命駕出墅與姪元園棋賭别墅安常劣於元是日元懼而不勝安顧曇曰以别墅乞汝孔叢子郈成子自魯聘晉過于衛右宰穀臣止而觴之送以璧行三十里而聞衛亂作穀臣死之成子于是迎其妻子還其璧割宅而居之洛下之機雲則兄弟並宇見祖德賦山隂之羲獻則少長隨行蘭亭序㑹于㑹稽山隂之蘭亭羣賢畢至少長咸集按羲之字逸少子獻之字子敬曽四節之如馳匪昔年之盛時燕分泥於故壘鷗通夢於鄰池杜甫過故斛斯校書莊詩燕入非旁舍鷗歸祇故池將毋類山間之圓魄亦每因弦望以盈虧也耶李陵詩安知非日月弦望自有時主人乃拂衣而起憑軒而玩屬坐客使盡觴命鄙人而為亂樂記注卒章為亂離騷亂曰已矣哉觀乎止矣何如後算之全顧而樂之已復前遊之半見本篇序看奕軒賦若夫北垞靜深南榮蹇嵼王維詩有南垞北垞題注與宅同禮鄉飲酒義洗當東榮注屋翼曰榮上林賦暴千南榮蹇嵼見半繭賦逶迤皂莢之橋見半繭賦窈窕辛夷之館屈原九歌辛夷楣兮藥房注木筆輞川十景圖一辛夷塢藤梢礙帽以難扶橘刺牽衣而莫剪杜詩橘刺藤梢咫尺迷廬同諸葛門前之桑已猗猗諸葛亮表成都有桑八百株薄田五十頃衣食自有餘饒猗猗載詩家類王陽墻外之棗何纂纂漢書王吉字子陽東鄰有棗樹垂吉庭中吉婦取以啖吉吉乃去婦東家聞之欲伐樹鄰里共止之因固請吉令還婦里中語曰東家有樹王陽去婦東家棗完去婦復還潘嶽笙賦棗下纂纂朱實離離說文纂纂赤貌古樂府咄唶歌棗下何攢攢注聚貌又古纂攢通用花名蠲忿以枝長嵇康養生論合歡蠲忿萱花忘憂注萱花一名合歡一名忘憂古今注合歡樹似梧桐枝葉繁互每風來輒自離離不相牽綴樹之階庭使人不忿竹號掃愁而節短詳琴怨序何况宅區前後街距東西東方小婦孺仲賢妻東方朔傳朔常用所賜錢帛娶少婦長安市中人皆笑之朔曰如朔所謂陸沈于俗避世於朝廷間者也范􅎡列女傳光武時王霸連徵不仕同郡令狐子伯遣子奉書于霸霸見令狐子容服甚光舉措有適已子蓬髮厯齒未知禮則因有慚色妻曰子伯之貴孰與君之高奈何忘宿志而慚兒女子乎霸笑曰有是哉遂共終身隱遁淵明誡子書嘗感孺仲賢妻之言壁帶則銀缸不異門楣則畫㦸偏齊漢書趙后橫壁帶為黃金缸班固西都賦金釭銜壁漢雜記漢制假棨㦸以代斧鉞隋書待制三品以上門皆列㦸崔豹古今注王公以下通用之前驅畫㦸繡㦸有衣之㦸也唐書崔琳與弟圭瑤俱列棨㦸世號三㦸崔家多子之石榴對結北史齊安德王延宗納趙郡李祖收女為妃母宗氏薦二石榴于帝莫知其意帝問魏收答曰石榴房多子王新婚妃母欲子孫衆多帝大喜相思之嬌鳥雙棲見銅雀賦楊子幼種豆之餘缶箏互響漢楊惲傳惲字子幼為平通侯以罪廢為庶人其報孫㑹宗書有曰家本秦也能為秦聲婦趙女也雅善鼓瑟酒後耳熱仰天拊缶而呼烏烏其詩曰田彼南山蕪穢不治種一頃豆落而為萁陶淵明采菊之暇棗栗紛攜淵明集采菊東籬下又責子詩通子垂九齡但覓棗與栗爰有韓家阿買李氏衮師托言杜牧有姪曰阿宜韓退之有阿買韓詩阿買未識字頗知書八分李商隱詩衮師我驕兒又詩題云楊本勝說于長安見小兒阿衮或挽鬚以問杜詩生還對童稚似欲忘飢渴問事競挽鬚誰能即嗔喝或繞膝而嬉按老萊子作嬰兒戲見憺園賦注又膝下詳貞女序膠東則五色之錦箋競劈詳尺牘序醴陵則一枝之花管分題劉璠梁典江淹字文通六嵗能屬文于梁天監中卒贈醴陵矦初令蒲城夜宿郭外夢人授以五色筆文藻日進按李白夢筆生花洵可懷也於胥樂兮詩既乃眺長洲之鹿苑漢書枚乘諫吳王曰上林不如長洲之苑詳園次序惆悵絶多見滕王賦張廷尉之雀羅感愴不少漢書文帝時翟公罷廷尉賔客皆去門外可設雀羅後復為廷尉賔客欲往公大署其門曰一貴一賤交情乃見田單之功名何在無意遊齊田單傳燕伐齊盡降齊城惟莒即墨不下田單用火牛策敗燕師復齊七十餘城齊襄王封為安平君亷頗之慷慨猶存還思用趙史記亷頗趙之良將也悼襄王立頗奔魏楚聞亷頗在魏迎之亷頗一為楚將無功曰我思用趙人燕丹往矣賣漸離為宋子家奴史記刺客傳燕王喜斬太子丹秦卒滅燕于是高漸離變名姓為人庸保匿作于宋子久之作苦聞其家堂上擊筑乃退出其裝匣中筑與其善衣更容貌而前宋子以為上客卓氏依然雜司馬於成都傭保史記相如傳相如與文君俱之臨卭盡賣其車騎買一酒舍酤酒而令文君當壚相如身自著犢鼻與保傭雜作滌器于市中卓王孫聞而恥之鬼哀韓愈之窮天奪柳州之巧韓昌黎集有送窮文曰三揖窮鬼而告之桞子厚乞巧文略曰抽黃對白啽㺯飛走駢四驪六錦心繡口矧復三湘浪駭寰宇記湘潭湘鄉湘原謂之三湘六詔烟迷詳竹逸序注田園烽火見滕王賦鄉關鼓鼙家語由願得聞鼓鼙之音上震于天嘆巢幕而為燕嗟觸籓其類羝左傳吳公子札自衛如晉將宿于戚聞鐘聲曰異哉夫子獲罪于君以在此懼猶不足而又何樂其燕之巢于幕上也易羝羊觸籓杜老則堂無鵝鴨杜詩鵝鴨宜常數注憶成都草堂也於陵則井有螬蠐孟子於是鮮焉寡歡悄然不懌爰葺斯軒聊云看奕然而寂寂虛堂寥寥短几既無坐隱之賔復鮮手談之器語林王中郎以圍棋為坐隱支道林以圍棋為手談羣仙傳待詔王積薪夜宿村店聞姑婦隔壁圍碁及明視之無棋局問之曰蓋手談也潛窺而不見爛柯竊聽而誰聞落子晉書王質伐木至信安石室山見二人圍碁看局未終視斧柯已爛歸無復當時人矣東坡詩不聞人聲時聞落子紋楸對坐誰究此味幾同莊叟之寓言莫測醉翁之微意莊子寓言篇寓言十九重言十七巵言日出和以天倪注寓言者以已之言借他人之名也歐酒陽修醉翁亭記醉翁之意不在嗚呼噫嘻我知其㫖世一龍而一蛇東方朔誡子書聖人之道一龍一蛇形見神藏與物變化運或流而或峙彼賭宣城之太守者公豈其人而看棋局於長安者古寧無是耶沈約宋書羊元保為黃門郎善奕棋棋品第三太祖亦好奕䝉引見與太祖賭郡戲勝以補宣城太守杜詩聞道長安似奕棋先生不應缺伸而起禮君子缺伸撰杖履亟命傳觴頺然醉矣白丁香花賦并序余居停主人蔣元膚砌畔種有此花三春欲暮花開似雪元膚隔墻呼飲并言每嵗有紫花半樹交枝並跗見憺園賦掩映殊佳今紫者萎矣屬余有潘騎省之悼潘嶽傳嶽為騎省郎妻去室作有悼亡詩詳渭仁序一聆斯語泫然不知涕泗之何從也聊為賦之其辭曰爾其花壓半簷香籠一樹莟小偏嬌苞纎逾嫭楚辭嫮目宜笑楊雄反騷知衆嫭之嫉妬兮注嫭與嫮同美色也墻邊寂寂雪貍亂撲以疑無月砥瓏瓏白燕深藏而易誤何曽肥艷鬪門外之梨花絶不輕狂趂陌頭之桞絮數枝暗坼三更之銀漏同清萬朵爭開十丈之紅樓頓素甫麗􅟞以酥融旋紛披而綺互初掩冉以臨風復竛竮而怯雨况復銅駝巷側見滕王賦丹鳯城隈詳瀛臺序春深緩去夏淺徐來訝雕櫳之鮮杏憐綺閣之無梅候尚遲夫芍藥節未届夫玫瑰此花於是呈皓質綻瓊腮歌宛轉舞毰毸潘嶽射雉賦宛轉輕利又敷藻翰之陪鰓注同毰毸鳥張羽貌春無霜兮霜泥泥晝少月兮月皚皚劉歆遂初賦漂積雪之皚皚涉凝露之隆霜越艷聞名喚作枕邊之墜珥風俗通南楚以美色為娃衛宋以美色為艷王昌齡詩吳姬越艷楚王妃史記淳于髠謂齊威王曰前有墜珥後有遺簮燕姬耀首折為馬上之橫叉秦嘉與婦徐淑書今致寶叉一雙值價千金可以耀首并詳皇士序何能不玩苕華而製賦詩苕之華眄玉樹以停杯也哉見滕王賦疇昔之年雙花可憐參差並媚攬抱交妍倐紫姑之不見俄紫玉之成烟荆楚嵗時記正月望日其夕迎紫姑以卜劉敬叔異苑有妾紫姑為大婦所妬正月望日感激而死搜神記吳王夫差女名紫玉以未得童子韓重而死後魂歸省母母抱之成烟而散花謝兮紫臺難到月沉兮紫府誰圓江淹恨賦明妃去時仰天太息紫臺稍逺關山無極杜詩一去紫臺連朔漠述異録項曼都言到天上過紫府十洲記青邱有紫府宫天真仙女都遊于此六帖銀宫金闕紫府清都賸一堆之粉淚濕萬縷之香綿桐是孤生莫綰同心之結書嶧陽孤桐梁武帝詩腰間雙綺帶夢為同心結隋煬帝江陵女歌拾得娘裙帶同心結兩頭一作晉時歌隋紀隋文帝崩太子賜陳夫人金盒中有同心結數枚遂蒸焉藥名獨活空思續命之緣物性志羌活紫色獨活黃色獨活有風不動無風則搖故名獨活嵗時記荆楚于五月五日以綵線結勝謂續命絲萬楚詩誰道五絲能續命惜仳離於綺節託惆悵於哀絃惆悵見滕王賦庾信昭君詞哀絃更須張春去兮堂堂薛能詩青春背我堂堂去花開兮斷腸詳海棠賦注願將花下土燒作紫鴛鴦白秋海棠賦并序巢民先生齊中有白秋海棠花余愛其姿制娟靜而神理柔楚乃為兹賦賦曰有逍遙客卿者莊子有逍遙遊篇楊雄長楊賦序藉翰林為主人子墨為客卿以諷生於莫愁之村長於忘憂之館承天府志漢江西盧家有女名莫愁善歌舞嘗召入楚宫故城西有莫愁村金陵志三山門外昔有妓盧莫愁家此名莫愁湖容齊隨筆莫愁郢州石城人宋樂府云莫愁在何處莫愁石城西是也近世周美成西湖一闋専咏金陵有莫愁艇子曽繫之語豈非誤石頭城為石城也按莫愁湖以石城誤名鄴中記忘憂館在歸德府曜華宫內漢梁孝王嘗集諸遊士各賦詳天篆序懊儂之聲既輟合歡之斚常滿古今樂録懊儂歌緑珠所作惟絲布澀難逢一曲而已後皆隆安初民間訛謠之曲一作懊惱歌南齊書王敬則之子仲雍于梁明帝前作懊儂曲易林酒為歡伯按酒以合歡放誕優游蕭條閒散藝棠棣之翩翩詩種棗樹之纂纂見看奕賦同心則梔子為徒古樂府梔子結同心玉臺新詠徐悱妻劉令嫺有摘同心梔子贈謝娘詩云同心復何恨梔子最關情蠲忿則萱花是伴見看奕賦一日者過幽憂公子之廬而款焉莊子讓王篇堯以天下讓許由不受又讓于子州支父支父曰我適有幽憂之病方且治之未暇治天下也公子門無車騎室有琴書夙喜野卉雜蒔芳蔬樹名貞女木號隱夫樂録魯貞女見女貞木而作歌謂之女貞木歌蘇彥冬青頌序清女欽其質貞女慕其名多植之階庭云注冬青一名女貞一名萬年枝相如上林賦隱夫薁李并詳竹逸序靈均為九畹之圃屈原傳原别號靈均著離騷有曰余既滋蘭之九畹兮更樹蕙之百畝泉明有五柳之居昭明靖節傳淵明嘗著五柳先生傳以自况曰宅邊有五柳樹因以為號焉於陵則灌園自食倪寬則帶經而鋤列子陳仲子適楚居於陵因以為號楚王欲以為相遂同妻逃為人灌園按仲子名定字子終倪寬傳寬于漢武帝時治尚書家貧賃作帶經而鋤束晳讀書賦倪寬日誦而藝耨爰有一種布於階砌靡曼綿芊柔明清麗皎如好女姿首異制見半繭賦施粉太白倚秋而綴宋玉登徒子賦東家之子著粉則太白施朱則太赤客卿見而問曰此非所謂秋海棠乎厥名斷腸思婦所變葉如其衣花如其面一云怨女淚染所成生於墻下海棠為名採蘭雜志昔有婦人思所歡不見輒涕泣恆灑淚于北墻之下後灑處生草其花甚媚色如婦面其葉正緑反紅秋開名曰斷腸花又名八月春即今秋海棠也洵哀離之微物而閨襜之幽情也公子胡若是玩之曷不徙於忘情之域移於無何有之鄉王隱晉書王戎喪子悲曰聖人忘情最下不及情鍾情正在我輩莊子逍遙遊篇莊子謂惠子曰子有大樹何不樹之于無何有之鄉廣莫之野仰天歌烏樂且未央見看奕賦序公子膝席而起揖客而語曰客何見之晚也且夫僕本恨人秋多悲氣江淹恨賦僕本恨人宋玉九辨悲哉秋之為氣也秋臨水以登山九辨登山臨水兮送將歸人懷讒而畏誹扇凄馨以自攄抱幽芳而相慰才人以薄命稱珍小物以傷心自貴詩紀漢許皇后云奈何妾薄命曹子建因以妾薄命名篇庾信集有傷心賦阮籍詩悽愴傷我心矧夫白者逈出尋常亭亭别館泫泫回廊南朝妙伎西曲名倡古今樂録宋樂府有西曲歌梁天監中改西曲製江南弄七曲通典吳歌雜曲並出江東晉宋以來稍有增廣梁內人王金珠善歌吳聲西曲蕙心緯繣離騷紛總總其相合兮忽緯繣其難遷注緯繣乖違也紈質飄揚輕紅初退暈碧相當無心約翠息意安黃登徒子好色賦眉如翠羽庾信鴛鴦賦京兆新眉遂懶約李義山詩約眉憐翠羽庾信舞媚娘歌額角輕黃細安並見璿璣賦顔如虢國色配何郎明皇紀楊貴妃有娣三人長封虢國其二為韓國秦國并承恩出入宫掖杜甫咏虢國夫人詩却嫌脂粉汙顔色淡掃蛾眉朝至尊何郎見銅雀賦時披寶蒜庾信詩慢繩金麥穗簾鈎銀蒜條歐陽修詩銀蒜鈎簾宛地垂注鑄銀為蒜形以押簾曰寶蒜斜傍銀墻隔珠簾而幻眇入明鏡以微茫秋雨則朝朝界粉秋風則夜夜飛霜莫不悄焉魂與上林賦色授魂與心愈于側黯然神傷詳渭仁序鍳此淒清之色憐其寂寞之粧羌乃妾住江南君家河北君戀鉛華詳楚鴻序注妾辭雕飾臨銅黛以傷神撫氷絃而沾臆驗榴裙之淚㸃不是胭脂武后如意曲不信北來常淚下開箱驗取石榴裙看薇帳之情人都無顔色李賀詩愁月薇悵紅若夫班姬失寵陳后辭恩齊紈有恨金屋奚言漢成帝紀班婕妤因趙飛燕之譖退居長信宫作怨歌行曰新裂齊紈素鮮潔似霜雪裁為合歡扇團團似明月外戚傳漢武陳皇后貴寵無子聞衛子夫得幸幾死者數焉後罷退歸長門宫漢武故事帝為膠東王年數嵗長公主指女阿嬌問之帝笑曰若得阿嬌當作金屋貯之著方空而歎息掛曲瓊而煩寃後漢章帝紀詔齊相省氷紈方空縠吹綸絮注方空謂紗薄如空即今方目紗宋玉招魂挂曲瓊些注曲瓊玉鈎也雕飾之以懸衣服九章煩寃瞀容詳藝圃序羅與綺兮嬌暮秋珠與玉兮泣黃昏江淹恨賦珠與玉兮艷暮秋羅與綺兮嬌上春化為皓魄宛爾芳魂至於蔡琰無家王嬙作客永訣京華長依蠻貊初學記蔡琰字文姬雍之女也適河東衛仲道夫亡無子興平中為胡騎所獲在胡中十二年生二子曹操痛雍無嗣以金贖之重嫁陳留董祀琴操王昭君名嬙齊國王襄女也年十七獻元帝後適丐奴詳下注又石崇明君詞序明君本昭君以觸文帝諱故改之寄血淚於琵琶寫哀情於笳拍傅元琵琶賦序故老云始于漢送鳥孫公主念其行道思慕故知音者于馬上作之漢書王昭君初適丐奴在路愁怨遂于馬上彈琵琶以寄其恨注至今傳之謂昭君怨詩紀蔡琰妙音律嘗自著胡笳十八拍共十八章紫臺則山河俱縞青海則關城盡白紫臺見丁香賦隋西域傳吐谷渾城在青海西四十里流玉筯之縱橫恐白頭之棄擲魏志文帝甄后面白淚雙垂如玉筯章碣贈别詩樓上人垂玊筯看西京雜記相如將聘茂陵女為妾文君作白頭吟以自絶略曰悽悽復悽悽嫁女不須啼願得一心人白頭不相離相如感之乃止倘作望夫之石月是形容劉義慶幽明録武昌若北山上有望夫石狀人立傳昔有貞婦于其夫逺役赴難攜弱子餞送此山望夫而化為立石世因以名如過妬婦之津雪為魂魄雜記臨濟有妬婦津相傳言晉太始中劉伯玊妻段氏性妬伯玉嘗于妻前誦洛神賦曰娶婦得如此吾無憾焉段氏怒自沈水而死託夢語伯玉曰君本願神吾今得為水神矣伯玊終身遂不渡水有婦人渡此津者皆壞衣毁粧然後濟不爾風波暴發矣若斯之類賦不及誇莫不懷貞抱慤絶纇離瑕張衡東京賦咸懷忠而抱慤淮南子明月之珠不能無纇注纇不平也說文纇絲節又疵也唐李遜傳治條疏纇說文瑕玉小赤也又玷也疵也怨良人之不見詩願廓處以長嗟楚詞嗟寥廓而無處倚微風而延佇離騷結幽蘭而延佇又曰延佇乎吾將反恐白日之西斜豈與夫櫻桃綺麗豆䓻驕奢吕氏春秋仲夏羞含桃注嬰鳥所含食也後曰櫻桃十六國春秋石虎鄭后名櫻桃樂府自是有鄭櫻桃歌麗情集霍小玊侍兒名櫻桃按侍兒以櫻桃名者甚衆物性志豆䓻初如芙蓉穗紅色未開者名含胎花喻妓美且少也梁簡文詩江南豆蔲生連枝杜牧詩娉娉裊裊十三餘豆䓻梢頭二月初桃李倡家之樹菖蒲蕩子之花劉孝綽詩是日倡家女競逞桃李顔古樂府烏夜啼詞曰歌舞諸年少娉婷無鍾則菖蒲花可憐聞名不相識李賀樂詞官街柳帶不堪折早晚菖蒲勝綰結松柏則年年繫馬楊桞則夜夜藏鴉劉琨扶風詩繫馬長松下庾信枯樹賦扶風則松柏繫馬李商隱隋宫詩終古垂楊有暮鴉所可方其婀娜並此芳華也哉客卿曰善湘吳既酎月令天子飲酎注重釀酒謝惠連雪賦酌湘吳之醇酎朱顔半酡見璿璣賦攀枝折條相和而歌歌曰秋既晏兮夜已沉白露下兮青楓林楚詞湛湛江水兮上有楓憺佳期兮悵難尋玩幽姿兮思愔愔左傳祈招之詩曰祈招之愔愔物猶如此兮人何以任世說蘇頲年五嵗裴談嘗過其父頲方頌枯樹賦舊賦云昔時楊桞依依漢南今看搖落悽愴江潭物猶如此人何以堪頲避談字諱因易曰昔時楊柳依依漢隂今看搖落悽愴江潯物猶如此人何以任陳檢討四六卷二
