body:
  text: 陳檢討四六卷十一翰林院檢討陳維崧撰序米紫來始存詞集序臺餘此地最善悲歌見九日序船憶君家能裝書畫世說米芾居官清潔及歸惟以船載書盡研山齋内米顛既一字阿章輿志米芾有研山園在鎮江南宋米芾傳芾吳人字元章號海岳稱南宫善書爲文必自已出性好古號米顛髙宗愛其字刻于石嘉陵圖中元暉復小名虎子周地圖嘉陵水出秦州嘉陵名畫録唐吳道子于大同殿圖嘉陵江山水一日而就畫繼山谷贈米友仁幼時詩曰虎兒筆力能扛鼎教字元暉繼阿章註芾子友仁字元暉小名虎子髙宗甚眷注之世稱小米仕至敷文閣學士紛披粉墨本自門風瀟灑才情實緣家學蓋在昔而已然顧於今而益信則有花封仙縣見楚鴻序畫省望郎見園次序筆陣摩空見天章序文瀾倒峽見天篆序蛇能蟠笥傳家則代産達人蛟欲生毫墮地而羣呼才子見祖德賦旋登上第厯尹名邦弱齡釋褐見玉巖序桃憎紅綬之光見半繭賦早嵗牽絲見歸田序草妬青袍之色見半繭賦爾其賦軼鄒枚見滕王賦文兼崔蔡沈約宋書傳論班楊崔蔡之徒異軌同奔栁宗元傳昌黎以子厚文似子長崔蔡不足多註崔駰年十三善屬文蔡邕少博學好辭章濯龍賜第詳夀季序二曲則坊在天邊西安志樊川有韋安石别業名韋曲韋曲之東有杜岐公别墅語曰城南韋杜去天尺五夢鳥摛箋見璿璣賦千賦則價髙日下語林左思三都賦出人人傳寫帋爲之貴馳聲河北温子昇遘此生慚見尺牘序流譽江東王文度聞而竊嘆晉書王坦之字文度弱冠與郗超齊名時人謡曰盛德絶倫郗嘉賓江東獨歩王文度酷嗜臨摹尤精皴染蕭思話書評第一虎跳龍拏見天篆序書評蕭思話書走墨連綿字勢屈强若鳯跳天門虎臥鳯闕昔人評右軍亦云書斷韋誕如龍拏虎踞曹不興畫苑無雙鳥啼花笑見天篆序鵠綾捧去見瀛臺序揮殘萬軸之菖蒲見瀛臺序麝粉調來榻出滿園之蛺蝶山谷畫䟦調麝媒作花果殊難工唐書滕王元嬰善畫蛺蝶劉曾嘗見其圖有江夏班大海眼小海眼村裏來菜花子諸品嗣王湛然亦善花鳥王建宫詞傳得滕王蛺蝶圖分斯一藝儘足飛騰借彼餘波尚然綺麗更躭協律旁及倚聲見梧月詞序斜行紅蠆見懸圃序託興於銀筝檀板之間衮撲金蟬韓偓詩醉後金蟬重註黄金蟬首飾也薛逢詩纎腰怕束金蟬斷註腰如蟬之細也寄傲於酒肆倡樓之内三千錦瑟既檀柔情見天篆序丈八銅琶兼饒逸氣見竹逸序嚴霜砭骨非無望古之篇皓月煎腸不少臨風之作若夫三秋捧檄道出鄱陽見滕王賦千里之官途經易水見智修序黄皮縳袴見天章序斜壓赫連之刀見天章序按勃勃僣帝號自云赫赫連天因名赫連氏嘗造百鍊剛刀于靴中壓之赤兔揮鞭直突慕容之壘曹瞞傳呂布有駿馬名赤兔能馳城飛壍語曰人中有呂布馬中有赤兔真定志北燕慕容庾地後相傳有慕容壘飄零繡瓦問分香吉利其何歸草木狀吳黄武中江夏李侯以罪徙合浦始入境遇蠱毒其奴吉利者得香草與侯服之遂解吉利即遁去侯因此濟人遂以吉利爲名牢落黄金見九日序弔擊筑漸離之安在見看奕賦以至天仾彭蠡見滕王賦濤沫煎銀見梧月序地坼碻磝見天章序土花暈紫錢塘懐古詞楚庭空土花暈碧匡廬山下見滕王賦釃樽酒以横江繻葛城頭左傳戰于繻葛註鄭地㑹官僚而出獵亦復嚄唶而歌見雪持序憑陵而語見實菴序一羣蠻鼓黄雲脫壞而羣飛說文塵埃與雲相連而黄曰黄雲又豐兆光武紀帝戰昆陽晝有雲如壞山當營而隕杜牧詩遥望戍樓天欲曉滿城鼕鼓白雲飛幾疊邊笳白雁徊徨而竟下見孝威序注長篇間作兩都賦序時時間作小令居多見鴻客序井華汲處盡唱屯田員外之詞見浙西詞序桞絮開時都吟長慶才人之製唐書宣宗見伶官歌白學士詩曰永豊坊裏千條栁遂取豊城栁二植之禁中按白樂天詩名長慶集然而畧有遺忘曾無愛惜墨㾗半濕不知汚誰氏之裙晉書王獻之爲吳興守羊欣嘗着新練裙晝寢獻之書數幅而去字蹟纔乾未省上何人之帕詩話唐學士善賦詩者宫女以扇以手帕索題之抄來北里半被塵埋見梧月序録向東家還虞簡脫見楚鴻序堆作叢編說苑中有叢篇好事者爲之搜撮棄爲長物見憺園賦知音者代以流傳今之始存其大概也記與髙門乆諧夙好同是楊袁之苗裔僕不如人後漢書楊震官太尉自震至彪三葉宰相四世太尉袁安于章帝時爲司徒子敞孫湯曾孫成逢四世五公俱爲顧陸之子孫君能念我見尺牘序溯百年之喬木譜牒猶新見祖德賦憶三世之芳蘭遊從如昨宣武盛事戴和字𢎞正每得宻友則書于簡號金蘭簿敝廬覘北還標北海之署書梧北見月序按李北海精于著書舊業樊南詳考功序尚寳南宫之尺牘見篇上幸重逢於燕市獲相和以楚歌雖太僕亭臺已無夜火勺園泉石乆歇春機而稜稜犀角見三芝序知來者之多賢縵縵龍文北史楊愔少聰慧其叔父竒之曰此兒駒齒未落已是我家龍文識曩修之克紹袛慚賤子有愧前人屬題一巻之新詞并話兩人之舊事君真詞癖已獨步於花間蘭琬之中見桐初序僕亦酒狂願從遊於減字偷聲之下見實菴序楊聖期竹西詞序伯起門風競說通明第一見憺園賦盈川才地羣推華妙無雙見祖德賦楊梅對客代産文人黄雀投環世傳隂德見素伯序則有罽袍公子斑管王孫斑管見園次序註雕龍髫鬌之年雕龍見三芝序髫鬌見懸圃序繡虎綺紈之嵗繡虎見祖德賦梁張纘離别賦太常劉侯前軰宿達余在綺紈之嵗已欽其風矣乃者生偏遭亂幼便依人南池驛畔舊鄰太白之樓濟寧志賀知章觴李白于南池蘭陵縣前見琅霞序新築渭陽之館見桐初序雲横魯甸瞻望兄兮誰來詩月冷吳闗思悲翁而不見漢鼓吹曲詞鐃歌十八曲内有思悲翁題陸機鼓吹賦詠悲翁之流思他鄉疇恤幾成王粲離家見滕王賦故國難歸畧比楊朱失路見竹逸序備詞人之辛苦極才士之牢愁然而性本清狂人尤放誕樓頭扇底頗多託興之篇花下樽前大有言情之製於是北里臙脂人人繕寫南朝金粉字字流傳見琴怨序菖蒲艶曲見瀛臺序爭譜自銀箏檀板之間芍藥新聲見瀛臺序偏織於舞帕歌裙之上詎云小道亦曰多能昔者余鄉猗歟我友書裝玳瑁鄒陽則集號麗農筆架珊瑚董相則詞名蓉渡玳瑁珊瑚見天篆序鄒陽見璿璣賦董相見憺園賦誰家花月不歌李嶠之章見寳汾序是處池臺皆唱元㣲之曲長慶集序元稹與樂天詩禁省觀寺郵􅕤牆壁之間皆傳焉新唐書元稹長于詩號元和體往往播樂府穆宗在東宫妃嬪近習皆誦之宫中呼元才子自二子之云亡遂百端之交集見滕王賦註何意荒州重借驚才於異地見昭華序遂令賤子復聆妙響於餘生喜不自勝起而相和今夜月明薊北不逢臺上之黄金見九日序他時花落江南幸唱筵前之紅豆見素伯序吳初明雪篷詞序青天恨滿天邊無不死之仙楚詞留不死之舊鄉張衡思𤣥賦登閬風之層城兮搆不死而爲牀杜陽雜編隋大業九年元藏幾爲過海使判官風飄之洲島間洲人云此滄洲去中國已數萬里其洲花木常如三月人多不死碧海愁多海上少長圓之月見井叔序倘若梅根治畔宫闕常新見鴻客序竹格桁邊市㕓如故見浙西序註北府之精兵未散晉書劉牢之百戰百勝號北府兵南朝之狎客不來見琅霞序則彼都女士詩即逢枯樹以奚悲見天篆序僑寓衣冠左傳註僑寓即僦居也便遇新蒲而不恨詳萬栁啟瑶壇可以剷掃愁之竹見看奕賦番舶不必誇蠲忿之犀見琴怨序無如蕭蕭落葉只打空城滚滚長江偏圍故國杜詩無邊落葉蕭蕭下不盡長江滚滚來劉禹錫石頭城詩山圍故國周遭在潮打空城寂寞回隔巷值跨坊之馬大有新官補註浹江停下水之船非無故伎見良輔序比來何濶補註只歌玉樹之花見滕王賦生世不諧詳夀閻序乃住金陵之縣見金天石序此則衛叔寳渡江之嵗定爾傷神見滕王賦周伯仁藉卉之時斷然流涕者矣見鴻客序然而誼夫繾綣縱復情鍾見海棠賦達士逍遥還能理遣晉書衛玠曰人有不及可以情恕非意相干可以理遣但使室廬畧定井竈粗安馮敬通之跌宕尚對孺人見閨秀序恨賦敬通見􅔰罷歸田里左對孺人顧弄稚子脫畧公卿跌宕文史揚雄自敘傳雄爲人跌宕東方朔之詼諧恒攜少婦見看奕賦蘭成膝下長抱苟娘陶令門中惟娛通子見貞女序則睠西州之斷港於我何求晉書羊曇爲謝太傅所知太傅亡後羊行不由西州路嘗因大醉不覺過此羊悲感不已訪南内之遺基見鴻客序干卿甚事見實菴序或者臺城花草最耐興亡見鴻客序建業山河惟知歌舞見禹平序亦可推黍離爲膜外置麥秀以旁觀見素伯序東陵瓜熟見滕王賦雖顑頷以何妨見半繭賦下潠田成陶淵明集有下潠田穫稻詩縱棲遲而亦得詩而乃飄飄社燕慣欲依人雜記燕以春社來秋社去瑟瑟神鴉惟思餞客見梧月序一辭牛渚頻爲西塞之遊再上蟂磯每有南荒之役太平志府城北下有磯曰牛渚一名然犀浦蕪湖大江中有蟂磯蟂老蛟也磯南有石穴甚深即蟂所居楚天似墨仍然腸斷之邦湘草如羅依舊魂銷之地見井叔序意者巴陵銜怨更甚鍾陵岳州志劉宋曰巴陵梁曰巴州隋唐曰岳州金陵志鍾山在府東北名鍾陵沔水無情還同江水也乎輿志漢陽府即唐沔州有沔水出其南書岷山導江於是臺城弔古見鴻客序譜以銀箏漢口懷鄉武昌志漢口乃江漢合流之地寫之檀板别業結李皇城畔小令南唐見鴻客序片帆疊庾亮樓頭清言西晉見歸田序雪雰雰以漸下篷颯颯以驚飛觀乎止矣斯真吳札之後人左傳吳季札請觀于周樂爲之歌韶曰觀止矣和者誰與只仗杜陵之野老昌黎集吾言之而和者誰與杜詩杜陵野老呑聲哭曹南耕吳天石天篆疊韻詞序布帽彈箏燕市有嵗寒之集見渭仁序貂裘換酒吳天來疊咏之吟晉書阮孚爲散騎常侍以金貂換酒文心雕龍雙聲隔字而每舛疊韻襍句而必暌珊瑚鈎詩話雙聲疊咏狀連駢嬉戲之態訝兩地之同心喜一緘之逺到鼠鬚描罷筆髓王羲之得用筆法白雲先生遺之鼠鬚筆筆鋒勁强張芝鍾繇皆用此數行紅豆新聲見素伯序魚腹藏來見尺牘序史陳勝以丹帛書勝王字置魚腹中半幅金荃麗句見樂府補序按温飛卿官方山尉有握蘭金荃等集頓令笑口亟趂花開見三芝序須付歌喉還隨蝶撲見庭表序夫其飛揚䟦扈見藝圃序頓挫淋漓書斷羲之觀公孫大娘舞劍渾脫瀏漓頓挫旁行側出韻數見以彌鮮鑿孔縋幽押雖重而詎複石崇王愷競賽珊瑚見憺園賦虢國秦姨爭誇金翠見海棠賦宜僚累十二而丸不墮實寓於虚見尺牘序庖丁更十九而刃若新技歸於道莊子養生主庖丁爲文惠君解牛對曰臣之所好者道也進乎技矣今臣之刃十九年矣所解數千牛矣而刀刃若新發于硎淮南子屠牛垣一朝解十二牛而刃遊衆虚之間寸人豆馬不足稱竒按豆人寸馬畫家法也此疑誤楮葉棘猴何能鬬巧楮葉見藝圃序韓子燕王好㣲巧衛人曰臣能以棘刺之端爲母猴王悅之養以五乘之奉王曰吾試觀客爲棘刺之母猴衛人曰人主必半嵗不入宫中不飲酒食肉霽日出視之晏隂之間乃可見燕王因養衛人而不能觀其母猴沉吟不置賞玩實多乃於開巻之餘歘覩見懷之作僕也三年委贄莫逢休沐之期見雪持序千里懷鄉長負耦耕之約論語年年濠上只想觀魚見園次序日日街頭長愁騎馬詳夀閻序幸故人之見憶雖逺道以相憐煩謝吳均并詢曹植吳均傳均字叔庠吳興人梁天監初爲主簿與栁惲賦詩士多效之號吳均體武帝有撰齊春秋後令作通史未成卒曹植見滕王賦感卿愛我願母忘息壤之盟見季青序惟爾知余須一寄當歸之藥蜀志姜維詣諸葛亮得母書令求當歸維曰但有逺志不在當歸唐紀一行師臨卒封一物與明皇西幸發視之乃蜀當歸嵗寒詞小序斗室恒關雙扉乆墐詩義疏墐户庶人蓽户冬則塗之也餳香豆輭正當祀竈之辰玉燭寳典洛陽人家臘月造脂花餳蜡月二十五日煑赤豆粥搜神記宣帝時隂子方臘日晨炊竈神見以黄牛祀之遂驟富臘日祀竈始此釀熟雞肥恰值消寒之㑹見庭表序三年執㦸急景匆匆東方朔客難位不過侍郎官不過執㦸註執㦸者侍郎之職五夜讐書浮踪落落五夜詳顧哀辭悵門丞之欲去饑以􅀈盆月令通考吳中風俗除日先報百神奠神懸遺像夕送舊神焚松柴謂􅀈盆方宴飲分嵗或守嵗達曙或深夜祀床祀竈或抱鏡響卜按門丞即門神􅀈粗飯也兾如願之能來迎之蕡燭錄異志廬陵歐明過彭澤湖忽見數吏來侯云青洪君使要明甚怖吏曰青洪君有厚遺君勿取獨求如願耳如願者青洪君婢也明請之歸數年大富雜錄有商人見清湖君得婢名如願有求悉致之後因元旦如願晩起商撻之走入糞壤中不見後家漸貧按正旦繫偶人投糞中云令如願始此説文蕡雜香草周禮司烜氏供蕡燭註蕡麻屬又大也端居不樂見少楹序僵臥長愁漢書袁安宇邵公汝南人值大雪洛陽令行部至安門無行跡使人視之見安僵臥乃有繡虎才人見祖德賦乘羊猶子乘羊見雪持序猶子詳銀臺啟雙拈玳管見天篆序倚小令以分吟並劈苔牋見尺牘序註向長宵而賭寫傳諸好事見憺園賦目以詞豪播在通都資爲談助袁崧後漢書蔡邕得論衡秘玩以爲談助屬鄙人之技癢顔之推曰應邵風俗通云太史公記髙漸離變名姓爲人慵保聞宋子有客擊筑技癢不能無出言謂懷其技而腹癢也是以潘岳射雉賦徒心煩而技癢今史記作徬徨蓋俗傳寫誤耳更我友之神來見藝圃序和有數家鋟成一集嗟乎上陽宫外見萬栁啟雪大如鴉補註宣曲觀前見修褉序風饕似弩補註山頭凍雀見天章序覆鶴毳以難温砌下寒蟲藉貂褕而詎煖張衡四愁詩美人贈我貂襜褕何來數子只欲雕冰頗怪羣賢偏工鏤雪桓寛鹽鐵論畫脂鏤冰費日損功摭言劉夢得詩如鏤冰雕瓊語林良匠不能琢冰女史魏文帝美人薛靈芸有神針雕冰藝采作詩定屬無聊之事國策蘇秦曰上下相怨民無所聊心知不急之人補註弆之篋衍見尺牘序且充壓歲之錢覆彼瓶盆見懸圃序姑貯辭年之酒賀徐立齋先生新陞總憲序原註代大司馬宋夫子作蓋聞蘭臺始建標峻秩於三司官制考都御史所居之署後漢名御史臺亦名蘭臺寺魏晉宋齊仍曰蘭臺梁名南司亦曰南臺所領之屬唐仍隋制一曰臺院號爲臺端二曰殿院號爲副端三曰察院號爲分察漢官儀御史臺内掌蘭臺秘書省外督諸州刺史栢寺初開躋巍班於九列漢書御史府亦名御史大夫成帝時列栢府中有鳥數千集其上謂之栢臺亦謂烏臺韋𤣥成傳註九列九卿也聲望踞南牀以上位本司空唐制臺中㑹聚于坐南設横榻曰南牀不出累月遷南省故稱之又曰癡牀言倨傲如癡漢制成帝更御史大夫爲大司空秩比丞相勲階在東漢而前權侔丞相漢書漢選郡守相髙第爲御史大夫任職者爲丞相復置兩丞一曰御史丞一曰中丞晉室更稱臺主詎沿宫正之名宋時仍曰中丞第易大夫之號官制考晉初省御史大夫而因漢以中丞爲臺主即御史大夫之任隋以國諱省中丞置大夫爲臺主宋仍唐制無大夫以中丞爲臺長絳騶赤棒禮極尊崇白簡青囊資兼華貴晉史傅𤣥爲御史中丞毎有奏劾或日暮則捧白簡整簮帶竦誦不寐坐以待旦南史任昉有彈劾皆曰奉白簡以聞宋紀顔延之爲中丞何尚之與以書曰絳騶載道白簡生風漢官儀凡諫院章表皆早囊封事然而地以人宜名緣實副必也道隆尼父始足當方朔之褒下註如其人比趙堯方可代周昌之位史記丞相列傳周昌爲御史大夫爲人疆力敢直言髙祖召昌謂曰公疆爲我相趙王吾極知其左遷然非公無可者乆之髙祖持御史大夫印弄之曰誰可爲御史大夫者熟視趙堯曰無以易堯遂拜爲御史大夫從來文囿定産騶虞詩義疏騶虞白虎黑文不食生物者也文王仁民之餘恩形于鵲巢而及于騶虞自昔唐階偏生屈軼見瑞木賦玉峰立齋徐公物望三君後漢書陳蕃竇武劉淑爲東漢三君家風七穆見園次序弱齡縝栗夙髙照乘之稱見歸田序綺歲清剛獨稟干將之氣見園次序松纔挺幹便已摩霄漢書人望郭泰李膺𣺌若松喬在霄漢葵始成叢先能向日説文黄葵嘗傾葉向日况復栁遐官位夢實先呈北史本傳栁遐位大將軍聞喜公梁書遐梁人仕周幼豪邁謝舉曰江漢英靈見于此矣周書栁遐字子昇其世父慶逺特器異之謂霞曰昔吾逮事伯父大尉公嘗語吾云昨夢汝登一樓樓甚峻麗吾以坐席與汝汝後官必達吾今聊復晝寢又夢將昔時座席還以賜汝汝之官位當復及吾宜勉勵以應嘉祥也羊祐功名人爲預告羊祐别傳人有相羊祐父墓後應出受命君祐惡其言遂掘斷墓後以壞其勢相者立視之曰猶應出折臂三公俄而祐墜馬折臂後位至三公畢萬之家必大厥有明徴左傳初畢萬筮仕于晉得公侯之卦獻公以爲大夫賜以魏卜偃曰畢萬之後必大註其後韓趙魏分晉爲諸侯田文之户偏髙寧無定數史記田嬰有子四十餘人文以五月五日生及長嬰曰五月子者長與户齊將不利其父母文曰人受命于天乎將受命于户耶必受命于天君何憂焉必受命于户則髙其户耳誰能至者昔人可作姓乆署夫華堂來者多賢神蚤貽之金篋寰宇記岱宗上有金篋玉策能知人修短漢武探策得十八因倒語曰八十後果然爰以華年掇兹大物風和紫禁受先皇特達之知日麗彤雲際薄海雍熈之㑹公則儀觀偉甚廷臣莫不傾心神彩凝然朝野於焉屬目聖人當璧見懸圃序雅重儒流才子埀紳欣逢盛世槖筆侍螭㘭之次槖筆見園次序螭㘭見璿璣賦懷鉛居虎尾之中懷鉛見尺牘序而或天閑騕褭躡景難攀臣馬驂驔追風每後瑞應圗騕褭者神馬也日行萬八千里與飛兔同古今註秦始皇有七名馬一追風二白兔三躡景四追電五飛翮六銅爵七晨鳬空荷九重之顧問誰酬片刻之諮詢按轡以思停鞭而待諭兹大僕妙選龍媒周禮大僕掌王之服御漢禮樂志龍之媒天馬來應邵云天馬者乃神龍之類今天馬已來此龍必至之效也故曰龍之媒俾彼詞臣不離鸞仗古今註帝王儀衛爲鸞仗參差鹵簿逢天笑之爲新杜詩每逢天一笑復似物皆春掩映乘輿識聖顔之有喜杜詩天顔有喜近臣知更以萬幾鮮暇詎事田禽書一日二日萬幾易田有禽然而三孽猶苞詩敢忘蒐獮左傳春蒐夏苗秋獮冬狩六飛大獵命學士以旁觀漢書袁盎諫文帝曰今陛下騁六飛馳下峻山註六馬行疾若飛也萬乘遥臨許宫坊爲縱視絳旓繡繖勢欲彌空隼䍐蠭旗光還蔽日蔡邕獨斷前驅有九遊雲䍐注大旗也廣雅蠭同蜂衆多也漢書趙廣漢壯蠭氣圍當合處猶虞駭獸之軼羣西都賦獸駭值鋒陣欲圓時尚怵竒毛之觸網闞如鴟呌見天章序雖文僚亦爲興霸之聲見梧月序矯若鷹飛至從官盡效張遼之狀函史魏臣志張遼者雁門馬邑人嘗赴吳軍前陷陣衝壘入至權麾下權大驚走已見遼衆少圍之數重遼左右衝擊竟突圍㧞衆出吳人披靡幾獲權後魏主行合肥戰處歎賞者乆之魏志赤壁敗還留張遼屯合肥而公則據鞍不動立馬如常臣惟屹若夫豈摶熊􅀈兕之徒國語叔向對晉平公曰先君唐叔射兕于徒林殪帝曰念哉是真履虎執獶之士易履虎尾樂記註獶與猱同援此一端該夫百行至若行已端方居官詳慎壎箎鼎盛詩伯氏吹壎仲氏吹箎漢文春秋鼎盛恒聆持滿之言越世家范蠡曰持滿者與天定傾者與人家語孔子觀欹器曰世焉有滿而不覆者哉棣蕚聨翩詩私厪席豐之懼漢文席豐履盛處事則當仁赴義軒軒轢千古之前宅衷則集木臨淵惴惴屈萬夫之下詩雅躭鉛槧見尺牘序酷嗜縹緗見園次序傅鶉觚之篋裏饒有異書見雪持序楊子雲之室中率多竒字見昭華序不貪是寳所貪者聊蒼洞厯之恢竒漢書聊蒼爲侍中著書號聊子洞厯補註平恕爲懷難恕者亥豕烏焉之蹐駁亥豕見佳山序烏焉見樂府補序莊子惠施多方其道蹐駁孝經序蹐駁猶甚典墳之富見天篆序踰彼劉歆見尺牘序註鈔撮之勤加於荀朂晉荀朂傳朂字公曾爽曾孫武帝朝領秘書監與張華依劉向别録整理錯亂又得汲冡中古人竹書撰次以爲中經要夫至性尤可深言爾其彩袖仁親見憺園賦白華將母詩嬰情共氣甯氏則家有孤甥見桐初序篤念天倫汜毓則兒無常父晋書汜毓字稚春武帝召辟不就敦睦九族時人號其家兒無常母衣無常主所撰有春秋釋疑孝子之䐹腒􅎵髓養志無方周禮夏宜腒䐹註腒乾雉䐹乾魚也内則堇荁枌榆免薧􅎵髓以滑之鮮民之祥練虞􅎭臨喪中禮載喪記倚廬卒歲詳夀徐序夜號而每學猿啼見懸圃序不内三年晝入而恒遭犬吠齊書邢卲任丘人官太常卿兼國子祭酒不以位望自尊坐臥小室果餌皆置梁間客至下而共噉未嘗内宿自云嘗晝入内閣爲犬所吠以至一諾寧諼詳納姬序寸長必録卜居鄭詹尹曰尺有所短寸有所長蓽門圭竇之子將以聲華儒行儒有一畆之宫環堵之室蓽門圭竇註荆竹織門其竇小如圭形飛袿跕屣之倫丐其膏馥傳毅舞賦華袿飛髾而雜纎羅劉熙釋名婦人上服謂之袿史記貨殖傳趙中山人鼔鳴琴跕屣游媚誰能無過王輔嗣頗髙不怒之風王弼别傳弼字輔嗣少而察惠何晏甚竒之何云聖人無喜怒哀樂王意頗不同以爲聖人茂于天者神明也同于人者五情也人各有心江應元殊得稀言之益晉書江績字仲元弟統字應元静黙有逺志嘗著徙戎論以警朝廷時人語曰嶷然稀言江應元揚其雅量固蠡測以難勝挹彼沖襟兾管窺而莫罄見佳山序此所以孚於先帝留之保我子孫簡在今皇藉爾率其僚屬也先是公以内閣學士禮部侍郎奉監修明史之詔及拜是官仍兼厥職於是館中夀曄院内班張晉書陳夀字承祚師事譙周張華愛其才除著作郎撰三國志范曄班固見庭表序張衡見園次序按張華見左思賦嘆曰班張之流也以余鳴鳥之深交詩鳥鳴嚶嚶令綴雕蟲之巵語雕蟲見璿璣賦巵語見看奕賦註嗟乎與公兄弟青松締髫齔之交似我遭逢白首託班聨之誼廣絶交論援青松以示心指白水以旌信韓詩外傳男八歲而髫齒女七嵗而齔齒潘安仁楊綏誄曾未齔髫譬諸草木何敢差池左傳晉人徴朝于鄭鄭公孫僑對曰謂我敝邑邇在晉國譬諸草木吾臭味也何敢差池如彼瑟琴正資調劑見桐初序起而爲吏見二齋序詎忘將伯之呼詩出以圖君檀弓只作卬須之賦詩幸故人之得路欣在位之多賢日者巽命初頒臺端霜肅唐書侍御史號臺端人稱之曰端公新綸甫渙柱後風生詳田太翁啟雖宫闈宻勿沉沉造膝之嘉謨世説許詢嘗詣簡文共語簡文不覺造膝共又手語逹旦而道路流傳嘖嘖伏蒲之讜論見黄門序敷陳五疏全扛百斛龍文見佳山序蹇諤連晨易蚤露一班豹采世説王獻之觀人奕曰南風不競人曰此即所謂管中窺豹時見一班屬承諈諉見懸圃序用效賡颺書此日烏鳴府上見祖德賦已膺申錫之榮詩他時鱣集堂前佇應三台之瑞後漢書楊震好學講書有鸛雀銜三鱣魚飛集講堂前都講進曰蛇鱣者人夫之象也數三者法三台也先生自此升矣附注方朔侍武帝帝問孔顔道德何勝朔曰顔如桂馨一山孔子如春風至萬物生送汪考功鍾如給假省親序蕭蕭兮風也燕市從來餞别之區見智修序青青者栁耶陽關大抵送行之曲見寳汾序越禽戀燠代馬懷寒見無黍序註潞河橋下畫舸連翩通州志潞河橋古潞縣地河間志潞河屬青縣督亢城邊輕裝絡繹湪州志昔秦兵將入燕燕太子丹故荆軻賫督亢圗以獻至今有督亢陂爰有望郎見園次序亦遵前路詩其人也犀角名家見三芝序鶴㕔才子西京雜記唐考功員外郎㕔事有薛稷畫鶴宋之問爲贊後吏部因號鶴㕔門庭蕭寂素無諧際之心神彩端凝最得青蒼之氣在盛朝既頗急此賢至吾黨益難爲斯别斜陽祖道見滕王賦瀕行而挽子之袪詩長笛歌驪半起而攬君之袂大戴禮驪駒逸詩篇名客欲去歌之其詞曰驪駒在門僕夫具存驪駒在路僕夫整駕賓徒眷戀願紆已授之綏親懿追攀兾緩方遒之軫而先生則揮手離亭顧同官而致語横衿曠野向我友以鳴懷疇昔之辰小人有母見竹逸序蓋以故鄉婺歙僑籍蘄黄新安志隋歙州唐婺源今二縣屬府黄州志北齊曰蘄州唐曰黄州此地實當三巴百粤之衝渝州記春秋巴子國閬水與白水合流曲折三回形如巴字稱閬中三水又以永寜爲巴郡合巴東巴西爲三巴又以四川諸府皆巴郡地輿志廣西古百粤地戰國爲楚粤之交秦屬桂林郡向年屬有豨突鴟張之事豨突見玉巖序鴟張見天章序漢書狐假鴟張自謂驍雄莫敵時則苴蘭賊騎漸斥武昌滇池記莊蹻王滇時建苴蘭城輿志漢江夏地三國時吳曰武昌洱海戈船見竹逸序直浮夏口武昌志夏口在荆江中與沔口相對烽火照劉郎之浦寰宇記劉郎浦在荆州府石首縣漢昭烈娶孫夫人地鼓聲聞樊姥之山武昌志樊山下有樊口謝朓詩樊山開廣宴陶士行作鎮之地見滕王賦詳賀周序棧閣千盤庾元規長嘯之樓見歸田序波濤萬斛倘若藏身鄉隴誰爲君側以馳驅如其戮力京都疇過親闈而定省兩端莫決終傷時事之多艱二者交縈尤念皇塗之未靖時則金牛堆畔灑淚登舟幽明錄巴丘縣黄金潭古有釣此者獲一金鎖引之遂滿一船有金牛出釣人駭懼牛因奮躍還潭元和郡國志梁州金牛縣乃因秦伐蜀言五石牛能糞金故名黄鵠磯前束裝别母武昌志黄鵠山其下有黄鵠磯昔仙人黄子安騎黄鶴憩此遂攝官而承乏爰投袂以從王左傳齊師敗于鞌韓厥執縶馬前曰臣辱戎士敢告不敏攝官承乏又楚子圍宋投袂而起寧縻好爵正天家有事之秋匪慕清班愧世上偷安之軰白雲北望恒切關心唐史狄仁傑授并州法曹親在河陽登太行山反顧見白雲孤飛曰吾親舎在其下悵望乆之錦鯉南來見尺牘序彌期承臉何意别離以後屢動軍愁覊宦而來頻叨鄉訊故園鄣郡見鴻客序註偏遭鐡額之燒焚見商尹序舊業新安輿志今徽州在唐爲歙州在隋爲新安洊值銅脛之俘掠見商尹序紅知賊火焰烘黄帝之丹罏詳下白是刀鋒冷逼烏聊之雪瀑新安志府城有烏聊山隋末嘗遷州治于此上有名泉醜松怪栢㑹此漂摇詩雲海天都雲海見季青序註九域志黄山舊名黟山上有峰三十二溪二十四洞十八浮丘公容成子與黄帝駐天都峰煉丹於此今有浮丘仙壇遭兹板蕩詩杜陵邑井倍牽遊子之腸載杜詩庾信江關易入征夫之夢見素伯序註至若仳離甫定詩即届金妃設帨之辰詳夀閻序烽燧纔消便逢寳婺稱觴之日晉杜預曰婺女爲已嫁之女并詳葉母序髙堂七十長路三千及𤓰未代私心何敢以告人左傳齊侯使連稱管至父戍葵丘𤓰時而往曰及𤓰而代休沐方賖見雪持序臣職未遑乎將母詩懷中陸橘長結想於天邊見憺園賦屋後姜魚獨含情於日下見瑞木賦茲者一官俄焉六載幸蠻荒之帖伏南徼初安喜江介之承平北堂無恙况夫吕公灘畔新安志歙縣水勢湍急舟不易渡唐刺史吕季重捐俸鑿石遂成安流故名吕公灘大有蓴鱸見九日序吳口村中補註非無稻麥三江鱖美正上武昌之魚張志和詞西塞山前白鷺飛桃花流水鱖魚肥註西塞武昌山也吳志有建業水武昌魚之謡一縣笋香不少黄州之竹輿志黄州産蘄竹按孟宗江夏人與黄州接壤耘𤓰負米捨此樂以何求家語曾子芸𤓰而誤斬其根家語子路曰昔由事二親之時常食藜藿之食爲親負米百里之外扇枕驅蚊失今時而莫待晉書王延事親甚孝夏則扇枕冬則温被漢黄香事同見前孝子傳羅威番禺人夏日撤帳而臥曰吾供蚊蚋恐蚋齧吾母縱復邅迴仕版甚溺時名朝登勲府之階夕畫選郎之諾左傳勲在王室藏於盟府官儀吏部謂之勲府後漢書宗資爲太守任功曹范滂人歌曰汝南太守范孟博南陽宗資主畫諾幷見二齋序將恐家公致誚說生平畏見貴人見歸田序註父老興嘲謂此君不耐官爵宋向敏中傳敏中字常之太平五年試春雨如膏賦及第後真宗朝進左僕射上使人覘之門闌悄然上曰敏中大耐官職吾行已決幸故人鑒余烏哺之私春秋斗運樞飛翔羽翮爲陽陽氣仁故烏反哺也成公綏烏賦雛既壯而能飛兮乃銜食而反哺耆舊傳張霸爲㑹稽太守一郡慕化童謡曰城上烏哺父母府中諸吏皆孝友此别無多但來年俟我鳯池之上晉書荀朂爲中書監除尚書令人賀之曰奪我鳯皇池何賀耶於是南浦霜紅擘琵琶而促柱後漢侯瑾箏賦急絃促柱變調改曲陳顧野王箏賦調宫商于促柱轉妙音于繁絃幷見子厚序西山日紫傾鑿落以行杯白樂天詩金屑琵琶槽銀含鑿落琖註鑿落盞斚中鐫鏤者繞朝贈策羣公既立馬以歌詩左傳晉士㑹奔秦晉人忌秦用士㑹乃使魏夀餘僞攻秦以誘士㑹秦使士㑹繞朝練不聽㑹行朝贈之以策曰子無謂秦無人吾謀適不用也疏廣還鄉見滕王賦賤子亦班荆而作序見禹平序陳檢討四六巻十一
