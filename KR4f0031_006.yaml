body:
  text: 陳檢討四六卷六翰林院檢討陳維嵩撰序戴無忝詩序歷陽戴無忝者鸝砭名家雞碑妙裔世說戴顒往聽鸝聲曰此俗耳針砭詩腸鼓吹戴逵傳逵總角時以雞卵汁溲白瓦屑作鄭𤣥碑而自鐫之詞麗器妙唐丁用晦序云學慚鼠獄智乏雞碑文章清麗青霞紺雪之辭楊雄甘泉賦吸青雲之流霞恨賦鬱青霞之奇意紺雪詳任丘啓體製遙深白鳯蒼龍之筆白鳯詳葉母序蒼龍詳歸田序魏郎弄㦸之歲酷嗜風騷北齊書魏收少隨父赴邊欲以武奮鄭伯調之曰魏郎弄㦸多少收慚遂折節而學黃童對日之年雅耽典籍見雪持序南牙門地預簉英流西府人才夙參華選唐書蘇良嗣為相遇僧懷義命左右批其頰太后曰南牙宰相所往來勿犯也按晉有西府唐有南牙皆宰相所居加以地當軍馬俗尚戎㫋山川崒嵂盡齊梁戰鬭之場廣雅崒岏高怪子虛賦隆崇嵂崒人物英多本淮泗風雲之氣晉世說王武子孫子荆各言其土地人物之美孫云其山㠑巍以嵯峨其水㳌泄而揚波其人磊砢而英多七齡結納交塞外之文鴛見琴怨序千里馳驅識中朝之擒虎見滕王賦黃皮作袴見天章序自許老兵世說謝奕為桓溫司馬嘗以酒逼溫逃入所尚南康公主室內奕遂升㕔事引一真兵共飲曰失一老兵得一老兵何怪也絳幞當胸偏呼健者說文幞文帊也國䇿秦王謂甘茂曰楚客來使者多健唐書明皇幸蜀裴士淹問姚崇何如曰健者也無如八王相噬五帥不歸見少楹序漢祀忽諸見祖德賦禍延梁冀後漢書梁冀字伯卓為大將軍專擅威柄桓帝呼單超左悺等入室曰梁將軍兄弟專國今欲誅之晉宗不祚釁兆張方晉惠帝紀河間王顒以張方為都督入京城大掠劫遷車駕東海王越討之顒乃誅張方以解難年年代馬嘶風夜夜吳鈎蔽月吳越春秋楚白喜奔吳子胥謂吳大夫曰吾之怨與喜同子不聞河上歌乎胡馬望北風而立越燕向日而嬉誰不愛其所近悲其所思者乎吳都賦吳鈎越棘純鈎湛盧吳越春秋吳人殺二子以血釁金成二鈎獻閣閭于王前向鈎呼二子名曰吳鴻扈稽聲未絶兩鈎俱飛著父胸王大驚乃賞之師古注似劔而曲所以鈎殺人滄江渺渺誰家精衛之魂述異記炎帝之女溺死東海化為精衛每銜西山木石填東海一名寃禽白晝漫漫何處杜鵑之哭詳孟太母啓李羣玉詩落日山深哭杜鵑虎牢城上盡護諸軍詳仲衡文輿志漢滎陽成臯地昔周穆王豢虎于此名虎牢後以避高祖父諱改武牢許渾詩武牢關下護龍旗熊耳山前爭提一旅寰宇記熊耳山兩峯相並如熊耳故名在西安府商州又衡州府亦有此山名左傳有衆一旅時則王頗綺歲已作流風晉書王頗少聰慧善屬文人咸重之著作甚冨校書多所裁定有文集行世李燮韶年翻成孤子詳賀周序賣珠乞活見素伯序擊筑為傭見看奕賦時鬻畚於草中晉中興書王猛家貧鬻畚為事每弄丸於市上見尺牘序烏生八九子非無帶血之雛古樂府歌烏生八九子端坐秦氏桂樹間劉孝威烏生八九子篇城上烏一年生九雛氄毛不自暖張翼強相呼猿呌兩三聲大有斷腸之母宜都山川記猿善啼一鳴三聲啼數聲衆猿騰躑世說桓溫入蜀至三峽部伍中有得猿子者其母緣岸哀號行百餘里不去遂跳船上至便即絶破視腹中腸皆寸斷何來女子猶識韓康漢書韓康字伯休賣藥長安市不二價三十餘年時有女子從康賣藥守價不二女子怒曰公是韓伯休耶康嘆曰我本避名女子皆知何用藥為遂隱霸陵山中除是友人或憐豫讓刺客列傳豫讓欲為智伯報仇漆身為癩吞炭為啞行乞于市其妻不識也其友識之曰汝非豫讓耶殘身苦形不亦難乎讓曰將以愧天下懷二心以事其君者也爰乃永棄鄉關長辭婚宦廬江孔雀只愛單飛見素伯序都尉鴛鴦恆憎生别蘇武答李陵詩昔為鴛與鴦今為參與辰按李陵為騎都尉通論李都尉鴛鴦之詞纒綿巧妙班婕妤霜雪之句發越清逈杜詩死别已吞聲生别常惻惻絲牽不斷唐書郭元振美丰姿宰相張貞嘉欲娶之曰吾五女各執一絲幔後子牽之得者為婦元振牽一紅絲得第三女遂婚焉孟郊詩妾心藕中絲雖斷猶牽連半天荒地老之悲見琴怨序珠落難圓總去國離鄉之淚見琴怨序刀頭明月還照形容樂府詩何時大刀頭破鏡飛上天注刀頭有環問何時還也破鏡言月半時還也杜詩滿目飛明鏡歸心折大刀山上蘼蕪私悲手爪古詩上山採蘼蕪下山逢故夫長跪問故夫新人復何如新人雖云好未若故人姝其色類相似手爪不相如新人從門入故人從門出新人工織縑故人工織素織縑日一匹織素五丈餘持縑將比素新人不如故若夫李膺乃景毅之師後漢書景毅字文堅蜀郡人李膺坐黨禁門生故吏皆株及毅子碩不與毅慨然曰膺故賢者遣汝師之豈可僥脫遂自表免歸趙至與嵇康為友逸士傳晉趙至年十四入太學時嵇康在學寫石經訖至隨之問其姓名嵇曰少年何以問我至曰觀君風器非常故問耳後便逐嵇歸山陽江淹賦别能銷世上之魂文通别賦黯然銷魂惟别而已矣沈約懷人慣識夢中之路韓非子六國時張敏與高惠為友每相思便于夢中往尋但行至半途即迷不知路遂回如此者三沈約詩夢中不識路何以慰相思水名九曲即是愁江詳考功序閣號千重皆成怨嶺蜀志小劍山去大劍山三十里連山險道飛閣相通故曰劍閣千重瘴來似墨難聽蠻女之歌水盡連天不看巴童之舞詳竹逸序栁子厚詩桂嶺瘴來雲似墨洞庭春盡水如天當年送别猶有白衣史記荆鄉之秦太子及賓客知其事者皆白衣冠以送之此日相逢可無紅豆見素伯序於是悲哀不少惆悵絶多蠖伏聨篇宣和書譜皇象字休明官至侍中工八分篆草世以書聖稱以比龍蠖蟄啓伸盤腹行玉臺新咏序龍伸蠖屈之書則河北膠東之紙見尺牘序龍蟠纍牘見上則宋風謝月之文宋風見琅霞序沈約宋書謝莊字希逸七歲能屬文所著四百餘首行世嘗作月賦甚佳所謂辟惡時熏不蝕羽陵之蠧博物志辟惡必栗香取其木為書軸白魚不損書爇之能殺蟲并詳淡菴序穆天子傳仲秋甲戌天子東遊次雀梁因蠧書于羽陵玉臺新咏序辟惡生香聊防羽陵之蠧龍威私守靈寶要略吳王闔閭遊包山見一人自言姓山名隱居入洞庭取秦書一卷文不可識令人齎之問孔子孔子曰丘聞童謠云吳王出遊觀震湖龍威丈人山隱居北上包山入靈墟乃入洞庭竊禹書亦載吳越春秋直通博望之槎也詳孝威序按張騫封博望侯僕本衛玠之多愁見滕王賦近更屈平之被放楚詞卜居屈平既放三年不得復見摯虞淪薄已罷觴歌晉書贄虞字仲洽少事皇甫謐才學通博武帝重之後惠帝幸長安奔散亂離及歸洛陽歲饑人相食虞素清貧遂以餒卒束晳艱辛久踈文筆文苑傳晉束晳漢踈廣之後王莽末廣曾孫避難因去踈之足遂改姓焉晳博學多聞舉茂才不就後歸教授生徒并見天篆序屬擊汰以將離屈原九章乘齊船舲余上沅吳榜以擊汰遂吮毫而撰序見藝圃序吟成越弄依稀莊舄之哀國䇿陳珍對惠王曰越人莊舄仕楚猶尚越聲今臣雖棄逐之楚豈能無秦聲哉曲奏楚音倣佛鍾儀之調左傳晉侯觀于軍府見楚囚鍾儀問其族曰伶人也與之琴操南音范文子曰樂操土音不忘舊也歸逢康樂行念陳琳宋書謝𤣥封康樂縣公孫靈運仕宋為永嘉太守襲祖父封爵故世稱康樂每對從弟惠連輒得佳句魏志陳琳字孔璋初為何進主簿後歸曹操軍國書檄多出琳手乃建安七子之一也婁東顧商尹集序夜郎蒼莽有地皆黔函史古夜郎國在蜀郡徼外東接交趾西鄰滇國唐䝉說之聽漢約以為犍為郡今雲南曲靖府貴州普安州四川馬湖叙川二府皆其地晉夜郎今遵義府綏陽縣地唐名播州瓊州志秦昭襄王使司馬錯略取楚地為黔中郡注今湖廣辰州貴州思南四川酉陽等處參井鈎連無天不漏天文志雲南井鬼分野貴州參井分野李白蜀道難捫參歷井仰脅息又天梯石棧相勾連寰宇記卭都縣夏秋常𤏡道有大漏天小漏天一云在叙州宜賓縣二山四時霑霖故云杜詩誰能補天漏千村玀犵銅脛出沒之鄉明田汝成炎徼記玀犵種有五蓬頭赤腳百種蠻獠鐵額縱橫之地廣雅獠古八蠻種後漢書更始時諸賊銅馬大彤鐵脛所在寇掠野花似血略不成粧小鳥如啼何常是曲羈客因兹而懭悢離賓遘此以回翔詎意吾賢乃殊所料黃皮縳袴見無忝序請為陶侃之護軍詳賀周序絳幞纒腰見無忝序願作劉琨之從吏詳歸田序夕陽亭下後漢書楊震遣歸故郡至城西夕陽亭按晉書王餞賈充于夕陽亭注郵亭也叱馭而行漢書王陽守益州至卭崍九折坂見道險遂返車王尊至是叱其馭曰驅之王陽為孝子王尊為忠臣上東門邊橫刀以去賈誼書高帝立諸侯于洛陽上東門之外一名建春門一名上升門地理通釋顔氏云雒陽十二門上東門東面最北橫刀見園次序毅然揮手都無離别之顧率爾論心大有慨慷之致亦曰健者見無忝序吁嗟壯哉蓋其思致雕華才情清綺野王門內夙多螭豹之才陳書别傳顧野王字希馮吳郡人也九歲能屬文天文地理卜筮篆𨽻丹青無不通今秀州有顧亭湖野王讀書堆婁子城中大得虬龍之氣吳志華亭縣漢婁縣地乃古婁子國按大倉州稱婁東千篇芍藥見三芝序直空北部之胭脂見琴怨序百幅葡萄見三芝序竟洗南朝之金粉見琴怨序何况身偕計吏見琅霞序譽已鴻騫吳質魏都賦我太公鴻飛衮豫沈約碑文鴻騫舊矣射䇿春官見琅霞序名偏鵲起見祖德賦花箋乍擘高文已播於寰中麝墨才乾麗製競傳于都下但論文筆足壓溫邢見園次序若數聲華可羞袁伏世說袁虎伏滔同在桓公府桓公每遊燕輒命袁伏袁甚恥之桓嘆曰公之厚意未足以榮國士與伏滔比肩亦何辱如之洵所謂江東獨步南史晉文帝詔羣臣賦赤鸚鵡袁淑作賦畢以示謝莊及見莊賦嘆曰江東無我卿當獨步我若無卿亦一時之傑遂隱其賦按王文度亦稱獨步河內無雙者矣漢書馬融嘗推敬許慎時人語曰五經無雙許重叔晉書任昉謂伏挺曰此子日下無雙適當天畔之遐征大出筐中之奇作送君萬里序子一言嗟乎事大可為時猶多難陳雲忽起正英賢報主之秋邊馬成羣尤志士立功之會榴花染綬願君著績於本州栁葉彎弓期爾垂名於興國國䇿楚冇養田基善射去栁葉百步而射之百發百中按史記作揚葉勉旃大業蚤建銅標後漢書馬援征蠻交趾樹銅柱于分茅嶺以表漢界紀功而歸按遺跡在南寧府今南安界行矣故人遄揮羽扇詳賀周序裴啓語林諸葛武侯與晋宣武戰于渭濱持白羽扇指揮三軍此日參軍出牧長憶君於鸚鵡洲前見滕王賦他時飲至䇿勳重揖我於鳯凰闕下左傳入而振旅歸而飲至三朝舊事魏文帝歌曰長安城西有雙闕上有一雙銅雀一鳴五穀生再鳴五穀熟王維詩雲裏帝城雙鳯闕歸田倡和序貝丘畢載積先生濟南志唐曰臨淄古營丘地有淄川縣乃劉宋貝丘青社名家括地志周公建大社于國中取五方土為社東方青土今稱齊地為青社烏衣巨閥見少楹序系傳姬籙宗倍亢於毛郕書義疏畢公高文王十五子康王命畢公釐東郊左傳冨辰諫王曰管蔡郕霍魯衛毛𣆀文之昭也又鄭子叔曰吉焉能亢宗注亢蔽也姓著齊封族更華於高國姓氏譜畢姓望出東平太原左傳林注高子國子天子命為齊守臣皆上卿若乃緑碑突兀秦丞相之所登封濟南志泰安州泰山高四十餘里頂有石表云秦時無字碑其古蹟曰封禪臺秦李斯篆按鄒縣嶧山亦有李斯篆碑朱邸崔巍王文考於焉作賦見滕王賦魯靈光殿賦嵯峩㠑嵬又云朱闕巖巖而雙立三千伎擊水朝百谷之王莊子水擊三千里國語蒼頭伎擊甲天下老子江漢所以能為百谷王者以其無不受之十二諸侯地扼中原之吭史記十二諸侯年表贊曰譜十二諸侯自共和訖孔子地理通釋十二諸侯魯齊燕蔡曹陳衛宋晉楚鄭秦也青州國勢輿志濟南為禹貢青州之域首重淄川見上天上星精尤推畢宿天文志畢為二十八宿之一江東顧陸見尺牘序隴右崔韋史記天水隴西與關中同俗注今鳯翔府小學紺珠唐隴西稱崔盧為巨姓又稱城南韋杜亦稱崔韋聨茵則繡轄齊褰列宅則㦸門對啓詳閨秀序大兄康樂見無忝序晨遊朱雀之門漢官儀宫中不畜雞衛士候于朱雀門外專待雞唱鮑照詩朱爵文忩韜綺疏小弟清河見琴怨序暮宿蒼龍之闥三朝舊事未央宫東有蒼龍闕北有𤣥武闕建章宫亦有雙闕注朱鳥南方中星蒼龍東方中星命名取此竇長君意氣名冠東京漢書竇長君傳文帝竇皇后之兄字長君有盛名與弟廣國字少君人稱為退讓君子不敢以冨貴驕人桓元子風流姻連北闕晉書桓溫字元子尚南康公主拜駙馬都尉庾翼常薦于明帝曰溫少有雄略願陛下勿以常壻畜之宜委以方召之仕然而井湧忠泉後漢耿恭傳恭引兵據疏勒城傍穿井十五丈不得泉乃整衣冠再拜有頃泉水奔出庾信陸逞碑忠泉暗滿又燕歌山間湧水忠誠見庭多孝笋見􅋯菴序于公子弟衆盡識其高門見憺園賦石氏家風無不稱為長者前漢書景帝時石奮為九卿長子建次子慶皆以馴行孝謹官至二千石帝號奮為萬石君世說潘嶽作家風詩陸機舊德祗事詩書陸機文賦詠世德之駿烈誦先人之清芬按集中又有祖德述先二賦顔峻清規不談權要宋書顔延之字延年子峻從宋武帝討逆邵以功封右將軍貴重無比延之蕭然如故嘗乘羸牛笨車逢峻鹵簿即屏往道側嘗語峻曰吾生平不喜見要人今不幸見汝洎乎大司農白陽先生出珥貂蟬見半繭賦入升鼎鉉易班資並茂蕭相國之元功韓文計班資之崇卑東觀漢紀和帝詔曰高祖功臣蕭曹為首史記惟祖元功品地逾崇宋尚書之素望詳寶汾序注於是瑞協金環祥呈珠樹羊祜别傳祐方五歲令乳母于鄰家李氏園桑樹下探取金環李氏驚曰北吾亡兒所失乃知即祜前身也珠樹詳徐母序山海經三珠樹生赤水上樹柏葉皆為珠淮南子海外三十六國三珠樹在其東北方東國華宗知次公之蚤貴南朝妙族識仲孺之先榮補注司農公三子先生其第二也幼即明通長而岐嶷詩麒麟為目果天上之佳兒見憺園賦鸚鵡成篇信人間之才子見少楹序無何甫號勝衣便逢多難才離毁齒洊歷百憂見素伯序當我先生拜衮之年周禮三公命衮不過九命若有加則賜也注三公八命矣復加一命以服衮龍後有賜服非命服也晉書袁淑字陽元年二十四任吏部郎才氣之高奇王義康問其年曰鄧仲華拜衮之歲陸士衡入洛年即令府君騎箕之歲見藝圃府斯時也伯起預亡見憺園賦少孤尚幼先生隻身恤緯中夜茹荼左傳子太叔對范獻子曰人亦有言嫠婦不恤其緯而憂宗周之隕為將及焉詩誰謂荼苦弱必致哀貧能偹禮西園賜鏹置守塜之千家晉陽春秋張悛字士然元康中代吳令謝詢表求為孫氏置守冢人北府為瑩給鐃歌之十部任昉為蕭公行狀前後部羽葆鼓吹挽歌二部虎賁班劒百八傾都以送相此歌虞見瑞木賦繞墓而觀憐其嘔血晉書阮藉性至孝居喪嘔血數升至夫武安見螫博陸相傾史記太史公曰魏其侯竇嬰誠不知時變灌夫無術而不遜武安侯田蚡負貴而好權陷彼兩賢命亦不延禍所從來矣安釐母弟懼兵革之飄離見素伯序田單宗人痛鄉廬之轉播見雪持序先生閲歷故未易覼縷述也王延夀王孫賦嗟難得而覼縷既而䇿名闕下受爵朝端綰組高梁卓異推於朝議水經高梁出自并州黃河之别源順天志水東徑昌平沙澗又東南經高梁店流入都城海子牽絲絳縣清白洽夫輿情應璩詩不誤牽朱絲謝靈運詩牽絲及元興解龜在景年左傳晉遷于新田注今平陽絳縣漢書楊震為涿郡守有勸置産以遺子孫者震曰使後世稱為清白吏子孫所遺不厚乎尋以新恩遷之今秩原夫崇川之城郭也者吳志崇明一稱崇川雄關夙抱既歲久而甎傾天塹新開詳鶴客序注又移時而潮囓先生飭此干掫左傳陪臣干掫注夜戒守有所擊也勞其版築詩星言而出參佐陪庾亮之牀庾亮傳亮鎮武昌時諸佐吏殷浩之徒乘秋夜登南樓亮忽至諸人起避之曰老子于此興復不淺便據胡床與浩等談咏竟夕其坦率類此露坐以臨城角奏劉琨之笛晉劉琨傳越石在晉陽為敵騎所圍乃乘月登樓清嘯中夜奏胡笳敵有懷土之思棄圍去千尋雉堞左傳鄭祭仲曰都城過百雉國之害也注方丈曰堵三堵曰雉寧勞下瀨戈船見佳山序百里金甌梁紀武帝曰我國家如金甌無一缺缺詎事南征戰艦晉陶侃傳侃為江夏太守又加督護與諸軍并力拒陳恢侃乃以運船為戰艦所向必破庾信詩荆門戰艦浮軍則已名君子見懸圃序晉書劉超為校蔚統衆宿衛號君子營城應祗號吕公武昌志吕䝉城孫權征零陵時築又崇川之土地也者民鮮奇嬴貨殖傳操其奇嬴田多斥鹵書六月志大雨雹百里書無麥苗春秋昭公四年大兩雹莊公七年大水無麥苗甚而家亡戶絶鬼類夏畦栁文雖馬醫夏畦之鬼抑且岸圻沙坍人同魚鱉說文水衝岸壞曰坍左傳康公曰微禹吾其魚乎公灑血上書單車入告叩閽有路願除已去之丁竊祿何情兾緩難供之餉兩年惠政人思以賈姓名兒後漢書桓帝時賈彪為新息長時小民多不養子彪嚴為之制數年人養子者以千數皆曰此賈父所生名曰賈子一郡仁聲衆共曰杜公吾母見園次序詎民生之不猶詩值君門之甚沮謗生一篋誰明良吏之寃國䇿樂羊子為魏文侯伐中山三年拔之文侯示以謗書盈篋封之靈夀釁起二桃孰辨逺臣之枉晏子春秋齊公孫捷田開疆古冶子事景公勇而無禮晏子言于公餽之二桃曰三子計功而食三子爭功公孫捷田開疆以功不若冶刎剄而死冶曰二子死之冶獨不逮亦自刎諸葛亮梁甫吟一朝被讒言二桃殺三士先生乃失馬不驚掇蜂無懼淮南子北塞之人有馬亡出塞外人皆弔之其父曰此何詎知非福居數月其馬將狄駿馬而歸人皆賀之其父曰此何詎知非禍家富馬良其子好騎墮馬折髀人皆弔之其父曰此又詎知非福居一年狄人大入塞壯者皆控弦而戰死者十九此子獨以跛故子父相保說苑王國君尹吉甫前妻子伯奇後妻子伯封後妻欲其子為太子言于王曰伯奇好妾王若不信王上臺觀之後母取蜂去其毒而置衣領之中使伯奇前奇欲去之王見之使讓伯奇使者見袖有死蜂以白王王使追之巳投于河矣陸機詩掇蜂滅天道拾塵惑孔顔珠生字裏淮南招隱之篇見滕王賦霞蔚行間平子歸田之賦見三芝序傳之宫閣播此通衢凡兹食息之倫疇忘生成之感或鄴都耆宿素䝉鮑叔之知見園次序或吳國英年久動蔡雍之嘆魏志蔡雍才學顯著常車騎填巷聞王粲在門倒屣迎之粲年方幼雍嘆曰有異才吾不如也吾家書籍盡當與之或金閨貴客見園次序手題慕德之碑或石戶逸民口誦銜恩之作陸雲詩銜恩非望始劉峻絶交論銜恩御進欵誠或金張許史之姓庇宇車前金張見滕王賦漢書孝宣許皇后生元帝封外祖父廣漢為平恩侯衛太子史良娣宣帝祖母兄恭宣帝立恭已死封恭長子高為樂陵侯蓋寬饒傳寬饒得罪嘆曰上無許史之屬下無金張之託或東西南北之人檀弓丘東西南北之人也擔簦閣下見季青序甚至談風論月休上人之才情沈約宋書沙門惠休善屬文世祖命還俗本姓湯位至揚州從事繡虎描鸞曹大家之述作范曄列女傳扶風曹世叔妻者同郡班彪之女也名昭字惠班一名姬博學高才世叔早卒有節行法度兄固著漢書未竟而卒詔昭就東藏書閣踵而成之帝數詔入宫令皇后諸貴人師事焉號曰大家人為四咏緒有千端某以菲材屬公隆遇珠枯滄海久無照乘之期史記魏王曰寡人有徑寸之珠照乘車前後各十二乘者十枚玉碎崑岡書永斷償城之望史記趙惠王得楚和氏璧秦昭王請以十五城易之幸高軒之不棄詳合肥書乃下士之俱收爰於兹集之成重命鄙人為序裘稱狐腋慚兹麻枲為緣愼子狐白之裘非一狐之腋王褒四子講德論千金之裘非一狐之腋琴號龍唇愧以柷圉作倡琴賦琴有龍唇鳯足孟浩然詩拂拭龍唇琴書合止柷敔注同圉敢誇流水見園次序見景高山詩胡智修詩序南朝金粉夙標綺麗之名北地胭脂雅擅雕華之譽見琴怨序則有沙堤妙胄國史補唐故事拜相府縣載沙填路自私第至城東街名曰沙堤畫省望郎見園次序裁碧艾以成衫見憺園賦纈紅桃而製緩見半繭賦人操玳管聫翩江鮑之才見園次序代典黃扉見佳山序赫奕韋平之拜韋𤣥成詳儲太翁啓漢書平當字子思哀帝朝以明經為相子晏以明經歷位大司徒漢興惟韋平二氏父子宰相北窗瑣言令狐綯繼有韋平之拜新居燕市舊籍越城易水既荆高慷慨之場輿志易州乃易水所經之地刺客傳荆軻之秦至易水高漸離擊筑歌曰風蕭蕭兮易水寒壯士一去兮不復還為羽聲慷慷耶溪尤種蠡悲歌之地輿志若耶溪在紹興府諸暨縣西施採蓮地越世家勾踐已平吳范蠡遂去遺大夫種書曰蜚鳥盡良弓藏狡兔死走狗烹國䇿子胥諌吳王曰種蠡良臣談諧興劇攬帝京烟月之奇顧盻風生得伯國江山之氣於是溫邢才調幼即登朝見園次序王謝門風見少楹序注少而筮仕左傳畢萬筮仕于晉騎省薰香之暇見滕王賦便自含毫見藝圃序倉曹傅粉之餘見銅雀賦按倉曹今稱户部還思弄墨見得仲序郎君官貴盈床堆翡翠之箋公子才高繞架插珊瑚之筆見天篆序清辭不少麗句偏多僕也十載清狂兩年羈宦白團扇上常披栁惲之詩宋書栁世隆第三子名惲字文暢長于詩劉宋時官太子洗馬王融讀惲搗衣篇至亭臯木葉落隴首秋雲飛因以白團扇書之金水橋頭乍識李雍之靣唐書李雍早負盛名人傳其眉目秀異觀者如堵車不得前屬同官為傳語命賤子以定文見懸圃序不揣揄揚用承諈諉見懸圃序敢曰文如皇甫纍君酬買字之縑唐書皇甫湜字持正與李翺張籍齊名裴度辟為判官度修福先寺湜為碑文晉公酬以千緡湜曰碑文三千字每字一絹減不得也公笑而足之庶云病類相如史記相如常有消渴疾稱病閒居不慕官爵為我取忘憂之酒見天篆序施肩吾詩茶為滌煩子酒為忘憂君王良輔百首宫詞序三千窈窕見銅雀賦競進丁年李陵書丁年奉使二八媌娙俱陪甲帳二八見滕王賦列子處子娥媌靡曼者漢書武帝所幸邢夫人號娙娥事原漢武以珍寶為甲帳其次為乙帳巫山西眺荆臺多行雨之人宋玉高唐賦序昔楚襄王夢見一婦人曰妾在巫山之陽旦為朝雲暮為行雨朝朝暮暮陽臺之下漳水東流魏殿盛分香之客見銅雀賦九天春曉傳妙曲於才人離騷指九天以為正兮注中央八方也一云數起于一立于三成于五盛于七故天去地九萬里曰九天魏嬪妃紀魏以美人才人良人為散職三閣分明見滕王賦艷新粧於學士見琅霞序并詳鴻客序宫名長樂見滕王賦人號小憐見琅霞序爾乃年年竊藥只恨蟾孤見琴怨序夜夜吹簫惟愁鳯杳見藝圃序瓊樓玉宇稔高處以偏寒見瀛臺序蘇子瞻詞又恐瓊樓玉宇高處不勝寒氷井銅鋪較外邊而更冷後漢書琅琊有氷井厚丈餘銅鋪見雪持序莫不結眉表色破粉成痕文苑梁簡文帝答新渝侯和詩書云高樓懷怨結眉表色長門下泣破粉成痕衛莊姜多太息之言詩義疏莊姜不見答于莊公而作詩陳皇后有不平之曲見海棠賦且夫丹闈晝寂並若雲霄紫禁晨嚴非同閭巷問樹名於溫室詎必前知漢孔光傳或問光溫室省中樹皆何木也光默不應其愼如此記曲叠於霓裳將母小誤龍城録開元中八月望夜明皇與申元之登女几山因遊山月宫見素娥十餘人皆皓衣乘白鸞笑舞于廣庭大桂樹下上皇歸製為霓裳羽衣曲按從遊者一作葉靜能一作羅公凡三見王維别傳有以按樂圖示維者曰此霓裳第三叠拍也按曲乃信吳志周瑜精音樂雖三爵之後其有闕誤瑜必知而顧之時人語曰曲有誤周郎顧縱復含情渲染極意賡揚侈仙家之亭館總涉描摹誇海上之樓臺終無事實然而白頭宫女能說開元元稹行宫詩寥落古行宫宫花寂寞紅白頭宫女在閒坐說𤣥宗開元見園次序隔水商船善談江左琵琶引序居易為九江郡司馬送客浦口聞舟中使彈琵琶者問其人本長安倡女年長色衰為賈人婦遂命酒使快彈數曲曲罷自叙少時歡樂事今轉徙江湖間或緣自佩蘭之誦述或得諸樊嬺所傳流西京雜記戚夫人侍兒賈佩蘭多稱述在宫之事飛燕外傳序漢伶𤣥之妾樊通德趙飛燕女使也能道飛燕宫中事𤣥曰俱灰減矣通德掩袖視燭影以手擁髻凄然泣下𤣥因作飛燕傳有云飛燕特幸後宫其姑妹樊嬺為丞光司帟者帝居鴛鴦殿飛燕便房省帝簿嬺上簿云西京雜事葛洪傳西京雜記六卷皆洪所集東觀餘論跋西京雜記云此書中事皆劉歆所記葛稚川采之以補班史之缺耳譜在琵琶南郡新書唐書錢希自作南郡新書弆之篋衍見尺牘序則有主文譎諌者綴以吟謠卜子夏詩序主文而譎諌故曰風注主文與宫商相應也譎諌不直諫也驗往察來者形之比興史記序驗往事思來者語皆寄託夙工宋玉之微詞宋玉登徒子賦序大夫登徒子侍于楚王短宋玉曰玉為人體貌閒麗口多微詞願王勿與出入後宫事屬虛無不繫劉楨之平視典略建安十六年世子為五官中郎將妙選文學使楨隨侍太子酒酣坐歡乃使夫人甄氏出拜坐上客多伏而楨獨平視他日公聞乃收楨復減死輸作部復赦之貞夫抱慤無非自擬其騷愁誼士懷芳寧至或傷於怨悱淮南子小雅怨悱而不亂於今為烈自古而然三韓王良輔先生按三韓即遼東地七葉金貂見半繭賦一門繡㦸詳閨秀序葡萄滿幅見三芝序空北地之胭脂見琴怨序翡翠聫箱見智修序洗南都之金粉見琴怨序人居洛浦慣解吹笙見琅霞序家在扶風原精織錦見璿璣賦此千篇嗣出將懸市上之華文見楚鴻序而一卷先傳早播宫中之雅製也緬昔陜川司馬仲初表綺麗之稱詩話唐王建字仲初為陜川司馬時劉禹錫曰居易皆有詩送之所著宫詞最為綺麗集十卷行世孟蜀夫人花蘂擅清新之譽輿志灌縣有花蘂夫人宅五代時費氏以才色入蜀宫後主嬖之效王建作宫詞百首能改齊漫録僞蜀主孟昶徐匡璋納女于昶拜貴妃别號花蘂夫人王師下蜀太祖聞其名命别護送之有宫詞傳世輟耕録夫人或以姓費氏誤矣以暨李珣之小妹亦留百首之宫詞補注何意吾賢獲符往哲後有人焉聆斯曲也悠揚嘽緩疑聞百囀之鶯啼禮其樂心感者其聲嘽以緩章賈至詩百囀流鶯繞建感慨沉雄似聽千年之鶴語八公相鶴經鶴七年小變十六年大變百六十年變止千六百年形定白香山詩聲來枕上千年鶴家皇士望逺曲序嘗觀蕩子從軍見滕王賦駱丞集有蕩子從軍賦漢枚乘詩蕩子行不歸杜牧詩蕩子從征夢寐稀明鏡有刀環之賦見無忝序吳姬織素見無忝序注飛龍生藥店之悲宋樂府讀曲歌自從别郎後卧宿頭不舉飛龍落藥店骨出只為汝李賀詩骨出似飛龍列仙傳喬順二子璋瑞師事仙人盧子期于栖霞谷服飛龍藥一丸千年不飢郎食鯉魚之尾授色恩情古樂府郎食鯉魚尾妾食猩猩唇妾燒玳瑁之簮傷懷訣絶古樂府何用問遺君雙珠玳瑁簮聞君有他心拉雜摧燒之王筠詩空貽玳瑁簮吳均詩還君玳瑁金雀叉不忍見此使心危廬江小吏愁孔雀之東南鄴下名王恨浮雲之西北見素伯序莫不手褰寶帳速望人來隋紀煬帝建迷樓上設四寶帳皆雜寶所成杜陽編寶歷二年浙東國貢舞女二人一曰飛鸞一曰輕鳯上令藏金屋寶帳中宫中䛇曰寶帳香重重一雙紅芙蓉坐擁金屛恐令春去補注梁劉遵詩金屏障翠帔則有四姓良家北史魏文帝宏雅重內族以范陽盧敏清河崔宗伯榮陽鄭義太原王瓊四姓衣冠所推咸納其女以充後宫玉臺新咏序四姓良家名馳永巷三河妙族地理通釋唐都河東殷都河內周都河南三河在天下之中幼住石城之下金陵志府西有孫權石城乃據石頭上為城諸葛亮稱石城虎踞長貯金屋之中見海棠賦趙家姑妹本姓為樊見良輔序楊氏諸姨賜名為虢見海棠賦檀黃染靨見璿璣賦酉陽雜俎宫粧多以黃塗靣李賀詩宫人靣靨黃荆公詩漢宫嬌額半塗黃人傳巧笑之方中華古今注段巧笑魏文帝宫人始作紫粉拂靣石黛添娥見少楹序家有莫愁之曲見海棠賦唐書樂志莫愁樂者石城有女子名莫愁善歌謡樂府題解古歌亦有莫愁洛陽女與此不同金蓮擬步誰讓潘妃蕭齊史寶卷嗣明帝位鑿金為蓮花貼地令潘妃行其上曰此步步生蓮花也白雪如人何殊甘后拾遺記蜀先主甘后玉質柔肌先主置白綃帳中如月下聚雪河南獻玉人置后側晝則講說軍謀夕則擁后而玩玉人后與玉人潔白齊潤寵者非惟妬后亦妬玊人也後甘后卒與玉人共坑芙蓉承輔西京雜記卓文君眉如逺山臉際若芙蓉豈煩傅粉之粧見銅雀賦蘭麝沾膚奚假熏香之術梁武帝遊女曲氛氲蘭麝體芳滑飛燕外傳飛燕女弟合德為婕妤帝嘗私語樊嬺曰后雖有異香不若婕妤體自香也蝤蠐粉項詩偏宜白燕雙叉洞冥記漢武帝起昭靈閣有神女留玉叉與帝至昭帝時宫人猶見此叉謀欲碎之開匣惟見白燕飛去後凡宫人作叉因名玉燕叉楊栁纎腰見琴怨序解映緑貍重席飛燕外傳趙婕妤以二十六物為趙后夀中有含香緑毛貍藉一鋪西京雜記飛燕女弟設緑熊席毛一尺餘眠而擁毛自蔽望之者不得見也坐則沒膝雜薰諸香百日不散兄居協律原識佳人見琅霞序注姊在昭陽新稱皇后飛燕外傳飛燕特幸後宫號趙皇后居昭陽宫樊嬺因進言飛燕有女弟合德帝大悅謂為溫柔卿號趙婕妤後益貴幸號昭儀姊弟專寵十餘年誠可謂天上無雙宫中第一者也然而棄妾鳯城之南思子狼河之北沈全期詩白狼河北音書斷丹鳯城南秋夜長歲歲征遼空為天子隋紀煬帝幸江都以詩留别宫人曰我愛江都好征遼亦偶然年年服散徒作姬人文苑英華江總詩有姬人怨服散篇云薄命夫壻好神仙逆愁高飛向紫烟金丹欲成猶百鍊玉酒新熟幾千年妾齡十五已為離别之時劉琨詩如何十五女含笑酒壚前徐陵咏舞詩十五屬平陽唐人有十五嫁王昌之句郎路三千大有相思之曲見滕王序看銅街之走馬銅街見滕王賦走馬詳夀閻序息意櫻桃見海棠賦聽珠閣之吹簫見藝圃序忘情豆䓻見海棠賦人傳虎帳新移光祿塞邊古詩虎帳夜談兵漢書武帝使光祿徐自為出五原築城障列亭至盧朐為塞因名光祿庾信昭君詞斂眉光祿塞客曰牙旗舊駐胭脂山下釋名牙軍中大旗發號令者以犍立牙于帳前謂府之牙門東京賦牙旗繽紛注以象牙飾之後呼公為牙門訛為衙杜審言詩胭脂山下莫經年詳觀槿序注粧臺疑惑繡户徘徊寄摩敦之紫襖心傷周室之宇文周晉蕩公護傳宇文護母閻氏與皇第四姑及諸戚幽摯在齊至是並許還朝保定四年皇姑至齊主以護權重乃留其母仍令人為閻作書報護曰汝與吾别之時年尚幼小呼我作阿摩敦今又寄汝小時所著錦袍表一領知吾含悲多歷年祀護報書齊朝不即遣往返再三後母方至贈妃子以金環目斷齊朝之斛律北齊書齊主湛召故太子樂陵王百年百年知不免留玉玦與其妃斛律氏為别及百年死妃把玦哀號月餘亦死玦把在手拳不可閞時年十四王孫質趙何日言歸見素伯序公子留秦無時云返怨録楚王之子質於秦不得歸作王子思歸歌有曰去千乘之家國作咸陽之布衣庾信思舊銘楚公子之留秦其人也如此其逺也如彼於是盤龍綰髻獨上高臺墮馬明粧廣開寶埭梁冀傳冀妻孫夀色美而善為妖態作盤龍叉愁眉啼粧墮馬髻折腰步以為媚惑玉臺新咏序裝鳴蟬之薄鬢照墮馬之垂鬟姚崇詩扇掩將雛曲叉分墮馬鬟說文埭通作􅀈偃堤也青天碧海竟無桂樹之期見良輔序注李義山詩嫦娥自悔偷靈藥碧海青天夜夜心白晝黃昏又下藁砧之淚古樂府藁砧今何在山上復有山注藁砧夫也山上復有山言夫出也餘香不斷自洗溽衣見琴怨序月令季夏土潤溽暑說文濕也補注剩粉猶存私留窮袴漢紀昭帝上官皇后霍氏外孫女欲后擅寵有子帝時不安左右醫者阿意言宜禁內寵雖宫使令皆為窮袴多其帶後宫莫有進者注窮袴前後有襠不得交通古樂府護惜加窮袴隄防託守宫三春永巷豈有恨於君王通鑑周宣王姜后待罪永巷史記范睢見秦王佯為不知永巷而入其中正義曰宫中長門永巷乃幽閉宫女之有罪者後改名掖庭唐書郭子儀永巷家人三千按此亦天子公侯之通稱萬里長城復何心於歌舞史記䝉恬傳恬築長城臨洮延邪萬餘里庶幾化石猶存道上之夫見海棠賦莫便升天竟竊月中之藥見琴怨序爰命江南幼女河內嬌娥玉臺新咏序本號嬌娥繪以丹青圖之紈素紫綃不定竚瓊觀以卷衣漢紀成帝為趙后設紫綃雲氣帳列仙録橘叟輸紫綃被一副社陽編元載得南洞鮫綃帳冬風不入盛暑自凉隱然不知為帳見卧內紫氣而已白樂天詩紅綃信手舞紫綃隨意歌樂府題解有秦女捲衣注解衣以贈所歡也羅帶將移睨碧虛而垂手樂苑吳均賦樂府得大垂手小垂手有曰埀手忽迢迢飛燕掌中嬌羅衣恣風引輕帶任情搖又且復小垂手注舞也漢武帝之倣徨帳後是也非耶漢武李夫人歌是耶非耶立而望翩姍姍其來遲並見琴怨序衛宣姜之倣佛君前天乎帝矣詩所以西陵松柏不無嘆息之言樂府蘇小小歌妾乘油璧車郎騎青驄馬何處結同心西陵松柏下注西陵在錢塘之西蘇小小錢塘名倡南齊時人禾水鴛鴦嗣擬綢繆之作也嘉興志三國時曰嘉禾縣有鴛鴦湖在城南一名南湖吾家閥閲見藝圃序亦有新聲史記李延年善歌為變新聲南史陳後主採詞之尤艷者被以新聲此日封胡遂填别體詳夀閻序按封胡謝韶小字遏末謝淵小字韶字穆度萬之子淵字叔度奕之子或曰封謂郎胡謂淵遏謂𤣥末謂韶敢曰難兄惟法護王氏譜王導孫王珉字季琰小字僧彌少有才藝善行書出兄珣之右時人語人曰法護非不佳僧彌難為兄法護珣小字也著此青箱見少楹序或云愛弟有清河周宇文􅓉撰庾信集序似陸機之愛弟見少楹序屬之𤣥晏俱見少楹序嗟乎蛺蝶成灰詳庭表序李賀詩灰蝶生松隂别歡五載古詩能不懷所歡注女謂男為歡珊瑚製枕待子三年李賀詩今朝香氣苦珊瑚澀難枕處娣尚未適人見雪持序小姑何嫌獨處晉樂府有青溪小姑曲云開門泉側近橋梁小姑所居獨處無郎搜神記廣陵蔣子文嘗為秣陵尉青溪小姑其第三妹也須知新婦難配參軍世說王渾妻鍾氏字琰生子濟幼時趨庭而過渾正與琰坐渾欣然曰生子如此足慰人心琰笑曰若使新婦得配參軍生子故不翅如此注參軍渾中弟淪也豈有才人乃歸厮養公羊傳厮役廬養注析薪為厮炊烹為養樂府題趙邑古歌有邯鄲才人嫁為厮養卒婦抱衾裯於星下誰適為容詩浣粉黛於窗前各言其志云爾莊淡菴先生長安春詞序遲遲春日詩青陽總四序之先爾雅春為青陽藹藹長安紫蓋會五都之極廣雅藹藹盛也張協詩藹藹東都門梁元帝𤣥覽賦黃旗紫蓋域中為天地之所合西都賦五都之貨殖三選七遷宫開閶闔見璿璣賦夙擅神臯張衡西京賦實為地之奧區神臯注神臯神明之界局節届勾芒還饒淑氣月令孟春之月其神勾芒惟天時地利之交榮斯短什長謡之競叶王勃著春思之賦歲在咸亨二年王勃春思賦序咸亨二年余春秋二十有二于時春也屈平有言極千里傷春心因作春思賦云徐陵成春興之篇時則洛陽三月徐陵洛陽道詩緑栁三春暗紅塵百戲多按陵又有春情詩題則有柄指東皇晷窮北陸尚書緯春為東皇乂為青帝淮南子斗柄東而天下春宋傅亮冬至詩星昴殷仲冬短晷窮南陸按虛星亦名北陸頻捲蝦鬚之帳為放冬歸蘇易簡詩蝦鬚半捲天香散漫圍龜甲之屏須令臘去郭子橫洞冥記上起神明臺上有金床象席雜玊為龜甲屏風裁紅暈碧春已到於幡邊詳下滴粉搓酥詳浙西詞序花漸盈於勝裏事原綵勝起于晉賈充夫人所作後立春日士女為小幡春勝以戲織錦坊南之路鳯子先知古今注蛺蝶大如蝙蝠者或黑色或青斑名曰鳯子一名鳯車沈約咏領邊繡詩縈絲飛鳯子結縷坐花兒吹簫巷外之街蛾兒早覺閙蛾詳庭表序廣志冇蠶蛾有天蛾凡草木蟲以􅀈化為蛾者甚衆浮浮新霽訝殘雪之旋融曖曖微曛笑輕氷之乍釋檻前晝暖已春鳥之能歌鏡裏年芳更春人之似織張衡思𤣥賦庸織路于四裔兮注路涉東西如織也加以從來燕子只舞昭陽見滕王賦并詳昭華序自昔蘼蕪見滕王賦偏叢長信三輔黃圖從洛門至周廟門漢立長信宫在其中彼春日固穠花之候况長安尤佳冶之鄉九華殿上西京雜記漢液庭有雲光殿九華殿洛陽宫殿簿魏有明光徽音式乾九華之殿鳥必雙棲見看奕賦百子池頭花非一色見瀛臺序參差裙幄糊頳壤以纓崖風土記長安士女遊春遇名花則藉草而坐解裙四圍謂之裙幄蕪城賦糊頳壤以飛文暗靄毬堂嵌花榱而耀谷補注初學記蹴鞠曰戲毬古用毛糾結今以胞為裏噓氣閉而蹴之或以韋翩其綿羽王元長曲水詩序雜天采于柔荑亂嚶聲于綿羽行行逢叔寶之車見雪持序鷕彼圓吭處處遇安仁之彈世說潘嶽少時挾彈出洛陽道婦人遇者莫不連手共縈之小侯玳轂外戚珠軿妖童挾瑟於觀津史記外戚傳竇太后趙之清河觀津人也正義注在冀州武邑縣地理通釋觀津鎮趙地蕩婦數錢於新市見滕王賦注輿志真定府新樂縣漢曰新市按漢江夏郡亦曰新市非是玉臺新咏序亦有潁川新市河間觀津何必為歡百計方邀息媯之片言左傳蔡哀侯繩息媯以語楚子楚滅息以息媯歸生堵敖及成王焉未言楚子問之對曰吾一婦人而事二夫從弗能死其又奚言楚子以蔡侯滅息遂代蔡詎須行樂千端始博賈姜之一笑左傳晉叔向曰昔賈大夫惡娶妻而美三年不言不笑御以如臯射雉獲之其妻始笑而言無煩萱草便已忘憂見楚鴻序靡假靈犀居然蠲忿見琴怨序豈比夫崔駰不樂見楚鴻序吳質工愁魏略吳質字季重南皮人為魏文帝所喜帝奔質作詩曰愴愴懷殷憂殷憂不可居徙倚不能坐出入步踟躊尋卒庾信小園賦崔駰以不樂損年吳質以長愁飬病蓬門鮮長樂之花晉傅咸紫花賦序紫花一名長樂華舊生于蜀地中國奇而種之余嘉其華純素耐久故為之賦樵徑乏駢柯之樹見憺園賦田園寂寞難尋鬬鴨之欄見憺園賦姓氏單寒疇𨽻飛龍之籍吳質答魏文帝箋曹烈曹丹加以公室枝庶骨肉舊恩其龍飛鳯翔實其分也一詳紫𤣥序名不挂於春官見琅霞序廣絶交論道不挂于通人世共嗤為秋士者乎淮南子春女愁秋士哀知物化矣於是蘭臺貴客藝閣華卿别賦蘭臺之羣英唐六典歷代蘭臺祕書省與御史愛鄰並詳賀徐序宫闕志漢宫有麒麟天祿之閣藏祕書唐改為麟臺祕書監一曰藝臺魚鮝典略藝香辟紙蠧故藏書閣曰藝閣六帖藝香草能辟蠧故書曰藝編鶴禁多閒漢宫闕疏白鶴太子所居之地凡人不得入故云鶴禁灑南朝之金粉見楚鴻序鸞坡偶暇唐書學士院移于鸞坡之西故曰鸞坡視草譜北地之胭脂見琴怨序曈曨甲拆姿肖物以屢遷說文曈隴昧爽欲明未明也易草木甲拆陸機文賦其為物也多姿其為體也屢遷駘宕芊綿見憺園賦體緣情而善變文賦詩緣情而綺靡二十四畨之花信演繁露吕氏春秋曰春之風不信則花不成故三月花開時風名花信風唐徐師川詩一百五十寒食雨二十四畨花信風歲時記一月二氣六候自小寒至穀雨四月八氣二十四候每候五日以一花之風信應之無勞花蘂新聲見良輔序一百草闋之春詞自有春坊麗製官制唐有春坊正字官李賀春坊劔歌莫教照見春坊字播之後代謾誇崔珏鴛鴦見三芝序詢彼前身仍是莊周蝴蝶見藝圃序余鴻客金陵覽古詩序原夫珠囊入漢嬴秦鑿淮水之年楊子秦亥失珠囊二世而亡天下金陵志相傳始皇初鑿淮水故名秦淮見瑞木賦玉璽歸袁孫䇿拜丹陽之守蔡雍獨斷秦以來天子獨以印稱璽又獨玉也後漢書黃門張讓劫天子璽投井中後井有五色孫堅得之袁術以讖言代漢者當塗高自以字公路應之聞孫堅得傳國璽拘其妻奪之吳志孫堅死䇿至夀春見袁術曰惟使君之所之術大喜謂之曰丹陽精兵地可往募䇿奉母詣丹陽後以兵少袁乃還其父兵表為懷義校尉地理志漢以寧國為丹陽郡晉宋齊梁陳以金陵為丹陽郡金陵志秦曰稜陵屬鄣郡漢屬丹陽吳曰建業晉曰建康亦曰丹陽括地志丹陽郡故在潤州東南五里即今鎮江府山多丹栁故名六朝宫闕盡屬臺城輿地圖晉成帝七年作新宫乃臺城地在鍾山側即晉建康宫城一名苑城容齊隨筆晉宋後謂朝廷禁省為臺故稱禁城為臺城四姓衣冠見琅霞序注及皇士序半居板渚金陵志李白秋夜泛板橋浦有耿耿對金陵之句若其西曲之子弟見海棠賦家有貂蟬見半繭賦南渡之君臣人多金粉見楚鴻序衛叔寶永嘉名士實始過江衛玠别傳玠辭王敦過建業都下聞其姿容觀者如堵王茂𢎞江表重臣用先開府見滕王賦注并詳下注緣夫討逆將軍以後遡厥鍾山隱士之前金陵志漢末稜陵尉蔣子文討賊死事于鍾山封為蔣侯立廟孫權因避祖諱改為蔣山吳志孫討虜將軍堅破董卓見袁術曰上為國家討賊下慰民心梁簡文帝草堂傳汝南周顒字彥倫昔在蜀以蜀草堂寺林壑可懷乃于鍾嶺立寺名草堂北山移文鍾山之英草堂之靈臨春結綺見滕王賦以及後主之澄心南唐史烈祖諱升都金陵傳璟璟傳煜稱後主善詩詞金陵建有澄心堂讀曲烏啼爰暨南唐之小令宋書樂志讀曲歌者民間為彭城王義康作也其歌云死罪劉領軍誤殺劉第四古今樂録讀曲歌者元嘉中袁后崩百官不敢作聲歌或因酒宴止竊聲讀曲相吟而已樂苑宋臨川王義慶為文帝所徵家人大懼妓妾夜聞烏啼憂思成曲其辭曰籠葱忩不開烏夜啼夜夜望郎來詞集南唐後主李煜善小令並見瀛臺序是曰妖浮之極致允為艷冶之大凡况夫青絲白馬地界夀陽南史侯景傳大同中童謡曰青絲白馬夀陽來于是景乘白馬以青絲為轡欲以應兆夀州志泰夀春縣至東晉以鄭皇后諱改夀陽後名夀州按太原府亦有夀陽縣非是虎踞龍蟠三國志孔明曰鍾山龍盤虎踞帝王居也金陵形勝志鍾山龍盤石城虎踞鎮連姑孰見滕王賦江通荆益南兖州既地接滑臺李益詩江通荆益原分晉唐地理志揚州名兖州亦名䢴州括地志滑臺本鄭之廩延邑今滑州星是女牛小長干復山連幕府分野志揚州屬牽牛婺女金陵志天文斗分野小長干見琅霞序金陵志晉元帝初渡江丞相王導建幕府于城西之山後名幕府山絶頂有虎跑泉四百八十寺冶號梅根杜牧詩云南朝四百八十寺地理志南陵有梅根冶宋書百官志冶鑄多在江北江南有梅根及冶塘二冶庾信賦南陵以梅根作冶三萬六千場東坡詞渡名桃葉見琴怨序然而南風不競難以稱雄見黃門序北帥有人自然飛渡晉紀王濬杜預克荆門吳都督孫歆懼曰北來諸軍乃飛渡江也又按孔範曰長江天塹限隔南北敵軍豈能飛渡耶王敦祖約時憂跋扈之強籓晉書永昌元年王敦率衆內向以誅劉隗為名逼近帝室祖約字士少永嘉末隨兄逖過江逖卒代為平西將軍後與蘇峻舉兵為逆跋扈見憺園賦國寶佃夫恆患荒淫之貴幸晉安帝紀王國寶平北將軍坦之第三子太傅謝安國寶婦父也惡而抑之不用安薨國寶輔政權傾內外宋書恩幸傳阮佃夫諸暨人元嘉中出身為臺小史太宗初出閣選為主衣歷纍世日見恩幸周公瑾之不作吕子明之已亡吳志周瑜字公瑾年三十六卒吕䝉字子明疾發權置內殿治護不愈而卒殿上則金蓮步步非無今昔之悲見皇士序江頭則鐵鎖年年不乏廢興之感晉書王濬為益州刺史武帝令伐吳吳人以鐵鎖橫截江路濬作火炬燒之須㬰融液斷絶濬直抵石頭孫皓出降是則城稱舊內定爾銷魂金陵志舊內在三山街即宋建康府高宗南渡以此為行宫俗傳孫權宅誤客到新亭居然流涕者也晉書江東諸名士登新亭藉卉晏遊周顗嘆曰舉目有江河之異相視流涕於是路出烏衣見少楹序惟多枯樹見天篆序橋經紅版止賸荒臺白居易詩紅板江橋青酒旗劉禹錫烏衣巷詩朱雀橋頭野草花鳥衣巷口夕陽斜陸慧曉之山林郗僧施之風月南史陸慧曉字叔明吳人玩之𤣥孫不雜交遊同郡張緒稱之曰江東裴樂也仕齊高帝詳紫𤣥序晉書郗超從弟子僧施字惠脫弱冠與王綏桓𦙍齊名竟陵王讀書之邸齊書竟陵王嘗曰余稟性端踈屬愛間外其行宅詩有云訪字北山阿卜居西野外幼賞悅禽魚早性羡蓬艾並見滕王賦貞陽侯躍馬之場梁書武帝以貞陽侯淵明分督諸將後東魏慕容紹宗擊敗之獲淵明潘妃沽酒閲武堂前蕭齊紀寶卷嗣位以閲武堂為芳樂苑苑中立店肆潘妃為市令自為市吏百姓歌云閲武堂種楊栁至尊屠肉潘妃沽酒孔嬪飛箋望仙閣後見滕王賦陳書後主令龔孔二貴嬪及女學士與狎客共賦新詩互相贈答無不眷此飄風鞠為茂草詩百年社稷徐僕射所以悲哀晉書恭帝詔禪劉裕祕書監徐廣流涕哀痛謂謝晦曰君為宋朝佐命身是晉室遺老悲歡之事固不可同又按徐陵傳陵為廣之孫仕陳大建元年除尚書右僕射二年遷左僕射滿目關山劉賓客因而悼嘆詩話劉夢得為太子賓客嘗與元微之韋楚老在白傳第各賦金陵懷古詩何常不愁攀玉樹泣望銅街見滕王賦撫錦瑟以言情見天篆序托鈿箏而寄意者乎見天章序君也人如張耳偶贅外黃史記外黃富人女甚美嫁庸奴亡其夫聞張耳賢嫁之女家厚奉給張耳乃宦魏為外黃令名益著括地志外黃漢屬陳留父是肩吾乃生小庾見楚鴻序屬在亂離之後詩矧當謡諑之辰離騷經衆女嫉余之蛾眉兮謡諑謂余以善淫注謡諑毁也用吟眺以攄愁乃躊躇而弔古李廣對軍中之簿今何時乎史記李廣傳廣與右將軍合軍出東道軍亡道大將軍青使長史責廣之幕對薄廣曰諸校尉無罪乃我自失道吾今自上簿遂自刎一軍皆哭江淹上獄中之書君其是矣梁書宋建平王景素好士淹隨至南兖州廣陵令郭彥文得罪辭連淹繫州獄中上書景素覽書即出之陳檢討四六卷六
