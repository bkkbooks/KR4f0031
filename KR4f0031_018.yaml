body:
  text: 陳檢討四六卷十八翰林院檢討陳維嵩撰書碑頌記志銘上合肥先生書載别旌門四更蓂莢見璿璣賦感知慕德泣更劇於蛇珠見鷹垂序怨老嗟卑身竟同於燕石唐李翔賦衆囂囂而雜處兮咸嘆老而嗟卑闞子宋之愚人得燕石于梧臺之東藏以為寶周客聞而觀焉主人革匱十重緹巾十襲客見之掩口而笑曰此特燕石耳其與瓦甓不殊馳惶無地哽懼自天莊子哽而不止注哽咽又悲塞也譬之越禽戀燠終思近日之鄉代馬衝寒恆有凌颷之氣見無忝序注人之情也能無嘆乎粵自南陽雉雊陳寶雞鳴見得仲序日月炳乎八紘見璿璣賦乾坤奠其四極見佳山序恩波湛濊北通弱水之邦書瑞氣昭回東被無龍之國見鄴園啓凡夫稟氣靡不䝉慈獨有文人善於失職見園次序餘姚書佐見竹逸序不無拾橡之時東觀漢記李恂餉遺無所受居新安關下拾橡實為食丹陽布衣下注或類翳桑之客見壽季序而嵩薄劣猥荷帡幪杜詩薄劣慚真隱揚子震風凌雨然後知厦屋之為帡幪也注旁曰帡上曰幪豫以吹噓長其聲價鄭泰傳泰對董卓曰孔公緒清談高論噓枯吹生李白與韓荆州書一登龍門則聲價十倍此則蚋毛蚉翼悉藉生成枯木朽株咸歸雕飾鄒陽上梁王書有人先談則以枯木朽株樹功而不忘頌揚曷極銘鏤奚言自入中原於兹三載託貴遊之後乘厠幸舍之末行遍歷兩河頻經八郡百凡風緒彌觸悲辛聊借叢談見庭表序以兹撫掌見樂府補序慨自蛾飛玉塞蟻潰金堤蛾飛見素伯序李白賦明妃玉塞楊巨源詩玉塞含悽見雁行注張掖郡北有玉門關故云玉塞韓子千丈之堤以蟻穴而潰漢書王尊守東都河水浸瓠子金堤尊祀神許身填之既七聖之路迷莊子黃帝見大隗于具茨之下七聖皆迷雲笈七籖黃帝周遊以訪真道令方明為御昌宇驂乘張若謬扅道焉昆昏滑稽從車而至襄城之野七聖皆迷亦百年之運替見滕王賦漢臺晉闕共廢壘以縱橫伊鼎姜璜並頽垣而蕪沒伊鼎見佳山序姜璜見吳太母啓兔苑賦詩悵鄒枚之不作見璿璣賦吹臺縱酒盻高李以何從陳留風俗傳浚儀有師曠倉頡城城上有列仙吹臺乃王子晉吹笙處東京記吹臺側後有繁氏居之里人呼為繁臺師曠建梁孝王增築之孔帖杜甫從李白高適過汴州酒酣登吹臺慷慨懷古人莫測也復奚言哉此固然矣若乃邯鄲為遊俠之魁朝歌乃輕華之窟史記邯鄲亦漳河之間一都會也古詩役使邯鄲倡高適詩邯鄲城南遊俠子自矜生長邯鄲裏見子厚序水經注朝歌本沫邑紂有新聲靡樂號邑朝歌墨子回車顔淵不舍按紂都此漢屬河內今衛輝府玫瑰作墄西京賦右平左墄注墄階齒也玫瑰見滕王賦東京樊重之家見半繭賦玳瑁為梁沈佺期詩海燕雙棲玳瑁梁西洛石崇之宅見憺園賦或奕洛瓌之所割據或賀六渾之所攘竊北史慕容廆小字奕洛瓌割地為北燕北齊書魏高歡謂爾朱榮曰明公雄武霸業可舉靸而成此賀六渾之意也按賀六渾歡小字後篡魏為齊三條夜啓遊騎歌鐘五劇晨開販脂削脯西京賦擊鐘鼎食連騎相過史記貨殖傳販脂辱處也而雍伯千金灑削薄枝也而郅氏鼎食胃脯簡微耳濁氏連騎馬醫淺方耳張里擊鐘漢書食貨志翁伯以􅡘脂而傾縣邑濁氏以胃脯而連騎質氏以洗削而鼎食張里以馬醫而擊鐘晉灼注胃脯今大官以十日作沸湯燖羊胃以末椒姜坌之訖曝乾使燥者也如淳注削洗謂作刀劍削也三條五劇見憺園賦此皆歷代名都纍朝勝域今則空餘風月無復綺羅淇泉罕巧笑之人詩趙國乏報恩之士詳掌亭誄注魁肩齲齒見贈閻序及茹蕙序即曰洛陽女兒見閨秀序注葱肆餅傖見索餅啓便是叢臺年少見賚衣啓詎堪揚扢徒滋閔默列子仲尼篇商太宰默然心計九章孔靜幽默鬱結紆軫兮離慜而長鞠注默通默慜痛也是以刻意矯除刮磨豪習孤行峭厲消耗壯心抱螙簡以終年廣雅螙同蠧見淡菴序注託螢編而永日見憺園賦玉杯一卷見存菴序注珠海千函非狷非狂如是而已補注所幸學善陸沈性甘徽纆莊子則陽篇孔子之楚舍于蟻丘之漿其鄰有夫妻臣妾登極者仲尼曰是陸沈者也注極屋棟也陸沈人中隱者譬無水而沈并見看奕賦注揚雄酒針牽于纆徽注井索也賔從念劉楨之疾劉楨詩余嬰沈痼疾竄身清漳濵見滕王賦主客知原憲之貧見謝園次啓濁酒素琴差無患苦稽康與山濤書濁酒一杯彈琴一曲恨賦濁醪夕引素琴晨張宵鐘夜漏聊用襄羊相如上林賦消搖乎襄羊郭璞注襄羊猶倣徉也以此自寬母煩相譬見井叔序且夫楚腰信美見梧月序不登展氏之牀家語展禽名獲字季居柳下嘗納女懷中國人稱其不亂秦缶雖工難悅趙王之耳史記秦趙會于澠池秦王請趙王鼓瑟秦御史書曰秦王令趙王鼓瑟藺相如曰請秦王奏盆缶秦王不許相如曰五步之內請以頸血濺大王矣秦王一為擊缶相如召趙御史書曰秦王為趙王擊缶何則意吻者易為容而情乖者難為洽也是以越石抵掌於晏嬰之側見壽徐序於期扼腕于慶卿之前史記秦將軍樊於期得罪亡之燕燕太子丹受而舍之荆軻私見於期曰願得將軍首獻秦王臣左手把其袖右手揕其胸於期慨然遂自刎國䇿蘇秦見趙王于華屋之下抵掌而談張儀傳天下之士莫不扼腕以言蜀都賦扼腕抵掌魏齊亡命乃客虞卿史記魏之諸公子曰魏齊因范睢為相亡走趙匿平原君所秦昭王遺書趙王欲殺之魏齊夜亡出見趙相虞卿虞卿解其相印與魏齊亡間行欲因信陵君以走楚亡命見素伯序鬷蔑不聊爰投羊舌左傳鬷蔑惡欲觀叔向立于堂下一言而善叔向曰必鬷明也林注蔑即鄭然明其貌醜叔向聞其言而知其賢叔向乃羊舌職之子無他素䝉根柢之知則略其疻痏夙荷優容之雅則假以羽毛耳鄒陽上梁王書欲忠當世之君而素無根柢之容西京賦所好生毛羽所惡成瘡痏注羽毛言飛揚瘡痏言瘢痕也嵩之藉庇草餘年矣不幸崩摧酷遭割罰年幾知命尚乏嗣𦙍漸成張壯武之心疾時類羊南城之淚流藝文類聚阮光祿大兒喪哀過遂得失心疾壯武見懸圃序晉羊祜傳祜封南城侯無子封其夫人夏侯氏萬嵗鄉君庾信傷心賦張壯武之心疾羊南城之淚流已於商邱歸德府志陶唐遷閼伯于商邱即今商邱縣漢曰睢陽擬置一媵非云曼倩之小妻見看奕賦聊比樂天之粗婢見琴怨序或者李家先德尚産衮師見看奕賦阮氏清門將生遙集見西洋啓阮孚别傳咸與姑書曰胡婢遂生胡兒答書曰魯靈光殿賦曰胡人遙集于上楹可字曰遙集故孚字遙集蓬頭歷齒見看奕賦注宋玉賦蓬頭歷齒妄思以買得為名小名録桓冲字幼子彝之子兄溫甚器之初彛亡兄弟並小家貧母患須羊以解乃以冲為質羊主甚富言欲為質幸為養買得郎注冲小字執繖擎箱謬計以醜奴作氏補注古詩足下絲履五文章平頭奴子提履箱然而客本畏人居尤不易杜詩畏人成小築詩話白居易少時以詩投顧况况戲曰長安物貴居大不易及見原上草篇曰有才如此居亦何難必賴汝南長者寵以輜軿許下羣公惠之談論汝南見憺園賦開封志許州周曰許國魏曰許昌後漢書袁紹賔客所歸輜軿柴轂說文軿車前衣車後為輜晉書謝朓見會稽孔闓謂人曰此子聲名未立無惜齒牙餘論此其萍跡或免蓬科潘嶽西征賦飄萍浮而蓬轉倘有高軒入魏幸言朱􅕀於市中李賀傳賀七嵗能詩韓愈皇甫湜探之作高軒過詩史記侯嬴謂信陵君曰臣有客在市屠中願枉車騎過之公子引車入市侯生下見其客朱􅕀至於絳綬遊吳願述伯鸞居廡下見集生序用兹仰瀆伏冀台慈更有鄙懷統祈尊鑒嵩以盧蒲髮短左傳盧蒲嫳見齊侯泣曰余髮如此種種余奚能為子尾欲復之子雅曰不可彼其髮短而心甚長燭武精亡見鞠存序處處揶揄見園次序年年􅂒􅂒托言落榜而縱飲謂之打􅀈燥一云􅂒􅂒正使石填武擔見庭表序詎塞愁倉土運黎陽見實菴序難平恨棧瑶姬無掃塵之竹瑶姬見納姬序鄭緝之東陽記崑山去蕪城山十里上有員池池邊竹極大風至垂屈掃地恆淨潔如人掃也永嘉記卜江緣岸有仙石壇有仙竹嬋娟風來枝動掃石壇壇上無塵玉女寡洗頭之盆見劉太母序將畫葉公之龍遂牽荀息之馬莊子葉公子高好龍雕文畫之于是天龍聞而下之葉公見之棄而還走是葉公非好真龍也好夫似龍而非者也榖梁傳晉滅虞荀息操璧牽馬而前曰璧則猶是而馬齒加長矣雖復井公縱博寧能索笑於仙家見三芝序即令鍾子刺船詎便移情於海上見井叔序方今成均廣闢周禮石鼓𢎞鳴見梧月序晉書武帝時吳郡崩出一石鼓擊之無聲張華云以蜀中桐木刻作魚形扣之則鳴如言聲聞數十里六館之側漢書何蕃居太學六館之士不敢從亂負笈者三千見祖德賦四庫之旁見園次序橫經者十九後漢書章帝會諸儒白虎觀講五經同異諸生橫經捧手詣問若獲䇿其謭劣竭此涓埃史記李斯傳能薄材謭注淺也杜詩未有涓埃答聖朝一觀太學之碑見憺園賦便脫諸生之籍未知此語果合事宜佇望台裁以為進止嗟乎來曰大難見納姬序獨居不樂補注天上之愁萬里人間之怨千年見琴怨序困豫且之赤鯉猶然仰沫於洪波吳越春秋吳王欲從民飲伍子胥諫曰不可昔白龍為魚漁者豫且射中其目若白龍不化豫且不射今萬乘而從布衣飲臣患其有豫且之患矣燒爨下之焦桐尚爾驚魂於妙曲見佳山序辭寧敘意書不宣心附注劉穆之傳穆之布衣時往妻兄江氏乞食多見辱後任丹陽尹靈巖寺重建大殿碑蓋聞須彌蘭若即號青鴛見半繭賦華嚴經願一切衆生常安居止阿蘭若處釋氏要覽𣑽言阿蘭若此言空靜洛下伽藍原稱白馬見石榴啓過去因果經諸僧伽藍竹園僧伽藍最為其始要覽梵語題云僧伽藍摩此云衆園漢書明帝遣蔡愔張騫等往天竺取佛經以白馬䭾經乃起白馬寺于雍門外永興推宅恆鐫淨果於許詢建康實録晉許詢捨永興山陰二宅為寺既成啓奏孝宗詔曰山陰舊為祗洹寺永興舊為崇化寺造四層塔猶缺露槃相輪一夕風雨相輪自具曰是剡縣飛來宜壽聞鐘長託勝因於荀朂伽藍記宜壽里包信縣令段暉宅內地下常聞鐘聲時見光怪暉遂掘光所得金像一軀併一菩薩趺上銘曰晉太始三年五月十五日中書監荀勗造暉遂捨宅為光明寺絳雲成蓋人間開舍利之城涅槃經佛般涅槃茶毗既訖一切四衆收取舍利置七寶瓶當于拘尸那城四衢道中起七寶塔注舍利身骨也焚後五色如珠光瑩堅固古樂府有舍利佛題緑玉為階海上現辟支之佛法華經羅漢得道全繇佛教以聲聞為名辟支得道或聞因緣而解脫或聽環佩而得悟故以緣覺為名水經注于闐國城有利剎寺中有石鞾石上有足跡彼俗言是辟支佛跡寰宇記伏虎菴有辟支佛化身何必蓮河葱嶺給孤始解捐金梁元帝阿育王像碑才度蓮河即處天冠之寺按葱嶺在天竺唐詩葱河雪漫漫即葱嶺之河也經律異相須達多長者白佛言弟子欲營精舍請佛住惟有祗陀太子園廣八十頃可居白太子太子戲曰滿以金布便當相與長者出金布八十頃精舍告成故曰祗樹給孤獨園注須達多常施孤貧惸獨故曰給孤長者豈惟鷲苑猿江大士方能捨室水經注靈鷲山胡語云耆闍窟山是山青石逺望如鷲鳥形因名法華經山形如鷲釋迦常居此注即靈山猿江補注維摩經維摩現病釋迦遣諸大弟子問安各說本因俱不敢赴惟文殊師利至大士頓空方丈容八萬四千獅子之座吳郡靈巖山者具區勝壤見􅋯菴序注硯石名山吳郡志靈巖山吳王館娃宫故地其上硯石山有西施洞採香徑名香水溪下瞰太湖望洞庭兩山滴翠浮碧在白銀世界中離宫標越絶之書越絶書美人宫周五百九十步勾踐習教西施處越絶者勾踐抑強扶弱絶惡反之于善也張樂夸吳都之賦左思吳都賦幸乎館娃之宫張女樂而娛羣臣羅金石與絲竹若鈞天之下陳煙濤噴礡朱長文録入圖經宋史朱長文吳縣人著書閲古元祐中為祕書郎正字嘗著經史有文集三百卷載有靈巖勝蹟川瀆紛綸孫承佑形為塔記補注若其旁綴由姑斜垂青嶁峰連鄧尉纓綺岫以攢霄見竹逸序徑轉車箱補注冠朱峰而礙日西都賦豐冠山之朱堂魏都賦首冠靈山四百八十見鴻客序蒼蒼薝蔔之林見逸齊序三萬六千渺渺芰荷之所見􅋯菴序縈晴結暝太湖伴佛髻以偕青蘸水繚煙兩崦共天花而並翠楞嚴經世尊座天雨百寶蓮花青黃赤白間雜紛􅀈維摩經會中有一天女以天花散諸菩薩皆墮落至大弟子便著不墮天女曰結習未盡散花著身結習盡者花不著身一聲谷響疑賡講院之鐘見宋元詩啓三闋漁歌似亂梵窗之唄王勃賦漁歌唱晚唐書王縉佐代宗作內道場晝夜𣑽唄法苑西方有唄猶東國有讃讃者從文以結草唄者短偈以流頌名異實同筠籠笋箬風送茶舲蕙畝松寮雨沾梅屐展矣塵寰之淨域洵哉欲界之仙都見玉巖序爾其沃壤眠芊平疇奧衍秋清獨眺閶門之萬瓦爭流春霽遙看茂苑之孤城入畫吳郡志夫差都闔閭以天門通閶闔故名閶門水經注若建瓴而倒流李義山詩茂苑城如畫閶門瓦欲流茂苑見孝威序金椎匝路漢文隱以金椎毬門牙仗之家鐵埒盈衢見銅雀賦即金埒也里儈市魁之窟况夫名都故址伯業遺基兔葵燕麥盡昔王酣宴之場古樂府道旁兔絲何嘗可絡田中燕麥何嘗可穫博物志兔葵苗如龍芮花白莖紫葉燕麥草似麥亦曰雀麥詩話劉禹鍚後遊𤣥都觀惟見兔葵雀麥動搖春風注大菊曰燕麥籥麥緑水丹山半過客悲歌之地見銀臺啓前塵一去館娃無響屧之廊見三芝序舊蹟猶存宫監乏采香之港見篇上皮日休館娃宫詩響屧廊中金玉步採香徑裏綺羅身綺羅奚代惻愴偏多簫鼓何年流連曷極魚山一曲翻成迦葉之居彌勒成佛經彌勒佛讃言大迦葉比丘是釋迦牟尼佛大弟子釋迦于大衆中常所讃嘆頭陀第一傳燈録釋迦在靈山會上手拈一華示衆迦葉微笑豨巷三條難問要離之冡通鑑外記吳王僚子慶忌居衛養士報仇闔廬患之子胥薦要離離乃殺妻子奔衛慶忌信之遂與渡江抽戈擊慶忌力薄不制慶忌捽而投之江赦之離曰臣已辱矣伏劒而死一作投慶忌于水即自殺高士傳臯伯通葬梁鴻于要離冡傍注冡在常熟界亦曰悴哉吁其悕矣假使城上高臺不遊麋鹿見園次序古來樂事長屬爽鳩見􅋯菴序梧宫無一夜之愁述異記梧桐園夫差舊園一名琴川梧園宫在句容縣傳云吳王别館有楸梧成林古樂府梧宫秋吳王愁浣女有千年之笑見園次序闔閭無恙山中之劒氣還騰越絶書闔廬塜在吳縣閶門外名曰虎邱下池廣六十步桐棺三重澒池六尺盤郢魚腸之劒在焉卒十餘萬人取土臨湖葬之三日金精上騰為白虎蹲踞其上伍相重來市上之簫聲未歇見雪持序則秦關錦砌常依繡嶺宫前見子厚序蜀地花磚永保摩訶池上見庭表序汾河月白年年明鸛雀之樓見天章序淮水波紅夜夜浴鴛鴦之殿見鞠存啓無如繡囊慣解補注金鏡能虧見劉太母序蕭條棧閣偏增望帝之悲見孟太母啓屑瑟關河彌切憤王之恨南史吳興有項羽廟土人名為憤王潮鳴文種見銀臺啓空喧塞鼓于傳芭谷應公孫祗唱迎神于醉覡下注周禮注事鬼神者男曰覡女曰巫一作男曰巫曰覡女名巫無覡銀牀屈曲徒盛玉女之漿古樂府淮南王自言尊百尺高樓與天連後園鑿井銀作床金瓶素綆汲寒漿名義考銀床非井欄乃轆轤架也石鏡晶熒終類武擔之石見實菴序此則天親菩薩樂施懴悔之方珠林彌勒天親二大菩薩乃昆弟因佛說經天藏乃造論一藏所謂經律論三藏傳燈録六祖惠能大師曰懴者懴其前愆悔者悔其後過香積如來願仗皈依之力也維摩經維摩居士禮佛言願得世尊所食之餘于是香積如來以衆香鉢盛飲與之眺逈曰本覺名如始覺名來本始不二名曰如來佛經皈依佛皈依法歸依僧為三歸於是七重䦨楯代植祗林彌陀經七重竹樹梵經祗陀太子施祗樹為佛說法處見篇上五色琉璃時修蓮界觀經下有金剛七寶金幢擎琉璃地臨濟曰龍生金鳳子衝破碧琉璃傳燈録釋迦佛生剎利王家放大智光明照十方世界湧金蓮花華嚴經佛土生五色蓮一華一世界一葉一如來燈燃多寶醒歷劫之沈迷藥師本願經禮多寶佛塔然七層之燈不遭衆難歷劫見琴怨序經演三車救衆生之熱惱法華經初長者以羊車鹿車牛車立門外引誘諸子出離火宅之難然後但賜諸子大白牛車而度脫之架瓊梯於震旦搆紺榭以由旬傳燈録初祖達摩曰當在震旦設大法樂謂中國也成光子曰震旦即神州之號震為東方日所出之地故以東國為震旦國法苑珠林須達爾時為蠰佉國大臣名須達多此園地還廣一由旬純以七寶布地奉施如來起為住處支僧載外國事由旬者晉言四十里寺所由來爰云舊矣然而迢迢貧里補注亦有平陂見楚鴻序寂寂化城非無隆替法華經有一導師多諸方便于險道中化作一城是時疲極之衆前入大城生已度想生安穩想河傾酸棗漢溝洫志孝文時河決酸棗波漂鹿女之經見逸齊序焰縱咸陽見天篆序灰燼鴿王之座珠林昔一鴿被鷂所逐即往舍利佛肩躲避身猶戰悚後飛向佛安然無恙六度集經菩薩為鴿王岧嶤寶樹攀少室以恆雕大集經金多羅樹白銀葉花銀樹琉璃葉花頗黎樹馬腦葉花馬腦樹車渠葉花車渠樹真珠葉花真珠樹黃金葉花嵩山志旁少室山禪林有達摩面壁故蹟杳藹慈航渡恆河而每涸珠林般若者苦海之慈航彌陀疏抄恆河在西域無熱河側鬼謀人社見得仲序濫及花宫白帖佛寺曰蓮界花宫星貰天錢償之奈苑見三芝序按西域有樹成果果中有女子王收為妃以地施佛故名奈苑洛陽伽藍記白馬寺有奈林故寺稱奈苑不有所廢其何以興此千秋金剎見半繭賦每苔纒蘚泐於前朝而六代琳宫空洞靈章經衆聖集靈宫仍矢棘翬飛於今日也詩然其始也廬峰乍闢豈能銀殿飛來補注漢觀初成未必玉梁自下玉笥山記漢武時玉笥山民感山之靈異祈禱立應乃置觀以表靈跡搆殿缺中梁一條將選竒材經旬未獲忽一夜震雷風烈天降白玉梁一條因號玉梁觀至魏武時亭午震雷化白龍而去鵲毛徒秃詎便成橋見憺園賦唇氣空噓焉能結市見藝圃序不藉鴦摩之願寧還龍樹之觀五燈會元鴦窟摩羅救産難因緣摩訶摩耶經正說衰微有一比丘曰龍樹善說法燃正法炬時則沙門僧鑑者妙湧言泉廣揮智刃瑞應經太子出北城門天帝復化作沙門太子曰何謂沙門對曰舍妻子捐棄愛欲也論衡吾言潏淈而泉出文賦思風發于胸臆言泉流于唇齒陸贄傳贄思如泉湧維摩經以智慧劍破煩惱賊既貫花而卓錫復插草而唱緣纓絡經帝釋尊天以花貫諸纓絡供佛初學記梁景泰禪師居忠州寶積寺無水師卓錫于地泉湧數尺地志梁時寶志公與白鶴道人同欲往鍾山之麓志公云某以卓錫處為記大智論菩薩用錫杖五燈會元釋迦與賢于長者過一寶坊世尊云此處宜建一梵剎長者插草一莖云建剎已竟僧肇論禪典唱無緣之慈經曰無緣生慈以斯而唱物無不周金容再煥艱同夸父之移山見徐母序香界還新勇比秦王之鞭石見憺園賦菴羅之樹又見華開一統志真臘國有菴羅樹花葉如棗實似李菴羅園闡義此樹花開生一女園既屬女女常守護後以園奉佛必鉢之林重聞鳥囀大智度論菩薩為迦頻闍羅鳥與大象獮猴友共在必鉢羅樹下時大象負獼猴鳥在猴上周游而行五燈會元摩耶夫人手攀畢鉢羅樹枝佛從右脅降生信屬金仙之呵護後漢書漢明帝夜夢金人長丈餘以問羣臣傅毅對曰臣聞西域有神曰佛其形長丈六而黃金色本行經忍辱修行三千二百劫始證金仙尤資善信之捐施見上注凡諸居士誰非喜捨之蘭陀白帖迦蘭陀長者先以園施外道後見佛逐諸外道以園施佛建立精舍維我宰官本是再來之摩詰普門品經應以宰官身得度者即現宰官身而為說法維摩經維摩詰是金粟如來再來發迹經淨明大士是往古金粟如來於是伐彼青珉鏤之紫篆珊瑚七尺春蠶織無量之碑見葉母序鸚鵡雙棲古蠆繡頭陀之碣六度集經菩薩為鸚鵡王有徒衆三千有兩鸚鵡力勢踰衆口銜竹衡以為車乘王集其上飛止游戲古蠆見懸圃序要覽天竺言頭陀此言斗藪斗藪煩惱故曰頭陀姓氏英賢録王巾頭陀寺碑在鄂州附注吳越春秋夫差避越兵于陽山三呼公孫聖而三應醴泉頌總督三省尚書白公宿應鈎陳見璿璣賦星躔華蓋西京賦華蓋承辰士贇曰天皇大帝上九星曰華蓋所以蔽覆大帝之座也弓刀褒鄂見觀槿序從龍居日月之鄉甲第崔盧見楚鴻序躍馬得風雲之氣陶太尉門第尤高專作八州之督見鄴園啓郭令公班資最貴親總九路之師見儲太翁啓按唐分天下為十五道宋分天下為二十三路籌邊而玉帳摩天見鄴園啓料武而金笳沸地見渭仁序於是盧龍城上獨設雄關見孟太母啓涿鹿州前還開䇿府見孝威序矧㡉海實神京之臂指地里志㡉縣屬東萊郡有鹽官吕忱為泓令通考省作弦賈誼䇿令海內之勢如身之使臂臂之使指至宛雒猶天下之咽喉見憺園賦齊宫魯殿悉凛兵符徐陵九錫文寧秦宫之可顧豈魯殿之猶存滎澤敖倉咸遵節制晉書滎陽郡滎陽縣地名敖秦置敖倉者地理通釋敖倉漢屬河南今鄭州滎澤滎陽二縣地滎澤在開封中牟縣北若恆嶽若岱嶽若嵩嶽見賀周序朱旗殷日一歸統轄之中廣雅轄一作轄猶管也􅀈空褁之以金如管也管轄之義取此為冀州為兖州為豫州書鐵騎嘶風羣在指麾之下見渭仁序公則望重甘霖化𢎞時雨躬斟大斗以膏黍苗詩手挽銀河而洗兵馬杜詩安得壯士挽天河淨洗甲兵常不用廉泉不竭見劉太母序吏民霑濯溉之需古井無波孟郊詩妾心古井水波瀾誓不起掾佐飲汪洋之度無何而邑多眢井見葉母序㕓盡醎泉公於署旁親加相度畚鍤甫及渟泓已盈先是我公曾徴吉夢陽休之將登三事夢見蓮花宋書陽休之字子烈以文章擅聲北史陽休之在洛將仕夜夢見黃河北驛道上行從東向西道南有一冡極高大休之步登冡頭見一銅柱迭為蓮花形休之從西北登一柱礎上以手捉柱柱遂右轉休之呪曰柱轉三匝吾至三公柱遂三匝而止休之尋寤後果驗達奚武正典同州夢邀甘㴻北史達奚武字成興代人少倜儻事周文帝以戰功拜太傅初武在同州時武帝敕武祀華嶽武于嶽上藉草而宿夢一白衣來執武手曰快辛苦甚相嘉尚武遂驚覺至旦雲霧四起俄而㴻雨逺近霑洽公則天㪺聖水兆始他年神灌香河祥呈今日順天志良鄉縣有琉璃河即古聖水又香河縣古武清地甘同玉女之漿見靈巖碑清比康王之谷一統志廬山康王谷秦王吞六國楚康王隱避于此故名內有水簾洞陸羽題云㵼從千仞石寄逐九江船徘徊嘉歎顧而樂之夫橘井鮑姑見徐母序徒誇諺誕球欄綺幹祗益奢靡王􅘙洛都賦玉井珠欄伽藍記河間王琛置玉井金幹靡有當於休嘉究何關於盛德至夫張陸二宅井以人名見紫𤣥序琅琊兩山泉因釀著九域志晉元帝封琅琊王因以名山巖谷深逺有溪自兩山夾流而下曰釀泉在滁州亦苐文士之風流詎屬名賢之感召若乃廣利二師拔佩刀而山泉自出漢書二師將軍李廣利破大宛圍山絶水廣利乃拔刀刺山飛泉湧水耿恭疏勒正衣冠而井水橫流見歸田序忠誠動夫天地語豈誣乎志氣協於高深公其是矣爰則繞以廊沓之銅甃風俗通甃聚磚修井也鏤楹髹楯垂鏡裏之雙虹名園記霍仙鳴别墅開七井雕鏤為井盤覆之夏月坐其上髹楯見贈閻序李詩兩水夾明鏡雙橋落綵虹素綆銀牀見靈巖碑舞天邊之獨鶴謝宣城詩獨鶴方朝唳時乃上日落成羣僚戾止鞾刀夜壓見紫來序數碣石之雁飛地理通釋碣石在海旁有雁門鹽澤并見渭仁序淮南子馮遲大丙之御也過歸鴻于碣石也閣道晨遊看滹沱之木落見田太翁啓兵欄月冷見素伯序盧從事因而賦詩補注壘府星高鮑參軍於焉命酒見瀛臺序注欣兹盛事廣以流傳某忝屬員恭為斯頌頌曰於爍皇清介兹祉福上帝命之奠乃九服地不愛寶天用降康白麟萃囿朱英集房桓桓我公出鎮燕涿左綰淄青見歸田序南襟穀洛見映碧啓我公至止文恬武熙韓愈平淮西碑相臣將臣文恬武嬉含和飲德浥我嘉師非惟浥之又滲漉之相如封禪文頌曰滋液滲漉何生不育雨澤瀌瀌詩復泛濩之見瑞木賦祁寒暑雨書我公是咨木穰金飢見觀槿序我公是毗詩天子是毗注附也水非資車旱非資皮貨殖傳計然曰旱則資舟水則資車物之理也我公在焉康斯阜斯三江既濤九河既灑說文灑滌也亦作灑北通朱户南暨黃腄秦始皇紀東過黃腄注東萊郡縣名漢主父偃傳飛芻挽粟起于黃腄溝鮮捶罌廣雅捶同椎以杖擊泥漢書韓信以木罌度軍博古圖罌溫水器也士醉而僛說文僛醉舞貌城無負汲百雉䯱髵西京賦猛毅䯱髵說文多毛鬚貌瀼瀼湛露爰降於軒匪降於軒有命自天帝則為之神為告焉何以餴糦冽彼汍泉毛詩注餴糦以水炊米也石乳遜飴天漿失鮮列仙傳卬疏者周封史也煮石髓而服之謂之石鍾乳酉陽雜俎石榴甜者謂之天漿瑞應圖甘露者神靈之精一名天乳一名仙酒公拜而受以祀以崇眷彼鴻濛食兹溟涬莊子雲將東遊適遭鴻濛注自然元氣也按溟涬清貌飾以文石縆之修綆說文綆汲井索也斟之酌之井泄用慶易注井泄者泥不停汚曰泄瓴甋既周豐碑屹然漢高紀猶居高屋之上建瓴水也禮公室視豐碑三家視桓楹我人作頌億萬斯年遂安方氏健松齊記昔者關稱楊葉庾信枯樹賦北陸以楊葉為關南陵以梅根作冶冶字梅根見鴻客序高臺留酸棗之名别館得棠梨之號見翼王序將軍營裏樹或千尋見鷹垂序故侯陵邊瓜皆五色見滕王賦紅薑繞砌知為馮衍之家見天章序素奈盈墀識是潘尼之館潘尼賦飛甘瓜于浚水投素奈于清渠並見天章序莫不載在珠林録於玉海釋書有法苑珠林梁書朱异猶玉海千尋窺映不測南史宋張融有集名玉海過其旁者攀條而興沃若之思生其後者摘葉而切猗儺之感詩境由地顯物以人傳然而海易成田見舜民序陵偏作谷詩淮王一去竟無仙桂之叢見滕王賦湘女重來并少斑篁之㸃見憺園賦陶潛故里菊已全稀見翼王序歸去來詞松菊猶存董奉空林杏還不見見劉太母序豈非霜凋楚畹見海棠賦注則芝蘭隨蕭艾同枯見翼王序注淮南子巫山之上從風縱火紫芝與蕭艾俱死風悴鄧林見鄴園啓則杞梓與楩柟交盡者乎見滕王賦劉峻辨命論火炎崑嶽礫石與碗琰俱焚嚴霜夜零蕭艾與芝蘭共盡遂安方氏有健松齊焉吾友方渭仁尊公先生之别業也縣名新定嚴州志孫吳新定縣晉曰遂安後因之邪連天子障前補注山曰武疆遙亘客星巖畔嚴州志遂安縣有武疆山甚險峻盜不能攻故名又桐廬縣富春山一名嚴陵山前臨桐江即釣臺臺下有客星閣按餘姚為子陵故里亦有客星山林臯明瑟代産高人水木崢泓生多隱士先生則韋平世胄夙厭紛華見智修序王謝門風惟耽簡寂見少楹序雖類晏嬰之近市而託興丘園即同潘嶽之背城而結情薖軸見紫𤣥序薖軸載詩屢引風前之嘯時披霞上之襟用搆小園爰名勺圃夫其凉房燠館映以長川粉壁青垣繚之華薄見合肥啓注溯潺湲而架壑見懸圃序渡界略以沿堤見憺園賦籬編麂眼野花碧碧以黃黃浪織靴紋梁簡文詩風吹鳳皇䄂日映織成靴注同鞾水蓼疏疏而密密左抵蕉鄰之舍傍翼桑園右通竹士之軒斜紆琴閣丹曦染幌羣峯獻翠以爭來素魄縈忩叠嶂排青而不去此結廬之勝槩而築室之大凡也若夫倪寬隴畔只欲荷鋤見海棠賦陶侃齊頭雅能運甓見紫𤣥序臺孝威之暇日采藥何妨見孝威序潘安仁之平生栽花不免見楚鴻序效丈人而抱甕命稚子以巾車莊子天地篇子貢南遊于楚反于晉過漢陰見一丈人方將為圃畦鑿隧而入井抱甕而出灌左傳巾車脂轄歸去來詞稚子候門又或命巾車﨑嶇種樹長愧槖駝窈窕尋源還憐阿假柳文郭槖駝傳云槖駝病僂傴善種樹風土記獠國無姓名惟以長幼次第呌之丈夫稱阿暮阿假婦人稱阿姨阿等杜甫示獠奴阿假詩郡人入夜爭餘瀝稚子尋源獨不聞病渴三更回白首傳聲一注濕青雲歸去來詞既窈窕而尋壑亦﨑嶇而經丘此又逸民之勳業而幽士之經綸也無何而祠內狐鳴見天章序郭門蛇鬬見懸圃序女子抱采虻之嘆大夫嬰離黍之悲詩盜滿平林冦瀰新市光武紀招新市平林兵注新市縣屬江夏郡今郢州並見滕王賦注蚍蜉競起見素伯序即蟻賊也媳婦傳八百之稱雲南建置沿革世傳土酋有妻八百各領一寨因名八百媳婦元初征之道路不通而返鵝鸛長飛左傳公子城與華氏戰于赭丘鄭翩願為鸛其御願為鵝君子有六千之號見懸圃序盧循萬舸見佳山序直下嚴灘見上後漢書嚴光餘姚人光武除為諫議大夫不屈乃耕富春山後人名其釣處為嚴陵瀨一名七里灘張角諸軍見素伯序注漢書靈帝時張角聚三十六萬衆皆著黃巾分馳桐嶺見鄴園啓烽搖列郡見滕王賦盡成糜竺之家蜀志糜竺字子仲東海人資纍巨億從洛還家行未到數十里路傍逢一婦人求車寄載行二十里婦人謝去曰天使我燒糜竺家感君義故相告竺懇請之曰快去我緩行竺急歸盡出財日中果火發按竺進妹為先主夫人出金銀貨幣以給軍霧捲千村大類張超之市見觀槿序趙威豪時丁喪亂每被俘囚後漢書趙苞字威豪為遼西守遣吏迎母及妻子為鮮卑冦鈔載之賊出母示苞苞涕泣謂曰昔為母子今為君臣苞即破賊母妻皆死苞殯葬靈帝䇿第封侯既而曰食祿避難非忠殺母全義非孝遂嘔血死朱文季運值流離恆遭略奪東觀漢紀朱暉字文季南陽宛人年十三與舅母家屬入宛城道遇賊欲奪婦女衣暉拔刀向賊曰錢物可得諸母衣不可得賊義之遂放遣斯時也鶴到歸時已無城郭見存菴序燕將巢處更少門庭見玉巖序周顒蚤韭五代史周顒字彥倫隱鍾山後為海鹽令嘗慕春初早韭秋暮晚菘半供莊蹻之樵蘇見竹逸序張翰秋蓴見九日序都作王彌之芻牧見賀周序雖歷歷月中之桂而斧亦相尋列仙傳吳剛學道有過謫伐月桂桂高五百丈斫之而斧痕隨合縱芒芒天上之榆古樂府天上何所有歷歷種白榆而波還濫及見鄴園啓藥難獨活見丁香賦果只寄生本草圖經桑寄生出𢎞農山谷桑上今處處皆有之樂府遺聲有曲名樹中草注謂桑寄生也而頻經板蕩詩猶存碩果之遺易洊歷漂搖詩不改後凋之舊論語五株屹若狀類秦官秦記始皇上太山風雨暴至休于松下因封為五大夫獨樹巋然形同魯殿見滕王賦杜拾遺之堂下略比人長杜甫草堂四松詩四松初移時大抵三尺強别來忽三嵗離立如人長按甫為左拾遺王給事之門邊何知鱗老杜詩何謂西莊王給事柴門空閉鎖松筠注王維于開元中擢左拾遺給事王維詩種松皆作老龍鱗固已青針乍茁賦客歎其峨峨世說有人哭長輿曰峨峨若千丈松崩一云峨峨若泰岱松古詩松針穿破嶺頭雲紫蘚初縈騷人歌其鬱鬱者矣左思詩鬱鬱澗底松蓋松之來也實於新安許氏之園而樹之植也粵惟順治甲午之嵗時先生之殁已幾閲春秋而令嗣之悲乃倍踰疇曩云於是風高暗撫嶷如虎豹之姿歸去來辭撫孤松而盤桓杜甫雙松詩白摧朽骨龍虎死霜降閒哦歘作蛟螭之勢昌黎文集崔斯立為藍田丞日對二松吟哦其間蛟螭見璿璣賦枝枝拗鐵落滿徑之清陰日日吹竽沸半簷之天籟杜甫雙松歌屈鐵交錯回高枝魏都賦鐵條悲鳴聲化竽籟古詩松風類笙竽莊子齊物論南郭子綦謂顔成子游曰汝聞人籟而未聞地籟汝聞地籟而未聞天籟王右軍作字砉若鸞拏見紫來序桓元士掀髯怒成蝟磔見天章序蒼皮裂處軒皇媧后之身雙松歌兩株慘裂苔蘚皮五帝紀黃帝諱軒轅生而日角龍顙列子伏羲女媧蛇身而人面有大聖之德翠鬛張餘韋偃畢宏之畫名畫記韋偃京兆人寓于蜀作老松異石筆力徑健人知其善畫馬不知松石更上也畫斷畢宏大歷年間為給事中畫石于左省㕔壁好事者皆詩咏之杜詩天下幾人畫古松畢宏已老韋偃少脂千齡而孕珀根萬載以蟠苓博物志松脂淪入地中千嵗為茯苓茯苓千年化為琥珀髣佛張良廟後永晝亭亭張良傳願棄人間事從赤松子遊劉公幹詩亭亭山上松依稀𢎞景院中嚴颷謖謖梁書陶𢎞景時愛松風庭院皆植松每聞其響歡然為樂世說世目李元禮謖謖如徑松下風嗟乎恆河剝蝕見靈岩碑百卉俱腓詩塵劫蒼茫羣芳並歇見琴怨序而乃過王家之舊宅尚有庭槐見銀臺序問劉尹之當年非無故樹吳均齊春秋劉瓛字子圭晉丹陽尹惔六世孫也袁粲在郡嘗于後堂夜集劉為祭酒在坐袁指庭中栁樹謂劉曰人謂此是劉尹時樹每想高風今復見卿可謂清德不衰火燒斷節抱朴子山中夜見火光者皆古枮木所作勿怪也枯樹賦火入空心膏流斷節薛能詩幾處松筠燒後死恆換鵑紅見天章序月挂枯枝定開華白爰修牆屋頓還童冠之前遊聊固垣墉用志高曾之手澤見祖德賦并成記敘用識嵗年登斯堂也或婆娑而賦松耶戰國䇿秦使陳馳誘齊王建入秦遷之共處之松柏之間餓而死齊人怨建聽姦人賔客不蚤與諸侯合從以亡其國歌曰松耶柏耶建共者客耶後有人焉應俯仰而思遷者見無忝序王母張宜人墓志銘宜人姓張氏山東濟南府鄒平縣人曾祖仁軒公諱一元前巡撫河南都御史祖華東公諱延登前都察院左都御史諡忠定公父扣之公諱萬鍾前江南鎮江府推官母李孺人生母景碩人譜其氏牒則張姓連天見祖德賦敘厥門楣則齊姜右族詩三條貴里見憺園賦銅街鐵市之衢見壽季序七葉高軒蘭錡金貂之第見半繭賦宜人幼即端莊生而敏淑言為典誥象應畫圖見潘母啓才踰毁齒見素伯序遂工秋菊之銘見鞠存啓甫届勝衣見素伯序便涉春蠶之館見潘母啓前漢書上林蠶所也元后春幸繭館東觀漢紀馬后置織室蠶室于濯龍中誨誡無煩於師氏幽閒有合於風人數嵗許字新城翰林侍讀王阮亭先生蓋先生伯兄吏部亦娶于張即宜人從姊也門內機雲見祖德賦仍呼僚偦雜記江東呼同門為僚偦梱中姊姒原屬同生用為秦晉之美談允作朱陳之勝事左傳晉侯使吕相絶秦曰昔逮我獻公及穆公相好重之以婚姻輿志朱陳村屬豐縣白詩徐州古豐縣有村曰朱陳去縣百餘里桑麻青氛氲一村惟兩姓世世為婚姻然而時會前明運丁末造扣之公一官羈絆百口飄蓬田單之值亂離全宗人以鐵籠見雪持序杜林之免細弱載妻子于鹿車後漢經學行義傳杜林字伯山茂陵人杜鄴之子王莽末避地河西隗囂外示優容隂令刺客于道遮殺之客見林身推鹿車載弟喪行千里感嘆不忍害後建平中卒宜人轉徙江淮﨑嶇京峴猥以髫齓之辰見賀徐序洊抱蓼莪之痛見憺園賦爰乃弱不勝喪哀能備禮鋭司徒之弱息流涕何窮見葉母序許穆公之夫人銜悲曷已見尺牘序屬興朝定鼎之曰為闔門出坎之秋易馬角歸鄉時惟丙戌見觀槿序雀屏諏吉嵗紀庚寅太平廣記竇皇后父毅嘗謂妻曰此女有竒相豈妄與人因畫一孔雀于屏間請婚者射二矢陰約中目則得之射者皆不合唐高祖最後射各中一目遂歸之蓋是年宜人實生甫十四云兩姓高門百年嘉會絲羅既託見昭華序東諸侯之閥閲巋然喬木斯存見祖德賦內夫人之纓裾秩若孌彼諸姬爛其韓姞詩高曾在上操箕帚以前國語諸稽郢行成于吳曰一介嫡女執箕帚以䀭于王宫舅姑在旁鳴珮環而相見韓倬序婆娑鶴髮方伯公之笑口常瑳詩婉娩鸞雛兩尊人之歡頥欲解見昭華序眷言顧之樂可知矣乃其聲高宋子德懋邢姨詩溯夫廟見之初暨彼入官而後始終一致榮悴齊觀攬厥生平洵資揚扢當侍讀文禽初委之時見貞女序正鳳翮將翔之日宜人則鬻叉佐讀剪髲供餐見徐母序短布垂垂見壽閻序注影亂青袍之色寒機軋軋見劉太母序韻諧洛誦之聲勉成夫子之名用纘前人之緒及夫一行釋褐見玉巖序盡室之官鞠衣耀日駕文駟以北來周禮注外命婦孤之妻服鞠衣其色黃象桑葉始生畫鷁呼風泛緑波而南下見祖德賦而宜人受寵不驚處膏彌潔山河被服何心翟茀之榮風雨綢繆不改裙笄之素詩摻摻筐筥用芼蘋蘩詩肅肅袿褵釋名袿褵婦人服爰將榛栗見毛太母啓施襟設帨見韓倬啓承顔在視聽之先宿肉異粻養志居口腹之外禮五十異粻六十宿肉七十二膳八十常珍衣經再浣誰熏省內之香室倚一燈不傅署中之粉賜來纎縞祗獻高堂製得叉璫為遺太母婉容愈色禮得諸姑伯姊之歡詩布惠流慈逮籥翟輝庖之賤見逸齊序至若侍讀公者東都有道見天章序西邸名賢見壽徐序閣鈴未掣見竹逸序騶已哄夫當關左傳使訓羣騶知禮哄喝聲也當關見雪持序巷柝將闌賔尚窮於投轄見得仲序而宜人則黽勉有無詩屏當鮭菜見庭表序鵝肪雞跖既朐末之咸宜曲禮左朐右末注朐脯也精細者為末緑糈紅粳亦咄嗟而立辦以至一雙跳脫列仙傳晉穆宗時仙女萼緑華降羊權家致火浣布手巾金玉跳脫各一注臂飾即釧也一作條脫時供計吏之租車幾緉絇絲玉藻童子不屨絇注絇帶之屬恆代良人為贈縞見憺園賦傾奩佽助毛詩鄭箋佽謂手指相次比也又助也歡踰京兆之畫眉見少楹序梯几喧豗山海經西王母梯几戴勝注梯慿也快比如臯之射雉見淡菴序其淑慎也如此其任恤也又如此固宜其祥鍾五福書邑以延鄉見葉母序瑞叶三休見壽閻序封之石窖也見葉母序維嵩間嘗逖稽枯菀歷有明徴見雪持序悉數平陂非無左驗見楚鴻序古來憔悴之姬姜逸詩雖有姬姜無棄憔悴多是文人之伉儷見牛叟序是故高才失職見園次序季女斯飢詩伯鸞德配舉鴻案以增悲見貞女序仲孺賢妻臥牛衣而隕涕見天章序年年饁畝傷哉冀缺之貧見井叔序日日移山惜矣夸娥之拙見徐母序亦有齊牢嘉耦合卺華年見閨秀序領千騎於上頭見閨秀序注列首行之命婦見李母啓而或者浮雲南北見素伯序溝水東西見季青序悲纒盤裏空貽伯玉之詩見憺園賦滄浪詩話玉臺集有蘇伯玉妻作寫之盤中屈曲成文也泣上樓頭長寄連波之錦見納姬序甚至燕去瑶筐見鞠存啓蘭凋錦砌見翼王序弄牀頭之繡褓史記注繡褓嬰兒服也只有緹縈漢書太倉令淳于公有罪當刑少女緹縈上書願沒為官婢以贖父刑天子憐其意詔除肉刑騎堂下之羊車見雪持序何來遏末見皇士序縱使媧皇煉石詎易填愁見憺園賦即令玉女投壺焉能博笑見琴怨序獨有宜人殊斯遭遇意者茫茫蒼昊適當醉博之年見三芝序夢夢黃輿禮視天夢夢并見琴怨序亦在滄桑之候乎見舜民序不知一歸才子未必全亨但號上流安能常泰自壬子仲秋遘姑孫太宜人之變宜人毁不欲生劈而祈死作婉孌之臯魚見憺園賦髽而泣血見貞女序效悲歌之嫈姊見納姬序烈以屠腸見貞女序時則侍讀公方典試西川先是宜人又再捐愛子傷心曷極茹苦何多盻刀環於萬里見無忝序目斷金牛見考功序埋蘭蕙以連枝見翼王序神傷青雀見滕王賦沈疴遂篤疢疾寧多名香四兩見葉母序人間無換骨之方漢武內傳王母謂帝曰子但愛精握固閉氣吞液一年易氣二年易脉四年易肉五年易髓六年易筋七年易骨八年易髮九年易形陶𢎞景雜録苦茶輕身換骨杜詩相哀骨可換菊水一杯天上少延齡之術見琴怨序乃以康熙十五年九月十五日卒於新城之里第春秋四十嗚乎哀哉千秋灑泪長依思子之碑述異記中山有韓夫人愁思臺望子陵九日登高立化望夫之石見海棠賦侍讀公以十六年某月某日葬宜人於某鄉花磚改秩見吳太母啓雖未分榮寵於紅奩韭葉題旌見琴怨序猶克表幽貞於彩筆銘曰齊魯名家琅琊著姓猗歟宜人塞淵以敬樛木流徽螽斯衍慶頻摧弱息見潘母啓一慟慈姑潘嶽哀永逝文慈姑兮垂矜海乾蛟蜃見舜民啓月蝕蟾蜍見鞠存啓筐留玉燕見鞠存啓墳歸寶鳬見半繭賦樹薆西靡詳敬哉文風號北陸見淡菴序千尺喬松幾枝斑竹花簟留痕琴歌輟曲既􅈺姆教見昭華序亦擅女宗見吳太母啓瑶姬館寂見孟太母啓嬴女樓空見藝圃序嗚乎令範隧此幽宫左傳注隧墓道也徐陵與李那書歡此幽宫陳檢討四六卷十八
