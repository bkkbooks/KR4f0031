body:
  text: 陳檢討四六卷九翰林院檢討陳維嵩撰序樂府補題序樂府補倡和作者為玉笥王沂孫聖與蘋洲周密公謹天柱王易簡理得友竹馮應瑞祥父瑶翠唐藝孫英發紫雲吕同老和甫篔房李彭老商隱宛委練恕可行之菊山唐珏玉潛月洲趙汝鈉真卿五松李居仁師吕玉田張炎叔夏山村仇逺仁近共十三人又無名氏二人題為宛委山房賦龍涎香浮翠山房賦白蓮紫雲山房賦蓴餘閒書院賦蟬天柱山房賦蟹調則為天香為水龍吟為模魚兒齊天樂桂枝香凡五共詞三十七首為一卷嗟乎此皆趙宋遺民作也粵自雲迷五國程史哀欽廟疏二帝之駕終于五國城注徽欽為金人挾之北行先後殂於五國城地橋䜟啼鵑見曜菴序潮歇三江營荒夾馬宋書恭帝時錢塘江潮三日不至時元軍分住江沙杭人方幸之而潮汐不至輿志三江源在台州府城西三江合流為靈江宋書太祖生于夾馬營有異香滿室夀皇大去已無南內之笙簫唐史肅宗劫遷眀皇于西南不復居南內宋紀光宗遭后悍妬逆于其父受內禪即位尊孝宗為夀皇按其事與肅宗遷帝不居南內同此借用賈相難歸不見西湖之燈火宋紀度帝時以賈似道為太師賜第西湖之葛嶺起樓臺亭榭作半閒堂與姬妾逰樂至恭帝時貶循州安置監押官鄭虎臣誅之史斷西湖自紹興建都君相競嬉逰金主亮聞之起投鞭渡江之志三聲石鼓汪水雲之關塞含愁晉五行志吳興長城夏架山有石鼓鳴即兵起文山傳文山在獄汪元量抱琴訪之文山為題水雲詩宋史汪元量字大有號水雲以善琴事謝后一卷金陀王昭儀之琵琶寫怨宋史王清惠宋昭儀入元為女道士南歸湖山類稿多紀北徙事按嶽忠武孫珂著金他稡編家集五十八卷臯亭雨黑補注旗搖犀弩之城詳合肥書葛嶺烟青箭滿錦衣之巷地理志杭州新城縣有葛溪乃稚川煉丹地按湖州德清葛山亦有稚川蹟紹興府城葛山乃勾踐種葛使越女作布獻吳故名杭州志臨安縣石鏡山唐昭宗封為衣錦山錢鏐嘗于此宴故老大石皆覆以錦衣號其幼所戲水曰錦衣將軍則有臨平故老圗經臨平湖在鹽官縣晉武帝時古者云此湖開天下寧杭州志仁和縣即漢鹽官五代錢江天水王孫見藝圃序無聊而别署漫郎見曜菴序有謂而竟成逋客北山移文為君謝逋客飄零孰恤自放于酒旗歌扇之間惆悵疇依相逢于僧寺倡樓之際盤中燭灺間有狂言莊子北遊無所發豫之狂言帳底香焦時而讕語托言江南李主帳中香法以鵝梨蒸沉香用之春秋元命苞醜臸臸言讕讕漢文三王傳王陽病詆讕置詞驕慢援微詞而通志見良輔序倚小令以成聲見鴻客序此則飛卿麗句詳竹逸序不過開元宫女之閒談見良輔序至于崇祚新編大都才老夢華之軼事也補注東京夢華録宋孟元老自序云僕昔從先人遊京師卜居金梁橋西夾道之南古有夢遊華胥之國其樂無涯者僕今追昔回首悵然目之曰夢華録乃瓿間覆醬偶賸殘縑見懸圃序而市上懸金從無雕本見楚鴻序蓋赤文緑字見璿璣賦幾經嬴政之灰餘始皇紀李斯請天下藏詩書百家語者悉詣守尉雜燒之而玉軸牙籖見三芝序久患江陵之道盡見滕王賦盈篇亥豕見佳山序既紛黦而鉛昏滿幅烏焉亦紙渝而墨敝古諺字經三寫烏焉成馬韭花已蝕見琴怨序蠆尾長鬈見懸圃序徒存鼎上之一臠後魏書崔浩曰嘗肉一臠知鼎中之味僅現雲中之寸爪補注于是竹垞朱子搜于里嫗之筐梧月蔣生鋟以國門之板頓成完好足任流傳譬之折叉出後再鐫龍鳳之形拾遺記魏文帝納美女薛雲藝有獻火珠龍鸞叉者杜詩蛟龍半缺落猶得折黃金注得井中斷叉遺珥如蛟龍之狀也破鏡歸時重鑄蛟螭之狀神異經昔有夫婦將别破鏡各執其半後妻與人通鏡化鵲至夫前後鏡背鑄鵲始此陳書徐德言尚叔寶妹陳亂破鏡各分其半後妻為楊越公所得徐作破鏡詩楊還其妻雖或楮上缺文間同夏五胡安國春秋傳夏五傳疑也行中脫簡略類呼豨見二齊序古錢掘得銅蚨則輪廓槎牙搜神記南方有蟲名青蚨生子依草葉潛取其子母即飛來以子血母血各塗錢或先用子錢或先用母錢皆復飛歸故名青蚨亦名子母錢斷碣捫來石獸則觚稜缺齾觚稜見璿璣賦說文齾缺齒也又凡器缺之稱然而墻邊擫笛猶能倣佛其聲見庭表序海上刺船尚可彽徊是曲見井叔序周公瑾聞兹妍唱定屬賞心見良輔序桓子野聆此清歌要為撫掌云爾世說桓伊字子野每聞清歌輒喚奈何國䇿鄭同撫手仰天而笑之晉書陸士衡初聞左思賦三都撫掌大笑浙西六家詞序錦衣倉北六朝之山色千堆見樂序補序驃騎桁南萬古之江流一幅晉史成帝沿淮設航二十四有竹格桁票騎桁舟陽桁等名猘兒去後大有新亭晉紀桓溫來朝謝安王坦之迎千新亭溫大陳兵衛延見朝士坦之流汗沾衣倒執手板按溫小名猘兒金陵志新亭在府南俯瞰江渚燕子飛時還存空巷見少楹序及玉巖序則有彩毫公子見看奕賦粉署郎官見園次序注續漢上之題襟補注效機中之織錦見璿璣賦衙香薰罷只願箋愁椽燭燒餘惟圗製恨玉玲瓏小閣滴粉搓酥詞評曉風殘月栁三變滴粉搓酥左與言紅菡萏山莊啼花怨鳥更值公叔華宗相君貴胄常棲蓮幕見紫𤣥序别署竹坨杜紫薇掌書記之日艷體偏多唐書武帝時杜祐孫名牧字牧之號為小杜以别杜甫牧生平不拘小節詩情豪邁多艷體嘗客牛竒章幕為書記後為睦州刺史豪右屏跡號紫薇太守終中書舍人韓君平知制誥之年宫詞不少詳梧月詞序醉卧鳳凰橋上曽翻十院琵琶杭州志鳳凰山南宋建都嘗環入內苑有鳳皇橋十院補注狂遊雞鹿塞邊竇憲傳憲為車騎將軍出朔方雞鹿塞與北單于戰于稽落山大破之登燕然山刻石記漢威德詔班固為銘慣聽一軍篳篥見天章序書之粉壁譜在羅裙况復柘湖既咸籍同居吳地志華亭南有湖周五千一百一十九頃中有小山生柘樹故湖山皆以柘名按柘湖非一處咸籍見祖德賦注秋錦亦機雲不别補注按機雲見祖德賦共說隴西才地有謫皆仙見三芝序輿志漢隴西郡唐隴右道今鞏昌府俱誇家令門風無腰不瘦詳逸齊序齊書沈約為太子家令金㦸則臨風對拓感激沈雄見無忝序玉笙則帶月交吹淋漓頓挫見聞後録李文饒曲云仙女董雙成桂殿夜凉吹玉笙萬户千門空月眀僰僮破悶訴萬里之飄零眀田汝成炎檄紀僰人在漢為犍為郡唐為于矢部蓋南詔東鄙也燕女尋歡序十年之淪落溺人必笑姑流浪于酒旗戲鼓之間溺人見天篆序亡子思歸長嚄唶于殘月曉風之下庾信哀江南賦咸陽布衣非獨思歸亡子見皇士序栁三變詞今宵酒醒何處楊栁外曉風曉月按嚄唶見雪持疇能惠我定遘知音假曰華豫屈原山鬼萹嵗既晏兮孰華豫寧無好事見憺園賦于是拈來犀管匣用琉璃見園次序注劈得蠻箋見三芝序裝成玳瑁見天篆序地則錢塘檇李家山只兩郡之間杭州志秦屬㑹稽東漢屬吳陳曰錢塘隋曰杭州春秋于越敗吳于檇李按檇李城今在嘉興府西南地詞如白石梅溪風格軼群賢而上詞集宋姜䕫字堯章有白日詞宋史王十朋字龜齡樂清人著有梅溪集髙宗時廷對第一釐為一卷約有六家從此井華汲處都吟栁永之章宋栁永傳永字耆卿有樂章集九卷葉少藴云嘗見一西夏歸朝官云凡有井水飲處能歌栁詞自今紈帕貽來半織元稹之曲補注屬有陳琳見無忝序寄言龔遂見二齊序僕也紅牙顧誤見良輔序雅自托于伶官詩集注賢者不得志託于伶官繡幔填詞長見呵于禪客補注銅官玉女詳梧月序邑居不百里而遙小令長謡見鴻客序卷帙實千篇有羡倘僅専言浙右諸公固是無雙如其旁及江東作者何妨有七聊資諧􅛐幸恕清狂曹實菴詠物詞序按十咏一隗囂官瓷杯一灌嬰廟瓦硯一延陵季子劒一未央宫銅奩一朱碧山銀槎一司馬相如玉印一長平遺鏃一大食瓷茶杯一魚苔箋一龍髯霜凋魏帳月中之剩瓦何多見銅雀賦水咽秦關地上之殘城不少隴水歌隴頭流水鳴聲嗚咽遙望秦川肝腸斷絶注在關西隴川天若有情天寧不老李賀詩天若有情天亦老石如無恨石豈能言左傳石言于晉魏榆晉侯問師曠云石何故言對曰石不能言或憑焉不然民聽濫也臣聞作事不時怨讟瀆動于人則有非言之物而言銅駝觳觫恆逢秋至以偏啼見滕王賦及看奕賦銀雁􅡬沙慣遇天隂而必出詳徐母序按􅡬沙楊慎曰披張貌山當雨後易結修眉見皇士序竹到江邊都斑細眼見憺園賦溯夫皇始以來代有不平之事千年關塞來往精靈傳毅舞賦釋精靈之所束萬古江山憑陵鬼物左傳鄭王子伯駢告于晉曰馮陵我城郭縱復人稱恨甚事奈愁何江淹工愀愴之辭見尺牘序鮑照擅蒼凉之賦見瀛臺序詩品鮑照一作昭仕宋為臨海王參軍詩源于張景陽及茂先歎其才秀人微故取堙當代正恐世閲世以成川年復年而作谷捧黎陽之土堙此何窮東觀漢紀鄧訓故吏知訓好青泥封書從黎陽步推鹿車過易陽載青泥一襆至上谷遺訓庾信詩故人倘書札黎陽土足封後漢紀朱浮與彭寵書曰河濵之人捧土塞孟津多見其不知量也按黎陽山在大名府積函谷之泥封來不盡東觀漢紀隗囂將王元說囂背漢曰元請一九泥為大王封函谷關然而劔鋒盡缺總為旁觀廣異記有農夫耕地得劍賈胡售以百萬約明旦取之農夫夜歸庭中有石偶以劒指之石遂中斷詰旦賈胡載鏹至視之嘆曰劍光已盡不復買矣此名破山劍惟可一用吾欲持之破寶山耳壺口新殘只因細故見紫𤣥序青史則幾畨劉項誠然與我何堪詳彭太翁唘世說桓溫曰人何以堪詳萬栁唘注黃河則滿地袁曹遑曰于卿奚事袁紹傳田典說紹曰與公爭天下者曹操也庾信傷心賦地鼎沸于袁曹世說桓𤣥謂王大服曰犯我家諱何預卿事或蝦蟆陵上暮年紅袖所閒談國史補舊說董仲舒墓門人至皆下馬謂之下馬陵語訛為蝦蟆陵或鸛雀樓前故老白頭之夜話見天章序或武擔過客見庭表序曽看石鏡于成都揚雄蜀記蜀王葬妃于成都作石鏡一枚徑二丈髙五尺以表其墓或盩厔居民見子厚序偶得銅盤于渭水見滕王賦苟非目擊即屬親聞莊子田子方篇仲尼見溫伯雪子曰若夫人者目擊而道存矣事皆磊砢以魁竒興自顛狂而感激槌床絶呌蛟螭夭矯于胸中見三芝序踞案橫書蝌蚪盤旋于腕下見憺園賦誰能欎欎長束縳于七言四韻之間對此茫茫見滕王賦姑放浪于减字偷聲之下詞譜詞有减字偷聲調按木蘭花五十字减字木蘭花四十四字吟成十首事足千秋趙眀誠金石之録遜此華文宋書趙明誠同妻李易安善藏古有金石録郭𢎞農山海之萹慚斯麗製見天篆序嗚呼烟霾天水囂官既蔓草千堆見琅霞序鞏昌志秦屬隴西郡漢曰天水魏秦州漢書隗囂成紀人素豪俠為上將軍名震西川據隴西後歸光武杜詩秦州城北寺傳為隗囂宫浪打章門灌廟亦殘陽一片見滕王賦悲哉季札劔影徒青吳世家季子聘魯過徐徐君君季札劒札心知之為使上國未獻及使還至徐徐已死解劒繫徐君冢樹而去逝矣劉郎奩痕尚紫列仙傳漢眀帝永平中劉晨與阮肇入天台山見二女止宿後至家子孫已七世按上注指未央銅奩非劉晨銀槎泛斗難追博望之勳名見無忝序及孝威序彩筆凌雲空羡馬卿之詞賦史記相如既奏大人之頌武帝大恱飄飄有凌雲之氣似逰天地之間意何况長平繡鏃恨血全紅長平見翼王序繡鏃見玉巖序大食氷瓷愁雲半黑杜詩集有大食刀歌注大食西方國名九域志舜奔蒼梧山山有九峯常有愁雲浮罩莫辨陵寢所在按宋牧仲得茶杯曰大食氷瓷也實菴因填此詞織成魚素粘海氣以猶腥見瀛臺序注掣得龍髯鼓天風而倍怒見孝威序九域志黃帝騎龍上天小臣攀龍髯龍髯拔墮黃帝弓乃抱其弓而號因名其地曰鼎湖弓曰鳥號豈非嘻嘻出出左傳或呌于宋太廟曰嘻嘻出出後鳥烏于亳社如曰嘻嘻注火妖也諾臯之所未收見素伯序怪怪竒竒國語申生之僕人曰竒生怪怪生無常齊諧之所不載者哉見素伯序僕每怪夫時人詞則呵為小道倘非傑作疇雪斯言以彼流連小物之懷無非淘洗前朝之恨人言燕市實悲歌慷慨之場見渭仁序我識曹君是文采風流之裔杜甫曹霸丹青引將軍魏武之子孫又曰英雄割據雖已矣文采風流今尚存狂歌颯沓見渭仁序聊憑鳳紙以填來見尺牘序老興淋漓亟命鸞笙為譜去見滕王賦李詩雙吹紫鸞䇠錢寶汾詞序五陵烟月最說長安三輔笙簫五陵三輔見渭仁序尤推鄠杜見鷹垂序縣名盩厔見子厚序樓前多織錦之妻見璿璣賦殿是馺娑見銅雀賦闕下有橫鞭之客見天章序于是貂蟬年少見半繭賦金粉仙郎見銅雀賦及楚鴻賦衛叔寶之體不勝綺羅晉書王丞相見衛洗馬曰居然有嬴形雖復終調暢若不堪羅綺西京賦似不勝乎羅綺王夷甫之手詎離珠玉見黃門序王衍傳衍為元城令終日清談而縣務亦理每捉玉柄麈尾于手同巴衍從兄戎嘗曰衍神姿髙徹如瓊林瑶樹云時則栁衣染緑荔帶垂青三峯集李固言行栁下聞彈指聲固言問之應曰吾栁神九烈君已用栁汁染子衣矣果得藍袍當以棗糕祠我後果傳臚第一楚詞薜荔為帶鳴筝而過公主之園挾瑟而上將軍之第補注臺前故仗見南苑之參差儀衛志仗劒㦸總名唐制殿下兵衛曰仗漢舊儀始皇上林苑在渭南後因名南苑杜詩憶昔霓旌過南苑大政記眀南苑方一百六十里中有按鷹臺二海子皆元之舊也閣下傳餐見璇璣賦望西山之葱欎見閨秀序李嶠為秋雁之吟唐書李嶠字巨山少時夢人餽雙筆自是有文名與杜審言等為文章四友天寶末眀皇乘月登花蕚樓有進李嶠水調者曰山川滿目淚沾衣富貴榮華能幾時不見祗今汾水上年年惟有秋雁飛帝凄然曰嶠真才子也是年幸蜀登白衛嶺又歌是詩悲不自勝王維有紅豆之作見素伯序寫之玳瑁見天篆序知才子之情多見海棠賦譜以箜篌見鷹垂序驗佳人之巧笑詩而蛾眉善怨詩時懷故里之鶯花蟬鬢工啼見琅霞序恆憶微時之娣姒雲中射雁偏愴晨風花後釣魚常悲流水絶憶嵇康之煆見半繭賦慣思張翰之鱸見九日序是則栁郎中小令麗句雖多見浙西序詳金天石序牛給事新聲愁端不少者矣牛㠐傳牛㠐字松卿王建鎮蜀辟判官後復仕蜀為給事中有詞行世僕類楚狂見井叔序偶來燕市見渭仁序一聲河滿憐司馬之青衫教坊記開元中滄州歌者臨刑進河滿子一曲以贖死劇談録武宗孟才人每于御前歌河滿子一曲聞者莫不涕零後宫車宴駕才人自縊張祐詩却為一聲河滿子下泉須弔孟才人三曡陽關羡尚書之紅杏王維詩勸君更盡一杯酒西出陽關無故人詩話唐人送别每唱渭城朝雨之什其法下三句皆重唱故曰三曡或曰先唱七言後除上二字唱五言又除上四字唱三言一步急一步故云三曡也又唐詩有梁州歌第一曡則二曡者猶今第一隻曲耳詩話宋祈字子京稱小宋往見張子野曰欲見雲破月來花弄影郎中子野屏後呼曰得非紅杏枝頭春意閙尚書耶不揣題詞之贈矧當判袂之時逐秋風而竟去余是愁人望眀月以相思君真健者見無忝序金天石吳日千詞稿序嘗考夫聲音之道自有淵源詞賦之宗遞為泛濫白鳩黃督曲調以短斷為工南齊樂志晉詞有白鳩篇略曰翩翩白鳩載飛載鳴晉清商曲詞有黃督二曲略曰喬客他鄉人三春不得歸子夜莫愁節奏以敏諧為聖子夜見二齊序莫愁曲見皇士序是知齊梁之樂府即唐宋之倚聲也詩品陸務觀云倚聲製詞起于唐之季世漢書戚夫人抱琴而歌曰倚歌自名花傾國供奉擅俊逸之才唐李白傳白為翰林供奉嘗作清平調有曰名花傾國兩相歡常得君王帶笑看金縷提鞋後主秉綺羅之質五代十國詞集南唐後主李煜作子夜調其略曰花眀月暗籠輕霧今霄好向郎邊去剗櫗步香階手提金縷鞋教坊簾幕見雪持序注試豓曲于清狂按魏都賦僕倘清狂見浙西序平樂樓臺㺯新聲于輕薄東京賦其西則有平樂都城視逺之館注漢眀帝永平五年至長安悉取飛簾并銅馬置之西門外為平樂館曹植詩我歸宴平樂新聲見皇士序北史魏收在京洛輕薄尤甚詞有千家業歸二李見篇上斯則綺袖之専門紅牙之哲匠矣若易安之婉孌清新屯田之溫柔倩媚詞集李清照字易安格非之女嫁趙眀誠有潄玉詞集一卷栁永傳永為景祐元年進士官至屯田員外郎嘗好為淫冶之曲傳播四方雖為風雅之罪人實則閨房之作者由斯以降我無譏焉見佳山序嗟夫北怨馬嵬空留羅襪國史補楊妃死于馬嵬黎樹下店嫗得錦襪一隻過客傳玩每出百錢由此致富南悲鳳閣見商尹序不見秦樓見藝圃序注聲聲玉樹終傷南國之魂見滕王賦步步金蓮長下東昏之淚見皇士序按齊寶卷廢為東昏侯相逢家令猶有內人齊書沈約為太子家令文惠宫人與語齊事又家令王仁詳納姬序閒說𤣥宗豈無宫女見良輔序三千小妾思唱李花見滕王賦二八妖童誰餐桃子韓非子彌子瑕食桃而甘不盡而奉衛君哀傷奚極悱惻何言况復紫塞琵琶見海棠賦盡是帝城之蕩婦梁元帝蕩婦賦愁縈翠眉斂啼多紅粉漫黃沙觱篥見天章序都為朱邸之名姬朱邸見滕王賦笙上金蛾補注半翻回紇見雪持序弦前火鳳春秋元命苞火離為鳳唐㑹要貞觀中有裴神符者妙解琵琶作勝蠻奴火鳳傾杯樂三曲太宗愛之李義山詩撥弦驚火鳳别譜龜兹見雪持序于是抱撥捍而私彈樂府雜録琵琶以蛇皮為槽以楸木為面其捍撥以象牙為之海録碎事琵琶面土當弦或以金塗為飾所以捍護其撥名金捍撥見琅霞序撫箜篌而暗操見鷹垂序岐王宅裏豈知北地之歌唐書惠文太子範睿宗第四子封岐王好學工書世說補李龜年嘗至岐王宅聞琴曰此秦聲良久又曰此楚聲後問之前彈者隴西沈妍後彈者楊州薛滿杜詩岐王宅裏尋常見朝后宫中不類南朝之曲梁書北魏楊白華武都仇池人胡太后逼幸之白華懼禍奔梁太后追念乃作楊白花之歌有云陽春二三月楊栁齊作花令宫人歌之其聲凄楚云按栁宗元詩楊白花風吹渡江水即擬胡后曲也時則有家居盩厔見子厚序幼富才情縣近金陵長憐歌舞金陵志楚威王望秣陵有黃氣埋金鎮之曰金陵自誇善曲不事金吾李頻詩題聞金吾妓唱梁州古今注金吾車軸銅為之御史大夫司𨽻校尉亦得執焉光武曰仕宦當為執金吾辛延年羽林郎詩胡姬年十五春日獨當爐男兒愛後婦女子重前夫多謝金吾子私愛徒區區慣倚能仙思調玉女天上玉女記魏濟北從事掾弦超字義起以嘉平中夜獨宿有神女來從之目稱天上玉女遣令下嫁張茂先為作神女賦遂乃巧製珊瑚之扇初就琥珀之床補注叉小志楚娘名妓也江都王寵之寢玳瑁之床翡翠之帳徐陵詩止應私將琥珀枕暝暝來珊瑚床江總詩盈盈扇掩珊瑚脣流蘇以縷綵為絲北史石虎冬日施熟錦流蘇斗帳安純金龍頭銜五色流蘇四角安金香爐徐陵詩流蘇錦帳掛香囊壓角以明珠作押漢武故事以白珠為簾箔玳珀押之被之小令度以名倡五侯馳才子之名七貴虛上賔之席前漢書成帝舅氏王潭王根王立王商王逢五人同日封侯潘嶽西征賦窺七貴于漢庭庾亮表西京七族注李霍上官趙丁王傅也江總詩五侯新拜罷七貴早朝歸李詩五侯七貴同杯酒吹簫夜出挾瑟晨歸洵可以矜天上之㺯臣廢人間之宫體矣補注爰命狂夫起而為序卸輕紅之衫子親展銀筝補注擲雜綵之帩頭樂録舊俗賞歌人以錦綵置之頭上凡宴賞加惠借以為詞有錦纒頭曲坐移寶柱見琅霞序須知天涯落魄漢書酈食其家貧落魄無非傅粉之人見銅雀賦地角流連總屬熏香之客爾徐陵詩風流荀令好兒郎偏能傅粉復熏香庾信詩荀令薰爐更換香葉桐初詞序門邊蕙葉葉盡生花見祖德賦何遜詩階蕙漸翻葉車裏璧人人皆有集見雪持序則有齒踰終賈終童見黃門序賈誼詳賀周序文邁班張晉書張華見左思三都賦而歎曰張班之流也注班固張衡也黃童既門第無雙見琴怨序謝客復詩名苐一見素伯序而乃丁年孤露見良甫序丙舍凋殘下注少依舅宅魏舒實寧氏之甥晉書魏舒字陽元少為外家寧氏所養寧氏起宅相宅者云當出賢甥舒曰當為外氏成此宅相長贅婦家樂廣以衛郎為壻見尺牘序雞籠山下新移坦腹之床金陵志府治東北覆舟山之石舊名雞籠山後名雞鳴山雷次宗開館于此世說郗鍳使人求壻于王導令遍觀子弟歸謂鍳曰王氏諸少並佳然聞信至咸自矜式惟一人東床坦腹卧食胡􅏘餅獨若不聞鍳曰此佳壻也訪之乃羲之也以女妻之鴛水湖頭舊築渭陽之館鴛水見皇士序世說魏明帝為外祖母築館于甄氏既成謂左右曰當何以名侍中繆襲曰陛下此館之興情鍾舅氏宜以渭為名緯蕭托業少賤奚堪莊子河上有家貧恃緯蕭而食者注緯織也蕭蒿也采梠為生長貧不免晉隱逸傳夏統字仲御㑹稽人幼孤貧事母孝每採梠求食不肯仕太尉賈充怪之曰此是吳兒木人石心後不知所終然且桐號孤生還思向日藥名獨活只欲搖風見丁香賦千篇繡虎見祖德賦揮完河北之箋見尺牘序五夜雕龍見三芝序擘盡膠東之紙見尺牘序月眀湓浦非無灑酒之篇詳梧月序花落臺城亦有隔江之曲見鴻客序風中弄笛吟九𣲖之銀鼉詳觀槿序注晉書桓伊聞王徽之名踞胡床而作笛聲三弄注笛譜有梅花三弄郭璞江賦源二分于崌崍流九𣲖于潯陽注江于此分為九道云李賀詩山潭晚霧吟白鼉補注山半調笙舞一天之彩鳳見滕王賦固已聲華藉甚才調斐然者矣憶僕年時逢君客裏鮑照城在臨河則面面朱欄文苑鮑照作蕪城賦有云登廣陵故城蕭統樓存夾巷則家家瓊樹一統志揚州文選樓梁昭眀太子集名士于此撰文選加以陶士行政之官北上見滕王賦王茂𢎞適盡室南來見鴻客序千官祖餞舸舳迷津百里追陪衣冠滿座與君此日頗多嬉笑之言顧我何人亦有激昂之作别幾何時歡真不再詎意風寒易水盡遣荆軻見智修序何圗草蔓燕臺忽逢樂毅詳田太翁啓遂班荆而敘舊見禹平序爰敷袵以論心見九日序示我以詞命為之序嗟乎曽聞長者呵蘭畹為外篇大有時賢叱花間為小技詞選有蘭畹集花間集歐陽炯花間序唐衛尉少卿字𢎞基集詞十卷為花間集十年豓製坐收輕薄之名見金天石序一卷新詞橫受俳優之目詳觀槿序人譏周勃僅解吹簫史記周勃微時常為人吹簫給喪事世笑禰衡惟工撾鼓見雪持序噬臍莫及左傳鄧騅甥𣆀甥養甥請殺楚子曰彼君噬臍其及圗之乎注若噬腹臍喻不可及捫舌難追詩乃猶戅不更絃老偏見獵董仲舒䇿譬之琴瑟不調必取而更張之乃可鼓也語録大程夫子曰少好獵後戒之十餘年見獵復心喜恣情標榜何能增才子之名竭力賡揚祗恐益小人之過然而結習寧忘鄙懷有在遇成連于海上情終以此而移見井叔序見美麗于山中口遂不能無道云爾國䇿趙王欲請中山隂姬司馬喜曰臣竊見其佳麗口不能無道爾即欲請之非臣所敢議附注鍾繇帖墓田丙舍欲使一孫于城西孫于都尉府此繇家嫡正之良者也陳檢討四六卷九
